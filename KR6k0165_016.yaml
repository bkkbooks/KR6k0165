body:
  text: 西太原寺沙門懷素撰次明自恣悔除已起順教安居恐迷己過既不省察道行難成故須仰憑德人乘慈誨示自不諱短恣他舉𠎝故云自恣廣明三種自恣方法集在一處稱云犍度大文分二初明非法舉罪為恣之緣第二自今已去下廣明自恣如非等法前文有六一明六群受行啞法第二作如是制下因問呵制第三時六群下非法舉罪佛制求聽第四時六群下俠惡求聽佛制五德第五彼六群下為彰求人應受不受第六時六群下既許聽已制立言要初文可知第二有三百恣竟禮覲世尊當時實無具法自恐但為一夏行啞不言令既安竟恣情申說故云自恣第二時世尊下因慰勞言撿獲得實第三佛告下正明呵制此中復三一呵行啞謂受啞違教故實是苦妄立耶制稱實為患無言法復猶如怨家忍苦自傷白羊無別次微所以何以是苦是患如怨如羊義故次釋結罪以不受行如來正教同於外道妄受啞法十誦犯受亞法三蘭次求聽者以得聽許使無諍訟即有生善滅惡之義伽論第二云比丘僧中出比丘罪成出罪不答不成出罪比丘犯突吉羅不先語故次制五德如文遮中廣釋五分十九云成就五乃法應問聽說罪若有慙愧多聞智慧自如法實欲使人離惡復有五法不隨愛恚癡畏知時非時反上不應問聽說罪次二文可解次下廣明如非儀軌於中長望分為十七第一正制自恣第二諸比丘下蘭德差人第三時諸比丘下自恣儀軌第四爾時有異住處下攝衆進不第五爾時自恣下明恣前後第六時諸比丘下定恣時節第七六群比丘下制集自恣第八諸比丘下示恣處所第九爾時有衆多下難結小界第十爾時自恣日下明恣法體第十一爾時自恣日下與欲恣法第十二爾時自恣日下略自恣法第十三爾時有異住處比丘犯僧殘下遮自恣法第十四爾時有異住處下客舊應不第十五時六群比丘下叛自恣法第十六爾時群比丘尼下簡餘衆法第十七彼自恣意下恣說不並此諸文中總有三恣一時自恣二增益三滅劫問所以不同說戒有非時自恣舊解云恐反生諍故無非時自恣今解不爾恣唯夏分安居竟為餘時不作故無非時說戒垣為無差半月為諍癡久故有非時初文聽安居竟自恣者以恣即是聽更不須求聽又此竟者是最末後日故五分十九云諸比丘便日日自恣或二日三日五日一恣以是白佛佛言不應爾應夏三月最後日自恣憎一阿含云七月十五日佛告阿難集僧今是受歲之日次第二文簡德差人先舉其緣次明差法此文不顯差人多少應須二人已上不得過多故五分十九云差自恣人若二若多文舉合差故云某甲某甲二律亦同若准此文即須別作三千云卷廣自恣要差人所以二人者僧自恣竟相向出罪不得求餘人自恣餘人僧不差故次第三儀軌文三初舉威儀及說不如為制之緣第二自今已下制說儀軌第三時有下對病進不制說之中初舉滅儀次明陳陳六句初大德者言對五德以其德行具足為僧所差裒讚之詞非簡大小二衆僧今日恣者此顯即座僧為非開十方同作三我某等者顯己同僧不乖衆法故曰亦自盜第四申其舉事故曰若見聞疑罪第五從宣己情請舉我罪故曰大德等語我此中大德還對五德長老別加歎詞猶如長老舍利弗等又如離彼多語一切去云大德長老第六我若下彰己見過即能悔除令行無違應於淨法表己殷勤故須三說五分十九自恣人不知己何時當應自恣以是白佛佛言次第至已便應自恣次第四攝衆文二初明白法白中但云今日自恣不須妄增黑白月語次六群造非佛示應不如文可知次第五明恣前後祇律二十七云若安居衆中有一人前安居者至七月十五日舉衆應同此一人受自恣自恣說座至八月十五日是處安居是處自恣若餘處自恣者起毗尼罪第六定恣時節約日及時可解次第七制集如文次第八恣處五分十九云佛言應好泥治地布草於上自恣僧祇云應香汁灑地散華能燈次第九結解小界此座處界如上釋說次第十明恣法體文中有二先明恣體次辨如非恣體有三謂僧對首心念釋義四門謂時處人法第一時者謂安居竟時非餘可解此位有三一時二增上三減劫時中復三謂十四十五十六日後安居者隨日不定若前後雜者隨上坐上坐亦不定者隨舊人舊人復不定隨多以此三義定恣前後又約日時通晝及夜第二處者四人已下通於二處五人已上其唯作法作法遍大小局坐處或可義通戒又該自場以違故坐人亦須恣故他二界如客舊應不中說第三人者唯上二具非下三衆下衆雖可安居義通以非具修故不自恣具中通其三位僧是五人所收又所差人德具不具差之多少離合如上第四法者位分衆別衆法有二謂一白二廣略各一單白及有說恣之法如上明訖增上滅劫准類應知對僧恣中前法儀軌一同說戒問對僧說中即言見罪當悔對人心念乃云自恣清淨古舊解云僧自恣中舉治義具故云懺悔對人恣中舉雖義具論治不足為異前故但言情淨謂舉夷殘及大衆闌現無治義若望經蘭提等亦應言悔濫對僧故但言清淨心念恣中既無舉義又治罪不備故言清淨謂唯得治心念之罪可呵已去即無治義如別行羯磨對人心念並無清淨之言理甚不足違律文故若行事時須依大本今解不能對僧恣中請舉見聞疑罪既請他舉故言若見當懺對首心念本不求舉直欲表己無纍應他僧法故言清淨不云懺悔次辨如非文中五句初句若有五人一人受欲次句若有四人不得受第五人欲此之兩句望人相似但初作句白差人自恣是非法別衆次句更互自恣是法別衆下之三句並法別衆次第十一與欲恣法文中有八第一與欲恣法替前說戒清淨第二爾時下重明失恣第三爾時下難開不失第四諸比丘下受人多少第五年少下教詔恣法第六若比丘下轉與恣法第七彼比丘下事訖往不第八時六群下制往坐說初文與法一同說戒成立進不並如上明文中至僧有如是事起者舊解云前言舉者謂先得三舉治人今言如是事起者謂先有三舉之病未得行罰因僧集次尋為加治故言如是事起欲雖未說以在此人心中故今舉法得成欲雖到僧處同能以人此得舉法故無有傳信之義故使自恣不成更須取自恣前雖未說以此人未得法故無失自恣分齊故不類此又前說戒者被清淨人非行治法故無如是事起若或有者釋同於此今詳文意或謂不能文中廣列不成持已次云若在道中若至僧中有如是事起明並屬前此不成持非直病人所有至中道僧中有者亦不成持故此三位同於說戒前說戒中云若至中道僧中亦如是此無亦如是言乃云有如是事起次始別云若僧為作不見等此不見等文中重舉如前不成持中已有命過等次下更云命過休道戒場明相出豈非是重此重既不生疑舉重何須苦責餘文可解唯第八文有二對六句謂不往不坐不說名為自他故成六句次第十二略恣法此中文二初舉八難及事為略之緣第二諸比丘下對緣彰法就中文有七句初一廣恣以難遠故次五略恣以漸近故後一難逼直爾散去就五略中前之二略五德自量不改衆法下之三略事須改法若不作白衆不委知此改衆白或是上座或秉法人作既是略法不得差人先作自恣和衆白已次作改衆略恣之白兩兩相對三說自恣若難漸逼再一同前次第十三遮恣之法文中有七一出所遮之罪第二爾時下所遮之諍第三自恣時下約人成不第四若遮無根下對根成不第五未說三語下辨遮時節第六遮自恣人下治能所遮虛實之罪第七爾時自恣日下劫遮方法初文為罪故遮治已自恣殘罪雖治客有餘化故言與䨱等己應自恣亦可與此人別住已餘人自恣次為諍文二初對輕諍治已自恣謂約讚食指授食以興其諍次對重諍未可即殄故言不應即恣應小停自恣謂約盜取常住現前物以興其諍次約人如文次約根者文中六句初三五不成以無根故二四六成遮以有根故初句不作故不成但不作有兩一不作有餘謂殘等是二不作無餘謂是夷罪即初三五第二句但言作作有其兩一作有餘二作無餘即二四六次約時中但據不改衆儀故言一再亦如是改衆三略無有遮事次治罪文二初治能遮謗罪次若遮自恣人下治所遮實罪前文有四初捨能遮三業淨穢二若遮下撿事虗實三復應下撿根有無若遮下正治謗罪問此治為是五德為是餘僧答此是餘僧舉罪以不實故治五德先以差訖不應始撿淨穢又若唯五德者何以病無病等能雖餘人要語五德故文語云待差各如法說次治實罪如文前治罪者是先知犯今所治者舉得新罪次劫遮文四初為病劫文互三句第二爾時下增益自恣為貪修道此彼相得恣以夏分為限故但一月第三爾時下减劫自恣為避惡比丘恐有破僧事起先作減日如文次作僧上二劫亦以夏分為限不作三劫說戒對此故亦有二第四爾時下文互三句不聽以前要而舉他罪次第十四十五十六並與說戒文同不繁更釋次第十七自恣即是說戒不應恣已更說欲明恣說二法不並上來自恣法竟次四揵度彰行資緣資中革履下用是故先明有毛為皮無毛為革廣明皮革應不應義聚在一處稱云揵度於中文六第一舉人開著革履第二爾時大迦旃下開聽五事第三爾時得被補下雜明應不第四爾時舍衛下不聽畜跋第五爾時世尊下制相恭敬第六爾時佛在下又明雜行初文有九第一值佛得道第二爾時下厭俗出家第三爾時守籠下施食修乞第四爾時守籠下修不列證第五爾時世尊下說喻調策第六爾時守籠下依策條證第七時守籠下證己說義第八去未久下大聖嘉讚第九爾時下開著革履初文五分二十一云有長者子名首樓那其人大富有二十億錢時人號曰首樓那二十億是人生便受樂手腳梯耎足下生毛佛語娑竭陀此二十億九十一劫來始今足蹈於地又問何緣如是佛言過去毗婆尸佛時設供緣繁不能具述於家敷六萬八千座一比丘坐一座各以五百釜美而供養之一一比丘施劫具二張革履一量復為四方僧作一房地敷臥具皆悉妙好從是已後受天上人中福等無有異祇十大同不能具録餘文可知次第七文但說證義不言自得文三初往次說後辭說中文二初序次頌序中文三初舉無學所得二脫第二世尊頗有下舉彼二脫能得之因第三彼盡欲下舉根對境驗得不虗初文復三謂舉釋結釋中論其所得理實無量且隨願情彰此六句此中樂於寂靜是定解脫餘之五句是慧解脫解脫絶縛稱為出離聖情所欣名之為樂樂不嗔等者恆以三善居心樂盡陰者不受後有又此六句下諸文中互有闕少及有不次辨其因信是行故本須先明依信起行故次持戒持戒行成必須斷利利開漏源戒防制文中皆言不應作如是意者以已解心自除疑倒次根境相對文中有三謂法喻合一一廣明眼根餘根類易法說文三初舉能證之人彼盡脫欲等是慧解脫如是下是心解脫此文脫字義似不同准下合中應云心解脫盡於有漏亦可長聲云心解脫有漏亦得體據實理應云諸漏直言有漏義亦不周亦可此之有言通於三漏即是有彼漏故名為有漏次根境相對故曰眼見多色次舉二脫之人不為色染二脫絶縛稱俱不染又不與色雜住禪無患次喻亦三初喻所證果智堅牢起諸學表如大石山證法冥體故全一段二脫具足故曰不缺見修或盡稱云無孔對境絶貪名為不漏次東方下喻根對境次喻不染此山不移是不染不離不可傾動是第四禪次合亦三可知次頌文三初一偈半頌前無學所得次有半偈頌前得因次有三偈頌前根境相對此中復三初行頌法次半頌喻次一行半頌合此頌不盡亦不次第雖有左右據位如是次讚如文次開文言捨五象王者見論十七云一文象有六母象名為象王如是有五象王尚捨出家豈貪一重革履而獨著耶次請五事文二初記得道如上次請五事僧祇二十三云若語阿難敷牀蓐者當知與世尊同房宿若語尊者陀驃子者當知隨次與房言十六句義者謂四諦各四苦非常等問此億耳比丘為佛說法佛亦受弟子法供養耶答曰無也所以爾者佛於諸法已得究竟不復從他受學法故無有能為世尊說法今生甚深善功覺慧爾者所以世尊歎彼善能說法了了可解婆沙三十復云善哉善哉汝乃能以和雅清妙明了易解美高音聲誦持正法令我歎答世尊欲令聞俱胝耳得無畏故如作是說非佛作彼受法供養彼承親教迦多衍那來詣佛所請求五事世尊威重釋梵護世尚不能側近正觀况彼敢申請佛知是事告阿難曰汝可將彼至我寢室敷設臥具而安置之阿難如教佛與同止至後夜分知彼倦息便告之言汝應為我誦所解法聞俱胝耳以三契聲誦所解法世尊歡喜為欲令彼得無所畏能申所請是故讚言善哉善哉乃至廣說次五事者受戒長衣通餘方得諸餘三事局濕婆國此中受戒經歷三年五分六歲母經十二年乃得次明應不在白衣家聽坐高牀皮牀及與上座同牀坐多論第四云與女人同牀坐吉同席同蓐亦爾長牀相接但異席蓐盤令中間空絶𮕾蓐各異得坐伽論地敷蓐得與未受戒人坐迦羅富羅革屣者見論是漫跟革屣此律有㓨腳緣聽著次下文腳跟破亦聽著鹿角革屣刻皮作鹿角形阿羅梨以鳥毛安革屣邊富羅跋陀羅者以木綿及諸雜物與皮合縫使中央起真誓梨者以漏革作編邊者以孔尾編邊五分二十一云得新革屣應令淨人著行七步體後著之多論第八云若得革屣新鞾應令白衣著行五六七步即是作淨又五分聽著富羅作𩍓大深俗譏如靴佛言不應深作𩍓聽至踝上又作𩍓如靴居士譏哥佛言開前又有諸比丘得種種形色種種皮革屣不敢取白佛佛言除人馬象皮餘聽壞本形色若形色不可壞於僧坊內著不得出外三千云不得著白屣入衆餘文可解上來皮革法竟次衣揵度外禦寒醜名之為衣廣明應不稱云揵度大文分二初對上品人遣著糞掃衣第二爾時世尊下開受施衣初文復二第一五人請持何衣佛言糞掃衣及十種衣染作袈裟色持第二爾時比丘下明糞掃衣此衣體賤離自貪著又復不為王賤所侵常有資身長道之益故十住婆沙十二云著糞掃衣有十種利一不以衣故與在家者和合二不以衣故現乞衣相三亦不方便說得衣相四不以衣故四方求索五若不得衣亦不憂六得亦不喜七賤物易得無有過患八順行初受四依法九入在粗衣數中十不為人所貪著次明受施分法作用如非先總解義三門分別第一定時非時第二時與非時各有現前僧得第三分攝儀軌初定時者謂請比丘一夏供養以此夏勞施者即名為時如毗蘭若請者是雖為安居故施要須局在一月五月內得乃名為時以此元為夏勞故開若反前說並名非時故下文云為欲施塔乃至若為亡人作會等諸比丘留至夏安居比丘往白佛佛言不應留此是非時衣現前僧應分問如開一月五月亦為夏勞如何此中得施不名為時答此開比丘受五利時不是為受施故名之為時第二門與非時各有二種言時施二者一時現前本為夏勞而數人施者是如文爾時衆僧得夏安居衣僧破為二部佛言應數人多少分又如毗蘭若婆羅門以三衣奉佛僧與兩端㲲明知為夏數人即是時現前攝二者時僧得施還為夏勞故施名之為時心遍僧田不簡彼此稱云僧得如文佛言若有一比丘安居大得僧夏安居衣物彼比丘應作心念言此是我物又云爾時有比丘未分夏衣便去後比丘分夏衣不取去者分佛言成分應相待亦應屬授等三句是次非時二者一非時現前謂心標別人物有限隨人准物等分者是如文初聽受施不知云何白佛佛言當數人多少若十人為十分乃至百人為百分分衣時好惡相參當擲籌分二者非時僧得以心普及一切僧田既無限局名為僧得如文比丘分衣時有客比丘數數來分衣疲極應差一人令分白二羯磨第三門分攝者此之四施二種現前並數人分不須作法二種僧得心該彼此以不定故加法定之又舊釋云非時僧得不定者一時不定除時施二處不定異界得施三人不定簡二現前四法不定異同羯磨為期不定作法以定時僧得者以時勞定故並數人分問若言須作法分者所以得屬授取耶頗有要須作法而不及法得屬取者用此法何為故定不爾心雖普及施主得僧田之福為止貪故不聽異處受衣以佛定制局處取故不假作法但須消去一比丘心念受文者非心念法謂興念屬己可知今解不依施主本心通說一切如何此處之僧獨攝斯物又與非時僧得何殊不念作法又不作法者如文未分夏衣便去後分不取去者分此則物屬人定如何佛制成分既制成分明知有法又文云一人得夏衣佛言應作心念言此是我物既一人心念明知二人已上作對首等法又五分二十云時舍利弗目連自恣竟於左右遊行同安居及近住處諸比丘多有隨從諸白衣見人人各念當為舍利目連施僧安居衣即便施之大有所得彼得施處諸比丘語舍利目連言共分此衣答言我等不同安居正可得食無此衣分以是白佛佛言應盡共分問既須作法及法方得如何身不及法開聽屬取答若望局法為正理無屬授取義但於此處有安居勞不同外界之人故聽屬取體文此處安居不應餘處受衣者此是時現前非是時僧得體欲細解四施分法一一須作三門分別言三門者一一部攝法二二部攝法三耶正攝法四施各三總有十二門分別此中二現三門並數人分若其施主清耶正僧對面行施應問施主隨彼施主所說處與若言不知俱與亦數人分第三時僧得施初一部分者如文未分夏衣便去三句及一比丘應作心念言文第二二部攝者應須分為二分以其二衆不合同法各持己分將至本處鳴鐘集衆作法以分或若僧尼互有𨷂者准五分文許令互攝互攝既定還須作法第三耶正攝者如文處分非時僧得有其六句初三分為二分非時既爾時僧亦體亦可此文通簡時非時施第四非時僧得施初一部攝須作法定法有心念對首羯磨此三至文廣攝第二二部攝者亦須分為二分還以二衆不合同法如文七句其中五句分為二分四七二句是互攝法又五分二十云若有比丘住處非安居時得施僧物若無比丘比丘尼應分若有比丘尼住處非安居時得施比丘尼僧衣若無比丘尼比丘應分安居時得施皆亦如是上來互入既定各及法者得第三耶正者文有六句初三對僧後三約別既是僧物分須有法耶正兩部不合同法既不同法分為二分各至本處作法分之次下釋文大開為十第一非時現前施第二爾時世尊下作衣儀軌第三爾時有住處下非時僧得施第四時有病比丘下雜明應不第五爾時有比丘在異住處下時現前施第六爾時有比丘未分下時僧得施第七爾時諸比丘下耶正攝法第八爾時有一居士下總明八施第九爾時諸比丘下淨施方法第十爾時比丘下受成不初文分二第一耆婆奉衣因請開施第二時世尊以此下開聽受施前文有五一明耆婆醫道成就第二時耆婆下六種治病第三時耆婆童子下將衣奉佛請聽比丘受施第四爾時世尊下佛為納受第五耆婆下遂請還退次開受施文中有二初文雖聽受施仍兼糞掃但糞掃衣者知是行勝檀越施者自他並利次正受施示其分法以數人分故是非時現前次明第二作衣儀軌衣是三衣先解其義六門分別第一制意第二釋名第三作之如非第四受授軌則第五行護方法第六補染應不初制意者此是三除諸佛應法之服故文言過去未來佛弟子著此三衣亦爾又以禦寒故聽畜著如文世尊初夜在露地坐著一衣至中夜覺身寒即著第二衣至後夜覺身寒著第三衣時世尊作念當來善男子不忍寒者聽畜三衣足智論六十七白衣求樂故多畜種種衣或有外道苦行故裸形無恥是故佛弟子捨二邊處中多論第四五意一以除寒故二以除慚愧故三入聚落故制三衣一衣不中入聚落四為生前人歡喜心故五為威儀清淨故制三衣一衣威儀不清淨若比丘尼欲留二衣亦不同所以制五衣者為威儀故三衣不成威儀餘如前說次釋名者所以有此三名差別者多論云欲現未曾有法故一切九十六種盡無此三名以異外道故作此差別體僧伽梨等梵音此無正名相及若從義譯僧伽是衆梨名為伏謂是伏衆衣以著僧伽梨能伏一切諸外道衆是故令著僧伽梨或名重衣以重數多故或名雜碎衣以修數多故或若從用名入王宮聚落衣如文入聚落者有五事因緣留僧伽梨多羅僧義云上衣次在五條上著亦名中價衣從用即是入衆衣安多會是下著衣以著最近身故從用即是道行作務衣新名僧伽胝嗢怛羅僧伽安怛婆次儀軌有四一體二作三量四色三衣成受須具四如四如若虧加法不就於中先明體如體如復四一者體如謂絶衣等十種衣故上離衣戒云衣者十種准此即非外道等衣如文比丘著草衣樹皮衣樹葉衣珠瓔珞衣外道皮衣鷲毛衣佛言此是外道法不應著若著如法治通明應法是十種衣體論清淨要須氈布以諸繒帛皆損生命是以佛初入道身著粗布伽梨二是真文如紬絶絹布等雖是十種衣綺文者不得謂綾羅錦繡故文言不得著繡手衣錦衣應染作袈裟色著五分二十不得作斑劫月衣及不應著斑色線織衣不應以雜色線縫著衣上作條幅三須密緻雖是直文輕薄生疏不得謂輕薄紗絹孝布等不成故僧祇二十八不聽生疏又二十一云若作安陀會當用緻物作若疏者當兩重三重作多羅僧亦爾僧伽梨直云當用緻物作四須清淨衣雖密緻有過者不得謂非犯捨販賣回等故下文言尼薩耆衣若不捨不應受用作三衣准此求時亦須應法謂離耶命發相等次作如亦四第一割截不截若論下衣俱得上二必須割截五分二十云長老柯休得一衣少不足作割截三衣佛言聽作割截上二衣縵安陀會若言帖葉三衣俱得故文言世尊見有比丘舒僧伽梨在地欲安葉語言汝何故舒衣在地比丘言欲使表裏相著外有葉現佛讚聽許又云衣少欲作帖葉衣白佛佛言聽作十誦五十九云若比丘貧少衣不能得割截衣應衣上安帖若五若七乃至十五若過十五若能得應割截作三衣二橫竪葉者此文不知當作幾條衣佛言應五不應六乃至應十九條不應二十若能過是條數應畜體不論橫祇律二十八有比丘作衣橫葉相當佛言不聽五條應一長一短七條乃至十三條兩長一短十五條三長一短多論第四僧伽梨有上中下此三中復有上中下下中三者九條十一十三中中三者十五十七十九上中三者二十一二十三二十五下者兩長一短中者三長一短上者四長一短五分佛言若不足應三長一短若復不足聽兩長一短若復不足聽一長一短若復不足聽帖作葉准此即有四長一短三重數者此文新衣一重下二衣二重僧伽梨若是故衣二重下二衣四重僧伽梨若糞掃衣隨意多少重數多論第四若新僧伽梨極上三重一重新二重故若純新作衣伽梨二重尼師檀亦爾下二衣一重若故衣者極多四重僧伽梨尼師檀亦爾二重下二衣十誦大同不能具述四縫㓨方法條數雖復應法仍須四周安緣及帖鉤紉如功德衣法具明又須帖角故與尼作衣戒云下至舒張角頭安帖又三千云三衣要須帖四角又須却㓨不得直縫故十誦十五制令却㓨直縫所以不得者以是世人衣法故却㓨異俗又葉邊速破塵垢入內者聽葉作鳥足縫若編葉邊若作馬齒縫然文編及二縫並葉邊作比見梵裳鳥足縫者乃大縫曲㓨馬齒縫者始葉邊堅為准文鳥足縫不合大縫上作又此大縫不合像鳥足作若像鳥足得何故見論第九若作袈裟不得縫作蜈蚣腳不得繡作文章不得作鎖形縫可却㓨縫若安鉤紐五分第二十云有諸比丘深縵衣作條又有縫葉著衣或褶作衣葉或半上向半下向作葉佛言不應爾並犯吉羅阿難教比丘左條葉左靡右條葉右靡中條葉兩向靡作竟著之極是所宜祇律又云有比丘作衣盡作葉佛言不聽盡作葉有比丘疊作葉佛言不聽疊作葉應割截有比丘對頭縫佛言不聽對頭縫應作葉極廣齊四指極狹如麥復有比丘一向作葉佛言不聽應兩向復有比丘作衣縫葉與衣相著佛言不聽復衣宣脫佛言應作馬齒縫又文云患風吹割截衣隨肩佛言聽肩頭安鉤紐僧祇三十一若衣無紉著入聚落越毗尼罪若入家家隨入得越若有而不著亦越若入尼精舍外道精舍若檀越唱言隨所安者無罪十誦三十八爾時佛自施䩙紉前去緣四指施鉤後八指施紉語諸比丘應如是作比作衣者前八後四為威儀齊整不名違教次量如者文中彼受小小衣當三衣佛言聽以長四肘廣二肘廣衣作安陀會廣三肘長五肘作上二衣多論正衣量三肘五肘若極長六肘廣三肘半若極下長四肘廣二肘半若過若减得成受持以可延促故不同其鉢過減不成以無截續義故次色如者謂青黑木蘭青者銅青黑者雜泥木蘭者諸果木汁下有染法多論第八有五大色黃赤青黑白黃有金根黃藍染赤者羊草落沙染青者或言藍黛是或言其流非即是也凡此五大色若自染吉羅若作衣不成受若作應量不應量衣一切不得著若先得五大色衣後更改作如法色則成受持若先作如法色後以五大色壞者不成受持雖不成受若作三點淨者得五分二十有一比丘白佛言願聽我等著純青黃赤白黑色衣佛言純黑色衣産母所著犯者逸提餘四吉羅又著雜色衣佛言不應爾犯吉次受持者出家所為皆資以法凡所受畜並有軌儀以其服著無法便有𨷂衣之𠎝理須順教受持令無罪咎文中但有受捨之言而無受捨詞句此既無文須依他部作法十誦二十一不分截不截異總云若割截若未割截是衣持四十五分別受云我某甲是衣僧伽梨若干條受若干長短割截衣持三說下之二衣以條數定文中直云兩長一短及一長一短若不截者應云是僧伽梨縵衣受持三說下二衣亦爾尼受下二衣云是衣覆肩衣受長四肘廣二肘半是覆肩衣持三說厥修羅衣云是衣厥修羅衣受長四肘廣二肘半是衣厥修羅衣持三說捨時應制受云是衣僧伽梨塔絛受若干長若干短割次行護者下文三衣鉢如鳥二截衣持今捨三說餘衣捨法同此翼羽酬身俱十誦二十七云所之處與衣鉢俱無所領戀譬如鳥飛與毛羽俱飛在空中比丘亦如是從今日不持三衣不應入聚落俗人家若入得突吉羅罪又四十一云從今不得著僧伽梨輦石泥草泥塗壁等掃灑僧坊塗地不得腳躡敷坐臥上及襯身看看僧伽梨如著僧伽梨法下二衣亦爾又下文大同加當護衣如自服次補洗者若依此文破不失受故一月衣戒云有僧伽梨故爛弊壞但任受持不堪著用又多論第四三衣若破不問孔大小但使緣不斷絶故戒受持若衣破補必須却㓨故十誦十五云補衣皆應却㓨若直縫者衣主命過應摘此直縫與僧乃以此衣與看病人若是長財先雖說淨後若作衣受持則失淨法此衣後捨應更說淨若其失色及更增色並不失受多論若衣久故失色不失受持又云後更上色亦不失受次下釋文文中有八第一示阿難田令倣成衣此中有四一示田令倣二時阿難下奉命教作三爾時下佛讚阿難舉同過未三際俱然令生欽重四從今日下聽割截作第二諸比丘下明其條數第三時比丘下帶衣之法第四爾時舍利下制鉤紉法第五爾時世尊在王舍下制衣頭數此中復四一見持衣過失念許制限二爾時下受菴婆園施五分二十佛言但以施僧我在僧數奈女受教即以施僧三爾時下託處生念四夜過下告衆立制第六爾時異住處下明雜應不第七時世尊在波羅下制衣量數第八爾時世尊下復明應不此中復四一有三句明畜應不二爾時下上衣不得下用三爾時比丘下有十事白衣法不得用四時諸比丘下有十事外道法不得用次第三明非時僧得施文中有四第一僧得施法第二爾時世尊在舍衛下二部現前顯前僧得第三諸比丘作如是念下料簡有過等人應與不與第四爾時佛在舍衛下看病賞勞問債等法前文有二第一一部攝法第二爾時有異住下二部攝法前文復二初檀越物以明僧得二爾時舍衛下亡比丘物義同僧得前文有三第一舉其初緣數人擲籌分法第二比丘分衣時下作羯磨等法分第三爾時有住處下分受成不前文復三第一受施聽分第二復不知下示擲籌法第三時分物時下明有客來應不八句前四應與以未竟故此中二三兩句但是形前對復有少差別不是全異後四不應與以並竟故若有二人已上故有擲籌之名為有一人故作歡喜受分之稱非謂初緣作心念法若有餘更分竟來不合與分若不竟來即合與分次句亦爾次作羯磨等法文二初舉緣示法婆輸等衣錯來故也次明三法分攝儀軌就僧法中有兩白二一差人白二文中直言應持等舉付分法略無差又准下人白二五分十誦具有文差分粥人等中亦有分衣之言又沓婆知僧事亦有白二差法第二付分白二文中言倒故言應持等若順應言白二持與衣一比丘令分體是付分法又分亡人衣注中即前文是文言僧今與某甲比丘者以付別人四方無分彼當與云僧中羯磨差一人分此非正文僧者遮入別人還令與衆故十誦二十八云若是比丘得僧羯磨與衣取不肯還如是言實布施善與善取法善斷事皆出僧中何以還索佛言是比丘應如是教是布施為清淨故施還者善若不還應強奪取教作吉懺既付物已隨彼處分即是分法不勞更作羯磨體有立義云彼所差人復須更作分物白二既是僧物不合輒分是以文言應持衣與一比丘令白二羯磨分今解不體但是舉前白二持衣與一比丘彼所差人直分不勞秉法若五人已上具此二法或但四人不成差付以所差付不定僧數衆僧直須作羯磨攝羯磨應云大德僧聽此住處若衣若非衣現前僧應分若僧時到僧忍聽今現前僧分衣物白如是羯磨准白成就所以知者如母經第八有四相應法五人共住一人終亡四人作羯磨分之此文不言展轉施一人五相應法者五人羯磨分亡比丘物四人羯磨施一人一人還施僧體後得共分之既至五人方有轉施之言故知五人已上作其二法沙彌使人身雖不預法限但令作法之時身在界者即當及法亦得其分次對首三語法作法應云二長老憶念此住處若衣若非衣現前僧應分此處無僧此是我等分三說但以別人秉法弱故故須各各自申攝意如說戒自恣申情亦體又以文言彼此共三語受共分不同舊云此文既不言各各三語受故但一人作法時言此是我等分者即是等分不勞互作不同說恣各表行淨此釋不然母經皆有展轉相語言又十誦二十八有彼此作法文不能具録次心念法者應言此住處若衣若非衣現前僧應分此處無僧此是我分三說次成不文有十二句初六對僧羯磨成不下六約三語心念成不亦可前六約羯磨對首分成不成以二三人亦須分故次六約心念受成不成以獨一人直受不分於二六中各前三不成下三成就又於四箇三中各前二犯第三不犯次明亡比丘物義同非時僧施先解其義准文上下攝法有五一一和衆攝二耶正攝法三負債死法四被舉死法五無住處死法下四門義並隨文釋以皆有文對解義便初門義二有具不具沙彌死者此律無文五分二十同具處分文言有一沙彌命過諸比丘不知云何處分其物以是白佛佛言若生時已與人應與之若生時不已與人現前僧應分十誦大同僧祇三十一有沙彌無常諸比丘問佛此衣鉢物應屬誰佛言屬和上准義令和上處分與僧和上不得攝將入己次具之中有淨不淨不淨有三一犯重死犯重有三一未得𢷤理同常制二已得擯入親里白衣三學沙彌十律二十八當死時現前僧應分衣鉢物二呵責等四罪處所及別住等同清淨判三被舉死如下文說次清淨死應為四門一定同生共活二定重輕差別三明看病賞勞四辨屬授成不此下三門亦隨文釋先同生者若本心要一事已上無問多少悉共同者作要已後若死休道應准人物等分入僧若違要者計直犯罪若非同生假稱同者隨其得物亦計直犯又師無意給弟子物已與者得未與者屬僧次定重輕於中文義合三一列十三章制入僧意二須簡定重輕二門三隨文別釋合分不合初十三章謂僧伽藍乃至多衣鉢尼師檀等所以入僧者凡預出家行同水乳齊策三業等條六和既生所作僧法以收故使終亡物還入衆縱施佛法比丘無分乃至王臣親屬皆亦如是道俗差別分位不同得不相由死不入彼故曰多知識無知識一切屬僧次定輕重位且為三一佛制畜物如三衣等類二不聽畜物如田宅園林奴婢等類三聽畜物如長衣鉢寶藥等類此三物中第一入輕資道要故第二入重妨道深故此即勒為輕重二門第三物中分為三別一性輕重二事輕重三從用輕重言性輕者謂十種衣及衣縷等以所成衣既是輕限能成之縷何以入重言性重者謂諸錢寶食藥染具釜鑊瓶分凡十六枚等言事輕者一切隨身裙衫等類言事重者如大氈蓐大帳小帳步障機扇等言從用輕者如衣箱鉢函針剃刀等言從用重者如戶簾牀帷幄帳案癿車輿篦簾幔幕等今以性事從用三輕之物攝入初類門以收性事從用三重之物收入第二重門所攝次第三隨文別釋於前十三章中束成九位初六二二合以為三九與十合餘五還五故總作此九門判之初門入重更無別義第二門屬別房物者謂房中校具簾障等物或著捨物為己造房房未及成而主死者其物有變未變此皆據現輕重處分以物及房皆屬比丘不同捨與佛法別人以物別屬即入彼故第三門瓶貧牙角器等十誦皆有量數此不同彼一切入重種種重物者謂几案藥草染汁木石等第四門並重皮革法云錦蓐雜色臥具氍毹若獺毛用貯蓐佛言不應第五門伊梨延陀傳言步障或應是鹿王皮耄羅者小帳耄耄羅大帳或是𣰅㲪之類氍𣰅者謂是純色堪應法服是以聽分氈被亦體其有輕薄堪褶疊披者縱使過量亦得入輕不同五分氈總入重被咸可分第六門藍人入重所有私物入彼私用死入親屬若無親屬僧用亦得母經第三云若有奴婢應放令去若不放應使作僧祈淨人駝馬牛驢與寺中常住僧運致第七門水瓶澡罐十誦有量數准此一切入重不簡多少大小第八門鐵等五作器應分二類一能成器並須入重二所成器有可分者謂剃刀鉢針及針筒體既針筒應分刀函類爾其有刀子翦刀母經第三言是可分十誦五分伽論亦爾香爐有處分與能供養者不體十誦云鐵銅石瓦具皆聽分母經第三亦言香爐可分又伽論輕物可分中亦有香爐香匕香器其文既體理難違越唯有定供養佛不轉易者此定屬佛不合輒分香爐既體隨物亦爾其文又云復有所不應分物何者孝在時所有經律應分處與能讀誦者若不及分處現前僧應與能讀誦者此物不可分賣經律既爾章疏函癿亦體經架不定本定屬經者隨經若屬人者即合入重第九門並以應法咸總入輕其漉水囊資道中要理合入輕十誦賞看病人祇律聽分革屣故知鞾屣鞋等並然鉢既可分次鉢鍵𨩲匙箸等類爾此文聽分俱夜羅器者即鍵𨩲之類此等並舉要略而未具委次二部攝法以前一部攝中有檀越及亡人物今二部中同前亦爾初檀越物處分如上次亡人物為有信人方能賞録恐失僧物故五衆先來者與古舊釋云無問重輕悉入先來但輕不待法即入其人重者非屬人物故隨先來者處分還入常住准依此義故亡人物亦同檀越所但以俗人不知施得有二部攝法令解不然此是無住處攝法二衆既不等分故非二部攝法內法恐失僧物遣付先來先來得已應須勘問若是比丘物知本寺者送之不知處者入近僧寺尼死亦爾但是恐失僧物令付先來不是先來為合得與若是先來即合得者重亦應入何唯獨輕又若取者要須加法既是僧物如何輒入若無來者送與近處但取最近不簡僧尼近處雖得亦未即入要須撿物如前處分故十誦五十七一比丘死是死比丘以衣鉢物寄比丘尼精舍不知云何白佛佛言若比丘死前寄比丘尼衣鉢物現前比丘僧應分尼寄比丘物亦爾以其二衆知法不同俗處是以遣還本處同類分之互寄既爾互債亦體又准五分第二十僧尼亦有互攝法文云若有比丘住處非安居時比丘命過無比丘比丘尼應分若有比丘尼住虗非安居時比丘尼命過無比丘尼比丘應分安居時得施皆亦如是次第二現前施文三一告靜三月比丘立制十誦第五欲制諸比丘多畜衣故語言我欲四月燕坐令諸比丘不得來至我所除送食比丘及布薩諸比丘立制已白佛非此二人往者提制制亦可之婆沙二十六佛告苾芻吾欲兩月宴坐汝等不須集問唯除送食布灑他時於時世尊入室宴坐問世尊何故久宴坐耶答去來諸佛過殑伽沙法爾皆應如是宴坐有說欲為諸天說密法故有說為斷慢緩苾芻心故有說欲為他界有情說妙法故多解云云不能具述大德說曰由二因緣如來經於兩月宴坐一者自受大法樂故二者哀愍諸有情故第二爾時長老下識佛意故禮覲讚歎第三爾時諸比丘下為欲行同捨衣行施為文遣與比丘尼非衣是以名作二部現前施其中雖亦通佛及塔僧是主故具約僧說次第三料簡應與不者文中有二初對七衆與應不應第二舍利弗下明取應不初文別住等人與清淨同次七羯磨以過重故不自手與次白衣計功酬直次沙彌僧若和者應等與分次與半次三分外與一分故十誦二十七云諸比丘如是思惟佛言應與不知與幾許白佛佛言諸沙彌若立若坐若次第諸檀越手自布施多少屬沙彌若諸檀越不分別與作四分第四分與沙彌若不肯者不應分雖是僧物具不位別學沙彌十誦五十三與大比丘等分次僧伽藍人雖可非僧於僧有勞故亦須與道俗位別復異沙彌故四分外與一分不與不應分次父母恩重故聽許次借他衣五分二十一目連白佛願佛聽我化作鐵籠籠彼大城佛告目連汝雖有神力何能改此定報因緣佛說琉璃王却後七日當受害學人罪其眷屬大小亦復并命王聞心念佛無空言餘苦尚可唯畏火燒即與眷屬乘船入河七日期至水忽瀑張於是覆沒一時死盡次取他衣要具七法是大親及七法不足取助身衣不嗔者是小親友故言不應取次第四賞勞等法文分為七第一賞勞分法第二爾時舍衛下示應與衣第三佛聽與下明德具不第四若病人下屬授成不第五彼病比丘下重明賞物第六爾時衛下負債死法第七聽瞻病人下問委二日法對初文中解賞勞義五門分別第一須賞之意第二所賞之人第三約德應不第四所賞之物第五賞分儀軌初門賞意者彼看病人懷慈愍物晝夜恭勤不辭勞倦又奉聖教瞻視病人既是有功寧容不賞故僧祇三十一看病比丘恨言我不避寒暑執衆苦事求索湯藥乃至除大小便器其實如是是雜得言衆僧得耶比丘白佛佛言看病甚苦應與三衣鉢及所受殘藥十誦二十八云衣鉢僧分竟問誰者是病比丘有比丘言我僧言擔是死人去比丘言大德我非旃陀羅非白癩病衣鉢僧分我何以擔死人去是人活時恭敬愛念我我已報竟是死人誰欲得者便擔去是諸比丘以事白佛佛言應先與者病比丘六物餘輕物僧應分第二門看病之人通於七衆若比丘死二衆得尼死三衆得以餘互看勞不滿故五分第二十云佛言若比丘命過應與二人衣比丘沙彌雖父母兄弟亦不應與若尼命過應與三人衣比丘尼式叉摩那沙彌尼有諸比丘分看病物與沙彌三分之一佛言應等與分十誦五十四白衣比丘尼看病不應與看病人物餘處安居人及前後安居者應與若沙彌看病大比丘等與第三門約德者德有其五如文僧祗三十一不應得者暫作差作樂福德作耶命作應得者佛言欲饒益故下至體一燈炷欲令病人除差應得若為病人求醫藥若為塔事僧事云應與十誦五十四看病人出界去病人命終言佛實為病故出應與為餘事故出不應與五分第二十云有諸看病人或為病人或為和行去後病人命過餘人得其衣鉢佛言不應趣與一人應與究竟看病者第四門約物五重一定物體十誦應與六物六物謂三衣鉢漉水囊尼師檀此文但言衣鉢座具針筒盛衣貯器亦有其六此六通尼五分但云三衣鉢僧祇更加所受殘藥二明有無隨有賞之若其無者無不可賞三就有中現與不現現者須賞或在餘寺即屬彼僧多論第四若比丘重縫三衣設有因緣擲分持行到於異處名不離衣宿比丘若死又云本界內羯磨此衣又云應與看病人以本是一衣同受持故律師云後是定義又云得羯磨法離衣宿此衣應與看病人以衣屬死比丘故四就現中持不持持者應與第五不知持不持者量三品看病賞三品衣第五門儀軌有四一分賞時物將欲作法衆僧先須處分重輕及應賞物分處之法如常應知二分賞處謂非尸前十誦二十八憍薩羅僧在死比丘前分衣鉢物是比丘動起語諸比丘諸大德上座莫分我衣鉢物比丘白佛佛言莫即於死尸前分若死尸已去若僧在異處應分母經第三云先將亡者去藏已僧還來到寺現前僧應集已取亡比丘物著僧前分處分體雖異處謂是大界內戒場是別行法處不應分物故五分二十一云有一住處僧得可分衣一比丘持至戒壇上獨取受持佛言不應爾犯吉現前僧應分若對三人已下處通自體三約人者謂僧衆多一人僧有二別謂四人五人四約法者若五人已上具行三法謂賞勞差人付分三箇白二若四人者直行一法如前已明對首心念義准應知若四人已下隨作攝物法意口和賞之義不違理次下釋文文中有二第一制看病法第二爾時有比丘下順教看病前文有二第一佛自看病立法第二爾時世尊下制看病法前文看病僧祇二十八世尊案行僧房見一病比丘臥糞穢中斷食七日世尊問有和上等不答無唯言孤苦欲為說衣阿難請置阿難為院世尊灌水乃至安置已說法得法眼淨此比丘為無師及同師同房世尊集衆語比丘言汝等各各異姓異家信家非家捨家出家皆同一姓沙門釋子不相看視誰當看者若比丘病和上等乃至同房應看不看者越毗尼若無僧應差看若不差者一切僧越佛語汝還看本比房病比丘去去佛不遠佛化作一病沙彌佛言汝通看是病沙彌此即是福罰汝看病進不如文中具問不能廣陳略引如此十誦聞法得羅漢制法文三第一制看病法悲心看病與立教心等故言欲供養我者當供養病人第二聽彼和上下辨七衆別第三病人有五事下明看難易次順教看病文三第一順教看病第二爾時比丘下為聖嘉讚第三彼持亡比丘下賞勞分法其文有三第一總舉屬僧故言僧應分第二爾時世尊下別示賞法第三子注下明分攝法初文可知賞勞文三初舉應與第二捨物付僧文據現有故言衣鉢等理而言之牒須稱事又以亡人物多不可一一題說准前僧得云若衣非衣無妨體有立義不隨有無簡別依文誦者法定不成第三僧中下作賞勞法法中牒物亦隨有無次分攝可知十誦正羯磨中有若衣非衣言理有對首心念無者略也次示應與之衣謂是常持者次約德如文及義次明屬據三門分別第一屬據差別第二善不善第三成不成初差別者分為四句且如人現物不現物現人不現人物俱不現此三不得即授故唯是屬若人物俱現如衣鉢等物堪移轉者即是授而不須屬又如奴婢田宅等不可移轉者須屬亦授即是亦屬亦授若非屬非授可知次善不善者屬與不屬俱道善不善且屬授中善不善者如有比丘自知貯積臨終慚愧破慳布施施三寶等名之為善如有比丘恐後僧得即便決心屬與親里此雖屬授名為不善不屬之中善不善者如念資生佛有威利入甚二僧利益最大我今但當奉順聖教自修行業名之為善若其生來多積衆物為病所苦欲修功德暫起捨心後還追吝恐後患除無物可用如是捨命是名不善次成不成者夫屬授者作決定心無變悔者皆得成就故僧祇三十一云若決定屬言我若死若活其心決定與者應與如是決意者成如有處分言我以爾許物造像營齊等用可速令造令我及見如此決心者皆成若言我此諸物死後造經像等如此屬授並不成就故言若我終後與若不死還我佛言不應如是與現應前僧分又五分二十一云有諸比丘未命過處分衣物言我死後以此衣物施某甲以此衣物作如是如是用佛言不應爾犯吉與不成與用不成用十誦三十九云有一病人語看病人言汝能好看我愛念我我若命終所有物盡當與汝語已便終僧集欲分看病人具陳病人言比丘白佛佛言無如是死當與法現物僧應分既云死後不成明知處分作墁墓衣衾等並不成就次重明賞物三句一受不好二送餘處三量品數次明負債釋處分法可為二門第一先明償債之法文言汝負誰謂若病人負三寶別人重輕物者隨有重輕各相當還無相當者互還亦得計理有債先還益亡者故還已有餘方依常法故言持長衣償若無賣三衣與第二明索債法文言誰負汝謂若佛法別人負亡者物俱應索取以合入僧若輕重相當者各隨其本縱互索得亦隨其本若常住僧負重即隨使入輕者須取入現前僧故十誦五十七云一比丘衣鉢物貸四方僧用是比丘死白佛佛言四方僧物計直還現前僧應分若現前僧負重輕物減須索取以重者入常住輕者加羯磨次問病人委二日如文次第四雜明應不既是雜法亦無次第隨情逐要應解者解次第五時現前施文中有二初文以是現前故須曰多處取若等各取半若時僧得即須及法不及法者理不合得舊解云此時僧得物故言取半若現前者隨施主心俱取無過此釋非理不繁須破食者隨施應食次始開受夏衣謂開過呵制理實此開應在前說次第六時僧得施文中有三初且衣食一對衣中三句初句開屬授次句縵屬次句受屬者忘並以作法分故身不在界成分由於此處有勞開聽屬取食亦隨施應食次舍利弗是非時現前施不應作時法攝次一比丘作心念攝明知有多須作對首羯磨次第七正耶攝法文中有二初有十句是非時僧施次有六句是時現前施前文有三初有六句檀越將物施僧次有三句約三人物後有一句清僧就家布施前文有二初三對僧次三約別或可此六通簡時非時施初三約物有得未得及得未得初句分為二分次句問施主後句同前二所以分為二分者以是僧物正耶俱有其分不可計現人分須作羯磨既作羯磨耶正互不相足故須分為二分各至本部作法及法者得如常所明次三僧先已破約物為三物既分為二分到耶部中自合得分故不與去人分理合更有三句從耶歸正應與來人分文無者略此之六句據正衆領物若耶衆領物應更有六初有三句如向初三復有三句如向後三次對亡人物初有二句物入耶部以其本心背正向耶故亦應更有二句從耶歸正物入正部文無者略又此直據隨身衣物自心歸背判入往處十誦二十八云佛言有受法比丘不受法比丘中住是受法比丘死遣使語衣鉢物持去受法諸比丘若取去善若不取應用治四方僧房臥具若不受法比丘於受法比丘衆死反說亦爾又有受法比丘擯一比丘到不受法比丘所言諸大德除我罪作清淨我當作不受法若未除罪而死受法諸比丘應還攝衣鉢若除罪而死衣鉢物屬不受法諸比丘有不受法諸比丘擯一比丘往受法所及說應知次被舉死隨所同羯磨舉僧者與謂同被舉人以得法後財法不同何因死後輒得攝物若爾一人被舉死當入誰解若一人被舉入彼能秉法僧但預秉法衆者即合得分故言隨所同羯磨舉僧應與即是賞彼功能僧故次對面施可知次時現前施初三對僧約物得未得等並以處勞定故數人分之次三約別亦以處勞定故並與去人分若據耶衆領物背耶歸正更有三句亦與去人分又以義推更合有六正耶互望不與來人此等並略次第八總明八施文分為三初總舉八且隨一方化儀彰其外施以境分心略標斯八割己惠他名三為施次列八施一比丘僧含其四種謂二現前兩種僧得二比丘尼僧亦四如上三二部僧亦合四種二現須數人兩僧各分半四四方僧謂常住四方義合一部二部若施二部應分二分五界內僧隨何界中當界內得以處定故數人分之六同羯磨僧但預羯磨者並合得分此亦義通一部二部既以局法為正並數人分七稱名字者題名別與八與一人直付者是三釋可解次第九淨施方法義如上解有作法者依此文誦次第十取受成不文中有二初對比丘次約白衣前文二十四句初十二句借衣前六物三不成取以作所借衣人親友意故次三成取以作能借衣人親友意故次六前三不成受以所與人非衣主故次三成受以能與人是衣主故後十二句遣衣與乞人初六前三不成以與乞屬彼故次三成取後六前三不成下三成故次居士物以捨心定故聽受用上來衣法竟次藥犍度為有療患之能名之為藥時等四藥集在一處攝云犍度此隱時等別名就通名藥大文分二初明其制第二爾時世尊下明開前文初明乞食即第二依俱跋陀羅飯者見論穄米飯條步者青豆羮吉羅羅者是竹箏次明腐爛即第四依其腐爛藥已如前辨次開四藥先解藥義四門分別第一釋名第二出體第三爾作淨法第四相和服義言釋名者通釋藥名已如前辨藥義不同有其四種言時等者從明相後至日午前是應食時名之為時聽此時中服者名為時藥從過午從至明相前非應食時名曰非時聽在非時分服故曰非時藥聖限七日服者名七日藥許盡形服故名盡形藥體盡形有三正取報形兼明藥病次出體者時體謂是五種蒲闍尼及五佉闍尼又文言得甘蔗佛言聽時食僧祇二十八云藥法者時根非時根者蕪菁根䓗根乃至藕根等如是等與食合者是名時根非時根者婆吒根畢鉢羅根尼俱律根等如是比不與食合者是名非時根如是莖皮葉華果亦復如是漿者時漿非時漿時漿者一切米汁粉汁乳酪漿是名時漿非時漿者一切豆及穀麥須頭不卓蘇油蜜石蜜是名非時漿若比丘病醫言與食便活不與便死者應淨洗器七遍非穀緻囊盛繫已器中煮令不破體後與飲又此文八種漿佛言聽非時飲問果體是時藥漿許非時飲飯亦是時收漿得非時飲答果中有義汁漿得非時飲飯為外水投漿亦時食攝爾者飯為外水投漿則時食攝果漿亦假水豈得非時收此難不體飯以水投為漿無水即非漿也果汁以水為淨無水亦自成漿又解但是五穀漿資強故不許果漿非穀引資弱故開聽是以見論十七云一切木果得作非時漿唯除七種穀不得又解凡食資身義微復無識過是則世尊開非時飲若資身強食招譏者是則世尊制之不許七日藥體如五種奢耶尼及五種脂僧祇第二云蘇等五種及五種脂此諸藥清淨無食氣一時頓受得七日服故名七日藥盡形藥者文言不任為食即一切辛醎苦等祇云呵梨勒阿摩勒胡椒畢鉢薑鹽等此諸藥無食氣頓受病比丘終身服是名終身藥次作淨者時藥淨法如文非時漿者必須證清水為淨為壞味貪然後得飲故十誦二十六云若蒲桃不作火淨若汁中不以水作淨若蒲桃作淨汁中不作淨若汁作淨蒲桃不作淨並不應飲若蒲桃作淨汁亦作淨應飲僧祇二十九云若持漿來者應作淨若器底有殘水即名作淨若天雨墮中即名作淨或漿不證清淨人欲去者當應即受作記識言是中淨物生我當受有因緣不得受復不記識停過須臾不得受以雜時食體故七日藥者亦須清淨與時食別水滴為淨然後食之故祇云若車載石蜜被雨者即名為淨若船載水羡若淨人洗手水羡總名為淨若雜時者亦須記識受持僧祇第十云比丘乞食時多得蘇少知識比丘即以細緻㲲淨漉取蘇得七日受若有事緣不得中前作當作是言此中淨物生我當作七日藥受若誤忘不受不作淨時過是名不淨若多得油及魚脂如蘇中說盡形壽藥義准應知僧祇第十云若比丘食上大得苷蔗食殘苲作漿得夜分受若飲不盡得前作石蜜七日受石蜜不盡燒作灰終身受若有事不得壓即中前應以水作淨當作是言此中有淨物生我當受次相和者但四藥相和皆從強服以石蜜中有罽尼佛言作法應爾以此類餘並皆如是多論第六據相助成云若以時藥終身藥助成七日藥作七日藥服無過以七日藥勢力多故又助成七日藥故如以蘇煮肉此蘇丸汁得作七日藥服或以時藥或七日藥以成終身藥作終身藥服無過或以終身藥或七日藥以成時藥作時藥服隨勢力多故相助成故若分數勢力等者隨名取定如石蜜丸雖勢力等以名定故七日藥服如五石散隨石作名作終身藥服此文相和據體強說若隨勢者如以毒物和餘藥者皆不住為食應作終身藥服
