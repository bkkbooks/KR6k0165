body:
  text: 西太原寺沙門懷素撰次明羯磨受戒文分為三第一彰無師弟過失第二比丘以緣白佛第三制立師弟攝養初文二過一為無師教授隨緣起非著衣不齊者謂作象鼻等乞食不如法者謂乖乞儀受不淨食者謂見聞殘等不淨鉢者不以澡豆等洗二無弟子瞻養師僧命終第二白佛如文第三立制文分為四第一制立師弟第二時諸比丘下師弟德行第三爾時佛在下簡所被人第四世尊有如是教下教僧授法初文復四第一立有師弟第二展轉下明立利益第三當如是下對益加請第四佛言下興教正攝初文和上者梵音或云和闍此曰力生此之翻對不詳所以或云優婆陀訶及修郁波第耶此等聲雖相近皆非正目正曰塢波提耶唐云依學或云親教言依學者有其二義一以學處依彼生故二以解行依彼修故言親教者以恆教授顯異餘師善見十七云和上者外國語漢言知有罪知無罪是名和上言弟子者得戒及修在我後故名弟即此戒等從我生故名子次利益者五分十六云從今以十利故聽諸比丘有和上和上自然生心愛念弟子如兒弟子自然生心敬重和上如父勤相教誡更相敬難則能增廣佛法使得久住是則以教誡故不壞法身相瞻養故不損道器故曰久住增益廣大次請文二一請師法二攝受法所以請法在僧中者今古釋云為彰見聞具故復有釋云欲使大衆墮其見聞簡擇沙彌非為量師以和上須乞度人羯磨今者思文撿義未必須在僧中以作此法攝成師弟成法元不由僧豈勞衆中加請又以加請法後始云自今已去等又下正授戒法中及尼受中並無請文雖下尼揵度式叉本法中有應求和上言然亦不言僧中加請又彼求和上已次始云式叉學戒已若年滿應與受大戒白四五分十六制立師弟共別行記比丘一二三歸及善來受佛言不應爾時諸比丘作是念但佛與比丘受戒我等亦得若得者應云何授以是白佛佛言今聽汝等與比丘受戒應作白四即教從僧乞乞已作白四亦無請文准斯文義決定應然理雖如是然准僧祇僧中加請行法亦好彼文第二十三云欲受具足人初入僧中一一頭面禮僧足已先求和上偏袒等三請俱舍亦云來入戒壇禮苾芻衆至誠發語請親教師十誦云欲受具人初來應教次第頭面一一執足禮僧禮已教受衣鉢受已應求和上既有請法理須許可若不印順請法不成次捨三語立白四法所以爾者以三語中未相攝受既無師弟彼此有失故立白四制相攝受欲使離過行成尅隆道法又母經第一有一病比丘無供養者病困篤已即便命終諸比丘等見此比丘困篤命終一無看病者二無弟子二俱無故苦惱如是往白世尊佛即集諸比丘僧從今已去斷三語羯磨於十僧中白四羯磨聽使受具於中文三初制立白四次對衆陳乞後正明與法秉法者既有差言計理不勞加請問若不加請豈成師耶答以差秉法即成闍梨或准餘文請亦非妨然行事者須知部別此初制立未有檢問說相等緣非謂略無次解師弟德行於中文二第一從初至五事失依止二師隨事攝受儀軌第二有五法下重明二師攝受之德前文有三第一至文同故不出相攝受法第二時諸弟子下呵責行法第三時有新受戒下依止失不前文有二初和上行次闍梨行和上行中復二初至如法治和上攝法第二和上於弟子所下弟子行法前文有三初簡小取大次簡愚取智後簡無行取有行此三文中各有其三謂起過呵責立制就後第三立制文中復分為三初對和上制法第二若弟子下列八行法第三自今下不行結罪其八行法第一弟子有過僧欲治罰當應求僧莫作若作勸令如法第二若僧已作法竟當須料理令僧疾解第三懺殘除其業纍且舉悔中重者為法非謂餘𠎝不須料理第四看病除其情惱第五移處以安其形第六除疑悔以法律第七捨耶近以真教第八將護當須二事詳其文意應為此八若合初二為七者非申意離合准義應知次明弟子行法於中文三謂起過呵責立制立制文二初對人制法次列共別兩行先明共行共行復二初列共行八法如上次不行者違而結犯次別行法亦二如前前列行中文分為三初明白事方法年少比丘不了行相隨所為作皆須白師故十誦五十八云一切所作皆應白除大小便嚙齒木禮佛法僧五分十六云凡有所作乃至剃頭若為人剃皆應白唯除大小便及用楊枝僧祇二十五隨所作事乃至浣染剃髮皆應白師問齊幾許得不白取與半條綖半食是名不白取與若出僧伽藍門過二十五肘應白而去若經行若坐禪應白令知處所伽論第六佛言應親近和上承事問訊隨逐行作事時應白和上和上所作事應代作除四種謂大小行嚼楊枝界內禮支提凡欲出行先須白師白之法式如常威儀師既受白籌量事伴八句如非前七有過遮不聽去第八無𠎝方依所請得許可已始宜束帶不得預嚴行相後來白師若遠行者五分十七有諸弟子臨行時辭和上闍梨佛言不聽臨行時辭要先二三日白師師應籌量所往處有可依止人乃至聽去僧祇亦云不得臨行乃白應先前一月半月預白弟子欲至其方國土師問去由籌量可不第二彼當清旦下請法訓誨以資神解祇律三十四云日三教晨起日中向教法者若九部經波羅提木叉略廣若不能者應教知罪輕重知綖經義知毗尼義知陰界入義知因緣義教威儀非威儀應遮受經時共誦時坐禪時即名教若不受經共誦坐禪者下至應教莫放逸不如是教者越威儀此三教誡隨時量宜不得常誦不放逸言第三當除去下報恩供養廣如文說見論十六若和上將去著衣持鉢隨和上後不得近不得遠去和上七尺而行又云若和上多有弟子一人供給餘者隨意讀誦問所以須明弟子行行法者答欲明師有訓導功也次辨闍梨行於中文三第一無師起過第二比丘白佛第三制立師弟於中文二初制立依止闍梨及弟子第二時諸比丘聞下明攝受法前文有三第一制立師弟第二明立利益第三對益加請先解依止義四門分別一定能依止人二定所依止人三明共別行法四辨依止失不初門凡新受戒人觸途不了猶若嬰兒莫知前趣若不教授乳養心神行既不成豈能離過故言新受戒比丘無人教授等無人教授者略有五義一和上命終二和上休道三和上決意出界四和上捨於畜衆五謂自身更求勝法以此𨷂無教授制須依止然有五人聽無依止而住一樂靜比丘二守護住處三是病人四瞻病人此四五歲已下五是五歲已上有智慧者然須依止有其二人一未滿五歲二愚癡比丘盡形壽依止此愚癡人數犯衆戒行不自立觸惱僧者此則須僧治罰落在七羯磨中若其過損不預大衆直犯衆戒行不立者此求別人依止而住次所依止人闍梨有五唯依止師得攝弟子替和上處餘四闍梨不合攝授要加請法方成依止論依止師行位有三一十歲已上二須有解慧三能以八法攝受弟子餘諸行德廣如增五次共別行有二一共別行法順而攝受二呵責治法違而攝受此等廣隨文解不可懸言次依止失不者凡論依止有其三法一請成師法二相依住法二白事行法今言失者但失下二以初請法必然不失如和上出界外亦言失依止還是失下二法名失不是失却請和上法和上既然闍梨亦爾請成師法既也不失後若還來不須更請但更起心作依住意下之二法還即續生餘雜失不對文廣明次下釋文梵音阿闍梨或阿祇梨阿祇利此云正行或云應可行或云應供養正曰阿遮梨耶此云軌範或云教授言軌範者謂即是戒此戒得由闍梨秉法故能秉者稱云軌範或軌範者謂教弟子軌則儀範故云軌範其教授者見論云共於善法中教授令知是我闍梨准依僧祇二十八云欲請依止時不得趣請有五法成就然後得請何等五一愛念二恭敬三慚四愧五樂住是名五法應請依止以有五法故看闍梨猶如其父次利益者前立和上已有兩益今制闍梨還無二損此則益利重重故曰倍增流布次請文二先明請法威儀可知正請五句初句言對正行第二自斥己名第三正求攝受第四願垂攝受第五自顯求心表己殷勤故須三說次許可知五分若如法乞竟彼不語言汝莫放逸是亦不成與依止類餘亦爾次明攝受法於中文二一明攝法文三如上二師弟行法各指同前次呵責行法文中有三初不承事起過次比丘白佛後佛遣呵責呵中復三第一能呵之藥第二世尊既聽下出所呵過第三世尊既聽下明呵違失前文有二初和上次闍梨凡呵責法須具三種現前一弟子二出過三呵詞三中隨𨷂是名非法為此文言不應不現前及不出過呵責又欲呵者必須內懷慈愍外現威肅准過重輕以設呵藥或有過重輕呵過輕呵重此則反增垢纍不成相利然此五呵不可定其輕重但量前機應設何藥汝去者一往逐之莫入我房者不許入屋於外作使容可得作莫為我作使者容許入房一切執使皆不得作莫至我所者不得至邊外事亦容得作不與汝語者言誨斯絶雖絶誨言事容營理次依止師呵大同和上唯換第四句云汝莫依止我住此等並是別人行罰僧法折伏非此所明次所呵過有三謂舉列結列中增數合有八五究其不同唯有十四若離沙彌尼精舍便有十五作惡不耻名曰無慚於善不修稱云無愧不祗師訓名不受教犯下聚故曰作非威儀懈怠自居名不恭敬若作斯五情無愧雖犯小𠎝亦合呵責若其情恆謹攝錯誤而為但應方便開曉令懺往𠎝次五難與語者聞教抵拒前不受教聞言不行惡緣壞行不可交通故曰與惡人為友數近染緣梵行難立故曰往淫女家次六箇五皆易第五句一婦女家二大童女家三黃門家四比丘尼精舍五式叉及沙彌尼精舍六看龜鱉此等皆生譏染妨廢正修隨一即呵不待滿五若對尼呵應反說云大童男家比丘精舍等優婆塞經第三云寧受惡戒一日之中斷無量命根終不畜養弊惡弟不能調伏何以故是惡律儀殃齊自身畜惡弟子不能教誨乃令無量衆生作惡謗無量善妙之法壞和合僧令多衆生作五無間是故劇於惡律儀罪次師弟違失隨相可解次明依止失不於中文二第一離明失不第二世尊遊羅閲下正明失法前文有八第一樂靜等二人以自行立聽無依止住而住第二有兩對四句約心暫永明失不失初之兩句作心永去雖即日還出界已失後之兩句為作暫心故出界時依止不失第三有四句正明不了教人合須依止一衆集不起二不誦羯磨三誦之不通四所為多少如餘三律不問有難無難皆得一時為二三人秉法此律有難時開無難不得見論十七云一時為三人受戒一時戒臘同無大小第四兩句師徒違失第五兩句雖無永去之心而作經宿之意故出界時依止亦失此失分齊同前決意以其依止兩情相捨心隔即失不待事隔若無暫去忽經宿者有難不失無難即失因此料簡依止時節此律但開飲水洗足小停息已即受依止五分十七若一宿不受依止乃至不聽飲僧坊內水若飲突吉羅後有緣故佛言今聽不受依止乃至六宿伽論第六云佛言聽諸比丘脫衣鉢拭足塵洗足已二三日然後求依止第六兩句互相簡擇五分作依正比丘應問汝和上闍梨是誰先住何處誦何經答若如法應與作依止若不如法應語言汝不識我我不識汝汝可往識汝處求依止若疑應語小住乃至六宿觀之合意者應與依止若不合意應語如上第七兩句病及瞻病聽無依止第八兩對四句被治失不初之二句師弟互得七羯磨法師若得法雖言不失而無白事教誡之法以師有過弟子清淨若受白事教誡師則有罪弟子被治三俱不失師須誡約令順僧儀次之兩句明得擯法理實犯重不擯亦失此中但舉得擯法者對前得法為言非謂未擯不失又解得擯法者事已彰露無相依義文中言失雖可犯重未得擯法事不彰露亦成依住次正明失文中分二初舉緣白佛第二世尊爾時下明失分齊欲明失依止先舉須依止人有兩位一五歲比丘者謂始入五夏應依十歲智慧人住二若愚癡者應盡形壽十誦二十一云從今聽比丘五法成就滿五歲不受依止何等五一知犯二不知犯三知輕四知重五誦波羅提木叉利廣說雖復受戒歲多不知五法應盡壽依止他住僧祇二十九云若比丘不善知法善知毗尼不能自立不能立他如是比丘盡壽應依止住母經第一告諸比丘從今已後有出家者至五臘要誦戒使利若根鈍者乃至百臘亦應誦之若故不誦若先誦後時廢忘若復鈍根不能得者此等三人有四種過一不得畜弟子二不得離依止三不得作和上四不得作闍梨是名不誦戒者罪若准此律但𨷂師德者即合盡形依止次舉失依止文中增數有其八五據取不同唯有其八一師呵責二去三休道四入戒場五死六五歲已上七見本和上八和上目下住於初五中除去第四以不與依止同第一故次五有二謂死五歲三八五中各有其一中間四五全無有異此八之中去休道死師弟俱有餘之五種一向是弟子戒場失者戒場為是別行法處年小無知恐為他誤但入即失不待經宿爾者暫至他界亦是別行法處何以不言入他界失解他界為是衆僧住處不慮壞行開入不失戒場非是衆僧住處入恐壞行故入即失見本和上者本立闍梨為替和上既見根本無空可補是以見時即失依止和上目下住者若離和上理須依止今住目下故言失也又可和上先捨畜衆見而不失今若作心攝受在目下失亦可見本和上師從界外行還目下住者弟子行還初作暫心入界不失後興永意在目下失此八兼前被擯不同合九次明其德增數八五初十唯聖下通聖凡窮其不同但三十九以減十歲重明故爾次明教所被者於中文二第一略明遮難第二爾時衆多下廣明遮難初文有十七事第一第七是難餘通是遮先解十三難義四門分別第一列數釋名第二明其體狀第三收難盡不第四趣等通塞初門難義隨緣乃有無量今從重說標此十三言邊罪者戒是衆行之初喻王為上庶德之本譬佛為尊既上既尊特須持護今違重法內教不收甄在分外名之為邊此邊罪人捨已更受雖被衆緣唐勞無益障不發戒名之為難難由邊生故曰邊罪難問犯尼等難受亦不得既甄分外何不名邊答此初一難假先犯重甄在分外名之為邊此甄分外但名為邊此邊即是十三別事後受不得始名為難此難即是十三通稱不可以別名之邊類他通名之難如犯尼等自是業重成難本不由戒豈得名邊如六度等一切諸法立名亦有通別不同豈以波羅蜜通亦令檀那義遍故知別名即異通名即同然此邊罪舊解取出家已去受十戒者凡言邊者對內為名以五八戒元非內故今解不爾凡言邊者謂受佛戒毀犯重者名之為邊故多論第一云若破五戒中重戒已欲捨五戒更受戒者無有是處若捨戒已更受五戒若受八戒十戒具戒并禪無漏戒一切不得若毀餘戒如五戒說准此即是但犯重者悉名為邊不唯簡十又母論第一云若在家受優婆塞戒若毀破一有受八齊毀一若受沙彌十戒毀一如此人者後出家亦不得戒亦不得作和上十誦名為先犯戒人次壞尼難者淨具之境生善福田理應竭誠處心供養今反輕陵毀壞梵行業重障戒名之為難難由壞尼而生故曰犯尼難舊解壞尼淨穢俱成以文但言與著袈裟者行淫不論淨行今解局淨成難穢者不成縱使陵穢業不至重文著袈裟據行全者不以此文證穢成難故見論十七壞比丘尼淨行永擯不得出家五分十七佛問汝破比丘尼梵行耶答言如是祇律必須淨尼成難又須是淫甄去觸等十誦五十三若一人事以八汙尼尼得名汙是人非汙得與受戒問此既唯淨得成難者如何謗中不簡淨穢答謗據無根通其淨穢此約壞體故局淨尼次賊心者未受具人身非所應盜竊法財稱為賊也辨相如文次破內外道先是外道歸心佛法捨耶從正出家受戒但為教法初霑信未堅固復捨真宗還受耶法受耶法已更復重來簡餘外道歸正非難故曰汝非破內之外道次黃門者戒是入聖之基超生之本有勝因者方可受行黃門雖預人倫性多煩惱與道相違不能升進障不得戒名之為難次五逆如煞戒破僧明僧祇二十三云作無間罪腐敗爛壞於正法中不能生道根裁正使七佛一時出世為其說法於正法中終不生善次非人畜生者惡趣所收報非道器既𨷂進修不堪入法故名為難次二形難凡道器者必須男女相別今既身有二形心懷兩欲先受今生尚應滅擯況始發心寧容得戒故稱難第二門出體者若約三聚明者位分為二非畜二形黃門總用三聚為體餘九唯色具表無表於中身語別者破僧語業壞尼破內此二是身餘通身語縱比丘犯逆亦以逆為難體以違理極故不取夷蘭以夷與蘭皆違教故又以夷蘭非定滅擯若隨事明者此十三難還用邊等十三事為體辨折如文第三門收難盡不者此之十三收難得盡是中難者要須身相具足有心乞受僧為作法戒不生者是此難收餘非所攝如八難自障聖道非開戒事然若有者亦不得戒唯非畜少分入此障中地獄等六無乞受義既無此義不說為難爾者收難既盡所以祇律二十九四人捨鬪欲出家共入毗舍離城門中見本讎時守門人有弓杖一人即捉弓一人張弓一人射而不死一人射斷命根是中後二人不應度出家已出家者應驅出前二人不應度已度者置若後作惡時應驅出答此為輕躁志性無恆故有驅不非是難攝及明了論舉難重遮通說二十人不得戒者亦非局簡成難之人第四門通塞者於中分三第一約趣第二就處第三約時言約趣者非畜各一人有十一此彼通收合十三也然以人堪受戒不合受者別說故須除去九種重業及黃門二形根不具者其非人畜生即體為障不假須除重業及根不具者又就人中七衆說者比丘約事但十謂除賊心名但有九以若犯尼即邊罪攝尼若約事但九無賊心同前又兼除破名唯有八以犯比丘還成邊罪式叉等五事亦有九謂有賊心除去二破名還有八謂汙具人亦邊攝故若元不受戒人除邊二破即是事八名亦有八以是義故於十三中位束為六賊心唯是下五及不受戒人不通上二破內上二不及下五及不受戒人犯尼唯是不受戒人邊唯受者破僧局是比丘非餘四煞二形黃門通其七衆及不受戒人次何處有者四天下中除去北方難地餘三方中此方具足十三東西二洲但有十一除出血破僧次何時有者時有現未假就此方佛現在時具足十三若涅槃後亦唯十一除二如前義准可解問瞻部滅後東西二洲及於女人如何具問答秉法該通不可無者除却又解得起加行故令具問亦可元不問有遍詰何違又解無者應除去問者依舊制次下釋文先明破內外道於中文三第一明作破內之業第二佛言下教僧度法第三時倮形下重來遣殯前文有四第一論義心伏第一時彼倮形下生信出家第三後於異時下作破內之業第四時諸下舉以白佛初文四辨者所謂通達解了俱舍名為四無礙解一法二義三詞四辨釋此三門一釋名二出體三所緣境初門問何故名無礙解答論云於所知境通達無滯有說於所知境現見而知名無礙解如世於一現見事中云我於此解知無礙言出體者以慧為體皆以無退轉智為性智即慧故所緣境者法無礙解緣名句文身義無礙解或有欲令唯緣滅諦或有欲令緣一切法詞無礙解緣方言詞辨無礙解緣應正理無滯礙說即此了了辨是論師成此四辨外難不通文義盡者無此道理故曰無有是處五百迫難者彰理急切也餘文可解次度法文二初與四月共住法欲彰外道著耶來久信既未堅故須調試此言共住者為在界內住故餘文言別住者謂不得與比丘同一覆故先與沙彌戒者欲使心有所冀憑之入道慮恐退之成難是故不與具戒若准長阿含經第四不須四月試文云佛告阿難我般涅槃後諸釋種來求為道者當聽出家授具足戒勿使留難諸異學梵志來求為道亦聽出家受具足戒勿試四月所以者何彼有異論若小稽留則生本見然大般涅槃下卷論涅槃時還令試驗又婆沙一百九十一云佛告苾芻從今已往及我滅後不應輒度外道出家與受具戒唯除釋種及事火多髮外道若有釋種作外道服來求出家汝等即應度令出家與受具戒所以者何我之眷屬應開許故見論十六若結髮外道事火外道不須波利婆沙何以故此二外道有業信因果第二驗知好惡於中復二初經四月於驗第二爾時下不經四月聽度決定心者初文僧祇二十四作羯磨已若能如沙彌隨僧作務者在沙彌下次第取食若不能者應語汝自求食應日日在前毀呰不信耶見犯戒無慚如是種種毀呰若言長老莫作是語彼間亦有賢善亦有持戒一切盡有須陀洹等應語言汝還去彼間求阿羅漢若言實如長老所說外道耶見乃至作泥黎行長老願拔濟我若試滿四月心不動移者應與出家若中間得聖法者即名試竟若捨外道標試著俗人服來者應與出家見論十六若波利婆沙垂滿四月聞毀佛法生歡喜心聞毀外道嗔恚應更與四月次不經可知次遣擯如文又母論第一云若有外道於佛法中出家後時厭道不捨戒而去從外道中還來不得准此即合捨戒去者不障第二度奴見論十六奴有四種一家生二買得三破得四自來奴自來奴者為衣食故自求為奴是名自來奴若奴主放奴出家語諸比丘言若奴有道心者放若無道心還復為奴若如是語者不得度出家第三度賊五分十七復有諸賊厭作惡業求出家受戒諸比丘白佛佛言聽將至人不識處與出家受戒第四負債人第五減年僧祇二十三太小者若减七歲若滿七歲不知好惡皆不應與出家若滿七歲解知好惡應與出家若小兒先已出家不應驅出度者越毗尼太老者過七十若減七十不堪造事臥起須又是人不聽若過七十能有所作是亦不聽年滿七十康健能修習諸業聽與出家若太老不應與出家若已出家者不應驅出度者越毗尼第六五種病多論第六有先出家而後癩者一切僧事故得共作若食時莫令坐衆中第七邊罪文分為四第一犯夷不覆文中雖言從四禪起而此比丘實未得禪若得四禪欲貪已斷如何得有犯不淨行人又文不言從四禪退應知雖坐四禪但得欲界世俗心定是以犯也第二與學悔法母經第三云比丘犯已即悔脫三衣著肩上露身而走唱言賊賊邊人問之有何等賊答云為煩惱賊所劫盡向諸檀越及衆僧發露無覆藏心僧中智者語言有尊者波奢善持毗尼能除汝罪此比丘即到波奢所如其所犯向波奢說波奢答言汝欲除罪能用我語不答曰無違波奢遣人作大火坑滿中炎火語言汝欲除罪者可投此坑中波奢先共餘比丘論若直入坑者汝等投之此比丘直入坑邊人捉之知此比丘心實即為作白四除從今得羯磨已名為清淨持戒者但此一身不得超生離死證於四果亦不得無漏功德然障不入地獄喻如樹葉落已還生樹上無有是處犯夷得證四果獲無漏功德亦無是處此人雖與僧同在一處但僧與其方途隔也第三奪其七五第四問答疑滯第八父母不聽者不得輒度祇律二十四兒有三種親兒養兒自來兒是中親兒此國及餘國並不聽養兒自來兒此國不聽餘國聽第九度沙彌法於中文二初明度沙彌法第二時有下安處之法前文復二初明剃髮形同單白第二若欲下度令出家法同單白前文復二初明作法緣起次正與法衆和總白不者別報欲令衆知問答無失息去譏嫌制作斯法若依僧祇三十二白者非白羯磨直令遍告故文言從今日後不聽不白僧度人出家應白一切僧下至上坐八人五分十七若度人時應先問汝為何等出家若言為飲食故不應度若言為求善法厭生老病死憂悲苦惱者應度又云從今若度人應房房禮僧自稱名字令僧盡識古舊諸德依清淨居士子度人經廣設儀軌或云清淨士經但為此經正録不載未敢輒依學者思審白已然後與剃髮善見十六闍梨剃時當頂留五三髮置以香湯洗浴除白衣氣來至和上前胡跪和上問言今為汝去頂髮許不答和上言爾和上自為剃去頂髮剃頂髮已在和上前胡跪和上授與袈裟得已頂戴受受已還和上第二第三頂戴受已和上為著不得自取自著袈裟須和上授次第禮諸比丘往阿闍梨所禮足胡跪等智論十六著袈裟剃除鬚髮應兩手捉和上兩足何以捉足天竺法以捉足為第一恭敬供養又云和上如父闍梨如母以棄本生父母當求出家父母次明法同以此行法紹隆聖種故曰法同於中文二初作白如文次作如是下授十戒法於中復二初正授戒將欲授時應須開導立心軌則如上緣明三歸三竟六遍成法遍別文五一自厈己名第二顯歸境界第三彰其歸意背俗之始故作出家之名第四出教授主總化雖霑事須別主第五結歸教主顯異耶師次明戒相初列次結戒別有五一舉時分二顯所防三結屬人四審能不文中略無五彰持意次結文四一舉戒數結法屬人二彰時分三正禁防四明持護古師云應法沙彌教誦五德十數然十數者是沙彌法故僧祇二十三云沙彌應數有幾五德准經正是僧法兼及沙彌不得專是沙彌行故諸德福田經云佛告天帝衆僧有五淨德名曰福田供之得福進可成佛何謂為五乃至廣說次安處如文第十因制十二遂開驅烏此文直云能驅烏能持戒不不限年幾十誦二十一正制不滿十五不應作沙彌後開能驅烏作沙彌最下七歲五分亦七歲十一不得畜二沙彌後開度二制者防過開者為益十二受戒後疑聽數胎等此胎閏等四同是羯磨後開今若別析羅漢為上法緣者不應正理廣如上明十三難結小界受戒此中集僧理須依常有難無難二種分齊界體大小隨數人等應知十四無和上或二三等不成受戒僧祇二十三若二三多和上及二三人共一羯磨別和上共一衆並受不名受具十五說四依前後五分十六婆羅門言此四依世所薄賤我等不能依此復言若大德先與我受具足戒然後說者我不獲已或能行之於是還歸諸比丘念言佛若聽我等受具足已後說四依者不使此人於佛法退以是白佛佛言聽授具已後說四依十六度官人見論十六王問臣言度官人者其罪云何臣答王言若和上應斫頭羯磨師應截舌餘臨壇人應打肋折下至食王俸祿者皆是王人若父食王祿兒得出家若食祿有限祿盡者得若必欲出家轉祿與兄弟兒子後得出家若食祿白王王聽亦得十七無衣鉢及借衣鉢若無不得受戒以緣不稱羯磨文故若借衣鉢義容得戒以作得戒心故若知不應借復作不得戒心者理不成受准和上四句故有得不得五分十七應問衣鉢具未若言未具應語先為具衣鉢若言已具應問自有從人借若言從人借應語可令主捨之次下廣明遮難於中文二第一專明其難第二爾時將欲受戒下局辨諸遮然非人一難落在遮中光明壞尼難義如上辨次明賊心文分為二初舉緣啓佛總制滅擯第二是中下料簡應不此中復二初列二重四輕以為章門次是中下料簡輕重先解四輕却解二重釋文可解此之六句昔解前四不成賊住以盜對首法故後二成賊住以盜衆法故文至一二三比丘所不共羯磨者謂不共下三非不共一人作法佛既制聽明不成賊又以衆法如五錢別法似方便故偷別法不成賊住十誦五十復云若再三聽布薩是人未受者不應受已受者應滅擯若一布薩未受應受已受不應擯僧祇二十三若沙彌聰明覺初中後語者後不得受具若暗鈍若眠若餘緣念不記初中後者得受具又解若盜衆法對首如說戒自恣二種分衣者成賊住盜餘對首不成賊住今解俱非下衆身既非應法便非分故初四句皆云不共羯磨說戒不成賊住以偷形故未出家者不得若已出家者聽即名出家下之兩句以共羯磨說戒故言不應若如昔解往一二人處盜對首法可不成賊住若至三四人處通己並四人已上即偷衆法何以聽受故知文言不共羯磨等者謂不共所住處人作法故言不共又如昔解前三句對後一明不共第四句已至僧中對何以明不共誦祇二文非證妄引次黃門者古今共作二釋初云由根壞故遂令面色萎黃又解為壞根故守黃家門從守處為名故曰黃門爾者黃字全非解以五帝中黃帝最尊由從尊故作此黃字案其典據二釋俱非今正解云以次閣門皆以雌黃塗之以守此門故曰黃門又古時五品已上貴人並以雌黃塗門後為反逆遂壞根門於宮中驅使本是黃門家子弟故曰黃門次龍者是畜生難五分因度龍故從今受戒不相識者應七日試看次五逆者義如煞戒及破僧明然如調達比者還是惡心出血及破法輪主者五分直問調達不言比也次明二形因辨轉根無根義相涉故先解轉根五分十七云有一比丘男根滅女根生比丘白佛佛言應即以此受戒即以此請師即以此年歲往比丘尼住處依尼法住比丘尼根變亦爾釋轉根義六門分別第一能防之行生不生第二已起之罪滅不滅第三順行懺法作不作第四違情罰法解不解第五衣藥淨等失不失第六受戒結界成不成初門有二一約受體以說二約隨行以明言約體者衆生定業不定有轉變者可爾所以僧轉成尼尼轉成僧古師不善發戒所由立有多無表轉時戒有生滅如比丘轉為尼者本得受輒教誡尼等戒以所防無故能防戒謝又以所防獨行等事生能防戒起尼轉為僧洗淨過分等滅輒教等生亦如是何以故以本受時總斷一切惡有善皆修此即是因今轉為緣因緣具足是以還生今釋不爾若當轉根不同戒生者是則轉根應能發戒又應受戒緣中加此轉根受緣又有不受而得過又有漸受之過以斯推驗明知不生又若不同戒謝者是則轉根應成捨戒又應捨戒緣中加此轉根捨緣又有不捨而捨過又有漸捨之過以斯推驗明知不失故知受體無生無滅雖可僧尼互有轉變不得以本惡境無故即使能防隨捨又不可以所防惡趣故復使能防續生所以爾者本要期有惡當斷是故戒體一時總發祗可過境自有興廢其能防行不生不滅故俱舍十四云非轉根位有捨先得得先未得是以僧變成尼尼變成僧又如受惡戒時惡心煞羊猶於一切生邊皆悉發得惡律儀戒況今總斷諸惡寧不戒行具生問若即得尼不同戒者何不名尼答雖可戒體無殊隨形有異現是男報豈得名尼次約隨者如諸同戒所防不殊故能防行亦不興廢如不同戒即有無廢如尼轉為僧者洗淨過分等所防既無能防用謝如比丘身上有輒教等既有過境能防用生或有所禁事同罪名輕重者此輕重行有興有廢然此隨行既有興廢能詮彼教興廢亦爾如煞盜等緣犯俱同此教仍行不得有廢或復緣異但今犯同如長鉢浴衣等自有犯同而事中相反如諸諫戒二宿兩舌嫌罵打搏等亦是同行教亦不廢或所禁事同而輕重罪別如漏失摩觸索美七滅等此諸教中有興有廢有無不同一向全廢第二門罪滅不者但犯同戒轉變不滅以報雖異過境恆存有續犯義是以不滅若犯同緣異輕重不同有無等戒犯者皆滅非直報異過境復亡既不相續是以即滅故伽論第一問頗有比丘犯四篇戒不發露懺悔而得清淨耶答有若比丘犯不共四篇戒彼轉根作比丘尼即得清淨又問頗有比丘尼犯五篇戒不發露懺悔而得清淨耶答有若比丘尼犯不共五篇戒彼轉根作比丘即得清淨十誦亦爾又十誦五十一問云頗非比丘作罪比丘得脫耶答有若比丘尼得不共比丘僧殘是比丘尼轉根作比丘即時得脫又問頗比丘作罪非比丘得脫耶答有若比丘得不共比丘尼僧殘是比丘轉根作比丘尼即時得脫伽論亦爾又五分云若先犯共比丘尼戒應於比丘尼中悔若先犯不共戒不復悔比丘尼根變亦如是伽論第一又問云頗有犯邊罪得與出家受戒耶答有若比丘尼犯不共波羅夷罪彼捨戒轉根成男子得與出家受戒問若以不共戒無續犯義故滅者是則命終休道亦應得滅以無續作同彼不共故答為具三義異命終等一業轉非自心不同休道自心背故二過境不續異於同罪得續犯故三轉變皆具戒異於命終身無戒故第三門作法不者同罪順行謂約懺殘行中以說但犯不同戒正行懺時轉者無問行法滿與不滿如其互變皆成清淨以根本除不須續作故多論第三云若比丘故出精即變為尼即清淨住若作六夜未竟變及別住未竟變為尼亦清淨住若尼變為比丘亦爾次犯共戒若比丘犯僧殘一念變為尼乃至十年五年䨱藏然後變為尼一種十五日除罪若尼犯殘一念不䨱乃至發露行十五日法中一日二日變為比丘但作六夜然後出罪義准行經六夜變者理亦不須更與六夜問若尼犯殘有䨱變者未知更須治䨱以不答以本尼位不治䨱藏今雖轉變亦不治䨱故見論第八云比丘尼時行媒嫁法覆藏不出轉根為比丘不須覆藏不同多論云若先犯罪有覆藏日即變為比丘隨本覆日行別住第四門違情罰法謂約七羯磨論之古舊釋云若於不同罪中有七情過便互變者未治不須治若已治者不問調與不調咸不須解以根本罪謝治法隨亡又云若以義說須除遮不至此一罪事雖滅猶須懺謝白衣非可直爾得了治法不謝今解不然縱令罪事俱亡治法猶在所以爾者以七羯磨是治人法元不治罪罪謝法存諸師釋七羯磨云前四先懺後解既許懺已治法不亡如何此釋乃云隨謝又三舉治亦許罪滅法在故增三中先懺後解又此何以許餘治法隨罪事謝偏言遮不至一罪事雖滅猶須懺謝白衣非可直爾得了治法不謝然此為懺白衣許法不謝餘者為調伏人法在何失爾者罪既許滅如何治法獨存解此罪事滅非是失法之緣如難妨生不壞處分之法其同罪者理應未治須治若已治者尼中順行若調伏已尼衆為解尼變亦爾第五門淨法失不者見論第八比丘時三衣鉢失受持法至比丘尼所應更受五衣先有長衣鉢者依比丘尼法應更說淨所受七日藥失受法應更受先時施主於今不失即為施主論雖如此義釋不然如先安居轉時不失得依本臘在尼衆中又先施主今亦不失如何衣等獨言失法然此轉變非是離衣等緣豈轉變時抑令作法由斯義故轉變之時法先成者一切不失第六門有二一約受戒二約結界言受戒者十誦五十六云沙彌受具足戒僧忽變為尼者去竟勢分遠不得戒尼無與男子受戒義故又法不滿故若臨竟變為尼者沙彌得比丘戒若弟子變者如比丘為他受戒此沙彌變為女者不得戒以少本法故又法不滿故若臨竟變者得尼戒若十比丘與本法尼受戒師徒互變類亦應然又有十尼與式叉作本法若論師變成不同上若弟子變者一向不成以丈夫身不假本法故次明結界十誦次文問若一切比丘結界羯磨僧都轉成女是界名比丘界名比丘尼界耶佛言名比丘尼界次問答一切尼結界如上此名比丘界又問若比丘結界羯磨時或轉者或不轉者是界名比丘界名比丘尼界耶佛言若說羯磨人是男界屬比丘成女界屬比丘尼次尼結界問答同前此等成者皆謂與竟相應者若其去竟遠者並皆不成次二形者見論三種一者自受胎能令他受胎二者自受胎不能令他胎三者不能自受胎能令他受胎此三種人悉不得出家受戒若已受應滅擯次辨無根五句前四無道不擯第五有道故擯五分若為惡獸嚙若怨所害及自爛壞不復能男皆應滅擯次下廣遮文分為十第一三句由全不語第二三由服非法第三三由心不領第四三無衣及心第五如是截手等者由相醜故修羅乾闥婆是非人難攝第六三種空在有界外或客在見聞內但以界異不成第七三種由不現故客在聞內第八三種離見聞故第九三種在界外故第十不與沙彌戒者以失入法次第此十文中第五有得不得第十得戒餘並不得次明授戒方軌文分為二初授戒法第二衆中下拂疑前文有二初以奉教脫看稽留受事因聽撿問即是問難緣起第二佛言下正明授法授法文二初舉法標宗第二爾時下正辨授法授法文三第一授戒方軌第二時有比丘下說相令知第三汝已受具竟下結勸受持前受方軌總有九法第一先明請和上法無文義加雖伽論第三云不乞和上為得戒不答得戒衆僧吉羅要必須請請之應不如上明訖第二安受戒人處所為令覩相生善安在見處恐聞法成難須離聞處第三時戒師下差教授師問戒師不差獨差教授答戒師在衆故不須差教授出衆問難慮恐專輒須差又解戒師正合秉法故不須差教授非秉法人故須差遣教授既被差遣不須白衆又在衆外問難無衆可白戒師反前故須作白又可戒師既不被差亦恐專輒故須作白第四時教授師下奉命撿問若在衆問慮恐惶怖故在屏處令心審定問中初問衣鉢外緣次應語言下撿其內難撿難文三初教如實答二汝今字誰下正明撿問略無十三難問者須知以不問難不成受戒十誦廣問諸遮唯問不曾作比丘不答言作清淨持戒不捨時一心如法還戒不餘難盡不問尼受唯問諸遮不問諸難第三若言無下示知答僧方軌第五教授問已作白喚來第六彼喚言下喚來入衆教授師代捉衣鉢教禮僧已於戒師前胡跪合掌教使至誠從僧乞受表己殷勤故須三說第七戒師作白對衆撿問不可專輒咨僧可不第八衆既和可正明撿問僧祇二十三將撿問時教受衣鉢敕如實答云於諸天世間天魔諸梵沙門婆羅門諸天世人阿修羅若不實者便於中欺誑亦復於如來應供正遍知聲聞衆中欺誑此是大罪理應具問而無十三難者文中還略准文必定須問無有不問得成受事雖伽論第三云受具戒時不問遮道法便與受戒為得戒不答得戒諸比丘犯吉不可依用第九正為秉法將作法時先教緣境立心說法開導然後與法法中白及羯磨總收方便牒入法中尋推可解受既事重要須稱教秉或落非受法不就師及大衆咸達如非專心側聽方得成辦十誦二十一分亡比丘物有一沙彌受戒衆中有六群六群言新受戒比丘不應與大比丘分應與沙彌分師言何以故答言受戒羯磨不滿師不知云何是事白佛佛言應問在羯磨中比丘是羯磨滿不即問諸比丘諸比丘言我雖在羯磨中不憶不知以是事白佛佛言從今聽羯磨時當一心聽莫餘思莫餘覺莫餘思惟當專心當勤當敬重當思惟心心等同憶念應如是聽羯磨作羯磨者應分別言是第一第二第三不分別說突吉羅祇云此是第一成就不第二第三亦如是見論十七受戒已應步影步影者正立取住腳為初等記言某持日月等五分十七佛言應教令知語言汝今受戒時某年某月某日某時汝應盡形憶是事十誦大同次辨說相於中文二第一對過制說不可具陳五犯且彰初四第二善男子下正說於中復二初明四重止持行相第二四依作持行相前文復二初總標舉文四可知次汝一切下別列四重初戒文五初一切不得彰甚止持第二若比丘下明其作犯於中有法喻合第三是中下舉持時分第四能持不審其內心第五答者自言立要下三例同事別為異次四依文二初總標舉亦四可解對此釋四依義四門分別第一釋名第二出體第三立意第四次第初釋名者凡修解脫必藉資糧趣詣聖門事須由起故此四種是生聖緣為此俱舍稱云聖種又婆沙一百八十一問何故聖種有說亦聖亦種故名聖種謂善故名聖無漏故名聖即此能生諸功德法相續不斷故名為種又曰四依依者憑也杖也行人託此資成己行故曰四依次出體者此四皆以無貪為性但此無貪有其二種一者喜足二者少欲今無貪體唯取喜足以少欲性劣於喜足所以然者謂於衣食臥具醫藥隨所得中皆生喜足少欲謂於未得物處無心希求名為少欲是故喜足勝於少欲故婆沙一百八十一問少欲喜足俱對治貪無貪為性何故喜足立聖種名非少欲耶答少欲之名有過失有增益喜足不爾有過失者但言少欲不言無欲故有增益者於實無欲而名少欲故於喜之中無如是事故立聖種言立意者行藉資成事須將補資緣雖衆要唯內外事各有兩便成四依食藥是內對報病不衣處是外服飾進修故此四依通內外立又俱舍二十二問云為顯何義立四聖種以諸弟子捨俗生具及俗事業為求解脫歸佛出家法主世尊愍彼安立助道二事一者生具二者事業前三即是助道生具最後即是助道事業汝等若能依前生具作後事業解脫非久何故安立如是二事為欲對除四種愛生為治此四說四聖種言次第者衣禦外寒食須內濟外要先明內次後說內外緣備理須修道修道託靜須在樹下此等資道無時不須藥待病緣稀故在後問未知此藥體事是何答古來解是內身之穢如上文云誰能自觸己物及未至地開不受食今釋不然此由聖教初興傳人不尋本意卛爾施化遂久流行然西方梵僧並皆清潔若有食茲穢汙衆所不容又若外道等聞極生笑謗故今正解謂是殘弃藥梵云布儞阿喝此云腐爛食藥即是所棄之物故五分第十六云殘棄藥又施主以四事供僧豈可將斯穢物以奉大衆又藥法云腐爛藥盡形壽服此豈須停加法而服准此定知非是糞穢釋引文妨可解次別列四初依文二初制上行次開中下制中文五一舉所憑糞掃衣體第二依此得出家下顯其依益第三舉其時分第四審其內心第五發言領受次開准其力分不須問持下三亦同事別為異五分同此說十二法十誦羯磨竟說四依次四重次十三僧殘一一問答如上次結勸文五第一總結受緣具足第二汝當下勸受教法第三應當下勸修福智於中有二初舉福智別勸次汝發心下總結所修感應無盡第四餘所未知下除此說外餘問二師第五恐有過非制令防護次拂疑文二初拂受戒人疑第二爾時阿難下釋和上疑前文有四初問被舉疑以見難提犯重得法休道還來是邊罪難今此被舉比丘亦不足數休道還來同難提不佛言難提犯重根本行𮓪是障戒難不合為受今被舉人不肯見罪治法重故不足僧數非壞根本不成邊難若言不見是遮勿度見即非遮得為受戒但為折伏惡人舉法不謝問被舉還俗舉法不謝捨戒重來舊夏應在答夏依戒生相與俱失舉為治人是以不謝問今此比丘本作不見舉治何故受已問言汝能懺不答此言懺者懺本不見之𮘧非謂懺言是本舉懺之罪次拂制前年不滿疑次三語疑次不問難疑次拂和上疑事阿難既見問弟子已因此生心遂問和上若和上身有十三難事與他受戒不知得不答言未制已前衆僧無罪制後有者僧即有罪問既言制者是何等制答謂為弟子立十三難制從是制後不合為受若故為受衆僧有罪既言有罪生下弟子疑心不知得戒故有罪不得故有罪故作四句料簡言不持戒者謂是邊罪等人前三得者為有求心第四不得者都無領意所以問和上者以是根本餘師不然故不舉問上來受戒法竟次明說戒以生解故是以先明半月辨宣五犯罪相彰於時聽故曰說戒廣明三種說戒方法集在一處稱云揵度於中文二初至令心不散正明修道淨人堪聞淨法第二世尊在間靜處下示前淨人說戒儀軌前文有四第一覩相問知第二時瓶沙下請佛同作第三時世尊下敕令集會第四時諸比丘下自行修禪前文有三一覩前事二問傍臣三臣實答第二諸佛文三第一王請集會第二默受王請第三遂請退還第三集會文中有二第一正敕集會第二時諸比丘下奉教集會此中復二初明比丘集會俗行財施即是資道之緣十誦二十二云未聽諸比丘布未聽布二十羯磨未聽說波羅提木叉未聽會坐爾時異道梵志問諸比丘汝有布薩等不答言不作梵志嫉妬譏嫌責言餘沙門婆羅門尚有布薩等汝諸沙門釋子自稱善好有德而不作布薩等比丘白佛佛言從今聽作布薩等如我結戒半月半月應說波羅提木叉第二比丘愍俗正行法施於中文七第一對請聽說第二既聽下爾說法體廣釋契經如開宗辨第三時請比丘下說之儀則第四時諸比丘下明說法聲五分諸比丘便合聲讚歎三寶佛言不應爾聽請一人第五時諸比丘下辨說時節五分十八聽八日十四日說法十五日布薩第六若說法人下明說法人伽論第六諸比丘半唄佛言不應半唄半唄者吉羅又兩人共唄亦吉羅又云衆中無能唄者當次第差若都無者各誦一偈於中有能者請說請而不說偷蘭五分布薩時諸白衣以衣布施欲得呪願佛言應為呪願諸比丘不知呪願佛言應使維那呪願第七時諸比丘下明說法座第四修禪上來說法是賢聖語次夜修禪是賢聖默次明說戒儀軌大文有三第一念欲為說第二爾時下舉念告僧第三以是下說爾儀軌此中大文有二第一明說由序第二時諸比丘欲歌咏下明說儀軌由序文二初列八句章本第二波羅提下次第解釋將欲釋文先定默妄緣種差別釋此差別五門分別第一定問總別第二生默境界第三辨默因種第四對問分別第五覆發重不初門總別者序問是總下八是別以序不列罪名總問淨不餘皆舉犯別問故知是別又下諸問各不相通謂問夷時不問殘等殘等類然故亦成別問序無名種如何成默答序中雖無名種為序二百五十戒義既序戒義故有默𠎝故言我已說戒經序竟是中清淨不又如多論毀序成𠎝毀尚成𠎝況默無罪又序問通總不列罪名但憶識不疑者有默餘不憶等即無下之八問既列罪名是則通憶不憶等俱成默妄諸憶等罪二處犯默餘不憶等但別中犯蘭無別聚犯唯在總總中亦局憶等餘不憶等無𠎝又文言是中者序是諸戒中若餘八問是夷等罪中二不定是屏露處造罪為他舉來應撿事中次境界者問如犯一罪經三問時為從僧衆人別結罪為從問緣約問結罪昔解從人得多罪不隨其問發問雖是一人良以衆情委問今解不爾但隨問結以默誑問不誑衆僧是以文云譬如一一比丘相問答既云一一相問如何約僧結罪其告淨提對衆發言自云清淨告時無問故隨人結次因種者問如犯十罪默然在僧默罪為從問得為約所默結耶舊解約問結默不從於罪以其默妄僧問便有不問即無問緣既一何得多默不同覆藏覆罪生罪故隨覆多罪今解問但是緣罪為正種理隨種結豈得隨緣其如覆藏亦隨罪結此默即是覆藏別名覆既不隨明相默妄寧得從問若默定從問生淨者亦應有犯淨既經問無𠎝明默定從罪結如人身有三舉一禮獲三況此默𠎝不從罪結次約問者問默經三唱為結幾𠎝舊解云雖經三唱默但一罪以共成一法故如一切三乞成一法故今解問既有三隨問皆隱故隨三問以結三𠎝猶如違諫白四亦是共成一諫罪既隨諫而生此豈不隨於問次覆發重不者問淨雖有總別但對序中發露至別問中不須更發以經發露義同無過如清淨人經問無罪爾者序問隱過可使犯默下八隱時不應更犯答默本對問但隱皆犯不同發露同淨無𠎝一序說戒必無再隱更逢後座理有默𠎝如人法中先發後覆問前說後說同有默𠎝總問別問齊須發露答二說緣異法殊齊皆犯默兩問法等緣同總發非別次下釋文章本八者凡欲秉說理應和集是以先明集在一處僧衆既集須顯說宗是以第二作如是說下顯說法體說既被物聽須專心是以第三汝等諦聽下敕令諦聽然有犯人不合聞戒是以第四若自知有犯下勸有犯人悔成清淨若行淨人堪聞戒法是以第五不犯者下教無犯人默然表淨淨穢既知示答進不是以第六若他問下勸如實答有犯者發露答無犯者默然答若也知罪覆藏必成大損是以第七如是比丘下默同淨𠎝深障道若能悔過必成大利是以第八若彼比丘下以懺淨故便得安樂次釋八句初二不次所以先釋第二者以是所說法體於中文四第一舉名轉釋第二自攝持下歎戒功能第三我當下爾說方軌第四是故下結說成就初文戒與木叉傍名轉釋各別翻對如前已明五分十八云波羅提木叉者以此戒法防護諸根增長善法於諸善法最為初門故名木叉母經名最勝亦如前明次功能者戒能防護身語惡業名為自攝由攝離非順本受體故名為持對相彰戒總曰威儀此由離非軌則成就故曰自攝持威儀然此威儀軌則攝在戒門故曰住處戒能出生一切諸行名曰行根又一切行戒最幖熾勝餘諸行稱云面首集衆善法成前行根故遺教云若無淨戒諸善功德皆不得生是以當知戒為第一三昧成就成前面首故遺教云依因此戒得生諸禪定及滅苦智慧亦可集衆善法是集散善三昧成就是集定善以一切善勿過定散故此二善攝行斯盡次方軌者雖未即陳待後必唱故曰當說示此說方後違有罪故曰當結將為比丘宣陳五犯故曰當發起如戒序是次陳五犯令衆同聞故曰演布開現說五犯已總更結立我已說竟等是反復分別亦可五犯之中一一有三初言諸大德是四棄等是當發起次陳四戒是演布次諸大德等是反復亦可第三當字通下餘句次結可知次劫解初句廣如下明次敕聽者端意釋上善心念之專心聽法解前諦聽次勸悔者自知有𠎝須行懺法既不悔過不合聞戒故曰犯事未悔次表淨者有其兩人一者不犯是專精人二者犯已懺悔是悔犯人此二淨人堪得聞戒五分十八云默然故當知我及諸大德清淨如聖默然我及諸大德亦如是次實答者人既淨穢不同答便默發差別是以有犯者發露答無犯者默然答猶如一一相問答是名如實答次彰覆過若實有犯而默答者便獲妄𠎝既顯妄是道遮答者理須如實此是遠資說障而非是親次彰懺益懺悔除𠎝尸羅得淨因此發生定慧終階道益故曰懺悔安樂然懺亦未得聖還是遠資中說次明說戒儀軌於中文二第一和合同修時說戒法第二爾時俱睒彌下破久不和非時說戒計理應有却減說戒以說戒法大位有三但以却減一法寄下遮法中明故此文中但有二說前文相望分為十五第一明說戒聲第二時諸比丘下辨說時節第三時六群比丘下制集一處第四爾時諸比丘下爾說處所第五時上座比丘下明應作事第六時諸白衣問下行籌緣起第七爾時諸比丘下結大小界第八爾時說戒日下明說法體第九時說戒日下開欲清淨第十說戒日聞下略說戒法第十一爾時世尊下除疑調伏第十二爾時有住處下懺𠎝表淨第十三客比丘十四日下客舊應不第十四六群比丘下叛說戒法第十五六群尼下簡餘衆法初文歌詠聲者五分佛言應直說之次說時文三一約日二約月三約時文言聽布二十日說戒明知布薩說戒兩法差別布薩者三千云奉言淨住義言長養十誦五十八云何以故佛聽作布薩答令諸比丘安住善法中捨離不善離不善法得清淨故是名布薩伽論第六云云何布薩半月半月諸比丘各各自觀身從前半月至今半月中間不犯戒耶若憶犯者於同意比丘所發露懺悔若不得同意者作念若得同意當悔是罪又云捨諸惡不善法捨煩惱有愛證得清白法究竟梵行事故名布薩次盡集文二初明六群心同形別次爾時下大迦賓形心俱別不聽乘神足往者濫無神足人不肯赴說故令步往次說戒堂者示知說處而非是界次應作文二初是下座應作以是作務上座不應作次時六群下上座應作以是言談說法下座不應作五分十九云有一住處跋難陀為上座唱言今僧十五日布薩說戒不來諸比丘說欲及清淨僧今何所為諸比丘作何事諸比丘答言某甲比丘應與作呵責等羯磨某甲應與別住等羯磨跋難陀言我不知羯磨諸比丘問若不知羯磨何故問僧及諸比丘作何事以是白佛佛言上座應說戒持律應羯磨次舍羅緣起此文應在前明前文應在後說所以爾者若無緣起如何前文已言具舍羅既有此言明須前說次明結界於中文二初以自然集難作法緣起第二佛言下正明結界於中有三初結大小界法攝人以同法第二時有厭離下結不失衣界攝衣以屬人第三爾時有二住處下重更開結大小界法然依正文界有三種其攝食界在下藥法中明初文復三初結大界法第二時諸比丘下開結戒場第三時諸比丘下明解界法前結大界文中有五第一制集無欲第二是中舊住下差唱相人第三若東方下爾相令唱第四衆中下差秉法人第五當如是下正明結法先解結界義六門分別第一開制結意第二列數釋名第三辨其體狀第四有法起不第五棄捨失不第六處法相對初門意者羯磨說戒正是住法之儀既欲秉行須得依處然此所依盡一化境盡境同會極是劬勞大聖愍此廢修開令境局結界當處同遵即成法事一開已後即是秉衆所依但作法事非此不濟先開後制意在於斯故祇律第八云不羯磨地者不得僧作事次列釋者位且為二謂自然作法先明自然自然有四一聚落無難二聚落有難三蘭若無難四蘭若有難此等隨人即有界分不為物造名曰自然次作法者加法限約分齊各殊稱之為結既有分齊彼此差分名之為界了論梵曰四摩此云別住謂此住處與餘住處分齊各殊稱為別住別住不同有其大小大界約位通說有四一別說戒別利養名為人法同二界二同說戒同利養名為合二法食同界三同說戒別利養名為合二單法同界四別說戒同利養名為合二單食同界此一無別界體但作羯磨通食故約位明次小界亦四一者戒場竪標唱相二者難結小界受戒三者難結小界說戒四者難結小界自恣然以界處局狹名小寬遠名大次辨體者先明自然分齊於自然中先定聚落故十誦二十二諸比丘於無僧坊聚落中初作僧坊未結界爾時界應幾許佛言隨聚落界是僧坊界僧祇第八優波離問若有處所城邑聚落界分不可知若欲羯磨應齊幾許名為善作羯磨使令異衆僧各各相見而得成就羯磨不犯別衆佛答五肘弓量七弓種一菴婆羅樹齊七菴婆羅樹相去爾所作羯磨者名善作羯磨雖異衆相見而無別衆之罪是名為七菴婆羅樹界然唯七樹合有六間間別七弓合四十二古尺小故以九尺為弓六尺為步是則一弓有一步半合計四十二弓有六十三步今尺大故一尺故一尺當尺二是則七尺五寸為弓五尺為步一弓還一步半乘步還六十三步尺雖今古不同計步無異此集分齊四面各爾又此集者十誦據可分別即是無難盡聚落界集僧祇據不可分別即是有難但取六十三步集尼集分齊亦准此明蘭若無難界者五分十八諸阿練若比丘不知己界齊幾許以是白佛佛言自然界去身面二拘盧舍十誦諸比丘無聚落空處初作僧坊未結界爾時界應幾許佛言方一拘盧舍是中諸比丘不應別作布薩及僧羯磨但拘盧舍大小不定祇律第九五肘弓二千弓名一拘盧舍計一俱盧舍有三千步三百步為里即有十里雜寶藏云五里此二教不定集亦太寬今依俱舍等定望將應理故五百弓為一俱盧舍弓各四肘計五百弓有三千尺五尺為步即六百步三百步為里即有二里五分二俱盧舍一向取十誦方俱盧舍四方取計此二教里數一種既曰二俱盧舍即以四里為限次有難者見論十七阿蘭若界極小方圓七盤陀羅一盤陀羅二十八肘若不同意二十八肘外得作法事計有一百九十六肘今尺肘別一尺五寸合有二百九十四尺計五尺為步合有五十八步四尺此與四分衣蘭若同既言不同意者明知是難然於空聚欲集僧者必須依前分齊內集即是集僧遠近分齊謂是標狹界寬或若標寬界狹集亦依前標將欲結然未是界次作法大界分齊者五分十八云若結界隨遠近時諸比丘結無邊界佛言不成犯吉比丘復結十二由旬或十由旬說戒時往四五日行乃至或遇野火或遇瀑水遇賊劫剝便有梵行難衣鉢難及命難佛言若結十二由旬若十由旬不成結界犯吉今聽極遠三由旬祇見二文亦言極廣三由旬母經第七但云極遠聽一日往還結大界是名盡相應法此無定文但言十五日說戒十四日先往十四日說戒十三日先往既經宿方至亦與餘文相似尼界分齊准多論第四云尼結大界極大一拘盧舍次小界者戒場一種結有標相永久作法見論十七極小容二十一人義准不得更遠以遠還成妨難祇中四五人外更開一尋餘三小界非是永久一時避難但隨僧集數人坐處無別分齊然界體狀准見論有五種謂方圓鼓形半月形三角若相依結已後若失相界亦不失若人掘地乃至水際皆不失界其自然分齊理須圓取對此因明自然作法異相差別但此二界異相有四一作法不作法異二多少不同作法隨事故多自然不爾故一但作空聚分齊三寬狹異謂自然界昔寬今狹本該一化故所以寬以集難故開境局結若依舊集恐不成結故作空聚分齊是以今狹作法對本開結故狹然望今集互有寬狹四強弱不等若望初集亦無強弱對今集者自然即弱弱故法事極狹但得結界不得作餘及無欲法作法強故秉法極寬下至解界及通欲等次法有無者問於此作法結界處中為有法起為無法起答於此處中無別法起以經作法異於自然如有情類別有造業發生無表故有得得此結界法不屬別人界處無情繫屬何許但是曾加羯磨唱制處所故下文云界現前者在內羯磨作制限者是類如受持衣鉢處分離等並是曾經作法說為無罪既是非情並無法起爾者如何見論十七云若結界已水蕩成坑有水流處知其處所竪柱為問於上作法事得答由知處所咸是標內無問高下淺深並同一界次棄失不者僧若作意永捨住處所依之界出界便失故十誦四十七有諸比丘捨僧坊去作如是念我不復還是處是名捨界不佛言捨又五十六舍利弗遊行中道有空精舍是說戒日不知何者是界內何處是界外是事白佛佛言若有棄空精舍是名一切界外是中說戒隨意爾者如何下文治故僧伽藍疑有淨地佛言解已更結解此文古舊諸師並皆錯用下文疑有淨處即無故言有故言處不知云何佛言更結此當部文尚自錯用說他部文而能具委若論二衆重結不失見論十七若比丘結界已於比丘尼非界得更結比丘尼界比丘於尼界上結亦爾若非法比丘惡心解界亦不成解類如解淨次相對者若將白等三法對處通局者且自然作法白二位通白二雖通二處自然極狹唯結大小界白二以是根本得在自然中秉次就作法大小界中白等三法俱有通局且如受懺等單白通於二處捨受德衣簡德斷諍現前草覆結集行鉢異惱等白局是大界白二位中還衣六年離衣杖絡通於二界處分結淨學家癡狂攝衣覆鉢用舊持新不禮分衣四月八德等局唯大界白四法中受戒出罪通於二界憶念不癡罪處所及七羯磨等局唯大界
