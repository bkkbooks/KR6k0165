body:
  text: 次七百結集文中分三第一跋闍擅行十非言是清淨第二時有耶舍伽那下欲定其非反被毀罰生諍第三伽那子下簡集智人殄非滅諍初文可知第二文二初作遮不至已後差八德送懺白衣至彼廣引世尊所說沙門不合受錢寶及為具陳過喻等事令彼衆人歡喜生信為此次與不見舉治次下正明殄諍文中有二第一廣求德人善伴滅諍第二一切去下正殄諍事前文釋所立非倚傍之相然立十非並悉倚傍聖教說相似語言佛聽可一二指者若其食已不節貪心恣意多食可使犯足我雖重食但二指抄是其少欲故不犯足今判犯者以曾經足若更食者不問少多不作餘法同是犯限故指上戒舍衛中制二村間者本制僧食及聚落食作餘食法不制村間食我足食已食此村間食不犯今亦制犯同前但使重食不問村非村間一切是犯三寺內者如滅言諍現前驅出三人彼在寺內法事得成我今亦別衆作法何以不成今制不成如布薩犍度中制者彼文衆僧說戒有比丘在房眠因制作白攝衆四後聽可者如文先聽與欲後作羯磨得成今我先作羯磨後求和合亦得成就後先雖殊和合不異故曰後聽可今制前與欲者秉法時和是以成就今後聽可秉時不和以是不成如布薩中言信告比丘寂靜今僧有事有異比丘白佛言有病比丘不來佛言應與欲以制先與故如彼制五常法者謂得修習本俗時事如先習慈空定等不違背法律是以得作若作淫盜飲酒等違背法律是不應作五分云習白衣時所作釋云或有可習或不可習六得和不者蘇從酪出許不作殘食法食我今以蘇和酪食不犯其足今以酪是時食和食成犯故指上制明上亦和七得與鹽共宿不者謂執藥犍度中盡形壽藥佛許共宿今鹽亦然故得共宿今制鹽不加法不同其藥上文六群比丘以共宿鹽合食食佛言不應爾故如藥犍度中制八得飲闍樓羅酒不者五分名未熟酒此雖未熟以是酒故不應飲上文但使是酒縱非酒色香味亦不應飲故言在拘睒彌制九得畜不割截座具不者本以小爪故更聽半搩今後嫌小欲得更大過此不截亦得為淨制言以佛撰手制還已定過則應截不截是犯故言因六群比丘制十得受金銀不者元自受付與淨主淨主將來聽為彼受我今一法即作彼物意受既作彼物不殊何以是犯制云淨主本擬貿淨衣鉢至淨主邊即是入淨若其一法自受寶在我邊即名為畜故言因跋難陀釋子制次正殄文三第一僧簡智人諸上座皆集第二時一切去下明在屏處料理滅法此用多人語五法現前滅第三彼長老下對衆唱滅欲令衆人皆知釋相可解上來七百集法竟次明現在流通於中文二初修部者正明波離問若疑滯以辨流通第二增一下約其數法次第宗序以辨流通言修部者條録別事一一咨問欲使識相侍持後無疑滯問諸經皆有問名流通何以律中不問其名答經為詮理隨緣化生立名不同故須咨問律是行教毗尼藏收更無別名無濫不問次問之中廣問初犯四戒第二問六餘並毗無問若初戒文相可解次盜戒盜損約本取物處結本處不滿蘭約處既爾貴賤時亦然多人分物雖不滿五通作一分教人業滿盜經如上釋先然可彼吉者謂且直結然可不應不是即明盜方便罪若是盜方便罪即應如前文云方便求五錢未離本處攝并得己衣蘭者於己衣上實無有罪但為替他衣處故是境差偷蘭奪盜者物分別如上次盜心例易他分物籌者據隨籌分物例易回換次句盜他分物籌此見付受以籌論數盜隱此籌故得成重次句轉例他籌者見初句墮籌分攝但為轉例故蘭亦可三句並據墮籌初句據換易次句直盜取籌後句是前二方便次再盜不滿五佛言前後滿五犯夷此謂主一前後心不斷若其異主或中間心斷但合得蘭不犯夷罪次守視人及賊皆已盜成屬己故佛言此天是檀越食聽洗手受食之然守視人非正物主不合從乞從乞即是教他盜故解放牛等慈心不犯不同慈煞彼有煞心故犯無根取他食者如師不遣取詐傳師語故是無根損他施主物所以犯重次煞戒可知妄語戒中時比丘有檀越下次第十句前之四句謂常為汝說法者次數至汝家次數坐汝牀次數受汝食皆為檀越重問不語令彼不了故蘭下之六句檀越語供養比丘言若大德是阿羅漢者脫僧伽梨次著及坐起上下為現相不了前人生疑為當比丘為我故現相為當不爾以是故蘭次有十句一同其前但言是佛弟子聲聞為異餘相可知問嚴好比丘言憶五百劫事如何世尊言嚴好比丘憶一生事無犯答彼從無想天歿來生此間彼壽五百劫而名為一生次第二犯欲身中四句如上粗語中者第一句比丘言汝但不能一切與我女人若言大德不能何等一切與比丘默然疑佛言說不了了偷蘭次句知心若言一切能與此亦能與僧殘第三句比丘言汝不應一切與彼問大德何等不應一切與比丘默然疑佛言不了了蘭次句意解重問何等不一切與僧殘餘文可解上來調部竟次毗尼增一言毗尼者舉一部之都名為欲總收大教故舉斯稱言增一者以一為本一上加一故云增一乃至增二十二類亦同爾此中一攝一增一乃至二十二類爾又此數中毗無十四十五十六及十八十九二十二十一七門但有十五既是增數法門理應隨次解釋先解增一就增一中文分為二第一明序證說不虗第二時世尊下明所說法初文序分應有六句𨷂無徒衆但有其五一者信成二者聞成三者時成四者主成五者處成解釋此文可為四句料簡第一明有之由第二須有之意第三置之處所第四解釋文相初有由者此序分文為佛教故所以集法衆聖依言置立佛何故教為阿難請阿難何緣故請由阿泥盧豆教故彼何緣教以見阿難心沒憂海阿難何故心沒憂海為見如來入般親愛未除故智度論第二云如佛般涅槃時於俱夷那竭國薩羅雙樹林中北首而臥一心欲入涅槃爾時阿難親愛未除未離欲故心沒憂海不能自出爾時長老阿泥盧豆語阿難言汝守佛法藏人不應如凡人自沒憂海一切有為法是無常相汝莫愁憂又佛手付汝法汝今愁悶失所受事汝當問佛佛涅槃後我曹云何行道誰當作師惡口車匿云何共住佛經初首作何等語如是種種未來事應問佛阿難聞是事已悶心小醒得念道力助於佛末後臥牀邊以此事問佛佛告阿難若今現在若我過去後自依正法莫依止餘從今解脫戒經即是大師車匿比丘我涅槃後如梵天法應當治若心耎後應教迦旃延經即可得道後次是我三阿僧祇劫所集法寶藏初應作是說如是我聞一時佛在某方某國土某處樹林中何以故過去諸佛經法初頭皆稱是語未來諸佛亦稱是語現在諸佛末後涅槃時亦教稱是語今我解涅槃後經初亦稱是語以是當知是佛所教非佛自言如是我聞此律雖非度喜誦出義准近取軌則亦然次須有者凡入佛法須有信心信是道元功德母故須起信是以智論云如住所說信為手如人有手入寶山中自在取寶有信亦如是入佛法無攝根力覺道禪定寶山中不能有所取無信亦如是入佛法寶山都無所得佛言若人有信是人能入我大法海中能得沙門果不空剃頭染袈裟若無有信是人不能入我大法海中如枯樹不生花實不得沙門果雖剃頭染衣讀種種經能難若於佛法中空無所得又此信者是聖財之初故入法者觀令生信又此勸信謂勸信正之人以信正人受行佛教若是傳者之言則不遵奉故以如是等言勸令生信若是耶見之人不修正法以是等勸則不足要須廣現神通為說因果道理方生信心受行佛教次處所者問如諸經中時等一者置一如是勸則義具答其時等則者立多如是以一如是勸義不足今此律藏禁該一代人時處事各別不同理應隨戒立多如是如阿含經何以但一解凡如是者證信為義若其一戒立一如是即有跋闍林中差別若其隨事立多也是便謂多戒不同一制由此義故不置如是又問由斯義故不置可爾何故至此方始有耶若以於此安得通大化文省義周勸信義具如言如來出世見衆過失故以一義為諸聲聞等即是以一通收一部中一乃至二十二類亦同爾但信增一是佛所說當知亦信一部中一由有斯義故置於此文解依如大毗尼藏戒戒之中皆有如是今文無者為後分部聖人恐文繁略吉問所以得知本藏中有若智論第二波離誦云如是我聞一時佛在毗舍離爾時須㵪那迦蘭陀長者子初作淫欲以是因緣故初結大罪又十誦結集迦葉語阿難從今日一切修妬路一切尼一切阿毗曇初皆稱如是我聞一時出曜論亦爾次解文相如是者為約法釋如則指法是為定詞如佛所說一切皆是故言如是又解所聞之法契理曰如如說者是故云如是又約傳持解如者如佛之言是者是佛之教即是今何誦法不異佛法說時故言如是又解波離今持不異佛說為如如說者乞故云如是又約信行解如是者即是信相故智度論第二云不信者言是事不如是是不信相信者言是事如是譬如牛皮未柔石可屈折無信人亦如是譬如牛皮已柔隨用可作有信人亦如是又解如是者信順之詞信則所言之理順順即師資之道成文無豐約非信不傳故言如是次我聞者我是諸落隨俗假者智度第二問佛法中言一切法空一切無有吾我云何佛經初首言如是我聞答佛弟子輩雖知無我隨俗法說我非實我也譬如以金錢買銅錢人無笑者何以故賣買法應爾言我者亦如是於無我法中而說我隨俗故不應難聞者所謂耳根不壞有可聞境發識聽受具緣如上次一時者化辰也即是爾時別名反指法昔說聽之時所謂說聽究竟總且時次佛者是其化主義如前釋次在舍衛等者列其化處梵云室羅筏悉底國在中即度文言舍衛訛略不正梵云逝多林唐言勝林舊曰祗陀者訛也給孤獨食名蘇達多唐言善施舊云須達者訛也但以園是善施所買樹是勝林所施買園施樹如上文明世尊居此善施園中為諸比丘敷陳行軌次明所說耶正之法於中文二初文將欲說法先須勑聽恐有證聞之失錯傳之過端意專心聽故曰諦聽善思者勑令籌慮以學須思不思則㘝為使里還簡擇耶正念之者敕令持法既聞正法須落在心為使修行奉持無贊次若比丘下辨耶正法於中文三第一辨所說法耶正差別第二爾時佛告下舉制利益第三爾時佛告下對制明捨前文有二第一總明第二離辨總中有三第一明說耶正第二是故下舉正勸修第三佛說下度聞修奉前文先耶後正願說文二第一說耶妨正第二此比丘下明說耶損前文若比丘說相似文句者正說聽法言同意異如調達五法跋闍十非遮法略尼者正明妨正次說耶損損有其二一者損人說耶非直自損亦損他人以此耶法教人令他倣習故曰令多人不得利益明今作者是惡道因故曰作諸苦業二者損法故曰以滅正法次明說正亦二如前然說正法順其道理故曰隨順文句以隨順故不違法毗尼以不違法毗尼便有利益益還有二一者益人非直自利亦利群品故曰利益多人既說正法非惡道因故曰不言作衆苦業二令法住既說順理便不墜沒故曰正法久住次明勸修上來既辨損益差別汝等應各稱法而說次度所聞聞未曾有得了是非耶正既分頂戴修奉故曰歡喜等然則心心領納目之為久久不失稱之曰持次離明法非第二爾時下毗尼非毗尼第三佛告下制非制分文解釋一同總中次明制利於中文二初總舉制利第二爾時下對事別明前文見家過失者即是漏過諸戒所防以一義者以是增一文故故舉其一謂是十箇一為諸聲聞結戒者顯制所由次別之中或可文二前是衆法次制四波羅夷下是別行二可通明所制之事總舉二百八十不須分二以文舉呵責為法餘例皆同望制一部重輕衆行一一成招十利功德然文毗舉呵責等而不備具言捨挍法律所制者謂聞他說應須具說然後撿其法律制相是非是者應行非者應棄阿菟婆陀者梵音此云隨問答分別謂不得與僧問答不得隨會集起請衆制戒者舉其制體制說戒者制米月說戒餘相可解次捨戒合有十九箇一次解增二大文總有十二第一舉例四境第二爾時佛告下舉毗尼數第三爾時佛告諸比丘有二種人下明性不調第四爾時佛告諸比丘有學比丘下略辨修進第五爾時佛告諸比丘破戒墮二道下持破墮不第六爾時佛告諸比丘有二種人謗如來下明說謗不第七爾時佛告諸比丘有二家下是非兩衆第八爾時佛告諸比丘比丘有二法下明法住滅第九比丘有二法者應舉下明應舉不第十有二法增長有漏下辨漏增不第十一有二語下開聽捨戒第十二如來出世下制戒之利先解初初文成耶例說有四第一明二處第二後有二事下明二事第三明二法第四後有二見酒見非酒下明二見先解初文二處問文中但言有二種犯一輕二重云何乃言二處解以此二犯起依屏露二處屏處犯重露處犯輕今言二犯者偏彰犯名不舉犯處下言二處者即舉犯處不標犯名文中互明於理無失亦可指此屏露生輕重二行之處故曰二處亦可此二生有正處故名為二處言輕重者論其犯相雖後衆多以輕重法收收無不盡故言一輕二重二者是夷以壞本故輕是殘等不壞本故或可方便為輕究竟為重或可性罪為重遮罪為輕或可故作者重非故者輕若其順說此二名為正見例說期兩即是其有次明二事言輕而有餘者以非絶分故曰有餘以是有餘得應衆法故言輕者得作羯磨若其以重翻輕應言後有二種一重而無餘二重不得作羯磨無此類者是文略也次以夷等一輕一重相對為二事以夷為頭有六句殘有五句乃至惡說漸各少一合有二十一對滅以二二相對不殊故言亦如是非謂數齊名亦如是次二法者此舉緣心故言二見下文約境稱云二法以能緣心乖於正理有見例說故言不應行還約九對十八法論舊非舊者還是常行非常行次明二見有其多對八種漿停久喜受成酒飲則醉人名之為酒停近未變不名為酒今說已變者是非酒未變者是酒故言酒見非酒非酒見酒飲非飲者互說八漿食非食者五正為食不正非食時非時者如迦提月聖開五事名時過限是非時及餘開等為時亦爾淨不淨者衣藥等物畜順開法不生過各名之為淨畜不應法名為不淨重非重者夷殘是重說為非重提等非重說為是重難非難者十三障戒名之為難餘不障戒及說為難無蟲見蟲者准說可解破見不破者謂不見罪人其實是破而言不破不破見破者謂不識罪人其實不破而言是破種非種者約五生種前人義已解說而言未解實未解者言已解說親非親者約父母等親怖不怖者佛說四種犯畏實是可怖情樂作罪名為不怖佛勸持之畏慎輕戒重若金剛等學諸戒此名不怖反生懼心不肯修學故言不怖見怖道見非道約五法八正互說可行見非行亦爾道性清升不為或繫名為出離說非出離漏業繫人不得解脫名不出離說為出離若犯四夷無用名棄說為非棄犯餘得用名為不棄反說為棄次下五對並是外道執我之異名但執斷常見者必緣我為境於中計世間常者是常見見世間無常者是斷見無際是常見有際是斷見是身命等計一異者非見然與斷常計為其根本是身是命即是斷見之本身無常故命亦無常身異命異即是常見之本身雖謝滅而命常存有如來滅度是斷見無滅度是常見有無滅度者斷常合計粗我雖謝細我常存非有無滅度者是其空見次舉毗尼數言犯諍毗尼者犯諍非毗尼以能除犯除諍約其所滅標名故曰犯諍毗尼下之三對准釋可解次明人性不同總有土對以此等人懷其離毒自壞惱他故言住不安樂觸緣易忿故曰喜嗔結恨不捨名為懷怨所為九十暴名為急性固執堅牢稱云難捨吝彼財法名之為慳忌他財德故曰嫉妬亦可見他得利生惱名之名嫉自恥內德劣他稱之為妬意欲害彼語悅其情名為欺誑心存名利身相親附稱云諂曲慠誕陵物名為自高數起鬪訟稱云諍染著衣服名為好餝任情縱蕩稱云放逸於等計勝名之為慢未得謂得稱增上慢多求無厭名之為貪匿怨侵人稱之為悉自歎己德名曰自譽譏人過惡稱曰毀他撥無諦寶葉果稱云耶見斷常乖中名為邊見識性愚鈍故曰難教聞悔不行名為不受訓導次辨進修三學先明戒學戒學文三第一示進修法第二是故下勸令修學第三佛說下度聞修奉前文復三第一舉修二法利益有學比丘未得無學心希無學常修二法即於無學果法未得能得等此未得等並望無學果說不同舊云未得令得謂得生空解也悟達法空理解轉深故曰未入令入心冥無相乃至具二解脫故曰未證令證此釋違理義不應然第二何等二下出二法體言善犯者善淺犯相輕重分明此謂有解解而不行無以獲益故次明行即是善能除犯除犯有二一防未非二除已赴離此二過令戒清潔故曰善能除犯亦可善犯防其未非善能除犯除其已起已未雙亡成其晈潔第三如是下結餘二如文次明定學善入定者從粗至細善出定者從粗至細善修此二得益同前重明不異故亦如是次明直學文三如前苦集滓穢體能障道名可厭處觀過棄捨故曰生厭已生厭故修道證滅解興或喪衆纍斯除故曰已厭正憶念斷次勸修學先序後頌頌中兩偈前偈頌前可厭處生厭次偈誦前已厭正憶念斷前偈內有勝智名為明者為或未除名在厭處情背修道令永斷除故曰能生厭離心集因既無苦果隨喪故曰無畏不恐怖以能斷故得名聖者次偈上半修道下半證滅次明持破墮不於中有四一明墮不墮二明脫不脫三明縛不縛四明淨不淨初文三句一約行相對二約處相對三約見相對釋相可解次文佛聖弟子者謂此戒法聖者修行得此戒法名聖弟子天人中尊貴違禁起非名之為犯或業露心不懼惡報故曰不見犯有此二法不得解脫翻前以說即得解脫餘二對可解次縛不縛者約因以說因黑成者名為被縛因纍若除便不被縛亦有三對如前不別故言亦如是次清淨者漏舉不墮得脫不縛一邊而說次明謗不文有七對一謗不謗二不受如來善教三違如來四堅持與如來諍五不奉如來六不值如來七於如來所粗礦無有慈心初文有三一舉不信等二法直謗如來二例說增一中三對六明謗不謗三例說增二中四對八明謗不謗初文謂起耶心輕大誣大聖故曰不信樂憎嫉佛法幽深凡情難惻自解猶如豪露及謂窮理盡源故曰信樂不解受持此二皆以越於情童誣誷大聖名之為謗故告汝等令知謗餘罪輕謗如來最重若其自識分齊解准至此諸餘深義聖者能知如此反增福慧何有過咎次例說增一中六可解次例說增二中四對八者初二法者是前二見中初十八法此約境說名為二法二處者是初輕重二處二事者次輕及夷等二見者酒見非酒等作文同前故言亦如是第二門違拒聖說故曰不受善教第三門說永正理故曰違如來第四門執見難悟故曰堅持與如來諍第五門自師已見故曰不奉如來第六門搆耶背正故曰不值如來第七門縱耶慠逸故曰於如來所粗礦無有慈心作文同初並言亦如是次是非二衆文分為四第一先列是非二衆第二時舍利弗下能舉所舉各自觀過諍得消殄是名法衆不自觀過諍轉增熾名非法衆第三爾時佛告下二種癡者是非法衆二種智者是如法衆第四爾時佛告下明斷舉應不若能順法斷諍舉罪是名法衆若斷舉違教是非法衆前文有二初法說是非二衆第二爾時佛告下舉是非兩喻及合前文有三第一法語非法語衆類是等衆以純如純如非故第二如法非法衆類是不等衆以如非不等故第三等不等衆初文等衆五句一舉二列三何等下釋四此二衆中不讚五佛說下度聞修奉第三釋二衆中各有其三謂舉釋結列中先如後非釋中先非後如衆中不用法毗尼不依佛教而說犯殘等罪不教懺悔而共住故曰應教不教而住犯夷不滅擯而共住故曰應滅不滅而住亦可云應教策修防非之行而不教故故曰應教不教而住應滅已起罪諍而住不教滅故故曰應滅不滅而住次法語衆反說應知次不等衆亦五如前釋中前二句人非次三句法非次如法衆翻說可解次明等不等衆於中差別六句不同一彼此數齊名等力伴有無名為不等二俱有力故名等數伴不齊名為不等三俱有伴故名等數力不齊名為不等四數力俱有名等對伴有無名為不等五數伴俱齊名等對力有無名為不等六力伴俱齊名等對數多少名為不等文相同前故言亦如是次喻有二一與非法比丘強熾喻次與如法比丘有力喻此總喻上是非二衆初喻五句第一法王力弱如法比丘無力喻第二衆賊熾滅非法比丘有力喻第三爾時法王下如法比丘為非法者惱出入不安喻第四邊國小王下群小比丘不遵教法喻第五國界人民下令餘下衆不得修善喻廢修道業故曰生業休廢非直廢修亦令生惱故曰憂苦等合中初二不次餘者相當配釋可解次喻亦五第一法王力強如法比丘有力喻第二衆賊下非法比丘無力喻第三時法王下如法比丘出入安樂喻第四邊國下群小比丘遵行法教喻第五境內下令餘下衆修善安樂喻次合文句相當可解次明觀過文有其三第一總舉觀不第二諸比丘下別顯觀相第三若比丘下總結前文有二初明能所不觀過損次辨能所觀過利益次別之中先明有罪比丘自觀過相彼犯罪者應作念言由我犯故令他舉我我若不犯彼便不舉既由我犯令他舉我即是愍我應須懺洗次明能舉自觀過相彼舉罪者應作念言由彼犯非令處得見彼若不犯我則不見既由彼犯我今舉彼應起善心令彼罪滅次結可解身別說此比丘修奉次明癡智即前脫不脫文三對如前次明斷舉初制斷諍之利應成多二但舉一門餘者毗無次舉罪德能何舉一餘亦略無次明法之住滅已上是非相翻合說今此文中如非離辨先明疾滅次辨久住初文有七一疾滅正法二不能生善三自破壞四犯罪五智者可責六多得衆罪七死墮地獄此之七門名例說增二中二法二處二事二犯計隨文相歷別應七但為初二第七別明中四合辨故成四位此中二犯是上二見犯據境明見約心說次明久住七門四對及說應知次明應舉不文有其三第一對其可舉有過合舉故名為應第二後有二法下對應舉人設藥當病故言如法第三後有二法下病藥既如衆治行法初文有六一舉二憶念三自言四遮阿菟波陀五遮說戒六遮自恣初應舉者為例說二法次憶念等五義同故言亦如是次二處等亦爾此中以四例為位名如舉等即是四六二十四句次如法中先明其舉對四耶過次修念等五各四如前此中以舉等六為位各加四過即成六四二十四句次衆行治法以呵責等七法為位各加四過成其七四二十八句謂若例說此四隨其所應作呵責等治次辨漏增不增略舉七門一慙無慙二淨不淨三犯不犯四重輕五餘無餘六法非法七制非制次捨戒二二為法故成多二次明戒利於中文二初直舉利有九箇二於中後五並二世漏中離明怨者對境逼惱為言怖者約情恐懼為目次約衆別兩行各有九箇二法於中呵責廣明餘者類易餘下等文成准斯說次增三文五第一雜明三法第二有三學下進修三學第三毗尼有三答下更明雜行第四捨戒第五制利物初文羯磨隨事雖一百五十七以三法攝攝無不周憶念不癡非如如上三種調法謂治人令調舉七中前三三種滅法謂滅上品四諍故舉滅中後三然破戒作呵責等者謂犯殘聞非夷可解既言應見見等故知即是先懺後解以違本見不結隨𠎝次三中應信不信者謂約心說前文捨者據見以明次遮不至應不稱還比丘者本來實是好人忽然罵謗白衣即生慙謝者不應治罰若其無慙罵謗無心悔謝者須治稱還白衣者若信心殷重具五法者須治五中有𨷂者不須治稱還事者為利益罵不合治罰作損滅意是則應治應作法和合羯磨故曰稱量羯磨犯夷不治殘等須治故曰稱量犯實不實約三根有無說作不作者明犯虛實次呵責應不如上次約諸戒明三餘戒可解大妄中有三初三約所稱聖法次有五三約業次有七三約或業中身犯謂作書表已得聖身相者身現聖相口相者謂白衣言明日至汝家者是聖人身呪者謂符書厭禱表己得聖口呪者誦呪呪物令使受動身非威儀者兜身例懸服艾斷穀口非威儀者口誦自然經律言從佛出身耶命者端坐不動詐為聖相口耶命者言有天龍恆供養我次下約人以明初有三三對單提等次有三三約尼薩耆三默然者善解是非默忍所作名知默然未學比丘而默然者名不知默然學不悟者名癡默然次三三住者守戒而住名為戒住不壞正見名見住如結界攝衣得羯磨住名羯磨住離下三犯威儀違失名威儀住絶身語耶正命自居名為命住次對諍事有七箇三此中前三約起諍人下四約能滅人然七滅中唯現前自言通三位餘者局僧又四諦中覓局僧滅餘之三諍通三位滅餘相可解謂作三種羯磨治三種放逸人故名三種放逸羯磨次明三學除得於中文三初辨所學法體二糸時有衆多下約行以明除得三後有三學下釋學相別初文有二初有三學辨三學體次有三學就戒學中約行以辨初三學體舊解云始於外凡專加護持悟達生空資成窂固踰勝於前故曰增戒學四現理靜絶吉紛動定品成就之始故曰增心學入無相已吉證真空無漏決定明白故曰增慧學此解不然正違明誥次下文中即自分別如斯孟浪上下非一久無悟人流之遂遠次戒學三者習下三犯威儀法戒故曰威儀學善修初二對治之行名淨行學善識戒相輕重分明故曰波羅提木叉學次第二文除得有二初略辨三學修進除得第二爾時佛告下廣明除得前文有五第一比丘請佛佛教修學第二爾時下佛審比丘比丘答學除得第三爾時阿難下為好冠說學除得第四爾時世尊下對迦葉比丘以明讚毀第五爾時世尊下為跋闍子說初文有三一問二答三聞修奉然答中復三初若學戒二云何下明所學體學雖彰三行不過二故止行威戒門攝三彼增戒等明其所除調伏貪等以惑除故不造不善明不起業不近諸惡謂離惡緣次佛審文二初問後答問有其二問云汝云何學問其學法云何為學問學何祈答中亦二初若學法次若所祈謂求四果次為孔冠說文有其四初一問答明其制意次一問答問知無學次一問答飲知無學次明修奉次對迦葉讚歎文有其四第一愚癡不耳不信獲罪第二於是下法求悔謝第三佛告下佛受彼懺第四時彼下明其讚毀於中文二初對比丘明其讚毀有兩箇三謂上中下座次約喻明喻有其四一舉喻文二如是下合三是故下勸學四佛說下修奉喻文破戒比丘行不依理出言違教故喻如驢持戒比丘進止合法出言成軌故喻如牛如非並集故曰共行此破戒者亦自稱是比丘故曰我亦是牛而此淨穢不同念不相似故曰毛不似牛等然毛喻於戒腳喻於定音聲喻慧次合等文可知次為跋闍說如文次下廣明除得於中文二初約三行重不明證差別第二後有下明行滿不修證差別前文有三初明所學法體第二何等下約行修證除得差別第三修奉行中文二初約修證差別第二滿足下結前差別前文三學差別約人修證亦三初人純戒文有五句第一徵問第二重戒第三彼於此戒下明修戒行第四彼斷下五使明其所除第五於上下彰其所得第三修戒之中別有三句一犯輕戒勸令懺悔二於重戒勸使堅持三應親近下勸令修學初文輕謂殘等既非絶分勸令懺悔何以故徵此中下喻釋次文重謂夷罪犯即永障猶如破石既是絶分勸使堅持住戒次勸修應親近行是修方便不毀𨷂行根本行成不染污行後起清淨戒戒皆然常如是修習即捨惡業道加行根本後起次下五使者謂欲貪嗔恚身見戒禁取疑釋此五下二門分別第一釋名第二出體問何故此五名順下分婆沙四十九解云如是五結下界現前不界所斷結下界生取下界等流異熟果故名順下分後次下有二種謂界下有情下界下者謂欲界有情下者謂異生由初二結過患重故不越欲界由後三結過患重故不越異生故唯立此為五下分次體性者總以三十一事為體謂貪嗔在欲界五部即十身見三界見苦所斷為三戒禁取三界見苦道所斷為六疑三界見四諦斷為十二由此下結有三十一次所得者於上般涅槃不後還生欲界次第二人重戒及定除得如上次第三人具重三學除漏得無學釋相可解結中滿足行者結第三人不滿足者結前二人為彰隨因勝劣果必不虛故言我說等次明滿不修證於中文二初明所學法體第二修證差別約修三學人亦有三初人對有學三果除得有三第一證不還果釋相可解約行不滿不得羅漢次人其行更劣不得那含故曰若不能至如是處薄貪等三結是所除以欲九品斷六品故稱之為薄得斯陀含下是其所證但一來人天便盡苦證次第三人但證初果釋相可解問三結是何答謂身見戒禁取疑次敕二人如上如前初人次第三人如上若指此中初人云如上但證學果不得無學若指前文第三人為如上即得無學果究其大理後釋勝前次釋三學相別於中文二初釋三學次重解慧前文復二初總舉三學第二何第下別釋三學總彰戒相故曰具足相木叉據合法則故曰成就威儀懼輕若重故曰畏慎輕等輕重齊防故曰等學諸戒釋餘可解次文戒心如上釋慧有三一對五蓋二對六根三對七覺初五蓋中先約貪釋釋貪三對六句一觀貪欲有無二觀貪生不生三對貪過修二正斷謂勤斷二惡下四亦然合三十句次對六根先約眼根觀過亦有六句餘根類易合三十六次約七覺先對念覺文合六句略無第五句應云未生念覺當合㝵生此對覺支修二正斷謂勤修二善餘覺亦然合四十二次三聚是前三學別稱次明雜行毗尼三答非有言詞共相問若但為迷於律教每恆求解義同於問因觀文相忽然生解名為見若從聞生解名為聞若因心忍許名為忍若三使約傳教明三子對修行辨三病者初人福命俱盡敕二人俱不盡第三人福盡命不盡此一藉緣聽與隨意食等但以前機難識故三病人並悉通與瞻視供養知而作者解脫分明不知而作者雖作未了見而作者先本無心為見他作而作癡而作者一問愚法不取而作或身者身同作說口者謂口唱和與欲同事身口者兩業並為平斷犯罪序謂緣起制是立戒重制是隨結若犯序者謂與犯緣相應未至根本若犯制者正違戒本犯重制者如跋闍林中死尸轉想等隨違此三斷言是犯順三制意制入不犯三種淨者違三犯法三種不淨順三犯法聽不聽亦爾三辨者古舊釋云謂外凡夫淨持戒行事中無違未有勝行可彰就人受稱故曰比丘辨內凡已吉理解資成禁守根門離諸染著故曰不放逸辨得定道無作離過絶染名清淨行辨今解不然許其文意令無此義以對前文持波羅提木叉等名比丘辨善攝根門名不放逸辨行成離過名清淨行辨次捨戒制利各含多三次明增四於中文五第一明四大教第二爾時佛告下辨斷諍德第三子注此中下雜明衆行第四捨戒第五制利初文有五第一標法敕聽比丘樂聞二何等四徵三若比丘下列四差別四是為下結五度聞修奉初久欲使驗知耶正故陳四種廣說十誦五十八問佛何以說是四默印若欲說真實佛法相故來世比丘當耳耳知是佛說是非佛說是故說四默印何以故說四大印為成就大事不令諸比丘錯證故說四大印此四非廣以聞斯說皆須廣尋三瘡故曰四廣說次徵可知次列四說一從佛聞二從和合僧聞三從衆多三藏聞四從一三藏聞初文有四第一親從佛聞流通傳授第二若聞下若聞彼說不應嫌呵審定文句尋究三藏第三若聽下明尋取捨此中文二初文既與三藏不相應勸捨勿行次若聞彼下尋驗知是勸使修行第四此是下結次三句可解同前無異次結修奉如文次斷諍德文有其二初一四句明德優劣次有五位四句明失多少五位四句者一無慙有慙二破戒不破三破見不破四破正命不破五破威儀不破各以諳經文不諳配初一廣文餘四類易但以內無慙恥後有情過須呵不諳經文非己力分無其情過故不須呵次明雜行前非法起事者謂舉罪人雖有三根內德不具舉不知時因生忿競故曰前非法作後非法作者衆僧見他舉得殘等及夷不教懺滅而信故曰後非法作下三句准釋可解次明四種利法初列章次依章解初章分二第一明非法求第二有所偏為下明非法與求不應法廣生罪纍名非法求非直求時非法施時有所偏為等後招罪咎名非法與與中文二有所偏為總舉籌還人物是非第二取是下正明非法施就中有三初有兩對四句屏處簡物好惡多少次取是來下兩對四句索物將詣僧時簡其好惡多少次與此下三對六句正行施時簡擇人物此中有二前之四句簡物後之兩句簡人餘下三句准類可知沒受戒師德有四箇四持律亦爾四犯畏中文二第一總舉第二別釋釋中初畏文三第一舉犯治罰喻第二智人見下明能畏喻第三此是下結初文有三第一與犯為喻如是男子喻犯戒人被髮著黑衣喻三根外彰持刀喻犯夷罪為犯此罪同於死人故以持刀來喻第二至大衆下自言引罪喻至大衆中者喻至僧中作如是言下正得自言隨僧驅擯故曰隨汝等所喜我當作之第三時諸大衆下治罰為喻取彼自言堅執不捨如似捉縛相似齊聲唱擯故曰打惡聲鼓結過屬彼故曰為現死相彰惡同知故曰順路唱令順其治法從右門出至淨衆前名至煞處作法除擯喻言煞之次能畏喻文中有二第一舉喻第二合喻喻中智人即能畏者見已已下舉所畏事我今已下自敕及教人不作此惡合中比丘比丘尼合智人於波羅夷法下合所畏事作如是念下合前自他不犯結中犯者是初文畏者是第二文第二犯畏殘罪次死未即傷人如合鞘刀打之喻覆藏等法第三犯畏輕微如林打第四最輕如似合掌三語布薩是對首清淨布薩是心念說波羅提木叉是僧說戒自恣布薩者以恣懺𠎝心淨故爾毗尼阿毗波羅妄語是輕心雜碎戲笑不實語四損法者智能耳法損壞愚癡據體是一隨用說四忍據內心觀照忍許親近即是進修方便能解謂是悟解諸法能斷便能決耳諸法四信法一息教化合信二餘比丘遣第三對住處與奪怖四對奪三十五事怖餘相可解次明增五為文分四一明師弟應不二有五種與欲下離明衆行第三捨戒第四制利前文總有六十箇五法此中位二前三十一約就受門明師弟應不次有二十九約就隨行如非應不前文復二前二十六正明和上兼依止及教誡師次有五五明弟子淨穢前中初二是聖餘通聖凡是中第二十一五一不具持二百五十戒二不多聞三不能教弟子增戒學四弟子有疑不能如法解釋五不能決斷諍事如是增心下更有五箇五於前五中餘四恆定常換第三謂以增心等五替增戒學廣說可知故曰如是五五為句如上望其增數總有一百三十究體不同但四十三次調順等總結既備上德心不剛強名為調順情不情憚故稱無畏能有宣坐之功故曰堪能語言自具此德後能教人方堪為師攝受二衆次弟子淨穢如文對此應解五逆義釋義三門第一釋名第二出體第三諸門分別言釋名者不釋文等別名但解通標逆無所言逆者違化故爾雖一切惡皆違佛化以違恩養損害德田此五最極標以逆名餘非極故隱而不說故婆沙一百一十五問云如前所說能礙聖道及聖道加行故名為障除此五外後有定威諸惡趣身第八有業及起增上煩惱害生亦定不能現入聖道如何此等不說為障若由此五業具五因緣易見易知是故偏說何等為五一自性故謂此五種性是決定極重惡業二以趣故此五決定於地獄受不於餘趣三以生故此五決定順次生受非順現受及後不定四以果故謂此五種定感世間極不受果五以補特伽羅故謂能造此五種補特伽羅又名無間者婆沙一百一十六問云何故名無間若由二緣故說名無間一現後二餘趣以捨此身次生即受定於地獄無餘趣雜又前卷云以於此中無間無隟可令樂受繫現在前故名無間又云依異熟果說名無間以諸有情造大惡業生彼地獄得廣大身一一身形悉皆廣大遍彼多處中無間隟故名無間如阿鼻獄縱廣八萬四千踰繕那還若一人或一切人入身皆遍滿不相障礙次明體性俱舍十八云此五無間中四身一語業三煞一妄語一煞生加行通論業體具表無表如戒體明次諸門有六第一定逆輕重第二明可懺不第三明受生後第四定業牽引第五明受果處第六定壽量時初門逆中破僧家重所以爾者以壞衆時極大誼授惱亂大衆應得聖得者不得應證果者不證應離欲者不離應漏盡者不盡不得誦持思惟三藏不得靜慮思惟諸法不得種殖三乘種子遍三千界法輪不轉展轉聲至淨居諸天令其覺惠不得安靜明了顯現若僧和合翻上諸事以損益大罪經一劫餘逆異此不輕劫住故俱舍十八云由此傷毀佛法身故障世生天解脫道故謂僧已破乃至未合一切世間入聖得果離染盡漏皆悉被遮乃至習禪溫誦思惟業息遍大千界法輪不轉天人龍等身心擾亂故招無間一劫異熟由此破僧罪為家大又於佛所起嫉妬心違害正法損惱大衆次出衆煞羅漢母父以母恩養重於父故德田勢力後勝恩田第二明懺不者此之逆罪依大乘中悉許懺悔以理深藥妙故或遇佛為強緣求悔心重如涅槃十九阿逸多犯三逆罪謂煞父母及羅漢已至如來所求哀出家如來即聽又如闍王入獄等於人中七日然准律文咸須滅擯以逆無初不對略辨由如外道煞父母已出家受戒佛言滅擯又此逆上所有五罪悉是第二而非是初破僧事雖是初得罪同勑二然罪佛制開有懺法三夷許學悔二蘭准十說第三明受生後者問如人犯多逆罪為當同順生受為後亦有順後受者答依一切有宗同順生受問如何多逆同感一生若雖同一生受苦不等故正理四十三云謂由多逆感地獄中大柔耎身多猛苦具受二三四五倍重苦又婆沙一百一十九云由一無間墮地獄者其身狹小苦具不多苦受現前非極猛利乃至由五墮地獄者其身廣大苦具增多苦受現前極為極猛利又涅槃十九空中告大王云作一逆者即便具受如是一罪若造二逆罪則二倍五逆具者罪亦五倍乃至王問汝是誰般答曰吾是汝父頻婆沙羅應隨耆婆所說勿隨六臣之言實論敕八問曰若人作一逆罪則墮地獄若作二三亦於一身盡受報不答曰是罪多故久受重苦於是中死還生是中烋法師解云成實論意具五逆者五劫受報劫劫之中五業俱受若依此解五逆俱通生後二報然從初受名名為生報若依正還部及經部具五逆者次第受五劫報初是生報餘是後報第四明業牽引者問如造五逆同感一生豈此五業俱為一引答隨造五逆初者為引餘者為滿不可多業同感一生故正理云唯一能引餘助滿故隨彼罪增苦還增劇又解如造諸逆破僧家重重者為引餘則為滿故婆沙一百一十九云如先破僧後造餘無間業彼後所造皆由破僧增上力故同招無間一劫壽果正若依量及經宗咎一劫報此之五逆總為引業以五逆人具受五劫第五受果處者破僧定於無間獄受故俱舍十八云此必無間大地獄中經一中劫受極重苦餘逆不必生無間中婆沙三十五云若斷善根諸無間業及餘破僧定於無間地獄中受若不斷善根餘四無間或於無間中受或餘地獄中受第六受時者准破僧一劫餘非一劫問未知破僧報是何劫若是一中劫云何知耶答婆沙一百一十六云或有說者是成劫後有說者是壞劫後有說者是大劫如是說者此是中劫由彼亦有不盡中劫而得脫者如毗奈般說提婆達多當於人壽四萬歲時來生人中必定當證獨覺菩提若爾如何經言壽量經劫世友解云雖減一劫亦名一劫如世間人於減一日住持所作亦名直日此亦如是次明隨行文有其五初有二五依止師攝弟子法二有十五依止須不敕八五不知諍者不識四諍體性不知諍起者不知諍根三性等不知諍滅者不知藥病相對滅法不知向滅諍者不知趣滅方便諧和進止增數總有五十體有三十五三有六五明失依止四有二五呵弟子藥五有九五所呵之病次明雜行和上有五法應懺吉者是四種中二種和上出家無心為法不衣食師既不能訓導應須懺謝而吉我如法不知者不知我行成立我不如法亦不知者不知白事違失等法若我犯戒捨不教呵不解呵責儀軌若犯亦不知不知犯相輕重若犯而懺悔亦不知不知懺院除罪之法毗尼五若者為求解故撿尋律藏未得決了義同於間觀五文中豁然生解以釋己心名之為答或可對事須決亦同於問披文生解稱之為答發起大律稱序大僧戒本名制尼律名為重制受等揵度為修多羅修部已下重牒解釋名隨順修多羅持律人有五箇五望體但十一初一五為五次三五各下一別第五五前三不同此五五中前四是秉宗律師下之一五是諳文律師比丘夏中不依第五持律提若比丘尼不簡第五但使夏中不依比丘安居者提次持律五功德五中分三初一自行次三迬衆二行既成便能持法是故末一興建正法行持行晈然不為緣壞故曰戒品堅牢惡能損善故名為怨內行晈然超勝於彼故曰善勝諸怨行既清淨情無怯懼故曰決斷無畏善識持犯決滯分明故有疑悔能開解以能持法自利利人故曰正法久住伽論第七以持律故一切沙門波羅門頂戴供養五種賊心縱業煩惱損他財者皆名為賊隨相別彰乃有二五無明䨱障不了所緣名黑暗心貪心乖正名曰耶心恚心損物名為曲戾求財違理稱云不善每規他物故曰常有盜他物心下五可知五種犯等如前釋被舉人有五事不應為解一罵謗比丘二作損減謂先利物令使損耗三無利謂未得者應得不得四無住處謂壞住處五若在下總明在界內外違七五行反上應解能舉所舉各自觀過如文開為義等五事毀呰不犯提罪次五種疾滅正法前三法主過下二受學者過次有六五損益相對言比丘有五法而自損減者以五惡法損減善法一有犯二為有智者所呵三得罪無量下從罪生罪四若受彼自言下正明治不如法罪不得脫五不知言說遠近損減謂應見不見等名不知言說作法治罰不與同法名近損減當來復有三塗苦報名遠損減翻此即名不自損減餘二五可知下有六經如上者謂指此文年少比丘對上座懺五法者謂是懺前威儀應說罪名下非五數限世賊有五長壽惡比丘亦有五法長壽不速為他所舉一無寺舍住處二有多聞智人作伴三多有衣等貨求四有勝人為友五處遠難知次舉他罪德行具者不生他語若不具德即生他語一身不清淨二言不清淨三命不清淨四寡聞不知修多羅五不誦毗尼翻前應舉次有二五令法住滅前五不敬佛法僧及戒定如文次五據其說聽然以法之興廢實在於人敬法傳通據受俱利五中初一是師下四弟子說法之人不希名利唯存出離即是至心若其專求名利不敬說者故曰不至心二亦不至心聽法意持三設後堅持不能思惟義趣四彼不知義不能如說修行不能自利五既不自利亦不利人並翻前說即是久住次有比丘清法世尊為說出離行文中初請次教後證說中先明五非彰通令弃一知世法者諸有漏業稱云世法縛在三有不能出離二知有受者受是三受從此三受以生三縛故曰不能超度三知有欲欲者耽滯於境既恆滯境豈得無欲四知有結者由耽境界便起業結為結嬰纏豈得無結五知親近生死者恆習業結輪回頗休此近生死非無親近應知此過是非法等次舉五如顯是令修一知出離者謂無漏業破有超升故非世法二是越度無漏一興縛因皆喪故非受法三是離欲除欲不貪故無有欲四是無結既無或本業結自亡故是無結五不親近生死業或既除輪回自息既無過患知是法等次後有比丘請法世尊教離過行文三如前說中先非後如五中貪嗔分二癡獨為一此約資具求用論之於未得財馳求無厭故是多欲不令少欲於已得財過分受用故是無厭不知足緣外資追具求起嗔故言難護不易被緣內資具追求憤惱故曰難養不易養不能覺察內外資具得未得財過失差別故曰愚癡無智慧此是過失行人應知故曰汝應知等次如釋相翻非應知次有四箇五句明說違順初五正說無過故聽次五非法有過故制第三三五句於前制法有違遮心第四五句於前聽法無過不遮於中初四二五相對明是二三兩五相對顯非初五為順句善字成其教詮說以為聽初句總舉法體是善無過故曰若我所聽次有三句離明所聽初句波陀舍提音不正正曰鉢陀此釋為跡如見象跡以表於象隨義譯之亦名為句謂舉善法句阿㝹波陀舍隨前分前句第二便闍那亦梵學士曰便繕那此譯為文謂舉善法字阿㝹便闍那亦隨分別字第三惡叉羅此譯字謂舉善法宕阿㝹惡叉羅亦隨分別別即是文西方俗語名惡叉次應如是作勸羅典語名便繕那然名句文中𨷂無名也名者梵云南摩如說行總別通論合成五句第二五中分文如上初句總舉不善法體為有過故故言如我所不聽次句談不善法句及隨前分別次句舉不善法文及隨前分別次句舉不善法及隨前分別次應呵等者總結惡法應捨勿行次二五准釋應知次入衆五法先修五法後詣僧中即能善肅物情和合大衆一應以慈心者若於善衆不起慈心粗礦惱僧豈能利物二應自卑等者心卑覽穢如拭塵巾顯彼無暇方嚴大衆三應善知等者立身行道諂慢須除坐起越儀衆聖為恥四彼至僧中等者道衆清虗須萗法語縱情雜說豈應僧儀五若見僧中等者法徒聚會和合為先縱見有非亦須忍默凡入衆者以此五法居心即能匡領衆徒紹隆真化次有亦經如上者如前自損減中六五以此文言後有五法在僧中應語故知此五對僧而說又言如上自損減中明知前約自行次明舉罪應不初五德一具持二百五十戒二多聞三善於語言四有修持五有智慧次五一有慈心二有利益三令增長四令懺悔五清淨次五取遮犍中五復有說者云更有四作五德謂心不善善等四常換前第五嗔恚不以慈心為五不善非毗尼世間作損減不應舉善是毗尼出世宿利益應舉今解詳其文意真以不善善等釋應不應不可展轉更為四五由斯義故五德差別此中有三五及前文身清淨等五總成四位五德不同舊解更取遮犍度中七位五德為十一直見文言如上遮揵度中說故作此言若其詳文審者理不合爾若牽說字屬下即無疑惑應言說有五非法舉謂非時等又可遮法中五總為一位更加不善等四今為七五釋應雖應又此四位五德中前身清淨等五及此初五望其能舉遠離嫌呵然前五是本此五即是前中差別又時非時等五及此有慈心等五望其所舉損益以明然前五是本此慈等五前中差別二位相攝准文可解又下增十及增十七中所列五德者皆取此中五德更無三別文五句語無第三者謂但得有時非時相對更無第三句亦時非時句故云無第三餘皆類然次捨戒制利各貪多五次明增六文有七六初一辨遮如非次一教誡尼德次一作疑惱次一六犯者然明了論有八緣起所生八中除去由心不由身語及不由身語心餘六者是然須取彼餘六以釋此文一有犯由身起非心口者如不閇戶共非大戒眠等二有犯起於口不以身心如善心為女人說法過五六語等三有犯從身口起不以心如善心為男女行淫使等四有犯從身心起非口如故心出不淨等五有犯起口心非身如染汙心對女人說淫欲語等六有犯從身口心起如有染污心為男女行淫使等然論文餘二者謂有從意生不從身口如心地諸罪有不從身口意生者如先對人說大妄語彼人不解此人已對治三方便後時彼人若追解其語此人即得波羅夷罪次諍根如上列次二六約盜業盜心明略無捨制二文次明增七總有十四箇七於中位五初有四七雜明衆行次有七七明持律德三有一七離慢如非次捨戒次制利次明增八總有八箇八位分為五初一遮法如非次一教誡尼德次一八不可過法次有四八明互治如非使伴之德次爾時下教僧撿驗罪之虗實有八馬八人及損益八喻合為一八若離便有十位增八就此驗罪之中文分為三一明德人依根舉罪第二當舉下正明諱罪嗔恚第三佛告下教僧撿驗持破相別此中中復三一教衆僧驗罪虗實第二爾時佛告下因前惡比丘生嗔故通舉八種惡人八種惡馬第三爾時世尊在拘薩羅下損益八事前文有三初對惡人教僧審問第二譬如下驗罪虗實第三度聞修奉初文以彼犯罪於佛法中無所堪任無所增長僧應審定問所犯相次驗文二初序次欲序有三喻第一田苗喻第二治穀喻第三井欄喻此以衆內持破難分故教衆生三喻撿驗此中各有喻合初喻四句第一譬如農夫與衆生為喻第二田苗等者與所撩理持破難分喻此中田苗稊稗參生謂持破苦住苗葉相類不別謂善惡相濫而為妨害謂惡損善第三乃至莠等以過彰顯撿得實罪喻第四既知非穀下撿得不虗作法除棄喻此中知已即除謂作擯罰何以故徵恐害等等釋次合准喻亦四可解次喻亦四第一農夫與衆主為喻第二治穀當風篩揚與所撩理淨穢難分喻第三好穀留聚既好留聚明有下惡撿得實罪喻第四其下秕等作法除棄喻合中略不合初餘三准類可解亦應合有何以故下徵釋無者是略次喻亦四第一譬如有人與衆主為喻第二須木下與所撩理好惡難分喻簡有德人共援佛法故曰須木作井欄護法行成理深津益故如於井德人護法又似於城舉心從此而起故曰從城中出執根決然故如利斧詣彼衆內故曰法彼林中一一取其白言故曰遍扣諸樹淨者言行相覆故曰實中者其聲真實穢者言行相違故曰害中者其聲虗㽄而彼空樹等者正喻好惡難分第三至於扣時等驗得實罪喻第四既知等作法除棄喻既知內空總舉其過即便已下正行治罰獲得夷罪須僧滅損故曰斬伐若得殘罪與別住等治故曰截落枝葉提悔三說名者粗朴望下二犯故此稱先可呵一說作法中易故曰斤剗吉羅心悔名曰細治令彼𠎝除稱云內淨衆無醜纍名為外淨既懺淨已堪護佛法故日以作井欄次合𨷂無初句餘可類知次偈文二初一偈半誦前喻合中第三段次兩行半誦前喻合中第四段次明惡馬惡人其文有三第一總舉二惡合聽二何等下別列二八第三我已說下總以結勸第二文中分二第一先列八種惡馬第二舉惡人馬喻法對顯此二文中各有其三一徵二列三結前三可解次解後三列八之中一一有三謂法喻合然喻中利如惡馬喻惡比丘授勒者喻舉三根與鞭者喻前言罪欲令者等喻前我不修合中直合其人自下諸喻同者不須釋異者須陳二惡馬中倚傍犯不犯兩轅三惡馬中而更癲倒地謂不肯懺自更增惡又惱五德故曰傷膝折轅四惡馬中而更却行者喻更反呵五德五惡馬中起非道者喻惡比丘作餘語若僧不列本罪折軸破輪者喻生嗔恚惱亂衆僧此一惡人正當緣起以因此一乘列餘七六中不畏御者喻前不畏衆僧亦不畏鞭喻亦不畏犯齧銜奔等喻不受五德語便捉座具置肩而去七中而更雙腳人云吐沫者喻前左抄衣等八中而更蹲臥者喻前彼即捨戒等次彰損益文分為二第一列其損益八事一一先審比丘所解後始為辨損益差別第二爾時下人有利鈍進退四階𨷂無捨制二門次明增九文有四九初一白衣家如非次一遮法如非次一捨戒次一制利次明增十總有二十箇增十位束為十初有兩位明其衣體次有兩位遮法如非次有一位教誡尼德次有一位明舉罪德以身威儀不淨等不舉應淨等應舉總成一增十無義可為多注言如上五法中說有人解云此中總有四箇增十一五如文第二五上四常定以廣誦毗尼替前第五即第二五復以堅住毗尼替前第五為三五復以善能滅諍替前第五為第五為第四五故言如上五法中說下復以常五德配前四五有四箇增十今詳文意全無此義如上增五文中總無廣誦毗尼堅住毗尼善能滅諍更替句法既無此文不可虗設注言如上五法者總指上文明應不應此之應不如前無異故云如上不是更有多五注言如上次一投等如非次一制次有四箇十雜明衆行次有兩位受戒師德後十中不知木叉者不知戒相輕重不知木叉說者不解衆法說之儀則不知布薩者不知對別懺除罪法不知布薩羯磨者不解衆法懺滅儀軌次有三位斷諍之德初十一不持戒二不多聞三不廣誦毗尼四不善巧言語令人易解五不能問答教呵令彼歡喜六有諍不善滅謂不解四諍用藥進不七不知木叉八不知木叉說九不知布薩十不知布薩羯磨次兩位十如文可解次有三位增十明諍生不生諍根非諍根破不破如文可解次增十一但有捨戒一門此中展轉亦含多種次增十二於中文二第一約諍及舉作一十二第二如是比丘和合歡喜下對除言諍復一十二前文復二第一正明十二第二是故優波離下辨應不前十二中有三初約諍根作三句次對滅諍有四句後以身清淨等五德配之即成十二初諍根文二先非後如非中文三先總舉數二何等下辨釋三是故下結辨中三疾滅者謂無貪無嗔無嫉妬此中念出離者即是無貪類前三法增長即是貪等以此貪等於修道者為害是故偏說次如類非即是無貪等增貪等疾滅如是便得和合不諍次滅四者是非相對初彼此不忍諍則增熾各懷忍默諍則消殄二若比丘下牒前不忍起諍應以七滅滅之此舉七滅總明應不不得見有七滅之言即云唯對事淨又不得見有五德之語便云唯對覔淨三若比丘下不共上中下座平宜四若不下不與持法者平宜次明五德初身不清淨及口合明次命不清淨及寬聞合明次離辨不知毗尼次勸知應不此下諸文但是勸知應不然亦十二數限此中文三初對波離勸知應不第二波離下問若應不第三爾時世尊下審比丘所解先解初文次前為對波離明其五德應不便即還對波離勸知應不是以文有是故之言此中有六句明其應不一有愛恭敬二無愛有恭敬三無恭敬有愛四無愛無恭敬能令捨惡就善五無愛恭敬亦不能令捨惡行善而彼衆中有所重比丘應舉第六總無上益棄之如惡馬波離聞此歡喜受持次問若有三一問答所舉事二問答所依根三問答能舉德次審解文二初明審解如文次審得解已勸令修學此中復二初勸修學汝等知我慈念說法應須修學我所證法第二若歡喜下汝既解意修學不應舉他於中復二一勸察應舉之法二若如是下還應舉不前應舉法有七一不令自惱二亦不害人三彼犯罪者不喜嗔恚四不結怨嫌五不難覺悟六自能除罪七能捨不善住於善法次量應不有其三句第一句於前七中𨷂一及第五雖復𨷂二猶益聽舉第二比丘作是念下𨷂一及三為具餘五益物聽舉義准若以一法為頭餘者相配二二𨷂之更成多句第三比丘後作是下七中𨷂五具二雖有四七以損物故不應舉義准為以餘二次第二二具之亦成多句次明言淨十二以體佛說和合修受於何學法中起種種諍語於中文三初明評四種法起諍為四句第二衆僧下觀過三句第三若作如是下滅有五句合成十二初四句者一評文義相應如僧尼五犯堅義者言文義相應治義者言文既分二義不相應因此執情遂生其諍第二評其文異義同堅義者言如飲用蟲水屏露二敷文雖少異而義是同論義者言文既是異義何得同因此執情亦生其諍第三評其文同義異竪義者言如滅年及受中開數胎等自行衆法損益六經文雖是同而義是異論義者言文既是同義何得異因此執情亦生其諍第四評其文義俱異竪義者隨立一義論義者舉異此决亦因此執而生其諍次觀過三者一觀諍是留難二後問下彰是可呵三次問下不能得沙門果次滅諍五句者第一付諍請滅第二彼比丘下受許為制第三若彼比丘下捨諍除滅第四比丘作下衆主謙下第五如是下明斷合法無可呵失次增十三但有所據障戒難說次辨增十七一身不清淨不應舉身淨應舉廣又二口不清淨三命不清淨四不多聞五不誦毗尼六不觀修多羅七言不辨了八於善比丘無慈謂於善衆作破壞意不應舉作文同前故言亦如是次復次下有四一有實犯二取自言三善能言說辨了四利益足前八為十二次復次下以常五德配之故成十七問第四不多聞第六不觀修多羅何別解不多聞謂不解阿毗達磨法相是非不觀修多羅謂不達經中合舉不合舉事問前位第七與次位第三俱言辨了異相云何解前位真據言音流澤未必稱機次位稱機授與悅契群情問第八慈心與五德中慈何別若第八謂於善家有慈德中慈心愍其所舉又問次位初實犯與德中實何異答次位初實是犯實德中實論是根實又問次位第四利益與德中利益何別若次位據自身無惱德中利是所舉次增二十二於中文二初約生善受戒師德次據滅惡斷淨人德前文十八法即為十八十九不知可懺罪謂不了知殘等可悔二十不知不可懺罪謂不識知夷𠎝滅擯二十一不知懺悔不悟解用藥分齊二十二不知懺悔清淨者不知藥病相對成不若覔此不聽度人反則為如生善聽度次斷諍中有二初有十一自行善成正是德體次有十一遠離譏嫌方能殄諍初十一者一具持二百五十戒二多聞三善解阿毗曇四善解毗尼五既是家主將除他諍不應更與他人共諍亦復不應堅住此事六應呵者呵七應教者教八應滅者滅次不愛等四故合十二次十一者一者飲食二衣鉢等三供給四入村五期要以此五事對其二家彼此各五合成其十上來都解律藏文竟律藏甚深冠群籍威德幽微總衆行能斷三結制心猿亦伏四魔調意馬我於往昔種善因今依像法入僧衆志在無上佛菩提故釋尸羅求解脫願此福業兼自他超彼迷津登覺路相續利益盡無盡流注將來窮不窮寶永六丑八月二日照山晃拜校小師照洲筆
