body:
  text: 次足食戒凡食資身令修梵行少則虧道多則增食貪故佛隨根將補有四謂從一摶至作餘法今第四人不作殘法貪心重食違教成𠎝別緣具五一是足食二足食想三捨威儀四無因緣謂除病及作法五更食犯提次下釋文犯相文五一為上行人說一食法二時諸病比丘下開病無足三時諸病比丘下開病人殘四爾時諸比丘下非殘制法五時舍衛國下違法起過初文有三一說一食法第二爾時下了前一食之制第三諸比丘下了前飽足之言初對上行人故說一食法然修一食必能省緣修道故言讚歎一食法第二文四一謬解聖教服下當法既𨷂食資致身損瘦二佛慈檢問三阿難具答四了前一食雖復一食要須飽滿次第三文亦四如前第二開病第三除殘各四如前不能繁具第四餘法文二初約僧食作餘食法文四同前然作餘法須具十緣一是食足比丘除未足者二在時中非儉午後三是時食除去非時四須體淨除去宿觸病殘見等故多論第七云若以不淨食不淨肉受不名受殘食法不淨食者殘宿惡捉共宿不淨肉者狗肉惡鳥肉等者第五手受露持在舒手肉第六言說謂言我已足食等第七所對比丘未曾成足第八自持取食第九說言我止汝取食之第十還本食主准文可解然僧祇十六云有五非法不名作殘食何等五離處離食離境界離申手離語初離處者若為作殘食比丘行時與噉食住坐臥時說殘食法是不名作餘三威儀互對亦爾二離食者不與噉作殘食即便說與不名作三離境界食放地作殘非手中四離申手申手外作非申手內五離語者如不作是言我手中鉢中食我今一切不須是殘食與長老是五非法不成反上五離即五不離其成就其五不離翻上應知五分第八云佛言應在食未竟比丘邊作殘食法食若無應在未食比丘邊作若衆中無未食比丘應近處不見若近處復不得者與應受具足戒沙彌疾與受戒然後於是人邊作諸比丘不知作殘食法白佛佛言持食著鉢中手擎偏袒右肩右膝著地作是言長老一心念我某甲食已足為我作殘食法彼比丘為取鉢問言是食與我耶答言與便為食少許餘殘還之若都不食但取已還之語言此是我殘與汝亦名殘食多論又云若比丘行洗口時有檀越與五種食比丘應食應行受殘食法不應住坐臥若住坐臥當知壞威儀不名受若以此為受者皆波逸提十誦亦爾問未知作餘食法竟得通餘比丘食不解但經作結成殘餘人得食無犯故僧祇第十六云從今聽一人作殘食餘人盡得食爾者如何多論第七云若一人受殘食法餘人食不成解多論法局對人餘人無法不得食僧祇直據成殘所以通餘得食次檀越食同前第五起過不知正食成足非正不成故云不知足食不足食又不知具幾緣作法成𨷂幾不成故言不知餘食不餘食戒本三句一人二食竟者彰己成足三或時下且舉食檀越食違而結罪次釋文二一解戒本三句二爾時尊者下問決足緣前文釋初可解次食者下釋第二句於中復二一者釋食二明其竟其食五者飯肉各二獨為一據此合離故有其五然論實體但有其三謂飯及肉如五生種次明其竟文中有二初釋飽足次明足緣飽足有二謂自恣及境界自恣足者要須飽滿境界足者受得多食望境堪足設食一口離處成足故觸惱戒開文云若不作餘食法不起不犯故知以境多故亦名為足若不爾者隨起隨食何須佛開次足緣有五一知是飯者謂知飯是正食成足二知持來者了他持來自作飯想三知遮者知多堪足遮後再食四知威儀者知行等四儀五知捨威儀謂離行至住等對飯既爾餘四類然故五分云於此五食一一食中有五事名為足食一者有食二者授與三者授噉四者不復受益五者身離本處須足食已釋第三句文言足食已捨威儀者彰足事畢不作等者違開結罪次問決文二一正明問答二明作法成不前文有二初約食五正犯足二佉闍尼下食不正犯足前文復二初約行威儀廣辨二約餘三類易前文有五一問二答三徵四釋五結第四釋中五食文五初飯有二句一約食飯犯足二約雜食餘四食犯飯既作頭有二餘四亦然此則成其五對十句其行既爾餘三類然此四十句計理亦足次約九佉闍尼食以彰犯相磨細末者謂非正食不正之末此佉闍尼食若未食五正不成足緣隨食無罪若食五正捨威儀己更食不正亦成其犯然油蜜犯者謂與時食雜也若其獨食是則無𠎝如十非中立和問言云何和答謂足食已捨威儀以蘇蜜等和酪一處得食不離波多言不得問言何處制答舍衛國不作餘食法中制以此證知犯者是和若其不和所以指同此制五分亦言以蘇等和酪次明作法成不文中四對八句初二愚暗相對次二恭慢次二道俗次二慳貪此中第六句在淨人前作法者成而有罪但以應對比丘故成就不應在淨人前失法故獲罪餘之七句不成獲罪失法故吉不成故提次境想者但有四句初之二句就正食上作初句心境想應過量提次句旦食稠粥而生疑心懷疑故食心輕獲吉問所以無第三句足食非足想答情迷無罪落在開文故開文言食作非食想不犯又解轉想容犯文無者略次之二句非正食上作初句久停薄粥見稠謂正以謂得吉非正無提次句生疑為異尼吉羅者同於多論論云此戒不共三衆不犯又解准五分云尼亦如是明則與僧同犯爾所以此文結吉羅耶答為彰離合不同且結小罪次開云食作非食想等者然雖是食一向作非食想故不受作餘法次非食者以體非食故不作餘法自取作者開前第五使淨人句若不置地者開前置地既不置地應在手及處若與他開前自捉他與己開前盡持去前八句中略翻其四餘開可知次勸足食戒別意者出家守行理益自他今伺不周使惡勸彼前既受勸人我俱損彼此無益故所以制問所以足離為兩戒答以自勸他兩緣別故又應解云多義差殊一起業不同謂足食貪心起勸足嗔心生二業具有異足食口止共身犯勸足口止作業假他身犯三開緣別足食病緣開勸足則無四食不食異足食要食犯勸足自身不食犯有斯別狀故不得合次緣有四一知他食竟二不作殘法三俠惡勸彼四前食成犯滿戒三句一人二知他食竟三若受請下違而結罪釋中初句別解餘二合明合中先出食體次正明犯八句之中初句情重二俱逸提下七緣差所以並吉尼為稀故且結吉羅開中餘句並悉反之唯前病句略而不反次非時食戒志食應時增其業行過時食者患纍道門既不順法損道招譏為過不輕故須聖制次釋名時者從旦至中食不生罪故名為時過午已去食生罪纍故曰非時是以處處經云中後不食有其神五福一者少淫二者少臥三者得一心四者無有下風五者身安穩亦不作病是故沙門道士知福不食翻成五過故是非時別緣具四一是非時二非時想三是時食四食便犯緣中難陀跋難陀因觀伎樂非時噉食逼暮方還迦留陀夷夜巡門乞驚恐主人乃損胎命戒本四句一人二非時三食四結釋中具解前三可知釋第四結罪句有四一時食二約非時三七日四盡形然盡形壽藥無失受分齊故約無病以解非時次境想五句開文者麥令皮不破者以是清汁無粗相故開五分第八云有比丘服吐下藥不及時食腹中空悶諸比丘不知云何以是白佛佛言以蘇塗身猶故不差佛言以𭏚身猶故不差佛言蘇和塗身猶故不差佛言以暖湯澡洗猶故不差佛言與暖湯飲猶故不差佛言以瓫盛肥肉汁坐著中以如此等足以至曉一切不得過時食唯中哯出為無粗相不犯見論若食吐未出咽喉還咽不犯若出咽喉入口還咽犯波逸提次殘宿食戒飲食長貪令人不節曰求濟命是曰沙門今乃故貯擬充後食所為垢穢立制防之釋名者今所食者乃是作餘餘故名殘經夜為宿是中四句一者殘而非宿謂此食餘貯充後食宿非同界但得吉羅二者宿而非殘貯宿非餘獲內宿吉三者亦殘亦宿謂得提吉殘宿故提內宿故吉四者非殘非宿謂清淨食別緣有三一殘宿食二知是三食即犯戒本四句一人二殘宿三食四結解釋可知結中亦四同前殘食永棄無心重食後遇緣得不名為殘五分二十二云有住處比丘大得菴羅果食飽以餘與淨人淨人明日持作羮與比丘比丘不敢食白佛言本不作還食意皆聽食無犯又僧祇云昨日殘食棄在石上及草葉上明日復入聚落乞食都無所得空鉢而出不作意還從本道來見本石上飯聚故在若有淨人當使淨人授已得食若無淨人者有烏鳥食處當淨洗却得自取食又云比丘晨起應淨洗手不得直粗洗五指頭復不得齊腋當齊腕已前令淨不得粗魯洗不得揩令血出當以臣磨草未灰若灰土淨洗手揩令作聲淨洗手已若更相揩者便名不淨應更洗若洗鉢已濕時重磨拭者名不淨當停使𤍜比丘食前時當護淨手若磨頭若捉泥洹僧草屣若捉盛蘇油囊當更淨洗如前若捉僧伽梨等餘衣亦當更洗十誦五十六比丘新勳鉢蘇著鉢二三過洗膩氣不淨便白佛佛言若一心三者洗是鉢名淨次不受食戒所以制者五分第八云世尊未制比丘受食食諸比丘各於知識家不受食食白衣譏云我等不喜見此惡人身著割截壞色衣者不受食食是為不與取又多論第八有五義故一為斷竊盜因緣故二為作證明故從非人受食得成受食不成證明所以聽非人邊受食者曠野之處無人故聽若在人中非人畜生及無知小兒一切不聽三止誹謗故四為少欲知足故五生他信敬心故謂以衣器等領納四藥故名為受別緣具四一是應可食物二不受三知不受四食成犯滿戒五句一人二不受三食體四除開緣五結罪釋中具解第二句中文二初明不受次明受法對此解義三門分別一明手受二明口受三二受差別初門有四第一所受食境第二所受食體第三受者業心第四受已失不初門境者通有其四故五分第八云舍利弗患風目連從龍取藕根與舍利舍利不敢食佛言聽從龍受食又聽猿猴授食又帝釋作一貧女與迦葉食迦葉觀知不敢食白佛佛言從今聽諸比丘從天受食又因鬼神請佛及僧手自下食比丘不敢食佛言聽從鬼受食又十誦五十八佛言從今日聽從非人受食食次食體者但應食者皆須受之故文言食者謂佉闍尼等又了論云物者有五種一依時量二依更量三依七日量四依一期量五依大開量此五攝一切物盡謂有噉食不生譏過又非自力遮防者聽不受食故十誦五十七佛言從今日聽五塵不應受食米塵穀塵水塵衣塵風塵爾者如何僧祇云若風吹塵坌草葉及食者一切更受答此文為淨人易得故須更受若淨人難得處亦開不受所以知者即僧祇十七云比丘欲食處當從淨人受若無淨人者當洗手令淨自取食氷雹亦如是又見論十六云若塵大可除去食不犯若塵細落不可除者應使人度若急病因緣大小便及灰土得自取服又十誦五十六佛言從今日聽擔食藏莫使人見若食當出道取一搦不受得食以經曠澤故次業心者要須具受儀軌舉器離地心境相應淨手仰受下文錯受不成者以無心故然心有其錯誤剋漫對境藥等思而可解又此文中受業有十前九據制後一約開單心成受者如五分云有諸長老比丘眼暗佛言應受草葉敷之以手案邊令食著上此亦名受又有白衣惡賤比丘不肯親授以食著比丘前地語令自取佛言亦聽以彼語取為受食母經第八有國人惡賤道人持食著地不過手中比丘白佛佛言雖非手受施心已竟可取食之十誦五十六有看馬人信佛法辦種種飲食入著僧前是人聞馬屋失火是人言大德自食我等有急事留食便去比丘白佛佛言信佛法人一心與若捨去便應食又了論云至邊有三一至身邊謂以食置比丘手中名至身邊二至物邊謂施至捉食或擔令比丘自取比丘手至食邊自取食名至食邊三至器邊以器貯食授與比丘比丘手不至食邊但捉器名至器邊僧祇十六明受法先列章本謂食上樹上井中屋上淨厨器受非器受床船乘心念受道路糧次依章解食上者若比丘食時風吹塵來坌鉢下草不坌食者得食草葉當受若坌草葉及食者一切更受若牛馳等塵坌亦爾若畜生振身塵來若作意受者得名為受若衆鳥塵女人行衣曳地塵亦爾若淨人行草葉時應語言懸放行餘亦爾若行果墮草上即轉去者不名為受少停者得名為受若大會時淨人難得比丘應到菜聚邊受行鹽飯亦爾若淨人舉不離地得名為受但非威儀比丘應語淨人汝舉離地授我若淨人小不能舉者應言汝稍稍分授我受羮餅等亦爾若受蘇瓮時繩著地者應語合是繩舉若淨人小不能舉者應教稍稍減授我如是一切若鐺鑊熱不得受者當以兩木橫置地比丘腳躡上當作是言受受是名食上樹上者淨人樹上食果比丘言與我果淨人即搖樹落果墮比丘鉢中者得名為受但非威儀若以手腳等下果時果觸枝葉比丘當更生心言受受得名為受淨人食豆時比丘欲得即從索作是言與我豆淨人不與比丘劈淨人手寫著衣裓中言受受得名為受但非威儀是名樹上井中者諫若比丘住處井水滿無淨人比丘自抒井欲井中食淨人應盛飲食著一器中以繩紐繫下食時井底比丘應語淨人言下繩手捉若井股邊有生草木者應教令避下至井底已比丘應一手挽繩一手承捉作是言受受是名受若井水清者自得取飲若濁者語淨人言持新淨瓮紐繫下水如上說是名井中屋上者諫若無淨人比丘自覆屋上下難廢作即屋上食者持食著器中上比丘下長竿拘語淨人著是拘上作是言受受是名受下繩亦如是是名屋上餘相准知不能繁具次失受不者然失受有三一任運失謂受食時至過午後即任運失餘二越分齊盡形壽藥雖無分齊然約無病以結不應二遇緣觸失如受食已為淨人觸即失受法准明了論不住自性人亦成觸食不住自性者謂十三難三舉滅擯應滅及學悔人三者變生作熟失可解次明口受此部無文准義應有以非時等藥許經時服若不如法豈得久延故十誦二十六波離問佛時分藥七日藥盡形藥是三種藥舉宿惡捉得口受不佛言不得是三種藥手受口受不病得不佛言不得若病得服不佛言得以此證知為加口法故須問淨及病若直手受豈問病不又復多論前七日藥戒亦云口受文如上引既准文義知有口受釋此口受四門分別第一所對受境第二所受藥體第三受者心業第四受已失不初門境者是道非俗道有具非具形報等可知次明藥者藥雖有四論其口法局下三藥既下三藥加其口法藥體必須清淨無過謂無二內自煮惡觸等諸罪及受已停過須臾復體變改者皆不成受問所以時藥不加口法答時藥唯聽時中服用時中是近不失手受既不失手不須口防但以非時等藥服許長時故加口受以延手受次明心業心有尅漫錯誤且心尅漫者標名作法要尅方成於同藥中漫亦通得論其錯誤者是則誤成錯不成同異之藥准義應知業者對藥加法差別各殊具緣如非思而可解次受失不者若被淨人觸受法即失故多論云觸已更受故知失受問觸既失受何用口為答口防任運不防遇緣以遇緣強故不防也又以時藥無任運即不加口法明知防任運不防遇緣又解遇緣無過口法不防次明差別五門分別謂境藥防生及強弱言約境者手是異類不通同類以同類中宿觸緣等口唯同類不通異類以秉法故異類不成又復口具二境謂同異類手但一境謂唯異類次約藥者藥有淨穢手受皆成口受持開故唯局淨如功德衣要即日來應法又時藥一種唯手非口餘之三藥通手及口次約防者手但防兩謂不受惡觸手後即失不防二宿及非時論其二煮復非對除以此手受但二故少口法通下三藥對三說者非時亦防二罪謂不受惡觸此防任運失受惡觸不同手受防一往不受惡觸此義通下二藥但至明相故無二宿二煮亦非對除故不防也七日防四以經宿故更加二宿盡形准此亦防四罪或防二煮至下文明次約生者時藥唯手受手正生殘義兼惡觸以任運失受便有惡觸過生下之三藥由口生者正是非時長及無緣服吉故言非時過非時七日過七日盡形壽藥無緣吉羅亦義兼明相出時殘宿惡觸雖明相出後更有餘罪然並不由口法而生次強弱者具二義故手強於口一若不手受不合加口二以手受是根本故又解口受亦具二義得名為強一若無口法加延手受過時即失不得長時二以口受防過多故此則二受互為強弱次下釋文可知結中四句同前次索美食戒出家理應捨諸美味耽求好食惱物增貪別緣具四一是美食二自為己三無因緣四食便犯滿戒四句一出四種美食二能犯人三如是下無病四自為下索而結罪釋文可知尼乞義稀故犯可呵此之吉羅結方便罪五分第八開云若為病比丘索若從親里家若知識家索比不犯次與外道食戒異學精疏不知恩分雖得飲食反生誹謗又此邪人輒自與食謂是勝田比丘不如故五分白衣云沙門釋子尚供養外道我等何為而不奉事別緣具六一是在家外道古舊釋云是出家外道甄去在家外道白衣犯輕故爾所以然者出家名同真僞難分容生惑倒故制得重在家白衣道俗位別不生人惑所以犯輕此釋不然詳其文意唯是在家故言時彼乞兒衆中有一露形外道家女顏端正又次緣云時彼會中有一梵志既在乞兒會中定非出家者由緣如此故戒本中云外道男外道女以此故知唯在家者然廣釋中云波私波羅闍者在此衆外出家者是准此即通出家外道然以此名懸牒解釋緣起戒本二處俱無不以此故證是出家者若准此義對尼別者此唯在家尼通出家及在家白衣僧祇三十八亦云在家俗人及出家外道又解准廣解文亦通出家者故多論第八云若自手與一切九十五種異見人食不問在家出家裸形有衣悉波逸提准此但是外道皆犯不問在家出家尼若據文唯是出家外道及白衣以此故是緣異亦可義通在家外道以與白衣亦犯故是緣異二知是三非親除父母四是食除衣衣犯小罪五自手與除置地遣人六領受即犯緣中不呵者以無情過五分中佛亦種種呵責滿戒四句一人二外道男女三自手與食四結罪解釋可知尼是犯同緣異且結方便吉羅次先受請已前食後食詣餘家戒既受他請赴須及時輒別經過往不齊集僧既未盡不得設食稽留大衆食不得足惱衆不輕所以聖制別緣具五一先受他請二不屬授三向白衣家四除因緣五入門犯戒本有三一略結前食二次明隨然隨有兩一者隨結二者隨開隨開有四一開屬授二開病時三作衣四施衣或可更加衣時為五廢立開合如別衆明三滿戒五句一是比丘先受他請二食前食後詣餘家三不屬授四除開緣五結罪餘時者下誦前第四句釋中具解餘比丘下釋第三屬授句凡屬授者要屬界內同受請者不同非時展轉相白故母經第七云若無檀越請不語比坐得入聚落乞食無過若受請者不語比坐去則有過後食時亦如是若比丘下解第五句於中文二一失屬分齊二若比丘結罪前失屬授細分有七一欲詣村中道還失二不至所屬處更詣餘家失三至庫藏失四至聚落失前第二句欲入村更詣餘家失此句至白衣家更入聚落義是相似綺文而已五至邊房謂是零居之所六至比丘尼寺七若即白衣家還出失此等失者謂在中前時促存護衆僧故佛制隨白處直往或別經過即失前屬若更往者應須重白不同非時入聚落中以時長遠不須護僧雖更經過不失前屬次結可知作白法僧祇第二十云長老憶念我某甲離同食行至餘家答言爾開中若無比丘不屬開至庫藏等五處所屬白衣家謂是本所屬處若衆多家敷座具者謂多家共作一會隨所至家皆是請處是故不犯次食家中有寶強安坐戒在家俗人耽欲之所比丘不應在中久住今輒居此妨彼邪心傷情不輕故須聖制別緣具五一是食家甄去斷淫家及俱受齊二是夫婦常所居屏處三無第四人四無因緣五申手不及戶處坐戒本四句一人二食家三有寶四結罪解釋可知次食家中有寶在屏處坐戒餘義同前唯是屏處有第三人為異次與俗女露處坐戒餘義亦如前但此犯及戒本彰其露處廣釋言屏理實非重物障故名露為離見聞名屏對前二戒受名不同十誦十二云隨起還坐隨得爾所波逸提若相去半尋坐一尋坐提相去一尋半坐吉不犯者相去二尋若過二尋坐次驅比丘出聚落戒出家出家理應存信守道先許後違惡心驅逐時節已過令不得食惱損不輕是故聖制別緣具六一是大比丘二先許他食三後違不與四無因緣謂有舉擯命梵等難五惡心驅出六相離見聞戒本四句一人二共至聚落期許與食三彼比丘下方便逐驅四以此下結罪以此因緣者謂以時過令不得食緣非餘者非餘不犯等緣廣釋可解次過受四月藥請戒居士雖復辦藥延僧然有分限理隨施心今輒過受長貪惱物敗善增惡故所以制別緣具六一是藥請二作限定三知限定四過限受五無因緣六食結犯緣中彰索是制之緣論其正犯要須過限問未知四藥之中過受何藥成犯答釋中但言藥者醫所教服理實通於三藥除非時以非時藥體賤除患義微過受義稀故吉如施一食處過受尚犯況過四月不得提滿戒六句一人二請四月與藥三無病下明受分齊四明過受五除開緣第六結罪釋中不次前二可知病者下解開緣句請者下却解第三句此中文四一者舉數二列四名三云何下解釋四請各有舉釋結四是中已下料簡四請謂初三兩請應四月受二四兩請應隨施受次彼比丘無病下合解四六兩句餘文可知次觀軍陳戒凡軍陳者丘刃相交實則敗損不輕戲則令心蕩逸故多論三義故制一為佛法尊重故二為滅誹謗故三為息諸惡法增長善法故下之二戒制意同此別緣具四一是軍陳二故往觀三無因緣四見便犯滿戒四句一人二觀軍陳三除開緣四結罪釋中略不解開緣句餘者具明初句可知次所觀中先解其陳次釋其軍軍中文二初列本數四軍故曰一二三四次一軍下解釋釋中四軍即為四段一軍之中有四箇一僧祇十八云四人護象足是名象軍八人護馬足是名馬軍車軍十六人護是名車軍步軍三十二人執持兵仗是名步軍次明純軍亦四箇純此為一數統收唯純無雜下之三軍以數非一故悉具有純之與雜此有八軍一純各一二軍中純四雜六三軍中純四雜三此中應可更有一句謂或有象車步文無者略或可亦得不須此句四軍中純四雜一都合總計有三十軍次彼比丘下解結罪句次有緣至軍宿過三夜戒前戒一往無事直見成犯此戒有緣聽至軍中開無直見過三夜犯別緣具四一至軍中已經二宿二第三宿不離見聞三無因緣四明相出戒本三句反釋可知次有緣至軍二宿復觀軍陳戒既也有緣聽至軍中宜應靜坐而復往觀過同於初是以須制五緣成犯一先在軍中宿二軍陳合戰三方便往觀四無因緣五見成犯戒本四句釋中不解第二句餘者具明解第三句中文四一解𩰖二釋軍三明力勢四論陳相次彼比丘下釋結罪句次飲酒戒酒性惛人猶如狂藥既失本志廣造𠎝違故多論第九云飲之者能作四逆唯除破僧三緣成犯一者是酒二無重病三飲之即犯犯中文二初至繞已而去神力伏龍為施酒緣二明日下飲酒成犯佛呵文三一失本了心呵世間毒龍害人宍身損處輕微名為小龍三毒煩惱害人法身毒中之極名為大龍今娑伽陀為酒所困不能入定發通降此小龍況能發無漏慧降彼三毒大龍若依僧祇以蝦蟇為小龍故彼文云佛語比丘是善來比丘本能降伏惡龍今者能降蝦蟇不答言不能此律准彼以衆鳥為小龍次佛語下顯酒多過呵次佛告下明師不攝呵戒本三句可知釋中酒者已下解第二句於中文二初列五酒如文第二木酒者下偏舉木酒料簡是非於中文四一列木酒差別有六二梨汁酒下雜醞方法三雜酒者下四句以是無醞成酒假無酒色香味亦不應飲四非酒酒色下四句假有酒色香味以非元醞成酒是故應飲良以木酒有濫偏牒解釋餘四無疑故不料簡次彼比丘下解結罪句五分有咽咽言此文略無十誦酒糟甜酒酢酒亦咽咽提不同此文食麴者多論云此麴以麥及藥草酒和臥之後乾持行和水飲令人醉也餘麴無犯次水中嬉戲戒多論四義故制一為佛法尊重故二為長敬信故三不廢正業故四為修正念故次具緣釋相可解次擊歷他比丘戒比丘縱逸輒相擊歷事微惱重故須聖制五緣成犯一大比丘二作惱亂意三手腳十指四無因緣五觸著便犯文相可解次不受諫戒人多迷己不自見過要籍良緣共相訓導然比丘此將欲作罪不從他諫損壞不輕別緣具五一欲作七犯事二他如法諫三自知所作非明前諫者是四拒而不從五隨作犯根本不隨語波逸提戒本三句可知釋中先解其輕謂自知所作是明他諫者非故作犯根本違諫突吉羅次明其重謂自知所作非明他諫者是故作犯根本違諫波逸提此中違諫並以識事隨作七犯皆獲根本次恐怖他比丘戒比丘理應遞相安慰今伺不周更相恐怖非直長惡亦廢修善損敗不輕故須聖制五緣成犯一大比丘二作恐怖彼意三以六塵等事一一顯爾四言詞了了五前人見聞觸知便犯不待前人怖以不怖犯相文三初怖佛起過佛顯三業俱惡此人反被拘執作其惡色是身業不善云我是鬼復作惡聲是語業不善此二惡業本由心起故佛呵言心亦是惡次帝釋護持三寶常謂僧中純善忽遇斯惡故驚訝云衆中亦有如是人耶佛彰此人耶佛彰此人現生漏盡故言此生得清淨法天帝讚佛佛顯無怖如文然此怖佛為過云然不須更問自言故直立戒戒本三句可知釋亦有三解第二怖法文二初列六事二一一解釋凡欲怖者要先言告然後方以六事示之餘文可知次過半月洗浴戒所以須洗者十誦三十七洗浴有五功德一者除垢二者身清淨三者除去身中寒冷病四者除風五者得安穩凡洗身垢事須應法故限半月過則成犯四緣成犯一曾前洗浴二未滿半月三無因緣四洗半身犯滿戒四句一人二明半月一洗三除開緣四結罪餘時下誦前第三句釋中不解第二句餘者具明可解伽論第三云頗有半月內浴不犯耶答有著雨衣浴若迷悶時浴不犯入水舉木因浴不若渡水舉浮時浴不犯若結安居已一月數數浴不犯過一月已半月應浴次無事露地然火戒火性焚燒事變無定既有斯損不可不慎又復然火詳聚多著俗話廢修正業是以聖制別緣具四一是露處二無因緣三然草木等火除炭然炭患微但犯小罪四燒便犯此中但制無事然火若壞地及生種上已制竟戒本六句一人二無因緣三自為身四在露地五教人業六結罪釋相可解次藏他比丘衣鉢戒輒藏他物容生盜心臨危事險可懼之甚又若被謗清白難分過損不輕是以聖制別緣具四一是大比丘衣鉢等二作驚動意三無因緣或物主慢藏為誡敕故或借他許或因此物有於二難四藏舉便犯戒本五句一人二出所藏之物三自作業四教人業五結罪下戲猶猶上惱亡言解釋可解次輒取真實淨施衣戒凡有受畜不應封著故作淨法令遣滯精物在彼邊取與須問不問輒取驚動非輕別緣具四一是己物二作真實淨法三不問淨主四取即成犯戒本四句一人二作淨法三不問淨主四輒取結罪釋中初句可知次解第二句因即便明淨施差別釋淨施義五門分別第一淨施之意第二淨施之人第三所淨之物第四明淨施法第五淨法失不初門意者凡淨施法為遣滯情常有屬他之心己無貯畜之過又異外道故多論第四云一切九十六種無淨施法佛大慈悲方便力故教令淨施是方便施非是真實次人有三一是施主謂通五衆故此文中備列如此又五分第九云諸比丘作念佛聽我等淨施便淨施父母兄弟姊妹以是白佛佛言不應淨施白衣應淨施五衆於五衆中取一人作多論云若淨主死遠出異國應更求淨主除錢及寶一切長財盡五衆邊作淨應求持戒多聞有德者而作施主後設得物於一比丘邊說淨主名而說淨法除不見擯惡耶不捨擯六罪人一出佛身血二破僧并犯四重於六罪中但犯一事亦不得作淨主但簡非如此人者作不論大小又五分云告諸比丘不應淨施與五種人一者不相識二者未相請悉三者未相狎習四者非親友同師五者非時類無此五法然後可以淨施與之復有二法不應淨施一者不能讚歎人二者不能與人作好名稱僧祇第八波離問長衣何等人邊作淨佛言於比丘等五衆邊作淨又問相離近遠得從作淨佛言齊三由旬知其存亡又問沙彌邊作淨是沙彌受具云何佛言稱無歲比丘名作淨又問若死云何佛言得停十日於餘知識邊作淨問此中淨主乃列五衆未知五衆互為得不答論其展轉物不付彼不生譏過互為皆得雖有此義論其大理不如當衆三二自為其真實淨必須同類以物付彼不同展轉又僧與尼無有互對作法爾者此是真實淨戒如何列其五衆以此故知二淨通五釋此是同戒通舉五衆據理真實必須同類又解下列二淨顯有輒不故使戒本通言五衆二能作淨人者謂比丘等五衆以內教攝故三所對作法人者若展轉淨各對同類若真實淨對施主作次約物者謂衣藥鉢及尼十六牧器寶亦合淨主非五衆為是以義中簡別而說然古師云如綾羅錦綺等一切重物不須說淨此義不然比尋諸文皆無開處若以重物即不說淨如十六牧藥豈是輕耶論量應不如上明訖次約法者一是請施主法大者須具威儀後申請意小者直請不須威儀論說淨法對物及境如常應知然作展轉淨法不得對施主面僧祗十九云不得對面前說淨施當餘人邊說淨施十誦十六云有比丘現前作淨與他衣已便不肯還即生鬪諍是事白佛佛言不應現前與又有比丘受他衣已便不肯還佛言是施不名真實為清淨因緣故與即時是比丘應還索取若得者好若不得應強奪取應教彼作吉羅悔過此是對首法餘文亦有心念法故五分第九云有諸比丘獨在房中有長衣不知云何作淨施以是白佛佛言應作遙示淨法應偏袒右肩脫革屣胡跪捉衣心生口言我此長衣淨施某甲從彼受用至十一日復應如前法次淨法失不者准祇但三由旬外即合失十多二文云出國休道擯舉命終咸失淨法次下釋文文中有四一舉二列物即付彼取與須問名為真實作法轉施物不付彼稱云展轉並是絶貪惠施名為淨施三解差別四是中下料簡次若比丘下釋三四兩句次白色三衣戒凡衣壞色應於道服復能內遣貪情外增信敬今著白色內外俱壞過損不輕故須聖制別緣具四一是三衣二是己物三是白色四著成犯戒本三句一人二示壞色儀軌三若比丘下以不壞故違教結罪釋中具解五分第九云若得新衣應三種色作識若不作識若著著提若不著宿宿提輕重衣不作淨者謂是點淨法僧祇十八若得青黑木蘭新僧伽梨等乃至覆瘡尼師壇不作淨波夜提作淨時不得大不得小極大齊四指極小者如豌豆若持呵梨勒醘勒阿摩勒䥫上研取汁作點淨不得並作或一三五七九不得如華形作淨若染㲲時有泥墮上若烏鳥泥足踏上即名為淨若得衆多雜碎物合補一處者一處作淨若各各別補者一一作淨一切衣乃至新紐揲亦作淨次故煞畜生戒多論三義故制一為憐愍故二為斷罪惡故三為長敬信心故別緣具五准上應知滿戒四句一人二故煞通自他業三所煞境四結罪釋中初三別解二四合解合中初列十九章次作如是下結罪次飲蟲水戒制意具緣並悉同上前據外用此約內用滿戒及釋可知僧祇十八比丘受具足已要當畜漉水囊應法澡灌行時應持漉水囊若無者下至受持多羅僧一角頭看水時不應以天眼亦不得使眼暗人看下至能見掌中細文者得使看水看時不得厭課當至心看不得大速不得大久當如大象一回頃若載竹車一回頃無蟲應用若有蟲者應漉水用多論第八器中粟無邊無量見已斷食經二三日佛勑令食凡制有蟲水齊肉眼所見漉水囊所得耳次故惱他比丘戒夫出家者應護物情忽以生年等六惱他比丘非直觸惱情深幾許不能崇道五緣成犯一是大比丘二作疑惱意三於六事中隨有顯示四言詞了了五前境知聞但使聞知即犯不不待惱與非惱戒本言少時不樂者此就惱者之意非待前人不樂方犯戒本三句一人二故惱他三結罪釋中解第二句文二一列生年等六章二次第舉章解釋次若比丘下解結罪句開中六事還次第開前五皆云其事實爾者謂前人實有此事復作實心利益彼意有復不開第六文言若彼為性麁疏不知言語者謂前問法人便語言等顯如汝言非我惱也或戲㗛等者通開前六次覆藏罪戒出家理應遞相發露今覆他罪令心不淨復令前人造罪滋漫彼此無益故須聖制別緣具七一是大比丘二犯罪謂夷殘三知罪四作覆心五不發露六無因緣下文無人可向說及有命梵二難七明相出滿戒三句可知釋中初二如文彼比丘下釋第三句文中有四一覆大比丘結罪二別二自覆藏七罪並吉三覆餘衆四境想四句粗罪非粗罪想謂向非罪迷故是以入開次減年受具戒年滿二十志幹成立堪能持戒及耐衆苦未滿與受損道不輕𨷂其進修故須聖制別緣具五一年未滿二知未滿三與受具四作和上五羯磨竟文中有四初度年未滿人二時諸童子下索食發覺三如來撿問四制不聽度此戒之中𨷂無呵者謂此已前未制年限為無情過是以不呵滿戒三句一出年限應受分齊二出犯人三知年已下明違結犯問所以言可呵廢故者答知年不滿不合為受勞僧設法愚教之甚故曰可呵廢也釋中初句略而不解第二犯人可知其受戒人下釋結罪句此中文二初約四心定犯不犯二彼比丘下明輕重分齊前文有十六句但和上有四心知謂疑不知知者了知不滿謂者雖年不滿覩相作滿想疑者猶豫不決不知都無所知僧緣彼境亦有四心今將和上四心一一歷僧四心四四故成十六此四四句中初三兩四和上犯提二四兩四和上不犯僧四四句各初三犯吉二四不犯但以和上是主知疑得提衆僧非主知疑犯吉餘想可解不犯中聽數胎閏等者此謂元受之時計俗年滿後以日月不足生疑故開若其元受俗年亦少者即是知年不滿無有開理故多論第九云要數日滿為年下不滿得戒者以母胎足也准此如似一人十二月三十日生至年二十正月一日受戒者計實日月始十八年餘有二日猶少七百一十八日不滿二十然開胎者胎中有九月計胎九月日須滿足為有四箇小月缺四日更加四日即是九月四日實日但二百七十次開閏者依俗歷法十九年為一章章有七閏今十八年閏不滿七但得六月餘十九日其中有三箇月小缺三日實日有一百九十六次開十四日說戒者一年減得十八日計十八年總得三百二十四日此之三位猶未重除小月及開十四日說戒已得七百九十日於中除小計用七百六日足前得滿二十餘有八十四日在若將此日更向前開是則俗年不滿受戒不得或可當受之時俗年亦不滿但覩形相迷作滿想更取前日向前開得復應重計前七百九十日中小月及閏十四日說戒除之諸德計數各異不同文省義周勿過於此次發起諍事戒凡諍乖理衆已殄除輒便發起令更增熾此則自懷惱僧故須聖制別緣具五一是四諍事二僧伽法殄滅三知如法滅四輒發起五言章了發起文言不善觀者言僧不識諍起因本故曰不善觀觀謂觀察若作如是觀者不成正觀不善解者言僧不識七藥是非故曰不善解解謂決了若作如是解者不成正解不善滅者言僧不識以藥對病殄滅儀軌故曰不善滅滅謂除殄若作如是滅者不成正滅故曰不成滅此之三句發起皆提滿戒四句一人二知是四諍事三如法滅已四發起結罪釋中具解然二三兩句不次彼比丘下釋第四句文中有五一發四諍提罪二起餘諍五分第六若僧不白二白四羯磨斷事而發起者吉若發起私事吉三自諍四餘衆五境想此之境想若對七藥及藥病相對各合有四句文無餘二者略也次與賊期行戒盜賊傷人王法所禁輒與同行還同賊相此則清白難分醜纍佛法敗損不輕是以聖制別緣具七一是賊二知是三共期四同一道行五不離見聞處六無因緣七越界便犯滿戒五句一人二知是賊三結要四同道五結罪解釋可知次惡見違諫戒欲是生死之源障道之本不應說是非障道法然此比丘耶心倒說倚傍有濫須僧設諫故五分第八諸比丘復問汝云何作是解答言此聞有質多須達多二長者及諸優婆塞皆在五欲為欲所吞為欲所燒今得須陀洹斯陀含阿那含道又諸外道不捨本見於正法出家亦得四沙門果以是故我作是解所作違理名之為惡耶心穴徹目之為見固執拒僧名為違諫別緣具四一耶心正說二僧如法諫三拒而不從四三羯磨竟科解同前不能重述然阿利吒耶心矯說望人生信故言此是真實餘皆虗妄次隨順惡見被舉比丘戒制意有二一須舉意者欲性違理於道為灾今以耶心說言不障此則自壞損他增長生死於正法中無所任用故須衆僧舉棄衆外令使思𠎝改過從道次不聽隨順意者然此比丘生耶謗佛僧本舉云令絶化導理應同僧勿與來往今輒隨順令彼惡僧復自壞行不能長道情過不輕故制提罪別緣具四一是惡見舉人第二知是三無因緣四隨順同事一一結罪犯相文四一舉惡見比丘是所隨順者二呵不捨三作法治舉四隨順起過滿戒五句一人二知是惡見舉人三未作法者謂未與解舉四如是下牒惡見人隨順同事五結罪釋中前三可知第四句文四一解惡見二明不捨三供給四止宿此中四句顯成室相開中九句不成室相餘戒定室皆不及此若比丘下釋第五句五分隨久近共語語語波逸提共坐坐坐提共宿宿宿提共事事事提次隨順被擯沙彌戒制意具緣並同前戒問所以沙彌作擯名者答夫欲入道要須有信今以耶說懷其信心若不重加擯名無以怖之從道又須共行不淨情過不輕然行不淨者謂是漏失非淫若是淫者應須永擯何有設諫不聽隨耶又伽論第二云彼若懺悔者還當攝受犯相文四一違諫不捨二呵所不應三作法治擯四隨順起過初文復四一說欲不障為諫所為事二呵責三設諫四拒諫滿戒五句一犯人二明沙彌說欲不障違諫儀軌三彼比丘應語下正明治擯言三宿者謂第三宿明相未出無上二三同宿事故曰無如是事汝出去等者結成其擯四若比丘下隨順起過五結罪釋中除第二句餘者具明次拒勸學戒凡欲起行不能自成要藉良緣方能進業今既良緣勸進理應順從意欲為非拒而不受故作是言我今不學此戒當問餘智慧持律比丘即是輕蔑勝人無心進善於道無益故須聖制別緣具五一作不學意二前人如法勸學三作不受意四無因緣五言了犯戒本四句一人二前人如法勸學三如是語下不受結罪四開不犯若為知為學應反難問又下開云彼比丘癡不解又云其事實爾事實者謂前勸人非理更須咨問勝德釋中不解開句前三具明次毀毗尼戒戒為滅惡之源衆善之本理應讚歎令法興顯今反毀呰廢人誦習敗損不輕是以聖制故多論第六云與諸比丘結戒者為尊重波羅提木叉故為長養戒故為滅惡法故別緣具五一是毗尼二前正誦時除去未誦誦竟三作滅法之意四發言輕呵五言了便犯戒本三句一人二前人誦時三作是語下舉其呵意結罪所以須呵者以說此戒時令人惱令人愧令人懷疑也次釋具明然說有自他誦亦應爾文中據總但言誦時問何以呵戒罪重餘二輕耶答多論有五義故罪重一戒是佛法平地萬善由之而生二一切佛弟子皆依而住若無戒者則無所依三一切衆生由戒而有四入佛法之初門若無戒者則無由入泥洹城也五戒是佛法之纓珞莊嚴佛法是故罪重次不攝耳聽戒夫論解者不能自生要假說聽方能開悟今乃癡心怠法不肯聽受不知耶正豈達是非事等面墻無由進道失利處深故次聖制別緣具四一是廣說戒時二者身在衆坐三作不聽之意四說竟便犯隨其中間一一戒不聽者吉戒本四句一人二將說戒時自言始知三餘比丘下證其久知若實久知而言始知者犯妄語提罪若實本來無知無解無妄語罪有不聽法𠎝四彼比丘下結罪屬彼由不聽故不識戒相故曰無知無解雖無知解以識事故隨作犯根本故曰若犯罪應如法治五分若比丘與比丘受戒即應教為廣說若二若三於說戒中坐若知若不知作是語波逸提於根本罪緣而不了復有無知之𠎝故曰重增無知罪語言下顯不聽過辨相具解謂犯根本及無知罪外復有不攝耳罪故言重與不與者吉謂是秉衆比丘亦可得名以不用心聽法無知波逸提次同羯磨賞物已後悔謗僧戒多論云與諸比丘結戒者為滅鬪諍故為滅苦惱故為得安樂行道故別緣具四一是僧物此是僧得施物非是常住常住物者不合賞知事人故祇云僧物者僧伽梨等一切應分物二同作羯磨賞知事已三悔反謗僧四言詞了了戒本三句一人二同作羯磨賞僧知事三後如是言下謗僧結罪釋中不解第二句釋第三句中文三一親友二僧物三結罪次不欲起去戒如法僧事理應詳遵今輒捨去令不知合惱衆不輕是以聖制別緣具五一如法僧事簡非法二知如法三不與欲四輒起去五霍腳出門五分第八云僧斷事者白羯磨白二白四羯磨若屋下羯磨隨幾過出一一皆提若露地羯磨出去面一尋波逸提若神通人去離地四指提若僧不羯磨斷事出去吉羅若私房斷事來而去吉羅滿戒三句一人二僧作法三不與欲下去而結罪釋相可知次與欲已後悔戒先知僧事如法已與欲訖後以偏私之情輒便悔反同惡相朋增長生死惱衆不輕是以聖制別緣具四一是如法僧事二已與欲三輒悔反四言章了戒本三句一人二如法與欲已三後悔結罪釋中具明次屏聽四諍戒凡是屏言多隨情欲意在鬪亂輒往盜聽過是不輕是以聖制別緣具五一是先起四諍事二前人平量三作鬪亂意四輒往盜聽不令彼覺五聞語便犯問盜聽結罪既在聞時何以戒本云聽此語向彼說答此就聽者本意欲向彼說理實聽時得罪不待彼說若向彼說便是兩舌戒收又問何以此戒聽時即犯前兩舌中要向彼說解前戒先未有諍聽時不犯以聽之時未定生諍此戒先有諍事往聽即犯以聽之時必生諍故戒本三句及釋可知次嗔心打比丘戒出家理應齊修忍行和合相得不廢正業今以嗔心打他具戒逼惱情深故須聖制別緣具四一是比丘二起嗔恚三作打意四著結犯問此打比丘獲以提罪如何大集經云打罵出家人過出一萬億佛身血答經據違理故重律就違教故輕又解律據同類相打制以提名經就俗打上尊所以罪重猶如凡人相打即輕打文即重故此亦然結意異故餘相可解次手博比丘或前戒限分中制著始成犯此戒深防中制博擬獲𠎝祇律十八云六部比丘以側掌刀疑十六群作是言我以掌刀斫墮汝面彼恐怖故即便大啼文相可解次無根僧殘謗戒制意等同前大謗戒本五句一人二嗔心三無根四舉殘謗五結犯辨相之中略不解第二句餘者具明謂初三別解四五合明亦應具舉六心防巧及書使手印並同其前假根理犯文中略無次突入王宮戒王者自在婚會無時輒入宮中共相逼斥彼此懷愧殊非所宜情過不輕是以聖制過如下辨別緣具五一是剎利王二王與夫人同在一處三未出未藏寶四無因緣謂有奏白被請難等五入宮門內犯五分雙腳過提隨遠近步步提犯相文四一以施佛飯故獲得現報為夫人二在高樓上下報恩致敬三還至宮下化王生信聽諸比丘入出宮中第四時加留下正明其犯第二致敬文中有其三句初因致敬便問因果四句疑事第二爾時世尊下廣為解釋今生信樂如是末利下一一結示三爾時末利下聞法領悟受道獲益乃至二三歸三寶者但是增其善心戒不重發餘文可知戒本四句一人剎利王甄餘小者三王與夫人同是一處四而入下結罪釋中具解多論第九云其進御時所著寶衣輕明照徹內身外現以發欲意未藏此衣名未藏寶又女為男寶夫人未以餘衣覆身亦名未藏寶五分云寶者所重之物及諸女色皆名為寶未出者女在宮中未出未藏者女在此宮未使藏隱次捉寶戒前三十中為畜故捉此不為畜直捉故犯制意同前然遺落者好惡難知雖為還主終招譏謗又取此物容生盜心禁微防著故須聖制別緣具三一是寶物二除藍中及寄宿處三捉便犯古舊諸師皆云若非遺落捉犯小罪者不知依何理教故作此言理實此戒且寄遺落為緣一禁已後是寶皆斷然非遺落即許捉者何因對事別開藍等以此例餘同該禁限然餘文中正以他寶為緣又多論第八云若僧㰚墻外復非白衣住處不應取又第五云若捉他寶自說淨寶得波逸提一切錢若他錢若說淨錢捉得吉羅十誦第十五云是中犯者若比丘捉舉他錢金銀車𤦲馬瑙琉璃真珠波逸提若比丘有似寶物作男子莊嚴具女人莊嚴具器杖鬪具捉舉是物波逸提捉為珠突吉羅彼文若非他物卅戒收前戒金銀獲提錢但得吉滿戒五句一人二所捉寶體三自他捉業四除開不犯五結罪次若比尼下誦前不犯句作如是緣者謂是開緣非餘者唯藍內及宿處不犯餘者總犯故云非餘釋中不解三五二句餘者具明僧祇十八云若塔園內見寶淨者自取若不淨者使人取舉作念有主求當與作如是念不異佛生時等大會諸人忘嚴具種種諸物比丘見者當取應唱令問此是誰物若是主者與若無識者應懸著柱上顯露處令人見之若有人言此是我物應問言汝何處失答相應者與若無人識者應停至三年已若塔園中得者即作塔用若僧園中得者當作四方僧物用若是貴重物寶瓔珞金銀者不得露現唱令得寶比丘應審諦數看有何相貌然後乃舉若有人問我忘寶物有見者不比丘應問汝何處忘汝寶有何相貌若不相應者語言此僧伽藍廣大汝可廣求若相應者出寶示言長壽此是汝物不若言是不得於一人前與應集衆多人教言汝歸依佛法僧若世尊不制戒者汝眼看猶不可得乃至廣說若無有人來者至三年如上隨所得處當界用之次非時入聚落戒時為資身事須往返非時遊散妨廢正修此則招譏不輕故須聖制別緣具五一是非時分二往白衣村三無因緣謂有啓白請喚難等不犯四不屬授五入便犯滿戒五句一人二非時三入聚落四不屬授五結罪釋相可知若有三寶等事無比丘白者直去不犯多論第九入聚落內時若總白入聚落後到隨意所至若別相白若先不白隨見異寺比丘白無犯五分第十云若行路經聚落若暮須往宿若八難起不犯此文除道由村過次過量牀戒坐臥高牀增貪長慢既乖法式制不聽為別緣具五一牀二為己三自作使人作四過量五作成犯戒本三句一人二示作法三截竟下結釋相可知多論云八指者一指二寸也所以不入捨墮者以截斷故截使應量入僧中悔五分亦云應先截然後悔過僧祇二十開福德舍中牀高無罪次兜羅綿紵牀戒多論第九云兜羅綿者草木華綿之總稱也以是貴人所畜故又人所嫌故喜生蟲故又若臥耎暖上後得寒及粗鞕時不堪忍故別緣具四一是兜羅綿二為己貯牀三自作使人作四成結犯戒本及解可知五分第十云若不壞坐坐波逸提若臥若臥波逸提若他與受波逸提要先棄然後悔過若不爾罪益深次骨牙角作針筒戒物小費功招譏損業長貪違教故須聖制別緣具五一是牙角二作針筒三為己四自作使人作五作成結犯戒本及釋可知五分云亦應先壞然後悔過尼多在寺不喜遊行作之義稀故犯小罪次過量尼師壇戒此下四戒制等並同實以信施之物用須節量趣得資身長道而已今作過量患纍處深壞行不輕故須聖制五分第十居士呵云大德何不稱身作之雖不出家財豈應不惜釋子常說少欲知足而今如此無沙門行破沙門法別緣具五一是尼師檀二為己三自作使人四過量五作成犯尼師檀者是梵言故言自今已去聽諸比丘為障身障衣障臥具故作尼師檀若其從用名為坐具五分又云不應不敷坐具坐僧牀蓐犯者突吉羅十誦五十八佛聽畜尼師檀為愛護臥具故無尼師檀不應生僧臥具伽論第六亦爾又十誦五十九云師檀法者比丘不應受單尼師檀先受尼師檀不應離若離得吉羅母經第七尼師檀不得裹木土護尼師檀法如護身皮戒本三句一人二出量之分齊三量過結罪磔手大小如上明訖坐具作者有師云必須先依小量後更別增半磔若不爾者即同跋闍不割截淨今釋不然先本小者不可棄之故須舊上別增半磔若更別為即須通計不勞先依小作後更增新爾者如何成割截淨答跋闍過量不截不淨截却始淨名割截淨故五分三十立非云作坐具隨意大小淨又復三衣割截聖教示有軌儀此若割截同衣何不顯其修數又此割截坐具皆無至教可憑若以不截即同跋闍所以彼殄非中指同此制此制過量不論割截故文六群便多作廣長尼師檀戒云若過裁竟提餘相可解次過量覆瘡衣戒五分亦云今聽諸比丘護身護衣護僧坐蓐故畜覆瘡衣用細滑物作餘相可知次過量雨浴衣戒此衣障身浴多論云昔有羅漢比丘浴有一比丘見其身體鮮淨細耎便欲心生後不久男根墮落即有女根則休道為俗生子後還遇見即便識之知本所因即歸情求及羅漢教令悔過用心純至還得男根故宜不露形也次過量三衣戒多論第九云佛身丈六常人半之衣量廣長皆應半也佛弟難陀短佛四指衣應減長中一尺廣中四寸佛衣色如金詰施氈色亦爾故難陀衣宜當覆沙覆沙者言壞色也令同比丘衣色問前三戒量依佛磔手所以三衣隨己身量答前三非是道服正標故隨大小皆得受用是以即定量之分限三衣為是道服正標以磔手定皆不稱體故各隨己身量為限又以衣量不定故有等過前三定故即無等過問衣制等過鉢亦應爾答衣以體同謂量亦爾鉢體全異故無等過上來九十戒竟次明四提舍尼法先總解五門分別第一置四所以第二次第之相第三持犯方軌第四違制不同第五二部同異初門凡起譏過託二眷屬一內二外內中復二謂在私屏及以衆中初戒屏處尼邊受食容生染穢故在第一次戒衆中偏情與食同受不呵故制第二外中二者聚蘭有異聚中學家過受令他財物罄竭招譏不輕故制第三蘭中安坐受食賊逼送食女人亦過不輕制此第四是則首末差分有斯四損翻損成益故立四戒第二門內衆情親兼是師位喜起此過故在前明俗人外衆墨服不同致犯義稀故次居後然在內中屏處為數衆中作稀故有先後外中起過亦為聚數蘭稀次第應爾第三門此中二四兩戒具二持犯若論二犯體一名別二持具含兩義准上應知不能繁述初三兩戒止持作犯或可二四兩戒據別體邊是則四戒俱成止持作犯第四門唯學家戒是違僧制以僧秉此學家羯磨由無法時受食無犯作法已後方成罪故理實得罪亦違佛制以佛不秉羯磨法故餘之三戒並違佛制以無僧命衆法可違第五門尼以稀故並獲吉羅僧為作數咸得提舍在白衣舍自手從非親里尼受食戒制意同前取衣戒說別緣具五一在俗人家二非親里尼三無因緣除親及病問所以此中除親上同行宿坐中無答前為外相不練故不除親此在俗家知委故許病為苦惱無譏故聽四自手取除置地使人表敬不絶五食成犯滿戒五句一人二是村非親里尼三無病除去開緣四自手受食五是比丘下明違廣解具明次在白衣家食尼偏心指授食戒凡是衆聚清謐髣佛給園之儔容止寂寥依希鷲嶺之會然此弊尼公然壞法越次指授狀涉曲私穢迹既彰不可容忍衆默同受並犯可呵別緣具五一白衣舍二比丘尼三偏指授四衆不呵五食方犯戒本五句一人二在白衣家內食三是中下偏心指授四比丘下教呵方法五若無一下不呵犯也解釋可知次違制學家受食戒今此學家以見諦迹誠心供養觸事無餘以施無餘財物竭盡今僧立法使絶受取而諸比丘貪無慈愍故違受食結以可呵緣具五一夫妻俱得見諦二僧與作法三無因緣除病及請四自手取除置地使人五食成犯與作法者五分第十云不聽處處與餘家作學家羯磨若婦是聖人聟是凡夫或婦是凡夫聟是聖人皆不應作若夫婦俱是聖人無慳貪心財物竭盡然後乃與作學家羯磨滿戒四句一先明學家僧作羯磨二出能犯人三於如是下無緣自手受食食四是比丘下辨違釋中初二不次餘相可解僧祇二十一噉者餅果等食者五正五雜正食不犯中財物還多乞解學家羯磨十誦十九云僧應籌量可捨不可捨若財損減不增長爾時若乞不乞不應捨若財物增長若乞不乞皆應捨若財物不增不減爾時若乞應捨不乞不應捨若作法竟五衆俱不得取若捨羯磨竟五衆隨意取次蘭若受食戒凡是蘭若之處多有盜賊所依理應翹勤出外受食今以安坐諸女送食因彼賊掠招譏故制別緣具五一是蘭若嶮難之處二先不語檀越三無因緣四自手受五食成犯滿戒四句一人二是蘭若難處三若比丘安坐受食四應向下結違然第三句云先不語檀越者謂先不語莫來而忽來者在藍外受不犯藍內即犯故言在僧伽藍內無病自手受食問唯在藍內是犯藍外道路不犯者何故緣中語諸女云莫出道路有賊恐怖若已出城應語言莫至僧伽藍中道路有賊恐怖答此恐諸女來至藍中故復語言道路有賊不以此言證道路犯詳其戒本及釋並皆藍內成犯餘相可解上來提舍尼竟次明衆學戒法言衆學者以上四犯所防過粗故舉數限標以別名此中所防微細乃有無量不可定數故名衆也爾者如何文彰一百答此就所防喜犯者說餘並攝在雜行法中又言式叉迦羅尼者見論十六云尸沙者學也迦羅尼者應當作此言是到順日應當學多論第九問曰餘篇不言應當學而此戒獨爾答曰餘戒易持而罪重犯則成罪或衆中悔或對手悔此戒難持而罪輕脫爾有犯心悔念學罪即滅也以戒難持易犯故常慎心念學不結罪名直言應當學也此就所防即是吉羅今應學者勸學名也以此所防威儀微細自非專持無由行立以行立故顯學功成是故獨名應當學也於此有作義門釋者便是無義強立不繁須設然古舊諸師分戒為四者初有五十一戒明敬僧威儀行所以明者以其威儀服飾行住往來食請違失便自壞行復令衆生不重僧寶為此須以敬僧居首第二不恭敬人不得為說法下有八戒明敬法威儀行所以明者法是濟溺喪之玄律超升彼岸趣涅槃之正躅實相嘉謀敬而行之永離衆苦慢而毀犯長沒愛河第三不得止宿佛塔下有二十六戒明敬佛威儀行所以爾者佛為導主利益群生開化之功莫過於佛其恩既深其德彌廣事須殞命亡身虔心供養第四人坐己立下有十五戒收前不盡能敬之儀故更雜明四威儀行就前敬僧之中復分為四初有二戒教諸比丘著衣裳法使齊愸端嚴應法無失第二從不得反抄衣下有二十三戒入村受請行來進止第三從不用意受食下有二十三戒食上方軌第四生草菜上大小便下有三戒便利進不此非順理不假須然先解初戒十誦十九云爾時諸比丘極高著泥洹僧極下著參差著不周齊著佛見已作是念我當觀過去諸佛云何著泥洹僧空中淨居天言世尊過去諸佛周齊著泥洹僧佛亦自憶知過諸佛周齊著泥洹僧佛復念我當觀未來諸佛云何著泥洹僧天告等同前佛復作是念我當看淨居天云何著泥洹僧天告等同前次至三衣戒觀亦同此多論第九問曰五篇戒中佛何以止制著泥洹僧著三衣觀去來佛及淨居天耶答曰佛結五篇戒皆應觀三世諸佛及淨居天但年歲久遠文字漏落餘篇盡無此中獨有復次結五篇戒此最在初結後集藏者詮次在後以此篇貫初故餘篇不說復次此戒於餘篇是輕者將來弟子不生重心是故如來以佛眼觀去來諸佛及淨居天而後結也使來世衆生不生慢罪復次三世諸佛結戒有同不同於五篇戒中不必盡同此著泥洹僧袈裟三世諸佛一切盡同是故此戒觀諸佛及淨居天餘篇不觀也又云極高著泥洹僧者非是五比丘非是優為迦葉等又非善來比丘多是白四羯磨受具戒者如釋種千人同時出家者此諸人等多壞威儀如釋種比丘本出豪族以先習故下著泥洹僧諸婆羅門外道在佛法中出家高著泥洹僧諸六群比丘參差著泥洹僧言故作犯應懺突吉羅者謂犯根本罪以故作故犯非威儀者復得失威儀罪以此例餘諸戒並爾又如謂上座收攝臥具出門獲提復得非儀吉羅若不故作者謂不作故違聖教心識事故直犯根本吉羅此之三罪根條雖異論其懺者咸並責心然母經云對手一說懺者極與此文相違不可依用此一既爾下戒同然次三衣戒僧祇二十一云齊愸披衣時不得如纏軸應當通肩披著紐齊兩角左手捉時不得手中出角頭如羊耳又著衣時須現福田及供養相故舍利弗問經舍利問云云何於訓戒中令弟子偏袒右肩又為迦葉村人說城喻經云我諸弟子當正披袈裟俱覆兩肩勿露肌宍使上下齊平現福田相行步庠序又言勿現𮌎臆於此二言云何奉持佛言修供養時應使偏袒已便依事作福田時應覆兩肩現田文相云何修供養時如見佛時問訊師僧時應隨事相若拂牀等諸作事云何作福田時國王請食入里乞食坐禪誦經巡行樹下人見端嚴有可觀也餘戒釋相並應類知義既不難豈勞廣辨上來衆學戒竟次明七悔過法此之七藥能除四諍文義包富非此略論若欲廣明至下當辨然直遣文可分為四第一標宗此七毗尼能除四諍以能除諍名悔過法第二顯本謂此不離半月說中以不離故名戒經中來第三舉功若欲殄除已起四諍必用七藥故曰應滅第四明用正示用藥滅諍儀軌文言應與者謂有德人與此七藥令諍除滅名為應與若其不與明即有違是上式叉迦羅尼義前據自行以彰應學此約衆法勸令應與二文並無所防之過直言應學應與明是一類但以衆別不同開為二問理實總收為第五犯又復應與即須與之不與犯者是突吉羅故尼律中尼提僧吉即是離合不同亦是輕重有異釋所以者至下當辨此釋悔過法已總是比丘犯竟
