body:
  text: 次下釋文犍椎者梵音不正正曰臂吒犍椎臂吒此云打犍椎所打之木打法如常五分十八應唱時至若打犍椎若皷打若吹螺不知誰應打佛言應使沙彌守園人打彼便多打佛言應打三通若無沙彌比丘亦得打問所以結界制令盡集不聽與欲解有三義一自然無界弱故不攝餘法憑界強故能攝二結界是眾同之本理宜急制故無欲法自餘羯磨非眾同本不從急制故聽與欲三令識界相不礙僧事餘法反此故聽與欲次差唱相人所以須舊住者為取委知界之分齊設非先住識者亦成次所唱之相文中具列十二如指山者必須言某山某邊若不別指直言山者理即不成其山既爾餘相類然見論十七界相有八謂山石林樹路封江水山相者大如須彌小如象大石相者大者如牛小者三十稱若漫石不得別安者得林相者若草林竹林不得作界相以體空不實林大者乃至百由旬小者下至四樹連接亦名為林樹相者不得以枯樹為相大如閻浮樹小高八寸形如針大若無自生種者亦得路者除向田取水等窮路不得大路或車步短者乃至經三四村得蟻封者大者如山小者高八寸江者若好王化五日一雨此雨江水不得作相若四月不雨常流不斷水深二尺得作界相水相者自然池水得作界相若通水入田或甄盛水不得作相既知相已若無戒場但安一重標相唱法如常若有戒場須竪三重標相先唱戒場相結已次結大界先唱大界外相一周云此是大界外相次唱內相一周云此是大界內相次總合云此為內相彼為外相此是大界內外相一周訖如是至三其相若不現顯及不唱者總不成結故五分十八佛言若不唱界相不成結界犯突吉羅諸比丘以眾生及烟火作界相或並界或兩界相入佛言皆不成結犯突吉羅此及諸部唱相皆不言三計其道理一說成就但以行事已然共存三唱次眾中下差秉法人唱相人不合秉法秉法人不合唱相以此義故文各別舉五分十六應一比丘唱四方界相又唱除內地更一比丘白大德僧聽等次正秉法十五二律牒唱相人名此既無名不得輙依他部言同一住處者是處所同對二住處本別今同者以彼不得言同一住處此為本同今同故言同一住處同一說戒者謂是法同次明戒場先解其義四門分別第一明其開意第二釋別場名第三安置處所第四辨結先後言開意者大界僧居處所寬遠數有別事盡集稍難故開大界之中別立戒場隨作受等事時不惱大眾即如文中四人等事起開聽別立即是利益比丘次釋名者所以名戒場本為別人滅惡生善簡穢取淨故名為場如似俗場從喻受稱問餘界亦有此義如何不與場名答大界本為眾僧所居不專滅惡生善不與場名諸餘小界雖亦滅惡生善為難別開非久作法又無標相不與場名次安處所者論其戒場須在界內為以界眾大難集開結戒場故知在內又羯磨文言此住處比丘稱四方小界相若在外者如何言此住處戒場無結雖不為住良由在他住處內故又在外者如何下戒場大界互有見聞佛制令喚母經第一云外更不結大界直結小界亦不得受具次先後者諸傳法者言此無正文應先大後小以是大界內安戒場故今解不然戒場既在大界內安據理戒場應須先結故五分十六云應先白二捨僧坊界解已然後結戒場結戒場已更結僧坊界母經第二云解界先解大界後解小界結界先結小界後結大界善見大同不能具錄次下釋文文中分二初舉緣開結第二當如是下正明結法結法分齊等如上應知問如何不言同一住處答戒場無興不為住故既不為住不言同一住處爾者所以不言同一說戒答戒場無不為說戒說戒制作豈恐大眾疲勞聽往戒場說戒爾者戒場無興為別羯磨是則應言同一羯磨解大界言同說戒則有本界異界同戒場若言同羯磨恐同大界亦須本界異界同是以不言同一羯磨又解大界無為僧住復欲攝人同法是以須言同一住說戒場無不為住不欲攝人同法是以不言同一住處同一羯磨次明解界昔云此之一解通解戒場及與大界今謂不然但解大界不解戒場以其結解文不類故唯此一結對之辨解餘三及戒場並無解文以義而言欲解戒場者但應翻結作解翻云大德僧聽此住處比丘戒場若僧時到僧忍聽解戒場白如是大德僧聽此住處比丘戒場僧今於此解戒場誰諸長老忍僧於此解戒場者默然誰不忍者說僧已忍於此解戒場竟僧忍默然故是事如是持如解大界翻亦同爾釋文分先辨解緣母經第六解界有二緣一者水漂標相壞不知處所二為賊難故諸比丘皆出界外次明解法結時為識相故須立標相解為捨界相直解不須牒次明不失衣界自然衣界如上已明今辨作法先解其義二門分別第一正明衣界第二舉衣對僧辨其同異先明衣界三門分別第一開結之意第二釋衣界名第三除村不除初門三衣制畜理應隨身今若遠之豈成持護又以比丘經禪靡替界寬藍狹隔礙便生故聖開聽於僧界上結攝衣界遍界共同故僧祇第八云舍利弗於那羅聚落安居日日詣竹林禮世尊足值天七日連雨念言我今體羸是僧伽梨重正欲持去被雨遂重若不持去脫不得還便應捨墮且住持晴往詣世尊道逢外道共論佛問何以多日不現具說上事告諸比丘從今日後王舍城竹園精舍那羅聚落作木離衣宿界今諸比丘得安樂住羯磨法可知作不失衣法已此王舍城趣那羅聚落道兩邊各二十五肘名為界若衣在道中得道左右各二十五肘置衣王舍得至那羅聚落無罪置衣那羅聚落亦如是又祇洹精舍有一比丘食後欲詣開眼林坐禪便作是念我或於彼宿便失伽梨即持三衣遇見世尊問佛知已告言從今日後從祇洹林至開眼林東坊精舍西坊精舍東林精舍西林精舍王園精舍受籌塔婆羅林精舍盡同作不失衣法今諸比丘得安樂住羯磨如文然不應練若通結聚落應阿練若處通結阿練若處聚落處通結聚落處唯此界寬藍狹得結攝衣界欲使可於僧界同一衣界或若藍望僧界或等或寬此二衣界即不須結對此若結反成局礙非謂衣界一切須結次釋名者由加此法攝衣屬人今無離罪故曰不失衣界或可加法結後去之雖遠但不離界衣猶屬人故曰攝衣界次除村不者問作羯磨法時為有村故須言除村為得無村亦言除村舊解村界若有若無一切須除今釋不爾若現有村可須言除若現無村即不須除若當無村結言除者此即事不稱法豈得成就如瞻波中無病浪治及被客呵無覆與覆此等不成其例非一問衣界所以除村者答村是俗人所居衣隨比丘分齊體性相違故須除去多論具五義須除一聚落散亂不定衣界是定二為除誹謗故三為除鬪諍故四為護梵行故五為除疑嫌故又問僧衣二結所以有除不除舊解云俱是禁緩從急有除不除衣以別為過故須除村別而就急僧以同界不集為𠎝故不除村同而就急又解僧界開不重開所以不除衣界亦是開不重開是故須除今解僧衣二界既殊所以除不除別又解衣與村界一向相違雖復開依處結亦須除去然與僧界性不相違以不相違故不除也次明同異三門分別第一寬狹多少第二相可不可第三勢分有無言多少者僧衣對辨可為三位一以二自然五句不同二以衣自然對僧作法亦五差別三以二作相對三句辨異初五者第一僧寬衣狹謂在蘭若攝僧二拘盧舍攝衣八樹間第二衣寬僧狹如依伽藍集僧衣界外有勢分第三僧衣俱等如藍勢分與七樹齊第四僧一衣多如七樹內有眾多家第五衣一僧多如空地大樹百由旬比丘精異衣許通護僧有多限有人云藍相寬故衣一此有眾多六十三步故僧多此不應理若此藍內是可分別六十三步不得有多若以不可分別僧多衣豈為一次位五者一僧寬衣狹如界大藍小是二衣寬僧狹如藍大界小是三俱等如可藍勢分結僧界者是四僧三衣一有戒場故五僧一衣多無戒場故僧一藍有若干界故衣多次位三者一僧寬衣狹謂除村村外界以被除處無衣界故二僧界三衣界一有戒場故僧三以結攝衣界無村故且言衣一三者俱等謂無戒場故此中不得有衣寬僧狹以衣作法依僧界故復以衣界假僧界生亦不得將衣作法對僧自然辨次相可不者二種自然具三義故不得相可一衣制隨人僧則隨處僧衣既殊豈得相可二各不相假三勢分有無次二作法翻上三義故得相可一衣以隨人急故開急就緩可大界上結為是相可二衣必假僧三俱無勢分自然作法既是法無法異亦不得相對明可與不可次勢分有無者僧界約處分齊垣定不問自然作法俱無勢分衣界翻此理應俱有勢分但為自然攝衣隨人不定以不定故開有勢分作法衣界開依處結處則是定故無勢分亦可作法衣界假僧界生所依既無能依豈有次下釋文文中分三初無村結法次有村結法後料簡進不無村文二一舉緣二作法母經第二云先結大界後結不失衣界先捨不失衣界後捨大界次有村結法初亦舉緣次明結法問所以界內有村答多論第四云以界威力故惡不得便又在界內善神所護是以為檀越故通聚落結次料簡有四句唯釋可知次下第三開結大小界法文中分四第一結解大界第二爾時有二住處下對食料簡第三爾時布薩日下結解小界第四時天瀑雨下對法料簡初文有四第一明法食二同界文分為五第一舉前昔別第二諸比丘下顯欲今同為法食互𮓪遞相假故第三諸比丘下以緣啟請第四佛言下解前昔別第五應盡集下開結今同結法分齊細解如上第二法同食別界食雖自豐法便有闕釋文准上第三食同法別界良以食儉法豐須作斯制食是常住不可輙通自非作法無由得共猶如僧得施物亦通十方作法竟時得攝屬己物既爾食亦然此無別界不須解言但欲同食作斯羯磨釋文准前第四舉初二合解為兩別下二唯亦應然文無者略次料簡食者若隨得食便各食之此則乖本結心豈成同食若來往送復恐時過但作口和彼此無犯雖作斯法據其少食食若多者即不得通次數人小界先結後解解此小界人處相應既此人結還此人解以蹔作法無第二為後人如何輙解此界不同戒場永久作法兼有標相後人牒解次對法料簡一約河水二就道遠次明說戒法體將欲釋文先義四門分別第一約時第二約處第三約人第四約法初時有四謂年月日時年者一年二十三大小可解月者謂黑白月日者十四十五十六隨其住處自為恒式時者通晝及夜此文多就夜說如文然燈火故又以夜多寂靜赴說者集故此文雖知是夜晝亦無失故十誦云從今聽二布薩一食前二食後一晝一夜次說處者以人通於僧別故處該於作法自然然於作法之中復有大小大界理遍小局數人次明人者除下三眾以非所秉具戒位三三皆說戒僧有四別四人僧收又於僧中義分廣略三人已下但是略法若論減却非時並據僧說復應有誦戒人其誦戒上座應誦五分十九云有一住處布薩䟦難陀為上座眾僧請說戒答曰誦忘諸比丘言若忘何以坐上座處以是白佛佛言應上座說戒若不說吉羅比丘不知齊幾為上座佛言在上無人皆名上座又若上座不能說者僧祇三十四云僧上座應誦戒若不能者次第二上座誦若復不能乃至能者應誦又五分十九云諸比丘先不請誦戒人以此稽留說戒白佛佛言應先請說戒人增一經四十四云今聽上座使說禁戒若僧上座不堪說者聽持律說若無持者其能誦戒通利者當唱之使說戒次明法者法位通三謂心念三語羯磨羯磨之中復有三位此制常行故但單白次下釋文文分為三第一單白攝眾第二爾時說戒日下正辨說戒法體第三若有三人下明是非相初白可知若更有餘法事並須未白前作故五分十九云時諸比丘先說戒後作諸羯磨六羣比丘說戒竟便去不與僧和合以是白佛佛言應先作諸羯磨然後說戒以是攝僧今不得去次明法體有三眾法對首心念略辨僧說料理前事鳴槌集眾不局大僧沙彌亦集眾既集已當相撿校若有見聞復應喚覓法事次第癈立可知應辨淨水香汁然燈舍羅舍羅者是籌五分十八諸比丘便作金銀籌以是白佛佛言應用銅䥫牙角竹木除染毒樹諸比丘有短作有長作佛言短應並五指長應拳手一肘麁不過小指細不減𣛰應染以同盛懸著布薩堂上僧祗二十七云若欲誦時應先淨洗互已捉籌若有者應作香汁浴籌餘人欲捉籌者亦爾復云香汁灑地散華然燈三十四云應一人行一人收不得覆頭覆肩行籌應脫革屣偏袒右肩受籌人亦如是先行具足人籌然後行沙彌籌行已白爾許受具足人爾許沙彌合有爾許人次對首者以非眾故不得互問清淨表同僧法故須自言清淨次一人心念言者以不對境稱云心念為欲表淨同僧故須言也次是非文二第一對前三位明第二別定是非前文二句初句是非法別眾以白說戒應四人為今三人作即是非法三又非僧不成與欲即是別眾次下二句是法別眾以應三語是法不應受欲即是別眾次別定文四一六羣造非第二比丘白佛第三佛制不得第四如非對顯此中文三初舉四數次列三非一如言二非者若僧不集一白處作二白或三人受第四人欲白說戒是名非法別眾若四人盡集重作留白或可四人共作三語是名非法和合若四人不集如白法作白或三人等受欲作法是名法別眾言一如者若四人已上盡集白說或三人等不受欲共作三語心念是名法和合凡舉非者欲使識非令棄顯其如者欲使達是遵修顯成不如文可知然佛示此法和合說戒令使比丘識相同修故言是我所教法次與欲清淨法文中有三第一與欲應羯磨第二爾時說戒日下與清淨應說戒第三爾時六羣下料簡進不前文有四第一病輕與欲法第二不能如是下扶將赴集法第三若盧此下病重圍遶法第四若病者眾多下病多出界法對此解義七門分別第一開意第二釋名第三定緣第四約時第五約處第六約人第七約法初門者僧若秉法理須同遵情有乖違不成和合然和合中身心兩別身為緣遮開單心集情既到僧得名同事既不犯別開聽與欲次釋名夫論欲者乃是希須為義故伽論第六云何以故名欲欲者所作事樂隨憙共同如法僧事十誦五十八云欲法者欲名發心如法僧事中隨僧法與欲是名欲法實論第七云心有所須是名為欲然應與中自有彼此相藉如說戒自恣制所常行若當不為必制有罪或有僧須別人別人不藉如受戒懺悔治人等法以若不為聖不制罪雖復望已有須不須然僧秉作並須齊集次定緣者即此文中為病故開然有瞻病三寶等事於教無違者咸在開限如不與欲戒云若為僧事塔事瞻病事及後悔戒作衣緣亦得次約時者謂作說戒自恣羯磨等時時義不定約法以辨故下文言作羯磨時應與欲次約處者專約作法自然中無故結界時不得受欲然作法中復有大小小中除戒場餘者即無欲所以可解次約人有三第一能與欲人謂上二具非下三眾就二具中體須應法第二納欲人謂唯是僧非下二位故文言一二三人不得受欲僧有四別通皆攝欲然四人少分結界無欲第三持欲人隨文解釋次約法者法位有二第一所應之法於所應中位有其三說戒一法說戒及羯磨自恣一法自恣及羯磨餘一切法專唯羯磨然羯磨三位通皆攝欲唯白二少分結界無欲第二與欲法亦至文解次下釋文初文有三第一舉僧作事第二有異下牒不來緣第三佛言下開與欲法此中復三第一與成不成第二若受欲比丘下持成不成第三若受欲人下說成不成初文有二第一舉欲成法第二若不下反顯不成前中復二第一總舉應與第二別列欲法欲法五種五中四略一廣略開重病輕者不得廣說一種通病不病次不成中若不現身相翻前第四若不口說翻餘四種此等不成應更與欲欲法既爾下清淨法亦然乃至恣中亦同此說次持中有三一病人所二至中道三至僧中初病人所有二十七人不成持欲下自恣中有二十五略無神足離見聞此中位三初有七人謂受欲已有次若自言下十九人通及與時第三離見聞一種唯局與時所以唯局與時以受欲已離見聞不失故知受時不得離見聞餘處行者謂出界外故恣中言若出界又十誦三十九與欲者亦不得出界故文云佛言從今日與欲者不得出界犯者吉羅及不得受界外人欲問餘行既是出界所以復明戒場失答今言戒場者實已出界竟以是大界分內別作法處情或不失故更明之其十三難等有過人以不知故須有自言若其知實不假自言問所以無癡狂等三答此隨一相舉之理不備盡文無者略五分中有問下一據不足數中更有尼等四人別住隱沒及所為者何以此等七人不來答所為人者成持故無尼等六人理有並略五分具有問此中六人謂命過餘處行罷道入外道眾別部眾明相出何以不足中無答此取往來失欲分齊故有命過等及經時失彼不足中不據往來唯約體說故無此六次中道僧中者設離常行道見聞欲亦不失持欲既是使命往來豈可離道見聞即令欲失以此故知道中無離見聞爾者道中既𨷂見聞所以言亦如是答理實見聞局是受時中道不可偏除此一是故總望前位言亦如是次僧中亦無離見聞以局受時故又解此之三位皆對受明於病人所受既爾若中道僧中亦然省過順文此釋最勝故與自恣文云若到病人所便命過等准彼此則不合有已然古師說僧中離見聞有四一隱沒二到出三隔障四遠坐者自論不足非關失欲次說成不如文可知次赴集等具如文說五分十八云佛言應舉眾到病人所使說戒比丘於中央坐說戒令諸病比丘向說戒人復有諸病比丘不能向說戒人背而坐臥佛言應出界外布薩不得在界內作別眾布薩次與清淨其位並同次進不者其文有九第一欲清淨令法第二不得稱事說欲第三明欲清淨不失第四受欲多少第五更明說戒儀軌第六轉欲清淨法第七得稱和上闍梨字不第八事說往不第九制往及坐初文欲清淨合者為令不稽僧事隨作皆成故制合與是則欲與清淨合欲與自恣合次聽稱事者亦為稽留僧事欲令眾僧秉法無礙復除非法不與情和是以但言如法僧事與欲清淨爾者既不許稱事如何與欲自恣答不聽稱事者謂稱僧中所作之事自恣者自宣己情縱僧舉罪不是稱他僧所作事次欲清淨失不者但以路中有難不得詣僧開從外來欲法不失次受欲多少者此文皆得不能記識姓字相貌但言眾多等十誦亦爾僧祇二十七云若取欲時應自思惟能傳欲不不得取眾欲得至三人集人多少者祇律又云從今已後不聽與欲者多及等作布薩若與欲等多作布薩越毗尼五分十九今聽多比丘集比丘持清淨欲來此望說戒集者須多若論餘法不論多少次說戒儀軌者為說戒故立不成別眾除此及威儀師餘有坐立者皆成別眾誦戒忘誤授等可知次轉欲如文前對病人說有廣略轉欲非病一切須廣母經第八云取欲者語一人如是展轉語第七人皆得取清淨是名七相應法不同祇律轉與失欲十誦佛言從今不得展轉與清淨與欲與自恣與除罪犯者吉羅次不得稱和上等字祇云有人問汝和上阿闍梨字何等不得直道和上阿闍梨字應說義因緣令知次說欲事訖須往僧中以情先和不犯別眾但為事訖應須聽戒不往違教故如法治爾者說欲事訖不往不犯別者受日事訖不來夏應不破舊解云事訖未來不即破夏令解不爾受日對事事如聽受事謝法亡不還破夏說欲送情非正由事故說欲時不稱事說次說戒事須往赴坐聽兩對四句如文可知次略說文三先明略緣第二自今已下示秉法時第三彼比丘下正明略說前文重者名難輕者是餘緣八難中病者是說戒師餘緣中病者是餘僧眾人難者住處有眾多白衣妨說戒故或有惡人來至座上捉比丘次爾時者但明相未出須作羯磨以明相出欲即失故次正明略文分為二初作七略一直去次復有五種下作三位五略前文初句難猶未至應可廣說此是說盡提舍尼名為廣說謂是略中之廣非全說五犯所以知者以其次句說盡九十證知前句是提舍尼問所以無有廣說眾學七滅言僧常聞答若說眾學便是五犯已周縱餘七戒不得名略餘句可知即是七略一真去尼無不定故有六略一直去次錯互前七以為三五前根本七從緣向急今此三五從急向緩初五單序作頭至盡三十還是略中之廣故曰廣說第五但以略去廣文廣取名數所說不殊前聞故曰僧常聞次二五可知尼本六略但有二五次除疑調伏文中有五第一立制除疑第二爾時世尊下自言治法第三爾時說戒日下制愚依智第四爾時難陀下折伏弟子第五爾時有一下瞻奉德人前文有四第一立制除疑為淨眾故第二有三種下列數料簡初人濫故須作後二無濫不須狂病既然餘二類爾第三狂止為解眾僧作法除疑立制非關別人故無有乞解是別人等僧乞解前制既為列人所以須乞狂止未解不犯別眾以法不捨須僧解故不同母經彼經第二佛言得心者可捨後還失心更與得本心還捨僧祇作白三羯磨若病差即捨第四更發復作次制自言治法文中有五第一佛止不說對此釋佛說戒二門分別第一明說法體第二說戒時節初門所說法者佛在僧中為眾說者但是略教不說廣教所以爾者舊解云略教法門言雖是略理實包含通於輕重是以如來說此總教通被五根機利益廣有五差輕重不等若為說廣利益不普此釋不然佛說略教本無五機如何乃云通被五根又佛滅後百年已前猶為一部未有五差如何在日始十二年即云廣有五差輕重不等故今解云以略是其列行之法佛說此法教誡學徒廣是眾法共相攝受佛既非僧寧容唱此是以戒經云十二年中為無事僧說此戒經明知是略又善見云過去諸佛但說教授波羅提木叉不說威德波羅提木叉問何名教威德解略無名種稱云教授廣有名種怖人故曰威德問佛有無邊智慧無邊辯才何故十二年中常說一偈多論解云雖有無窮之辨為眾生故更不異說更不多說次明時節諸文不定若依僧祇五年已後漸漸為非立說木叉法見論第五云佛從菩提樹下二十年中皆說教授波羅提木叉復於一時語諸比丘從今已後汝輩自說威德波羅提木叉又云過去諸佛不為聲聞弟子結戒不犯非故亦不結威德波羅提木叉亦不半月半月說戒乃至六年六年止說教授波羅提木叉往昔閻浮利地有八萬四千寺寺或有十萬二十萬比丘亦不諠𠆴皆寂靜而住是時諸天人心思欲聞佛說戒恒計年歲應到六年即集大眾往佛所待佛說戒是時諸比丘有神力者從遠而來無神力者諸天來白時至可去即取衣鉢承天神力到布薩堂到已禮足時毗婆尸佛知眾集已為說忍辱第一道偈若依增一經皆具廣略乃至第七佛十二年中無有瑕穢但說一偈以為禁戒自今已後令僧說廣因此乘明彌勒千歲之中眾僧無有瑕穢恒說一偈偈云口意不行惡身亦無所犯當除此三行速脫生死淵又多論第二云十二年中常在眾說十二年後有惡法出心不說令弟子說十誦亦爾問諸文明說時節何以不定解僧祇制廣時節餘文見論乃是說之時節問所以見論餘文說時又別解蓋是隨根見聞有異或可部別不同不可互為妨難問五年制廣已是有事如何復云十二年前為無事僧說此戒經答廣教雖興未名有事謂非犯廣之人故云無事若實犯廣非真沙門欲令世尊於斯穢眾說清淨法無有是處約此差別義來為三五年已前無事名無事以行清淨無有𠎝違五年已後十二年前有事名無事覩事雖是乖違最初還成清淨十二年後有事名有事以過重興擯令出眾問佛越此時如何不說答以眾不淨故不為說爾者弟子亦然還被淨者進止合儀方得聞戒此則與佛無殊如何不等答十二年後犯結罪名雖有悔除進止儀軌然以過顯群心眾非淳淨是故如來不為穢說不同弟子但制見聞中淨覩事無違即得為說又問佛為彼說有何過耶答為護眾生故五分二十八云佛告阿難從今汝等自共說戒吾不復得為比丘說所以者何若眾不清淨如來為說彼犯戒人頭破七分又十誦三十三云若佛於不清淨眾中說戒者是不清淨人頭破七分目連從今汝等當自說波羅提木叉佛不復為汝等說增一經亦爾第二時尊者下輙行駈擯文中犯戒內懷腐爛者謂犯四重不顯其名祇中犯盜闍王作布薩堂種種嚴飾有金蓮花墮地此惡比丘盜心取俠掖下第三佛語目連下制自言治法第四自今已去下付弟子說此是如來最後說略以十二年前未有犯廣今既犯廣故止不說第五顯法奇特文二初列海水八喻次如是目連下舉法同喻海水八喻文中通舉此破戒者淨教不収同第六喻不宿死屍次制愚依智文二初制五歲比丘誦戒羯磨使利第二制依能誦戒人安居次折伏弟子文三謂起過呵責立制立制文二初教和上檢問方法次明應去不應去此中應有八句初之一句事處伴俱非次有三句二非一如次有三句一非二如此之七句有過不應去末後一句俱如聽去於中四五二句文中不次或有文中但有七句一處非餘二如句五分十八云和上應籌量若道略有疑恐怖和上聽去吉羅若不聽去弟子強去得輕師波逸提次瞻奉德人供給等如文十誦二十二云若聞客比丘來清淨共住同見知布薩知布薩羯磨知說波羅提木叉知會坐舊比丘應迎耎語問訊代擔衣鉢等乃至種種供給若不供給供養舊比丘一切得罪何以故無佛時是人補佛處次懺𠎝者文中分二第一別人犯罪懺滅方法第二爾時當說戒日下僧犯進不前文復二初說戒前犯二罪一識一疑懺悔發露法第二爾時說戒日下說戒時憶二罪一識一疑俱教發露就前文識罪中文三初舉緣啟佛第二佛言下示其懺方第三作如是下結我聞法初後可知亦懺文五第一請懺悔主第二修懺威儀第三正懺詞句第四呵今生厭第五領受立要此之五句是對一人懺法若對二三人懺須問邊人對僧須有單白和眾初文以有犯人不得受他懺悔故言當詣清淨比丘所五分十八以無清淨比丘及不同犯者可懺悔遂命過以是白佛佛言今聽同犯不同犯皆得向懺十誦五十六初為急事開不相應罪聽懺悔後有恐怖事佛言從今日若有相應罪是比丘一心生念口言後當向清淨比丘懺悔聽受相應罪懺悔然此懺主必須加請若不加請無由愍接請詞可知次辨威儀具如上釋次辨懺詞此中懺者謂三四兩犯及對首蘭文中八句一言對懺主請令攝念故曰大德聽第二自庠己名第三顯罪名種第四今向已下正明發露不作隱心第五懺悔等者彰其損益顯己將欲棄損就益第六憶念犯下除其不憶憶皆發露不敢覆藏第七願長老下請作證明第八戒身已下戒得如本應於淨法除𠎝事難故須三說呵責治者僧祇第八云持律問言汝自見罪不答見汝更作答言頂戴持如是第二第三遍問答亦爾見論十四作白和僧竟先問言汝見罪不答言見汝當來罪莫犯答言善然後受懺悔次領受可知次疑罪者疑有二義一疑犯不犯二疑重輕名種故開發露得聞淨法次說戒時者但為逼說不容懺悔復恐眾喧不作對首雖復識罪分明開作心念發露表心淨故亦得聞戒疑亦如前不須別說次僧犯文三第一說戒日二罪識者懺悔疑者發露文中但言當差人往餘處而無差人之法五分即出差人白二第二說戒時二罪作白向四方僧懺悔發問此中疑言發露罪理不除識言懺悔其罪滅不古釋云作白即滅不須更懺所以知滅文言懺悔不云發露今解不爾但作此白表無隱心使得聞戒罪未得滅文中既言白已當懺悔明知作白表淨罪不得滅又如草覆懺中文除重罪既簡重者明輕得滅此既無簡明總不滅又十誦二十二單白云若後是罪如法懺悔准彼後言此當亦爾不得苟欲除𮘧當是當又臨說戒識疑發露皆有當言罪亦應滅彼許是當此豈為當第二說戒日一切僧犯不識名相問懺方法此中不識名者謂不知露地然火壞生等不識相者不知罪體多少此為教作問懺儀軌但有說戒日無說戒時此不識罪對有執情生淨故曰不得強逼懺悔次客舊者文中有四第一說日同不同來有少等多明應不應有三十六句第二說戒日下僧伽藍裏互見聞疑有四十句第三有異住處下大界戒場互見聞疑有二十四句第四有異住處下界裏藍外互見聞疑有二十四句初文有二第一廣明應不第二應從不從結惡心罪前文有三筒十二句第一說日不同來有少等多作十二句第二說戒日同互不相知來有少等多作十二句第三十二正以知未來為異初十二中有二六句謂十四十五作一六次十五十六作一六初六有兩位三句初三客十四舊十五客有少等多少等制客從舊若舊須出外次三舊十四客十五客有少等多少等制客出外若多舊須從客次六但有下三客十六舊十五略無前三客十五舊十六問舊說客來等是則制客以從舊所以客說舊來等而不制舊以從客乃令客比丘出界外說答欲明舊強客弱故有制不制爾者次下日同中客與舊等如何制舊更與客說答下以即座作法不多勞擾客舊雖等皆為重說又問曰不同中所以無客客相望舊舊相望耶答為辨強弱故有客舊相望若其客舊客舊自相望者是則無強弱或可合有文無者略次十二句總有四三初三舊望客次三客望舊次三舊舊相望次三客客相望問所以外來入界不犯別而許告清淨答以心無別向僧不犯爾者餘法向僧亦應不犯答說戒制作一切同遵以心向僧不犯別眾餘法別為非皆同遵縱心向僧亦在犯限次十二者翻前以說初三客望舊次三舊望客次三客客相望次三舊舊相望次結罪者通前諸位或應出不出應作不作以不集故為破壞他惡心秉法故結偷蘭或懈怠故不為破他而作法者但得吉羅次第二文四一有十句客見舊相二有住處下十句舊見客相三說戒日下十句客聞舊聲四有住處下十句舊聞客聲初文十句分為二五初見不疑有五前四成不第五成就前中復二初三不成有罪第四不成無罪以不集故不成謂無非過不犯前中復二初二不成犯輕以懈怠故第三不成即重以惡心故次見疑五者見已生疑為大比丘為是沙彌作文同前故曰亦如是一十既爾餘十同此次第三文亦四位如前唯以句少為別初文六句分為二三初見不疑有三三中前二成而有罪以是別界故所以成應喚不喚所以有罪第三喚集作法成而無罪次見疑三句作文同前一六既爾餘六類然次第四文義准前說次叛說戒法六群比丘自知多過恐僧治罸故叛說戒文中分二初一九自為次一九為他釋文可知次簡餘眾法文中有二初簡餘眾尼雖具戒形別不得十誦聽比丘在尼前說比丘戒不聽尼說若比丘忘聽尼口授尼說翻此僧祇二十七從今日後不聽向未受具人說五篇名得教語汝不得作非梵行不得盜不得煞生不得妄語如是比丘得為說第二除人開餘不犯次非時說戒除十四十五十六餘日作者即是非時但以眾僧鬪諍日久情既乖違不成和合今既諍滅還同一味自非作法無以表和於中文三初諍滅作白次問答應不次白是非時說戒白此白即替常說戒白若望時說諸文唯除客舊餘咸具有准同上明上來說戒法竟次二揵度同明離過安居防未是以以先明要期此住故曰安居廣明四種安居之法集在一處稱云揵度大文分三初遊行起過第二時諸下呵責第三告諸比丘下世尊立制禁斷遊行遣結安居翻前行損起過可知呵文分三初白衣呵於中復三初執所作不應呵次諸外道下舉外況內呵次至於蟲鳥下舉下況上呵次比丘呵佛呵如文次釋立制文分為六第一結安居法第二若安居竟下分夏房法第三爾時舍利弗下雜安進不第四爾時諸比丘露處下安所依處第五爾時有檀越請下出界進不第六爾時拘睒彌下明安居請背不背義先解初文文中分二第一翻損就益總興其教第二白所依人下列安居法但以安居順理故佛言聽聽而有違還名為制對此總申安居之義釋安居義四門分別第一約時第二約處第三就人第四對法先約時者於中有三一結夏非春冬第二夏有四月結三之意第三夏中有閏通數以不初門問過舉三時應須通禁如何結夏不制春冬答夏中生過重於餘時雖復同廢正修招譏醜累然為雨等諸過異於餘時以此壞行義多所以偏制餘時行者壞行義少招譏復微故不制耳是以文言聽諸比丘三月夏安居即是夏中益多有法住住既有法去時為益亦有法去餘時益少住無有法住既無法去寧得有問夏為過重結夏非餘時者何故尼三時遊行並得逸提比丘俱吉答安居遊行二義差別自有不安不行自有安而亦行是以尼律安居遊行各別立戒故知非類第二門問所以夏有四月但結三耶釋有二義一者為開不逮之流若無緣者結前有緣者結後若當盡結四月者唯四月十六日成就十七日已去即不成安教法太急事難常行故開一月籌量進不是故文中舍利弗目連十七日到佛言聽結後安居二為賞勞若當定結四月者有待之形無日可賞故開夏分一月以充五利賞勞故文言若前安居住前三月又云不受迦絺那衣一月第三門數閏以不者本制安居是夏時分故使有閏攝在夏中故多論夏中有閏亦得一百二十日畜雨衣雨衣開畜尚聽含閏安居制修豈客除去又解修道慕急多日為善不聽數閏足滿三月爾者既不許數即非安居中日閏中出界應不破夏答中問出宿即非相續在要期處是故破夏爾者受日逢閏亦得通攝以不答安居局處修道故便攝閏受日對事別開故但隨日爾者夏中有閏閏則夏攝五事賞勞亦得兩月六月不一解五利寬奢俱不攝閏數滿一月五月便捨不同安居又解五月攝閏以言冬四月滿既約時辨故知含閏一月局閏夏餘故不攝閏既言安居含閏其中若閏五月六月定須一百二十日住若閏四月者結位有三若前四月結者一百二十日住後四月結者隨日不定五月結者定九十日是中或有安居隔一月去時隔一日如似一人前四月三十日結一人五月一日結是名隔一月若論去者前人七月盡日去後人八月一日去是名隔一日若閏月中三十日結者並與五月一日同亦得云安居隔二十九日乃至一日去並同時若當閏七月者結位有兩五月一日已前十六日九十日住二日已去十五日百二十日住是中或有安居隔一日去時隔一月如似一人五月一日安居一人二日是名安居隔一日前人閏七月一日得去後人至八月二日去中間逢閏不成實日是名去時隔一月乃至有安居隔十五日去時隔一月等次約處門夫安居者須依界所以知依界者文云一脚入界內又受日出界外又背請成不成中云界內界外布薩又云此彼界僧破等又十誦五十三問頗有一比丘四住處安居亦名安居不答若牀㯓材木連接四界是中安居得名安居又問是比丘何處應與安居施物答四處一切合與一分又問眾多僧坊共結一界安居得不答得名安居諸比丘應住何僧坊答隨意住爾者如何文言某甲伽藍等答此謂舉處以取其界然界有二自然作法此之兩處俱成安居問依自然界安居得結界不舊解不得結結即破夏文言安居竟應結界故若爾先在自然攝衣界裏忽結衣界亦應失衣答不類以本受衣不假自然衣界故今雖結不失受法安居之法無成局界入界成安居故結即破夏問作法處安居得解界不答不得解解即破夏故文言安居竟應解界若爾解不失衣界即應失衣解言安居假界成今若解者失所依故解而即破受衣不假界解不失受又以局處故入界園等成安居但解即破受衣不局界故故使入界不成受衣縱解衣界不失受法今解不然夏中解結並不破夏爾者如何文言安居竟應解結解若其安居未竟而解結者但得不應之罪夏實不破如有百遮人不應受戒授者獲不應不妨發戒此亦如是其類寔多若以依界安居解即破者如依房藍安居房藍破時夏亦應失若以房藍雖破以不離處夏不失者今界亦然設有解結亦不離處如何夏失又祇律云尼依比丘安居安居中比丘若死罷道若餘處去尼不得去三由延內有僧住者通結界半月往問布薩以此證知解結俱得又解安居之中有解結者此之解結並悉不成如安居竟四事應作唯自恣一法替說戒處道其音許將竟作餘之三法必得竟為未竟受德衣共許不成受未竟有解結如何成解結雖有此釋且依前解為正次約人者謂出家五眾皆須安居如尼戒中具彰犯目既以進修不殊明知譏過亦等又十律二十四波離問佛誰應安居佛言五眾應安居問俱同安居齊應數歲答數歲安居二義差別不得以安居同即令齊數歲又以具戒滿足須分師德位殊沙彌不然故不數歲次約法者法有其二謂前及後四月十六日一日為前十七日已去總名為後此約賞罸以定前後若對比丘尼結罪說者唯五月十六日一日為後已上皆前此望結罪前吉後提今定前後據前義說若約作法時分以明若當無閏者三十一日中結若閏四月者六十一日中結所以爾許日並成結耶答以許日並是結時分內又以向後三月悉滿足故故下文言後安居者住後三月隨前安居得自恣不得數歲住待日滿不同祇律唯四月十六日五月十六日結成安居故彼文二十七云若比丘行未到住處安居日至即於路側依樹車等受安居至明相出趣所住處到後安居日應偏袒等三說安居比丘行道前安居日不受安居一越毗尼到所住處後安居日不受安居二越毗尼又准增三文更加一中義束應云四月十六日為前十七日已去即是其中五月十六日一日為後然准結法無有其中餘義至文當解次下釋文文分為四謂對首心念忘成及界初對首文二一前二後前中白所依人者謂是所對法人五分十九具列威儀此中文略作法文五一請攝念二𢇛己名第三依某聚落等者顯所依處此謂隨事以稱不勞並牒如下文中依山窟樹空斫材人等四正明作法要期此住前者簡別於後三月者除第四月夏者甄去春冬安居者標心擬住五房舍等者撩理資緣欲令四方眾僧不失受用之益顯要殷勤故至三也若在聚落等中安居者不須撩理資緣句以非四方僧處不合為白衣作使十誦二十四上座欲說安居從座起具威儀對下座三三說說已下座答言莫放逸上座言受持下座對上座作法亦爾唯言兩互投上座兩足為異又問持律等者以夏要須依第五律師故行法者准文作問尼法亦同後三月者三月者謂從十七日已去作法同前唯稱後三月為異故言亦如是次心念者以無比丘可對作法雖言心念必須口言口言之法律無正文准對首法除初句即是或在村落等中又除資緣句問既有心念安居亦得心念受日不答安是正修結有期限恐違期限故聽心念受日本為別緣要須牒事請他籌量故無心念次忘成者從外投此本為安居無人可白忘不心念佛見與處相應亦開成就故言若為安居故來便成安居准文即是從外來者先此界者不開忘成以義而求通開無爽一則忘法是同第二為安不出第三文據外來者以作開緣一開已後是忘皆行又復文中為無所依人可白忘不心念豈可要無所依人開忘成就若有所依人即不開忘開忘既不問有所依無所依明知約界不簡此處外來故五分十九云有一比丘分房臥具竟不作是念我今安居口亦不言後生疑悔我不結安居為成安居不以是白佛佛言為安居受房舍臥具雖不發心口言結之亦得名安居次明及界界分二位界是作法界園是自然界又解園者非是菜菓之園即是伽藍之體梵曰僧伽磨囉藍者不正此云眾園又如給孤獨園亦與伽藍不別以此故知界園一種又今言寺者謂是公院亦眾園之別名又可寺者司也此約園界相別便有雙脚入二一脚入二是則隨事分四初雙脚入界者前開忘成入界經久為有起此之心佛開成就今我入界心實不忘直為時促不及作法未知安居為成以不佛言雖不秉法不同前二憶而不忘復異第三然以本有起此之心與界相應亦開成就次入園義同次一脚入界者雙入全及判之如前我如一入不知成不佛言時轉逼促忩迫逾前遂本期心亦開成就問一脚入界許成安居一脚出界應成破夏解為遂益故成易破難若反前說便損其行若爾如入淨地亦同安居一入是觸一出免宿各隨利益不同安居觸要雙入一出免宿次入園亦同釋文雖爾次以義解解義三門第一列法多少第二定其前後第三新舊分別初門法者據制但二作法心念約開即四加忘成及界亦可及界離為四句是則安居總有七法次前後者安居望法但有前後故此七種前後俱通然約日辨則有通局謂作法心念乃至該於六十一日忘成及界唯局初後兩日成就謂已至十七明不及前猶有餘日不慮失後若望中居通局說者初二通三餘五唯局前後既有位法橫竪明者若約四法前後為八中唯初二總合為十離成七者前後十四中亦初二合有十六都計五眾八十安居次新舊者前三安居通新及舊不問此界外來皆得成就唯及界者是從外來先本住人即無此義故言為安居故來便成安居次分房文三第一舉緣第二從今下簡德差人第三差分房下處分儀軌此中文四一正處分僧祇三十四云遠者四月十二十三日分近者十四十五日分五分二十五云時諸比丘日日分僧臥具佛言不應爾聽春末日分臥具夏初日結安居然四方僧房淨者應用故言惡比丘來不應與此無與沙彌文受戒法中能護者聽與僧祇三十四云不得與沙彌房若師言但與我當治應與第二時諸比丘下都集等處不應分第三時諸比丘下記分居處第四彼比丘下移轉臥具受用儀軌文言定臥具者施心局處言不定者施心不局彼此之別次雜居文七一開後居二列兩安三恣前後第四數歲分限功德法故要須取終第五應遣不應第六受可分物第七臥具取不次居處文二初明隨處二爾時牧牛人下隨人雖言依人必須取處處還不離作法自然次出界法文中分四第一受日出法第二爾時世尊下為有二難護僧故聽移夏法第三爾時比丘於住處下有四句文為和僧故聖聽直去第四爾時有比丘受七日下日滿不還為難不破初文有二一受七日對首法二十五一月羯磨法先總解義六門分別第一定緣如非第二明緣離合第三懸受得不第四重受應不第五緣互成不第六事訖還不初門緣者受日牒事作法必須如戒為非法等緣秉無成義緣雖無量要束為五一三寶境界緣如文經勞比丘有作事須往林樹間及不信大臣奪佛眾僧衣被飲食所須之物又懷惡心欲鑿祇洹通渠即是佛僧緣又文言誦六十種經如梵動經為求同誦人即是法緣又伽論第六云安居中無事不得出界一宿若有事當受七日法或為偷婆或為法如是等因緣聽出二出家五眾生善滅惡緣如文受戒者生善懺悔者是滅惡三道俗病患緣如文信樂優婆塞病若父母若有諸憂惱事若有利益事及伽論云或為和上闍梨病四俗人生福緣如文大臣能作損益事父母恩重不問有信無信皆許受日諸餘俗人有信者聽往如文有檀越請比丘言我欲施等是五自求衣鉢藥草緣如文不應專為飲食故受七日去為衣鉢等聽雖為衣鉢要如法施等應去若為求利販易者不應去五分十九云若有請若無請復出界外一切皆聽七日往返又云從今若有佛法僧事若私處於七日外更聽白二羯磨受十五日若一月日次緣離合者隨別緣受作法定成縱多如緣合亦無失其猶悔殘三舉等類問緣若短長等者合加可然或多短緣壘長得不答文言不及七日還應受十五一月今由壘故不及合作何失次懸受者若據前緣要須現起若其預指未來懸受不得如無舉病行覆客呵此並不成其類非一若望用日理有懸義如雖得法未即成行爾者如七日藥義亦應然答藥以作法得七日故從加法日為定受為本期出界故以出界為限次重應不者舊解云安居立行專修道業何須重受是以十律聽受一七夜不得受二七夜故知無重又文言先受七日去若七日盡應受三十九夜去若三十九夜盡應破安居去准此文意故知不重若得重受受日去是何因答言破安居去若更引文多緣事別立有重受者不然之義隨時以破不繁廣說今解不然本以遊行起過制令安居今既結坐進修明無𠎝犯但為兩利不虗眾僧與法既非專意重受何妨文中但云佛未聽有如是事去不言未聽重去以此故知有緣皆得又復僧有要事許受經營事仍未終如何即斷又此文中列緣不少但言聽去不見遮重又五分聽近持律七日得往返處安居豈可前疑即許往問後須決者不遣諮陳如斯斷義擁而未通盡其旨歸實利皆得又若不合重受作法不成此秉不成何非所攝爾者如何十云聽一七夜不聽二七夜又為滅諍受七乃至令破安去耶解十誦與此部別不同不可以餘別文乱此行事若以十誦遣破類此不重者此文為和不受反彼十誦亦然既已不類明知部別又解詳彼文意義旨似殊前受一七用竟更受不應未用重加二法又事不了遣破去者但為淨事難滅未知了期故遣破安不須受日次緣互成不者受日法成本由事實事有短長束為三品此三品緣不得差互緣法差互並悉不成縱夏將未三二日在若遇長緣須加羯磨不得見日將盡即作對首法去如此出行咸皆破夏如似七日盡形藥未必要須經七日盡形服方加二法縱有少許亦加二法此亦同爾稱緣加法又得法後用亦不互如為佛受行乃營僧一一差違不能具載但有之者夏悉不成若本多緣共加一法縱使偏用夏亦不破所以爾者以此諸緣咸悉有法隨本為緣營者皆得次事訖還不者古舊釋云受日出界事訖須還訖雖不還夏亦不破所以爾者以法在故其猶七日藥叉與欲類又如癲狂比丘得癲狂法病止法存從僧乞解今解受日不開藥等受本為事無事不成故今事亡法則隨謝如僧祇事訖與此冥會又受德衣限滿不捨豈言不捨法得在耶夫守夏人恒須明察豈得取他誤言不護自夏其藥局法為正復以手為所依說欲送和至僧已和豈即成別癲狂本除眾疑狂止更須乞解問所以受日定知約事答如有三品長短受緣互秉不成故知約事爾者受既一向約事成者如有二三日緣如何乃加七法答受約緣成緣難定限故隨長短勒為三品但不及即日還應受七日往不及七日等類前亦然次下釋文緣中長離總二十二父母請喚雖復重疊但為父母二緣餘相可解次釋羯磨受法先明作法方軌可為六門第一約時第二約處第三就人第四辨法第五作法次第第六有乞無乞初門時者要是夏分成安者受為明有法住有法去故若論作法期限諸部不同七日一法通諸部用羯磨受者五分所明一同四分餘二有異十誦三十九夜僧祇有事訖彼二十七云如是事訖應還若半月若一月若二月乃至後自恣應還不還者越毗尼罪次依處者十誦四十七波離問云何處受七日法佛言界內受既言界內蓋是本來安居之處此本居處通於二位七日一法二界俱成羯磨受者唯是作法然作法中局是大界以諸小界不合安居又就小中戒塲容得但可獲以不應成安聽受次約人者能受之人要上二具下三雖安不論受日然有立義尼無羯磨受法女弱不聽多遊入俗外化所物故與大僧不同是以祇律尼無求聽羯磨受日出界今釋不然尼合具行豈以緣對僧說即不通尼又無遮文如何不受然所對境亦上二具通於本界外來不局當處下眾雖不數歲行亦須白故十誦云從五眾受次約法者七日無文准白安立雖非正文行用無失羯磨法者如文可知又十誦四十七有心念受七日文問心念得受七日不佛言不得除五種人謂蘭若獨住遠行長病飢餓時親里邊住人次受次第者昔解要須先受七日次十五日次一月日若某已受十五不得更受七日以長攝短故如功德衣五月即攝迦提一月又一月夜開便収十日一月望十五其義亦然今解不爾受日約緣緣起不定如何要遣先短後長若受不隨三品緣者事不稱法夏豈得成若爾如何文言受過七法答十五望七日事過故過羯磨形對首法過故過是以言過七日不以用竟名過又問一月望十五亦是事過如何不言過十五法舊解云相望長短言過十五日義亦無妨且並舉此二對七以說故爾今解不然羯磨望對首故得稱過十五一月日雖多少同用白二不得稱過若一月用白四可稱過耳次乞有無者此部諸文皆無有乞有加乞者定不成就立之與破先德具明但依文得失非我問此既增乞羯磨不成如何杖囊加乞成就答杖囊法體中有緣中略無准法前增不名非法此受日法前後俱無人輙妄增故不成就又問如處分離衣受戒懺悔並皆有乞此何獨無答如所列者並是自事假僧量宜故須有乞受日乃為三寶等事非專為己所以無乞設少為己相從亦無然羯磨中云若十五若一月者此是出法之言不定之稱但不及七日或即十五一月隨緣牒事不得並言次二難護僧文中有三初有五句是淨行難次有六句命難十誦二十四有病比丘夏安居若不得隨病食及隨病藥看病人有如是事難故出去無罪第三有四句以見聞兩位各對僧尼既破由我為護須去此等皆由本處有難直爾聽往移夏彼成既不受日從初去時即應勤勤覓安身處若覓住處未得已還隨經宿處不破安居以非心慢翻前即破若得住處夏法彼成輙更出外經宿即破於後雖可本處難盡亦不合來來須受日然准五分等文有緣聽破無罪故五分十九有一比丘安居麤食不足白佛佛言聽以此因緣破安居無罪又善見十七云若安居中有因緣移去無罪不成安居次和僧四句者聞異界僧欲破已破各對僧尼故成四句謂前二句聞異界僧尼欲破後之二句聞異界僧尼已破此等元非本處有難為僧直去事了須通謂若中前了中後須還暮了旦還若停不還經宿破夏母經第五有一比丘獨處安居聞一比丘欲行破僧此比丘心生疑若往諫恐破安居若不往恐惡法流行佛聞已告言若為法事不破安居比丘尼亦如是復有比丘聞彼已破僧竟生疑同前佛告曰若為和合破僧法者不失安居比丘尼亦如是次日滿不還文中但舉作法出界逢難過限開成安居若本無法蹔出逢難義同前開文無者略次背請文二初明無緣背而獲罪第二爾時有比丘下彰有難緣背而無罪前文有三謂起過呵責立制立制文二初舉跋難陀背安居請不得前歲違要得罪二若比丘下廣明立法於中復二初舉前安背之儀軌二後安居亦如是者舉後類前前文復二初之六句至界外布薩已去次有五句來至界內布薩已去但四月十五日未至請處彰背不背故言界外謂十五日已至請處彰背不背故言界內外中前四成背是破下二非背不破破中初句不至請處下之三句來至請處先解初句問此元便去本未成安如何乃言破前獲罪答若不便去來即成安以去不來故名為破即是應成不成說名為破不是先成名之為破次下三句來至請處皆悉結竟已成前安今言破者破有二義一者要須經宿事隔若未過限破不究竟二至後處作法結竟以後法成前法謝故今文直言背前破過不論後處成不成義次五六兩句翻前並成次界內五句前三句破後二句成准釋可解次後安同前還須約界內外作十一人且如受他十七日請若十六日未至請處當他界外布薩有其六句若十六日已至請處當他界內布薩有其五句如是展轉乃至五月十六日作法同前故言後安亦如是次非背可知上來安居法竟
