body:
  text: 次下釋文文雖浩博聖凡見異如佛所言毗尼有五答一序謂知時已前二制謂僧戒本三重制謂尼戒本四修多羅謂諸楗度五隨順修多羅謂條部已下若依結集眾聖為五復別謂比丘律比丘尼律楗度條部毗尼增一以為毗尼藏又依律主分文自為四分然分分中皆攝多法問如前二說旨歸可明所以第三作其四分解但為律主四誦方終隨一誦時即為一分如本本藏號八十誦五分十誦准例應然今准義分文為三謂序正流通第一知時已前是其序分第二毗舍離下是其正宗第三五百已下是流通分故佛地論云第一教起因緣分第二聖教所說分第三依教奉行分釋三名者謂因啟請作顯宗由發端起之稱之為序正明所防犯及不犯當於教興故曰正宗道化遠開遐霑後葉隆於永代是曰流通其所以者說經制戒必有由藉故先有序序分既陳宜宣宗本故次正宗正說之利亦霑未來故後流通然此科文西方亦無佛法創來騰蘭開化亦但案文無此次第齊魏已前例皆如是自後諸德方設軌儀迄至于今同行不施作此科文雖非是義然得識知文分之齊文既具三先明序分序文分二初偈文者是勸信序毗尼本藏唯一今乃分五別行律主將傳別教被及遐代恐時不信先勸生信以勸信故名勸信序第二蘇羅婆下是發起序失聖人制戒不得無請而陳故須託處興請以作發起之端發起聖制名發起序如諸經中亦分二序問發起前興反在後說勸信偈後何以初明有人解云若發起前明二種不便一彰身子請序隔於勸信發起不便二顯曇摩勸信不具若勸信前明順前兩義故迴發起次於後說今解不然三分之文皆在先有律主今欲傳此三文恐時不信先勸生信以此故須勸信前說然據實理此勸信偈乃在流通分後何以不對正宗等文以辨先後故知不爾雖復勸信後說法須前明釋此二序差別多種一者名異謂名勸信及發起二能說人異謂師弟不同三說時不等時有現未四經體有異謂發起序出自金口勸信序者傳於竹具五所詮旨異凡欲流通聖教非信不傳故此偈文意勸生信長行文中請聖制戒託處興請以彰發起第六總別望本大藏偈序是別長行是總若約當部三文即偈序為總長行是別所以爾者偈欲傳此三文恐時不信先勸生信即是其總長行直是請聖制戒發起正宗不欲發起序及流通故是其別既知二序差別先明勸信勸信文三初稽首禮三字是云何敬標能敬儀第二諸佛下七字是何所敬顯所敬境第三今演下至于偈末是何故敬申其敬意欲解三文先加三義言三義者一能敬體二所敬體三明敬意初能敬然即是律主三業故婆沙三十四云應作是說是身語業及能起彼心心所法并諸隨行如是善五薀是能歸體若局明者其唯是慚故俱舍第四云敬以慚為體第二所敬體者謂即三寶釋三寶義二門分別第一釋名第二出體言釋名者梵曰佛陀此云覺者具一切智了達諸法自覺覺人覺行窮滿故名為覺然欲釋此覺位不同總有其六第一三僧企耶所逢事佛第二修波羅蜜多圓滿時分第三於次百劫修妙相因第四生處人中成佛之意第五最後身出家已修有漏行斷惑第六菩提樹下作無漏觀斷惑成佛言初位者菩薩於初無數劫內供養七萬五千佛最初發心佛號曰釋迦牟尼謂我世尊昔菩薩位最初逢佛號釋迦牟尼遂對其前發弘誓願願我當作佛一如今世尊是以今佛機緣時等皆同往聖於劫滿時逢寶髻佛第二無數劫供養七萬六千佛初即寶髻後即然燈第三無數劫供養七萬七千佛初是然燈後是勝觀第二位若時菩薩但以悲心能施一切身命體等都無小許戀著之心非為希求勝生差別齊此施波羅蜜多修習圓滿若時菩薩被解支節乃至無全如芥子許雖復未離欲貪然心無忿齊此名為淨戒安忍二波羅蜜多修習圓滿若時菩薩勇猛精進因行遇見底沙如來坐寶龕中入火光定威光赫弈特異於常遂以無怠淨心至誠瞻仰忘下一足經七晝夜以妙伽他而讚彼佛如是便超九劫成道齊此名為精進圓滿若時菩薩處金剛座將登正覺住金剛喻定齊此定慧二波羅蜜多修習圓滿此則六波羅蜜多勒成四位圓滿所謂戒忍定慧兩兩合明婆沙一百七十八云如是所說皆依一時一行增上說為圓滿如實義者得盡智時方得圓滿第三位從第三無數劫後至應成佛時合經百劫修習妙相因但由翹足讚歎底沙精進因緣便超九劫唯九十一相業即圓然後入修趣道決定名真菩薩故得定名於修已去捨五劣事得五勝事一捨諸惡趣恒生善趣二捨下劣家恒生貴家三捨非男身恒得男身四捨不具根恒具諸根五捨有忘失念恒得自性生念由此得名真實菩薩未修妙相業時與此相違是故不名真實菩薩問相是何義菩薩修耶答相是標幟義殊勝義祥瑞義又問所以佛身須有相者答欲與無上菩提作所依器謂殊勝功德決定依止殊勝勝身第四位問一生菩薩生覩史天何緣唯此非餘處耶婆沙一百七十八解云若上若下俱亦生疑然生彼天不違法相有說覩史多天是千世界天趣之中猶如齊法是故菩薩唯生彼天有說下天放逸上天根鈍唯覩史天離二過失菩薩怖畏放逸厭患鈍根故生彼天有說下天煩惱利上天煩惱數唯覩史天離此二種菩薩厭此二類煩惱故生彼天問復何因緣不生色無色界答無色無形不得說法色雖有形可得說法而以深著禪味不利眾生問何緣菩薩於最後有唯從天歿不從人來婆沙解云於諸趣中天趣勝故有說從天上來人所重故有說從天來時有神變事從人趣來無如是事又問何故菩薩不即於此天中成佛而來人間答婆沙云隨諸佛法故謂過殑伽沙數諸佛世尊皆於人中而取正覺復次天趣身非無上菩提所依止故復次人趣根性猛利多分能受如來正法天趣不爾復次有二事處佛出世間一有厭離心二有猛利智當知此二唯人趣有第五位然斷惑道有其二位一有漏道二無漏道菩薩於此最後身出家已即修有漏道斷九地中下八地見修煩惱其有漏道欣上厭下方能斷惑唯非想地更無上地可欣故有漏道不斷彼惑然斷惑時亦有九無間九解脫道以所斷惑分為九品一一品處皆具二道諸無間道緣次下地諸有漏法作麤苦障三行相中隨一行相其行相者俱舍二十四云非寂靜故說名為麤非美妙故說名為苦非出離故說名為障靜妙離三翻此應知第六位於菩提樹下三十四念證得無上正等菩提先斷見惑斷見惑時諦現觀中有十六念從世第一善根無間即緣欲界苦聖諦境有無漏攝法智忍生此忍名為苦法智忍此忍無還緣欲苦有法智生名苦法智問何名法智答以初證知諸法真理故名法智次總緣上二界中苦有苦類忍生名苦類智忍此忍無間生苦類智問何名類智答次後境智與前相似又後隨前而證境故舊云比者非也緣餘三諦各四亦然四四便成十六行別此皆無漏以慧為體諦現觀中次第應爾然法忍智不斷煩惱以下地惑先斷盡故唯類忍智斷非想惑次離有頂修道煩惱有十八念謂九品惑起九無間道九解脫道以此足前成三十四此三十四前三十三是菩薩學心第三十四是佛無覺心一切菩薩決定先於無所有處已得離貪方入見道故成佛時不斷下惑梵云達磨此譯為法法則有二一持自相故名為法相之言性謂自性不改如色等法常守礙等自性二軌生物解故名為法如無常等法生人無常等解梵云僧伽此譯為眾舊以和合翻僧失於正義然實義者眾正翻僧和合乃是僧家義用謂四人等秉法成和是以文言僧者四人若過和合者一羯磨一說戒通名實者齊為時珍實性論第二問曰以何義故佛法眾僧說名為實答有六種相一者希有以無善根諸眾生等百千萬劫不能得故二者明淨以離一切有漏法故三有勢力以具六神道不可思議威德自在故四者莊嚴以能莊嚴出世間故五有最上以出世間法故六者不變以得無漏法世間八法不能動故第二出體先解其佛佛體就勝謂能成佛諸無學法即盡智無生智無學正見智及彼隨行無漏五薀以之為體然隨義分亦具三佛謂無漏五分法身以為法佛王宮生等以為報佛化作色身化餘方等以為化佛次明法者若以持自相故名之為法此即通於一切諸法今約位別分之為四謂教理行果教謂聲性即十二分教苦集諦攝理謂四諦十六諦理彼諦之理即彼諦攝行者通說有其二種一無漏行二有漏行若無漏行唯道諦漏若有漏行通苦集諦此中行者局是無漏即菩薩二根辟支三根果謂涅槃離繫果故是滅諦攝次僧體者謂聲聞僧學無學法四果四向是僧寶體此偏明理不約事和第三歸意者歸依有二一總二別總有七意第一顯法精微簡異外道以諸邪人執法有無於其教初皆置阿憂二字而今佛法不同彼眾若其弟子制造先須歸敬三寶如也直弘佛言首稱如是故成實云三寶以最吉祥故我經初說第二顯發有情信敬心故如諸聖人傳佛教旨先標三寶功德勸信歸依況餘凡愚不生淨信故雜心云開發眾生佛法僧念顯等三寶真實功德第三顯示究竟歸依之處為翻有情妄計邪法恒歸天神樹林園菀諸山制多以求福祐故婆沙三十四云此歸依非勝此歸依非尊不由此歸依能解脫眾苦今以殷重淨心歸依三寶拔濟有情開正法眼故婆沙又云此歸依最勝此歸依最尊必因此歸依能解脫眾苦第四顯有恃怙傳教心安若不歸依如商無侶國無君主心情惶懼戰掉不安故涅槃第二云我今無主無親無歸無趣第五顯示僧尼遵奉儀式夫真宗至理弘闡寔難既欲宣揚須歸三寶諸偈云云第六請威加護將傳聖教慮有魔怨要請冥快方能演化諸菩薩等傳教亦然先請威加後方弘唱故勝鬘云衰愍覆護我令法種增長此世及後世願佛常攝受第七報恩供養三寶於生恩深德大以聞法戒會理忘筌是故下文非是衣等四事能報以今傳通令法不墜用茲微蓋仰答深恩次別歸者佛是教主今弘佛言故須歸依戒表受奉法是所宣之法蓋潤無窮若不先以歸依慮恐後傳無利僧是傳教之人修齊證等若不至誠歸依何以旌其敬業次釋三文稽者孝也首者頭也禮者敬也所謂傳法之人歸依三寶將頭孝地表敬之甚故曰稽首禮亦可稽者屈也首者頭也屈己之尊禮彼之卑故曰稽首智論十二云人身中第一貴者頭五情所著最在上故足第一賤履不淨處在下故是故以所責禮所賤貴重供養故復次有下中上下者揖中者跪上者稽首頭面禮足是上供養又第一百云禮有三種一者口禮二者屈膝頭不至地三者頭至地是為上禮人一身頭為最上足為最下以頭禮足恭敬之至然禮雖三此局明上所禮是何謂是諸佛以三際佛化儀不殊故設敬中諸言總攝問所以得知禮通三際答以戒經云如過去諸佛及以未來等爾者佛化理均敬通三際過未佛教應並稟承答據教稟承唯通過現懸敬有益故及當來問所以得知稟承唯過現非未來耶答以戒經云毗婆尸等不言未來彌勒佛等佛如前解及有二義一相違義二合集義此中及言意顯合集所以得知顯合集者以一稽首通下二故法義如前比丘僧者比丘是能成之因僧是所成之眾能所合舉故曰比丘僧比丘者梵音不正正曰苾蒭智論第四正義有三一曰乞士清淨活命故名乞士乞有二義所謂上從諸佛乞法以資神下就白衣乞食以濟命此復二義一為資身長道故遺教云執持應器以乞自活二為利益施主故下文云慈愍白衣家故然乞須離四耶五耶正命自居名為乞士言四耶者謂下口仰口方口維口故智論第四云有出家人合藥種穀植樹等不淨活命是名下口食有出家人觀視星宿日月風雨雷電礔礰不淨活命是名仰口食有出家人曲媚豪勢通使四方巧言多求不淨活命是名方口食有出家人學種種呪術卜算吉凶小術不正如是等不淨活命者是名維口食五耶者智論二十二一行者為利養故詐現異相奇特二者為利養故自說功德三者為利養故瞻相吉凶為人說法四者為利養故齊聲現威令人畏敬五者為利養故稱說所得供養以動人心耶因緣活命故是為耶命二名破煩惱比名破丘名煩惱能破煩惱故名比丘三曰怖魔比名怖丘名能能怖魔王及魔人民當出家剃頭著染袈裟受戒是時魔怖是以初莊法裳波旬悚慄後敦戒行更復慞惶釋比丘訖僧義如前次申敬意大文分三初有九偈半歎戒申其德利第二所以立王者下有三十六偈寄喻申其損益第三末後半偈申訖息喟歸禮前文有八初有半偈明法久住第二半偈顯傳有由第三半偈將宣勸聽第四一偈戒能益物第五三偈戒利功德第六兩偈戒能生善第七一偈戒能滅惡第八一偈戒調三業先釋初文正為宣陳行儀軌則故曰今演說毗尼之義如前已明然母經第七云毗尼者凡有五義一懺悔二隨順三滅四斷五捨懺悔者如七篇中所犯應懺悔除懺悔能滅名為毗尼隨順者七部眾隨如來所制所教受用而行無有違逆名為隨順毗尼云何名滅能滅七諍名滅毗尼云何名能斷令涅槃滅除不起名斷毗尼云何名捨捨有二種一者捨所作十三僧殘是也以作白四捨事二者捨見事如阿梨比丘說言我親從佛聞行欲不能障道捨是見故名為捨也然諸教文有廣有略此文有八如增二說僧祇三十二有五一略毗尼謂五篇戒二廣謂二部毗尼三方面如輸奴邊地聽五事四堅固如受德衣捨五罪故五應法謂法羯磨和合羯磨了論有九一比丘毗尼如故意出不淨等二比丘尼毗尼如獨行等三二部毗尼如初夷等四罪毗尼謂八緣起所生如法對治五惑毗尼如三界五部惑九永斷智六願毗尼謂十種學處即沙彌十戒攝未來事盡所以名願者若不受十戒則不得具戒此戒是具戒方便能攝未來事故名為願七無願毗尼正羯磨竟時四萬二千學處一時並起無復一戒不生故名無願八一處毗尼如受戒洗浴等事處有二義一國土為處如邊方開等二時節為處如昔三歸得戒今即不得洗為中國熱便聽等九一切處毗尼謂一切時應共學處此等為毗尼法者毗尼即法名毗尼法是同依釋為有軌則義邊名法有滅惡生善義名曰毗尼然由宣此令法久住如下文中制眾別行皆獲十利又持律人得五功德一戒品堅牢二善勝諸怨二於眾中決斷無畏四有疑悔能開解五善持毗尼令正法久住此由人不自立假法以成法不自弘由人故顯故曰令法久住又五分第六云世尊種種讚歎誦毗尼讚歎持毗尼讚歎優婆離說持律比丘有五功德一自堅護戒二能斷慚愧者疑三自住正法中四於僧中所說無畏五除伏怨敵時諸比丘作如是念佛為我等作如是說我等云何而不勤修誦問毗尼即共誦習晝夜不懈又十誦四十七波離問過去佛法幾時住世佛言隨清淨比丘不壞法說戒時名法住世未來現在佛亦爾又善見十六云云何令正法久住一者身自隨法二者能令他得法因得法故正心持律因持律故得入禪定因禪定故即得道果是名正法久住又佛語阿難我滅度後有五種法令法久住一毗尼者即是汝大師二下至五人持律在世三若有中國十人邊地五人如法受戒四乃至有二十人如法出罪五因律師故令正法久住是名持律五德又云以律師持律故佛法住世五千歲是故多諸比丘就優波離子律云何學律讀誦解義是名學律又俱舍二十九云世尊正法體有二種一教二證教謂契經調伏對法證謂三乘菩提分法有能受持及正說者佛正教法便住世間有能依教正修行者佛正證法便住世間故隨三人住世時量應知正法住爾所時次顯證者我等先雖同依一教然並不能總修學者寔以根器不同見聞有異故即妙躅分階玄言異徹我今既欲隨信別行恐有自制之疑故引初聞為證然我所傳實非私謬是佛演者波離傳者佛但立制皆集僧眾以因一結教網普霑波離在會之初故稱為首眾內同聞非一名曰及餘亦可波離集法之初故稱為首諸聖同會名曰及餘亦可波離秉律名之為首迦葉等傳稱餘身證問波離既自闡律何不自傳傳中乃是迦葉等五舊解云迦葉等五理行俱通故傳法中次第彰目其優波離但明行教由德不具故沒其名今解但以波離於佛滅後與生無緣故不付屬非是不具傳通之德以大聲聞皆堪化物迦葉等五於生有緣是以世尊付令傳授問何故此列波離不彰七佛戒經舉其七佛不顯波離答此列波離顯傳可信不稟餘佛故不列名戒從此生波離理有為稟餘教總彰七佛又解律戒無殊但是綺文互顯謂此云諸明以攝七戒從此起波離已通次明勸聽即演不賖名之為今陳彰在口所以言說戒為德本稱為要義故遺教云若人能持淨戒是即能有善法若無淨戒諸善功德皆不得生是以當知戒為第一又戒能資出離之行凡欲起修莫不由此故名要義稟行和直稱賢賢非一故名諸冀諸賢者齊志詳飡恐有謬聞之失錯傳之過故言咸共聽次明益物戒是履聖之初蹤起行之因本既是行本難可測量故名為深是以文云戒如海無涯亦可戒體幽玄難知分限故名為深佛說此戒為二種人一是止持故曰為樂持戒者二是作持故言為能諷誦者亦可持戒故斷惡諷誦故修善依教奉修咸蒙利益益者非一故名為諸通而言之利益相似據別旨趣非無差異所謂止持名利作持名益又斷惡名利修善名益又自行名利他化為益又福德名利智慧名益又獲現安名利得離求苦名益又得世善名利獲出世樂名益又獲有為功德名利顯得無為涅槃名益長老者謂有耆舊之行故莊嚴論第一云所謂長老者不必在髮白面皺牙齒落愚癡無智慧所貴能修福滅除眾生惡淨修梵行者是名為長老次明戒利文三初有半偈舉數顯勝次有兩偈彰其利體後有半偈結成制意然雖戒利無邊此且論十句則表彰義者為德制此戒利唯佛非餘故云諸佛之戒法亦可木叉之戒由佛故有佛不出時即無此法故云諸佛之戒法亦可證大菩提皆由戒法即是成佛之法故云諸佛之戒法又可外道諸師亦有戒法為異外道故云諸佛之戒法此之戒法成依主釋次明利體下有正文且略屬當文中不次令僧喜永安第二第三利攝取於僧第一利不信者令信第四利已信者增長第五利斷不持戒者第六利令耶道入正第八第九利慙愧者第七利佛法久住第十利次結制意世間最勝勿過戒法是以我今演說流布故云世尊最勝等次生善文二初偈舉喻次偈勸持前中上半喻下半合喻中眾山眾流約教總喻三藏約行總喻三學然山中須彌流中大海流中勝而今戒行諸行中最同彼山海故遺教云依因此戒得生諸禪定及滅苦智慧教由詮此亦名為最然合喻文影略互顯約教應言毗尼第一最約行應云眾行億百千次明舉最勸持第一最者是佛菩提有心欣樂故曰欲求今世正是分時僧尼後世即是未來僧尼過去僧尼自稟大教既稟大教不合有勸非為己謝勸之無益慮恐人疑後身有戒故言當持等次明滅惡結是九結謂愛恚慢無明見取疑慳嫉此結繫縛名為罣礙除此九結雖由慧力慧起由戒故云無罣礙縛者三縛謂貪嗔癡三縛得解亦由戒功故云由此故文殊問經上卷云解脫縛聲者縛者三縛貪嗔癡縛解脫者離此三縛此謂解脫縛聲又解縛者是惑謂是造業之本戒既除本業不能羈故云無罣礙七非繫人名之為縛起染稱之為著除此縛著莫不由戒故云由此解照知違順詳其淨穢了了分別其猶懸鏡高堂好醜斯現故曰以戒等次調三業將修二時之行必須三業齊䇿故善見第四云如來哀愍眾生三業不善是故說毗尼藏以制身口意業故曰夫欲等懸說難依成規易倣羅云為彼三業加惱忍不反報却愍前人以此引示進修儀軌故曰當觀等次下彰其損益大文十四初有兩偈能詮教興喻第二十偈所詮罪相喻第三兩偈愚智畏不喻第四二偈簡是擇非喻第五二偈戒如脚足喻第六二偈戒如浮囊喻第七二偈戒如階陛喻第八二偈戒如伎藝喻第九二偈戒如法眾喻第十二偈戒如慈母喻第十一二偈戒如猛將喻第十二二偈戒是真生喻第十三二偈戒如王印喻第十四二偈戒勸修說喻先解初喻於中文二初一偈半喻下之半偈舉法合喻喻中文二初一行偈教興所由次之半偈教興所為此一部律教尊貴可重為僧尼所欽喻若於王貴此教興所由故言所以立王者若准合文云如王治正法此中不貴立王所由但貴王立治法所以其文應云王所以立法者此即以佛為王五犯等為治法若以戒律為王者不知以何為治法由世諍訟者喻諸比丘犯罪眾人舉者喻諸比丘舉過白佛古昔常法者喻一切佛咸待犯請集眾呵責制立學處此法非今曾當亦爾古今恒然名曰常法次解所為立此治法本為二人一者犯已能悔謂識藥病懺滅軌儀故言犯罪者知法二者專精不犯謂守教人筞修離過故曰順法者成就合文可知次明罪相於中有二初有二偈總喻五犯次有八偈別喻五犯總中先喻後合次下諸喻例然喻中初句觀病次句立章下二解釋律顯罪相五七分明猶如毉王觀病相似故曰如等次立進止二門下之四犯並得懺除故名為進初過極重不可悔滅名之為止此止具其四義一壞根本二定障道三不可懺四不足僧翻此四義即名為進此進與止各合軌儀設法不差名得其所下釋可知次合喻文初句合初句下三合下三四事一句合止得所不可者則捨可救等二句合進得所及可治即進藥又一義合者初句合初三字四事十三餘者合眾病二字不可治合止得所門可救不須救合進得所門次明別喻初之二偈與初犯為喻廣上總中止得其所不可者則捨次有二偈第二犯喻次有二偈三四犯喻後有二偈第五犯喻此以三喻廣上總中進得其所可治則進藥問所以餘犯離明三四合說答五犯懺時第五心念既不對境別為一喻餘之四犯皆對境除於對境中初二對僧三四對別然初二犯雖同對僧但以懺擯不同故須離說三四兩犯說雖一三同對別人是以合辨爾者四犯畏中何以離說答犯畏為取怖顯怖故離明此文為勸持勸持故合說有解犯畏為取怖怖微者沒名顯怖增四門是故離三四此喻非顯怖勸持有同別同者即合明別者便離說初喻四句初句自行絕分喻次句眾法絕分喻次句作法除棄喻後句淨不容穢喻若犯夷罪一形永障絕於慧命名之為死畢竟不成活比丘用名之為屍屍者有其五義如下文云死人有五不好一不淨二臭三有恐畏四令人恐畏惡鬼得便五惡獸非人所住處是為五犯戒人有過失有身口意業不淨如彼死屍不淨我說此人亦復如是或有身口意業不淨惡聲流布如彼死屍臭氣從出我說此人亦復如是彼有身口意業不淨諸善比丘畏譬如彼死屍令人恐怖我說此人亦復如是有身口意業不淨令諸善比丘見之生惡言我云何乃見如是惡人如人見死屍生恐畏令惡鬼得便我說此人亦復如是有身口意業不淨者與不善人共住如彼死屍處惡獸非人共住我說此人亦復如是是為犯戒人五事過失如彼死屍又云破戒有五過失自害為智者所呵有惡名流布臨終時生悔恨死墮惡道是為五持戒有五功德反上句是復有五事先所求得物不能得既得不護若墮所在眾若剎利眾婆羅門眾若居士眾比丘眾於中有媿耻無數由旬內沙門婆羅門稱說其惡破戒惡人死墮惡道是為五持戒有五功德反上句是為業既重淨眾不納其猶大海不宿死屍故言大海不容受自四除擯求住無由故如疾風所漂不應僧儀永甄眾外故曰弃之岸上優婆塞五戒相經云佛告比丘吾有二身一者生身二者戒身若善男子為吾生身起七寶塔至于梵天若人虧之其罪尚輕可有悔義虧吾戒身其罪無量不可懺悔故智論二十五偈云眾僧大海水結戒為畔除若有破戒者終不在僧數譬如大海水不共死屍宿又涅槃經三十三云大海不宿死屍死屍者謂一闡提犯四重禁五無間罪誹謗方等非法說法法說非法受畜八種不淨之物佛僧物隨意而用或於比丘比丘尼所作非法事是名死屍是涅槃經離如是等是故名為不宿死屍合中上二合初句第三合下三四勸持次解第二喻上半喻持益下半喻破損恒以念等居心禁防身語惡不得便故如守門對治行成畢竟清淨不為緣壞稱云牢固不懼外惡劫人善財故曰不憂失財物護持此行眾法成就綱網得立義同恒墻遇緣毀犯稱為缺壞慮失戒財故曰憂懼次合文中佛戒合財物不缺壞合門窂固奉持者合如守無憂合不憂失禁戒合有財不窂固毀犯合恒墻缺句壞憂合憂懼次第三喻上半喻破下半喻持三四行微未極根本易為緣虧等同坏器坏器既壞本行不全名為穿漏僧尼行者即是凡師覩己過𠎝怖畏惡道故曰愁憂三四行成不為緣壞剋令淨用名為器物完具隨能資受名為眷屬內心慶悅故曰歡喜合文可解次第四喻初句舉喻次句勸持次句辨損後句彰過吉罪雖小傷害不輕同於熛火故以況之此罪雖微性是違理所有善根焚燒漸盡故曰莫輕以為小相續善心猶如草木此等莫不為火所焚故曰所逕等一念微惡能開五不善門為此善根燒無餘在故曰燒等言五不善門者一能燒善根二從惡生惡三為聖呵責四退失道果五死墮惡道智度論二十五云佛說四事雖小而不可輕太子雖小當為國王是不可輕蛇子雖小毒能煞人亦不可輕小火雖微能燒山野又不可輕沙彌雖小得聖神通最不可輕次合文者句別相當亦可初句合初第二句合下三下之二句引事勸持次愚智喻喻中上半愚人不畏喻初犯過深永絕出路惡聲外彰可畏之甚如師子吼聞者皆懼愚癡僧尼為惑迷亂名為醉者於此極罪不懼沈淪故曰不恐怖此則舉重況輕重既不畏輕則亡言下半智人能畏喻吉羅小𠎝損不至極惡聲外彰畏之不甚如小獸聲聞皆不懼智慧僧尼不為惑亂名為聖者於此微惡深懼沈淪故曰聞則懼此財舉輕況重輕既畏重則亡言合中初句合醉者一切惡合師子吼不懼合不恐怖智者合醒者於微惡合小獸聲雖微常懷一句合聞則懼次簡擇喻勤修二持能除七犯止作相資名為和合對除之行非一曰眾行成滅惡稱之為藥藥有不良理須擇去簡取良者以療眾病故曰擇去不良者僧尼常為七犯羈繫稱為病者善修二持行成離過名之為服七非應起不起已起懺除稱云除愈七非既絕名曰身康不為物繫稱云安樂合文句別相當可解次脚足喻上半喻持近求天報違趣菩提果去因懸稱為遠路發意將趣名為欲涉意雖將趣戒足須全尸羅若虧無由能往故曰當自等下半喻破戒足既虧常淪惡道不能遠涉善趣難期合中上半相當下半舉持反合次浮囊喻七非漂溺𤀹急如河意欲捨非稱云欲度戒體清昇能越生死喻若浮囊常修對除護本所受義同用乎非河雖深不懼漂溺故曰雖深無沒憂達到二持彼岸之果故曰便能等合中上半相當下半長聲連合亦可初句合如人修行合欲度及用手禁戒本合浮囊耶流生死海合河終不迴及沒溺合下二句次喻階陛喻菩提法堂永絕危苦喻帝釋堂以三十七菩提分法莊嚴此堂故曰彫飾等將階此堂藉戒為鐙故如階陛聖賢遊履名曰天人所行合文細解思而可知次伎藝喻恒習二持善巧方便故曰如善學世間亦可言到應云世間善學伎者內心對決藝者外能覺非亦可伎者是能藝者是業業能非一稱云一切藝業成就為王識知既蒙賞優得雖貧賤故曰為王等非直絕其貧賤亦得富貴自怡故曰以是等合中上半到而別下半順而別次如法眾喻初偈窂眾次偈讚美就初偈中上半偈喻下半偈合佛法住持假眾和合資成僧用不為惡壞故曰先自窂眾惡在善外稱云彼軍伏從正化名之為破合文可知次偈以眾和合世尊稱譽僧既和同佛法久住故俱舍眾僧和合樂同修勇進樂又華嚴經第十三云復次教化眾生發菩提心是故能令佛寶不斷開示甚深諸妙法藏是故能令法寶不斷具足受戒威儀教法是故令僧寶不斷復次悉能讚歎一切大願分別解說十二緣起行六和敬復次下佛種子於眾生田生正覺芽不惜身命護持正法善御大眾心無憂惱若以去來今佛所說正法不違其教是故能令三寶不斷次慈母喻飲飼曰乳生身曰母拔苦稱慈與樂名愛養者長養戒能長養諸妙功德護者防護戒能防護諸惡不善母護其子令有紹繼之能戒護行人便有成聖之義一切水火難者是所護事三塗逼惱猶如水火戒護行人不遭此難故曰護使等合中上半合上半次終不墮合第四句畜生等合第三句次猛將喻內有刪決護戒之心曰勇覺察外非使不侵擾稱猛能破犯軍名之為將常修二持名為善習犯違於持義同戰鬪增一阿含經第二十五佛告比丘五健大夫堪任戰鬪出現於世云何為五有人着鎧持杖入軍戰鬪遙見風塵便壞恐怖第二人若見風塵不壞恐怖但見高幢便壞恐怖第三人見風塵高幢不怖若見飛箭便懷恐怖第四人見塵高幢飛箭不怖但入陣時為他所捉或斷命根第五人若見風塵若見高幢若見飛箭為若他所捉乃至於死不懷恐怖能壞他軍境界無外而顧人民是謂第五戰鬪人也今比丘中亦有五人一見女人便起欲想除去三衣還佛禁戒二見女人不起欲想但與調戲言語往來因此調戲便捨法服三見女人不起欲想設與調戲亦無欲想但與彼女手拳相加便起欲想還為白衣四見女人不起欲想設共言語亦無欲想設彼女人共想捻挃便起欲想然不捨法服五見女人不起欲想設共言笑捻挃亦無欲想是時比丘觀此身中三十六物惡穢不淨誰著此者由何起欲此欲為止何所為從頭耶形體出耶觀此諸物了無所有從頭至足亦復如是乃至廣說獲得四智今言猛將者即第五將也止作二犯與持相違名為彼敵持能喪此犯敵故曰降伏降時至死不悔故曰沒死不顧此不顧命如莊嚴論第三明草繫船板比丘合文佛子合初句善覺於禁戒合二三兩句五陰散壞時合前沒死終不句合前不顧命次真生喻前偈真生後偈真死前中上半舉喻下半引事來證戒是佛戒得此名生故曰從佛戒等翻前俗生皆非真耳引證可知次真死者既受佛戒名曰真生明知捨戒即是真死以不能持棄捨法行恐濫俗死故曰於佛法等次半勸持可解次王印喻上半喻持佛戒難逢得緣難具難得中得猶如王印既得印已行立清昇不為惡羈名無罣礙下半喻犯若犯下四須詰懺不若犯初夷定縛入獄合文可解問小毀既不定何故下文謗清淨人一向入獄又飲酒捉寶定非沙門答此彰過言非稱理說又問大毀既入三惡云何難提許懺答此從多說據不懺者次修說喻佛制戒律為於二人一專精不犯二犯已能悔二人非一故云一切然此二人為惑魔鬼羈繫三有不得出離如來大悲為制戒律教修對除喪其惑業故曰降伏魔鬼神仙五通人喻佛造設於呪術喻戒合中為彼慙媿合初句攝諸不慙媿合第二句如來合第三立禁戒合第四半月說者舉時勸說非合喻文凡修行人須具慚媿然此慚媿乍似相同謂世間人見無媿者說言無媿見無媿者說言無慚理實此二差別不同廣乃無邊界論一二故俱舍第四云於諸功德及有德者無敬無崇無所忌難無所隨屬說名無慚為諸善士所呵厭法說名為罪於此罪中不見怖畏說名無媿有餘師說於所造罪自觀無耻名曰無慚觀他無耻名為無媿慚媿差別者翻初釋云有敬有崇有所忌難有所隨屬說名為慚於罪見怖說名為媿翻後釋云於所造罪自觀有耻說名為慙觀他有耻說名為媿又十誦三十八云有二白法護世間有慚有媿若是二白法不護世間者則不分別父母兄弟姉妹兒女親里則破人法如牛羊雞狗野干鳥獸若是二白法慚媿在間者則分別父母兄弟姉妹兒女親里不破人法非如牛羊雞狗野干鳥獸無是慚媿有白法者終無是處心無白法但有生死無有解脫有是慚愧白法在心即得清淨則不生死度生死岸更不受有次約時勸說問所以說戒要須半月半月答若日日說說則數數則繁繁則不敬若一月一說說則賖賖則慢慢則懈怠今半月者去其數賖過失即是大聖籌量急緩之法爾者縱經半月餘日亦得何以要在半月月盡答准俗三十日為月即當半月月盡良以月半盛盈月盡正昃令觀此相者欲使行人見盈慨善不足是則無善不修覩昃歎惡有餘是則無惡不離既能離惡修益便則止作行成庶得弘至教於當得時傳芳規於遠代亦欲彰時迅速剎那無常有罪勤覓懺方無過勵修進業者具依教立黑白兩月此之二說俱月盡時第三文者心法無形寄言顯敬談德繁廣恐癈所通讚歎已訖復更稽首宜掩己情息喟歸禮次明發起序然有人解序文分二始從偈初訖當云何明律主敬歎勸信奉修二尊者舍利下明發起序前勸文二先明律主作偈讚歎立宗勸信奉修二爾時佛遊下引事證成引成證者文如急施衣戒中廣說有六種與此文同一施主同二處同毗蘭若三安居三月四徒眾數等五阿難為侍者六俱不得憂供故知此文是彼成說十誦此夏九文在外道食戒亦在藥法中五分亦有此證文何故須引有二義故一者證說持犯損益非虗二者顯己遠承聖旨傳勸非己擅意損益者前偈始末皆云持戒有益破戒獲損律主恐時眾謂己妄言詐說何足欣厭故須引佛食麥親事證成可信至文廣說承意傳勸者如偈云今欲說深戒乃至利益長老等律主恐時人謂己擅意非聖本壞故引佛誠言汝等丈夫得神足可爾未來世比丘當云何故知須也尋此解釋理教俱違違理者何文無起此非引下來即是急施取此非是此取急施所以者何以文不舉濱洲等言為開施緣直取施事此中諸緣具彰不明施事其猶壞生取房舍緣起實得道取大妄緣起斯類皆同本廣末略其違教者見論第四云尊者舍利弗從三昧起請佛結戒是佛住毗蘭若又第五正食麥時舍利弗請請已許後方共阿難往彼辭別以此故知令非引證五分亦爾又有判為成上生下應機藥等皆同此壞昔分解既非今申正義此文即是發起序攝其文有二第一至當云何請制處所第二舍利弗下詫處興請前文分亦五一大聖遊化處所二毗蘭若下聞德慶遇三爾時毗蘭若下生信請佛四世尊與五百下赴請食麥五時尊者下請食自然初文爾時者即是發起之義所謂顯昔化處說時與者顯義相違大者尊宿之稱毗蘭若者此是邑名王以此邑封此婆羅門也那隣羅者夜叉鬼名濵者水際洲即可居但以居在水際故曰濵洲蔓陀羅者練木樹也然夜叉鬼依此樹住此茂林中第一兼復近城往來便易是故如來住此樹下又住樹下為諸弟子順出家法除貪欲故多論第八云所以佛與大眾心此林中者以稱本要四聖種法又欲折伏將來弟子憍慢心故又為將來弟子作軌則故佛既受處山澤後諸弟子甘心露行又欲為天龍善神說法故一切天龍多樂閑靜是故如來處林樹下十誦十四云其國信耶先無精舍城北有勝葉樹林其樹茂好地甚平博佛與大眾止此林中第二文三一聞如來遊至己國二此沙門下所聞德號三善哉下聞已慶遇初文婆羅門此云淨行即是以處標人故也次德號文二初明十號後辨三輪此沙門等總舉次如來下別標此者此其人沙門者內懷聖德瞿曇者舉其種姓如是者牒法之辭總談其德故曰大名稱凡論召體曰名表德為字名實相應曰稱響班人天為號然諸佛號皆有通別別顯生身分其應相謂釋迦彌勒等通據實德法身平等謂如來等十號功德然一切佛復有三同六異言三同者一由資糧等圓滿故二由法身等成辦故三由利他等究竟故言六異者一者壽異謂佛壽有長短二者種異謂剎帝利婆羅門種三者姓異謂姓喬答摩迦葉波等四者量異謂佛身有小大五住法異謂七百二千等六設利異謂全身碎等然佛德量理實無邊依德立名數亦何限今據化儀且標二五所謂如來等今解十號依瑜伽三十八及涅槃十八明言如來者瑜伽云言無虗妄故名如來涅槃云如過去諸佛所說不變云何不變過去諸佛為度眾生說十二部經如來亦爾故名如來又諸佛世尊從六波羅蜜三十七品十一空來至大涅槃如來亦爾是故號佛為如來也無所著者絕二縛故二縛者謂所緣相應或名為應瑜伽云已得一切所應得義應作世間無上福田應為一切恭敬供養是故名應然名應者攝義即盡若言應供攝則不周涅槃云世間之法悉名怨家佛應害故故名為應夫四魔者是菩薩怨諸佛如來為菩薩時能以智慧破壞四魔是故名應或名阿羅漢者唯識第三云阿羅漢者通攝三乘無學果位皆已永害煩惱賊故應受世間妙供養故永不復受分段生故具此三義故云阿羅漢等正覺者等是齊等正是正解覺是覺悟佛於諸法等皆解悟故曰等正覺瑜伽云如其勝義覺諸法故名正等覺涅槃名為正遍知正者不顛倒遍知者於四顛倒無不通達又復正者名為可數可量可稱遍知者不可數不可量不可稱是故號佛為正遍知然此遍者是等知者是覺還是等正覺義明行足者瑜伽云明謂三明行如經說止觀二品極善圓滿是故說名明行圓滿涅槃云明者名得無量善果行名脚足善果者名阿耨菩提脚足者名為戒慧乘戒慧足得阿耨菩提是故名為明行足智度論第三云明者宿命等三明行名身口業唯佛身口業具足餘皆有失是名明行具足善逝者瑜伽云上升最極不復退還故名善逝涅槃云善者名高逝名不高善男子是名世間義高者名為阿耨菩提不高者即如來心也善男子心若高者不名如來是故如來名為善逝世間解者瑜伽云善知世界及有情界一切品類染淨相故名世間解涅槃云東方無量阿僧祇世界一切聲聞緣覺不知不見不解諸佛悉知悉見悉解南西北方四維上下亦復如是是故號佛為世間解無上士調御丈夫者瑜伽云一切世間唯一丈夫善知最勝調心方便是故說名無上丈夫調御士涅槃云上士者名之為斷無所斷者名無上士諸佛世尊無有煩惱故無所斷是故號佛為無上士云何調御丈夫自既丈夫復調丈夫善男子言如來者實非丈夫非不丈夫因調丈夫故名如來為丈夫也善男子一切男女若具四法則名丈夫何等為四一善知識二能聽法三思惟義四如說修行善男子若男若女具足四法則名丈夫善男子若有男子無此四法則不得名為丈夫也何以故身變者天謂天眾魔是欲界他化天魔梵謂初禪已去沙門是道眾婆羅門俗眾於此諸眾最勝無比故曰獲神通作證次教誡者說理非耶故曰常說正法所說之法初中後分皆契辟心名上善等故見論第四云初品者初善中品者中善後品者後善又言戒者初善三昧得道中善涅槃者後善又佛菩提者名為初善辟支菩提者名為中善聲聞菩提者名為後善又智論五十四云若佛在世若不在世善住持戒不求名利等心一切眾生而為說法讚歎檀義是名初善分別讚歎持戒是名中善是二法報生諸佛國或作丈夫是名後善復次見三界五受眾身苦惱生厭離心是名初善捨家身離是名中善心離煩惱是名後善又解說聲聞乘名為初善說辟支佛乘名為中善宣說大乘名後善能生解心名之為義義有德故稱之為味巧妙純一故曰清淨所說之法義味皆備不假緣助故云自然具足次明記心修習梵行正彰起行見論第四何謂梵行答梵天人所行故名梵行又解佛辟支佛聲聞所行名梵往修佛道今成菩提故曰修習梵行次明慶遇善哉者國主慶遇之詞已及眷屬稱云我等牒其所見故云得見等略舉一號云無著人具足應言如來乃至修習梵行我若往禮覲問訊必令我得利益安樂故曰我今宜往等次請佛文五初則進詣致虔第二時世尊下稱根說法第三聞佛下信心請佛第四時世下默然受請第五毗蘭若下遂情退還初句到已共相問訊亦應身業禮拜語業申其四大安不意業信敬尊重文中含故總言問訊在一面者居在一邊坐者身體布地以聽安故第二句佛以種種巧言道引故曰無數方便雖丈夫行同畜生如來調伏若男若女是故號佛調御丈夫天人師者瑜伽云為實眼故為實知故為實義故為實法故乃至能正教誡教授天人令其出離一切眾苦是故說佛名天人師涅槃云師有二種一者善教二者惡教諸佛菩薩常以善法教諸眾生何等善法謂身口意善復次昔未得道今已得之以所得道為眾生說從本已來修梵行今已修竟以己所修為眾生說自破無明復為眾生破壞無明乃至自既涅槃復為眾生演大涅槃是故號佛為無上師然佛實是六道之師但為人天益多故曰天人師佛者瑜伽云於能引攝義利法聚於能引攝非義利法聚於能引攝非義利非非義利法聚遍一切種現前等覺故名為佛涅槃云佛者名覺既自覺悟復能覺他善男子譬如有人覺知有賊賊無能為菩薩摩訶薩能覺一切無量煩惱既覺了已令諸煩惱無所能為是故名佛以是覺故不生不老不病不死是故名佛世尊者德為時欽也此世尊言攝義不盡餘文言婆伽婆者亦不正涅槃釋云婆伽名破婆名煩惱能破煩惱故名婆伽婆梵音正曰薄伽梵此名具含六義故佛地論第一云自在熾盛與端嚴名稱吉祥及尊貴如是六種義差別應知總名為薄伽故知世尊但當一義不攝餘五須置總名瑜伽云能破諸魔大力軍眾具多功德名薄伽梵舊判十號云前五自利後五利他者此為不識宗詮率爾判釋然此名義有何所以前五不利他後五非自利復有引成實詮者義亦不然彼論第不釋十號已後始總云自利利人是故應禮本不約號別有料判次三輪者輪是摧輾之義諸論名為三種示導一神變二記心三教誡此文據修次第不約勝劣是故二是教誡三是記心初神聞法悟解名之為聞淨信忽生稱之為化得法順情稱彼來意故曰歡喜第三句先結國主悟法怡神次請佛僧憂興供養第四句受請十誦十四作念云我先世果報必應當受作是念已默然受請問所以默者答若不受請以身語答今為受故默然而許多論第五云佛貪結已盡於食無貪無染是故默然又云為斷誹謗故若佛於食發言許可外道異見當言瞿曇沙門自言超過三界而故於食有貪又云佛現大人相故食是小事不以致言譬如國王終不以小事傾移設有大事詳而後動佛亦然也第五遂請歡喜敬繞而歸問既曰默然如何可見答覩佛異相故得有見又解不說眼見名見以心知見名見是以十誦云是婆羅門知佛默然受次下赴請食麥於中四一受請安居二時有波離國下得麥之所三時世下食麥之緣緣中有二一以時儉乞難二以施主不施次何以故者微其施主不施所由若婆羅門先不請佛今不供養未足為疑然既信心請佛理應供養何以今忽不供養故答但為魔惑不憶知故雖請佛僧都不供養其魔云何惑彼國主五分云時魔波旬作如是念今婆羅門請佛及僧安居三月我當厭固迷亂其意念已即來厭之彼婆羅門為魔所厭即入後宮受五欲樂勅守門者云我今遊宴三月在內外事好惡一不得白都不復憶請佛及僧故曰皆是波旬作也四爾時諸比丘下正明食麥其文復四一造求食二生施念三如念施但為師弟不同故使施有差別四食有異依此完未不同故云各異若依十誦氣味不同名為各異但為宿因故有斯報惑習俱盡而不受苦次下請食自然文四初兩一對直請縱答次兩一對兼請抑答問大目連者神通足第一何不輙往而請佛耶見論第五云不白世尊者便是與如來並神力則乖我法作是思已即便往請唯除不在佛前為利益故問如來何以止目連者見論云非一時儉未來亦儉若連儉時誰得如目犍連當來聲聞弟子少有神力若入聚落乞食諸人見已而作是言世尊在世聲聞弟子持戒具足得神通力即於儉時迴返大地而取地味以供眾僧今者眾僧持戒不具若具持者如前無異復無少分施與餘人以倒見故輕慢聖人以輕慢故死墮地獄是故世尊止而弗許遮之義永重言止止五分佛言止止汝雖有是神力宿對因緣欲置何所又奈將來諸凡夫何目連受教默然而止次下訖處興請其文有四第一思諸佛法久不久義既有疑念在心理須諮決是以第二爾時下請問住滅世尊略答雖知住滅不識所由疑既未除更須諮決是以第三舍利弗下問其所由如來廣答既識所由心希法住是故第四爾時舍利下乘前答次便請結說望得同四住益異二滅損先解初文然舍利弗智拔群品欲使法傳現未利益今來故思六佛住滅以作請之端序次第二文先問後答問身子自觀足知何須問佛見論第五云身子自觀但知久與不久不解所以故須請問又解弟子神智觀之不難為依止佛顯佛尊上願為開示者正顯請詞也請佛為我演此因緣使我解必朗然識知住滅故名為開顯在心首稱之為示次答可知次第三文三初問住識所由二佛告下廣答所以三舍利弗下結成住滅然此三文問中先問其久次問不久答中先答不久次答其久結中先結久住次結不久文中逐便覆逆如是初文問意過去六佛化儀道同以何因緣法有住滅如此住滅弟子不知唯願世尊重為開示次下答中先答後問文中有二初明二佛無廣後滅次爾時下有略現益初文有三一明二佛無廣法體二不為人下正不說廣三諸弟子下明法疾滅初法體中但舉無有化教廣體計亦合舉不結不說制教之廣文無者略教廣者謂十二分教若欲解釋二門分別第一翻名解釋第二辨立所以初門素呾覽翻釋如上又婆沙一百二十六問云契經有何義答略說有二一結集義二刊定義結集義者謂佛語言能攝侍義如結鬘者以縷結華冠眾生首久無遺散如是佛教結集義門冠有情心久無忘失刊定義者謂佛語言能裁斷義如匠繩墨繩墨眾杖易了正耶去曲留直如是佛教刊定義門易了是非去惡留善第二梵云祗夜此云應頌以長行中說義不盡應更頌釋名為應頌故婆沙云依前散說契經文句後結為頌而諷誦之舊云重誦偈謂以偈文覆誦前法或曰等誦義不越本故名為等第三和伽羅那此云記別或曰記說謂諸經中記聖弟子生處修證德失差別故婆沙云諸弟子問如來記說或如來問弟子記說或弟子問弟子記說名為記說律云授記顯彼當果名之為記聖說示人稱之為授第四伽他此云諷頌謂諸經中非長行說結句宣喟或二三四五等故婆沙云謂諸經中結句諷頌律云經謂不重頌偈詳其偈言解者極謬然中天正音名為伽他諸國訛傳謂伽他也乃至于闐名為偈陀此轉訛略稱云偈經此偈乃是梵語訛言傳者將為唐音正字故共釋言偈者竭也所謂說義竭盡名之為偈此是傳者之言本無典據第五憂陀那此云自說謂諸經中悅意自說不因啟請直為宣喟故婆沙云謂諸經中因憂喜事世尊自說舊云無問自說經律稱句經未詳所以或可經為名句所顯故名句經第六尼陀那此云緣起或曰因緣謂藉因緣而宣唱故故婆沙云謂諸經中遇諸因緣而有所說如毗那耶作如是說由善財子等最初犯戒是故世尊集苾蒭僧制立學處第七阿波陀那此云譬喻謂諸經中有比況說為令本義得明子故故婆沙云謂諸經中所說種種眾多譬喻律在第十一者錯也第八伊帝曰多此云本事除佛自身說餘前際謂諸弟子本想應事故婆沙云謂諸經中宣說前際所見聞事如說過去有大王都王名善見過去有佛名毗鉢尸為諸弟子說如是法名為本事律稱善道在於第九此差別名不詳所以或可說餘前際前生善道事故名善道第九闍陀伽此云本生所謂自說往報曾為某類然佛無當生處故說生唯本故婆沙云謂諸經中宣說過去所經生事如熊鹿等第十毗佛略此云方廣或曰方等直說為方理弘為廣故婆沙云方廣云何謂諸經中廣說種種甚深法義第十一阿浮陀達磨此云希法若處宣說佛與弟子最極希有甚奇特法故婆沙云希法云何謂經中說三寶等甚希有事律云未曾有以說希有事所未曾有第十二憂婆提舍此云論義問答顯理故名論義故婆沙云論義云何謂諸經中決判黑說大說等教舊云十二部經時人不了意謂別有十二部卷為除此疑今為十二分教分者支義類義段義謂教中有十二義類支條分段各別不同故云十二次所以門問以須明十二分教答眾生悟道藉緣不同是故緣中說有十二故婆沙第一云諸有情類雖有因力若無緣力而覺發者終不能修勝進之行要遇緣力乃能修行譬如池中雖有種種嗢鉢羅等眾妙蓮華若日月光不照觸者則不開發出種種香要日月光之所照觸乃能隨類開發出香又如闇中有種種物若無燈照終不可見有情亦爾問所以緣力十二無減無增答能聽法者宜聞故爾又以轉法輪時三周修歷四聖諦境故詮彼教亦有十二無減無增上來化教廣竟略無制廣次正不說者以所化生聞廣嫌繁是以如來不說二廣亦可此中化教廣者不合重舉文中錯來若依此義制教非略次法不久者由無廣教可依進修略法幽微復難趣入是以疲厭法不久住次明說略現益其文有五一舉略體二說處三正說略四彰現益五辨後損初文善見釋云是應念者當念無常苦不淨無我是不應念者無常莫念為常不淨莫念淨等是應思惟者三善根應思是不應思惟者三不善根莫思次下一對總結修捨是應斷者謂二四句莫念莫思當須除斷是應具足住者謂初三句須念須思當宜修進此出化略而無制略其制略者不謗亦不嫉偈是隨業佛略心莫作放逸偈是𤘽那含略次說略處依此林者令生厭離情既厭已入道則易次正說可知次明現益但以佛日未已聲聞在世雖傳略教法廣興流次明後損文中有三謂法喻合法中四句一明異類出家二以是故下彰法疾滅三何以故者微滅之意四不以下釋滅所由初文種種名者謂如曇無德等種種姓者謂如目連等種種家者謂貧賤等此等異類咸捨囂塵剃髮染衣同入佛法故曰出家次彰法滅以異類生入法故滅所以爾者但以人非一種族姓萬殊雖預道門不能悟略既不悟略師心處分不相承受法則疾滅次明微滅所以此等人輩信心出家應令法興何以疾滅次釋所以為無廣教線經任持法不在人是以疾滅次喻亦四准法應知問華案風線何等是耶答種種法相為華佛法為案眾生意行為風廣教為線無線故爾此據化教若制教者種種名姓為華略教為案僧尼身語為風廣教為線無線故爾合文可知次答四佛久住文中有四一明四佛說化制廣二弟子下復為說略三如是下現在流布四若彼下未來久住然說廣文化制具有說略之中有化無制其制略者如戒經中忍辱第一道等僧對此解釋二教差別四門分別第一定廣略教第二釋廣略名第三明其差別第四辨制不同初定教者略且有二一是化教止觀門略如是事應念等二是制教調伏門略如善護於口言等次廣亦二一化教廣如十二分教是二制教廣如戒律教是次釋名者所以名廣廣者文義廣愽略翻於此又廣有五義一具緣起待犯藉請二顯名種如夷殘等三彰犯等行別如廣解等四陳果報如持破文各墮二道等又如目連問經犯波羅夷如人間歲數九百二十一億六十千歲墮泥黎中殘罪二百三十億四十千歲蘭罪五十億六十千歲提罪二十億四十千歲可呵三億六十千歲吉羅九百千歲五明懺除殄滅方軌以斯五義名之為廣略無此五稱之為略次差別者一根本枝條二所為利鈍鈍人廣說利人略說三罪名不同廣對過故制立罪名略法不然故無犯稱四說先後化教廣略先後不定以所化生宜聞有異制教之中必須先略後廣以略被淨一往即陳廣為穢人要待犯請然此文中據其說次理實不是先廣後略及以戒本廣為宗故五犯居先七偈在後次制不同者一待犯不持犯略被淨人故不待犯廣待犯故漏過方興二請不請異略是根本故得直陳廣是枝條必假先請餘次文同前次結可知寄此住滅以作請由如五分善見三住三滅理而言之齊皆廣略如增一經下當具辨又僧祗第一云佛在祇洹身子請問久不事佛答言不為弟子廣說九部經法不為制戒不立說木叉法是故滅後法不久住若說九部經法及結說者法得久住亦不別顯人之名字身子因此即請結說次下第四正請文二先請次答請意二佛無廣法則疾滅四佛有廣便得久住請同四佛久住之益異二如來疾滅之損故言今正是時謂今正是制廣之時唯者專獨之義故云唯願結戒等者舊釋云二部戒本是其結戒說戒揵度是說儀軌餘受戒等是修梵行法亦可戒戒之中各前結戒酬於此結各後說戒及說戒揵度復答此說餘受安等於修梵行法此別屬當違其請心豈可結說離修梵行諸餘等文即非結說又若結等合指別屬久住亦然何以不爾是故今解結戒者請制禁防說戒者以結班告即此結說是修梵行人憑法立法假人弘人法相依故得久住亦可結戒說戒正說請禁防使修梵等申其請意問所以得知此說戒言即是戒本非半月說答如下文中未制半月說戒世尊託靜念云我與諸比丘結戒及說波羅提木叉戒中有信心等乃至廣說以此知也次答文三一立二門二釋二門三結二門立二門者所謂抑許二門且止是抑門知時是許門未即為結稱之為止止而非永故復言且此是抑門待犯當結名之為知正為立制稱為時也此是許門次釋二門者句則句有六對便有三釋唯有兩六中初三五釋抑門二四六釋許門亦可初之二句正釋抑許兩門第二未得利下兩對四句近釋生漏不生漏遠釋且止與知時舍利弗如來未為諸比丘結戒者釋上且止何以故者徵止所由以比丘中下釋止所以若漏未起而先制者見論第五便有二過一生誹謗二不欽重謗云如我等輩貴族出家棄捨財色不惜身命於世名利無所希求云何反以木叉繫之二於所制不生欽重見此無益故不先制若犯有漏法然後結戒者釋上知時翻前二損即成兩益一讚如來是好毉師善治我等諸漏病故二者於我所立禁戒生敬重心令法久住佛知此時制戒有益故即為結所言益者為生十利功德故下文云如來出世見眾過失為諸比丘結戒以一義故謂攝取信等又復若犯有漏法者生下諸起過文然後結戒者應下諸制廣文次釋漏緣乃至未得利養者近釋不生漏遠釋且止乃至者超於中間未得利時故云乃至若得利養等者近釋生漏遠釋知時未有名稱等者近釋不生漏遠釋且止若得名稱等者近釋生漏遠釋知時此乃言者乃知為人所識多聞結二可知僧祇第一佛答言如來不以無過患因緣故而為弟子制戒立說波羅提木叉法譬如轉輪聖王不以無過而為波羅門居士而制刑罸如是舍利弗如來亦復如是不以無過患因緣而為弟子制戒立說波羅提木叉法上來序分文竟
