body:
  text: 次明破僧揵度行六和敬秉法無違蠲事共同是其僧義今以耶法改真分眾異軌別行法事不成和合故曰破僧廣彰破相集在一處稱云揵度大文分三第一明破分僧異部第二爾時舍利弗下二土和僧第三爾時彼離下彼離因此問破儀軌前文有三初明調達破僧二爾時眾多下舉事白佛三佛言下呵責彰過前文有二一破行法二破眾法前破行法亦二初無智捉籌此文一唱更有五百十練第三十七經眾三唱初一唱時唯四伴捉籌後第二唱有二百五十捉籌後第三唱更有二百五十捉籌前後三唱合有五百次爾時阿難等智人不受有化阿難覩事不忍故稅袈裟六十見同咸作斯法次破眾法於此伽有秉行眾法如是信耶具足破正義備對此釋破僧義三門分別第一釋名第二出體第三諸門初釋名如前次出體者破有能所若能破體以覆誑語為性謂彼俱生表及無表故五蘊中色蘊以攝處界之內聲法二故問破僧亦有身業法來加行思惟及餘語業何故但說覆誑語性答此覆誑語加行究竟一切時有能令僧壞餘業不然是故不說若所破體俱舍十八云僧破體是不和合性無覆無記心不相應於五蘊中行蘊何攝處界之內法處界問此不和合性以何為體答非得為體爾者僧破有二謂法輪羯磨未知此二為同以不解此之二破俱以非得為體然此非得所望不同若法輪僧取理和上非得若羯磨僧取事和上非得雖僧非得所望如此次諸門有八第一定破境界第二釋破具解第三明破同異第四定破之處第五解其初二第六究竟方便第七對出血明先後第八捨戒入獄時處初門破境境有其二一者破僧二者破輪言破僧者要一界中分僧二部一時秉法相望不成言破輪者輙以五法誘誑新學愚夫妄受新佛四依故上文云我今以此五法教諸比丘足令信樂文云告諸比丘提婆達今日欲新四聖種又伽論第六云云何僧壞非輪壞於一界內各作布薩云何輪壞非僧壞八聖道名輪捨八聖道說餘道是名輪壞非僧壞論中分別此之二句餘二句准應知之以此故有僧輪二別次明具解約壞行輪以解通解有三一是大比丘非解異眾故俱舍云能破僧者要大苾蒭必非在家苾蒭尼等唯見行者非愛行人住淨戒人非犯戒者所以要大苾蒭以與佛對自稱為佛非在家等者以彼依身無威德故准見行者以惡意樂極堅深故非愛行者於深淨品俱操動故住淨戒者以淨戒人言能肅物非犯戒者以犯戒人言無威故二者違僧三諫當他餘戒制廣教後望事是㝡初得罪同第二故見論十二云以其僧三諫不捨故犯三無重病壞心謂顛狂等次別緣有十四第一須起破念故上文中因制不聽別眾食遂起心云未曾別沙門瞿曇乃新人口食我今寧可破彼僧輪因後更起求名之心故言我身滅後可得名稱第二非未故起舍云於正戒見未起時要二生方可破故言二者謂有戒耶見有戒者說五法是道有見者撥八正非道第三非初及後故論云初謂世尊轉法輪未久後謂善逝將般涅槃時此二時中僧一味故第四非佛滅後故論云無真大師為敵對故第五要此洲中故論云唯瞻部洲人少至九或後過此能破法輪非於餘洲以無佛故有世尊處方有異師第六此洲異處故論云要異處破非對大攝以諸如來不可輕逼言調威肅對必無能然異處者謂伽相成破第七已立第一雙賢弟子故論云未立止觀第一雙時法爾由彼速還合故第八非未結界故論云未結界時無一界中分二部故第九伴數須滿故論云要八苾蒭分為二眾以為何破能破第九故眾極少利須九人此下文言此彼眾各四人若過行破僧舍羅作羯磨優波離畜是名為破僧者此謂癈主論伴故各四人若並主論還須有九第十破是異生故謂云准破異生非破聖者以諸聖者證法性故有說得忍亦不可破上文上座比丘恐不信受十一異見異忍故論云要所破僧忍師異佛忍異佛說有餘聖道能障聖道輪壞僧和合故十二已制眾行二法眾法者謂羯磨說戒行法者謂四依八正十三行非法籌愚夫忍可十四秉行眾法別作說戒此下二緣是壞行眾二法始終通別具此成破論云非破法論諸佛皆有必依宿業有此事故於諸解中隨有罪者並不成破𨷂相可知對此因明破羯磨僧具解之相通解還三大同隨戒別緣有五一須有心要作破心壞僧和合若懈怠心及無記心不犯二在界內非羯磨地不得秉法三眾數滿彼此二眾各須四人於一界中別部秉法四在佛法時中若法住時即有壞義法沒之後破則不成五彼此二眾一時秉羯磨俱不成者名為破僧若唯一處化法直是別眾故雜心第三云若於一住處界內二部僧各別作布薩羯磨當知是僧壞爾者既俱秉法方名破者何故上文言見相聞疑求方喚不得便作是言失去滅去欲使他破壞作羯磨者不成犯偷蘭遮解此是惡心罪非破僧𠎝次同異者釋此差別不同有十一者約時破法輪僧局佛在時以涅槃後無此事故破羯磨僧現未俱有以不假佛通一切時二者約處破輪唯局瞻部不通餘方以佛不法餘方化故佛既不法共誰競化為須忍師異佛忍異佛說又欲破僧自稱為佛彼無大師無人信處破羯磨僧通三天下除去北方是難地故三者約人破輪局是比丘及見行等非比丘尼及愛行等破羯磨僧通比丘尼及愛行等仍非餘類四約凡聖破法輪僧唯凡非聖以證法人無破事故破羯磨僧通凡及聖以事中迷聖容破故五約眾數破輪六至九人成破以是破正亦相三寶一人為佛四人成僧下至五人方成能破所破之中亦須五人一人是佛四人成僧既言破僧故須解佛破羯磨僧但八成就謂彼此四別行法事六者約主破輪要須一人作佛以徵如來是法輪主破羯磨僧同類相破不須假佛為法輪主七者約行破輪要須五種行法先唱五法是道後始秉行羯磨破羯磨者不假行法真爾二眾秉法成破八者約界破輪能破須在界內以秉羯磨界外不成所破之人通界內外遍大千法輪不持破羯磨僧要須兩眾同界一時秉羯磨法九者約罪破輪違理以種破正損義寬多犯蘭得逆破羯磨僧事中相違以正破正輕蘭非逆十者約報破輪業重無間一劫羯磨釋輕餘獄非劫次約處者依此文中王城雖後化得五百但是方便後持所化至伽種山自秉羯磨方成究竟僧祇亦爾上文復言一切未諫前欲壞等乃至堅持不捨一切吉罪又伽種名文中錯舉應言揭闍尸利沙山此云象頭以山頂如象頭故此山在鷲峯山北可三四里同一界內天授不對大師住彼而破文言伽種者梵音相近也但以譯人謬錯故耳然彼實有伽有山此山其鷲峯山東北可一百五十餘里非同一界豈得破僧又僧祇云調達正欲破時佛建阿難於一日中三度法喚計三四里一返七里三迴合有二十一里若一百五十餘里一返即三百三迴合有九百餘里阿難不得神通理須步法不經半日豈得三迴准此即是揭闍非伽種也次初二者若論逆罪並無㝡初以逆違理罪違教故如上文中有一外道故煞父母來求出家佛言煞父母者於我法中無何長益乃至應滅擯若論違教偷蘭合有㝡初已從前來未有犯故雖後事是㝡初得罪同於第二所以爾者已先諫故今既違諫故破故是第二非謂此前已有破事問調達破僧既是第二違諫僧殘亦應第二答破僧是諫所為之事今以違諫作破故破第二諫時諫破僧不諫於違諫是以違諫僧殘合有㝡初次方便究竟者今此破僧偷蘭是究竟非方便以提婆達多本希名利規奪佛位壞僧斷法今既破得僧徒歸說己見即是所規事成思心得暢更無進趣故是究竟問破僧既是究竟何以不與夷名古師解云若體無餘義通理亦應然但以破僧事一為欲詠結三人若置夷名者即名甄彼此謂非一事故不與夷名今制蘭者名含輕重通結三人義便故如以正主故犯逆餘非主故但得偷蘭四伴大眾蘭五百對首蘭今解不然但為所作事成故獲究竟而非違教極是以不結夷又以違教極者立四重法破僧非四所取故獲蘭罪爾者所以破僧違教非極若以事輕不應犯逆既已犯逆即是事重事既是重應與夷名如餘三煞理教俱極解破僧獲逆𠎝自為違理極對事損非重是以無夷名問五百既為他破何以得蘭答望為他破不應犯蘭以忍異佛信受耶教故正理四十三云要所破僧忍師異佛忍異佛說有餘聖道次對出血先後若依此律及五分十誦並悉先起破僧方便次出身血次後更起方便乃至究竟爾者既先出血後破僧者如何十云九清淨人能破又雜心第三云餘無間業後不能壞僧解餘部雖有淨言此文不障不可以餘部文妨此解義又解十誦以不犯夷名為清淨所以知者文自言九清淨後先出血後破僧明知據不犯夷名為清淨又解十誦問答破儀軌中始云九清淨同見比丘本不定其先後故無有失若不爾者便即自文相違又婆沙一百一十九云若先造餘無間業彼後不能破僧若先破僧後便能造餘無間業彼後所造皆由破僧增上力故同招無間地獄中果雜心據此為論故言餘無間等又此亦不定其先後直簡壞僧人要族姓端政或聞才辯以彼自立為大師犯戒者非增上若依知論及鼻奈種先破僧後出血是則於義無違故知論第十七云舍利目連說法教化僧還和合爾時提婆達便生要心推山壓佛金剛力士以金剛杵血遙擲之破石迸來傷佛足指蓮華色比丘尼呵之以拳打尼尼即眼出血死作三逆罪鼻奈種亦爾不能繁錄次捨戒入獄時此文但言彼即驚怖而起極血從面孔出竟亦不論捨戒入獄事五分二十五云時三聞達多以足指蹴調達罵言釋如起舍利目連以餘方便請諸比丘去矣調達驚起罵言是惡欲比丘始有善意如何忽生惡心以方便將我比丘去便大怖懼極血從鼻孔出即以生身墮大地獄此明入獄不論捨戒十誦三十七明捨戒時不論入獄故彼文言時舍利目連化五百比丘將詣佛所時調達講堂空無大眾唯有四伴爾時迦留羅提舍以各脚蹴調達令覺語言樂眾調達舍利目連奪汝眾去調達覺已見講堂空迷悶墮牀時四伴以冷水灑還得醒悟作是念我是釋種姓瞿曇大人不可屈下從他語諸比丘先有調達外道法隱沒不了我今當發起明耳住是法中汝等當知我從今不後屬沙門瞿曇作是語時即名捨戒智度具明乃至打蓮花色尼死與惡有富蘭那外道等為親厚斷諸善根心無慙悔此是捨戒時後以惡毒着指爪中欲因禮佛以中傷佛欲去未達於王舍城中地自然破裂火車來迎生入地獄次下釋文白佛具舉前事次呵文二初對前事呵其所作故言癡人破僧第二有八非下彰其業重難救就中有二第一明緣支業擇重難救第二我若見下釋其不救所以前文有三謂舉列及結先明總舉此八非是出離真軌故非正法情八法名為纏縛為八惛溉攝云覆翳又能除殄起修之因故曰消滅善心調達今造惡業滿足故云趣於非道彰受報處故在泥犁以一劫言明知處重顯受擇時稱云一劫彰無滀方名為不救次列八者十誦反餘文名利衰毀譽攝譏苦樂此中名字雖有少殊義終不異利無利約施以明過分讚德名之曰譽非分毀呰名曰無譽刑心祇奉名為恭敬懈怠慊呵名不恭敬此是稱譏對違緣逼惱名惡知識欣惡適心名樂惡友此是苦樂對次結可知次釋所以文三謂法喻合法中逆順彰其善盡惡成故墮泥犁一劫不救次喻合可知次和僧文二初正明和第二彼比丘見下舉事顯昔會古同今前文分四第一法彼而坐妄安如文十誦調達見舍利目連來即駈迦留羅提舍安目連舍利弗第二爾時提婆下法像如來第三時舍利弗下化眾歸正第四舍利弗下失眾焦惱文相可知次舉事顯昔文三初舉身子過去破事以對今破因即便明五百不失先戒但作偷蘭懺悔非正障故得獲果第二目連白化下舉過去法像對今法像第三時諸比丘六舉過去背恩以對今背昔以惡教破對今有破是第二次明破僧儀軌文二第一明破儀軌第二破和果報初文復二先問後答問中有三一問調達行何等法斷佛法輪分僧二部故言云何破僧二問秉法壞和合時數至幾人得成破事故言畜幾名為破僧三問究竟能壞輪者不知是誰能成此事故言誰破和合僧次答但二初問別釋下二共答前中復二先以五有破正行法五中前三相似語後二妄語解釋如上次作非法羯磨謂於正中增加迴換作有羯磨破正眾法所以爾者佛為比丘說二種行一者別行謂四依八正學之所行生行之軌二者眾行謂羯磨說戒住法之儀成眾利益今提婆達多破僧和合亦徵如來立二種法一者立有五法破佛四依八正二者非法羯磨破正眾法若比丘信受修行是名破正具足僧祇第七云於戒序四波羅夷乃至七滅諍法隨順法不制者制已制者便開乃至其家出家共行法所謂九部經於此九部經中更化異句異字異味異義各各異文乱說自誦持上教他謂持次答下之二問數者謂至八人人者謂比丘非尼或可四人是能破者文中分二初明數減不成文言一比丘不能破意謂一尼等能破故復須言亦非尼等既非尼等意謂彼此各一能破故復須言彼此各一亦不成破非直一人不成乃至二三亦爾次指破數彼此兩眾各須四人癈主論伴故下至八次問報果文中分三第一問答破僧果報第二問答和僧果報此二如文第三優波離六重更料簡一切破主墮不墮義於中先問後答問中為一切破僧皆墮一劫為當亦有不經劫者次答有二初總酬答不盡一劫次別料簡經劫不輕此中約法非法等合有九對於九對中各體非法等一遍作十二句破其法等一遍令使斷滅九對各十二合為一百八句此以與有滅正故體非法上作然於法等一遍不得更有十二若體法等一遍作破非法等即是和僧故今不說又若倒說初句法等得成其有應作十三故上文云住破僧事者住十八法又不增二文舉十八法倒說成有增四佛後言犯說不犯不犯說犯輕言重重言輕畜是名為破僧和合准此合作不繁致或又可雖有此文不得更作此等直據倒說成有論成破僧義則不爾夫破僧者必須以有破正有法為能破正法為何破倒說四依成有可爾不知以何為能破法既無能破不繁更為又此文中現約非法上作故今還約非法等一遍解釋於結對中先明初對初對三位四句初四句中前三句主墮於一劫後一句主不隨一劫初句非法想破非法想說第二句非法想破法想說第三句法想破非法想說第四句法想破法想說先解初句文有其七一若比丘者舉能破主二興有滅正文言非法者謂五有法執此有法即是出離真軌故云言法堅持此法者謂行化於時破和合僧者明輪被破三心耳知非文言非法想破者謂加行中耳知非法言非法想說者正行化時亦知是非四妄安有法執五有法能契真理故言是法又執有法能有滅惡之功言是毗尼欲規他信妄指佛說言是佛教五心口相違心見知非口說為是口說乖心所見故言異見心忍是非口說為是口說乖心所忍故曰異忍六秉行破事以破眾及行沙行舍羅亦可直明秉眾取究竟處此中毗無作羯磨言六句中有七結墮一劫次第二句非法想破法想說前加行心知是有法故言非法想破至於說時悉非為是故言法想說此中但有六句罪無異見異忍望前方便心應言異見望後說時心名為不異見若言異見不攝不異見若言不異見後不攝異見以是前後心異文中罪無釋文可知次第三句法想破非法想說正以前心迷有為是故言法想破後心說時知是有法故言非法想說文不異前故言亦如是問此二三兩句心互不耳應同時想獲輕何以亦墮一劫答計心互迷應同時想但望所損過多不從心降如婬須戒時想亦重爾者若以過多說境制者第四亦應得一劫報答以第四句始終心悉不互解非不墮一劫准此婬須始終迷者互無了心亦非究竟次第四句法想破法想說正以前心迷有為是故言法想破後心說時亦迷為是故言法想說文有七句釋相同前但為口說不乖心見名為不異見亦不違心所安故言不異忍情過輕漸不墮一劫次作第二四句文言疑不疑四句亦如是者理應非法想上安不疑法想上置疑初句非法不疑破非法不疑說第二句非法不疑破法疑說第三句法疑破非法不疑說第四句法疑破法疑說作文釋相與前無異亦前三句墮第四句不墮次作第三四句文言非法想疑四句亦如是古舊師解云非法想上安疑法想上置不疑初句非法疑破非法疑說以其俱疑無非法想兼是以不墮一劫第二句非法疑破法不疑說為異由於非法起疑無非法想兼情過輕漸不墮一劫第三法不疑破非法疑說為異此亦不墮一劫第四句法不疑破法不疑說為異是以文言非法想疑四句亦如是問此第三四句總不墮一劫與前兩位四句不同何故文言亦如是理應同前兩位有墮不墮始順文中亦如是語以不順文故須更解以疑通於二處非局一邊前第二四句法上安疑今第三四句即須非法上安初句非法不疑破非法不疑說第二句非法不疑破非法疑說第三句非法疑破非法不疑說第四句非法疑破非法疑說故文言非法想疑四句亦如是謂非法想非法疑相對為四句此不疑者即是想也若作此解還前三句隨第四句不墮故言亦如是此三位四句相對明者各初句同各下三異然下三中前二下三心緣非法一向是同以想不疑名異體一即此下三緣法皆異前是法想後是法疑後位下三境唯非法一邊同前二位以不疑故一邊全異諸位以起疑故此是初對十二句竟下之八對同上應知上來破僧法竟次滅諍法兩情乖背彼此紛紜名之為諍論諍不同有其四種此四皆為七藥殄除稱為滅諍廣彰滅法集其一處故言犍度文中分三第一七毗尼能除之藥第二爾時世尊下明其四諍所除之病既有藥病若不相對明者是則藥無能殄之功病無可建之義故次第三若一比丘下廣明藥病相對儀軌三中先明能除之藥對此解義三門分別第一釋名第二出體第三諸門言釋名者先釋現等七種別名次解通言毗尼之種然釋別名現前中有五種三種言五種者謂法毗尼人僧界三種者謂法毗尼人若欲釋此五三總名應云三五殄諍體皆是現並非過未總曰現前若別釋者滅有軌則稱之為法能息於諍故曰毗尼起諍者名人秉法者為僧僧依集處攝界三即五攝不須別明次憶念者清法人被謗穢響外彰為他所舉而復紛眾知此人實是清淨為作羯磨證成不犯由記知淨故言憶念次不癡者法病雖犯今差不為忽舉前𠎝以生紛僧知此人差來不犯為作羯磨證成清淨為不癡來不犯故曰不癡次自言者諍起本由執犯輕重不了罪相轉更紛紜今得自言識知罪實既了根本諍得消除故曰自言次多人語者本因論義諍理正有別人現前殄不得滅制令盡集詳心捉籌以籌殄非籌多表語故曰多人語次罪處所者此人犯罪為他舉來前引後違以生紛眾僧作法微尋前言責其犯處重處而治故曰罪處所次草覆地者僧舛評犯執諍紛紜人既相明事難尋究故聖開聽不說名種直爾懺謝如草掩泥故曰草覆地此之七種攝教殄非諍無之處名曰毗尼次辨體者現前須約五種出體釋五種體二門不同一正辨體二明有無初門法者謂依聖教出其定諍是非道理諧和進不是故文言好言教語如法如毗尼如佛所教又言云何法現前所持法滅諍者是謂持能滅諍事之法言毗尼者謂依聖教出其滅理勸受息忍令諍得除是故文言此是法是毗尼是佛所教汝當受是忍是又言云何毗尼現前所持毗尼滅諍者是謂村能滅息忍之理言人者謂起諍人及能滅者現前問答是名為人是故文言若一比丘在一比丘前又言云何人現前言義法反者是此謂能所含名為人若就所為名人謂唯起諍者是或可約能名人文言受懺者是言僧者謂斷諍時盡集和合秉行法事決斷是非是故文言云何僧現前同羯磨和合集一處不來者前授其現前應呵者不呵者是言界者謂僧界和集分畜即是僧秉所依之處是故文言云何界現前其界內羯磨作制限者是上來所辨約說次第若據行之次第應言僧人界法毗尼此約五種出其體意論其三體不離此五但知三中無羯磨法所以非僧又不假界然餘三中法准語法毗尼亦爾人通能所故異五然五中人唯所為法通語法及羯磨毗尼亦爾次明有無者還辨此五體性有無古師多解一釋云餘四有體毗尼無體毗尼是滅滅既是無如何有體又解名雖有五體但有四謂人僧界三別有名體法與毗尼更無別體但據有軌用遍名作法滅諍遍名作毗尼又解毗尼無別體用上四法為體此等釋者並不應理若此毗尼實無有體斯義可爾今此毗尼實別有體故知不然謂以法等勸受息諍即是有體故文言云何毗尼現前所持毗尼滅諍者是又五分第二十三云何謂毗尼現前應以何法以何律以何佛教得滅而以滅之是名毗尼現前問如有法時未有毗尼有毗尼時已是無法既不並集如何言五現前答並以相續在現故言五現又解為對起諍人一一皆現故言五現問五現所為亦通有僧如何僧名說能非何答能為秉法何為他裁以此不同立名亦異問三中所為亦通有僧如何名亦說人不約僧設答若就數分應立僧稱為不秉法合是人收又與僧名恐濫秉法是以癡僧說人受稱次憶念者沓婆實淨為所他謗因謗有根執根舉罪能舉執根恐謂謗罪可舉恃淨畏僧濫治因此執情遂生其諍今憶念者能所申情能舉憶念聞根不虗所舉憶念實是清淨又僧憶念彼此無違憶念能舉執根不虗憶念所舉實是清淨又可憶念者謂所舉人自不憶犯從僧乞憶念憶念證不犯是以文言我今不憶念從僧乞憶念毗尼是故眾僧與作憶念憶念是淨實不犯戒故僧語彼能舉者言此人法為他謗外有聞根我等共住實知清淨是以文言云何憶念毗尼彼比丘此罪更不應舉不應作憶念次不癡相類前大同但僧與法證知此人不癡來不為彼此無過是以文言云何不癡毗尼彼比丘此罪更不應舉不應惟憶念者是次自言相前人犯戒雖為他舉但使不引未得即謂若即謂者恐濫無辜又恐執情以生諍訟是以文言目連親察知已法彼比丘所語言汝今可起世尊知汝見汝出去滅去汝不應此中住捉臂牽著門外佛告目連不應如是若於異時亦不應如是目連重彼伏罪然後與罪不應不自伏罪而與罪又容橫評他犯以生其諍滅時須得犯者自言彼犯罪人雖非是諍由彼自言能彌他諍是以文言云何自言說罪名說罪種懺悔者是云何治自責汝心生厭離者是次多人語以現前中簡人別斷眾不盡集不肯伏理今僧總會行籌彌諍諍滅由籌以籌表語是以文言云何用多人語若用多人說持法持毗尼持摩夷次罪處所罪為他舉恐僧治罸前引後違以生其諍然此比丘若實無犯前言即應違其舉者今既前言與舉者同明知後言懼治拒諱以前言犯後言不犯前言重後言輕今僧作法微取前言責其犯處重處而治故文言云何罪覆所彼比丘此罪與作舉作憶念者是次草覆地此諸比丘皆共犯戒迷情不了執諍紛紜或復困評他罪輕重執見紛紜相朋滅如有食尼指授食時半見提舍尼半見波逸提正欲輕懺見重者言不滅正欲懺重見輕者言不除若更尋究問答根元令諍諫重不可除滅故聖開聽不說名種直爾二眾遞相懺謝如草掩泥不令相現不汙其足令人得過是故文言云何草覆地不稱說罪名罪種懺悔者是次諸門有七第一定滅次第第二法體出不第三名體通塞第四能秉不同第五所為凡聖第六辨治差別第七緣差失不初次第者藥體所除難易差別從下向上具分為二初四毗尼擬彌諍中輕漸四諍易除彌者作一番而列次三毗尼擬彌諍中尤重四諍難除彌者後作一番而列前位之中所以先舉現前毗尼者答現前以是眾藥本故是以先明又後四諍之中言諍居首為殄言諍先舉現前覓諍第二次明憶念不癡犯諍第三次列自言事諍以一切滅滅通用其四此即除其輕微四諍次除上品四諍多人語除其言諍是以先明罪處除其覓諍故居其次草覆除犯最立其後事諍還以一切通用此三此即除其上品四諍毗尼次第雖復如此困辨分離以藥多少如向所列難易分二對除事諍即離為四若其以名攝用隨名有七對除事諍即有十四或約秉用相假合有十三以下六滅並帶現前然對言諍有別現體若對事諍即二十六或以言等滅有差別約此離分數更多也謂彌言諍獨現前有八多人中十三種行舍羅各帶現前即二十六并及前八合三十四對除覓諍通論有六犯諍對境自言有四及草覆為五各帶現前即十三位總合五十毗尼對除事諍即為一百此謂隨用離分以藥彌諍有爾許種差別不同今言七者名攝用盡如一現前總取五十八餘攝亦然故無不盡次法體出不者謂憶念不癡罪處並出法體餘四毗尼便不出法所以爾者以憶念等三對除覓諍齊用白四樂法楷定以楷定故便出法體餘四不然故不出法問所以憶念等殄覓楷定餘殄餘諍即不楷定答以憶念等作竟諍除更無流轉是以揩定如憶念者不作不犯人不癡者作而不犯人罪處何者亦作亦犯人餘四毗尼流轉不定如殄言淨現前有八及多人語若其具彰不合並用隨分少列便謂恒定為此總言應與現前而不廣略出其藥法如殄犯諍自言有四及草覆地釋不出意如前所明問現前等三不定可爾草覆更無流轉定故應出答草覆若能獨除犯諍可使定故得出法體為殄犯諍亦有自言自言既不出法草覆相從亦無又解草覆有二亦是不定一從自言流來二即直行草覆或此草覆已曾經行為諍不除故復更殄又解憶念等三彰滅究竟以滅究竟故出法體現前等四雜有白等滅未究竟故不出法問現前中三藏諧和自言中正懺責心多人語中數籌白斷草覆地中遞相懺謝此等並是懺法文何不載答許合此明文中不便並迴在下相對中辨如汙家七五等舊解云法之與體差別不同先明出法不出次明出體不出體仍云即此法以辨滅體此解不然若既即法以辨滅體如何不許古師法與毗尼體一又既即法以辨滅體如何法體分位別說次通塞者古舊名為總別通塞凡言總者以釋攝為義別者以軀分為稱通者以體遍諸處塞者唯局自分然此中名有總別體殊通塞毗尼之名是總以有釋攝義故現前名等是別以名各不相擇故現前是總者體通用通故名總餘六不獨行要假現前即是體通要假現前方得滅諍即是用通若下六六自相望六六恒別憶念現前非是不癡現前故知是別若以餘六望現前現前恒是總若以現前望下六即是其別如似羯磨望受日結界受日結界是其別若以結界受日望羯磨羯磨即是總今解但為通塞不得為總別夫論總者束別成總離出別體即失總名現前雖通下六仍有別體故知但是通局不得為總別又毗尼通名望現等七亦是通局而非總別以不束別以成總故問如仍現前通下後別以下六滅不離現前故知現前即是通義仍於其中有別現前專對言諍即是塞義問現前通下其狀如何答如憶念中乃至第三羯磨誰諸長老忍已前調和進不是法現前僧已與下乃至誰不忍者說是毗尼現前作此法時假僧人界即是五種通下不癡五種准此應知自言通者自懺名種謂和進不是法現前責心生厭諍事得滅是毗尼現前後假餘三故五通而多人語者文言作如是語者捉不破舍羅作如是語者捉破舍羅乃至十三種行已釋籌別數是法現前數已如法比丘語多白僧斷滅是毗尼現前後餘三五亦通有罪處五種准同憶念草覆地者二眾求作草覆懺法乃至和眾白竟是法現前二眾各言長老乃至作草覆懺悔是毗尼現前後假餘三是五通義是知五種通六六用下六事別各不相通即是現前亦通亦塞餘之六體塞而非通又五種通六大位是同其中僧法毗尼及人非無少異尋相可解次能秉不同者此中現前自言滅人通三餘之五滅局僧方秉能秉人有差別故類餘四種不同亦然即是五滅僧秉一向具五二滅通三現或三五若以五三相對明寬狹者五種遍七說之為寬三但局二不遍故狹次所為凡聖者准阿含經要羅漢被舉得作憶念餘者不得所以然者以無著人不故犯戒凡夫及學人有故犯故又見論十八亦云憶念毗尼為愛盡比丘下至阿那含人不為凡夫此及餘律不分聖凡淨者皆得多論云得憶念已若反戒為沙彌及根處作比丘尼即先憶念若唯聖人何有反戒根處事准此豈非被凡淨者又以義准罪處准凡無有聖人作妄前引後違自餘六滅聖凡通為不可約人限成彼此次辨謂差別者此七通言俱殄其諍然於其中自言草覆兼滅其罪以滅罪竟諍方得除罪處所中有罪不滅餘直滅諍並無有罪治人不者餘之六種但是滅諍以人無過故不治人諍是鬪亂故須除殄罪處所一兼治其人以人諱過故須加罸即是持治人法以滅其諍以治人故作竟奪三十五事具行折伏調已為解餘非治人故無有解次緣差者多論第九若比丘得憶念已若反戒作沙彌即先憶念若反戒還俗後更出家若作沙彌若受具戒即先憶念若根變作比丘尼即先憶念若沙彌得憶念已若受具戒即先憶念若反還戒僧後更出家若作沙彌若受具戒即先憶念若根變作沙彌尼亦即先憶念若比丘尼式叉摩尼得憶念已展轉次第如比丘沙彌法不癡一同憶念不能具載論既分別憶念不癡餘輕不說義准罪處亦同如被舉及別住等中富緣差不壞前法准此罪處及呵責等亦然以皆同是治人法故次下釋文文亦為七但現前自言多人語義覆地不出法體但有列解結名餘三毗尼並出法體其文若三謂列緣辨體結名但不癡中略無結名自言緣中是其重罪至於藥病相對中但舉對首懺者以初二犯非可即滅故行懺中罪而不論准此二文合明即通七聚長自言是非中具舉其七次解第二所除之病文有其三第一起過第二呵第三責告諸下廣辨四諍起過文言比丘與比丘尼諍者不在四諍之限所以然者以僧與尼形類差別不成破僧不在言攝又無一藥通被二人或比丘舉尼尼舉比丘亦非覓攝或比丘與尼諍二眾犯或二比丘諍尼犯或二尼諍比丘犯皆非犯諍或比丘與尼諍二眾羯磨亦非事攝或二比丘諍尼羯磨成以不成此是言諍所以爾者以得成破及共用藥若二尼諍比丘羯磨亦爾互諍輕非四諍之限為諍通故文中總列次呵可知次廣文三第一總舉第二列名第三廣釋對此廣文先解其義七門分別第一釋名第二辨體第三次第第四諍境第五諍根第六三性第七是非初門釋名者諍有其四謂言覓犯事言諍者理不自顯寄言以宣因此諍言遂成其鬪鬪由言起名為言諍覓諍者因有三根互相伺覓遂致不和以生其諍諍由覓起稱云覓諍犯諍者因舉七犯以生其諍或評他人犯之輕重諍由犯起名為犯諍事諍者羯磨本為成辦其事以有所辦名之為事評事生念稱云事諍故文言言諍中事作等又云是事如是持五分十誦亦指羯磨為事次出體者論諍本起由言等四成鬪之體並悉是言此之語業具表無表廣如戒體所明次次第者但為理顯由言聖德論義因評佛法遂生其諍是以言諍最在初明因此論義前後相違遞相伺覓次生覓諍因茲伺覓違教過生是以犯諍次居第三事說三起故在第四次下四門並隨文釋若堅義者應取此明次下釋文文分為四第一明其諍境第二言諍以何為根下明其諍根第三言諍是善不善下三性通不第四言言諍下簡定是非所以四文次第爾者諍不自起託境而生是以初明四諍之境既識其境須知起由故次第二明其諍根雖識諍根不知為善不善是以第三明通三性以不三性之諍義含是非若不簡定恐濫行藥故須第四簡定是非是者須用七藥非者不須既知如此先解初文初文四諍文即為四初文既爾下三亦然就初言諍文有其三謂舉釋結餘三亦爾就前釋中文有其四一舉起諍人二引十八下舉諍境界三若以如是六法後評理四遂彼此等明成其諍初文人者謂是比丘既比丘與比丘諍明知已簡餘眾訖對尼反說義亦如是第二所諍境界謂十八事舊解云若淀論十八理相是非者是言諍攝若諍已起十八方生四諍於九對中可為三分一謂犯不犯輕重兩對約行法以辨二約說不說眾法以明三約餘六對以說行法復二若諍犯不犯正生覓諍或生言諍若諍輕重正生犯諍或生言覓眾法中諍說不說但起事諍其餘六對多生言諍此釋不然但十八事若起未起諍其理相是非者是言諍境如僧十二中文義相應等四句准此豈唯事一見異又不應執已起方生四諍下二文可知次覓諍釋中文三一明起諍人二以三舉六三句彰覓境界三舉者彰何舉事破戒等者列何犯行見聞疑者舉所依根三化如是者下正明舉罪化如是相覓罪共語者正出舉語不妄求伴勢力者覓得好伴相助安慰其意者耎言曉喻若舉作憶念者引事證犯若安此事者安有根作事若不安此事者不安無根不作事不癡者彰舉者解慧不說者舉者親詞汝若不從我舉懺悔清淨必為惡業羈纏故曰不說亦可言我以癡不了心舉汝汝可容有得脫之義我今以解心舉汝汝必無有得脫之義故云不癡不說𨷂無第四共𨷂成諍句次犯諍釋中但有評犯境界更無解句次事諍中亦但有境界言諍中事作等者但諍一切已起羯磨成不成理而生諍者應用現前多人語滅即是言諍中事作所以爾者以此羯磨事同用言諍毗尼滅故云言諍中事作如瞻波中作一非法別眾羯磨乃有七人共諍如斯等類咸是言諍中事作覓諍中事作者如作羯磨被謗有根或瘨狂時作非法羯磨或作非法羯磨為他所舉前引後違而生其諍如斯之類並是覓諍中事作犯諍中事作者如似二人橫評非法別眾等羯磨一人言此惡心秉得蘭一人言懈怠心犯吉或因此故眾共相用此是事見俱異須用自言草覆滅故是犯諍中事作次明諍根根者生義四諍之興莫不由此先明言諍根言諍根中位有其四一貪無貪等者約內心為根二僧界人三約事說根評四種僧以生其諍諍由僧名僧為根界人亦爾三六諍為根者約因說根六諍者中阿含五一二云一瞋惱二不語三憎疾四諂誑五無媿六惡慾耶見惡性故下文言鬪諍有六根本如中阿含說四十八破事者約法為根次覓諍根初貪無貪等還是內心次約事者舉僧犯故以僧為根因界生諍故界為根犯由人起以人為根三舉事者即是所舉之事此不諍理有正故無十八破事事次犯諍根者餘如前釋言六犯所起為根者約業說根如增六文云或有犯由身起非心口等六句但八業中除心及不由身口心犯二句解六句是次事諍者事從三起解釋如前次解三性言覔事三皆通三性犯無善犯故但通二先明言諍通三文有其二先總問答若為顯理不求明名利如此諍者是名為善若為名利情存勝負如此諍者是其不善非前二心從爾論理如此諍者是名無記次別問答通三所以一一有三謂舉釋結通六諸諍各三亦然文相可解次覓諍總別如前然就別中先解善見善見釋中文有其三一明舉人善心伺覓二以三舉下彰覓境界三以如是相下出其舉語初文是中比丘者出其舉人善心共相伺覓者出善心相次釋覓境文有其二初有三句舉覓境界解釋如前次內有五法下明其善相前言善心不知如何是善心今以內具五法故是善心次出善相如何知善具二義故一今前人自行清淨故言令此人無犯等二令僧眾無外見聞之譏故言莫令此人有意名等次出舉語釋文如上次明不善文亦有三初明舉人不善心覓二以三舉等者釋覓境界科解同前真翻前善即是不善三以如是相下出非法舉言莫求非法伴黨相助故曰不妄求等內無五德麤言呵詰故曰不安慰其心化舉憶念者妄引證明安此事者安無根不犯事不安此事者不安有根犯事內無解慧故名為癡非法舉罪彼此獲𠎝故曰不說次無記同前次明犯諍初總問通三以不次總答但二無其善犯次別釋二不善犯者謂凡夫及學人故犯戒文言學人故犯者通相總舉理實但是前二果人以不還人欲界惑盡所有犯者亦是無記或可雖無不善有故違心即是說故違心名為不善次無記犯者謂凡夫及學人不故犯戒及無差人又准十誦第五十無學人犯者亦唯無記故長老波離問羅漢為善心犯不善心無記心佛言羅漢有所犯者皆無記心若阿羅漢心不憶有長衣數數食別眾食不白入聚落不著僧伽梨等又准十誦亦有善心犯戒彼文第五十波離問佛為善心犯為不善心犯為無記心犯佛言有善心犯不善心犯無記心犯善心犯者若新受戒比丘不知戒相手自拔塔前草自治經行處草自採華是名善心犯不善心犯者故犯佛結戒無記心犯者不故犯戒次事從三起亦通三性釋文可解次簡定是非是非者諍理之言是其言諍餘言餘諍則非言諍伺罪之覓是其覓諍餘覓餘諍則非覓諍評犯之諍是其犯諍餘犯餘諍則非犯諍諍羯磨事是其事諍餘事餘諍則非事諍總定雖然次須別解別中先定言諍餘諍類知就言諍中文分為三第一以言對諍總為四句第二或有言六是非互顯開為七門第三云何言下依事解釋是非之相初學本文多少不定為末下諍字或有或無有者即五句無者但四句為此至見諍子注中或云五句如上或云四句如上今者且存四句分別一言言諍二言諍言三言諍四諍言定文雖然義須解釋有古師云此四句中為簡餘言第一第三以言石諍為簡餘諍第二第四以諍云言然此四中初二以為一對後二後為一對此二對中所以前對言即言諍言諍即言為別後故何故後對言即單即單即為別前故實理相似為別二對故有單複莫不初與第三同簡餘言第二第四同簡解諍古釋眾多且陳此一餘並繁詞不能具述又此四句並是散文句別義殊豈得總束為對束為對者理則不爾為言醫宗故今別解欲得理教分明無過直釋初舉四句章本次開七門後隨解釋如此順文於義何失又若要須釋章本者此四句中前之三句將言對諍簡言是非第四一句將諍對言簡諍是非然前三中初之二句舉言諍體簡言是非第三一句簡生諍因又前二中欲舉諍體以言通有是非故須初句簡言是非故文云云何有言即是言諍云何有言非言諍次句言既簡已直舉其體故文云云何言諍石是言此直舉體不簡其非此雖識體未辨其因故第三句簡定其因自有因諍十八法言即是言諍諍餘言者不是言諍故文云云何言即是諍云何言不諍問觀其初三簡無別相如何乃言體因有異答初句既云言諍明知諍用言成成諍既以由言明知無是諍體第三單舉其諍諍即未定言成成諍若定由言因亦須簡別第四句將諍對言簡餘諍者以上三句但簡其言故此一句直簡其諍故文云云何諍即是言云何諍而非言觀其簡文相應如是直以旨趣幽深意促難見磨古群德並竭智謀釋者隆多契者甚少余每稱校之次詹此生慚聊申此解異諸學人詳文察義希望永決迷津長開法眼次開七門望第二句直舉諍體無舉非句自餘三句是非相對顯故成其七次依牽解一一有三謂舉釋結初牽釋中比丘共比丘者舉起諍人簡異餘眾不成言諍尼共尼諍亦爾十八法者舉何諍法以如是相等顯其諍相第二牽中舉父兒等善言不成言諍類比丘善言亦非言諍餘牽類知次覓諍但有四句章本餘二略無次犯事二諍總類用前次明第三藥病相對然中文三第一總明現前是非第二爾時阿難下藥病相對殄滅方軌第三爾時長老優波離六問答自言是非之相初文以現前是眾藥之本故須先簡是非欲令非者棄捨是者隨用至於對諍不後重彰懸指上文省而義要然中分二初先明非第二若一比丘下明其如法此中泛明是非未有主當今者且擬一法以釋此文如人持欲至僧忘而不說一人云欲既不說別眾不成一人云隆後不說法事得成因此紛紜經人取斷非中四四成十六句謂一比丘為頭有其四句餘之三頭各四亦爾然十六中位分為二初十二句三種非次有四句五種非前十二中有三位四句先解初句文分為二初明現前三非次如是下勝成非法文若一比丘在一比丘前者謂斷諍人在起諍人前合是人現前次好言教語若擯者妄定諧和輙有取捨然此不應真軌故曰非法等此是非法法現前次彼作下印非為如勸受息忍無是非法毗尼現前次結非法亦具三種故稱相似釋初一句既爾餘十一句類知次五種非四句准同前說次釋如法亦十六句前十二句三種如次有四句五種如前文十二亦三頭各四先解初四於初四初句中文分為四一舉三種現前二若作如是下結成如法三是中下牒名解釋四若比丘六結發起罪初文三種現前一人二法三毗尼人者謂斷諍比丘在起諍比丘前能所合是人現前攝次法現前好言教語者定前所諍之事謂欲至僧表情無二雖妄不說法事得成出此道理諧和彼此故曰好言教語此之斷決契合真軌後有滅惡生善之能亦稱聖教故曰如法等此謂是前作事如法無是如法法現前次彼作下毗尼現前此謂印如為是勸受息忍即是如法毗尼現前次結成如法次牒名解釋如文可知次發起罪有三人一即座斷諍人二後來比丘三新受戒人然下兩人物是初諍初者新也我等先來未斷此事望我即同未滅之諍故言謂是初諍佛言但使滅竟皆是已滅之諍非謂望已不滅即名為初是故發起皆獲提罪次三句同前又二三為頭亦四應爾次明五種現前先明僧為一比丘文亦分四一五種現前二若如是下結成如法三牒名解釋四結發起罪初五現中略無其界亦可僧所依處必須有界餘相可解但發起中加與欲為四下三類知次明藥病相對殄滅殄滅四諍即為四文先明言諍言諍文二先總問答知用多少次阿難下別問相對殄滅方軌初文問意藥有其七諍但有四不知欲除言諍當困幾藥故曰以幾滅滅佛前七中但用其二簡餘五藥故言現前多人語所以爾者言諍起由諍理解正解正道理聖教所明是以三藏法師依教刊定願正理分諍情消殄故現前多人語是相對除餘之五藥用不相應如似覓諍起本由人以人清濁未分是以生諍故以憶念等三定人清濁清濁既分諍情消殄言諍評理而生本不謂人清濁豈得輙用憶念等三如似犯諍本由輙治求後評他罪之輕重今欲滅者要得前人白言引過定罪重輕或可相朋經歷年歲自言不滅須用草覆言諍評理不用白言引過理須彰何用學霞次別問答文分為二初明臈現前滅言諍下品易除殄者第二爾時舍衛下用二毗尼滅言諍上品預除殄者凡滅之來從下向上要須先輕後重前文復二初一問答阿難聞說用二毗尼滅於言諍後更知生不用多人語獨用現前頗得滅不即是別問佛答言有即是別答問阿難何不更問獨用多人語不用現前得滅言諍不答阿難已知現前是眾藥本縱單多人語亦不離現前是故不得更興此問第二問一滅方故言何者是佛言下示其滅法滅隆能滅人異即可為八初一比丘滅二二比丘滅三三比丘滅四僧滅五若彼諍比丘在道諾下異界僧滅六若彼諍比丘不能中道下眾多三藏滅七性二比丘下二三藏滅八性一比丘下一三發滅此八能滅之中若以界分前四同界後四異界若約現前三五多少初三後三是三種現前中間四五僧滅是五種現前若約人之多少別者前四從一至僧後四從僧至一今分八者不約現前三五又後不約界數不同但約三藏能斷諍人德行勝劣以分次第既知次意先解初文一人滅中分之為四初明三種現前第二如是下續名成滅第三牒名解釋第四應明發起文無者略既欲刊定不知所定是何故須先出所諍之事如下增十二中文同義異文異義同四句所諍是刊定事既知如此隨起皆得今且寄一遮性以明如有豎義者言麤語戒等性惡故重媒嫁戒等遮惡故輕治義者言同一犯聚何有輕重執此輕重生諍經三藏斷決能滅之人為所滅者故云若一比丘為一比丘合是人現前次好言等是法現前三藏法師依教決斷言豎義者是治義者非故曰好言教語如此斷時契合真軌等故曰如法等次彼作下即如為是勸受息忍即是毗尼現前餘之文相同上應知為一既爾為二三僧亦然次二比丘滅三比丘滅軌則別異並言亦如是次第四僧滅文分為二初對僧滅二佛語阿難下道諾不對僧滅前三同界無道諾滅此趣異界故有道諾僧為一人四文如上為二三僧文亦不異並悉略無發起之罪次道諾滅者彼諍比丘不忍僧滅欲往異處更求人斷但在道諾思量忍可此滅若能如此滅者是前僧之力文計有四略無發起次第五僧滅文分為二第一對僧前滅第二彼諍比丘下道諾思量滅前文有三初明起諍比丘付諍方法第二此僧應語下教僧受諍儀軌第三受已應斷決下示僧滅方就前付中文有其六第一說諍起由申其來意文言我此諍事如是起者總申諍由如實因是起者自彰說實僧作如是滅者申前僧滅法我不忍可者自除不受是故已下結其來意第二善哉長老下請求為滅第三若長老下滅若如法彰己能捨第四若長老不能下若其滅不如法諍更深重以此悕令如法滅諍第五不如法下滅若非法非直諍增亦令比丘住不安樂第六彼諍比丘六勝成捨諍次教僧受文有其四第一勅如實說許量為滅文言長老諍事若如是起者責起所由如實如所因起者責說如實如彼眾僧滅諍者責前滅法此之三事說若如實我等當共量宜不知能滅以不第二若長老下若說不實我不得意違理斷諍令更深重此則悕令說諍如實第三非法下說不如實非直諍增亦令比丘住不安樂第四彼僧應下結成受諍次示滅法先結前生後次若彼下正教滅法滅法文四如前說初滅中文分為七初教安諍比丘進不如文第二眾僧下念欲簡德第三佛告下許簡智人制具十法五分二十三彼諍比丘具說本末若僧作二種語或言應爾或言不應爾不可定者僧應語言隨汝所取二種語中各四人作斷事僧白二差之下七百結集中亦爾第四斷爭比丘中下長出三人三人如文此雖不足斷諍數中若在界內咸須取長如七百中羯磨差人取第五若許斷事下具德之人僧應佐助第六若此語事下教量前僧滅之儀軌第七僧無應語下正明斷滅餘文可知道諾滅中亦四如上第六法眾多三藏所文相同前釋亦如上第七法三三藏所第八法一三藏所文並同前不更繁載又六三文略無道諾滅法次明二毗尼滅於中文四初彰鬪諍比丘不忍八滅此中初至滅諍爭不忍前四能滅次聞彼住處六不忍後四能滅第二彼諍比丘下舉白世專第三世尊無集六呵責第四告諸比丘下制用多人語於中文二初立章門制用多人語第二依章解釋解釋文二既欲以籌表語先須簡德差行籌人第二有三種下行籌彌諍此中復二先明多人滅諍儀軌第二有十不如法下辨是非優劣前文有三第一舉數第二列名第三云何下解釋解釋三相文則為三第一顯露第二覆藏第三耳語初顯露中文四第一正明滅諍第二若化如是下結名成滅第三是中下牒名解釋第四若如法下結反起罪初文有二第一當處僧滅第二若如法語比丘少下外求他界僧滅前文有四第一明行舍羅五種差別此五句中初二句眾中非法者多然師及智人如法次二句不知眾中如非多少亦師及智人如法次一句一切如法者多第二應作二種下制作法式為表是非二語故使完破不同五分二十三云僧應作二種籌一名不如法第三作舍羅已行籌白法五分唱言若言如法捉如法籌若言不如法捉不如法籌第四行舍羅已應別處下白令諍滅四文之中前三是法現前第四是毗尼現前餘三現前理有可解次他界僧滅作亂起者任五德量宜隨作一法令眾得散五分二十八云自收籌取於屏處數若不如法籌多應更令起相去遠坐人人前竊語言此是法語律語佛之所教大德當捨非律非佛所教如是語已後更行籌若不如法人猶多應後唱云僧今未斷是事可隨意散後當更斷若如法人多應白二羯磨滅之下三文可知次覆藏次耳語此二之中唯無狂露中第五句以人非法者多恐相倣習故覆藏耳語行不得發露釋相可解次辨是非優劣文中分二初明捉籌如非次辨德之優劣前如非中先非後如非中有三謂舉釋結釋中有二初列章本次牒解釋釋中白異羯磨異者軌異倫是中無一非行籌刊定是名非法此念罪此不故犯或發心化者舊解云若評小罪此言對首懺此云心念二於是法若行舍羅定一是一非名為小犯行舍羅此釋不然今解或念犯者起心未作如起不正思惟名為非護或不故犯者以無故違心無非威儀罪或發心作者物欲發動身語合得吉罪此等軌者俱是不應行籌定之是名非法亦可此雖是犯未動身語行籌定者是名非法異見異忍者心見其非忍非捉籌如法反前可解次明斷諍比丘德之優劣文有五句一舉二列三云何下釋前四句四是中下校量勝劣五是為下結次殄覔諍文分為二初總問答困藥多少次阿難下別問相對殄滅之方初文問意已知言淨用二藥除未審覓淨當用幾藥故佛答言以四滅滅所以然者以淨根本淨人犯不故用憶念等三定人清濁人定淨消是相對治覓不評現不用多人語又不治罪諍犯不用自言草覆次別問答隨用分三初現前與憶念合二現前與不癡合三現前與罪處合就初別中文分為二初文阿難既見用其四藥不知直用現前憶念不用不癡罪處頗得滅不即是別問佛答言有即是別答又憶念等三所定各異是故此三無並用法次又問下別問滅方佛示滅法於中文四第一正明殄諍第二若若如是下結名成滅第三是中六牒名解釋第四若比丘六結發起罪初文有三第一明其諍過第二阿難下教與憶念毗尼白四如上第三有三非下辨如非法此中先三法非如次五法非如並具如文次現前不癡准憶念說次現前罪處文並同上准是非文言不作白言是非法者稱異問文中若不自言是非翻則自言是如既得自言何故與罪處法答若其此人本不自言無可微責治成非法今為此人先已引罪後懼僧治輙便拒諱故僧化法尋取前言所引罪處以加治法今文言不作自言者治本來無自言也又文言清淨者非法謂本無犯若與罪處是名非法若不清淨者如法謂犯殘等名為不淨治則如法若犯夷者應須滅擯若作罪處是名非法次明犯諍先總問知用藥多少次阿難下別問相對初文問意雖知言覓不知犯諍後用幾滅佛言用三所以非餘者答此已執犯重輕以生其諍僧若滅時要須得彼白言引過諍方除滅或不能定紛紜難息即須依教化草覆地此不評理不用多人語又不諍人清濁不用憶念等次別問答隨用分二初現前與白言合次現前與草覆合前文分二初文阿難既見用其三藥不知直用現前自言不用學覆為得以不佛答言得次問言下別問佛示滅法於中約法分寂應分為二先對三境三種現前自言次若長下五種現前自言今據然滅人以分次第以人有四故文亦四先對一人懺中文分為四第一正滅第二結名第三解釋第四發起此對一人懺者治三四犯及殘下輕蘭人皮石鉢剃裸生等餘者則非對此釋懺儀軌四門分別第一明懺悔意第二釋懺悔名第三懺滅方法第四懺解同異初門意者凡論罪業皆無定性既從解生理從解滅然此先作惡業雖謝於往為因成就必招苦果故今於惡生厭立對除道用此精誠能滅先惡既滅苦因戒如本淨不受來報名為懺悔次釋名者懺是梵言具足應云懺摩悔是唐語如呵梨陀薑故言懺悔義言興善伐惡稱之為懺姄往修來目之為悔次滅法者懺悔必須至誠殷姄慚謝往𠎝方能滅惡然所造惡治須感報不定以報不定遇可轉然此懺心能除被報以除不受名之為滅問所造惡業謝在於往謝性既無無何可懺答造業雖謝業性已成成則是有故得懺悔問罪有違理及違教未知知懺滅何者解以牒名種依教懺故但違教不除違理其違理罪攝在化教中明又解俱懺違教違理所望雖攝論所厭𠎝體無有異若使違教違理體有異可懺違教違理在今此二違體是同如何體滅違理在次同異者凡論惑者從虗至細以其虗惑障理淺微惑翳理深其觀智者從微至著初起者劣後生者勝初起雖劣能除上惑故九品中先斷上上後起漸勝能除下惑故九品中下下後斷論其懺悔對除義則異此以所造業有其三品懺洗之心亦上中下悔是事中遞相抑伏要須敵對相當方能除連其所造惡若是上品中下心懺必無滅義通須起彼上品善心伏彼惡因方遮苦果中下相對其義亦然凡懺悔者既不能定先所造業上中下別但應總起上品心除以上品心能斷一切是則上品善心尚除上惡中下惡而不消亡若取防未起非即類斷結道如初犯過虗離之則易如是展轉乃至第五自非專心護持無由行立以此故知初劣後勝釋文等法並如上明然三說已前是法現前自責心等是毗尼現前餘文可解次對二比丘懺加一問通人此中懺者捨墮通三位𠲮此應作餘非此限但小眾者須對三人次三比丘文亦不異此中懺罪者限是夷遞輕蘭殘邊重蘭及壞羯磨僧并破法輪伴餘非此限次對僧懺餘法如上所懺罪者是夷邊重蘭及二逆蘭并餘破主捨墮該三位不須別互餘者則非計對僧懺應攝僧殘化法不同故且除去次現前草覆文中有二初一問答知用分寂次又問下而答滅法文四如前前正滅中文亦為四第一彰其諍過第二阿難下兩眾量可求化草覆第三阿難下制作單白和其二眾第四阿難下正制二眾各作草覆懺悔文中已除重罪輕者並滅而何者為重罪答如憶念不癡中以夷殘偷蘭為重罪此准於彼理亦須然故多論第九云我等所化罪除偷蘭遮除白衣相應罪今白為及為彼故當現前發露悔過不覆不同僧懺文中不簡被為聞戒化法故罪不除其遮不至白衣家法事須懺謝白衣非直謝僧能了故須除去除此已外並作草覆此中罪者無前白言中相用不滅難定者是謂如讚欲食及指校食各執不同不得懺悔故聽不說名種作草覆懺眾中第一堪秉法者應起白眾求滅如文第二眾亦爾次問事諍以位別故須別而答然以體同三諍故言一切滅滅若更問答不勝前三恐濫俱用又言墮所犯次明自言如非前文餘六並明是非唯有自言未辨為此波離舉問就中文二先總明自言非一切如法次是中下別出如非相就中文三初明非法自言次優波離下明如法自言次時有比丘下辨淺自言得失之事亦可對餘比丘無出自言不成之事先解初文非法位二初有兩位四十九句據不犯成非次有兩位四十二句據有犯成非前四十九實不犯罪不化舉不作憶念便自言犯對其七聚為頭互勿成四十九次四十九不犯是同然作舉化憶為異次四十二中並隆實犯各以引不相當故成非法此中前四十二據不作舉不作憶念為實犯夷若言犯夷無是如法為言殘等六句七頭各六合四十二次四十二俱作舉憶念為異次如法中但二七句皆據實犯前七實犯不作舉不作憶念反兩位非中各初四十九四十二後七實犯作舉作憶念反兩位非中各後四十九四十二以各引過相當故是如法次不成如文上來滅諍法竟
