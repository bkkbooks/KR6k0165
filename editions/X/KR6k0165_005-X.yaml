body:
  text: 次解處門先列章本有二十六舊人科章本云前十三章就處以明盜二寄信下八就所取物以明盜三同財業下五違要以明盜此且強作異同未順文意次下依章解釋然釋之中有三十四章以乘擔村蘭若田處所船水此八各兼壞體故成三十四然諸章中各有舉釋以皆結罪故無結文亦可略無初文七句一列物之所在二屬主三盜心四所取重物五取之方法六離處七結罪此中舉有主攝有主想舉重物攝重物想即是七緣具足亦可略無想也初門既爾下皆類然然有少者自是文略七中初句可知第二主者不過三寶別人先解三寶四門分別第一明盜結業第二互用辨違第三出貸得不第四瞻待賓法初門先定盜佛物罪然盜佛物此律無文祗中犯重彼文第三云比丘作摩摩帝若塔有物眾僧無物便作是念供養僧者佛亦在中便持塔物供養眾僧佛言夷此作僧用尚結夷𠎝況盜入私不成極罪又復餘趣報早盜得輕者佛境尊高寧容不重又解盜得蘭罪以佛於物無我所心不生損惱義同非人故涅槃第七云若有長者造立佛等以諸華鬘用供養佛有比丘見華貫中縷不問輙取犯偷蘭遮又十誦五十一云若盜塔寺精舍中供養具若有守護隨計直犯若不直五錢偷蘭既望護主成重明知約佛不重爾者如何僧祇成重答或可更應別有護主或損本主施佛功德故奈耶第一云若盜佛塔寺物者謂檀越施與塔寺斷彼施主福結罪又解今詳聖教重輕等文佛物罪中應分二類謂佛在日盜得成夷以親是主攝物差別若涅槃後但犯蘭罪以入非情數中不同現在故婆沙正義於佛處得罪如人盜聖僧錢必得重罪以上座身現在自為物主若盜餘般圓寂者財非親為主但獲蘭罪又如有人身若現在盜望現主結以夷名或若死後立厝安物若有盜者但獲蘭𠎝佛境亦然寧不同此比以諸文不定說者懷疑作此校量可袪情惑問盜物結業如上所明未知佛像合得何罪多云為供養故無罪若為得錢轉賣偷蘭十誦亦言盜得偷蘭若尊敬心作念佛亦我師清淨心取無罪此應無主或本心通若也本主無心兼為但自供養計直成重故伽論第八云取佛舍利有主為自活偷滿五夷不滿蘭若憎惡取彼此俱無偷蘭為供養故佛是我師我應供養滿五吉羅次盜法物者以此非情別望損處結罪故下文云時有比丘盜取他經作念佛語無價計紙墨直疑佛言得五錢夷十伽五分並同多云盜經不問供養不供養計直成重此以損主讀習功德不同盜像有遙敬義又可造經本心通為但作淨心計不成重此則像經義齊論文牛舉上來但明盜經不論法物准經既重物亦同然故伽論第八偷經物滿五夷次盜僧物者教無定說解者多途一解盜得蘭罪以望十方不滿五故故多論第三云若盜僧物五錢已上重蘭四錢已下輕蘭雖無夷名蘭踰塵數又以此文現結蘭罪善見若取僧物如己無異行用與人得蘭又解僧物分為四例一常住常住二十方常住三現前現前四十方現前於中結罪輕重可知此由教含輕重故作四例科分望得順教無違故作斯解今詳此說轉更違文但是解有隨情妄為階級且如第二物類豈得唯蘭第三物中屬別非眾故今正解僧物分二一十方常住二十方現前其常住物盜得夷罪文中但言屬主不簡僧別僧既成主盜理成夷其罪或望護人或於僧結此物十方僧眾若有可分之義可使不滿五故但結蘭罪然十方眾既不合分如何約彼而成輕罪但望十方有共用義又僧祇第三云比丘作摩摩帝塔無物眾僧有物便作是念天人所以供養僧者皆蒙佛恩供養佛者便為供養僧即持僧物修治塔者夷將供佛用尚結夷𠎝況費入私不成究竟又五分二十八有比丘盜心貿僧好物生疑問佛佛言貿直五錢犯又大集經三十三云是諸比丘乃至未盜眾僧田宅園林奴婢駝騾牛驢如是等物難可了知是名破戒初相若盜如是等物是名破戒等相是相出已失比丘法是波羅夷非沙門不得與如法眾僧同共止住應當擯出爾者如何此及餘文有結蘭者答此文不據盜損且結礙僧用罪善見第十如己物行用蘭者不言有盜心其次即云若以盜心取者隨直多少結罪以此取文極須思審多論直言僧物不定色類或是十方現前望人不滿五結次十方現前者如僧得施及亡比丘物未作法前理望十方不滿五故結以偷蘭若已羯磨竟即准羯磨數結故婆沙云若盜命過苾蒭財物於誰處得業道答若已羯磨於羯磨眾得若未羯磨普於一切善說法眾處得俱舍亦然第二門於中有二一三寶互二當今互初門若三寶相望俱不得互如僧祇中摩摩帝以塔僧物互用成重此律下文施佛竹園佛言施佛及四方僧若但施佛僧不得用以此故知施主本心通施三者即有共用之義若各限約理即不通故多論第三云若塔地華不得供養僧法應供養佛亦得賣取錢以供養塔若屬塔水功力由僧殘水多少善好籌量次當分互佛物差別分之為二一是勝義二是世俗言勝義者謂是寶物若人施入寶者應懸塔中供養故多論第五云仙若在世時若施主言供養佛則色身受用若言供養佛寶則色身不得受用應著爪塔髮塔中施心供養法身法身長在故次世俗有三第一佛受用物謂是堂宇帳座等此文云佛有衣鉢房等一切天人應可供養第二施入佛物謂諸文中許令出息者是故十誦五十八云塔物無盡者毗舍離估客用塔物翻轉得利供養塔是人求利故欲到遠處持與比丘令得利供養塔比丘不受白佛佛言聽僧坊淨人若優婆塞出息塔物得供養塔此迴轉物得買受用物及供養具故新後分涅槃經上卷云佛告阿難若佛現在所施佛物僧眾應知若佛滅後一切信心所施佛物應用造佛形像及造佛衣七寶幡蓋買諸香油寶華以供養佛除供養佛餘不得用用者則犯盜佛物罪此經傳來恐非真也五百云佛物得買供養具第三供養佛物僧祇三十三云塔有華菓園是中出華應供養塔若檀越言尊者是中華供養佛菓與僧應從檀越語若華多者得與華鬘家語言爾許華作鬘與我餘者與我爾許直若得直得用然燈買香以供養佛及得治塔若直多者得買佛無盡物中又云有舍利者名塔無舍利者名支提支提得安佛華蓋供養具若有言佛貪欲嗔恚愚痴已斷用是精舍供養為得越毗尼罪業報重又言若佛生等大會日得持供養佛塔中上者供養佛塔下者供養枝提次法物亦二一施寶物即是勝義故多論云應懸塔中不得作經及與說戒誦經人次世俗亦三一受用物如箱巾函帊等二施法物多論云若直言施法分作二分一分與經一分與讀誦經人三供養法物准佛應知言僧物者施寶如上應懸塔中供養此是勝義物故多論第五云若施僧寶凡夫僧聖人僧不得取分以施僧寶故此物應還付施主若無施主應著塔中供養第一義諦僧若施眾僧者聖僧凡夫僧俱得取分以言無當故此是世俗物此物通迴轉用若持僧食出界而食縱使鳴鐘亦不免盜雖供僧用屬處定故下文二處同利必以羯磨通該若但得者豈繁須法十誦犯吉以還供僧現前物互准義應知次明出貸者僧祇第三云若塔無物僧有物者得如法貸用但分明疏記言某時貸用某時得還僧貸塔物亦爾彼知事人若交代時應僧讀疏分明付授若不讀疏得越毗尼又准十誦五十七別人亦得貸僧塔物用彼有一住處比丘屬塔物自貸用是比丘死是事白佛佛言衣鉢物還計直輸塔餘殘僧應分次貸僧物亦爾次瞻待法此下律文有一住處眾多痴比丘集在一處時尊者波離至此眾中而諸癡比丘都不瞻視迎逆承事波離以是即日離去比丘白佛佛言若有三藏比丘來當往半由旬迎逆承事安處洗浴給其所須飲食若不爾者當如法治既言給飲食等而供給物不言常住現前准與知事人衣是十方現前物亦可用常住物供給亦得如知事人與福饒類十誦三十四分藥人和合平等分若有貴價藥來者應別舉置若病比丘索者應與兩錢半價藥若索多者應從索直五分二十一云比丘有拘攝四方僧有伽梨佛言聽貿易若價有多少者應須互陪若貧無物可陪與僧而必是少欲知足亦聽與之餘衣亦爾僧物供僧白衣絕分故大集經四十二云但是眾僧所食之物不得輙與一切俗人亦不得云此是我物別眾而食然於眾僧有損益者聽故僧祇第三云若損者益者應與損者賊來詣寺索種種飲食若不與者或能燒劫寺內雖不應與畏作損事故隨多少與益者若治僧房巧匠及撩理眾僧物事者應與前食後食及塗身油非時漿等若王及諸大勢力者應與飲食是名益者十誦有眾多王臣數數詣竹園房舍觀看若來時索食薪火燈燭若與畏犯不與懼作患不知云何以事白佛佛言應立分處人立分處人已不白眾僧得用十九錢供給少若更須應白僧竟與又若練若處有賊來乞食作食人言食不由我不得與汝汝自從沙彌索諸賊即從沙彌索沙彌言我不得與汝汝自從知食比丘索即從知食比丘索比丘言為僧故辦是食不為汝等賊相語言是比丘何肯與我便捉一比丘手脚截腰斷諸比丘不知云何白佛佛言若有如是怖畏處若少乞少與若乞半與半若都索都與莫以是因緣故得大衰惱問文中遣立知事處當三寶財物及盜損中亦望護主成業而全未知何人堪作答凡知事者必須識性昭敏明練毗尼善達開遮洞知持犯至於隨務量據不率己心行潔氷霜懼來業道如此之人方堪執物斯則遠繼前蹤遐開後轍自有屋愚下輩志性倡狂不識聖制根由亦迷業道輕重直暢無明之慶快不憂永劫之沉淪斯乃佛法瘡疣僧中息肉以茲慰喻幸可思之一旦漂零悔之何及豈得更縱頑心便謂三塗可訥斯則四山奄至五痛焦然故大集經四十二云若有四方常住僧物或現前僧物篤信檀越重心施物或華菓等諸物一切所須私自費用或持出外乞與知識親里白衣此罪重於阿鼻地獄所受果報又三十三佛言有二種人堪作僧事何等為二一者具八解脫阿羅漢人二者須陀洹等三果學人堪知僧事供養眾僧諸餘比丘戒不具足心不平等不令是人為知僧事寶梁經上卷云佛告迦葉我聽二種比丘得營眾事何等為二一者能持戒二者畏於後世喻若金剛後有二種一者識知業報二者有諸慚媿及以悔心復有二種一者阿羅漢二者能修八背捨者迦葉如是二種比丘我聽營事自無瘡疣聖教既然即為永誡宣人輕犯獲二愚痴次別人成主不者於中有六第一守護主見論第九云若為三寶別人守掌財物好惡之心合陪不是又如十誦四十七六羣比丘與一比丘作善知識是比丘寄一比丘鉢與六群是鉢中道破是比丘見六群作念若不自語或多索價便語彼知六羣言是汝鉢破不答我鉢不破汝償我來是比丘白佛佛言若好心捉破者不應從責償彼下文亦言若好看失不應償若不好看失應償若論借物損失一切須陪不得論心有好有惡第二守視主十誦第六十守還人與比丘衣比丘不取作是念是中誰是檀越誰是主是事白佛佛言但隨施者受此律下文守視人及賊與比丘佉闍尼食比丘意言此非彼食不受白佛佛言此即是檀越食聽淨洗手受食之理應任彼自施不合從乞此但守視非正物主若從彼乞便是教盜第三盜賊主賊盜得物即名為主故下文云他盜取物而奪彼盜者物疑佛言夷伽論第四云有諸賊施比丘衣比丘疑故不敢取乃至佛言作施主意取十誦第六十云諸賊破城邑已後官力來圍是賊怖畏急故持物施諸比丘施已便去後諸白衣見物從比丘索是事白佛佛言莫從賊取物若賊主與當取取已染壞色著若壞色已主故索者當還以盜得物即成屬己故奪得重施復成施問物入賊手已後見得取本物不答諸文不定一解依此律文不問心斷不斷皆不合取爾者鼠偷胡桃六群住取以屬鼠訖應得吉羅所以望本人主而成重罪答畜生無心盜取或未離處不屬畜生望人成重爾者鵄鳥亦然何以無罪答此已離處不屬女人又解若更思文撿義或同餘律若作捨心後不得取若無捨心後還得取此律復云去寺不遠有村諸鼠往村中取胡桃來在寺內成大聚六群比丘以盜心取食觀此文勢亦是離處但以人主不知攝為己有六群取時作人物想故望人主成重不據畜生其鵄鳥肉主作捨心以屬鵄鳥取之無罪爾者文中結重何不問心答以此文中不了說故佛判得重明據捨心上來二釋各據一邊猶未能通諸教本意然今會釋犯不犯相須據二心四句簡定唯有現前行盜物主不作捨心盜者未作得想此取無罪如五分二十八云有一比丘為賊所剝諍得衣物生疑問佛佛言不犯又如僧祇第三云比丘盜馬乘走而馬主覺即乘馬逐其主不作失想比丘不作得心未犯波羅夷若馬主作失想比丘作得想波羅夷牛等例然或可盜者雖無得想其失物主已作捨心捨已更取決定成重故見論第九比丘奪他園令園主疑蘭園主作捨心重多論第三若先心已捨正使己物亦不得取取計成罪又伽論施已還取亦成盜犯或可物主雖無捨心其盜物人已作得想對此若取還成奪賊前人攝物屬己已作得心離處業成何容更取此若取者深違正理故見論云若園主未作捨心比丘取園作決定得想波羅夷多論云若先失物作心未捨還取此物計錢成罪或可主作捨心盜者作其得想此之一句事是絕言因明僧物入賊手已後見本物更得取不古舊解云若盜僧物一切得取以其前人不成自入又以前施是施後施非施此之二解俱違正理智者於中理應思擇然眾僧物還須撿驗得捨二心若其眾僧已作失想或可盜者作其得心更取此物必定成重僧物若其不成自入盜者即應不成業道盜者既計業成奪者何容無罪第四收因主如似破家人財合入官僧祇四十云若犯官事未被收錄又未藉財寄者得取若已收錄藉財語言世尊制戒不得受是若言我與塔寺得取不得覆上而去當露持去若有問者當言塔物僧物我物若聽者善若不聽者還第五狂人主伽論第七狂人邊得取衣不或得或不得云何得不知父母等所在自持物施比丘得取云何不可取父母等可知不自手與不可取又第四云有比丘取狂人衣彼見已語言莫擔去比丘答言後當還汝尋生疑悔乃至佛言不犯波羅夷犯偷羅遮第六北方人主十云盜天北方人物犯蘭以彼無我所心故餘方成重皆據此方錢斷見論第十帝釋立店販賣比丘天眼觀知而取帝釋𠫤惜還不無犯以是應化物故次非畜者此文不明五分盜非人物蘭畜生物吉次明盜心祇中好心互用佛僧物亦成盜心所謂痴心犯也十誦五十一有五種取苦切取輕慢取以他名字取觝突取受寄取伽論第七有五種取謂強奪取耎語取苦切取受寄取施已還取下文有五種賊心黑闇心耶心曲戾心不善心常有盜他物心復有五種賊心決定取恐怯取寄物取見便取倚託取次明重物要五錢已上問未知此是何等五錢答准其道理隨用國所用八種錢中計五成重故下文云錢者上有文像國土所用僧祗第二告諸比丘從今當知十九古錢名一罽利沙槃分一罽利沙槃分分為四分若盜一分若一分直犯波羅夷所言四錢三角者依此准也又十誦五十一問如佛所說若比丘盜心取他物乃至五錢若直五錢物得波羅夷云何是五錢答若一銅錢直十六小銅錢者是計今小錢合八十成重雖爾且依前說次取之方埋藏牽挽言辭攻擊等隨設損財之儀皆成盜罪次明離處差別為二一約離處明離處若准多論第三若舍物同主離地成重曳而不離未出家界偷蘭出界始重若舍物別主離本處即重異邑上亦同此例若依此文但離處即結不論主物同異第二有無離處明離處此中多句一文書成如非法斷類見論第九若𦘕地作字初𦘕一頭蘭𦘕兩頭重二言教立如偷夏唱大見論十七若比丘實一臘妄言二臘依二臘次受利養計錢犯重一切言詞辨說等皆同三移標相下文時有比丘分地盜心移他地相彼疑佛言移標相若直五錢夷見論若有二標舉一蘭舉二夷若有三標一吉二蘭三夷若有眾多標前者並吉後第二蘭末後者夷四墮籌謂分物及付受下文時有比丘盜心倒易他分物籌彼疑佛言舉籌便波羅夷五轉齒謂賭物人轉彩或更異門盜他田宅政擊破村燒埋壞色空中吹毳鳥杙斷流及明了所明內界等類不能具陳次結罪者問諸外財物一切有情共業所感何故盜者唯於財主得罪非餘答婆沙二十一云財主於財攝受守護餘則不爾是故盜者唯於財主得罪非餘復次財主於財作己有想盜者於彼作財主想故唯於彼得罪非餘實論第九問曰一切萬物皆共業所生劫盜何故得罪答雖從共業因生因有強弱若人業因緣強又勤加功此物則屬次乘上盜物主物同異准上所明盜取乘體四足舉遍重言從道至道等者但是取者方便之心非謂要至非道等方犯如觀軍之類盜擔亦然次空處者謂空中所有屬主之物見論第九空中鳥等若捉牽尾離頭處重傍牽左翅過右翅亦重上下亦然次上處者謂在樹㰚杙等次破村體機開等者是破村之計若以此計破村損財皆成盜罪蘭若者村外空地此文不定近遠五分聚落外盡一箭道有慚媿又所便利處次船者僧祇第三云順牽尾過頭處倒牽頭過尾處若右邊傍牽左過右者夷左邊傍牽亦爾車亦如是次盜水中物十誦云水中浮物來下比丘取直五錢夷若捉留住後水到前夷若沉著水底若舉離水俱夷復次有主池中諸有主比丘以偷奪心取是諸鳥夷若沉著水底蘭若舉離水夷復有無主池中諸有主鳥比丘偷奪心取夷若沉著水底夷若舉離水亦夷次不輸稅者僧祇第三云世尊弟子比丘比丘尼不應輸稅若賣買者應輸稅既白衣應輸稅若有應稅物而比丘為隱得免者重准文比丘無輸稅法若有非理稅者方便得脫無罪若此有罪不與賊物亦應是犯次園及物同異如上次二足眾生者十誦六十有賊捉弟子將去和上還奪取生疑白佛佛言若決定屬賊得重若未決定無罪闍梨亦爾又賊捉一比丘將去還自奪身走來生疑白佛佛言自偷盜身無罪次同則業或是私心隱藏或公強不與滿五皆重次共要者劫偷得物契要共分盜心隱藏滿五者重此中有二罪一以盜物故財主邊得一重二以隱物不與共要人故復犯一重伺候者伺其處所通塞之狀守者守護此物外更經求看者慮有發覺恐事不成次解重輕於中文三一自作二教他三境想初自作業舉上自手取以明輕重二教人業舉上遣取看取明其輕重三境想者舉上物中三三句以明輕重盜心傍通理該餘位自作位三一求過五二求正五三求減五此三各四合十二句前四句中初句是尅下三通二初句可知第二句尅之與漫俱一夷罪問尅求過五今但得五不得過五如何無犯答雖復尅求過五以具三同得將過五方便成五方錢重第三句若本漫心今得減五為𨷂重物但得一蘭若本尅心求過五錢今取減五結二蘭罪一取減五究竟偷蘭二𨷂過五方便蘭罪問所以此句不相成耶答過五減五雖同一主以𨷂下二故不相成不同前句三義具足第四不得方便一蘭第二四句第二是尅餘通二心釋同前位第三四句第三句尅作通二心問本求減五今得過五不得減五應是吉羅如何此中明夷隱吉答先取減五方便吉羅後取過五方便偷蘭覽輕成重因果相順故得夷外無別有吉若爾前求過五得減五錢亦是重輕位別何以即結二罪答前以先心取重因以結蘭後取減五方便但吉先重後輕因果顛倒不類此故不得相成又解不得減五別結吉羅所以知者以本期心但取減五今見過五理應事止事既不止心更別生心以別生心定有方便不取減五方便成過五重次句同前餘二可解次教人有十六句前十二句但教人為異句不異前唯求減五四句之中前前二句能教局尅故犯偷蘭所通二心一向夷罪問教求減五得五過五望能教人不得減五此應結吉何以亦蘭答以五過五含其減五第三俱尅第四俱通次下四句料簡教人能所差別此唯對前八句以簡以言教人求五過五不言減五又以減五能所前已別故此四句中前之二句料簡重輕次下二句料簡犯不犯初重輕者前八之中物數增減能所同犯今此數同但物體異謂青黃等或物體同而取處異未知此二同上犯不答不同上文謂此所重能輕如文說者是次下二句體處雖同而能所以異未知此亦同前犯不亦亦不同前如文說者是若定尅漫前二下一能教局尅所通尅漫第三能通二心所尅無罪第三境想兩重前對重物後約輕物此之兩重皆約犯不犯境成以本迷齊各四句若對上數境想合有三重但以五及過五咸是重位故作兩重攝法斯盡問所以不對重物重物想作境想耶解文言有主有主想五過五錢明已含說次不犯中與想取者謂無盜心反前不與己有想翻前非己有番掃想取含反主物三三句蹔取反前不蹔取親友反前非親友次明煞戒約類總明四門分別一約人趣二明父母三煞羅漢四出佛血先解初人謂非恩養及以福田此中開四先明制意通制如前言別意者人者報踰下趣蘊義懷仁智越上天厭增修勝又以我執心固愛壽命於遐齡怨結情強遞相讎於累劫既而形披忍服誠令懷悲如何不順所宜翻行煞戮故失掘經言一切畏杖痛莫不愛壽命取已可為譬勿煞勿行杖以斯義故立制防之次釋名者舊解不然今解息風名生依身心轉隔斷不續名為煞生人名別於蘊上建立或復生者即是命根謂以惡心隔斷他命乃至一念應生不生故僧祇第四云人者有命人趣所攝奪命者令彼命根不相續四大分散是名奪命此文復云人者從初識至後識而斷其命此是戒之所防戒是能防能所通舉故名煞生三解具緣別緣有五一者是人簡餘輕故二作人想想疑亦輕三有煞心無心不犯四興加行若無加行境不可壞第五加行雖興命若未斷所規未成思心不暢故須斷命第四𨷂緣言𨷂別者若𨷂初緣八句蘭罪𨷂境雙𨷂各有四蘭舊立境差四境來替至此𨷂中不論同趣此是義途疎略前後相違今解同趣無差加天為四且闕境四者一本欲煞人天來替處緣天作人想二非人人想三畜生人想四杌作人想次雙闕四者一本欲煞人天來替處名為闕境於上復生疑心為天為人即是闕心此由境心俱𨷂名為雙𨷂二本意煞張非人來替復生疑心同前二𨷂三畜生疑四杌木疑問境心二緣各依緣𨷂別闕理盡何須辨雙答對異起疑不同𨷂初疑當異境復異第二以此不同更明雙𨷂問雖有斯別莫不𨷂二𨷂二義齊何須更辨答若不出者人情意謂疑當於異境不成人方便為成人家方便故須更明問所以辨雙是疑非想答想由一向不得成雙如人非人想不𨷂境非人人想不少心疑中非本期故𨷂境猶豫故𨷂心此以俱𨷂得名為雙此之雙𨷂寄在初緣故單雙𨵉各四成八次𨷂第二想疑各四轉想文一義含有四一人作天想二人作非人想若本迷人作非人想煞人無罪非人有吉今文結蘭者為本煞人臨至境所轉作非人由此轉想不暢前思令前偷蘭住在因位舉後轉想結前心蘭故言人非人想蘭如三羯磨捨者三蘭捨是善心豈容有罪但由舉後捨心結前方便故言捨者三蘭此亦如是問人作非人想𨷂心故結前心蘭者非人作人想𨷂境故結前心吉答𨷂境之中本意煞人人想煞心恒在本境但為非人境差令前業𨷂即是煞人方便前生非人之境後起猶是舉後結前偷蘭比於轉想本異兩殊不得見想名同抑令齊一三作畜生想四作杌木想次疑𨷂決正義亦含四一為人為天二為人為非人三為人為畜生四為人為杌木次𨷂第三全是無罪謂落開緣故不制犯或可容得提吉謂打道俗二眾𨷂四無罪不制單心或獲吉羅以未發業𨷂五便獲輕重二蘭此等通別具七方便人趣既爾餘三類然但輕重殊不能繁具次煞父母是恩養非福田先明別意言父母者身生之本加以庭訓義深養育恩重誠宜候志起居七旬已寐承顏侍覲五恭匪𮓪何期孝悌無思翻懷逆慮煞父害母何惡能過但以人命不殊同結夷罪違恩背義復得逆名故五分二十云告諸比丘若人百年之中右肩擔父左肩擔母於上大小便利極世珍奇衣食供養猶不能報須臾之恩從今聽諸比丘盡心盡形供養父母若不供養得重罪又增一經云供養父母功德果報與一生補處菩薩一等益福既多損罪彌重以斯義故制不聽為釋名可解次解具緣別緣有五一人父母二父母想三煞心四興加行五斷命第一緣人父母者簡異非畜或若非畜自煞父母及人父母亦不犯逆唯有人類煞人父母然於人中除去北洲扇𢮎半擇無形二形此等並無律不律儀由於染淨二中無增上用所以者何彼身法爾志力微劣不能作律儀不律儀器又解彼等皆由根不具故父母於子愛戀心少彼於父母亦復不起殷重慚媿又是生身父母養母不成諸所作事應諮養母次第二緣要須母作母想故婆沙一百一十九云若於非母作母想害及於母作非母想害俱不成逆於父及餘應知亦爾若本漫心雖作餘想由心無簡亦成逆罪次第三緣須有煞心若作打心或復誤煞皆不成逆如子執杖擊父身蚥母隱在牀謂餘而煞第四不起加行亦無無間如人扶持父母經過嶮路恐有賊來逼令前進父母顛仆即便喪命以無加行不成煞罪次第五緣加行究竟滿足成逆故俱舍十八云若於父母起煞加行誤煞餘人無無間罪於非父母起煞加行誤煞父母亦不成逆但使加行究竟成滿設形改轉亦成逆罪以依止一故由如是義故有問言頗有女人非母非羅漢煞成逆耶答有謂父轉根為女頗有男子非父非羅漢害成逆耶答有謂母轉根為男爾者若但打時亦得打父母罪不答曰不得爾者煞亦不應得成逆罪答打本就位不據恩養如打現父結同餘俗何況轉根不就位別次𨷂別緣准同人位然此餘人望父無逆亦應得作心境差句但以餘人單唯𨷂理不𨷂教名故不辨也次煞羅漢是福田非恩養言阿羅漢者道契無生證六通而自在騰暉有頂作九地之津梁既聖既尊是歸是救能利能益可敬可崇何容縱彼愚情損傷勝境恣其頑意煞害德田但以人同夷罪道滿逆𠎝過狀不輕雙標理教次釋名者煞義如前言羅漢者婆沙三十二云羅漢名應阿之言不於諸界趣不應流轉故名不應又云羅漢名賊亦名為怨阿之言無無煩惱怨賊故名阿羅漢又九十四云應受世間勝供養故次具五緣一是阿羅漢以彼身中具諸勝德壞德所依故成逆罪問煞餘學人如何非逆答由田不滿不成逆𠎝故婆沙一百一十九云前說無間由二緣得一背恩養二壞德田害諸有學非壞德田以彼身有功德亦有過失有妙行亦有惡行有善根亦有不善根復何因緣辟支非逆解凡成逆罪須具六緣一藉教進修二觀智猛利三曾修學道四能現神通五善能說法六得益深廣具斯六義利益處寬福田是勝故得逆罪其辟支佛但能現通田不滿足故不成逆故涅槃十七云緣覺之人修寂滅法志樂獨處著化眾生但能現通終日點然無所宣說二阿羅漢想謂作餘想不成逆罪故俱舍問云將死方得阿羅漢果能煞彼者得逆罪不答無於無學身無煞加行若本漫心雖不了知是阿羅漢亦成逆罪故俱舍云彼於依止起定煞心無簡別故亦成逆罪三煞心四加行五斷命𨷂緣同上次出佛血佛者道過三界智邁十方為六趣之舟航作四生之導首信無倫而獨秀諒勝境而孤標誠宜勵己亡身虔心供養何期不思厚德反念傷殘情過不輕是故聖制但以命不可斷結以蘭名出血業深故加逆稱釋名可解問世尊身有諸無學法說名為佛此不可害云何惡心出血得無間罪答婆沙一百一十九世支說云以於能成大菩提法起惡意樂欲毀壞故雖害生身於彼得逆復次佛無學法依生身轉若壞所依能依亦壞如破瓶失乳是以得無間問如起惡心出佛身血得無間罪頗有起煞心不至出血亦得無間罪耶答有應作四句有起惡心出佛身血不得無間罪謂起打心令出身血有起惡心不至出血得無間罪謂起煞心乃至令血移處有起惡心出佛身血亦得無間罪謂起煞心令出身血有起惡心不至出血不得無間罪謂起打心令血移處問未知出血偷蘭是最初不為是究竟為是方便答此是第二不是最初以此起在煞人或戒後爾者煞佛有逆餘人無逆既是逆非逆異如何無初答逆是違理不由佛制不可約此以辨最初論其違教煞戒已興此既後起故是第二若以逆故即別立初如餘三煞亦應有初餘既不然此如何有又此出血是方便非究竟以望本心欲斷佛命今但出血不暢本思故俱舍云一是煞生業道加行具緣還五一是佛二佛想三煞心四加行五血移處移已攝出若不舉此收義不周問血移成逆心通尅漫以不答若本漫心不簡彼此對佛雖可不知是佛但使出血血移皆成逆罪若本尅心不欲害佛知方成逆不知無逆次𨷂緣者若𨷂初二同前人位若𨷂煞心合得提罪𨷂四無罪或獲吉羅𨷂五血不移處無逆蘭本規斷命未斷故蘭次下釋文科同於上今就漏起呵中文二初明其犯第二時諸居士下發覺呵責前文有三初如來住處第二無數方便下人緣合辨第三彼即受下正明相煞人緣文二初明遠緣第二諸比丘在婆求河邊下近緣遠中文四一說藥勸修第二諸比丘下念說為己第三時諸比丘下順教修成第四便求刀下習成厭報先解初文說不淨行者彰過歎不淨行者讚行歎思惟者勸修所以說不淨者凡是證入初基皆以五停導引然五停觀非遍修行於中要者唯有二門謂不淨觀及持息念此二觀門亦隨行增非要具修能入聖道謂觀行人總有二類一者貪增修不淨觀二者尋增修持息念此中世尊接二類生說二觀門令其趣入先教不淨正為治貪然貪差別略論有四一顯色貪緣青瘀等二形色貪緣被食等三妙觸貪緣蟲胆等四供奉貪緣尸不動等此貪雖四骨𤨏能除以骨𤨏中無四貪境故教比丘修骨瑣觀即能除彼四貪不生其作觀法總有三位一初業位二已熟修位三起超作意位謂觀行者欲修觀時應先繫心於自身中或於足指或額及餘隨所樂處心得住已於自身分假想思惟皮肉爛墮漸令骨淨乃至具觀全身骨瑣見一具已復觀第二如是漸次廣至一房一寺一園一村一國乃至遍地以海為邊於其中間骨𤨏充滿為令勝解得增長故於所廣事漸略而觀乃至唯觀一具骨𤨏至此漸略不淨觀成名觀行人初習業位復於一具先除足骨思惟餘骨繫心而住漸次乃至除頭半骨思惟半骨繫心而住齊此轉略不淨觀成名觀行人已熟修位又除半骨繫心眉間專注一緣湛然而住齊此極略不淨觀成名觀行人超作意位若作骨觀釋此文者非直即與此文相應亦復不乖入道次第若取智度論中五種不淨釋者非直不應趣入之門亦與一切聖教相害諸師不知旨趣直見不淨名同便引來解遂成大好以此即是念處位收如何至後文中却修持息又多論第三云所以習不淨觀先在面上者修此觀法為除貪欲心以欲心生要從面起故先觀面若作種子等不淨觀者所以要從面起又涅槃經第二十五云貪欲病者教觀骨相次諸比丘點念大聖為己宣說應可修行次依修尅獲於中有法喻合法中時諸比丘舉能習觀人即無數下方便習觀從定覺已觀成厭報喻合二文亦三如上次觀成厭報此謂愚人厭報不除其病智人除病而不厭報次明近緣文對能煞之人序列所煞求意為彰過非一切獨舉婆求河邊其文有四第一舉前第二聖為己說第二舉前第三習觀成就第三舉前第四厭報求煞第四舉能煞者言沙門者是性非是出家沙門五分云彌隣旃陀羅見論第十云鹿杖沙門鹿杖是名作沙門形剃髮留少周羅髮著壞色衣依止比丘拾殘自活以作沙門形相故諸比丘呼言大德斷我命來次正相煞文中有四第一受雇行煞第二內心追悔見論云以世間人言河能洗除人罪是故往河洗刀望除罪垢第三天魔勸讚欲令信行在水不陷第四受勸行煞謂為度人其中比丘觀未成者名為未離欲身毛竪等習觀成者厭患身命故曰愛盡身毛不竪次呵有二謂俗及佛所以無比丘呵者情謂為是以觀未成方便修習其已成者方能厭耳佛呵文三第一發學所由第二唯願下請更修法第三爾時下正明呵責發覺文四初小緣集者舊解云以布薩為小因緣四部都會為大因緣復有解云謂除說戒作餘羯磨是小因緣此之二釋咸不應理以文但云小緣不言說戒故知不得以說戒為小緣又羯磨法八年前無佛亦不秉不得為小緣今解但以如常集會問經請法以為小緣故善見云世尊立制半月靜坐知五百比丘死盡從禪定起知而故問欲為說法又五分云從三昧起在露處坐大眾圍繞理實世尊初從定起比丘法應圍繞禮敬為此故云以小因緣不須別更出大因緣第二爾時下見眾減少第三爾時下因前致問第四爾時下時事白佛次改觀文二先明說法方便方便文四初阿難陳請次佛令集眾次奉命集僧後集已白知比丘疑曰我等正欲依前佛教習行不淨恐致前突祇欲不修復是佛說於此未明稱云疑惑請更改方離前灾經體解聖旨故曰永無餘文可解次正說法文中有四第一改觀投機第二念說為己第三順教修習第四觀成獲果此之四文並悉次第反前相煞緣中四句今說息觀令既得道明前不淨不令厭報如何謬執退失道門改意如此初文有二一明說法體二明對機正說法體文三謂法喻合今詳法喻等文但可為二法中二者初舉定體歎其能治第二諸不善下是所滅之尋初體應云阿那阿波那念此云入出息觀以慧為體但以念近於慧故名為念言阿那者謂持息入是引外風令入身義阿波那者謂持息出是引內風令出身義此相圓滿由具六因一數二隨三止四觀五轉六淨數謂繫心緣入出息不作加行放捨身心唯念憶持入出息數從一至十不增不減所以爾者恐心於境有聚散故然於此中容有三失一數減失於二謂一二數增失於一謂二三雜亂失於入謂出於出謂入又可數無次第亦名亂遙離此三失名為正數若十中間心散亂者復應從一次第數之終而復始乃至得定此出入息應先數入以生息入死時出故隨謂繫心緣入出息不作加行隨息而行念息入時從外入內謂從口鼻流至咽喉復從咽喉流至心胸復從心胸流至䐡輪如是展轉乃至足指念恒隨逐復念於息從內出外半麻一麻半麥一麥半指節一指節半指一指半搩手一搩手半肘一肘半尋一尋乃至廣說隨根勢力息去近遠念恒隨逐餘止等可解次喻有二一秋天喻二大雨喻二喻之中准法各有能所不同舊來長分為四合喻可解次對機說下之三文可知次呵責改觀除疑時遙事隔更須集眾呵所不應問世尊說不淨觀已知比丘厭報如何今乃自呵責耶答世尊雖知比丘厭報此觀即是入道初基何不依之進求而反厭其現報此厭現報不除餘集因因既未除苦果還起此則壅本剪條更增茂非行道人故須呵責又解佛既呵責明前厭非即令比丘倣習心斷問此中能行煞者本非比丘所煞已死不可呵責其未死人復無情過未知何人是合呵者答已死雖不可呵現者亦曾相讚即呵此之相讚煞者又解此諸比丘住果證者即是前習不淨觀人此既修進得增上法明前不淨本意亦然云何謬執不能趣證乃相讚歎厭報求煞次釋戒本六句一人二故自手斷謂身作業三人者謂所煞境四持刀與人古舊斷云是安煞具煞此釋不然其安煞具自別立章解釋不開此中持刀言事又彼此文語意各異豈以持刀名同遂則指此是彼是故今解此牒緣中持刀讚勸讚勸受法用刀自害作如是下結前讚勸五結六擯次下廣釋五六二句略而不解解前四中文分為二初明成犯相二天子下輕重相前中初三別釋二四合解別中初識者謂初結生一念生有後識者謂後一念正住死有中間識壽命根相依息起不絕名之為生此等無形不可說害但壞所依能依息斷息起不續名為煞生自下合解二四兩句文分為二先立章本後依章解准其解中有二十章加一遣使歎死舊人觀文不審乃云加一遣使書者不然既准釋中有其二十明知章中𨷂一不足此二十章中八是自作業謂自煞身口俱及坑陷倚發與藥安具先解初章業雖自作心通尅漫隨稱本期皆成究竟十誦第二云若不即死後因是死亦夷後不因是死蘭問為所煞者住死有時能成業道為復不爾答要所煞者住死有後能煞之者業道方成故俱舍云俱死及前死不成根本業次教人者若本尅心教害張命所教事成能所俱重若教害張所斷王命所教得夷能教不重或教煞坐乃害立人如是長短赤白去來今明日等類同此釋若漫心教一切同重下諸教人皆同此判遣使往來可解重使煞者最初能教及後斷命此二獲重餘者並蘭展轉使者一切成重以皆相望成能所故次下四求皆是教人異相次現三相如文次遣使歎煞若為此人讚煞餘人領解用法而死讚者無犯若本為二人隨死皆重勸典形人亦同犯重遣書者欲煞彼人作死書送然使得書自向親說使者得重作者無犯望欲煞者不死獲蘭次遣使書者自不親對遣人作書令彼所取依書死重造坑陷者審知怨家所行道處而安坑穽墮死者夷次倚發府越反謂是機發說文射發也或作撥者非義廣雅撥者除也亦也審知彼來定倚之處讚施煞具密害前人與藥可知安煞具者或如有人怖畏事逼或遇長病不能忍苦此等並皆自厭身命知已方便與他刀等次若作如是比下收前不盡但以煞相眾多非如上列更施餘法死者皆夷為欲遮防惡人矯計一言總息異類犯門此則天網滔滔犯而無漏聖刑蕩蕩毀者云遺故云若作如是比等次明輕重文二一約異趣畜能變形謂是本性傳說老猪狗等亦能變形煞此等類不得蘭罪知解人語亦非調習自性解者入此犯門十誦波離問若比丘以呪術變身作畜生形奪人命得波羅夷不答自憶念我是比丘得夷不憶偷蘭次明境想境想五句一具四關又可相對為四初句境心俱重次二境重心輕次一境輕心重次一俱輕又可下四束成三位人非人想疑心差境方便次一境差心方便次一心境俱差成方便問何故本境之上疑先想後異境之中想先疑後答皆約先重後輕故爾又解想是穴徹法須前明故本異中乘言便次解此境想六門分別第一須境想意第二釋境想名第三汎明境界第四辨戒有無第五就有之中定其多少第六又就有中定迷及想初門業不自成要由心境境有優劣是非心有濃淡謬妄或若心境相應犯齊一品或若差互業有重輕如人非人相等心不當境非人人想等境不當心或境犯心不犯如有主無主想等或心犯境不犯如無主有主想等有斯犯等四句差別故須境想階業重輕欲使僧尼善知犯相既識相已息過不為第二釋名境謂是前所趣之境想者是能成犯者心心緣前境或了或迷取像決定名為境想問於境之上起想起疑所以但言境想不言境疑答想於境定標以想名疑以不定故不彰也又解人作人想得究竟罪從初立名名為境想境疑不然故不彰耳第三門境界境界有六一約心為境如觀許想及染心衣食二以內報為境或四趣齊犯謂如婬戒或各昇降如盜煞等又就人中道俗分別俗如販賣食家寶等道如謗打譏摶疑等又道俗通者謂觸媒二宿同路兩麤又就道中小大差別大即謗打小謂減年大中復有形報不同隨順提罪局是比丘作衣讚食事專尼眾三者外事為境如掘壞非殘不滔足等或通內外者盜奪虫水等第四約法法有其四一自所稱佉如二麤媒嫁毀呰妄等二他所作法如處分異語學家諫等三進修學法如學三藏諷誦戒等四邪正理法如十八法法非法等第五約時如日暮非時洗浴宿等第六罪者謗覆說類第四門有無者僧五犯中合二十六戒有境想謂初四戒第二犯六摩觸二麤兩房媒嫁三十迴僧九十十五說麤掘壞兩足非殘讚暮不滔二蟲覆發對有三十五二房七重盜麤媒壞各有其兩尼之五犯十八戒有於前僧犯二十六中除去十箇不同犯戒謂婬及觸二麤兩房日暮讚食自足勸他餘十六戒與尼同有與僧不同復有二戒如摩觸五句染心四句對有二十一謂盜媒壞同上二重次言無者諸餘戒中無境想者或可略無或可理無然以略理二義通前六對明者初約心略無者如解及滅疑惱指授背請後悔觸八染等餘盡理無不對心故次內報者如漏失境假情非情不得攝在內報中收然於內報或略無者如謗打兩舌毀呰嫌罵餘即理無不對情故外事無者如屏露二敷脫脚者覆露地然火藏衣鉢等餘即理無不對事故法略無者如大小妄諫隨舉等餘即理無不對法故時略無者如洗浴過限二入聚落餘即理無不對時故罪略無者如尼覆戒餘盡理無不對罪故第五多少者然境想文所以或四五者但由第三人非人想此一不定故或四五所以爾者舊解重輕之中位有其三若轉想定五迷或四五六何或四五若想對二趣犯境起迷以吉罪故為斯具五想對無情一切無犯是以但四如似覆說類則亦爾若對下三輕重應五然落開通此是全謂非罪而覆說者無犯故然是以本迷或四五若准此義犯不犯位亦有其三如上重輕應本定五進就不犯故即成或四五者今犯不犯如盜戒中是或四五今退就犯中對非畜二物作想轉迷俱五亦成三位此即二對理齊文中綺說謂煞等就重輕盜約犯不犯故有多少又復此謂犯中有輕重如前所論若處分掘地非時勸足犯中無量輕但有或四五餘准可知又可此等通本異二鏡故言定五及或四五若據本境四即齊四謂本迷故五則俱五謂轉想故但文互說用斯犯等隨據境想可以准知此解不然若言想對二趣犯境起迷以吉羅罪故為斯具五者如似始終迷人作非人想煞人無罪非人有吉此吉乃是異趣上吉何關境想第三句事此第三句是本境轉想即想差方便又盜䨱說與煞類同煞中亦有非畜為重輕門亦有非情為犯不犯門何須先約重輕作三位已次約犯不犯門更作三位又云若據本境四則齊四謂本迷故五則俱五謂轉想故此亦不然然此境想若四若五皆悉通對本異兩說如何乃言若據本境本境但有二三豈有四五又於異境本迷吉者何預境想四五階須而欲通其本異作或四五又於本境迷既齊四如何後有迷或五言故今正解一切境想無問重輕及犯不犯總為兩位轉想即五本迷但四所以爾者轉想為結前心方便以結方便故成五句本迷為無前心方便異罪非宗故但四句此謂轉想本迷共成或四五而無定有第三以成五句第六迷想者如婬媒煞妄二觸麤兩此約重輕犯境除婬轉想為五若據本迷除婬應四然諸戒中無此迷四如犯不犯位中媒嫁法想二房掘壞日暮非滔除滔轉想為五麤語法想迴僧二蟲讚食兩足殘宿不受發起染心本迷故四然盜覆說若對天等三趣物上及下三犯輕罪境上即是重輕門若對無主非罪境者即是犯不犯門為此盜戒且約犯不犯門本迷故四覆說落在開通位者亦約迷作非罪覆說又可迷重為輕得吉罪者此非本境轉想方便還同非畜上吉異罪非宗故落開位非第三句開中皆開煞心不犯妄稱得過人法戒於中有二第一總解第二別明總解四門一列妄語多少二定能妄語人三釋所稱之法四明鏡心虗實初門依下增四有四妄語謂夷殘提吉若取誑非天變畜及餘𨷂緣亦有蘭妄足前成五此言夷等妄者謂舉所得之罪以標夷等非將夷等罪名以誑前境名夷等妄然此五妄夷殘逸提同誑人境但以所稱事殊故三階降蘭吉二罪通誑四趣以其所稱及境別故次能妄人者是凡非聖然凡雖有事中實語以非理解不能斷妄違想背心還成妄語又亦得有緣事實想由非理解違成妄𠎝聖人證理永絕虗心稱實而談必無妄過然由證理想實非虗故於定前聞為入水謂是定內向比丘說諸比丘言何有入定慧定聞為王入水聲目連虗稱得上人法以事白佛佛言有是定不清淨目連不犯此依方便想言不成妄語問前之三戒不定犯人如何此戒獨明犯者答前之三戒是凡不疑此稱聖法故須辨定又以目連語濫亦須簡定次所稱法位約為三夷妄所稱謂是過人以於此法實未交證情希名利假偷在己損重過深故得夷罪殘提所稱乃是凡法謂無三根橫搆虗狀重事謗他欲令擯罸惱他一生故得殘罪或以殘謗治罸輕微或遣見聞背想而說此等並結波逸提罪次蘭吉所稱通過非過謂大妄下蘭及誑非天變化畜生並悉同以過人法誑二謗下蘭便是凡法吉羅通二義准應知次境心者位約為三夷妄一種心境俱虗殘提二妄唯取心虗蘭吉二妄義同上二所以夷妄須俱虗者以若境實即無心虗為實得者永絕虗妄若其境虗心實增上慢人復是不犯若也心境俱實不犯此戒以此故取俱虗成犯言境虗者謂不得聖心虗者知不得聖殘提二妄境唯是事無問境之虗實唯取心虗對此須以四句辨定沓婆俱虗彼人不清淨者境實心虗此二是犯有想不妄心不得出者此是境虗心實不成謗犯若實有三根即境心俱實便成舉罪不成謗𠎝殘謗得提義亦同此次蘭吉妄所稱通二若過人法誑同夷俱虗若凡法誑同於殘提唯取心虗次下別解大妄先別意者聖道幽玄凡非所會至理沖邈愚不能知以不會知希求名利假偷在己惑亂群心醫法𧦘時過中之極為斯損故立制防之次釋名者言不稱實所以名妄妄說勝法超過凡境故曰過人此是所防戒是能防能所通舉故曰過人法戒又大妄語者聖法超凡名之為大虗偷屬己稱之為妄陳彰在口故名為語故云大妄語戒爾者若稱聖法始成犯者如不淨觀阿那波那三昧是近小法何以多論名過人法論解云此是甘露初門一切聖人莫不由之天龍等來供養者亦是稱他聖人感者多云自現內有勝法能咸諸天龍神又自顯斷恐怖故龍神來至我所我無恐懼次解別緣別緣有九一對人境二作人想三境虗四知境虗五說過人法六作過人法想七言已證八言辨了九前境知次𨷂緣別若𨷂初二各八蘭罪闕第三緣境若實者或有提吉或全無犯𨷂第四緣不知境虗是增上慢無犯𨷂第五緣非過人法作單雙𨷂各一蘭罪𨷂第六緣作不過想疑亦各一蘭𨷂七不言己證歎餘實者無罪或可得蘭更相粜賣𨷂八不了了輕蘭𨷂九重蘭是中具七方便次下釋文科同於上然漏呵中文分為二初明其犯第二諸餘比丘下發覺呵責前文有三初如來住處第二時世穀貴下明妄緣起第三婆求河邊下正明其犯犯緣有二一遠二近遠緣文六一明穀貴分眾之緣二時世尊下勑令集眾三阿難下奉教令集四眾僧集下集已白知五爾時世尊下告眾隨緣六時諸比丘下如教分散次近緣文二一點念設計二尋即念下正明設計次犯文四一自言己得二兼道他證三獲以名利四受資得益次呵文二初明發覺所由二佛告下明其呵責發覺復二初實語禮覲以明發覺文三可知二妄語致虔正彰發覺於中文四初直禮覲下三各一問答然第四文因言撿問正彰得實問此中豈有實者答云或實不實解僧祇第四佛問汝所讚歎為實爾不世尊我所讚歎三寶及尊者舍利弗等是實自讚嘆不實佛言此是惡事云何為身利養不實空自讚歎寧敢灰炭吞食糞土利刀破腹不以虗妄稱過人法而得供養次明呵責呵責文三初以實況虗呵出家理應藏名隱德縱使是實亦不應說況復是虗而向人說第二以輕況重呵於中文四一總舉數並是虗情竊利咸稱為賊第二列名一內實破戒無惡不造第二為口腹故虗稱上法第三是中下挍量雖復咸稱為賊是前二中為口腹者大於初賊第四何以故下釋何以初小後大故謂為口腹實無所知虗偷上法盜受他食損重過深聖制夷罪此罪大初故云最上大賊亦可前非上法後是上法所謀法大名為大賊第三結呵此中略無汝所為非等次明戒本文三一者略立第二隨開隨開文五一舉昔虗今實生疑之境但為聖法超凡名為增上然此比丘於增上法未得謂得名之為慢十誦第二云有空閑處諸比丘住其中因別相觀定故貪欲嗔恚不起便作是念我已得道所作已辦到佛所亦作是說後近聚落僧坊中住數見女人故貪欲嗔恚便起以此為緣故除增上慢第二彼作念下覩境生疑佛說尸羅不淨定慧不行准我境虗違於聖教正應是犯不應得道今既得道復似不犯於此犯與不犯情疑未決故曰我當云何三尋語下陳疑伏託若制是犯便即守教甘心若言無違望除情惑進不唯然故曰隨教奉行四為諮申五開不犯第三滿足戒本戒本七句一能犯人二實無所知者未知聖諦心境俱虗三自稱言下虗稱上法四彼於異時下自言首罪五除開緣六七可解舊解自稱文云自稱言等總稱聖法二我已入聖下別舉言入聖者謂得生空知勝法者得法空我知是下得初果已去然此生法空言深違理教今詳廣文自稱分二初自稱言三字是總我得上人法下是別別中復二我得上人法者別明上法此法雖凡得者為上但稱此法亦犯重罪次下三句別明聖法我入無漏聖智位中故云我已入聖智勝法此是見道已去諸無漏位我知是者是無間道知我見是者是解脫道見若云我已入聖知勝法者謂入見道位中能知諦理勝法我知是者知聖見道我見是者見聖諦理此是重述見知據理相似亦可更詳文意自稱言我得上人法一句是總下三是別然依廣文不釋別三就前總中更開為二謂自稱自言兩章別故第四句彼於異時者非前行妄之時是後自首罪時因問有陳稱為若問不問引罪名為不問自言不過有二故總標之間一切諸戒皆有因問自言所以此戒復云不問昔解具二義者須言有自一罪重壞眾須眾治罸如僧尼二覆不同者是二虗實難知以內證法若不自言無由知故具斯兩義故有自言自言眾委治罸義易下謗亦爾自有難知非壞眾如小妄是自有壞眾非難知餘夷殘是非難知非壞眾餘提等是唯此及謗具足二義故有自言此解不然如自恣中亦有不問自言佛本不問行瘂所由謂但問言汝等云何住止安樂不以乞食為苦因耶答言為行瘂法此罪非是壞眾又非難知如何復有不問自言又有舊解云自言有二一因問自言諸戒通有今此戒中有不因問而自言犯以緣有故牒為戒本如增上慢大妄即有實得道同此彼遂文無除夢亦爾若爾不問可爾所以復言若問者相對故斷今詳此解亦恐不然有何所以須舉若問相對觀其戒本文句並是望前緣說不得直云相對故來今解前緣但是不問自言不問自言既成發覺制戒若問自言亦成制戒據緣不過此二故總標之又解若問不問二言兼之方可得盡緣起中事所以知者謂佛問言汝等以何方便不以飲食為苦由佛問此稱為苦門佛無不問妄語之事比丘自首稱為不問又解不問者是發覺文謂但問言云何不以飲食為苦不問妄語之事若問是佛問文問云汝等虗實答言或實不實作此釋文希無乖失此戒既爾謗戒亦然次下廣釋戒本七句但解三不釋下四釋中文二初正釋相二如是虗下明輕重相前中解初可知不知不見者反解第二句自稱者下釋第三句此中有二初解三字總句第二一法下釋別四句亦可初略釋第三句第二自言下廣釋第三句略中文三初釋自稱信者謂是理解之信戒謂性戒成就永不作惡施謂依正兩報不生少厷聞慧依教習成智慧者謂無漏智慧辨才者謂無礙辨才第二釋人法謂成人之法即陰界入第三釋上人法總談勝法故名為諸能破有因名為出要由獲此故稱云成就自下廣文廣文分二初立十四章次依章解解中例三謂舉釋結且初釋中舊人分三初發生空解二修習下發法空解三守護下發無相真解尋此妄情轉違理教豈有身念位中已得二空無相夫人空者聲聞所得法空觀門菩薩位有如何忽以此言配文解釋此違入道次第亦乖經論宗徒此尋舊疏數本皆然如是重抄獲何福利唯顯造者不善宗文復益學人妄傳無義故今改蹤聊申正解依前重寫恐轉成非冀諸智人思文察義希通大化不益無知然此諸文總釋觀之功能差別不須別作三文分齊故今解釋分之為四第一舉定顯勝第二狎習下勸使修習第三守護下防令離過第四已得下歎得自在初言有念者謂身念處觀能令人出離者歎此觀能除淨顛倒漸能趣入後勝善根乃至見道離垢超昇皆由此門稱云出離次勸修者數繫在心名為狎習漸增近理稱云親附此法之言通其二位亦可連為一句習觀踰明名為增廣修令成熟如調伏乘次離過者在凡習妄日久於觀恐為緣𮓪故云守護觀察觀成體解無減無增名為善得平等次歎得者觀起隨心尅用屬己故云已得決定習觀既成無緣能礙故曰無復艱難永袪淨想縱任隨心故云而得自在正憶念者餘三念處得戒者得無漏戒有欲者四如意足不放逸者四正斷精進者是覺分數廣文同前故云如上定者有覺有觀謂是初定及未至無覺有觀唯中間定無覺無觀二定已上三解脫門梵云三摩地此云等持三昧者不正空三摩地與苦下二行相應謂空非我若與滅下四行相應是無相三摩地若與苦下二行相應謂非常苦及集道下各四行相應名無願三摩地次明八正受正受者通是定名梵云奢摩他此云止止者是定文言正受譯者謬矣八中前二初想正受謂一切有心定對除色中亂第二無想正受者謂二無心定對除心亂故次四正受是八解脫其八者何一內有色想觀外色解脫二內無色想觀外色解脫三淨解脫身作證具足住四空無邊處五識無邊處六無所有處七非想非非想處八滅受想定解脫然初解脫以於內身有色想貪為除想貪觀外不淨青瘀等色除內貪故以內色難除故須偏說第二解脫此於內身雖已除貪為堅牢故觀外不淨第三解脫前觀不淨其心沉慼為筞發心故須觀淨或試煩惱前觀不淨令貪不生未足為難觀淨不生始為難也顯觀轉勝故次觀淨令貪不生名解脫彼觀行者身中證得名身作證具足圓滿得住此定名具足住餘相可解今此四中隨法者是滅定次心想者四無色定次除色者前二解脫次不除色者是淨解脫次除入正受者謂八除入今云八勝處即分前三解脫以為此八初二各二第三為四一內有色想觀外色少二內有色想觀外色多三內無色想觀外色少四內無色想觀外色多內無色想觀外青黃赤白為四足前成八八中初二如初解脫次二如第二解脫後四如第三解脫問此八勝處何殊三解脫答前修解脫唯能弃背彼貪不起不能制境後修勝處能制所緣隨所樂觀惑終不起能制伏境故名勝處次一切入正受者是十一切入今云十遍處謂遍觀察地水火風青黃赤白及空與識二無邊處於一切處周遍觀察無有間隙故名遍處十中前八如淨解脫後二如空識應知此中修觀行者從諸解脫入諸勝處從諸勝處入諸遍處以後後起勝前前故次十一支道者舊皆取成實論十一定具或依舍利弗毗曇取十一種集數法門此等並非今解謂是逆觀十二緣起以老死支由生故有乃至行支由無明有不應復責最初無明以誰為因故但十一故婆沙一百一十云解若法有支所攝似有支為因是有支果者此中說之無明雖亦有支所攝而不以有支為因亦非有支果故此不說此解順理不違法相往招不識此文錯作異釋次修者五分法身婆沙三十三云無學身語業名無學戒蘊無學三摩地名定蘊無學正見智名慧蘊盡無生智無學正見智相應勝解名解脫蘊即盡無生智名解脫智見蘊智中有四智見中具四諦智若復下是天眼通亦是死生智證明餘文可知此等法門略申名相至於廣解論經所明且如經論諸師豈知戒篇輕重彼雖守分自明此已略侵他學律部行護持犯為心縱使具明於宗未要但分輕重犯不差殊接引初基令行成就次輕重文三初約人趣文二可知第二諸天下異趣輕重若人實得道下通明異類第三境想略無法想開文夢者即是除夢諸口業戒多有此開問戒本文中說四事已稱云不得與諸比丘共住如前等有何義耶答此中文二前結初犯後釋再違結初意者以未犯前戒即全具得與比丘和合共住今既犯己義同死人不預昔來共住之限故云不得共住如前後亦爾者釋重犯疑人疑初犯既類死人後更再違應非有罪故釋此疑云後亦爾又五分解云若犯此戒如先白衣時不得與諸比丘共住故云如前重違還犯故後亦爾古師刊祗云學悔人犯重但吉應駈出者此錯引文詳而不審其文二十六云四波羅夷中若有犯者應駈出十三已下作吉羅悔多論第一云若以貪故煞一人者於一人上三不煞中但犯一不煞戒得波羅夷似罪重故譬如穿器不受道水不能得沙門四果故名非沙門初犯一戒已毀破受道器名波羅夷後更煞人得突吉羅罪雖重無波羅夷名以更無道器可破故而此比丘故名破戒比丘不名非比丘也以此義推可一時得無量戒不可一時盡犯也若依婆沙此義不正故婆沙一百一十七云有說彼七支戒亦於一切有情處得而所得是一彼云於一有情犯一支戒即此有情及餘有情此一支戒斷此及餘生六支猶轉此則善通世尊所說若犯學處非苾蒭等有說此七支戒亦於一切有情處得而所得各異如有情數量所得戒亦爾彼云於一有情犯一支戒但此一支戒斷餘六猶轉自餘有情七支恒轉若爾云何通佛所說若犯學處非苾蒭等答依勝義苾蒭言非苾蒭以犯尸羅不能趣彼故有餘師說別解律儀隨因差別有二十一此中亦有二說准上應知依如是理故作是說寧作出家犯諸學處不為五戒鄔波索迦所以者何彼若毀犯五種學處身中便空諸出家人雖犯五處而更有餘眾多猶轉迦濕彌羅國諸論師言雖犯律儀而律儀不斷如法悔除還名持戒無有頓受別捨得故未悔除位具得二名若已悔除但名持戒問若犯第二亦壞眾法何以不言後亦如是答第二非斷頭無故不釋又以初二作法難故故須具舉懺擯儀式下三不然故齊不舉上來初犯竟
