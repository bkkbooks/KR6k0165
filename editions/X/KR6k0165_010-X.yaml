body:
  text: 西太原寺沙門懷素撰次明尼律戒本六文先定同戒最初有無舊解云大僧與尼男女位別何得因此制彼又復望尼漏過未起如何逆制謂二眾犯同皆別有初所以知者如尼初戒與僧同犯下開亦言最初不犯故知別初如斯解時可同犯戒應更別出起過之人呵責制戒但大僧中已明起過若更出者不異於前為離繁文略而不出直列戒本餘二律中告尼眾言二部持者此謂告知同別共學不學非是由此制彼名共以是義故各別有初此釋不然違於理教故今正解但同犯戒無別最初以僧與尼俱是具戒形雖有殊禁持義一但使大僧犯訖因即制尼尼後犯者即是第二豈有結局比丘不通尼眾待後別犯更立最初故五分第十一云佛為比丘制初戒已波羅問云是戒我當云何持為應作一部僧持二部僧持佛言應作二部僧持從今是戒應如是說即立戒本自下同戒問答皆然又十八云諸比丘尼見優波離嗔罵言坐此比丘恒問世尊此戒應作二部僧持一部僧持佛便令作二部僧持由此使我多受困苦十誦四十六爾時佛不在比丘尼僧前結同戒在比丘僧前結同戒已語諸比丘汝等向比丘尼僧說諸比丘遣跋提比丘往語云諸善女佛結同戒我及汝等應共受持是中有長老比丘尼皆言善好偷蘭難陀比丘尼暗嗑不受是中有比丘尼少欲知足乃至白佛佛種種呵責已乃至言若比丘尼暗嗑向比丘者波逸提僧祇三十六愛道白佛言世尊已為諸比丘制四墮重法我等得廣聞不佛言得瞿曇彌若信心善女人欲得五事利益者當盡受持此毗尼等次第為說以此義推明無初也爾者豈可一切同戒皆因比丘先犯而無一戒因尼制僧解但列同戒者悉是比丘先犯比丘犯已因即制尼所以知者以同戒云世尊在某處以此因緣集比丘僧為尼制戒者還是比丘犯制之處若此同戒別有初者即應別舉緣起呵制如何但云以此因緣爾者如何滅年受戒與外道食戒及長鉢等戒尼中別舉緣起解此等犯雖是同以緣異故故尼戒中別舉緣起又解此等諸戒並尼先犯雖尼先犯不得因此制僧以尼行法皆依僧故必無因卑有制尊義故多論第九云若二部同戒必於大僧中結後令大比丘告尼以女人賤當從大僧受故若獨結尼戒就二部中也故此等戒僧後別犯以緣異故而有最初爾者既因比丘先犯以制尼者然尼漏過未生如何逆制解比丘與尼戒體無別但僧犯竟即與尼同非要更須對尼起漏若以人別必未生者如須提起漏非開餘人何得因此遂禁餘者爾者若准此義尼則無初如何尼初戒云最初不犯解此言初者非是尼犯最初以對比丘立制云初不犯今將此制宣示尼眾還是從比丘初犯名為最初不是以尼別犯有初名為最初若以此文即謂尼有初者如何尼中不舉犯人緣起既無人緣明因僧制次解六文於中開二一總二別總中四門第一五犯聚第二七犯聚第三方便第四持犯先解五犯五門分別第一位列五犯第二立五所以第三解通犯名第四釋別夷等第五彰犯次第初門大僧四戒尼八戒為初犯僧十三僧殘尼十七為第二犯僧三十捨墮九十單提合百二十尼三十捨墮一百七十八單提合二百八為第三犯僧四提舍尼八為第四犯僧百眾學及七滅尼但眾學為第五犯問何故具位戒多廣立五犯沙彌戒少唯局吉羅解比丘行滿力分堪行防過使周廣立五犯沙彌不滿力分未堪且就化宜犯唯一品又解比丘五犯託緣以興沙彌不然何以來難爾者沙彌無犯緣制罪唯一品如何諸戒下一一並結𠎝解祇為無犯緣制罪唯一品道分修義同諸戒齊結罪若不爾者具不何殊次立五者但佛制戒准俗而立俗有五刑故施五犯又以藥有五故立有五犯又解但為眾生輪迴五道世尊哀怜為制戒律欲使斷因不受苦報故母經第七云云何名犯能使眾生輪迴三有名為犯義又可世尊善知法相隨化機宜立此五耳次解名義然下律文名五種犯違禁起非名之為犯又名五種制以須禁防稱之為制亦名五犯聚一犯含多名為犯聚然有諸師棄此正文取祇篇名釋者不順正理既取篇名即釋篇云輕重相形故名篇或云偏跛故名篇又云流類均等相似義者說有五階故曰五篇謂其三齊故是均等一名齊二體齊三究竟齊如初篇四戒但名波羅夷輕重義等後都暢思有此相似錄為初篇餘非類者理不得同如是展轉乃至第五類亦同爾故名為篇此但略引不能繁破古師序列疏向一紙斯則枉釋異名費多言從用茲傳授不益學人但知篇者編也編此法義成其一聚此即章品異名豈勞廣釋次解夷等名者梵曰波羅夷此無名譯既無正目相當且從義解故多論第二云波羅夷者名墮不如處如二人共鬪一勝一負比丘受戒欲出生死與四魔共鬪若犯此戒則墮負處名墮不如十誦亦然彼文是罪極惡深重作是罪者即墮不如不名比丘非沙門等或名他勝處以犯戒故魔必得勝故俱舍十五云破苾蒭體害沙門性壞滅墮落立他勝名或從喻故名曰死人故上文言譬如有死屍大海不容受又云譬如斷人頭不可復起又曰無餘故下文云遮波羅夷者是名無餘故遮但無餘有二一自行無餘以壞根本無比丘用故二眾法無餘以同死屍二僧不攝故望此二行更無餘分故曰無餘又名為棄若犯此戒內法不収棄之於外故名為棄為此文言棄之於岸上又戒經云是四棄法此棄即是邊之異名又母經第七云波羅夷者為他刀梢所傷絕滅命根名波羅夷佛法中波羅夷者與煩惱共諍為惡所害名波羅夷又復波羅夷者為三十七住道法所棄為四沙門果所棄為戒定慧解脫解脫知見一切善法所棄者名波羅夷又波羅夷者如人犯罪施其死罸更無生路犯波羅夷永無懺悔之路於比丘法中更不可修名波羅夷如人欲到彼岸愚癡中道為他所誑而失彼岸於佛教中為煩惱所誑失涅槃彼岸是名為墮僧殘者犯此罪已垢纏行者非全淨用故名為殘有殘之罪假僧除殄故曰僧殘奈邪第三云秦言語眾决斷又多論第三云僧伽婆尸沙者秦言僧殘是罪屬僧僧中有殘因眾除滅又云四事無殘此雖犯有淺因僧滅故故曰僧殘母經第七云僧殘者殘有少在不滅名為僧殘又復殘者如人為他所斫殘有咽喉名之為殘如二人共入陣鬪一為他所害命絕二為他所害少在不斷若得好毉良藥可得除着若無者不可差也犯僧殘者亦復如是有少可懺悔之理若得清淨大眾為如法說懺悔除罪之法此罪可除若無清淨大眾不可除滅是名僧殘然殘諸義亦通下犯此以對初故彰總稱多論第三問曰四篇皆是有殘何以獨此戒言有殘答曰四篇雖是有殘不一切盡因僧滅十三事一切因僧滅又犯此戒行波利婆沙亦在僧中摩那埵亦在僧中出罪亦在僧中餘戒不爾故名僧殘波逸提此名為墮罪有此能即是功能為義十云波逸提者燒煑䨱障若不悔過是障礙道母經第七云所犯罪微故名波逸提又復非斷滅善根罪枝條罪名波逸提又復如被斫者少傷其皮不至損命波逸提罪亦復如是此罪傷善處少名波逸提此且約別為義理亦通餘提舍尼者多論第九云此戒體無罪名一人邊一悔過若其從義名為可呵即是責過為義故文言我犯可呵法以若持戒順教即合讚歎今既犯戒招𠎝事須呵責亦可謝過為義文言我今向大德悔過以所造惡謝在於往今追生厭故云悔過母經第七云犯即懺悔數犯數悔故名波羅提舍尼又復忘誤作非故心作故名也僧祇二十一云向人發露不䨱藏突吉羅者見云突者是惡吉羅者作謂惡作也又言式又迦羅尼者即是勸學名也問毗尼者戒行為宗何故乃言波羅夷耶答行通於五不能自分舉彼所防以別能治故言波羅夷等即是五犯解義咸就所防若言式叉者義則有兩上四同前所防第五勸學受稱次明先後推尋大聖本制之興隨犯即禁輕重事亂又准多論先結吉羅後制餘戒今此次第何所稟承解重者先明輕者後說次第法然不違道理又此次第並佛自施如略說中儀則已爾故優波離佛涅槃後一依聖教集為次第欲使僧尼觀過興厭先識𠎝後知微過善修對治離過行成有剋道益故所以爾次七犯聚六門分別第一位列七聚第二立七之意第三解通聚名第四釋別夷等第五偷蘭先後第六入五犯不初門四八為第一聚十三十七為第二聚一切偷蘭為第三聚捨墮及諸提為第四聚四八提舍為第五聚惡作第六惡說第七次立七者古舊釋云若約三聚總明業相亦得名為一不善聚但為制戒本心為欲備防違失若其就體總為一聚此則輕重通含何由可識以斯義故不得立一若其就具往分不過身口身犯名惡作口犯名惡說此亦體含輕重相又未分故不從具立於二聚若其從境別制塵沙文則廣而頗尋行乃博而難立故聖興制事唯是要進不就廣恐令起退止不住略恐難解知是以逐義離廣出於五聚五所不攝還復二位以五配二故有七聚罪相差分麁以可識問據聖本制隨犯即禁分何為五而言逐義離廣豈可先有一法分為五也故知不爾答逐義離廣者以身口所造有五義邊即置前五不同向五輕微相者當位立二即成七聚何必要須先有今分方明離廣今解不然蓋是如來善知法相隨化機宜立此七聚既云古昔常法無別所以既許身語所造有五義邊即置前五如何不許有七義邊真立七聚次釋名義所言聚者罪種雖多名類貫攝集在一處稱之為聚偷蘭一罪雖無別文或可聚在大教之中或可聚在一名之下次釋夷等別名同五犯者如上已明不同者今解偷蘭遮者昔解云偷蘭名醜惡故下文云汝莫破僧甚大醜惡以出佛身血或與佛竟化相鄙之甚故曰醜惡今解名大障道故善見云偷蘭名大遮者言障善道後墮惡道又母經第七云於惡罪邊生故名偷蘭遮又欲起大事不成名為偷蘭遮言惡作者作惡故惡由作得惡俱名惡作如反抄衣等作惡故惡持佛像等由作得惡言惡說者說惡故惡由說得惡並名惡說如說自𠎝等說惡故惡如為持仗人說法等由說得惡此七並就所防罪解若不舉彼所防能防不可為七問彼前第五犯體此六七収如何勸學名局前不及後答為成七聚身語別分論勸學名彼此無別次偷蘭先後者問蘭之一罪或在第三或在第五其義何也答戒與威儀以分七者偷蘭位次合在第三以過重戒門所攝為此下文若以破戒故遮謂夷等上三為以威儀故遮謂提等下四若以均離往分須在第五以體雜故不在均前過復是須居雜首既是均下雜初位當第五又解蘭聚不定須就果因即是作因故三為果故五為辨成他成故爾次入不入二門分別第一約七聚明第二定默妄罪初門七聚位約為三上之四聚即為四犯偷蘭一聚一向不入六七二聚有入不入門所以偷蘭一向不入六七二聚有入不入解凡入五犯須具二義一並體均二齊究竟然以蘭含輕重非是體均又通果因非齊究竟以斯義故一向不入吉罪之中雖通因果簡取究竟並即體均是以六七有入不入爾者吉罪簡究竟以體均故入偷蘭義亦然同吉應有入解蘭設究竟體亦不均約此不同束成三位大眾懺蘭如破僧逆蘭及佛滅後東西二洲一切破主然此逆蘭是可懺罪故十誦第五十波離問破僧犯何罪佛言犯偷蘭又問破僧罪云何悔佛言偷蘭遮悔其出血偷蘭是波羅夷下不成罪攝亦是可懺又此律但言四事不可治不言兼二逆爾者如何言提婆達多此應滅擯解此以逆故擯不以蘭故擯如外道故煞父母亦言滅擯豈亦犯蘭以此故知無不可懺偷蘭問蘭既可懺所以難謗犯殘解如謗黃門破內外道亦得犯殘豈有蘭罪故知但為舉事謗駈擯處齊結以殘罪不為偷蘭又以蘭故謗成殘者豈有所謗名輕能謗罪重二少眾懺蘭如破僧助伴及壞羯磨僧蘭三一人懺蘭如五百比丘蘭及人皮石鉢食生肉血剃三處毛裸形見佛等非直果蘭有此三位因蘭亦爾十誦五十九波離問佛偷蘭遮云何懺悔除滅佛言有四種偷蘭從波羅夷生重偷蘭一切僧前悔過除滅從波羅夷生輕偷蘭應出界外四比丘眾悔過除滅殘邊重蘭同此從僧殘生輕蘭一比丘悔滅伽論亦爾由此不同一向不入爾者究竟吉羅有其二種如沙彌四重滅擯大僧責心此亦不均同蘭何以有入解本立五犯對於具戒沙彌滅擯簡而不論然依此文但四人為大眾故文言不白大眾者四人若過類知二三人即是小眾對其三境懺悔儀則如下滅諍自言中明次定默者但僧說戒不問廣略默妄吉羅吉淨提罪若二三人唯提無吉以皆自言稱清淨故一人心念雖復口言以𨷂所對還是吉羅問未知默罪為是究竟為是方便一解是究竟所以爾者無心作默不欲發言今遂本期豈非究竟若以默故即是方便和眾默時應非究竟和僧在眾默合眾得僧殘問淨默亦然如何是方便是則前二是因第三是果覽前二因成後一果猶如違諫結業之類又解案其實義非是究竟所以爾者凡結業門皆據身語如何約心不了而成究竟然此默妄意造語業為造不了方便所収故俱舍云語業者或默然如布灑他時若不以此成業門定不息餘詞難為永軌丸又以列在小妄方便位中爾者默妄隱在心不得成究竟大妄身現相應當是方便答妄為現身相故得成究竟默隱無別相所以是方便默是方便不入五犯提是究竟故入五中次解方便義言方便者雖復之造前境未暢本思或復境緣互差不成究竟如斯等例是曰方便方便不同有其二種一者進趣方便二者不成方便然古舊師立三方便第一先立遠方便亦名遠資成所以合不立者良以遠中但有資義體事既殊故今不立又准了論但於進趣之中分為近遠本更不假餘別體事以此故今除遠立餘言進趣者心規前事發動身語造境求成名為進趣但心該於剋漫作業通於自他俱能資果稱云方便定此有無三位料簡第一敘異說第二顯過非第三立正義初昔義一解亦有亦無如違諫等有法隔絕不待心息故言三蘭如煞盜等本無法隔故要心息得罪進趣中無第二解進趣之中一向無罪以文言不成者蘭不言未成者蘭假使步步增其不善而無步步蘭吉之名又如向佛步步有順理之福今假作過步步有違理亦無蘭吉爾者如何白二羯磨捨者三蘭解此是第三息處故言三罪猶如門外三即非具有三次過非有五一立義違理無因過教防身語通及果因因既言無果應非有但以見佛果無名因增步步福違教果有稱寧無因業名汝以因類其因令因不立稱我以果類其果令果無犯名然罪果類福果罪有福非有罪因類福因亦罪有福非有第二要假心息事止過若言毗尼者因緣以求即心為因前事為緣心因及緣俱一不息如何不息因緣之業而得有罪爾者若以不息即無罪者且如違諫至四心若息息故得偷蘭四竟結夷𠎝明心不是息心既不息如何有罪果既許然因豈假息又如獨行未至村蘭此有將至之心明知未至不息又五分第一云比丘作書字字偷蘭豈可作書字字皆有止心第三二因差平相成過凡論不善有其二位一者違理二者違教違理因果俱無名種違教因果俱有名種若言但增不善而無蘭吉名者豈將違理之因成違教果計理不然名平成過又違理業略教所収違教果名廣教中攝如何略教中因乃成廣教中果又此違理性罪可然若犯遮戒如何違理第四濫開聖意引證過以八事成重但積勢成體既不覧明不藉因爾者若不覧體即不藉因如何要須前七未懺既言未懺必假相成又若不覧蘭須別懺如何文中隱其悔語第五乖諸律論正文過文如下引次立正義三門分別第一顯有因罪第二定罪重輕第三因罪覧不初門定因罪者進趣之中定有其罪故下文云比丘厭報投崖不死白佛佛言方便欲自煞偷蘭又云時有比丘去浣衣處不遠見有曬貴價衣即憶識而去念言還時當取便疑乃至佛言方便求五錢未離本處偷蘭又諫文言白二羯磨捨者三蘭明知前二進趣中結若望𨷂果三皆不成又言白未竟吉羅豈非是罪又如了論夷有十六部後二方便並是進起以收又多論第三云欲取五錢已上始從發足步步輕蘭乃至選擇取三已還輕蘭四錢重蘭又僧祇第七云屏處一人三諫不止三越毗尼眾多人中三諫不止三越毗尼至僧中初諫時說未竟越毗尼罪說竟偷蘭遮第二諫亦爾第三諫說未竟偷蘭說竟僧殘僧殘罪起以屏處諫多人中諫及僧中諫諸越毗尼罪諸偷蘭遮罪一切盡合成一僧伽婆尸沙若中間止者隨所止處治罪以此故知並有其罪次重輕者依此宗文一切諸犯無問重輕但使起心皆獲吉罪故文言或念犯罪或發心犯若發進趣已去初二犯蘭下五獲吉此通相說然別明者如調部云有勇健人出家有異破戒比丘謗言彼某村中多有財物可共往取即答言可爾彼去不遠此作是念我信樂出家不應作如是惡事乃至答言不往疑白佛佛言無犯先然可彼突吉羅問此之然可已發語業討是偷蘭如何言吉答此且發言然可作事猶未造境故吉非蘭故見論第九云何謂方便突吉羅答如偷人覓伴及刀斧钁隨其方便是名方便吉羅若發身語已去即獲偷蘭故多論第三云執刀欲煞人發足步步輕蘭乃至未傷人已還輕蘭若刀着人不問深淺命未斷已還重蘭又五分第一云比丘作念我當煞彼人發心時吉作方便時蘭死者夷爾者媒初受語何以非蘭觸女二俱有衣不應得吉設諫拒違作白未竟計亦是蘭何以云吉解媒初受時未動身語如先許可吉羅之類又解此據本心直欲受語若作究竟意者即合得蘭故多論第八云若打比丘波逸提舉擬欲打便止突吉羅以打不滿故此戒本意不規打直欲掌擬令其惱怖但擬波逸提如本竟欲女人上出精若遂意憶僧殘若不精出直摩提便止偷蘭遮若本心直規摩提樂意僧殘以此例餘成皆如是摩觸義同不勞更釋違諫約法未過分齊白竟始蘭未竟故吉又以法隔因去果懸白既未終所以吉羅又復名中是違僧諫白既未滿寧容結蘭亦如然可吉羅之類對白既爾餘法准知次覧不者夫論果法必覧因成如八事成重要假前七未懺後成重說不言別懺偷蘭又如白竟得偷蘭時不言更懺白前吉罪乃至諫說成夷因蘭不見別懺又五分第三云第三羯磨未竟捨者三吉三蘭悔過第三羯磨竟捨不捨皆僧殘文結殘竟不言更懺蘭吉明知覽前蘭吉以成僧殘又第八利吒違諫云第三唱未竟亦應作六突吉羅悔過第三羯磨竟若捨若不捨波逸提又僧祇三十六尼違諫結云一切越毗尼一切偷蘭遮成二十重罪名波羅夷又此文直言作者夷不言作者得夷及蘭又不見說懺根本已後令別除方便罪文以此證知定覽成果爾者准依俱舍等文加行根本後起三業感報各殊如何覽加行以成根本又婆沙三十五云謂染淨法皆加行時勢用增上非究竟時解若望違理業體各別不可覽此以成於彼然論違教結業異彼故覽加行以成根本又若加行不覽成者是則犯夷不入惡道以論根本業不入惡道來生人中感等流果但知違理違教一向相反如律男想斷女命夷俱舍不成根本以此校量故知全異次解不成方便文言成者夷不成者蘭又云方便欲取而不取偷蘭然此不成方便有其七種謂𨷂緣境強緣差境差想心疑心善心息釋此七種三門分別第一釋名第二出體第三諸門分別初門言𨷂緣者造境成犯本由比丘病捨等生事不究竟然𨷂緣非偷蘭蘭由𨷂緣而生故曰𨷂緣釋餘准此言境強者本心造境希望事成今以境強煞不諧遂言緣差者造境成犯本由具緣緣或𮓪違事不究竟言境差者尅欲害怨異境未替迷非謂是謬暢本思言想疑者念怨之造犯藉了心迷謂想疑不成究竟言善心息者懷毒造境希望事成今起善心惡息非重次出體者謂隨𨷂等顯事決了即是體性言𨷂緣者若遇病捨即非比丘不成戒本犯戒之人故多論第三云若二人相㓨一時死無犯戒罪以受戒誓畢一形故又五分比丘自煞偷蘭設是比丘須除狂等十誦第六十云比丘以煞心打人是人未死須比丘若狂若反戒得偷蘭遮次境強者謂本期境不可毀壞或入甚深禪定或能反害於我如出佛身血伏害打力子等次緣差者如欲作事或逢異人恐有發覺不成煞等或可弓刀斷折事不遂心乖本要期是緣差也次境差者如境想中非人人想非人疑是解此境差三門分別第一敘舊第二辯非第三顯是初敘舊三門一定境差多少二本期定境方便三定異境有無初門定多少者然含四境一人境二非人境三畜生四非情杌木此之四境俱有差義先約人趣謂以𨷂緣境強緣差心息各對不疑疑說即成其八斷命不疑疑後二即成五對十句二趣各爾杌應有八謂除二強四境通論總成三十八此三十八皆能差張故故曰境差定義既竟次解相別先辯人中五對十句上五者一異境不強而煞二異境𨷂緣三異境境強四異境緣差五異境善心息此非人人想離為五下五者六異境疑善心息七異境疑緣差八異境疑強九受境疑𨷂緣十異境疑不強而煞此非人疑離為五故成此十受境初十非此方便攝中八方便收本境十句並境差攝第一句欲煞張王來替處緣於王人恒作張想煞王命斷得夷由異境差故煞張心息故曰境差方便問但作張心無害王意何以得重答張王非煞緣人是煞緣當煞王時雖無王心而作人想緣具故夷問煞王得夷為以張方便成為別有方便耶解有二種一解以取張方便成類盜說者不然又解人趣雖同者有別故寧得覽彼成此兩境既別起心亦異故知害王別有方便謂與王境交對已來雖無王心而作人想往煞王命斷時尚得損王究竟重夷豈况王命未斷寧不別有方便以成重罪不類於盜同是一主故用過五方便成五重罪若別主同盜自餘九句類說可知次非人境五對十句數法同上但單𨷂上五非人境上一向無罪以無心當非人故不同張王人趣是同故下文言男想煞女佛言夷雙𨷂下五非人境有罪以疑故本境十句還在第四第三畜生十句一同非人第四杌木八句異境無罪非生數故本境方便亦第四收第二定本境方便者此本境上三十八蘭悉第四中攝即境想四五二句是第三定異境有無輕重第一犯不犯分別二十有罪二趣上五杌境中八是說無罪以其二趣無心杌非煞境不同人中雖張王別莫不是人故前五有犯第二犯中究竟方便分別人趣初十此是究竟中八餘十並是方便第三方便中重輕分別人趣入重謂是蘭故餘十是輕謂是吉故二趣第十此二吉重餘八則輕所以可知問二趣第十吉羅者何以文言非人疑蘭答此望本期之境故蘭即上本壞三十八等是此謂疑從二境結罪第四方便相攝人中初十此二非方便収餘之十八以位言之𨷂緣境強緣差心息位各有四四四十六四方便攝二趣兩疑疑心以收問三趣第十句俱疑乃有究竟方便耶答人中望本期故說以為疑煞緣具故是以得夷餘二望本期猶豫故說疑即以𨷂心故但得是方便是故人言自有疑不成疑即人中第十是次辯非者問尅心趣本境如何結異罪異境若結罪異境即本境境差義不成是漫非尅故又異境若結罪本境非是尅今由立尅心異境定無犯許是尅心異焉有罪又若無簡別心可結異趣罪無心簡別異境尅定無𠎝本定境差豈論異罪又對異想疑既立𨷂等本境亦然何以不出以本想疑之後亦有𨷂等生故又緣非畜作本想疑如何疑心結罪想心不結若以無心當非畜上五許無罪今亦無心當非畜下五如何犯若以疑心緣二結者是則非畜應是本期若許非畜非是本期如何緣異得起進趣又本害張王來替處緣王即許別有方便而言兩境既別起心亦異今亦非畜替本張處異作本想與王不殊如何不許心異結罪若以張王同人結者是則王外無別差𠎝以王非張即許別結非畜亦然何以無犯又兩境別起心異者如何於一尅中有二進趣進趣既二定是漫心又對異境別起方便何關本境境差之事又十誦第二云若比丘為人作坑人死者夷非畜死蘭若為非人作坑非人死者蘭人畜死吉若為畜生作坑畜生死者提人非死吉若比丘不定為一事作諸有來者皆令墮死人死者夷非人死蘭畜生死提都無死者偷蘭吉罪准此尅心異皆無罪次顯是者境差謂在進趣位中被異差本直據本境無處齊曰境差約心謬緣合分為二一者單𨷂境謂非人人想二者雙𨷂境心謂非人疑又此單雙二𨷂各含四境總成八句亦不違文或可心雖謬緣心非境故約境不同隨境為四此境四者謂天非人畜生杌木舊以天同非人隱而不說若同非人即不立者本煞非人天來替處以同非故應不成差若許成差如何不說准依此理故立天差於此差位謂除同趣同趣齊犯不得論差如欲煞張王來替處為有緣人心故重不以張王別故差為此境想但言非人作人想疑不言王作張想疑如婬約道是道皆犯不以趣別立有境差煞等亦然是人皆重豈以張王不同許有差義又古舊諸師共許張王非煞緣既許此義如何立差即將張人方便成王究竟於張人邊無別有罪為此文言男想斷女命夷不言男邊別有方便盜誑亦爾又如五及過五俱重無差亦將過五方便成五重罪對此差別應為四句一境差非罪差如王替張是二罪差非境差如想疑方便是三亦境差亦罪差如非畜等異境是四俱不差如人作人想是爾者既立同趣無差如教害張所斷王命能教重不答以非本期能教不重爾者此則成差如何不立解夫境差者據心謬妄緣異作本名為境差教人造業不約心謬但為能教無心王死不犯所作人想故獲重𠎝此為顯示能教所教有心無心成重非重不欲辯立境差之義問下文欲盜他衣錯得己衣佛言偷蘭豈非是差解錯得己衣理實無罪但為不得他衣故結偷蘭又解本立同趣無差謂約張王等物然己物無罪義同無主既是無主得名為差問異境替本境緣異起想疑想疑想疑既謬緣於異有犯不答於彼異境無心欲害心緣不具並悉無𠎝所以然者為尅害怨異境來替異替本處即是境差不可對差之後初心謬緣於此謬緣心中得結異罪若此差位結異罪者何殊非畜之上復辯二形等難上來解釋非是故情直為舊義背理違文既失旨歸觸途成妨事不獲已有期立破次想差者人非人想一切轉想者是疑心者對境生疑為人非人緣於兩境疑心煞者是善心息者先起心息惡心進趣作事今善心生止事不作即善心是能息惡心是所息能所合彰故曰善心息次諸門有十第一望境對不第二對不同異第三尅漫想別第四錯誤有異第五心息不息第六作事不作第七本異通不第八對緣辯𨷂第九約戒通塞第十諸部同異初門若身對前境諸自作業儻遇緣不成具七方便或教人現前亦同此說若設坑倚發身不對境及諸教人不現前等但五方便謂無於疑於疑二者緣此謂彼既不對境故無想疑是則想疑唯自對起餘五通對不然約諸戒犯通對不者如煞盜等通對不對妄語作書置地是設置方便如婬漏失違諫等戒並無不現及設方便餘可類知次同異門想疑二種不對中無不對既無豈論同異餘五既通對不須明同異五中𨷂緣境差想同無別境雖對不𨷂差一種不以境有對不遂令𨷂差有異餘三對不大位是同然於設置之中有少差別設置中強要須得通越度又如提婆達多教人害佛二人念害不前者亦是不對中強緣差必須火坑得兩善心要癈煞具方成次尅漫門於前對不門中各通尅漫二心是則兩尅七五不同如其大漫對不俱四言尅七者於人境中雖罪不差望境有差局張為法故於對中尅欲害張望餘人餘趣作境差想疑尅對張境多少既爾餘咸類然廣說無量次約趣辯即是尅漫相對謂尅簡餘趣漫通人境以尅簡餘得作境差想疑此境差等狹於前位人趣既爾餘咸類然次對非情准同前說俱境差等更狹於前不對五中寬狹准說言二漫俱四者謂無境差想疑以心寬該情無限局隨境優劣皆是本期假使臨事平緣非境差等次錯誤門凡言錯設皆是舛謬之心隨事總釋相則難分以名尅定事則有異謂若二境歷然無心害彼事成有舛名之為錯若其一境易脫緣彼謂此有心成犯稱之為誤既知錯誤差別對七辯者然七方便並無有錯對境成事錯猶無𠎝況方便位而得有錯或可錯者異雖無𠎝而於本境即是境差是故錯中說有境差論其誤者謂境差想疑比三心想迷謬名之為誤境差一種緣彼謂此想疑二者緣此謂彼餘四錢事了心皆非誤攝亦可七中來成三位想疑二種誤而非錯境差一種亦錯亦誤餘四方便非錯非誤次心息不門凡論心者有其二種二者煞心二緣人心此七位三𨷂緣境差二俱不息以於進趣位中病捨異起是則進趣被擁不成重果豈不二心俱不被息境強緣差善心息三但止煞心人想不息然遇強差二緣須止煞心若無止心更求方便猶是進趣未成強差其善心息必須止心心若不止還屬犯門想疑二種二心俱息轉心當異境本境無害心然望本境即是俱息或可緣異欲害俱息人心煞心緣異有不言息煞心疑心猶豫不了人非以心兩緣亦俱不息次事作不門七中位二𨷂緣想疑義通作事以𨷂緣少通緣想疑𨷂別二望結方便時未必待事成餘四望本期一向事不成境差望本雖不作事然於異中事通作不若異作本想一向得事成若異作本疑事有作不作逼境制不得是事即通作遠境容豫生是事必須止以對異疑不起止心即當是漫豈關於尅不對中五一成四不成異境義通准同前說問文言不成者蘭為當局准不作事為通七俱不成答今將不成之名望七說者即是名狹體寬與七無異但是望罪不成非望於事舊云唯攝不作事者是義不然次本異通不門七中位三想疑屬本境差唯異餘四方便義通本異問𨷂等不通異可異不結罪既許異境生如何得無犯解不以𨷂等通異生故即於異境別更結罪為擁進趣本由境差對差之後方有𨷂等𨷂等既起在於差位故是差收非𨷂等攝猶如𨷂後得有境強緣差心息然是𨷂收非強等攝餘皆類同先想疑後亦有𨷂等仍想疑收非𨷂等攝境差亦爾次對緣辯𨷂門然戒眾多不可具載且寄煞戒顯相論之煞戒成犯總具八緣所謂通三別五今以能𨷂七種𨷂彼成犯緣者謂𨷂緣𨷂通緣通緣三中但𨷂初三所以不𨷂第二緣者以教一興終乎法滅故第二緣不論有𨷂此一𨷂通餘六𨷂別境差𨷂於境想疑𨷂第二境強緣差善心息三同𨷂煞心加行斷命既𨷂煞心加行便止加行既止斷命事隔故境強等通𨷂三緣舊釋煞心方便二緣不𨷂以若𨷂心及方便方便不起則令無方便罪今謂不然別皆𨷂盡以此七種起在進趣位中擁彼進趣不成重果若不𨷂心及方便者即應恒時是進趣位既擁進趣始成方便明知此二亦須有𨷂又此二種不論𨷂者如何得有不成之罪又若煞心不得𨷂者如何乃云強等餘三止煞心人想而不息次通塞門婬酒無想疑設有亦究竟以過失多但五方便受戒但四疑得提𠎝謂心不犯復無境差亦可據有轉處闇中燈火不明得立差義謂心不犯者謂是本迷若其轉想亦成犯限如此解時則便具六然諸戒中犯對非情者皆無境強如畜長離衣掘壞等戒若其逼令說淨不許離等皆是緣差何關強事如古舊師共許杌木無強類對非情其義亦爾餘𨷂等三理通諸戒問方便境想寬狹如何答境想具因果故寬方便但因故狹亦可除婬酒戒餘戒下四因中方便則寬境想便狹以餘因中但三方便次諸部同異門僧祗性惡謂從境制闢無想疑但五方便故第五六謂是黃門而是女僧殘疑准亦然若論遮戒即從心降謂心境相應重不相應輕則有想疑具七方便故第十四云挽生草枯草想得越毘尼罪疑准亦然五分無疑不問遮性疑皆究竟以疑恒有緣本之心故使從境制其正罪故第二云女疑僧殘第六云生草疑蟲水疑皆提想心不定性戒即有遮戒便無故第二云女男想黃門想觸蘭第八云非時時想提十誦或七或五若其先有方便進趣之心並從境制無有想疑故第五十八云人作非人想煞及人中生疑皆夷第三又云女人所男想黃門想二根想觸僧殘又第十云生中乾想及疑皆提若其先無方便進趣之心不從境制便有想疑故第五十云若不知有異想誤煞父母未受戒者應受已受者不應滅擯疑亦同類即是具七次持犯義八門分別第一釋名第二次第第三成就第四漸頓第五寬狹第六通塞第七持犯增微第八結位總別初門釋名者持犯相望各有二種且持中二者一者止持二者作持言止持者奉戒之徒禁防身語不造諸惡目之為止止而無違順本受體令戒光潔因之為持持由止成故曰止持言作持者奉順聖教作法作事對事作法稱之為作釋持如前持由作成故曰作持然犯亦二一者作犯二者止犯言作犯者不能守行違教起非廣造諸惡稱之為作作而有違不順受體令戒毀壞名之為犯犯由作成故曰作犯言止犯者不能准教䇿進身語習成行解名之為止釋犯如前犯由止成故曰止犯問所以持犯相對明者釋良以二犯順情恒造不善惡因相仍不得解脫今欲捨惡行善令戒晈然故崇二持以希出離由此義故對犯明持第二門次第者問對犯明持後先無定何故須以持先犯後答但由入法之人有久有近創入情殷專精在先久參事慢悔犯居後如說相云一切不得犯婬盜等即是先持若作者非沙門等即是後犯又所以持中先止後作犯內先作後止解凡起行人皆先離惡若不作斷一切惡心是則離苦不能究竟為欲離苦究竟故先明止惡既離已次明修善若不化修一切善心是則得樂不能滿足為欲得樂滿足故次明作然二化中先作後止者對翻二持次第故爾亦可作犯過麤理宜先禁止犯罪細故次後明欲使僧尼麤細俱離離過趣修尅成道益對犯翻持麤細亦爾此據持犯相望以明先後若取成持義邊竟無先後第三門成就者若約制教成就唯在身語謂離煞生婬盜摩觸打搏突等是身止持如應來者來収攝臥具然燈火等是身作持如離妄語麤惡欲身毀呰兩舌是語止持如受衣鉢處分說淨作知淨語是語作持身語二犯翻說應知意成身語不須別明爾者意成身語無持犯者如何止心不學得止犯罪答兼止身語故說止犯若但起心不名止犯問若真起心不說犯者如何文言或念犯罪或發心犯及云汝以何心六犯中由身心等偈云當審觀其意答此心助成身語而非獨意獨意之中無有持犯故實論云但意不犯又六犯中云由身口不由心若約進修三業明者是則意中亦有持犯或能修慈不起煞等是身止持翻為作犯或能禮拜筞進檀等是身作持翻為止犯或能慎護不作妄等是語止持翻為作犯或歎三寶讀誦經等是語作持翻為止犯恒修正念不起三耶是意止持翻為作犯能觀不淨對除離惡是意作持翻為止犯第四門漸頓者若對制教明漸頓者止之四行唯漸非頓且如止煞對境修慈不得更修餘戒對治作持隨事次第漸成不可一時頓修餘行二持既爾兩犯亦然但可一時頓得諸戒不可一時盡犯諸戒由如是義故俱是漸若望端拱無惡來汙二百五十恒清淨者此之二持即有頓義然是端拱而非修行二犯不先屬己即無此義舊以端拱中有止持判此為頓故云二作唯漸非頓二止通含漸頓此不應理不繁須破然約進修謂唯止犯釋此止犯三門分別一定犯名二明分齊三釋漸頓然定名者止犯有兩一者不學二者無知言不學者受戒結勸文云汝應學問誦經既勸云汝應學問誦經明知不學成犯又云日三時入和上等房請經問義又制五歲比丘誦戒羯磨使利不者如法治又應當學名理該餘犯言無知者文云不一心兩耳聽法以無知故又云可呵癡故又云汝是賊汝癡無所知此猶約戒別明下有愚癡五犯五種制五犯聚亦如是古師不能究斯文義遂釋云無知義解不見文證者其疎略也次分齊者論其學問理通一切該於始終及以愚智望諸教行恒須修學但作止心即結不學其無知者結約愚智位別若智慧比丘五歲方結以滿五歲是其知位不須依止堪為軌範五歲翻前故不結也若止學心雖未滿五計其道理亦結無知其愚癡比丘盡形依止假緣不了不結無知此謂學而未知聖不制犯若止不學亦結無知此無知罪懺得除滅縱使不了相續聖不制犯犯不相續故可悔除次漸頓者舊云不學止犯義含漸頓無知止犯唯漸非頓不學頓者本受要期誓修諸善還得爾所戒善以防不學今若息心總止不學違本要期寧不隨境頓犯一切不學之罪言漸犯者起心偏學望不學者犯豈非是漸故使不學義含漸頓問元受令學不學成犯受言得果不得應犯答學據自分不學故犯得果力分未堪是故非犯無知漸者要是對境緣別不了方結無知然一心中不可備緣咸使不了今隨不了以結無知明知漸犯今解漸頓其位大同論其結罪即不同舊然不學約心無知從境若緣三藏教門總止不學其不學罪亦總結一若緣教門隨別起心其不學罪亦隨止結不同古舊諸師於一一境緣不了處亦結不學然不學罪非緣境生如何一一境中皆結不學之罪又此止心非緣普境緣既不能普周如何懸犯諸罪惰人不學行是處中豈同根本律儀遍緣而發又復後緣境時無心止學既無止心如何結罪但可獲以無知不得論其不學故上文云若犯罪應如法治更重增無知罪以此故知緣不了處但結無知不結不學不學無知位既不同如何至後無知緣中方始結前不學之罪又解由前不學後結無知無知本由不學而生故無知外無不學罪如遇宿觸等緣未食無過後食成犯無別宿觸等罪以此類之無知亦爾但可直結無知不得更論不學又解此不學無知體同名異由不學故即無知由無知故即不學體既不殊犯寧有異是故今解合為一𠎝雖有此義且依前明第五門寬狹者若對制教明者以止持寬作持狹止通五犯以之為寬作局下四故所以狹又就下四設有作中不遍諸戒而亦是狹於第二犯但在二房餘之十一一向是止亦可望其止法止事是則止持通於十三作局初房中半有主房令餘犯多少准此應知若尼作持雖通初犯第四聚中即無作義又就有作之中亦是其狹以初唯一第二有兩餘犯例然可以思准唯不攝耳聽戒及尼受等十八戒專作不通止以外諸戒咸悉是止對事二持既止寬作狹兩犯翻持義亦作寬止狹問所以制教稱為對事解以直止法不說為犯要假作房畜長等是以稱為對事若對進修辯者作持即寬通三藏故止犯翻作持故亦是寬進修無止持是故止持狹作犯翻止持故亦是狹第六門通塞者於一行中有餘三行說之為通無則稱塞釋此通塞可為四門一一心成行門二通望止作門三自業相成門四教人通不門此之四門局約制教以說以進修中唯是作持止犯既知是塞不須通在餘門若通一一門說義成繁雜又與制教事監故須除去初門一心四行俱塞以持望犯善惡相違持犯當分各有止作此望一切單持犯戒如離煞等即無作義如攝耳聽等復無止義二犯翻持反說亦爾故約一心四並不通問如止煞等必修慈等若欲禪誦先捨怠𠎝此則止中有作作中有止如何乃稱四行俱塞答此之止作更相有者但約對除義說不就尅成行論止中有作舉作成止即作是對除離作是果行離作中有止舉止成作即止是對除離作是果行離舉宗往攝止作恒殊故尅成行四俱是塞次通望止作門若其一業通望兩境是則二持自通兩犯亦爾此約一切雙持犯成且二持通者如處分說淨稱之為作以作法故造房畜長無罪反却作犯可非止持此則體一名別二犯翻持反說亦爾望不處分稱之為止身業造房即是其作此亦體一名別豈非止中有作作中有止次約自業前後相成者於一行中即有餘三且如前煞未成謂成修離染行修此行時前煞方就即是作犯與止持心俱或畜長覆藏事經明相即是止犯與止持心俱或受日出界九月離衣即是作持與止持心俱既於止中有餘三行餘三互通義准應爾如古舊解云如煞燒埋等是作犯通如畜長衣鉢離衣等名止犯通二持通者如德衣月五利無罪而於兩犯心中得有作止二持離衣九月及杖囊等豈非並通次教人門如教人煞盜為己造房遣人為己持欲至僧先安煞具擬欲害生後起善心遣人癈具作此四事却入止心正在止心四俱成就前煞盜事成即是作犯造房止犯說欲作持癈具止持然於止心既成此四入餘三心其類亦爾第七門增微者先明二持若望有心護戒順教無違俱名持戒不分上下但以人行心殊非無差別釋此差別可為三門一者約人二者約行三者約心言約人者具戒滿足持行為增不具𨷂減說之為微又就具中聖凡位別於聖位中學無學異但無學人持行堅固勝餘學人說為增也諸有學人行未究竟雖護律儀以為微也於聖學中三果差別持行不同增微亦異然凡諸位持行亦然差別增微准義應釋次對行者若約五犯輕重相形止離重過故何以增作離細罪故所以微又可止防麤過易成故微作離細罪難成故增斯以止持局在初犯作通下四故作此說若約下四止持義邊是則止作增微不殊又尼作持通於初犯望尼止作亦無優劣次約心者元受之心既有九品明持戒心亦復如是如本專精晈然無缺寧碎身首不犯諸戒及為怨逼能禁心等如此止持豈非上品或有防護雖不犯非但懼惡名事不獲已內實無有清淨之心為病開等說為微也餘戒類然咸有上下作持階降准此應知又依俱舍十八戒有四種一怖畏戒謂怖不活惡名治罸惡趣畏故受護尸羅二希望戒謂貪諸有勝位多財恭敬稱譽受持淨戒三順覺支戒謂求解脫及正見等四清淨戒謂無漏戒彼能永離業惑垢故又實論第一云戒品清淨者佛弟子眾持戒無暇乃至小罪深壞畏懼又佛弟子不為福報生天人等亦不怖畏墮地獄等而勤持戒但樂善法故名清淨次明二犯若望有心成犯於教𮓪違俱名破戒不分上下約人行心殊非無差別釋此差別還可為三第一約人第二約行第三約心言約人者具戒犯增以有夷等沙彌即微以唯吉故又就具中無學誤犯以之為輕凡夫及學人故犯說之為重故下文云若凡夫人學人故犯戒無著人不故犯戒又就故中聖輕凡重又聖學人望欲界惑斷具差別輕重應知然凡諸位罪又重輕階降不同准義可解問學人故犯戒有惡道報不答曰無也以犯戒後尋生悔心抑伏惡業不受苦報設有餘殘應可受者寄在聖身人天中受且如忍位之中尚得三惡非擇滅況復聖人得有惡道次約行者輕重相形反前持說謂作犯過麤以之為增止犯罪細說之為微亦可此望初犯若約下四還則止作增微不殊又不對尼明義亦應爾然通止作犯有故者以之為重若不故犯說以為輕重非故者不作故違聖教之心非不高下著衣等犯而是輕故上文云以不故作故犯突吉羅無非威儀若故作者復有非威儀罪又就故中通諸犯內違性即重犯遮即輕又遮性中通成不成成者即重不成者輕又就成中感報優劣增微不等可為四句一犯重報輕謂二房媒嫁律禁情過數故成重體非尤害感報即輕二犯輕報重謂有比丘嗔心打罵羅漢及佛律就上憶稀故犯提體是尤害感報即重此之二句以理言之結戒法異輕制重名重制輕名得罪福異因果相當三俱重如初四夷無根謗等四俱輕如畜長足等此之二句結戒法不異得罪法得罪法不異結戒法次約心者持戒之心既有九品犯戒之意寧容一准或有犯戒因心增上苦惱有情以為慶快如斯犯者豈非上品或有犯戒媿心殷重事不獲已為他逼犯如此等違判為微也然優婆塞經第七因定五逆輕重次云有物重意輕有物輕意重有物重意重有物輕意輕言物重意輕者如無惡心煞於父母物輕意重者如以惡心煞於畜生物重意重者以極惡心煞所生母物輕意輕者如以輕心煞於畜生如是惡業有方便重根本成已輕有根本重方便成已輕有成已重方便根本輕有方便根本重成已輕有方便成已重根本輕有根本成已重方便輕有方便根本成已重有方便根本成已輕物是一種以心力故得輕重果此八句中勒成四位初之三句二輕一重第二三句二重一輕第三一句三時俱重第四一句三時俱輕次以有心無心准小妄久相對明者亦可為八且約初犯四夷以說初三時俱有心諸方便根本成已四皆犯重第二以二時有心一時無心作三句初前二有心成已無心亦四俱重次根本無心餘二有心初戒重餘三蘭次方便無心餘二有心四俱成重第三一時有心二時無心作三句第一句初戒重餘三輕第二句四俱犯重第三句初重餘輕第四三時無心為一句此之一句四俱不犯第八門結位者於中有兩第一總定第二別明總定有三第一述正第二序異第三辯非言述正者教從事分雖無定限要而言之莫過制聽言制教者要作不作作者制修止使獲罪如受說所應作事不作者制離作則結譽如婬盜等不應作事言聽教者若作不作此之作不聖俱順可如房長等所應開事此之制聽聽攝教斯盡便是大期遮開恒以軌又此制聽且就開遮義立若從所詮之事應名止作二教雖有斯理且依前明又此聽言且對制立以約所開作不俱順若據有結罪還是其制故制戒宗制教所攝雖有斯理亦依前明又此制聽兩教各詮止作二事制教作持如受說等止持如盜煞等違禁起非翻為二犯即當諸師制教中事通學不學聽教作持如房衣等體量等如許順教作止持謂是非法體等與道相違制不聽作問此不得作與制止同即應制收如何聽攝答望不得作理雖可然為與所開體同故在聽收非制違禁同前翻為二犯即當諸師聽教中事唯是可學然佛施設諸教及事咸是所學要學方知若不䇿修緣而不了隨不了處結以無知又所緣處但結無知無不學已如前辨次序異者古意解云止持約兩教者一局取不可學如人非人相等是上制教中要不作者是此不作者如婬觸等二聽門謂唯可學即上聽中若作不作謂房衣尺量等別定中指過量境想作持對兩教者謂制中可學事如受說安恣受持衣鉢等聽中結淨德衣諸長離衣等復有古師立制教事二種云一不可學事如人作非人相等是二者可學如衣鉢體量等是因有問云何故非衣鉢量事名為可學答此事一者可以緣教生解識衣鉢如非二者事中可以造修故言可學次辨非者初師立不可學事為據何義為以人非人相等述故不可學為以婬觸等事不可作故不可學若爾何失二俱有過云何若以述為不可學是則處分等想亦然如何處分等想名為可學若以婬觸等事不可作為不可學是則過量亦然如何過量是可學事次立人非人想等為不可學者即不應云制教中事通學不學次問答中云可以造修故言可學者即此非衣鉢量如何造修又云可以緣教生解識衣鉢如非者婬等亦然何以不名可學又所證作止攝事斯盡有何不周離此二外更立可學不可學事若既宗學不學即須直依此明如何復就作止分位解釋又可學不可學事還是作止二持此作止持俱是所學既俱所學不學並犯如何緣止不了不結不學無知緣作不了便結不學無知故知斯義擁而未通進修學人應所思審又過量境想便與煞等不殊既與煞同如何偏結又如止中婬等緣知重輕及境是不自非進修無由得了既假進修方知如何言是不可學事又若婬等是不可學如何律言捨學事又俱舍等久不應言若犯學處非苾蒭等次別亦作三門第一序昔所說第二昔意相違第三申今正述初門昔解位例有二止持作犯對二以明作持止犯唯對可學以辨先對止持中明有無輕重作兩箇九句初可學作九句者上品一句中下各四上品者識事識犯是中品四者多用二識作頭初識事疑罪二識事不不識罪三識罪疑事四識罪不識事是下品四者多用二不識作頭初不識事疑罪二不識事不識罪三疑事罪四疑事不識罪是上品一句事罪俱識無不學罪中品四句由不學故於事於罪有疑不識等生故制四箇不學下品四句八不學罪若對無知罪中下二品上各加倍說可知問此中有二十四吉羅云何稱為止持答以不犯根本故名止持但以上品俱識清淨無犯故稱為上品止持中品有八罪不如上故稱為中品止持下品有十六吉羅不如上中故稱為下品止持次對不可學明止持九句者有二例謂罪事事有三種一識事二疑事三不識事罪三同前也九句者先以罪中三對識事作三句一識事識罪二識事疑罪三識事不識罪次以罪三對疑事作三句次以罪三對不識事作三句此下二三句准前數可知此三三句中各下二句句別有不學無知二罪合有十二吉罪此亦望不犯根本故稱為止持但以事是不可學故雖疑不識聖不制罪罪是可學故若疑不識悉法制罪次對可學事明作犯九句者如初九說後對不可學事明九句者如後九句說但以犯根本罪故猶於可學若疑不識法結罪如上唯除不可學事雖疑不識一向不犯可知次辨作持九句者若從對事對法以辨實亦應作兩箇九句但明差別階降不異故合一九句此唯對可學以明如止持中對可學明九句即是唯此中順聖教作前事為異次論止犯或九或八九句者對可學事上品四句多用二不識作頭有四僧殘十六箇吉羅可知中品四句多用二識作頭有四僧殘八箇吉羅易知下品唯一句謂識事識犯而不乞處分作房者是可知此以多羅為上品故言八者對教行不學明止犯如次亦前九句除下品一句前八句是廣說可知此總通為亦九一八句次相違者然此昔義辨非如前舊人序已將非應理次即辨非後便顯是此二相求僻不能述破但知昔義事罪識等普約進修非開制教破者不究斯旨謂依境想久立遂約境於廣辨其非此為不了他宗立意破不相當虗名顯是據斯一節自道三師所立中繁雜矛盾又立進修止犯名有二云一者不學下久遣誦羯磨各言不誦因制五夏誦戒羯磨若不如法治二者無知故下久云先誦今者悉忘制言如法治立既引此結亦合然如何棄所引久別約境想人法然此境想人法緣心謬妄並不由學豈合招儻但以法意義𮓪於正教遂發學之者滯理忘思尋之者迷文守句余今為鑒前失欲徵復非故更察義詳文定教釋事次述正者然教及事各別不同一一行門足自顯了顯了即制持犯之行義理既然何須句定以句來定良謂不然又解若必要須定為句者如前宗義諸教及事咸是所學並進修者斯則通望進修總為一九此之九句如昔止持對可學事為九者是又解欲令教事差別顯然為句數者但為二九初九對二教中止持作犯合明此不望法佛法假作成持止便犯故此止持作犯有三一制教止持二聽教止持三復於聽中取別體止持此之三位同是止持作犯又以同緣一事生心故不分二合為一九所言九者上品一句中下各四上品一者謂識事識罪中品四者謂以二識作頭初有二句事上識罪上疑不識次有二句罪上識事上疑不識下品四者謂以不識及疑更互為頭初有二句事上不識罪上疑不識次有二句事上疑罪上疑不識此以上品事罪但識不結無知次品四無知下品八無知次九對二散中作持止犯事法合明此作持止犯位亦有三一制教作持二聽教作持三復於聽中攝同體止持以此止持作持攝故三同是作持止犯又亦緣事不殊寧分為二九數如前不繁再述進修八句中是作持止犯亦總攝說不須別明或可要須別為八者謂對進修教行作其八句此之八句翻前品數謂上品四句八無知次品四句四無知此以犯門故論約罪多為上品小為次品舊人更加作持一句謂識法識犯足成九者不然位舉止犯寧加作持又此作持又此作持識法識於犯諸句中以合有說作斯二九一八義何不周須更離分以成多九又作句法皆不須以緣事三心歷罪三作但以事罪更互作之所以爾者以境相緣事心及人法緣罪心此全不關不學無知事斯則教事頭能無勞重覧犯持有據豈是假再思上來總釋義說次隨別釋先解初文初文復二一總二別總中十門分別第一起由三毒第二身語成犯第三自作教人第四犯境寬狹第五尅漫不同第六錯誤有異第七諫不諫別第八持犯方軌第九二部同異第十下眾任運初門起由三毒者前之四戒如比丘中說後四戒者摩觸八事愛染同婬故三起貪成覆隨二戒類同大妄起由三事成亦通三斯等辯相隨事可解次身語門位分為三婬盜煞觸局身妄諸覆隨唯語雖同延之語語有別相如妄發言成業覆藏語止結身隨舉自止語業藉他語表八事一戒身語合犯次自作教人門亦為三位初一下四此之五戒自作成重教人但輕次煞盜二戒自作教他彼此俱犯次妄語一戒自作五重教人不定如前已明次犯境者初戒境通四趣餘七犯局人成又就人中婬觸八事局界覆藏唯女餘之四戒義通男女隨舉力異准文可知又就女男之中道俗分別七八局道餘通道俗又就道中具非具者亦七八唯具餘六通二次尅漫者前之四戒同比丘說謂若同趣一切皆犯若約異趣即除婬戒餘之三戒大漫隨犯尅各相應差互輕罪後之四戒局唯是尅以取染心知人識罪違諫拒僧縵豈得犯又解觸八亦有漫義以同男子並有染心次錯誤者前四位三同比丘說若論後四並須了心錯誤謬妄並不成犯又解觸八容有誤犯之義以俱男子並有染心七八不然故唯了犯次諫不者前七條然無有倚傍作則是違不須設諫第八一戒倚傍有濫故須誤諫開示是非此設諫者是違僧制除不諫者是違佛制次持犯者覆藏一戒具二持犯言二犯者見他重罪止不發覆名為止犯明相出持罪成究竟名為作犯此是體一名別言二持者見罪發覆名為作持以作法故明相出時無其作犯翻却作犯豈非止持此亦體同名別若論別體持者守戒自清一向不覆是名止持若見有罪作法發露是名作持餘之七戒並是止持作犯次同異者初之四戒僧尼同犯而此四中下三無異婬之一戒境界翔例又復犯境亦有寬狹尼唯局男僧通二作又尼唯局他境僧通自他後之四戒尼為深防並得夷罪僧犯不然故分二位前三輕重後一有無摩觸差別有四不同八事之中僧犯三罪捉手得殘語期容有麤語僧殘捉衣獲蘭餘容小罪覆藏者尼重僧輕隨舉尼有僧無所以可解次任運者初一下四無有教人得同犯義故無任運餘之三戒教人為已有同犯義故有任運次隨別釋先明初戒總申制等如前文中分二第一漏生壞略相亦如前第二告言下制廣補略文中有三第一舉宗標制第二集十句下制利功德第三欲說戒下正明立戒前二如上第三文二初明戒本說之儀則次若比丘尼下廣釋其相然前戒本但有五句一顯犯人二作婬等者正顯婬事三乃至共畜生者出犯境界四結五擯問所蘭無共同等四句舊解云祇五二律悉具足有同於大僧此律文略十律尼戒本同者文不別列故知亦有共同等四也其比丘捨戒為成去時無障故爾尼中捨者恐在俗中汙犯故爾如十律說無重出家故彼文第四十爾時諸婦女為舅姑所苦惱故出家作尼爾時為和上闍梨共活尼所苦惱故還作白衣居士譏嫌白佛佛言若比丘尼一反戒不復聽出家受具又第五十問頗有比丘尼捨戒更與受戒不犯耶佛言有若比丘尼捨戒已轉根作男子與受戒不犯伽論亦爾今解此共同等文局比丘者以尼無緣戒本不列如比丘四戒之中婬有䟦闍為緣牒入戒本餘三無緣本中非有僧既尚然尼豈須責又解計此共等理通尼有但以共等本因䟦闍厭道不捨行非有此四句今尼為無捨戒故此文無又解此䟦闍緣起在唱二部持後為此局僧尼戒非有次下廣釋科同於上就尼犯中文分為二初至如上成犯之相二若比丘尼下輕重相前文復二初解戒本五句文相可解二有二處下重明戒本二三兩句於中文二初列犯家境界第二比丘尼有婬心下對境成犯前文復二初總舉三趣二復有下舉趣各三各三合九此之九者是犯重境次對境成犯文中有三第一自心起犯有四百三十二句第二若比丘尼下怨逼己境作二百一十六句前文有二一對覺境二對不覺覺境通計總有其九先約人男於己三處各加隔等四句即成十二一境既爾下八亦然是故通明合一百八句次不覺境有三謂睡眠新死少分壞一一皆有一百八句通前覺境合成四百三十二句次怨逼亦二先造覺境覺境還九先約人男於己三處各有樂等六句文中闕少計理合具此則三六成十八句一一復加隔等四句是則合成七十二句一境既爾下八亦然是則合成六百四十八句次不覺境境還有三一一同前有爾許句通前覺境總成二千五百九十二句次逼己境文中但云為賊所捉於三處行婬且約人三不須餘境人三逼己三處為九於上加樂等六又加隔等四故成二百一十六句次輕重文二一自作二教他教他三別可知問所以覆藏犯夷教他蘭罪答制有深防限分故有輕重餘相可解次三同戒五分一一舉問佛皆遣作二部僧持
