front:
  text: 四分律開宗記目次卷第一卷一本從初發題至釋藏題目卷第二卷一末從入本釋至釋分文竟卷第三卷二本從正宗首至盜戒中解物主卷第四卷二末從解處門至初犯竟卷第五卷三本從十僧殘至二不定卷第六卷三末從三十捨墮初至竟卷第七卷四本從九十波逸提初至第三十四卷第八卷四末從同第三十五至七悔過法卷第九卷五本從尼律初至初戒卷第十卷五末從摩觸戒至尼律竟卷第十一卷六本從受戒犍度第一至第三赴説中堪授法樂卷第十二卷六末自授諦法至釋三皈文竟卷第十三卷七本從羯磨受戒至説戒儀軌卷第十四卷七末從犍椎釋至安居犍度第三卷第十五卷八本從自恣犍度第四至藥犍度第七相和卷第十六卷八末從相和釋文至瞻波犍度第十卷第十七卷九本從呵責犍度第十一至遮犍度第十四卷第十八卷九末從破僧犍度第十五至滅諍犍度第十六卷第十九卷十本從尼犍度第十七至流通分五百集法卷第二十卷十末從七百結集至律藏竟四分律開宗記目次終
