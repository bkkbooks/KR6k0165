body:
  text: 西太原寺沙門釋懷素撰次下正宗然此宗文由何起者但以凡百僧尼非一名姓報殊心異志樂不同有漏過生蓋因名利略教被壞人𨷂奉持何期釋衆亡依戒珠潛曜空希出離律寶韜光是以無上法王大悲普濟寄因啓請興立此文欲使犯與不犯煥矣分明重之與輕昭然可鏡斯則五犯分位三有停輪二持別流四果修證意唯若此故起正宗正宗之文開之為二初二部戒本止持行相第二犍度已下作持行相前文復二一大僧止持二尼衆止持釋二止持兩門分別一僧尼離合二僧尼先後言離合者問大僧與尼齊希出離俱是具戒犯聚無殊何以二衆五犯別立答過興在人患生不等戒防斯過故有少多是則多少差別輕重不同有無互缺犯同緣異以斯別狀不得合辨問兩衆具戒數有多少二位沙彌何以齊十答具位滿足防過使周對過立戒故有多少二衆沙彌亦應不等以同方便且制十戒又解兩衆沙彌亦同二具隨過差別立戒多少所以知者以諸戒下皆結罪故若爾何不具彰五犯答人是不滿正唯制十進修義同咸皆結罪故十數外和上應教既已應教明亦同等次先後者問大僧戒相所以先明尼之禁防何以後說答為表丈夫護持建立功強於彼是以先明又復兼是師徒兩異出家先後故所以爾次釋比丘止持於中文八謂初四夷乃至七滅諍於此八中束為五犯謂二提合衆學七滅合不定未定故但為五若解此五須為二門第一總解第二別明於總解中須釋五犯等義但為初依戒者尋文未周直聽懸言不能領悟故釋大僧戒已至尼律初演此玄章方知旨趣庶得僧尼俱益新舊咸開進修軌儀於斯畢矣自下諸義改換皆然不能於中別更申意次隨別釋先解初犯於中復二一總二別總中十門分別第一起由三毒第二身語成犯第三自作教人第四犯境寬狹第五尅漫不同第六錯誤有異第七明其立意第八次第之相第九下衆任運第十定業招報初門准毗婆沙一百一十六不善業道一一皆以三根為加行若論成者淫盜二戒由貪究竟斷生命者由瞋究竟妄語通以三根究竟淫三起者優婆塞戒經第六云若人自樂行非梵行是名從貪淫怨眷屬是名從瞋於所生母作非梵行是名從癡而並境悅暢思由貪究竟盜三起者自為己身妻子眷屬貪他財物而往劫奪是名從貪盜怨家物是名從瞋劫奪下姓是名從癡故俱舍云謂諸王等依世法律奪惡人財謂法應爾無偷盜罪又婆羅門作如是說世間財物於劫初時大梵天王施諸梵志於後梵志勢力微劣為諸卑族侵奪受用今諸梵志於世他財若奪若偷充衣充食皆用己財無偷盜罪此等要有所顧皆貪究竟煞三起者若為貪故害命是說從貪若煞怨家是名從瞋煞老父母是名從癡故婆沙云虎豹豺狼蜈蚣蛇等傷害於人煞之無罪父母衰老及胄痼疾若能煞者得福無量此無所顧皆瞋究竟妄三起者若為財利自受快樂是名從貪為壞怨故是名從嗔若畏他死是名從癡故婆沙云諸為自他身難命而妄語者不得妄罪然成業道亦由貪等以貪等現前此業成故又增三云有三種妄語得夷貪恚癡又云身恚口恚身口恚舊釋妄語貪癡起成妄語規利瞋非順情故無瞋心發思成業此是傳者之言不依聖教義既違文不勞別破第二門身語位二前三局身第四唯語淫戒形交非身不辨煞盜身犯語有造義如教人呪物等妄語稱聖非言不宣身有造義如作書現相等第三門自他位三淫戒自重教輕教人為非樂在前人故能教者但獲蘭罪煞盜損他自作教人損境無殊彼此俱犯於中唯有能所二心不稱無期有差脫者有犯非犯准文可知妄語教人稱己得聖名利屬我即能重所蘭若泛教人彼自稱聖名利推彼即所重能蘭因此泛明自他能所輕重犯不可為四句一自重教輕初淫戒是二自輕教重犯教僧漏失是三自他俱重如煞盜等同犯四自他俱輕如教不學吉等若犯不犯亦為四句一自犯他不犯如自販易是二他犯自不犯如使尼浣故衣是三自他俱犯如煞盜等是四自他俱不犯如教進修是第四門寬狹位二淫該四趣故所以寬餘三局人故所以狹良以淫欲之性順情內逸但得正道暢適無殊不簡境之美惡詎問人與非人又以死尸犯故不由損境何容計境優劣致犯階降者歟又通自境如弱脊類餘之三戒損在前境趣別報殊增微不等故人犯重餘趣便輕義准人境四戒並得夷𠎝非天便有夷蘭二別畜生階四夷蘭提吉第五尅漫者此之四戒同境論者尅之與漫俱犯夷罪此中同境淫戒約道餘者局人為淫約道不就趣分不可例餘同為尅漫若通餘趣作尅漫者須除淫戒約下三作然下三戒如其大漫隨三趣境重輕結罪若也專尅各相應犯或若差互俱成方便第六錯誤者錯誤約戒位可為三第一以二對淫戒錯誤俱犯重為淫約道不就趣分但得正道暢本業思縱境交涉亦成其重故文言道疑道非道想夷第二對下三戒若其餘趣境上錯誤俱不犯以於異境本無心故若對人境誤犯錯不犯以其誤無兩並不得云無心故誤故下文言男想盜女物佛言波羅夷煞誑亦爾錯據無心故不成犯如欲墮胎母死之類問若此誤犯錯不犯者何故人言椽梁等誤墮不犯答此實是錯誤聲說故爾者如何下文說惡語欲向此說錯向彼說一切僧殘答此實是誤錯聲說故又解錯誤二門各通犯及不犯但使有心成事無問錯誤俱犯故文言男想盜女等佛言波羅夷此是誤犯下文說惡語欲向此說錯向彼說一切僧殘此是錯犯若其無心成事錯誤俱不犯如文椽梁等誤墮不犯又僧祇第四云欲害前人誤害中人得越毗尼又十誦五十一問頗有比丘虗說聖法不得波羅夷耶答曰有比丘欲說須陀洹果誤說斯陀含果乃至欲說阿那含果誤說阿羅漢果是五分二十八有比丘欲煞彼而誤煞此生疑問佛佛言不犯得偷蘭遮此誤不犯下文與墮胎藥錯與煞母藥母死不犯及欲盜他衣錯得己衣不犯欲受蘇錯受油不成此錯不犯第三錯誤對妄語所稱法者舊云錯誤俱無犯如欲稱聖錯言凡錯稱非境如增上慢迷凡謂聖誤心非巧故並不犯此釋非理雜亂宗文如何煞盜唯約人趣重境為錯誤不論非情無主物及至妄語所稱之中乃就凡法為錯誤境若順宗文錯之與誤俱就衆多聖法上作若同聖法還是誤犯錯不犯故大妄開文云欲說此錯說彼不犯又伽論第八云若比丘欲說須陀洹果而說斯陀等果犯何罪答偷蘭遮或同後解通犯不犯第七立意者如大集經第三十佛告頻婆娑羅云大王汝之國法何名大罪王言世尊我之國法有四重罪一者斷他命根二者偷至五錢三者淫他婦女四者為五錢故大衆王邊故作妄語如是四罪犯者不活佛言我今亦為未來弟子制是四重又為比丘制增戒學有其二意一欲令斷三不善根故阿難答孔冠言世尊為欲調伏貪欲瞋恚愚癡令盡為諸比丘制增戒學所以爾者凡興聖制為除患本患本雖多要謂三毒為此貪等恆能引導諸不善業故須制斷問戒能防非不斷煩惱何以乃言對之立戒答理實戒但防非不斷煩惱然由戒故定慧得生推功歸本故言對制又解文言調伏貪等者但是制事不起名為調伏不是要斷名為調伏二為招生十利功德文證可知第八次第者易為喜犯建在初明非直此文殘等類爾故僧祇云初戒成道五年冬分第五半月十二日犯即是十月二十七日餘之三戒並是成道六年冬分盜戒第二半月十日謂是九月十日煞戒第三半月九日謂九月二十四日妄語第四半月十三日謂十月十三日以此文證足彰次第問此為喜犯淫戒在初五十如何以煞為首答古昔多解皆不允當今申正義智者應思但以五十等戒不假犯請依本業道以煞為初具戒興廣必待犯請喜犯前明淫戒居首第九任運者如沙彌時教人作煞盜乃稱己得聖已便受具戒然受具已前事方成能教任運犯三夷罪若論自作唯局不善今取教業通餘二性若其受戒未竟所教事成即是邊罪難人不發戒品若受戒竟戒罪俱得以善因圓惡業滿故是以十誦五十一云未受具人盜心取是物未受具戒時離本處得突吉羅次句未受具人取受具時離處吉次句未受具人取受具人離處夷次受具時作方便取有二句一吉一夷次受具竟取復有二句初句夷次句受具戒人取非具戒人離處蘭以此證知有任運犯淫教獲輕故無任運第十招報者戒律威嚴開神益物行之軌則熟不遵修良以業道多迷不懼淪溺縱此愚情違犯者衆今依聖教示以重輕存理行人特宜崇奉然具足戒禁勤七支此且明四義應通舉一一支中皆感三報故婆沙一百一十三云諸欲邪行若習若修若多修習生那落迦傍生鬼趣是異熟果從彼處歿來生人中妻不貞良是等流果彼增上故所感外物多有怨竟是增上果餘六業道異熟皆同以悉遍於三惡道受諸不與取來生人中財寶遺乏是等流果所感外物有灾有患多遭霜雹塵穢等障是增上果諸斷生命來生人中多病短命是等流果所感外物皆少光澤不久堅住是增上果諸虗誑語來生人中多遭誹謗是等流果所感外物多諸臭穢是增上果諸離間語來生人中親友乖離是等流果所感外物多不平正丘陵坑坎險阻懸隔是增上果諸惡語來生人中恆聞種種不如意聲是等流果所感外物弊鄙惡毒㓨砂礫雖有金等少而無光不調難用是增上果諸雜穢語來生人中言不威肅是等流果所感外物時候乖變速疾磨滅多不成實是增上果優婆塞經亦然不能具述七善業道翻此可知自下別解初戒有四一制戒意二釋戒名三具緣成犯四𨷂緣之義此之四義並有通別下諸戒等皆同於此通制意者多論第二有四義一知先作無罪得除憂悔二以因之結戒滅將來非法三以佛結戒知罪輕重有殘無殘可懺不可懺決將來疑網四以招生十利功德此當律中制意文證可知別制意者淫欲之性體是鄙穢愛結纏心耽感難捨為則沉淪生死不絶禁則出離涅槃可期是以如來大悲方便為制此戒防過之源二釋名者亦有通別通者是戒能防之行別是不淨行所防之過能所通舉故曰不淨行戒三明具緣通緣有三一是大比丘簡非戒所被者以文云若比丘故二制廣教後以初作人教未攝故三無重病壞心以狂等人聖開不犯此之三義該括上下故了論云若人已受大比丘戒若如來已制此戒若人不至癡法是人則犯僧伽胝施沙罪於餘略說相亦如是別緣具四一有正境二有染心三起方便四與境合若為怨逼亦具四緣一有正境二為怨逼三與境合四者受樂此戒通三別四七緣成犯四𨷂緣者若𨷂通緣全是無罪或可𨷂初及第三有罪即七方便中𨷂緣方便是次𨷂別緣𨷂初二蘭謂非道道想非道疑若𨷂二三兩緣無犯𨷂第四緣輕重二𨷂怨逼𨷂緣比說可解論其方便𨷂通有一𨷂別有四通別合五次釋文者了論偈云解戒五相九毗尼釋曰如諸佛所立戒於一一戒中應了別五相一緣起二緣起人三立戒四分別所立戒五决判是非此中緣起者謂由飢餓難事為緣起起緣起人者是須陳那比丘立戒者若比丘等分別所立戒者此中何者為比丘等决判是非者此中比丘於三處犯波羅夷乃至說戒究竟若人能如理了別此五相義此人必定能解依此論釋亦是一途然今隨義別分為二第一從初至最初犯戒漏生壞略即上若犯有漏法第二自今已去下制廣補略即上然後結戒前文復二第一至呵責已漏起呵責第二告諸比丘下彰過違略前文復二第一至號為種子明其犯相即是漏過第二須提那下發覺呵責前中文四一標化處二出犯人三明犯緣四正明犯對此初戒分文既然已下諸戒貫通類爾初住處者示化有方即是犯制之處爾時世尊上已明訖毗舍離者毗奈耶云秦言廣博然毗舍離名少訛梵音正曰吠舍釐多論第一問契經阿毗曇不以佛在初獨律以佛在初答曰以勝故祕故佛獨制故如契經中諸弟子說法有時如釋提桓因自說布施為第一何以故我以施故得為天王所願如意佛言如是有時化作化佛化佛說法律則不爾一切佛說是故以佛在初有如契經隨處隨決律則不爾若尼中有事不得即結必當出外若白衣邊有事必在衆結若聚落中有事亦在衆結若於五衆邊有事必當比丘比丘尼邊結是以佛在初次犯人迦蘭陀村者多論以鳥名之有云聚落主名見論第六是山鼠名時毗舍離王將諸妓女入山遊戲因眠樹下樹下有窟窟中毒蛇聞王酒氣出欲螫王樹上有鼠鳴喚覺王王覺免害以鼠恩故即封此村供奉此鼠因鼠號村故曰迦蘭陀村村中一人有金錢四十億王賜長者之位即以村名為長者號然須提那子者言中倒也應云迦蘭陀子須提那故次文云時迦蘭陀子善見云須提那者是迦蘭陀長者子五分亦云迦蘭陀子名須提那須提那者多云求得為求請神祇得故了名善與饒財者多論有二一衆生數財謂奴婢牛馬等二非衆生數財謂金銀七寶等此並無量故曰饒財多寶此人聞法悟解厭俗囂塵抱信歸依情希出益故曰持信等五分云須提那聞法歡喜即作是念如我解佛所說夫在家者恩愛所縛不得盡壽廣修梵行出家無著譬如虗空我今寧可以家之信出家修道多論第二云夫出家者為滅垢纍家者是煩惱因緣是故宜應極遠離也次犯緣文二一遠緣二近緣文三初舉穀貴乞難生念由起二須提那下生歸家念念欲弃其兩損而就二益三作是念下如念歸村近緣文二初舉財勸三勸三拒一文廣出餘二略易第二其母使捨下舉色以勸從而弗拒問此須提那情既樂道何故乃答母云我能為之答見論念言我不與種終不置我日夜相惱我暫與種令其心息不復嬈我我因此故得住道門修習梵行由此思念故曰我能問須提何以拒財而受色答財勸長時背道故拒色勸暫時在道故受次正明犯文中有二先正犯者以未制前不見欲穢此文理通一切諸戒未制廣教不知行欲同於死人擯出衆外雖預道門生緣未絶因希利故漏過便生問既曰三行何以言初答以未制故故伽論第三云作衆多淫佛言未制戒時須提那犯罪一切時不犯次園中下彰欲之過五分云時兜率陀大威德天命終受胎爾時地神告虗空神言迦蘭陀子於未曾有僧中作未曾有事展轉相告乃至梵天超過學表勝出獨絶故曰尊者種子次明呵責文分為二初比丘呵第二世尊爾時下如來呵責前文有三初至故愁耳發覺得實為呵之緣第二諸比丘下顯類以事啓尊前文有四一歎須提那先時解行事皆通練故曰無事不知無不遵奉故曰觸事皆行非直自行亦能導物故曰轉教於人第二爾時下作過愁憂內心焦惱第三諸同學下見愁檢問先正問愁故云汝何愁憂次問愁之所由汝既解行具足必應無憂今乃翻愁當應厭道第四須提那下答愁所由先申樂道之情故云我甚樂梵行次近在下申愁所由次呵責文三初總舉不應汝於如來清淨法中能斷欲等是汝所應云何乃作如是惡事第二於如來下別呵不應舉是反顯欲者五欲於此五欲不生欣求故曰無欲垢者穢濁能汙淨心故名為垢此有其六惱害恨諂誑憍能永除滅故云無垢一切衆生渴於五欲渴由愛生故名渴愛比丘守戒正念現前渴愛自除名為能斷破壞巢窟古舊𥼶云人天生死在上喻巢三塗生死在下喻窟集因既亡苦果隨喪故言破壞巢窟至下受戒揵度中𥼶巢窟云諸天在上如巢人居於下名窟此𥼶隨情違背正理今解不然謂居止處皆名巢窟故婆沙五十二云欲界窟宅所攝藏故名欲界繫色無色界應知亦爾結謂九結縛謂三縛結縛非一故名為衆以除結縛能得愛盡涅槃又可愛謂三界愛盡者是滅由三界愛盡能顯涅槃故曰愛盡涅槃其涅槃是梵言此云圓寂婆沙二十八有多解問云以何義故名曰涅槃答煩惱盡故名為涅槃復次三火息故名為涅槃復次三相寂故名為涅槃復次離臭穢故名為涅槃第三汝今云何下總結不應經久為故正偶為二故曰故二次白佛者見論第六云心不希佛獨譽於己亦不令佛賤薄遣須提那出又不以此惡法鬪亂但依實理白世尊言今垢法已起願為聲聞弟子結戒次佛呵中文分為二初則撿問自言第二爾時下正辨呵責前文有三一集衆僧二明撿問三辨自言初文以此因緣者謂因須提犯戒比丘啓白故曰以此因緣集諸比丘者多論第二有五義故集故集一佛現不自專輒二共衆籌量而後結戒令犯罪者心伏三佛雖自在為持法故凡有法事集衆共和法得久住四為肅現在將來弟子凡是僧事不問有力無力要問衆詳議不得專獨五諸佛法爾不獨一佛次撿文二初舉應問之法次則依法而問初應問法文有三句知問者謂因比丘啓白知問佛一切智常知是非現同不知而作疑問多論四益一順諸佛常法二順自言治法三令衆生安穩不生怖懼四順於大人聖主儀體知而不問者如來不以己之知見輒說人過證言是犯准翻前益須有四損一不順佛常法二違自言治法三令衆生怖懼不安四逆說人過非大人儀體雖因比丘啓白而知若不應時亦不疑問是以次明時問不問時而疑問有三種時一是對衆撿問時二是犯者自言時三是因此制廣時時不疑問亦有三時一非對衆撿問時二非犯者自言時三非因此制廣時又解時者謂因比丘啓請知問即是時而問此時不以己知而問故曰時而不問雖復應時呵責制戒若不順義愜情亦不疑問是故次明義合不合然此知之與時而問名為義合知之與時不問名義不合次正問可知次自言者問佛作疑心不定而問何不拒諱便臣伏邪答五分第一云諸佛常法有五百金剛神侍衛左右若佛問三返不以實答頭破七分情有所懼不敢拒諱次呵文三一總舉二別列三總結總舉者經家總牒世尊呵詞其無數言即下者是次別有二初顯須提行有違失所作不應二告諸比丘下舉過示僧齊防法衆前文復二一明行有違失二執作事不應初違失者總顯作非故云汝所為非乖作軌則故非威儀沙門性是無漏聖道造惡違彼故非沙門所作垢穢名非淨行作既違教故非隨順總結非理故曰所不應為次作不應可解次下舉過誡衆其文有二一顯過失尤重二執作事不應顯過文三一舉事中損益勸令捨順行違二何以故下釋成勸意三何以故下釋墮所由先解初句多論有七義一毒蛇所害害此一身女人所害害無數身二者毒害報無記身女害善法身三者毒害五識身女害六識身四者毒害得足僧數女害不足數五者毒害得生天上人中值遇賢聖女人所害入三惡道六者毒害得沙門四果女害正使八正道滿於世間猶如大海於此無益七者毒害人則慈念而救護之女害衆共棄捨無心喜樂天龍善神一切遠離諸賢聖人之所呵責以此損益理殊浮沉事別是故勸汝犯毒不犯女人次釋勸意何以一言順違兩責第一何以勸犯毒蛇毒蛇雖有暫時現苦而無來獄長時之殃故言不以此緣墮於惡道第二何以不聽犯女犯女雖有暫時現樂必招來獄長時之殃故言身壞命終墮於惡道次釋犯女墮獄所由文中有二第一正彰欲過第二舉喻顯過初彰過者總彰過源令永除滅故曰說斷欲法欲想者思女之心欲念者追境之意欲熱者欲火所燒愛結者明愛繫縛不為彼溺稱云越度次舉喻者欲燒善心故言如火欲焚戒手如把草炬復損戒身如樹繁果欲樂不久猶如假借欲無實味猶如枯骨欲集衆患其如段宍欲樂不實如夢所見欲傷戒足如履鋒刃欲消衆善如新瓦等欲性可懼如毒蛇頭欲害善盡如輪轉刀欲感危報如在尖標欲傷迅速如利戟㓨欲患至極故曰甚可穢惡佛所呵責結歸教主次執事如上第三總結可知次彰過違略告諸比丘者顯過同知須提那者彰罪別屬癡人者見論佛見須提已作惡法以慈悲心而言癡人如慈父母見子作惡亦呵罵其子癡人何以作如此事問世尊煩惱及習皆已斷除何以乃云癡人耶答世尊惑習雖盡然有似愛等言為利益事故呵癡人如今親教及軌範師若有近住依止弟子起諸過失便呵責言汝為癡人世尊亦爾問佛呵癡人有何義趣為從癡生名曰癡人為癡現行說為癡人婆沙十六解云從癡生故故曰癡人爾者亦從貪恚慢見等生世尊何故唯言癡人答癡遍行故若佛知呵阿羅漢等以為癡人於物有益即亦呵彼以羅漢身亦癡生故又解現行癡故名曰癡人阿羅漢等亦現行癡不染無知猶未亡故問諸餘煩惱亦有現行何故唯說癡人非餘答前已說言癡遍行故多種有漏處者開諸漏門漏源滋長多論云須提那於劫初來未有男女作淫欲事而此人於彼最初行淫作惡法根本今佛法清淨未有非法而須提那最初為惡作將來非法罪過之始故言開諸漏門最初犯戒違略之始略教被壞次下制廣其文有三第一舉宗標制第二集十句下制利功德第三欲說戒下正明立制此戒既爾諸戒類然初文舉制時分從茲已後故曰自今已去以因一結教網普霑故曰與諸比丘定犯輕重位別防非各有分局稱為結戒問一切善法不言結何以但言結戒多論解云戒是萬善之本但結戒即一切結也又可戒為止惡兼立犯名故結餘善不爾故不云結對此解義六門分別第一制廣補略第二制除障道第三制託緣別第四制緣多少第五制教所詮第六制意老別初門佛初成道啓化之元恐入法人心無所寄故先說略示行軌模利根奉修無所缺犯鈍根不悟違略起非令教毀壞名為教缺然即違教成犯汙本所受令行不淨名為行缺是以如來慈悲護念為制廣教順於略教今使二教相順相成還令略有被時之用義同補教既聞制廣呵責示過識相護持資成不斷晈潔逾前名為補行又可悔己所犯不能為因未來苦果畢竟不受還令戒淨亦名補行故上文言若有犯有漏法者然後世尊為諸比丘結戒斷彼有漏法故第二門然障道業雖復無邊要而言之有其二種所謂性遮言性惡者如煞盜等無問聖教禁以不禁損害深重作則是違體是不善名為性惡言遮惡者如房壞等體非不善但以事務紛動能障修道立制防之名為遮也此言遮性就事以辨若論罪名悉是遮惡以未制前作而無犯由聖制後方結罪名亦可一禁已後違教處齊下沉義等俱稱為惡又貪嗔癡能障聖道佛為斷彼制增戒學如文可知第三門教不孤起起必託緣緣境雖衆要唯三性謂善惡無記託善結緣興者如因論義女人說法同誦輒教䨱頭人等如斯之輩事雖是善亦乖聖意生過不輕是以如來立教防耳託不善緣興者如煞盜等性是違害託此能起諸不善行是以興教防此不善託無記緣興者謂掘地等事雖無記業務紛動多障修道制不聽為息彼紛動終階道益然准伽論起犯之心亦通三性故論第一問頗有善心犯不善心無記心犯耶答有云何善心犯戒如新出家比丘未知戒相自手淨地採花結鬘此善心犯戒云何不善心犯戒佛所結戒故犯云何無記心犯戒佛所結戒不故犯問准依此義犯通三性如何下文犯諍無善答下文據犯戒理實無善犯此為興教緣故得通三性又解下文定犯諍不得有善犯然約起諍心亦得有善犯故文言比丘以善心言諍中事作等第四門制必託緣事假犯請要藉十緣聖方興結一假先請已許身子漏起制故二是比丘謂被大僧非餘衆等三起漏過謂犯淫等一一自分四須舉發若不舉發無由撿獲五佛在座事歸教主要佛自結六集衆僧共衆籌量法得久住七對衆問若不撿問恐有阿濫八得自言為得自言心伏罪故九須呵責若不呵責無似顯非十局最初以最初人教未攝故此十具滿聖方興結若緣少虧抑而未許此之十緣位言興也或有闕者義准可知第五門然假緣具義教得興者教不虗設必有所詮所詮是何謂有其四一犯二不犯三輕四重指文可知作過緣具汙本受體名云為犯善興義順受體光暉名為不犯方便為輕究竟為重亦可五犯相望前重後輕此四句中各生二行如具五緣成煞名為犯法於此犯法生二行者若依五緣煞事成就即名犯行謂順犯法成違聖制意若識五緣止惡不作名不犯行即違犯法成順聖制意以不犯法謂止作二持若其䇿勵進修成不犯行懈怠不學即成犯行問己有犯法成不犯行何須不犯法成不犯行答犯法成不犯行但是止持不犯法成不犯行自是作持又問己有不犯法生於犯行何須犯法以生犯行答不犯法生犯行但是止犯犯法生犯行自是作犯次重生重行者如三時俱重受樂䨱藏不可懺等是重生輕行者謂八業中下之七業及無䨱心可從緣悔等是次輕生重行者如打佛羅漢重惑業等輕生輕行者如輕心掘地等第六門結意萬差理非一揆略而言之舉要有八一深防二限分三譏過四稀數五約相六示過七心境八內外言深防者過未至極預結重名禁微防著以護根本如防四獨飲用二蟲染心衣食搏脫藏等言限分者制未至極意存力分力未堪行雖作不重如尼漏失比丘摩觸及䨱夷𠎝境差𨷂等言譏過者戒能防非體性清潔至於持護須離嫌疑如與女人屏露二坐同宿行說讚指食等言稀數者犯雖藉境境有易難心則慢殷結罪重如盜煞天二衆語歎身造房壞生掘地言約相者過損理違道俗俱耻為患既深寄事興結隨相雖多略舉其四報時處事立制不同言示過者雖有犯名未顯罪實先標過緣使得聞見如唱調達大妄無根飲酒畜寶非沙門等言心境者犯不孤起託境開心或制從心或制從境如淫酒戒制心從境人非人等制境從心言內外者犯不自成成由緣集因藉萬差要唯內外如淫為內摩觸為外食藥為內衣鉢為外次明制利初句總標但以心獲蕩逸意馬喧踈於正教門靡能持護如來久積大悲不捨四智之誓因過立制皆生十利功德斯即犯過之心永遣遵戒之意常生生乃生菩提之創基遣即遣煩惱之根本然則行不自立託教而成教能出生一切衆行所生衆行何限斯十一方化儀略標二五能詮之教表彰四所之旨以之為義自下別明文中分三初有三利能生衆行次有六利能生別行後之一利能令法住以有上二衆別行成能令正法久住不滅初三利者戒能防非違即不攝順教離非名為攝取身語既攝行合崇和絶去違諍名為歡喜既能稟教永絶傾危現未泰然故稱安樂次下別利初二生善次四滅惡未信者令信見論第六云若善比丘隨順戒律威儀具足未信見之即生信心而作是言此釋種子勤心精進難作能作所作極重見是作已而生信心若諸外道見略毗尼藏而作是言佛語比丘亦有圍陀如我無異而生敬心已信者增長見論若有信心出家隨禁戒所說人見所行甚為恭敬又言云何盡形壽日止一食而修梵行護持禁戒見如是已信心增長破戒比丘惱亂僧衆內無慙恥名曰難調佛為制戒教僧責罰改惡從善故曰調順由禁無慙不得入衆清淨比丘安隱作法既不被惱名為安樂內懷不善廣造諸惡為人打煞名現在漏由佛制戒教攝身語不起現惡名之為斷現造惡因後墮地獄受苦無央名未來漏由佛制戒永絶惡因不受來苦之為斷自下法住由制廣教人得奉修攝法在己使不墜溺名為久住次明立制文分為二初明戒本說之儀則次若比丘下廣解戒本犯等四句前文有三第一對緣略立第二牒制明隨第三滿足戒本初文將欲說戒故先標引當說之文即下者是對緣略立但有四句次下明隨文中分二初明跋闍心異隨結次辨林中境殊隨結然隨意者大聖制戒本為備防違失欲使開禁顯然犯持决了若事周悉一結即定若其制相未圓更須明隨是則教法該羅行軌堅固始終流通具足故爾又復隨文文有犯不犯犯者防過未圓更須隨結如此戒異語食前食後嫌罵掘地等不犯者前制理含更須隨開如增上夢中別衆洗浴諸緣開等前文七句心異起非意欲明隨先牒前制然須提樂道可使是犯我今欣俗不應有違二彼作念下復生疑心為以厭道欣俗失戒不犯為當不失有戒可違於此犯與不犯情疑未除故言我當云何三即便下陳疑請決耻負聖顏不敢自請故仗同學陳己疑心進不聽佛故曰隨教奉行四諸比丘下為申疑滯亦同疑故所以不呵為愍彼情舉緣具白五世尊爾時下佛判是犯雖起異心以羸不捨由是比丘故在犯限然此比丘俱違廣略不同須提但違略教六是故下開令捨戒跋闍厭道既在犯限其餘羸人開令捨戒故曰若有餘人等然此比丘捨戒歸俗後欲出家亦聽在道故曰若復等為彰此人去時如法後得入道來時有益進退合儀去來應法既不越理利益重重七自今已下隨結戒本加前四句次境殊隨結文還七句一異趣起犯二時有下發覺生疑三咸共下伺撿獲實四諸比丘下舉制辨違五彼比丘下非制不犯六諸比丘下舉以白佛境非惑意故亦無呵七尊下判該禁限次滿足戒本二門分別一定文句二明通塞言文句者戒本九句一若比丘者總標僧衆別顯犯人二共比丘者明受同人齊入犯限三同戒者顯行等一四不還戒有戒可違五戒羸不悔者雖羸亦犯六犯不淨行正顯淫事七乃至共畜生出犯境界以對林中加此一句八波羅夷結罪九不共住擯治或可義求但應為六謂第二第三第四第五第六第七二二合一於理無爽若依廣文九句如上次通塞者若比丘句義該五犯文局上四共同二句義五文初不還戒戒羸不悔文雖在此義該初犯犯不淨行乃至共畜生二句文義此戒八兩九句文義初犯問共同等四何以下三戒無答此以跋闍為緣牒入戒本餘戒無緣本中𨷂有然以義准並通初犯對有難緣皆聽捨戒故四犯畏云善比丘未犯終不犯若犯都無䨱藏心如法懺悔悔既得通捨何不許又解共同戒等唯結跋闍汝與比丘共戒同戒雖羸不捨亦成其犯餘戒無此隨結故無此文餘篇雖有隨結非壞根本是故不須共同等句舊釋云欲明此戒愛心久習事難卒捨是以佛聽捨戒還家以禮自處欲使去時如法來時有益有捨可對須彰不捨下之三戒若捨戒為煞猶亦是犯捨而無益故不開捨既無捨可對故不須不捨句來共同理有既𨷂不捨相與俱無若爾對初開捨豈不失下戒答一切失若爾何以下戒無此不捨答以不對之開捨戒故此釋及問答不能順文既失旨歸前解為正次下廣解文分為二初至滅擯廣明犯相二不犯者下釋不犯相前文復二初大僧犯相二比丘尼下下四衆犯相此戒既爾諸戒類然就大僧中復分為二初至偷蘭遮成犯之相二方便下輕重相前文復二初解戒本九句文相二三種下重明戒本六七二句前釋九句文即為九位各有三謂舉釋結或有少者自是文略先解初句釋中文二初總標僧衆次是中下別顯犯人初文名為者通名比丘謂沙彌外道等亦名比丘相似者謂犯重人內實破戒威儀相貌似持戒者見論第七阿難夜行見一犯戒比丘而問咄此為是誰犯戒比丘應言我是比丘此是假名無堅實也自稱者十誦第一云自言比丘者用白四羯磨受戒又復賊住比丘剃除髮鬢披著袈裟自言我是比丘當此儉年詐來入道善來者如下釋乞求者順教乞活著割截衣者以刀割成依之進道破結使者聖解一興衆惑斯盡羯磨者舉受之教次別顯犯人若成戒本犯戒之人必以羯磨受具足戒但欲簡取犯戒之人不是為釋受緣之義第二句共比丘者諸餘比丘亦用白四受戒以受法同故名為共第三句釋中文二初勸修持行次是中下出其同義禁勒不殊名為一戒體性無別故言同戒遮制數齊稱云等戒十誦云同入比丘學法釋云如百歲受戒比丘所學初受戒人亦如是學如初受戒人所學百歲比丘亦如是學是中一心一戒一說一波羅提木叉同心同戒同說同波羅提木叉故名同入比丘學法第四句有二初解不捨二云何下正明成捨前不成捨反即成捨應下文明後文成捨反即不成應上文說但是綺文互舉不繁並明前文有七初有三句重病壞心故不成捨二有三句重病壞根三有兩句中邊不相領解准此類餘並不成就四有兩句心境不相應初句心不稱境次句境不稱心此中應有靜作靜想不成捨戒文無者略十誦云若獨捨戒若獨想不獨獨想並不成第五一句無心不成五分更有不定語嗔心強逼不成十誦又向無所知人眠人入定若隔障若自嗔若向嗔人若夢中若自不定心若向不定心人皆不名捨第六天子下七句境非所對不成七有二句業不辨了不成捨戒准此書等捨戒不成五分遣使遣書作相動手相似語不成見論亦爾次明捨戒先解其義五門分別第一總定捨緣第二明捨漸頓第三對受辨捨第四作法具緣第五所捨法體初門依俱舍第十五捨有四緣謂作法命終二形斷善作法捨者與受相違命終捨者所依捨故二形捨者所依變故斷善捨者所因斷故若日夜戒捨由夜盡有餘部立犯重捨戒及法滅時一切學處結界羯磨皆止息故迦濕彌羅國毗婆沙師言犯根本罪不捨律儀所以然者非犯一邊一切律儀應遍捨故非犯餘罪有斷尸羅然有二名謂持犯戒正法滅時雖無一切結戒羯磨及毗奈耶未得律儀無新得理而先得者無有捨理次漸頓門作法捨者約位相望通含漸頓餘三頓失然作法中言我作沙彌及優婆塞是漸餘言是頓問若或漸受漸捨或漸受頓捨及頓受頓捨此三可爾若本頓受但得具戒一無表體如何漸捨若得漸捨體便有三如何乃言一無表體答若依俱舍三體各別頓受唯頓捨無有漸捨理若依正理一師所說雖先不受五十二戒但受具者俱得三戒准依此理即得漸捨又可比丘受得防煞無表理通三人有共用義是故捨時要心捨具若與沙彌戒同隨心則在以十對五義亦同之約位差殊名之為捨望無表體不名為捨次約受門善來受戒是見法人唯有命終無餘三捨三歸羯磨具足四捨八不可過受或可唯有命終或可具足四捨以人不定義可准知次具緣門須具六緣一有所對謂同地人以邊對中等不成捨故二根具無病非聾老等三在見聞內四有捨戒心謂欣厭心决定住自性久思歡喜自有寂靜五言說辨了六前境領解次所捨法體問凡捨戒者捨何等法為捨已生戒善為因義邊為復捨彼無表戒體答不捨已生為因之義但正捨彼無表戒體以無表戒一形相續為心厭弃不續名捨以無捨緣則有得得若遇捨緣則無得得既無得得說名為捨雖可無得亦不失因義問捨戒不捨已生善者懺悔不應除已起業答善順理生惡違理起順理力強已生不捨違理力劣故可悔除又解懺本生心抑伏惡業以別對餘故得可彌捨直厭退絶彼相續不別對餘故言不捨次下釋文文分為二初厭上欣下為捨方便二便作是語下正陳捨戒前文復二初有二句立兩章門不樂修梵行是厭上門欲得還家是欣下門次厭比丘下釋成二門初有二句釋厭上門貪樂下七句釋欣下門次正陳捨文中有三初明直捨次若復下無益有益捨次若復下毀讚捨直捨文二初有十一句厭上捨次有八句欣下捨然厭上中見論第七佛有一百名號隨稱皆成捨戒法名亦爾謂善甘露法長短阿含等悉成捨戒捨僧四雙八輩無上福田等亦成捨戒此以弃背三寶所以戒失得戒本緣和上闍梨今若捨師戒亦隨失同和上等者以呹共依師得戒有心厭道隨稱皆捨十誦稱比丘等七衆亦成捨戒梵行是隨戒起修之行戒是受體律是其教學事是所防過境欣下可解次文但對上法有無益捨略無欣下有益捨文次毀歎可知第五句文二一舉章開為二門二依門解釋釋中各三謂舉釋結就釋不捨中文分為二先明厭欣在心立章及釋如上應知二便作是言下彰羸於口此中文三初舉所欣居家等法二我欲下舉所厭境捨佛法等三便欲受持下彰欣於口上來心有厭欣亦陳在口以不决定但成戒羸戒羸相者見論譬如大王無人持從復無天冠瓔珞亦不莊嚴人見不以為好故名戒羸次羸捨可解第六句五分云淫法名非梵行法懈怠法狗法可惡法二身交會出不淨是名行淫法十誦大同第七句下至共畜生者越人非人三趣最下也見論此是下極語共畜亦得夷豈況女人可行淫處者謂可捉行淫處也簡去極大極小不可捉者第八句自行絶分五分名為墮法惡法斷頭法非沙門法僧祇復云於法智退沒墮落無道果分乃至盡智無生智亦爾餘如五犯說第九句衆法絶分多論有四義一生四部天龍等信敬心故二現佛法無有愛憎清淨者共住犯者擯出三為息誹謗若與惡人同事外道世人咸生誹謗當言佛法有何可貴不問善惡一切共事四為持戒者安樂增上善根破戒者生慚愧心折伏惡心故次解六七二句犯相於中文二第一犯不孤起要由託境而成是以先明犯家境緣雖有境緣成由之造是以第二比丘有淫心下對境成犯前文有四初總彰境緣三趣之別二復有下離明三趣有五種者三於三種婦下五者各三成十五種者者雖十五未明重處是以第四人婦三處下離十五者為三十九處謂三婦童女二形者九處各有三合成二十七三種男及黃門者六處各有二合成十二彼此通收總三十九但列文中為成亦如是故約九三六二分為二易僧祇男子黃門口中狂眠等並有緣起次明對境成犯文分為四第一先明自心起犯六百二十四句二若比丘為怨家下怨逼造境三千七百四十四句三怨家強捉比丘下怨逼己境四十八句四從道下結罪分齊先明自心趣境境有其四一覺境二睡眠不覺境此二俱活覺不覺異三新死四少分壞此二俱死壞不壞殊准十誦律壞者據女根明彼文五十一云何名形壞答言若女根爛墮若乾若蟲齧翻上名不壞此四境上各一百五十六句文中覺境廣明下三合說然對覺境比丘行犯長離瘡門總三十九一一各加隔等四句是故總成一百五十六下之三境准數亦然四境合成六百二十四句次明怨逼所以須明怨逼來者為釋疑情識知犯不我先有心趣境可使境合成重我先無心但為怨逼不曾撿挍樂與不樂還同自心境合犯者教法太急事難常行故須開云怨家雖能逼身不能逼心但不受樂開使不犯先對覺境作九百三十六句瘡門長離還三十九且於人婦一瘡門上即有樂等六句樂相云何僧祇第二云譬如飢人得種種美食彼以食為樂又如渴人得種種好飲彼以飲為樂受樂亦爾云何不受樂譬如好淨之人以種種死尸繫其頸上又如破㿈熱鐵著身不受樂亦爾一一樂句各加隔等四句四六便成二十四句一門二十四十門二百四十三十九瘡門總成九百三十六句次下三境准數亦然是故總成三千七百四十四句次明怨逼己境若其具論九境逼已合有九箇四十八句文但彰一餘者略無又可論境雖多逼己義一是故不須約境離說又於己境二瘡合有四十八句文中略故但二十四又復己造他境既分逼不逼殊他造己境亦分逼不逼異文無自心作境者略也第四結罪分齊可知次輕重文四一自作二教人三死尸下壞境非境四明境想此輕重文諸戒通有然有少者自是文略文言成者夷等對違廣教如前對境成犯慈約廣明豈得此文即對略說次教人文三一比丘教比丘二尼教比丘三餘衆相教此中為明出家五衆自作教他兩業之別次壞境文二初約了心次約迷說了心七句上四壞境下三非境以非正道並得蘭罪亦可蘭據初入毛頭分齊不淨若出即結僧殘故五分第一云壞境過半時骨時出不淨僧殘不出偷蘭又善見第八云若作出精意僧殘不出偷蘭又解若於正道初入結夷後出不淨不結僧殘若於非道作道其道想初入結蘭後出不淨亦無僧殘雖境有殊結罪義一於此不可有殘非殘次迷二句若於非道迷為正道疑為正道理結偷蘭故云如是一切偷蘭遮又下文云時有比丘於大小便中門弄失不淨疑如是於股間等乃至君持口中如是一切若道想若疑偷蘭遮若非道想不疑僧殘問此與境想四五何別答此是不識境人執此半壞謂為重境疑為重境不結夷殘但得偷蘭境想四五二句是識境人本期重境乃為輕境成差迷此為重疑此為重此是境差故結蘭罪又解此實知是非道生心作道想道疑境想心迷非道為道想道疑又解此中想疑約非情外色起下約情道內色起據境雖異迷心不殊次明境想此戒及酒局境制故上三究竟下二方便次結下衆尼是具戒禁犯位同式叉是學摩那是女名謂名正學女沙彌舊云息慈者不然今云勤策勤者是比丘為勤人所策故名勤策尼是女聲中呼位非滿足故結吉羅同壞根本齊須滅擯此結餘衆諸戒通然或有𨷂者義准應知以上所作並皆違教壞行為此總云是謂為犯次明不犯文分為二初不犯等據別緣明次不犯等約通緣說別有三一睡眠無知自分明不犯開前逼己二不受樂勝進明不犯開前怨逼趣境此為命難開非梵行難一切無有淫意不作故不犯開前自心趣境次通緣有二一初故不犯二病壞心故不犯此𨷂通中二三兩緣違略之始故曰最初廣教未興故云未制戒十誦五十九未結戒前一切淫欲不犯問佛說狂人不犯何名狂佛言有五相名狂人親里死盡故財物失盡故由業人民失盡故四大錯亂故先世業報故次問心亂有五因緣為非人打故或非人怖故或非人食心精氣四大錯故先世業報故痛惱者有五種病壞心或風發故或熱發故或冷發故或三種俱發故或時節氣發故所纏者要須始終不憶是比丘故彼文言若自知我是比丘作淫得波羅夷若不自知不犯如此下文亦言實不癡狂詐為癡狂與癡狂羯磨者是名非法又此通別不犯有五最初唯開犯廣餘四俱開廣略若對諸戒以明通局此五不犯位束為三病緣一開事義俱通最初之人義通事局餘之三開事義俱局次明盜戒總解還四初明制意通意如前言別意者所以不聽為盜凡是資財形命之本人情保重戀著處深既能捨家入道誠宜永絶貪求今乃非理侵他特虧自守之行此則嘉聲不著穢迹彌彰汙染僧倫事不輕小聖慈愍極故制防之次釋名者非理損財名之為盜盜是所防戒是能防能所通舉故稱盜戒次解具緣通緣如上別緣有七一是人主物盜以損主為義物雖有主轉想及疑亦不成重故須第二有主想問想之與知有何差別答此二望境了同迷異以知唯了想通迷悟了境穴徹名之為想迷境穴徹亦名為想若作知是有主物即於𨷂緣不便又順境想文故云有主想想雖當境盜須滿五是以第三須明重物物雖滿五轉想為輕亦不成重故須第四作重物想想雖滿五無心不成故次第五須有盜心心雖念盜須起方便方便不起損主不成故須第六起方便方便雖興盜須離處若未離處屬己不成故須第七舉離本處次解𨷂緣𨷂通如上若𨷂別緣𨷂初八蘭以安雙𨷂在初緣故且𨷂境四者初句欲盜人物天物來替緣於天物作人物想二非人物人主物想三畜生物人主物想四無主物人主物想次雙𨷂四者欲盜人物天物來替是𨷂初緣就天物上復生疑心為人物為天物即𨷂第二緣此是初句次非人物替人物處復生疑心為第二句次畜生物替人物處復生疑心為第三句次無主物替人物處復生疑心為第四句次𨷂第二緣亦八𨷂罪謂轉想有四疑心有四轉想四者初句本是人物至境轉作天物想取隱復結前盜人方便故云人主物天物想取第二句人主物非人物想取第三句人主物畜生物想取第四句人主物無主物想取次疑心四者初句實是人主物而生疑心為人物為天物第二句為人物為非人物第三句為人物為畜生物第四句為人主物為無主物次𨷂第三緣有二蘭罪謂𨷂境及雙𨷂各一偷蘭𨷂第四緣亦二蘭罪而實重物轉作輕物想疑𨷂五六緣無罪或可𨷂六小罪若𨷂第七輕重二蘭通別合論具七方便次下釋文科同於上今就漏起呵中分文為二一明犯相第二時有一大臣下發覺呵責前文有四一標化處二出犯人三明犯緣四正辨犯盜緣分二初明遠緣二摩竭王下近緣前遠緣中文分為十第一覩失草菴念造瓦屋僧祇第二彼造一房種種莊嚴成已有上座來便與乃至第三彼念言我種種辛苦作房而不得住傍人常待如猫伺鼠成便見奪奈何可辨便以工巧作全成瓦屋第二時彼比丘下如念造作全成瓦屋三爾時下如來撿問四諸比丘下報佛所由五爾時下呵責五分作燒成瓦屋蘭自現工巧吉六爾時世尊下敕令打破為利無𠎝見論無慈衆生作此凡屋若比丘多聞知律者見餘比丘所用不得法即取打破無罪物主不得作是言大德已破我物應還我直七時諸比丘下順教打破八時檀尼迦下責破所由我本造房為資身用無事被破豈得甘從第九諸比丘下申破所以汝雖無𠎝我非自意但奉佛教故來破之第十時檀尼迦下述教修奉前恨比丘無事破屋今承聖旨自責甘從十誦法王教破不得有言五分云法王所壞我復何言次明近緣近緣文二第一矯施異計謬索王材然執似與之言以告守材者故曰汝知不等第二彼人言下聞王教與多少無遮次明正盜言要材者祇云王有五牧飛梯材即便取二牧持歸作屋次發覺呵責文分為三謂俗比丘及佛俗呵文二一發覺獲實二大德應死下正呵前文復二一大臣發覺撿事白王二王問取由更彰罪實初文有五一發覺得實二時大臣下責與不應三時大臣下以事啓王四王報下顯過於彼五時大臣下攝赴王所次王問文五一問與虗實二答言不虗三王索憶念四引王昔願文中有三一舉法要與而用二王立願與舊不同但願有二一聽隨意用是無主物二不得不與而用是有主物而此比丘執王隨意用言於典材邊私行盜竊第三王舉前願須告施行然多論云此是比丘垂急之語准此文中即是預施計校五王言說異次明呵責一王二庶王呵文四一明比丘犯刑至極十誦第一云王言我謂無主草木故作是說汝今墮大罪中比丘答言我出家人寄居王國云何煞我王言比丘去勿復更取如是大材王云我本所施不及有主怪哉比丘作此方便而取人物復語言我是灌頂王如何因煞沙門汝今便可速還詣佛法王自當以法治汝二明大王思念不忍三但呵責敕臣令教四為寬刑諸臣不分餘文可解第三佛呵文二先撿自言後方呵責呵中有三一舉二列三結列中有三一行有違失呵二違略不應呵三准俗制道呵此三各二一列呵辭二云何下執其所作不應以結文言五錢者現盜不淨物五錢直者謂是淨物為遮惡人兩言兼舉問何故此戒獨問國法餘三不問其義何也答由盜王財故依王法餘三不由故不依也多云此戒要依國法盜物多少得斷命罪依而結戒淫煞二戒事成罪成不問多少妄語國無此法是以三戒不問次明戒本戒本八句一人二列物之所在之處為欲遮防空有並顯此無空處緣起五分具有彼云衆多比丘作如是語佛所制戒為聚落中物非謂空地起過已乃至呵云聚落空地有何等異呵已立戒制增空地三不與者主不捨四盜心取者謂是盜心及業五隨不與取者謂所盜物隨取何等六若為王等者舉俗治法於中有二一被大臣執至王所為之言被謂被王大臣捉故言所捉此但為他執捉不是治法二若煞下始是治法由此捉有所言治有若字即是大臣是能捉人王是能治者亦可王與大臣俱是能治者故言若被王王大臣所捉若煞等又此治法舊人准祇解云若捉是王先祖治法若縛是王父法若驅出國是瓶沙王法若煞是闍王法若順治法作文應云若捉若縛若驅出國若煞而此文中談法不次或有以文錯故改從義正今詳異說實冒經文回換聖言事不輕小所以爾者以制戒時瓶沙身在子阿闍世猶未登位如何懸知後王治法而預牒入戒本中來又捉與縛若是先王治法王既崩久法不施行如何今復牒入戒本又彼文中總無闍王煞法先祖拍頭不言是捉王父驅令出城亦無有縛又彼戒本正文與此無殊如何釋者妄情乃爾今釋瓶沙王時已立煞法如上緣云大德應死以此故知國有煞法又僧祇云煞者奪其命是名為煞五分云煞者以刀仗等斷其命根十誦云云何煞我及衆人曾言此比丘决定應死呵責便放問既有煞法如何復有縛驅出國答此等治法瓶沙具施其罪輕者用餘法治罪若極者須加重法故十誦云汝今墮大罪中明知更有非大罪法此文既云五錢應死明知四錢等不死用餘治法故僧祇問王治國盜齊幾錢罪應至死盜齊幾錢應驅出國盜齊幾錢應用刑罰問所以須舉王治賦法答為盜王材被王治故不同舊云准俗制道汝是賦等是呵責言七八可解次下廣釋科與上同就比丘犯中文分為二初解成犯相二方便下輕重相前文復二初略釋戒本八句第二有三種下廣解戒本二三四五四句然前略釋文有可解於第六句中但解能呵捉人不解治法次廣釋中細觀文相亦解第五句以廣釋中有重物之言明知即是略釋之中隨不與取五錢五錢直義舊云不釋第五句者不識文意也又將第三句是物體者義亦不然以釋此句但云主不捨且欲釋主不捨未即論其物體其第五句方是物體於中文二第一合解業心主物舊以不善文意遂作順逆次第今談實義故須廢之第二處者已下釋上處問初中有四增數謂三四五六問凡增數法以一為初如何此中用三為首答夫論盜業不過自作教他然教他中有現不現為此從三為始不得以一為初若從一增收義不盡論自不攝他言他不攝自爾者若三攝盡不應更增既亦更增明知不盡既俱不盡等更須增並以未同應從一起解文中更增但增離處重物盜心論其取業此三已足由三足故以足為初爾者初位雖爾餘位云何答由初為法餘無減增故並相從以三為首又可此之增數隨舉一門不可於中浪相比決初數本中文分為二前之二三釋盜業及心後之三三解不與及物如此分文貫通下位又可此之四位准其增數並悉通解戒本三句且依前釋前中又二初三解盜業即上取字取有三種初一自盜業下二教人業以教人現前名為看取教人不現稱云遣取自無不現但云自手次三及釋盜心雖是他物己想不成故須非己物想取雖非己想暫取不犯故須非暫取雖作永心同意不犯故須非同意此三展轉反解盜心問所以盜業盜心文中結罪下三物主之上不示犯名答略也又可以二影三結義皆等更作異解不順宗文次解物主文雖有三位束為兩初之三句謂如地中伏藏主心不知故作他物之名第二三者主心知有屬主義顯故作有主之稱此之二位雖知不知別皆損正主第三三者謂是護主又更一義初三是總凡非己物即是他財然以總相難知復須離辨以他有二一損正主他即有主有主想是二損守護主他即他護他護想是總別雖三其唯二主然五分中亦有二主物屬他他所護不與而取是名盜心十誦釋主總有四句一者有守護二者有主三者無守護有我所心四者有守護無我所心是中初四兩句是護主二三兩句是本主諸律解釋雖殊其唯二主於此二主互望成𠎝財屬既殊義無俱損次增四中初之二三各增離處為成業心後之三三各增重物為欲簡輕增五之中前之二四各加重物亦為簡輕後之三四各加盜心為成正盜問所以物主至五即休業心更增至於增六解下三物主之上先有離處更增重物盜心至五即盡不至增六前之二三本中先無離處遂於本三之上更增離處重物盜心為此故須至於增六舊作具緣及濫解者便是繁雜不能具陳問所以須言非己物非己物想答以若己物作非己想縱有盜心亦不成犯故須非己物復作非己物想此二合為一句更加盜心故六問文中但云六種亦如是所以得知加者是盜心答以下增六盜心文云非己物想不暫用想非親友想重物盜心移離本處故知此文亦加盜心又下文但至增六故此文中不至七八
