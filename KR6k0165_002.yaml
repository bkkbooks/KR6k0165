body:
  text: 西大原寺沙門懷素撰稽首三際調御師無邊十方等正覺二諦真乘淨妙法四果無垢良福田性幽微調伏總教義深遠如是妙理難開悟至誠歸命請冥扶願以此業斷迷津永息輪回趣真際為利自他法久住故我贊述毗奈耶竊惟覺智圓明理絶言樞之際迷津自斷事超情域之源故乃利益萬殊非豪滴之能準汲引千計豈塵砂之所量遂乃大闡毗尼廣敷律藏故經云戒是無上菩提之持淨戒斯則登真如之政術歸實相之嘉謀譬飛階以可升若浮囊之利涉於是毀二邊鹿野導俗衆而轉法輪贊十利於龍城警法徒而宣戒品宣戒品故祛三惑而淨六根轉法輪故截四流而歸八正昔者象嚴演祕千聖果圓鷲嶺開宗六師道喪神光照於石室迦葉啓善來之機宴坐託於祇園和先通得意之路斯以五篇幽鍵類金秧而不乖七聚玉霜而必降亦謂大枝小葉取類心猿內感外機方調意馬悲夫雙林掩化千疊韜光道秩銷聲細徒落癊由此波離大德苦節冠於松篁飲光上人堅橾逾於玉石悼法雲之罷族歎慧炬之淍華顧命六通之儔撰佛三藏之旨庶使甘露垂液隨燕雨而克臻聖日流光閟蟾輝而獨朗四魔由其不測三佛何以興理在解紛義歸釋滯是使煙焰之譏遽殄恆銷正像遐宣固其宜矣首稱四分律藏初分等者然我大聖教迹有由始此仙菀終彼提河其間隨犯制儀輕重位別佛圓寂後迦葉波等乃至毱多有百餘載異人間出奇士挺生並道亞先賢位隆法將飛英振耀襲藹聯耀而毱多騰芬一朝墜頴衆師載駕五部揚鏣猶八劒之分鋒俱為利器若千燈之各照咸日光明斯乃啓九聖之宏模闢二凡之亮則煥乎總紉定慧之道非戒無以舉其綱披閲止作之儀惟律而能究其要是以曇摩護揚德化於五天佛陀明振芳猷於四主護乃瀉瓶説控文河而歸口海握珠清禁韜驪寶以掩蛇珍明即慧日將頎駐三舍而返照慈雲漸落疊五色以凝陰斯並懿德嗣其風規英邁標其水鑒由此敷暢廣濟無涯聞所未聞得未曾得題云四分律藏總顯詮名初等諸言別標分位然總詮內名義有殊何者四分即離中別稱律藏乃總內通名言四分者大僧戒本以為初分尼律已下以為二分安居已下以為三分房舍已下以為四分合茲四分成之一部此即為異餘部異餘部故五部之內一部別名言律藏者梵云優波羅懺此譯為律律則法也非法無以肅威儀梵曰比擲迦此譯為藏藏則藏也非藏無以薀文義此乃為簡餘藏簡餘藏故三藏之中一藏通稱夫執繩墨者控引斤斧之工設隄搪者防禦波瀾之險如持油為解脫之肇基若壞水生喪菩提之萌漸律之用也大矣哉所言初分等者四章建首號之為初成部之因故稱為分金言日朗寶軸星躔舒布有規標之卷目第是居位之嘉稱一即創題之上首此既首居名之第一故云四分律藏初分卷第一凡欲解釋本文先以三位料簡第一總簡藏別第二別藏宗歸第三釋藏題目言總簡者聖教雖衆要唯三種所言三者第一毗奈邪藏第二素呾纜藏第三阿毗達磨藏然茲三藏旨趣幽玄若不剖折科條理義難顯然欲解者總作三門第一釋名第二出體第三諸門分別凡解義法先須釋名以善迷名於義不了名既知已體狀須陳名體俱知方論差別先釋名者梵曰毗尼或云泥迦毗那耶鼻那夜此等皆由梵音輕重傳有訛略不得正名正曰毗奈耶此云調伏言調伏者意顯律儀調伏六根皆令清淨故云調伏是以涅槃第三云善持律者為欲調伏利衆生故又梵曰毗膩多此云已調伏當其滅義故母經第一云滅諸惡法故名毗尼又多論第二云毗尼者滅一切惡法然滅不同有其三種一能滅業業為牽生苦報謂滅破戒業非故名為滅故下文云有犯毗尼諍毗尼等二能滅惑惑是發業之本謂滅貪等煩惱故名為滅故下文云為欲調伏貪等令盡是故世尊制增戒學復云有結使毗尼多論第九云毗尼者言折伏能折伏貪恚癡故三剋滅果果是所證擇滅無為故下文云有二法得多利益未得能得等謂善犯善能除犯戒經復云戒淨有智慧便得第一道多論第七云今得成佛始體解波羅提木叉以授衆生波羅提木叉非世間法是背離世俗向泥洹門然此滅行為教所詮故能詮教亦名為滅滅行差別多種不同依婆沙一百一十九云律儀有四一別解脫律儀二靜慮律儀三無漏律儀四斷律儀此四之中但解初相後三非宗所以不釋其初別解律儀名總有四謂律儀戒般羅底木叉毗奈耶所言律者謂是法也以身語止作皆合軌儀又謂銓也銓量重輕犯不犯相故涅槃第三云知諸戒相若輕若重非是律者即不證知若是律者即便證知所言戒者謂是警策以警策身語勿令造過又謂防非防護身語離諸過失故涅槃三十四云戒者即是遮制惡法若不作惡是名持戒又婆沙三十四有多異名彼云契經説戒或名尸羅或名為行或名為足或名為言尸羅者是清涼義謂惡能令身心熱惱戒能安適故曰清涼又惡能招惡趣熱惱戒招善趣故曰清涼又尸羅者是陸義如尊者無滅作如是言我蹈尸羅階無上慧殿又尸羅者是頭首義如有頭首即能見色聞聲嗅香嘗味覺觸知法有尸羅者即能見四聖諦色聞未曾有名身等聲嗅三十七覺分華香嘗出家遠離三菩提寂靜味覺靜慮解脫等持等至觸知蘊處界自共相法是故尸羅是頭首義契經説戒名為行者故諸世間見持戒者言彼有行見破戒者言彼無行契經説戒名為足者能往善趣至涅槃故如有足者能避險惡至安隱處有淨戒者能越惡趣生天人中或超生死到涅槃岸故名為足契經説戒名為者任持一切功德法故謂持戒者任持功德不令退散如持寶尊者妙音作如是説戒名不壞所以者何如足不壞即能自在往安隱處具淨戒者亦復如是能至涅槃故名不壞般羅底木叉者是解脫也涅槃無為體離諸縛此於因中以談果稱故遺教云戒是正順解脫之本婆沙又云淨持戒者是衆行本能至涅槃故名為行然於事中謂能遠離羈縛業緣亦名解脫故涅槃第四云波羅提木叉者離身口意不善耶業又準母經第三名為最勝彼云波羅提木叉者名最勝義以何義故名為最勝諸善之本以戒為根衆善得生故言最勝復次戒有二種一出世二世間此世間者能為出世作因故言最勝復次戒有二種一者依身口二者依心由依身口戒得依心戒故名為首毗奈耶義如上已明然母經第二云能滅不善根能滅障法能滅五蓋惡行名為毗尼梵云素呾纜此曰契經舊名修多羅者不正謂佛説法契理契機故名為契經者即是貫攝之義故佛地論第一云能貫能攝故名為經以佛聖教貫穿攝持所應説義及所化生目之為經此律名之為線故文言以種種華散置案上不以線貫風吹即散法亦如是種種家出家在於佛法不以經法善攝法即疾滅又無性攝論第一云貫穿縫綴故名為經問若以貫攝及線名為經者如餘二藏亦有是義應亦素呾亦得名素纜藏答若從通義三藏俱然然以素呾纜者是其根本以是根本故得其名除非根本即闕斯稱猶如色處法處雖標總稱而即別名餘之二藏問答應知梵云阿毗達磨此云對法舊曰阿毗曇者不正問何名對法答此能對彼如行是能對法是所對行能對法故名對法婆沙第一有九大論師二十二復次以釋對法此中不能繁具略舉二三以開學路彼論問云以何義故名阿毗達磨阿毗達磨諸論師言於諸法相能善決擇能極決擇故名阿毗達磨復次法性甚深能盡源底故名對法尊者世友作如是説常能決擇契經等中諸法性相故名對法此藏亦名塢波題鑠舊名憂婆提舍者訛也亦云摩呾理迦此云本貫舊云摩得勒伽者訛然此對法差別不同依俱舍論且立二種一者勝義二者世俗言勝義者謂無漏淨慧言世俗者謂有漏四慧及諸論教此二對法既準論立餘之二藏應知亦爾謂無漏定能契實理是勝義素呾纜若有漏定及諸經教是世俗素呾纜無漏律儀真實調伏是勝義毗奈耶餘有漏戒及諸律教是世俗毗奈耶釋通藏名如開題解又世親攝論第一云何緣名藏由能攝故謂攝一切所應知義此義意言由能論教能攝一切所應知義令不失故立以藏名即是攝持義是藏義次出體者如上釋名藏例成二就二之中先解勝義勝義毗奈耶尅性是無漏戒用無漏色為體即八道支中語業命攝謂五薀中唯色薀攝十二處中法處十八界中法界攝若兼俱有同時相應亦得通五薀性十二處中意法二處攝十八界中意界法界意識界攝次勝義素呾纜尅性是無漏三解脫門即大地中三摩地性謂唯行蘊法處法界攝若兼相應俱有亦通五蘊以隨轉色為色蘊故二處三界如前所明次勝義阿毗達磨尅性以無漏慧為體即大地中慧數唯是行蘊法處法界攝若兼相應俱有還通五蘊二處三界亦如前明次世俗三藏體於中有二一約能詮教二約所詮行其能詮體通三藏教出其教體諸論兩説皆無評文今依婆沙百二十六便有正義故論問云如是佛教以何為體為是語業為是名等答應作是説語業為體若爾次後所説名句文身次第行列乃至次第連合當云何通答後文為顯佛教作用不欲開示佛教自體謂次第行列安布連合名句文身是佛教用又伽他所説頌依名轉次云何通答有於名轉有於義轉此中且説於名轉者有説佛教名等為體若爾次前所説謂佛語言乃至語表是謂佛教當云何通答依展轉因故作是説如世子孫展轉生法謂語起名名能顯義如是説者語業為體佛意所説他所聞故既有論文名等不正其所詮體別解戒體如下當辨其靜慮戒亦以色為體若有漏定三摩地為體若有漏四慧為以慧為體次諸門有七第一集藏緣起第二集藏處所第三集藏儀軌第四集藏次第第五立藏所以第六乘藏差別第七釋藏離分初門三意一覩佛涅槃聖凡嗟歎二思念結集令法久住三召命聖賢結集三藏初意者佛般涅槃三乘眼滅如來捨化六道依亡故智度論第二云佛入涅槃地六振動諸河返流疾風暴發黑雲四起惡雷掣電雹雨驟墮處處星流師子惡獸哮吼呼喚諸天女人皆大號咷而大人等皆發是言佛取涅槃一何疾哉世間眼滅又諸羅漢皆亦滅度六欲諸天乃至遍淨見諸羅漢皆取涅槃各心念言佛日既沒乃至廣説象王既逝象子亦隨法商人過去從求誰法寶偈云佛已永寂入涅槃諸滅結衆亦過去世界如是空無智癡冥遂增智燈滅爾時諸天禮迦葉足而説偈言耆年欲恚慢已除其形譬如紫金柱上下端嚴妙無比目眼清淨如蓮華如是讚已白言仁者知不法船欲破法城欲頺法海欲竭法幢欲倒法燈欲滅説法人欲去行道人漸少惡人轉盛當以大慈建立佛法爾時迦葉心如大海澄靜不動良久而答汝等善説實如所言世間不久無智盲冥迦葉受請天忽不現西域記言時大迦葉宴坐山林忽矚光明又覩地震曰是何祥變若此之異以天眼觀見佛世尊於雙林間入般涅槃尋命徒屬趣拘尸城路逢梵志手執天華迦葉問曰汝從何來知我大師今在何處梵志對曰我適從彼拘尸城來見汝大師已入涅槃天人大衆咸興供養我所持華自彼得也又未生怨王信敬殷重聞佛涅槃深生悲裂真諦法師云佛般涅槃已經七日迦葉命屬往拘尸城路逢梵志名憂婆柯迦葉問言汝從何來外道答云我從世尊涅槃處來佛般涅槃已經七日諸天人衆無量無邊燒香散華設諸供養我於佛所拾得此華以華示迦葉迦葉聞已即往未生怨所語言我須八槽願王令作王即勑作須臾而來又索良醫王亦呼來迦葉問醫於諸藥中何藥去風何藥療瘡隨醫説藥復從王索其王隨教悉當與之迦葉令醫磨藥為屑煮以為膏內八槽中即於是日報大王云佛般涅槃已經七日王聞此語悶絶而死其身炮裂遍體生瘡迦葉以王安藥槽內遍至第八命乃得全以藥勝力資王得蘇如是三告聞便即死還內八槽如前得活迦葉為説一切有為皆是無常如來示同為有現入涅槃王勿憂惱宜弘正法以答佛恩應與眷屬俱詣佛所時王與大迦葉并國臣衆屈申臂項至拘尸城王既見佛悶絶還死迦葉如前安樂槽內乃至第八王便得活佛於衣外出現雙足受迦葉禮次念結集有其三意一為付屬佛本付屬令使結集傳於末代利益衆生故智論第二云時大迦葉如是思惟我今云何使是三阿僧祇難得佛法令得久住如是思竟我知是法可使久住應當結集三藏如是佛法得久住未來世人可得受行所以者何佛世勤苦愍衆生故學得是法為人演説我曹亦應承受佛教宣揚開化二止諸惡比丘自慶得脫故下文云迦葉集比丘僧告言我先在道行時聞拔難陀語諸比丘作如是言長老且止莫復愁憂啼哭我等今於彼摩訶羅邊得解脫彼在世時教呵我等是應爾是不應爾應作是不應作是今我等已得自在欲作便作不作便不作又五分第三十迦葉告諸比丘云昔吾從波旬國向拘夷城二國中間聞佛世尊已般涅槃我時中心迷亂不能自攝諸聚落比丘比丘尼優婆塞優婆夷或劈或踊宛轉于地莫不哀號歎速歎疾世間虗空世間眼滅時拔難陀先遊彼止衆人言彼長老常言應行是不應行是應學是不應學是我等於今始脫此苦任意所為無復拘礙何為相與而苦啼哭吾聞言倍復憂毒佛雖泥洹毗尼現在應同勗勉苦結集之勿令跋難陀等別立眷屬以破正法諸比丘咸以為善人西域記迦葉在路聞已謂其日徒曰慧日淪照世界暗冥善逝遐棄衆生顛墜懈怠苾芻更相賀曰如來寂滅我曹安樂若有所犯誰當呵制迦葉聞已深更感傷思集法藏據法治犯三止外道謗故下文云勿令外道以致餘言譏嫌沙門瞿曇法律若煙其佛在時皆共學戒而今滅後無學戒者次召集意先明召別智論第二云大衆議言誰能結集毗尼法者長老阿泥盧豆言舍利弗有好弟子字憍梵波提秦言牛哂柔耎和雅常處間居住心寂宴能知毗尼今在天上尸利沙園中住遣使請來迦葉遣下座比丘喚言大迦葉等漏盡阿羅漢皆會閻浮提僧有大法事汝可疾來使禮僧已如鳥飛空到彼請集看衆寶聚是時尊者心覺生疑語言將無鬪諍喚我來耶無有破僧事不佛日滅耶使答言爾佛已滅度憍梵婆提聞已便言佛滅大疾世間眼滅我和上舍利弗及大目連今在何所答言先滅彼言佛法欲散衆生可憐大人過去次問阿難羅睺羅乃至廣説彼言我和上大師皆已滅度我今不能下閻浮提住此涅槃説已入禪現種種神變身中出水四道流下至迦葉所水中有聲而説偈曰憍梵鉢提頭面禮妙衆第一大德僧聞佛滅度我隨去如大象去象子隨爾時使者持衣鉢還僧如是等類諸處聖人聞皆涅槃亦如此説迦葉言止不須更喚終不可得虗入涅槃令世間空無福田耳真諦法師云於時四部弟子見佛涅槃迦葉未到皆不入滅迦葉既至更無所待無量聖者並般涅槃涅槃既衆無聖住持住持既無恐正法盡迦葉便語未滅者言且待諸聖未須入滅我等宜應報佛法恩結集如來所説三藏以利衆生令法久住若不從我語者得突吉羅罪如是歷語少有入滅次召衆者育王經第四云佛滅度後數千億萬阿羅漢等悉入涅槃諸天空中出大音聲而作是言佛諸弟子皆從佛去法燈欲滅大暗將至若不聚集三藏經書若諸羅漢入涅槃已佛法即滅時釋提桓因將諸天衆往迦葉所作禮白言如來之法付屬尊者尊者今當聚集法眼令千載後利益衆生爾時迦葉即於空中擊大揵推三千世界皆聞其聲即有五百羅漢應命來集智度論云時大迦葉住須彌頂撾銅犍椎説此偈言佛諸弟子若念於佛當報佛恩莫入涅槃是揵推聲傳迦葉語遍三千界皆悉聞知諸有弟子得神力者皆來集會大迦葉所迦葉告言佛法欲滅諸弟子中知法持法者亦逐滅度未來衆生甚可憐愍失智慧眼愚癡盲冥結集法竟隨意滅度諸來衆會皆受教住選得千人唯除阿難善見第一所以選擇而少一者為長老阿難故若無阿難無人出法阿難所以不得入者為漏未盡正在有學地大德迦葉為欲斷諸誹謗故不取阿難諸比丘言阿難雖在學地而親從佛前受修多羅祗夜於法有恩復是耆老釋迦種族如來親叔之子又無偏黨三毒大德迦葉應取阿難足五百數此是衆聖意也母經第三云以大迦葉遣阿難出諸羅漢答言我等集於經藏須於阿難迦葉答言阿難結漏未盡云何得在此衆諸羅漢言所廢忘處應當問之迦葉答言若爾當作求聽羯磨使人僧中準此下文及智度論等並得漏盡入結集數此文得道具如下明智度論中迦葉入定觀於大衆誰未盡漏唯有阿難不盡諸漏從禪定起牽阿難出語言汝結未盡不應住此阿難恥泣而自念言我二十五年隨侍佛後供給左右無此苦惱佛實大德慈悲合忍念已白言我能有力久可得道但諸佛法阿羅漢者不得供侍故留殘結是時阿難求盡殘漏殷勤疲極息臥就牀頭未至枕廓然得悟如日破暗通明皆具夜到僧堂磽門而喚迦葉令從戶鑰而入入已禮僧迦葉摩頂令集法藏第二門集處者謂於王舍城畢鉢羅窟故育王經迦葉告闍王言我今欲集如來眼唯願大王為我檀越王言願諸比丘終身受我四事供養尊者許可往至竹林作是念言此中多饒房舍及諸比丘或能妨雨畢鉢羅窟房舍臥具不多不少當於彼處撰集法眼是時迦葉即共五百羅漢往畢鉢羅窟爾者下文諸聖皆言當於何處論法毗尼食飲無乏復云唯王舍城可得豐足時大迦葉作白往彼準此即是王城結集如何乃言畢鉢羅窟答城是總標窟是別處故西域記云摩揭陀國正中古先君王之所都處多出勝上吉祥香茅以故謂之上茅城也崇山四周以為外郭西通峽徑北闢山門東西長南北狹周一百五十餘里內城餘趾周三十餘里山城北門佛一里餘至迦蘭陀竹園竹園西南佛五六里南山之陰於竹林中有大石室此是迦葉結集之處真諦亦云於王舍城七葉巖窟結集法藏爾者如何智度論云迦葉將諸比丘耆闍崛山中結集三藏此山在王城東北十四五里接北山之陽答教自參差未詳所以又解雖舉崛山而是上窟與山處所鄰接故付法傳云於是迦葉即辭如來往耆闍崛山賓鉢羅窟以此證知處所不別舉其總山以取別窟第三門儀軌者準下聖衆集法之中迦葉先對塢波離此云近取舊言優波離者訛也集毗奈邪藏見論第一復云波離白已整身衣服向大德比丘頭面作禮作禮已上高座而坐取象牙裝扇迦葉還坐已而問優波離隨問而答集毗奈耶竟於是長老優波離放扇從高座下向諸大德比丘作禮作禮已還復本座阿難亦爾今傳法者以此為軌十誦五十五云集一法竟迦葉次第問五百比丘言爾不各答言爾即作白二羯磨唱斷初一既爾餘下並然次對阿難集餘二藏亦爾付法傳第一迦葉告阿難言汝於今者可演法眼阿難曰諾觀察衆心而説偈言比丘諸眷屬離佛不莊嚴猶如虗空中衆星之無月説是偈已禮衆僧足即升法座而説是言如是我聞一時佛在波羅奈國鹿野苑中古仙住處為五比丘初轉法輪謂苦聖諦等乃至廣説説是語已五百羅漢飛升虗空高聲唱言奇哉無常甚大迅速如河駛流逝而不返我等昔者目覩世尊今乃言聞皆各悲泣説偈云云迦葉問諸比丘阿難所言不有錯謬皆曰不異世尊所説育王經第一云尊者陳如便作是念昔佛為我説如是法今阿難説與本無異即在地而坐説偈云云智度論云集法已竟諸天龍等種種供養雨天花香以一切物而為供養説是偈言憐愍世間故結集三法竟十力一切智説智無明燈餘義如下結集中明第四門次第者有其三義若準常塗經論所辨先經次律後論所以爾者有四義故一依説次第謂成道已即於鹿菀轉四諦輪是素呾纜藏既聞法已出家受戒修處中行是毗奈耶藏既起行已復為分別蘊無我等是阿毗達磨藏二約所犯故婆沙第一云未種善根者令種善根説素呾讚已種善根者令相續成熟説毗奈耶相續已成熟者令得正解脫故説阿毗達磨三據結集故出曜及智度論等並先集契經次集戒律次阿毗達磨四就根本契經是本故須先明戒從此生慧方得起第二解者此律五分善見先律次經後論何意不同亦有四義一約法住謂毗尼教住佛法方住是故於先結毗奈耶藏故善見第一大德迦葉問諸長老為諸説法藏毗尼藏耶諸比丘答言大德毗尼藏者是佛法壽毗尼藏住佛法亦住是故我先出毗尼藏二依起行凡是起行之來戒行居首教既詮行故律在初三據制異謂毗奈耶藏勝故祕故佛獨制故勝餘二藏是以先明故律毀毗尼藏波逸提毀餘二藏突吉羅四約所被謂毗奈耶藏唯被內衆是以先明餘二不爾故次居後如上釋義皆依此解唯所以門作前次第第三解者若就勝劣明其次第是則先論次經後律對法詮慧種智之本定能證心因慧而起戒伏身語由定能防第五門所以者為對所犯生信起行見法不同故立三藏謂就末信勸令生信信已起修除修顛倒起修非耶能證真理即是未入法者引令入法為欲斷除所犯有情種種法中起猶豫故為除此立素呾已入法者勸捨二邊謂在家人受諸欲樂外道等輩徒自苦形二過乖中不能趣聖契中思惟便獲果證為離二邊立毗奈耶道迹既現諸見永亡即除耶人六十二見為除諸見立阿毗達磨世親攝論第一云復由何緣建立三藏由九種緣謂為對治疑惑立素呾藏者於彼彼義中有疑惑者即為決定宣説彼彼義故為對治二邊受用立毗奈耶藏謂遮有罪著欲樂邊受用故及開無罪不自共邊受用故為對治自見取執立阿毗達磨藏顯照諸法無倒相故又能説三學故立素呾纜藏能成辦增上戒增上心故立毗奈耶藏謂具尸羅即無悔等漸次能得三摩地故能成辦增上慧故立阿毗達磨藏謂能決擇無倒義故又能説法義故立素呾纜藏能成滿法義故立毗奈耶藏謂為調伏煩惱勤修行者便於此二能通達故能於法義決擇善巧故立阿毗達磨藏由此九緣許立三藏又此皆為解脫生死此復云何能得解脫薰覺寂通故得解脫謂由聞薰習心故由思覺悟故由修奢摩他寂靜故由證毗鉢舍那通達故能得解脫第六門乘藏差別者謂佛隨機教門匪等教門雖多莫過三藏以三藏攝義無不周由從如來清淨法界本智所流義分三故故知三藏攝法斯盡是以婆沙第一云諸佛出世皆説三藏謂素呾纜等無有差別所以者何一切佛教從一智海之所生故隨一覺池之所出故等力無畏所攝受故同一大悲所等起故或有差別隨義離三故云其三藏者亦有差別且名即差別謂此名素呾纜等復次為詮增上心等亦有差別復次所顯亦有差別於素呾中次第求故謂此品無間宣説彼品毗奈耶中緣起所顯謂佛依何緣起制立覺處阿毗達磨中性相所顯謂求諸法真實性相不應求彼次第緣起或前或後或無緣起俱無過失復次等流亦有差別謂素呾是力等流毗奈耶是大悲等流阿毗達磨是無畏等流然據三藏能所詮異是則三藏互不相攝如諸律中雜詮定慧此雜詮處即餘二收餘二亦然互不相攝若約三藏部分通明是則一一藏中含餘二藏如律所明非直詮戒義亦兼明定之與慧餘二亦然咸有通義門此既通詮如何藏攝答約宗所詮唯局於戒定慧二種相從故明婆沙第一解云依增勝説謂毗奈耶詮戒增勝縱明定慧劣而非勝此藏既爾餘二類然問唯此三藏攝法斯盡如何諸文説有雜藏其雜藏者乃三藏外能説之人差別非一能所俱雜稱云雜藏故分別功德論第一云非一人説或佛所説或弟子説或諸天讚頌或説宿緣三阿僧祇菩薩所生文義非一多於三藏故曰雜藏僧祇三十二云所謂辟支佛阿羅漢自説本行因緣如是等比及諸偈頌是名雜藏答若約所詮三行名藏是則三藏不攝雜藏以不攝故論云文義非一多於三藏若也通論所説之法以辨三藏三藏攝彼雜藏但為説兼理事名為雜藏據理而論不離三藏爾者此之雜藏何藏所收答素呾攝故婆沙云種種雜説名素呾又此律云四合雜藏是素呾謂雜比丘事等名雜阿含雜餘經説名為雜藏又集法衆聖都集為三藏不云有四又解其雜藏者隨彼所詮即彼藏攝若詮行雜即毗奈耶若詮事雜即素呾若詮理雜即阿毗達磨問三藏雖爾二藏云何答二藏者謂菩薩聲聞言聲聞者聲是音聲謂佛説法所有音聲聞者是聽謂所化生發識聽受由聞佛教信受修行得出三界故曰聲聞故法花經第二云若有衆生內有智性從佛世尊聞法信受殷勤精進欲速出三界自求涅槃是名聲聞乘又云以佛道聲令一切聞故曰聲聞言菩薩者梵語應云菩提薩埵為言略故但云菩薩無性攝論第一云菩薩者菩提薩埵為所緣境故名菩薩弘誓語立菩薩聲此意説言有諸智者發大誓願求大菩提度有情類以此二種為所緣境既以彼二為所緣境立菩薩名即是有財釋又云或即彼心為求菩提有志有能故名菩薩此意説言菩提是所求果薩埵是勇健義行者之心為求無上正等覺故有大志意有所堪能具此勝德名為菩薩即是求大菩提之薩埵是依主釋或薩埵者此言有情即是求大菩提之有情也婆沙云薩埵是勇猛義謂未證得無上大菩提時恆於菩提精進勇猛求欲速證是故名為菩提薩埵既得無上大菩提已便於菩提勇猛心息唯覺義勝故名佛陀以能成就最勝覺故然二藏之中各有三藏故雜集論第十一云契經應頌記別諷頌自説此五聲聞藏中素呾纜藏攝緣起譬喻本事本生此四二藏中毗奈耶藏并眷屬攝方廣希法此菩薩藏中素呾藏攝論議一種二藏中阿毗達磨藏問既菩薩藏中具有三藏如何智度論第一百云迦葉將諸比丘在耆闍崛山中結集三藏佛滅度後文殊彌勒等諸大菩薩亦將阿難集是摩訶衍經又阿難善知籌量衆生志業大小是故爾於聲聞人中説摩訶衍經説則錯亂無所成辦既唯集經明無餘二法花第五云亦不親近貪著小乘三藏學者明知大乘即無三藏學者涅槃第三云以如是等九部經典為他廣説此九部中無緣起譬喻論議三經所以然者以聲聞人根淺過多須制戒律菩薩不爾得旨捨詮豈繁禁勒為道又以聲聞鈍根難授深法要立賓主方能領悟菩薩利根説即能解不須問答無論議經然智度論中唯集經者菩薩三藏通名摩訶衍法花既已小乘名簡明知大乘別具三藏涅槃對有別機不説三部文不遮有於理無違然瑜伽顯揚等據理通具如為菩薩説諸學處是毗奈經藏佛與弟子分別體相是阿毗達磨藏故瑜伽八十一云論議經者謂諸經典循環研核摩呾理迦且如一切了義經皆名摩呾理迦謂於是處世尊自廣分別諸法體相又於是處諸聖弟子已見諦迹依自所證無倒分別諸法體相此亦名為摩呾理迦即此摩呾理迦亦名阿毗達磨由此傳釋許佛滅後十二分中論議一分三藏之內對法少分通弟子説不許餘分餘藏通弟子説問二藏之內通有三乘未知二藏三乘如何相攝答據行不同三乘差別無別中藏聲聞藏收問如何聲聞藏攝獨覺乘一解以皆同證人空理故又以自利同聲聞故在聲聞藏攝爾者既俱自利同證人空是則立獨覺藏攝聲聞乘解聲聞乘者始終假教彼無此事不攝聲聞但以因中曾聞教法從遠以收聲聞藏攝爾者因時既聞教法何不菩薩藏收答以所斷修及所證得與菩薩異不得彼收問以獨覺故立獨覺乘如何不許立獨覺藏如俱舍云若本種姓必無移轉是則別應立獨覺藏又普超三昧經上卷云聲聞藏者承他音嚮而得解脫緣覺藏者曉了緣起十二所因分別報應因起所盡菩薩藏者綜理無量諸法正誼自分別覺答經據乘別名乘為藏獨覺無教不得立藏故入大乘論上卷云夫説法者具足三乘乃名三藏以菩薩説法能具三乘故是故我説名三藏經又解約行於二藏外別立獨覺藏以在因中必聞教故普超經説如前所明又闍王經中卷云何謂三藏聲聞藏辟支佛藏菩薩藏問獨覺既許別立為藏未知此藏之中亦具三藏以不答據理通明並悉具有以皆成就三學行相問何名獨覺答法花經第二云若有衆生從佛世尊聞法信受殷勤精進求自然慧樂獨善寂深知諸法因緣是名辟支佛乘俱舍十二云謂現身中離稟至教但樂思惟能自證道以能自調不調他故何緣獨覺言不調他非彼無能演説正法以彼亦得無礙解故又能憶念過去所聞諸佛所宣聖教理故又不可説彼無慈悲為攝有情現神通故又不可説無受法機爾時有情亦有能起世間離染對治道故雖有此理由彼宿習少欣樂勝解無説法希望故又知有情難受深法以順流既久難令逆流故又避攝衆故不為他宣説正法怖誼雜故但此獨覺有其二種一者部行二麟角喻言部行者俱舍云先是聲聞得勝果時轉名獨覺有餘説彼先是異生曾習聲聞順決擇分今自證道得獨覺名麟角喻者要百大劫修菩提資糧然後方成麟喻獨覺又可直依聲聞藏説亦即自具二藏三乘其二藏三乘準立可解第七門離分有者謂於菩薩聲聞藏中各有三藏是則成六若其雜藏別立則亦二教俱通以二加六合成八藏其獨覺藏攝入聲聞藏中不合立藏如前已明又可獨覺亦得立藏無部無不可分三俱總立一為獨覺藏以一加八合成九藏又解獨覺既許立藏如何不具以三足八乃成十一又若獨覺藏中亦立雜藏更加雜藏合成十二藏又若別立二藏總名謂菩薩藏聲聞藏以此加前合十四藏又以菩薩藏聲聞藏各離四外而更有彼二藏總名獨覺亦然四外有總若加此一藏成十五又可依前別解聲聞藏中立菩薩藏此菩薩藏中亦即自有三藏若加此三藏有十八又加雜藏四外立總是則合有二十藏別又可若隨景悟法蘊不同合有八萬四千差別此中具含三藏故雜集論第十一云如是三藏具有八萬四千又一一蘊中復有千數故論云總計八萬四千法蘊成八俱胝四十洛叉或約二藏離明數更倍説或獨覺藏別立亦準數增以此故知法藏難測第二門宗歸者凡定宗旨部類各殊據其所明唯詮於戒然案律文匪唯明戒義亦兼通定慧二行此據圓滿學人行增具足雖舉定慧所修而是戒學所攝故下文云云何學戒答言增戒學增心學增慧學是故言學又以受戒結勸文云汝當善受教勑修成衆果等良由戒宗行通止作故約戒學以明宗歸然欲明者二門分別第一定藏宗旨第二判藏宗文先定宗旨三門分別第一敘古師解第二問答辨非第三顯示正義言古義者昔解以止作為宗旨初二部戒本是其止門次揵度等是其作門由止故自行成由作故衆法就成其晈潔之行莫過此二即用此二以為宗歸又解以受隨為宗旨受是總發隨是別修由受總故萬行從生以隨別修令戒光潔要須此二資行成就故用此二以為宗歸又解以止惡為宗凡欲起行必先離惡惡既離已修行始成以初起行即離惡故故用離惡以為宗旨又解以教行為宗旨教不孤起必有所詮之行行不自顯藉教以明教能詮行行能成人故用教行以為宗旨然教有二謂止與作教無止作能詮止作止謂離惡如五種制作謂成善如受説等又云專精不犯犯已能悔教無斯二能詮此二故用此二以為宗旨又解以因果為宗旨謂此大文開之為二初二部戒本及以揵度所明止作二行總是其因第二大小持戒揵度即是其果以此文中學其三明五種勝復以經云戒是正順解脫之本又以受戒結勸文云汝始發心出家功不唐損即是其因果報不絶即是其果因是所行果是所欣以有果故因有可行之理由有因故果有可證之義又解制在一代人時處事前後不同一戒一經合有六百餘段此師意云世尊制戒人時處事各各不同不可於中輒論宗旨但隨別事次第解釋又解以止善為宗通説一切止作二行但離惡邊即是其止諸有策修即是其善止是能成之行善是所成行體即是身語止善當其教興之由能治戒行犯相輕重是所明行第二辨非者初師以止作為宗旨所以不立者以止作二法並是宗中所明別行既辨大教宗歸不可尊其別行第二師以受隨為宗所以不立者謂以受隨二法對初行者分行不同始終有異如何即得以此為宗又此二法亦是宗中所明別行為辨總教宗歸不可尊其別行第三師以止惡為宗所以不立者以離惡故即以止惡為宗離惡為修善應用修善為宗既不許以修善為宗如何偏欲尊其離惡又此離惡亦是宗中所離既是所離不得為宗第四師以教行為宗所以不立者以教通三行該定慧事等漫該所以不立雖舉所明止作等別以不舉毗尼之別名戒行之偏號分宗不明所以不立第五師以因果為宗所以不立者以律所明是其戒行始未戒行並是其因何處別更彰其果法雖舉五勝三明及果不絶此等皆為增進行人若不舉斯果法時人意謂世尊勸我持戒我持此戒當得何報欲令行者生欣故舉果法勸令修習即是以欣果故因有可成之理以顯其因果有可證之義義理既然是以不立第六師以時處等殊而不辨者雖則時等不同莫不為教所攝故須約教以辨宗歸第七師以止善為宗所以不立者前既不許止惡為宗如何復更取其修善然此離惡修善並是宗中所離所修謂教詮行對行離修如何尊所離修以為宗旨又此離惡修善義通三學如定除亂慧遣煩惱望修對除三學齊一如何此藏獨云止善第三門顯正義者須以戒行為宗夫論宗者取詮所顯詮既顯戒即是其宗故婆沙云奈耶詮戒又宗謂是族義尊義崇義重義此教始終崇尊戒行故用戒行以之為宗餘止作等是別明法不可就別立以為宗如法華經詮一乘即用一乘為宗涅槃詮佛性還以佛性為宗此既詮戒如何非宗謂身語止善受之與持犯相輕重因果差別此等並是宗所明法問離惡修善正順戒宗如何不許止善乃取戒行為宗答此離惡修善別成戒行既為成戒以戒為宗釋宗名者戒即宗故名為戒宗是同依釋次判宗文昔判宗文匪唯有一故今隨要略舉其二一解云聖教雖衆略開二種一者化教法門二者制教法門言化教者實以群生抱暗自俱迷於前趣雖欲勤修莫能自運是故如來啓宣因果耶正是非欲使衆生背惡崇善修因尅果此能生解名之為化詮化之文目之為教教是生解之軌名之為法法通神解説之為門言制教者蓋是如來因過禁其輕重勒於身口犯不犯相名之為制制由言顯名為制教法門如上所以知者以答請云廣説契經等即化教亦結亦説即是制教又以身子梵王二請別故今此律藏制教所收又解開宗理行二別彼云隨根布教乃有塵沙要而辨之不出二種一曰理教法門二曰行教法門言理教者蓋是如來宣己所證法性真旨顯示群機欲使安心理源開示正路冀彼返迷從正同霑已蓋名之為理教顯理之文目為理教言行教者然行不自起依理而生生乃資神名之為行顯行之文名為行教今茲戒行乃是行教法門此等開宗通簡教別簡教別已局顯所明今解開宗局明戒行戒行開宗昔解五門分別今以漸頓乃是隨中別義故今開宗總門不可釋別且就前四束為受隨方可於中就總開別故今正解戒宗有二一者受戒法門二者隨戒行相言受戒者創發要期斷惡修善建志成就納法在心目之為受言隨戒者受興於前持心後起此起順初令戒光潔故名為隨受以創發故對法要期以成隨據後起故對緣防護以立對此須明受隨分齊然分齊中教行兩別先約能詮教者謂受戒法聚尼聚少分旨歸彰受自餘等文總明隨相雖有互明所顯各異次約所詮行者舊云謂從歸禮訖至在前而去判之為受終盡一形所有二持局以為隨又解若據辨體第三羯磨一剎那前判之為受在前而去終盡一形説以為隨中間説相等事通受隨今解第三法前根本加行皆能辨體説之為受第三法後所有説相等事皆名為隨此中雖有領納但是領隨非別辨體不名為受又此非由在受座上説名為受以望法體體恆別故然就受中表與無表是其受體餘僧界等總是其緣餘受分齊類準應知問所以要須此二門者若無其受則行無所起以有受故衆行得生若無其隨便有戒羸等失以有隨故令受光潔是故須此受隨二門就受隨二門各開為兩言受門二者為彰戒法有為不能孤起要藉緣力方乃發生是以第一先明能發之緣既有其緣必有所得故次第二所發戒體言受緣者實以位階凡聖報殊男女託緣不同案文有四所謂善來三歸八不可越及以羯磨此四名義至文當解問此曰受緣緣中有四未知此是何等緣收答緣雖有四戒從二生謂是因緣及增上緣言因緣者即祈戒心過去同類通生得加行善五蘊及戒俱有法并能造大總是因緣言增上緣者體有二種一親二踈言親緣者謂和上闍梨僧衣界等諸緣於戒有力者是言踈緣者此戒生時一切諸法不障者是然緣中攝因其因通説總有六種謂能作俱有同類相應遍行異熟此六因中戒從三生謂能作俱有同類然於能作因中分為二分一分踈者是增上緣一分親者如能造大及餘二因是因緣性俱有因者戒望能相得互為果同類因者此初念戒從過去同類因生第二念已去即從初念及過去同類因生問餘之三因亦因緣性所以非者是善故非異熟因非染汙故非遍行因非心法故非相應因問所以不從餘二緣生解從等無間緣及所緣緣生者是心心所法戒是色法非二所生第二體者凡言戒者對患稱名患境無壃戒烏有限要而言之不過二種一曰表戒二無表戒此之二戒依一切有宗俱色為體若成實論作者是色無作非色非心此廣分析如戒體明次明其隨隨位有兩一是專精不犯第二犯已能悔言專精者上行之流一往順教惡離善行稱曰專精但專精中有其二持一者止持二者作持又此二持有其衆別於此衆別行中謂以護體尅全淨用順戒無違同類等法是其因緣所對僧別境界教等是增上緣第二犯已能悔者不謹之人放縱身語違禁興過汙本所受名之為犯慙愧追謝還令復本亦名為持雖非一往善成然亦毀而還復第二白法故名犯已能悔持故下云有二種清淨一者不犯二者懺悔又婆沙五十七云有二補特伽羅名為清淨一者本來不犯禁戒二者犯已如法悔除然犯不同有其二種一者作犯二者止犯然此二犯亦分衆別謂於僧別懺境想難遭遇立心厭惡永斷相續對除防護戒行重生更持清淨同類等法是其因緣即此僧別懺境及界法等是增上緣上來開宗略明廣隨文解第三門釋題目者先解四分言四分者乃是佛般涅槃一百年後於分部內一部別名百年已前未有斯稱但為一部大毗尼藏若欲料簡分不分義可為四門第一本制通含作分由漸第二教雖通含不分之意第三五師弘傳任持一味第四執見離分人法部別言初門者佛從成道五年已後終訖雙林入寂已前其中隨犯制儀咸稱根性奉行利益清化無虧然佛亦於輕重事中通含互説遠作分由所以知者如涅槃經第十七云四重之法説偷蘭遮偷蘭遮法説為四重犯説非犯非犯説犯輕罪説重重罪説輕何以故如來明見衆生根故指事別者即如僧祗律盜得四錢三角成重此律犯蘭彼文説蘭為夷此律説夷為蘭又云父母夫主不聽輒度僧殘此律提罪又此二衆互謗俱犯僧殘十誦謗尼但獲吉罪此即説吉作殘彼乃稱殘為吉乃至犯不犯等階降類然又涅槃經三十四云於五部僧互生是非舍利弗問經云羅旬分衛不能得食後以五種律衣更互著便大得食以斯文義參驗挍量明知聖制本有五意第二門通教不分者問聖制該羅通含輕重何以但有五意而不分五答為具三義不即分五一以能化教主是一共誰諍競而得分五二以所被無有五機一味修行咸稱根性三以同修一味和合既稱根性不相是非以斯三義不即分五總為一部大毗尼藏爾者三乘之教義亦應然三乘機根別隨別立三乘五部隨信行隨行分五部然五部有五意教即不分五三乘意亦三教應不分三三乘既別分五部須分五何但義然文證非一如於五部僧互生是非及五種律衣此等部別即非教主是一既云五部即是五機又以互生是非即非不相是非反前三義決定須離解曰三乘為顯理根異得離明五部隨事儀事殊不得別又如經説五部及服色等者此表當來分五不謬非約現説故無有過亦可此非分五見解殊途但以學行不同有茲別類如下律文有五持律此則因五區分居止遂別服色殊是非亦異此雖小訟乖違然非分教相鬪故為一部大毗尼藏第三門五師弘傳者佛化將畢告迦葉云汝今當知我於無量阿僧祗劫為衆生故勤修苦行一心專求無上勝法如我昔願今已滿足今將涅槃深法付汝汝當於後敬順我意廣宣流布無令斷絶迦葉言白善哉受教我當如是奉持正法使未來世等蒙饒益唯願世尊不以為慮是故如來滅度之後大迦葉波此云飲光須宣正法時大迦葉既先受屬今欲集藏廣利衆生將諸聖衆往王舍城闍王聞已嚴駕出迎王先獲得無根信故但見佛時自捉象下今見尊者捉又亦然尊以神力接令無損即語王言佛力殊勝不似聲聞聲聞入定方能發通自今已後若見我等莫捉象下如見佛時王言受教因即請云如來涅槃我不得見尊若涅槃必當見我尊答言爾時大迦葉所作事畢重思惟云我極年身為老壞臰爛之體甚可厭惡涅槃時到遂更思惟遍禮設利禮敬畢已還王舍城阿難恆遂未曾捨離畏入涅槃或不覩見於後迦葉語阿難言汝獨入城乞食我亦欲獨入因此獨入別王不見逝雞足山入於圓寂故婆沙一百三十五云大迦葉波入王舍城最後乞食食已未久登雞足山山有三峯如仰雞足尊者入中結加趺坐作誠言曰願我此身并納衣鉢久住不壞乃至經於五十七俱胝六十百千歲慈氏如來應正等覺出現世時施作佛事發此願已即般涅槃時彼三峯便合成一掩蔽尊者儼然而住及慈氏佛出現世時將諸人天至此山上告諸衆曰乃至廣説次大迦葉將涅槃時以最勝法付屬阿難此云慶喜而作是言長老當知昔婆伽婆以法付我我今老朽將欲涅槃世間勝眼今當相付汝可精勤守護斯法阿難曰諾唯然受教是時闍王於雞足山燒香散花種種供養讚歎已訖尋知法藏總付阿難往阿難所白言仁者如來迦葉入般涅槃自我多殃悉不覩見尊若入滅願見垂示阿難曰善於是阿難既受付已任持法藏廣令流布後於一時在竹林中聞有比丘錯誦法句阿難為正彼師不受阿難念言我親為説終不信受入定觀察亦無能改遂歎耶法興行違反聖教時無智人舍利弗等我今當問誰説此事以此我今但當涅槃佛之法眼足千年住念已辭王如前不見意詣毗舍離國入般涅槃時王後聞念去近遠復念河邊入於圓寂有竹林神告知處所是時尊者已至恆河王集四兵諸河而請時毗舍離神知阿難意遍告國土令使同知其王聞已復嚴四兵詣至北岸據河而請於時尊者在恆水中地六震動雪山中有五百仙人見斯相已至阿難所阿難化水為金地為仙説法時仙出家得道俱般泥洹阿難念曰佛記健馱邏國當有比丘名末田底迦舊云末田地此云金地義言從地為名未詳所以於彼國土廣興法眼阿難又念迦葉告云長老於後若入涅槃王舍城中有一長者名商那和修高才勇猛有大智慧已於過去深種善根發意入海採取珍寶回還造作般遮于慧為佛造立經行處已復當建立高門樓屋所為事畢可度出家如來法藏悉當屬付是故阿難臨入涅槃以法付屬商那和修而告之曰佛以法眼付大迦葉迦葉以法屬纍於我如我今者涅槃時至以法寶藏悉用相付汝可精勤守護斯法答言受教我當擁護普為衆生作大明炬爾時阿難付屬已訖踊身虗空作十八變入於圓寂分身四分三王帝釋各起塔供養舊云商那和修此曰胎衣此從義言未詳所以新曰商諾迦縛娑此是草名育王經云此人過去於久遠時逢五百辟支皆著此衣此人以上㲲衣奉施衆聖而聖不受還以商那衣施從斯已後五百生來常服此衣此最後身與胎俱出衣隨身長變為法服以涅槃時用以焚骸時商諾迦臨涅槃時以法付屬塢波毱多此云近護而告之曰佛記於汝在百年後坐禪第一大化衆生今正是時宜作饒益令諸衆生服甘露味答言受教此人化度無邊但無相好將齊佛德號為無相好佛然商諾迦雖屬付已意欲自怡未歸寂滅後欲涅槃更宣微妙問定五百毱多眇然商諾告云如來三昧辟支不知辟支三昧聲聞不知大目連等三昧餘羅漢不知吾師定相我悉不知今我三昧汝亦不知如此三昧皆隨吾滅後有七萬七千本生經一萬毗曇八萬清淨毗尼亦隨吾滅是故如來滅後賢聖隱沒如是法藏漸當衰損乃至末後一切都盡汝今應當勤加守護以前五聖導化虗通仍全一部大毗尼藏又付法傳從此已後更有二十師次第傳法各達道源化儀齊一於中不分五部差別然古師説三末田底四商諾迦此五師化各二十年合一百歲任持聖教此釋不然豈有二人親受付屬一一別化更付傳揚又復商諾逆觀長者生第三子方堪付屬如是知已始託為親乃至調習出家得道進受具後付法流通以此經停豈唯二十能辦自非久淹歲序何以濟此傳揚又以健馱邏國未有佛事佛記此人當興教迹此則傳教時同處別為異寄興教已化行自終不可以斯別寄抑入相付傳中又付法傳佛記近護在百年後坐禪第一育王經亦言百年後教授禪法最為第一既言近護化越百年何以類分各二十歲又觀文意迦葉阿難化時甚促商諾毱多稍淹年歲故智度論第四云長老迦葉於耆闍崛山集三藏法度衆生竟欲隨佛入涅槃清朝著衣持鉢入城乞食已上耆闍崛山語諸弟子我今日入無餘涅槃以此證知住壽極促如何不觀化時近遠直云五聖各二十年引則卛爾判釋不盡旨歸依前義明望順真理第四門離分部別者但以毱多化末僧徒見異悟解既殊各為楷準至傳聖教不能均融於是離分遂成多部舍利弗問經云於笈多復有孔輪柯王世弘經律其孫名曰弗沙蜜多羅嗣正王位顧問群臣云何令我名事不滅時有臣言唯有二事何等為二猶如先王造八萬四千塔捨傾國物供養三寶此其一也若其不爾便應反之毀塔滅法殘害息心四衆此其二也名雖好惡俱不朽也王曰我無威德不及先王當建次業以成名行即御四兵乃至廣説破滅無餘唯有五百羅漢登南山獲免山谷隱嶮軍甲不能至於後有神手棒大山厭王及四兵衆一時皆死其後有王性甚良善彌勒菩薩化作三百童子下於人間以求佛道從五百羅漢咨受法教國土男女復菩薩出家如是比丘比丘尼還復滋繁時有一長老比丘好於名聞極立諍論抄治我律開張增廣迦葉所結名曰大衆律外採綜所遺誑諸始學別為群黨互言是非時有比丘求王判決王集二部行黑白籌宣令衆曰若樂舊律可取黑籌若樂新律可取白籌時取黑者乃有萬數時取白者正有百數王以皆多佛説好樂不同不得共處學舊者多從以為名摩訶僧祇也學新者少而是上座為名他俾羅也此云上座他俾羅部我去世時三百年中因於諍故起薩婆多部此云説一切有及犢子部梵名跋蹉次於犢子部中出曇摩尉多別迦部此云法上跋陀羅邪尼部此云賢胄沙摩帝部此云正量沙那利迦部此云蜜林山次於薩婆多部出彌沙塞部此云化地經中言目揵羅優波提舍者此是人之異名非是部稱次有曇無屈多迦部此云法藏或云法蜜此文不顯出處準宗輪論從化地部出復有蘇婆利師部此云善歲是迦葉遺名次於他俾羅部出迦葉遺部此云飲光飲光是姓前善歲是名約名別分許同坎合及修多蘭波提那部此云經量四百年中更生僧伽蘭提迦部此云説轉然是經部異名為立實我異故別説如是上座部五破或六破本末及相攝總成十一部摩訶僧祇此云大衆我滅度後二百年中因於異論生起婆訶羅部此云一説盧迦尉多羅部此云説出世拘拘羅部此云雞胤婆收婁多柯部此云多聞鉢蠟若帝婆耶那部此云説假三百年中因諸異學於此五部復生摩訶提婆部此云大天此與根本大天名同但是人名非是部稱依宗輪論此當制多山部質多迦部此云西山末多利部此云北山如是大衆部二破或三破本末通論合成九部又此兩位總計合有二十部故宗輪論云佛涅槃後百有餘年去聖時淹如日久沒摩揭陀國俱蘇摩城王號無憂統攝瞻部感一白蓋化洽人神是時佛法大衆初破分為兩部一大衆部二上座部後即於此第二百年大衆部中流出三部一一説部二説出世部三雞胤部次後復出一部名多聞部次後更出一部名説假部至第二百年滿因有乖諍流出三部一制多山部二西山住部三北山住部如是大衆部四破或五破本末別説合成九部一大衆部二一説部三説出世部四雞胤部五多聞部六説假部七制多山部八西山住部九北山住部其上座部經爾許時一味和合三百年初有少乖諍分為兩部一説一切有部二即本上座部轉名雪山部次後從説一切有部流出一部名犢子部次後從犢子部流出四部一法上部二賢胄部三正量部四蜜林山部次後從説一切有部復出一部名化地部次後從化地部流出一部名法藏部至三百年末從説一切有部復出一部名飲光部至第四百年初從説一切有部復出一部名經量部如是上座部七破或八破本末別説成十一部一説一切有部二雪山部三犢子部四法上部五賢胄部六正量部七蜜林山部八化地部九法藏部十飲光部十一經量部問準斯經論所明有二十部如何餘文言有五部答約離分有二十部望其久後流行但有五部餘懸記文據斯義説故前舍利弗問經云如是衆部久後流傳若是若非唯餘五部各舉所長名其服色摩訶僧祇部勤學衆經宣講真義以處本居中應著黃衣曇無屈多迦部通達理味開導利益表發殊勝應著赤衣薩婆多部博通敏達以導法化應著皂衣迦葉遺部精勤勇決攝護衆生應著木蘭衣彌沙塞部禪思入微究暢幽密應著青衣舍利弗言如來正法云何少時分散如是既失本味云何奉持佛言摩訶僧祇其味純正其餘部中如被添甘露諸天飲之但飲甘露棄於水去人間飲之水露俱進或時消疾或時結病其讀誦者亦復如是多智慧人能取能捨諸愚癡人不能分別此五化迹雖殊契源齊一如破金杖彼此俱金又大集經二十八具有人法名字文云我涅槃後我諸弟子受持如來十二部經書寫讀誦顛例解義顛倒宣説以倒説故覆隱法藏以䨱法故名曇摩毱多而復讀誦書寫外典受有三世及以內外破壞外道善解論義説一切性悉得受戒凡所問難悉能答對是故名為薩婆帝婆説無有我及以受者轉諸煩惱猶若死尸是故名為迦葉毗爾作地想水火風想處空識想是故名為彌沙塞經中更有一人名然非正部攝經云皆説有我不説空相猶如小兒是故名為婆蹉富囉廣轉遍覽五部經書是故名為摩訶僧祇善男子如是五部雖各別異而皆不妨諸佛法界及大涅槃問經中既云遍覽五部未知僧祇為總為別古師解云僧祇足總故云遍覽五部加前婆蹉富囉即離分中自有五部勒中但勒離分五部總部不慮生疑故不舉勒今解通祗總有五部前婆蹉富囉者傍出犢子部名爾者如何遍覽五部答此部僧衆慧解慮通知餘所行亦契真理故修己部兼行餘四以此故云遍覽五部所以知者如前經云久後流傳若是若非唯餘五部亦可祇是離中本部餘是末部攝末從本故云遍覽五部亦可離中祇總餘別攝別從總故云遍覽五部亦可望大毗尼藏祇等並別故知四分之名至此方有又望本部中文四分是總餘三十七法即是其別又可四分亦別律是其總次釋律藏三門分別第一列數解釋第二明其廢立第三名義通塞初門數者謂律戒般羅底木叉毗奈耶問何理為證知有此名答律者如集法云一切比丘事為比丘律等戒者戒戒皆云為諸比丘結戒解脫者説戒法云我今為諸比丘説波羅提木叉毗奈耶者集法總云二律揵度等都合為毗尼藏此等諸文雖非集在一處準據安立蓋非是謬猶如受緣義亦同爾解此四名具如上辨今略重明前釋餘義然此四名各分教行律約教者謂是法式銓量如説比丘律等二就行者謂是調伏滅惡故維摩經云譬如象馬𢤱㑦不調加諸楚毒乃至徹骨然後調伏乃可入律咸有軌則俱稱為律戒中約教謂禁身語離諸過惡行即止惡之心能防業本斯並防過無處稱之為戒木叉約教謂能體非身語絶縛行者心離煩惱不為物拘皆能離非同稱解脫奈耶約教謂殄諍論與教無違行謂能尅滅果斷除惑業皆能殄非齊稱為滅第二門廢立者問戒與木叉別立可爾如何毗尼與律復亦離明然此二名義正是一謂梵云毗尼此譯為律以無別故首題律藏十八法中二名不並此言七毗尼增一云七種律以斯參驗不合離明今分二途未知何準答律翻毗尼本無典據傳者𮌎襟未成相反然正翻者梵云憂波羅懺此譯為律梵云毗奈耶此云調伏或名為滅又律據教銓量部初題目奈耶就行尅滅故云今演毗尼法又毗尼據教亦有銓量斷割儀軌故云毗尼藏律就別行亦能調伏滅惡故七毗尼十八法中二名不並減以功能不殊故不雙舉又律毗尼義為一者如何二律等集為毗尼藏又伽論第七云有一事攝一切毗尼謂律儀以此校量豈合為一義既差殊為別者好若爾尸羅與戒其義亦殊戒即防非尸羅性善如何立一不分二名答此正相翻不可為二如尸羅度淨戒翻之以此故知體無有別又體性善防非為能所望雖殊論體不異釋律毗尼雖復教行交參然正翻對各別不同以斯義故具立四名四名雖殊理趣無別隨以一名標之並皆無失由此故云毗尼藏四分律藏四分戒本我今欲説波羅提木叉又可此等皆是差別衆名依下文云二律等合為毗尼藏此是總名餘三是別由是總故三藏中稱毗尼藏然此部初題云律者且據進修軌則義説第三門通塞者各從別義論之謂身語調柔能離粗業是其律行身語清淨皎然無違是其戒行身語絶縛逍然纍外是解脫行身語止作非惑雙王是毗尼行通者一名之下通有四名四四便成十六種行律者通名法式或曰銓量約行調伏戒者防非防有軌則是其律行又可戒者為律所詮是亦名律故多論云佛為諸弟子制戒輕重犯不犯等撰為律藏解脫之法乃是趣求軌儀故名律行又可解脫之法體性調柔同於律行故俱舍云別解脫律儀奈耶名調伏調伏有軌是其律行又可滅行止作為律所詮故得稱律名為律藏此則四名俱成律義餘三例然可以準説學者思之不能繁述
