body:
  text: 西太原寺沙門懷素撰次明尼犍度今此犍度廣明比丘尼別行之法隱所行法從人受稱故曰尼犍度就中文二第一明授戒法第二諸比丘尼聚一處下對受起修明雜行法前文復二初明啟請為入道之由第二爾時阿難下正授戒法作起修之本前文復二初明波闍自請不得第二爾時下阿難為請佛便許之前文有三初明致敬請求出家第二佛言下為難正法抑而弗許文對請詞一法遮止何以故者徵瞿曇彌下釋第三既不遂意致敬退還然摩訶波闍波提瞿曇彌同是梵音文隨言次遂便舉之次阿難請文中有二初明請之端序第二爾時下正為陳請前文復二初明波闍作求道相阿難見異為請之由第二爾時下問知心祈許為求請問波闍先請世尊不許理應守教在宮何忽剃染如此若此文不顯所由欲似專報然五分中世尊教爾故二十九云瞿曇白佛言願聽女人於佛正法出家受具足戒佛言止止莫作是語所以者何法古諸佛皆不聽女人出家諸女人輩自依於佛在家剃頭著袈裟衣勤行精進得獲道果未來諸佛亦復如是我今聽汝以此為法次正陳請文有其三第一舉事直請第二阿難下舉恩養請第三阿難下舉得道請前文初請次答答中文二謂法及喻法中初直不許次何以故徵次若女人下釋次喻有二前喻為彰女人自行不立次喻欲明女人壞他不輕一一如是下隨喻便合次恩養請先請後答答中文三一因我故知三寶名二因我故於三寶生信三因我故受持歸戒乃盡苦際此等大恩非衣等能報彰彼小恩我已報竟次得道請請中先審證得道果便則陳詞請令入法次答聽許文有其三謂法喻合法說復三有舉列結初聽出家制行八法佛見阿難以證道請此事難速是故聽許僧祇十誦阿難請云三世諸佛皆有四部眾今佛何故獨無對此釋八不可過義四門分別第一制意第二釋名第三次第第四違罪輕重言制意者女人志劣護持行微王於傳揚事歸僧眾又以愚闇行不自成要假比丘諮稟法訓為法故理須敬人敬人之來庶事等爾但為此八資行中要又如橋梁不墜正法是以如來未即許度能行此八方聽入道次釋名者此之八事尼須遵奉依教修行不得過越故曰八不可過法餘文名異及事別者部既不同不須會釋亦可此文中名得總收餘稱掎相可解次明次第者此八之中位分為三初三敬人次二敬法後三諮承所以然者法由人弘人能通法是以最初明其敬人人若無法行則不成是以次明處奉正法既有人法事須諮承欲使生解起行故次明也初敬人三中身業麤顯故在前明諮敬相微故次後說於語敬中罵謗惱重是以前明遮舉損微故次後說亦可罵謗不須具德數故前明舉須具德稀故後說次敬法中受是根本是以前明懺是枝修故次後列諮承三中教誡生解故在前明安恣起行是以後說然安居時長九旬苦住又防未非是以前說自恣作法欲表清美又除已起是以後明次結罪輕重者初一後三戒本結提餘二三四五不定第二罵者得提是罵戒掎若其謗者或得殘提吉三第三可及遮舉並獲吉羅又若呵中說過惡者還前罵攝戒毀呰牧第四全不與受獲吉經宿法者得提或可並提第五得吉或全無犯問所以敬之得戒義等違之結罪乃有輕重若以敬不殊故齊得戒違義不等罪有重輕又問此及善來等俱是受法何以違此獲罪餘不結事若此制盡形遵行故違結罪善來等不然是以無犯是則八不可過受亦受亦隨餘善來等唯受非隨次列八數何等八者微於八法中一一有三初百歲者舉能敬人此謂尊中之極舉尊以況卑見新受等者對境修敬此謂卑中之極舉卑以況尊如此法等禁令遵奉一文既爾餘七類然結文可知喻文如不墜正法合文可解次下受戒文二初明八不可過法受第二時有餘女人下羯磨受前文有三第一阿難宣此八法授與愛道第二摩訶下遵修頂受說喻自慶第三時阿難下事訖重白此中復三第一百上愛道遵奉第二如是下結成得戒第三佛告下彰度女過此文正法直減五百經亦爾彼文第三迦葉因請度女罸阿難十事一女人不出家者諸檀越等常應各各器盛食在道側胡跪授與沙門二者諸檀越等常夜與衣服臥具逆於道中求沙門受用三者常夜乘象馬車乘在於道側以五體投地求沙門蹈過四者諸檀越輩常應在於路中以髮布地求沙門蹈過五者諸檀越輩常夜恭心請諸沙門至舍供養六者諸檀越輩見諸沙門常夜恭心淨掃其地脫體上衣布地合沙門坐七者諸檀越輩常應腕體上衣拂比丘足上塵八者諸檀越輩常夜舒髮拂比丘足上塵九者沙門威德過於日月況諸外道豈能正視於沙門乎十者若女人不出家者佛之正法應住千年今減五百年一百年中得堅固解脫一百年中得堅固定一百年中得堅固持戒一百年中得堅固多聞一百年中得堅固布施善見十五云何以不聽女人出家為敬法故若度女人出家正法得五百歲住猶世尊制八敬法還得千年彼文法師曰千年已佛法為都滅也若曰不都滅盡於千年中得三達智後千年中得受盡羅漢無三達智後千年中得阿那含後千年中得斯陀含後千年中得須陀洹學法後得五千歲於萬歲後經書文字滅盡但現剃頭袈裟服法而已次明羯磨受戒於中文三第一舉緣啟佛第二佛言下對緣開受第三應如是下正教受法於中復三第一度沙彌尼法第二聽童女十八下度二歲法第三應求和上下受大戒法此中文二第一尼中作本法第二彼受戒者下諸大僧中受大戒法前文有九此有諸和上廣釋其相如前已明次詣僧受文分為二第一無難自受第二時舍夷物梨下有難開使受前文有二第一正授第二拂疑前文有三第一正授戒體第二善女人下授以隨相第三汝已受戒竟下結勸受持釋並如上次拂疑可解次遣使文二第一授戒法第二世尊有如是教下料簡進不前文有三第一舉緣啟佛第二佛開使受為避難故第三聽一已下差使法受對此明具緣者約文及義合十三緣一本法成就二量使淨穢三差使及伴四界處如法五盡集和合六體如數滿七須請戒師八問答緣具九使尼為乞十戒師白十一對眾撿問十二白四應教具此戒生使法須報十三還報此十三緣文中有六第一量使是第二緣第二差使是第三緣第三乞戒是第九緣第四撿問是弟十一緣第五作法是第十二緣第六使報是此文直報令知不同餘文秉法報有已言明第十三緣戒先發次明料簡古師云遣使受戒後無得者不然此文既云小小顏貌不應遣使受明如還如前者亦開使得又母經第二云此女顏容挺特世所無比丘若往者恐惡人抄掠是故佛聽今時若有如是比者可得遣使受具其餘一切要現前得具不現不得又十誦五十八云若有欲出家道路障礙相似亦得是使人四十一云若有如是比者亦聽遣使受戒餘文可解次明雜行既稱為雜不可科別但隨文相應釋者釋五分聽比丘尼從比丘受經若經中有麤惡語聽書授若不知書聽隔障授各無障隔聽相背授又尼既嗔恚不成捨戒類比丘爾次得教比丘持憎上戒等不各呵罵十誦四十不得出比丘見聞疑罪除語言莫近惡知識惡伴黨次沽酒但言不應五分二十九尼作酒沽犯偷蘭次聽貿易住處者謂為僧故得下房舍中為己不得亦可此是別人住處許聽貿易王園中蘭若處牢固聽次比丘有過於尼聽作不禮羯磨以佛遣然不遣敬教十誦第四十尼得與比丘作三種羯磨不禮拜不共語不供養五十三更加不問訊為四次有式叉等互惱二眾者真治不改亦與二師作羯磨若尼有過於比丘得與作捨教授羯磨謂作羯磨治有過尼不得約別人有過總捨尼眾次大小便須有處所五分諸比丘尼於住處住處大小便臭穢佛言不應爾犯者突吉羅應作廁不應深作廁坑極深聽拳手一肘小作口上來尼揵度竟次明法揵度起行有軌稱之為法明七行法藥在一處稱云揵度然就通相無非是法此立總名餘標別稱此中大文有七第一先明客比丘法第二自今已去下舊比丘法第三爾時世尊下大小便法第四爾時世尊在舍衛下乞食比丘法第五爾時世尊在王舍下蘭若之法第六爾時世尊在舍衛下食請進不第七爾時世尊下浣染衣法然食請進不者此文應唱等得然後食五分云有比丘下食未遍便食白衣呵言不待等得食便食甚於小兒佛言不應爾要須等得然後聽食有處僧多上坐不知等得食時佛言應高聲唱僧然伽論亦爾十誦五十七云從今日應行上座法云何應行若聞楗槌聲若時到聲應疾往坐處坐觀中坐比丘下坐比丘或有坐不應法者應示若不覺應彈指彈指不覺應語比坐安詳語食時不應先令待得遍聞等供聲乃至一切僧應隨上坐法行次文云未唱等供不得食若食吉罪又五十九云若飲食時上坐應教一切等與應待唱僧䟦一切眾僧應隨順上座是名僧上坐法僧祇三十四云若有人請明日飲僧僧上坐不得即受應知前請人姓名容舊巷陌處所恐有人試弄比丘不應即受若有人識彼請人得受受已不得便隨去至明且應遣直月園民若沙彌往者之或遭縣官水火盜賊死亡不能得辨戒請主誑僧乃至檀越行食時多與上坐上坐者應問一切僧盡得爾許不答言正上坐得耳應語言一切平等與若言盡得者應受乃至不得隨下便食應待行遍唱等得已然後食上坐法當徐徐食不得速食竟住者合年少狼狽食不飽應相望看不得食竟便在前出去應待行水隨順呪領已然後乃出上來法揵度竟次明房舍揵度蔭覆所居是房舍義廣彰其相名為揵度就中文二初五比丘問住何房佛遣蘭若等住此對上行者說第二爾時世尊下廣明開畜房舍應不就中大文分之為八第一聽受檀越施園及房第二時諸比丘欲作房下聽比丘自造房及開隨房所須第三爾時世尊在王舍下明給孤獨食設供請佛並造精舍第四爾時世尊從王舍下制相恭敬第五爾時有居士下雜明受畜房物進不第六時羅睺羅下明施前後如非第七爾時世尊在迦尸國下明僧物不應分等第八爾時世尊在舍衛下明營事比丘房德應不初文隨施主所造施者聽受次第二文比丘自造房及作房所須亦聽應不眾多具如文列時有小沙彌聽房中安隔上同室宿安隔同此共女人上船疑佛言聽直渡准此證知上戒本中尼女合制次第三文文中有三一明長者詣佛徵非問施物極多何以不如詣佛一步之福十六分之一答施是福分不生慧解今以詣佛聽法開生慧解剪除生死故不相類發心將聽尚自如然何況聞而生信信已修行第二時給孤獨下見佛歡喜請設供養第三時給孤獨食買祇陀園造立精舍祇陀言此以金錢側布滿地令無間者我亦不與長者檢舊制證知是決價五分二十五云若能以金錢布地令無空缺然後相與須達便以金錢布地祇陀言我說此譬不欲相與須達後言說此為價豈得中悔共諍紛紜遂便徹官官即依法斷與須達第四相恭敬法於中文四一舉緣啟佛二爾時下審比丘解三佛告下舉下況上四自今下明應禮不初文可知第二文比丘或言大姓等人應受者皆不可佛意亦不以頭陀行高應受對此釋頭陀義三門料簡第一釋名第二出體第三諸門分別初門舊曰頭陀新云杜多此梵音相近杜多此云洗除或曰洗浣頭陀此云斗撤猶如抖擻衣物振吉塵垢行者如是皆行頭陀振吉一切貪等塵垢故聖善住意經下卷云若比丘斗擻貪欲嗔恚愚癡斗擻三界內外六入我說說彼人能說斗擻如是斗擻若不取不捨不修不著非是不著我說彼人能說頭陀新阿含經第四十一佛勸迦葉受居士壞色衣及讚頭陀行於大眾中分半座與迦葉所以爾者良由此行達受施之不貪蠲除患本悟杜多之無欲得絕累纏是以苦節逾明淨尸罪之晈鏡貞操彌固楊定慧之端嚴上文唱制靜坐唯除一供養人時有六十頭陀比丘以行同故直入見佛佛亦讚歎揚勵餘慢眾次出體者以無貪無癡二善根為體故解脫道論第二云以此不貪於十三處能除貪欲不以此癡於十三處能除無明問所以不用無嗔為體答以嗔於所除無用故論言嗔人受苦更成其惡如淡病人若服熱湯轉增其惡是故真人不當修行次諸門有五第一辨相第二對除第三修意第四問答第五諸部同異初辨相者文中雜亂不定次第今以義收束成三位謂衣食處所以爾者衣服所資濟身家要若也無衣便癈修道故先辨衣外禦寒醜令得身安筞修進業雖後得衣外禦寒醜若無內資道亦難立故須對食以辨節童趣令身安長道而已既得衣食內外緣宛理須進修以消物利凡欲修進必須庇彰閑林處若喧繁無由進道故次後明修道之處初衣有二謂三衣糞掃三衣者道服正標資身受用既離二邊處中應法糞掃者隨拾所棄納以成衣事絕內貪後杜外奪次食有四謂常乞食不作餘法一坐一團為離惱緣修常乞食既無異望堪能進道其餘三食皆就初中離明不同舊釋通是二種食人為食僧常檀越食者便成中豈名頭陀但以數食增貪行非知足為此故須不作餘法餘法雖絕慮有再貪為離此貪但修一坐若其一坐恣足利恐不絕貪心故更節重一團而已恒修一坐一團餘法已絕對行不同故更別舉次處有六練若冢間樹下露坐隨座常坐梵音正曰阿練若此曰無聲處但以聚落之中境緣諠雜為離聲色捨就閑尼雖尼練若恐觀難成故觀冢尸息其淨想久在冢間哀聲亂道捨就樹下專意思惟在樹眾鳥雨亂禪儀後捨演林更居空靜但為進道思惟不簡敷設隨得座等起令身安謂於坐臥所敷設中隨得即坐名為隨座舊解云隨坐家勝於餘所行咸能同彼故稱隨坐餘十一偏能未必通行此解不然若以隨坐通行餘者衣食既非是坐如何得稱是坐又昔解云於坐四中恐生貪著故立隨坐此亦不然於坐既爾若貪衣食應知亦然斯並不識文意故作茲釋此是隨座敷具不名為坐故瑜伽名為處如常座問云何名為處如常座謂所坐臥或諸草座或諸葉座如舊敷設草座葉座而常坐臥一敷設後終不數數翻舉修理如是名為處如常座小品般若第七名為若隨敷座母經名為隨得敷具解脫道論名為遇得處坐上來託處皆易威儀志節無恒恐難進道故須常坐繫想思惟克念專精作聖由起進道之人託緣起行三位之行各後勝前次對除者於衣服中有多衣貪上妙貪能障修善為欲斷除多衣貪故但持三衣為欲斷除上妙貪故持糞掃衣於飲食中有美食貪多食貪能障修善為欲斷除美食貪故修常乞食為欲斷除多食貪故修餘三食此三所離類同對除合辨於處之中瑜伽有四貪能障修善一諠雜貪二屋宇貪三倚樂臥樂貪四敷具貪為欲斷除誼雜貪故住阿練若為欲斷除屋宇貪故常居樹下迴露冢間又為斷除婬佚貪故常住冢間為除倚樂臥樂貪故常期端坐又欲斷除敷具貪故處如常座是名成就杜多功德次修意者瑜伽二十五問云何故名為杜多功德若譬如世間或毛或㲲未鞭未彈未紛未擘爾時於著不耎不輕不但造作縷綫氎蓐若鞭若彈若紛若擘爾時分散柔耎輕妙堪住造作縷綫㲲蓐如是行者由飲食貪於諸飲食令心染著由衣服貪於諸衣服令心染著由敷具貪於諸敷具令心染著彼由如是杜多功德能淨修治令其純直柔耎輕妙有所堪住隨順依止能修梵行是故名為杜多功德次問答者問此文中云糞掃衣上文言納衣未知此二差若如何答此二名異體同謂捨糞掃納以成衣糞掃謂從取處為名納衣便是補縫之稱又解或有糞掃不納成衣以不納成但名糞掃或有糞掃納以成衣以納成故名為納衣爾者若無糞掃納體是何若納衣要須體是糞掃如無糞掃納體亦無以受施人即是中下既曰頭陀下合受利又解縱無糞掃納亦通許施衣爾者受施即中下豈得成頭陀答若以受施解頭陀但是頭陀不受施不以受施解頭陀何妨頭陀得受施故知受施頭陀行別又問納衣是糞掃三衣體是何若此三衣體亦是糞掃如無糞掃開受施衣但為三受不名中下又問身著納衣三衣具不具若爾者持三與納何別答三衣若不納得受三衣名此衣若納成若加納衣稱又解若納不納唯三衣即加三衣稱縱納三外有餘衣此名納衣者餘約食處問答可以類知次同異者母經第一十二中無不作餘法加一若有嗔心不止不食滅已乃食智論還無不作餘法及隨座加次第乞食及食後不飲漿解脫道論正有十三還無不作餘法加次第乞食及時後不食瑜伽見論等餘文皆有差別相不能具陳次舉下呪上可知次明應禮不應文有其三一明不應禮二何等下明所應禮三世尊既有下雜明應不初文不應禮有四一白衣女人道俗若故二後受大戒者小大異故三犯邊等淨穢不同四一切非法語者耶正善若次文應禮者文有五頭及佛即六小沙彌尼應禮有十二人塔各六小沙彌亦爾次小式叉應禮有八人塔各四次小尼應禮有六人塔各三次小比丘應禮有四人塔各二此雖應禮禮有儀軌失儀軌者亦不合禮故增一阿含二十七云告諸比丘有五時不應向禮若在偷婆中在大眾中又在道諸病痛著牀若餘食時是謂五事不應向禮有五事知時而禮反上者是五分若人多但若禮師總禮餘人而者次雜時應不文中遣記受戒時者為知歲數及斗大小此記受戒年歲即六念中一念六念制法僧祇第十六明此律上下有多少事以非正制文不具足具依彼部每日誦念於理不違彌增其行若欲解釋須作二門第一釋名第二作念方法言釋名者於此六法繫心不忘於六生念名為六念然論念體無六隨緣彰六故曰六念第二作念方法者第一念念知日月謂是一日乃至十五及月大小黑白差若西方本制月有黑白白月純大黑有小大此土立法乃以三十日為月故作念者通知大小即應此方立其月法若言黑白一二日等復順西方本制月日第二念念知食處作施食念文言比丘清旦當作施食念今日得食施與某甲某甲於我不計我當食唯此一念云清旦三說餘並一說其何施境比丘乃至沙彌尼若依此文念則不爾隨知食處一遍稱之或食僧常或常乞食或受彼請或自食等若有二請意赴後者前請必須捨與一人今彼代法方得無事若全不知有食處者但作總念云今日念不背請食第三念念自受戒時日歲數謂其年月若干影時隨夏多少有無稱之第四念念知衣鉢緣資具不若衣鉢有𨷂者隨有稱之餘不具者念當時具若其無𨷂直云三衣鉢具餘長衣藥鉢當知已說未說若有者念當時說若無者當言無長衣等第五定定與眾同故言念不若眾食第六念念知病不若有病者應言有病念當療治若無病者應言無病依眾行道時人不了通誦者非問所以勅二念三說餘皆一說若餘但念知一說即罷此第二念捨食與他自非三陳法不成遂以此著若一三不同次第五文雜明應不此中文三第一羯磨房與比丘撩理文相可知第二時諸比丘下明為房中所須諸物老病比丘不能出聽在房內安大小便器進不如文拾蝨棄法具如文明五分二十六諸比丘拾蝨差房內還入衣中佛言拾著房外諸比丘雨時拾著水中佛言應拾著弊物中慈心氣之第三爾時世尊下明給孤獨以園奉施及明諸雜應不應義文中聽作火爐五分二十六云不知以何物作佛言聽用銅䥫泥石作之聽僧四方僧私畜又聽因地作大爐次第六文明施如非此中文二第一舉緣啟佛第二時世尊下辨定如非前文但為信心居士作房施僧受用之人要須清淨若其人淨無可呵過轉將若施是名非法若人不淨有可呵過轉更若施不名非法是以世尊重遣檢問知淨穢已方定如非此對如人須撿淨穢上尼律中對外道一法制是非法次定文二初立章門第二依章解釋釋中各三謂舉釋結非法釋中有其五位一一人二眾多人三僧四己所同部五異部若依文中施一人已轉施眾多人等一頭之下各有四句總成二十句若以義說施一人已後施一人等即成五句如是互庶成二十五句如中准說亦爾次第七明僧物應不文中有三初舉過白佛第二世尊以此下總彰僧物不應分不應自入不應賣買亦非僧眾多一人所分自入賣買皆犯偷蘭問此結偷蘭為望何義若此謂本心權作此法礙僧受用故結偷蘭若其本作盜損之意斗直成重不合得蘭若執此文言盜犯蘭者如五分二十二佛言不應以僧菓餉白衣犯者突吉羅豈盜僧物餉人但獲吉罪故知亦結不應之𠎝又僧祇二十七云佛告諸比丘從今日後眾僧田地不得借人不得私受用正使一切僧集亦不得借人不得賣不得私受用若集僧借人賣私受用者越毗尼罪此亦結不應非處盜損彼文盜僧物正結夷罪第三何等四下重更料簡應不之相如文可知次第八明營事人應不文中分二第一賞營事人房第二有五法下約德應不前文若僧地中營造不隨僧法應語言還地更無有理以僧地入己僧祇云比丘僧地中作屋時上座來次第付房此比丘不與諸比丘白佛佛言吉罪若不爾者應持草木更餘處吉此文營事人住房極至三月五分二十五經營者真恚言我經營辛苦而反不得安住以是白佛佛言聽經營主隨意所樂住諸比丘便長與之以是白佛佛言應還其功夫多少極多聽至十二年住應白二與之次約德文二初明應差不應差二有五法下明其損益文具五德者應差總有十一事一分粥二分小食三佉闍尼四差會五敷具六分浴衣七分衣八可取九可與十差比丘使十一差沙彌使此具德差中有分衣人故上分衣中立差依此十誦並有羯磨慶差法又彼文三十四云僧坊中無比丘知時唱時無人打揵椎掃監塗治講堂食處無人次第於續敷牀座無人教淨菓菜無人者苦酒中雖飲食時無人行水眾散亂語時無人彈指以事白佛佛言應立那維成就五法者作謂不隨愛嗔怖癡知淨不淨白二差之又前文云隨有大德高明比丘不應作使次損益者釋上須具德意上來房舍法竟次明雜揵度資道之緣乃有無量不可隨事一一標名是故統收名之為雜廣集諸緣同居一處故云揵度就中文二第一廣彰諸雜應不第二爾時世尊在拘睒彌下別明大小持戒行法前文種法計無宗次且隨所明事中分之為五第一明鉢法第二時諸比丘下雜明資具第三爾時世尊在王舍下還重明鉢第四爾時世尊在王舍下辨鉢如非第五爾時世尊下雜明諸事初文迦羅鉢者黑色鉢舍羅鉢者赤色鉢次第二文不應剪爪令如半月形及以頭尖極長如一麥應剪非謂齊一麥聽留比丘不知髮長幾許應剃佛言極長長兩指若二月一剃此是極長時母經第三云所以剃髮者為除憍慢自恃心故若髮長不得用剪刀押應用剃刀除之次第三文文中分五第一不許輙現神足第二時諸外道下因佛立制請桶神力第三時王舍城中下外道檀越生信調伏第四爾時諸外道下廣集徒黨王及土度第五爾時世尊東面看下廣現神變類前立制初文目連言我未曾白衣前現神足者未曾自為故現若為利他應現即現如汙家戒有益即現分別功德論云賓頭盧大懼佛教為伏外道六師並神通故勉仰不已便現神通取鉢此不言擯餘文即擯不得般涅槃住閻浮提已如上明次餘四文文相可解次第四文鉢法者洗鉢時不應立洗膩不去者應用澡豆若鹵土若灰若牛屎若泥自餘護畜等法具如文明次第五文廣明雜法漉水囊化法如文或句形等若作漉瓶若患細蟲出聽安沙囊中沙蟲不應棄陸地還著水中無水囊行乃至半由旬應以伽梨角漉五分二十六有二比丘共道行無漉水囊渴欲飲水見有中有蟲一比丘飲一比丘不飲而死飲水比丘法至佛所以事白佛佛言彼比丘有慚媿心乃能守戒而死從今不聽無漉水囊行犯者突吉羅餘同此說伽論第六無漉水囊不得遠行除江水清除涌泉淨除半由近若半由近內寺寺相接不持漉囊不犯次然燈如文僧祇三十五滅禪坊中燈時不得九十滅當言諸大德敷蓐欲滅燈便以手遮唱言燈欲滅燈欲滅不聽用口吹滅手扇滅及衣扇滅當折頭焦吉然時不得九十入然燈當唱言諸大德燈欲入燈欲入次不聽以外道言論雜糅佛經佛言聽隨國俗言音所解誦習佛經五分二十六有婆羅門兄弟二人誦闡陀書後於正法出家聞諸比丘誦經不正譏呵言諸大德久出家而不知男女語一語多語現在過吉未來語長短音輕重音乃作如此誦讀佛經諸比丘聞羞恥二比丘白佛佛言聽隨國音誦讀但不得違失佛意不聽以佛語作外書語犯者偷羅遮次諸雜行具如文明次身子目連移涅槃許造塔然佛雙賢弟子以不忍見佛入般涅槃並在先般故婆沙一百九十一釋賢先云由法爾故謂法應爾不可改易不可徵諸是法爾義此顯一切諸佛雙賢弟子法應先般此理無異有況如轉輪王欲法彼彼未至方域必令前軍勇將先導而法如是十力法轉輪王欲法未至無餘依界亦令前軍勇將弟子先導而法五分二十六佛言有四種人應起塔以來聖弟子辟支佛轉輪聖王若凡夫比丘有德望者僧祇律中亦許起塔彼文二十七云若持律若言法師若言營事德望比丘應語長老是人持戒賢善多供養僧執事有勞應與起塔如是語已當為起塔作聲聞塔不得先見塔後見世尊當今先見世尊後見塔不得在多人行處當在屏處不得在比丘經行處若多人行處起聲聞塔者越毗尼罪問所以聽造塔者答有三義一表人勝二令他信三為報恩又問未知塔是何言解塔是梵音傳者不正或云塔或云塔婆或云鍮婆或曰兜婆或私鍮以欺或藪斗波然梵正音名為窣堵波此云高勝謂浮圖是其供養塔食比丘等食如文次起佛塔因髮故起是現在塔供養塔食塔作人應食次明造塔福深及開浴室次作䨱鉢羯磨文中有二先作次解作中文四第一教受行謗第二時沓婆不可責第三告比丘下正明作法此中有三一有五法稱還自衣二有十法稱還犯事第三應如是下正與作法第四使告如文僧祇三十一法豫優婆塞以解義故請問諸比丘義不解者輕慢佛言與作覆鉢白四佛遣問一比丘鹽義不解輕慢更問一比丘甚解名義佛言此是凡夫於我法中未得法味前比丘者是羅漢而汝憍慢不識真偽長夜作不饒益事於是法豫聞佛語已懺悔乞解佛言與白四解次開送燒斷火次杖絡囊羯磨餘律亦無乞詞次解默然和合三位分別第一明默然意第二隨文解釋第三定其成不初明意者凡秉眾法心須共同遞察是非詳鑒得失今既見異理須呵諸但欲呵時自須進不若其言不鑒物後無善伴雖見有非但應忍默是以文言舍利弗見眾僧作非法羯磨無同意者欲點然任之佛言聽點然又母經勅二云諸比丘集作法事不如法眾中有見眾僧作法不成此人若有三四五伴可得諫之若獨一不須諫也何以故大眾力大或能擯出於法無益自得共惱以是義故應默然不言若其受能鑒物後有善伴見有非法即須呵結故下文言佛告阿難阿尼樓陀何時能滅此淨事豈非汝舍利弗目連事耶次隨文解釋然今文三五位分為二前十默然次五和合此是默非默別若以如非相對亦分為二初五非法下二五如法今者約前義解然前兩位初五非法次五如法此之非如約心以辨所以知者以初五中境有是非以心異故皆名非法初句若如法羯磨理應和合以心不同即名非法第二句既得同意伴理應呵諫亦默不可名為非法第三句若見小罪者如無難略說法雖得成眾僧犯吉見亦須呵以不呵故名為非法或可說戒本備淨人見他犯吉與己同說既無大事不可輪呵故曰見小罪第四句或秉法時見有別眾露離申手䨱安隔障亦默不呵名為非法第五句如說恣須時須喚戒場上在獨知有僧不告大眾默然任之名為非法次五望境亦有是非以心應默故是如法初句見他非法理合呵諫但為言不鑒物成如法第二句言雖鑒物以無善伴默不呵者亦成如法第三句見犯重人處眾足數呵成敗損默亦是如四五兩句類前可知次五應和合者初句法事稱理名為如法發語勸成故曰和合第二句若默然任之者以事如法心同所作第三句形雖有礙送情表和第四句自心雖不了達是非以從可信人聞故亦和合第五句前之四句集眾時和合此第五先在眾中忍僧所作預表情同故是和合然此五中第三情和餘四身心俱和亦可初四即是應來者來二五便是應呵者不呵第三是應與欲者與欲此五順教稱理故是和合次成不者初五之中前三第五成就以心不同為若非法第四不成心境俱非次五之中前三不成後二成就以心應默說為如法次雜如文不能具述梵云鐸佶唐言嚼楊枝次明大小持戒揵度此舉果法勸修還是作持掎就中文二第一少欲行成持戒緣起第二佛爾時下因況大小持戒德法前文有五第一失位因緣第二時守象人下正明失位第三彼教王兒下被繫得脫舉口籌議第四時王憂陀近下法請來起不受象金等不淨之物第五還寺內下展轉白佛對此勅四不受象金等物即釋一切不淨諸物不淨有八諸文廣呵若欲解釋三門分別第一列數釋名第二應畜不應第三畜之得罪輕重初門列數者一田宅園林二種植根機三貯聚稻粟居鹽求利四奴婢人民五畜養群畜六重銀錢寶七象牙金銀刻鏤大牀并綿蓐氍氀八一切銅䥫釜鑊除十不牧器不在此限若畜此八長人貪求汙染淨心故曰不淨此雖上下有多少文然非次第雜亂不足次應不者於初物中田利過多別人禁斷然於宅舍之中分有聽義若其廣畜園宅聖制不許一口小房資要聽許若望眾僧一切皆得以供大眾別人絕貪故五分二十六諸比丘畜田宅店肆諸白衣譏呵我等有妻子累故畜田宅店肆諸比丘亦復如是與我何異比丘白佛佛言皆不聽畜犯者吉羅有諸白衣以田宅店肆布施僧諸比丘敢受便譏呵言此諸比丘不堪受供養以是白佛佛言聽僧受使淨人知此雖為僧依大集經要五人已上常住僧者得受第二物者亦以過多別人不許為僧無累是以聽之第三物類若聖眾僧一切皆計於別人中有聽不聽其聽不相如上明說第四第五二不淨中若其不病一切俱遮若老病者開之無犯故母經第三尊者畢陵伽婆差為國人所重或用羅網施者或與象馬駱駝車乘及作一小寺施者如此等施佛皆聽受之此文亦聽乘轝使淨人挽之又五分第五云從今聽諸比丘畜守園人若治施僧一切雖得然發施言須作淨語故善見十五云若有人布施眾僧奴不得受若言淨人或言執事人得若施施牛不得受若言施乳酪等五味得受餘一切畜生亦爾第六金銀錢寶別人無問病不皆遮以其利重長貪妨修癈業然以資道中要令作淨法說付淨生自免𠎝各恒作轉死淨物之心自餘應不如前已明若論眾僧一切皆得七八二物無問病不有開不開如綿蓐氍數三肘五肘得淨施畜及十六牧亦聽無罪自餘不合謂象牙金銀刻鏤大牀及銅䥫等大釜鑊類若望眾僧一切皆得次罪輕重不七二種雖長貪心為資道要故有淨施法不淨過重違教犯提自餘非要不制淨法既無違淨之𠎝畜但吉罪次明大小持戒行法就中文二初直制名二如來下正辨行法言制名者沙彌不滿受體未圓稱之為小比丘具人受體圓滿稱之為大次辨行法大文分三第一正辨大小行法行既成已因戒生定故次第二自見未斷下明修定行修定既成因定背慧故次第三彼得定心清淨絕縛無累證得五勝三明前文有二第一先明教主十號三輪為生信境第二若居士居士號下明得信人出家入道初文十號三輪如前已辨次出家人道文二初明沙彌小持戒法第二行則知時下明比丘大持戒法前文有二一明得信人生念出家第二彼於異時下如念修行出家之書前文有三第一經舉生信求出家者第二以信樂下舉所厭事第三我今寧可下彰其所欣初文居士子等者欲明此等諸人聞佛說法至誠奉持心不退轉故曰彼聞正法便生信樂既信樂已體知在家迫迎獄如牢獄不得解脫故曰我今在居家等既有所厭必有所欣所欣莫過出家修道故曰我今寧可等舍利弗所得經云夫出家者捨其父母生死之家入法門中受微妙生長法身出功德財養智慧命次行出家事文中分分二初明形同二與諸比丘下法同前文有三一棄其所厭非生念時故曰異時錢財親屬物繫名家今總棄背名為捨離第二剃除鬚髮等行其所欣第三彼與下結成同法次明法同應有三歸受法文無者略直辨隨行隨行有二初初舉十戒行體第二不取妻妾下遠離譏嫌行前文初戒云與諸比丘同戒者顯此所禁與比丘同不煞生者舉果行離施捨力等是對治離慈念是無嗔善根慚媿是於應數是為下結盜婬同此妄語中無對除離具兩離舌等三始成不妄非治沙彌七支戒具次不𮨇須等合舉餘六次遠離行可知次明大持戒法於中文二第一舉事禁防離過第二彼於此事中下教令起行修善前文復二初舉行儀令應道法第二如餘下異餘耶徒修不應法前文有三初舉行應道法事順無累名之為時類此遊散名曰非時次禁衣食知足衣之與食是資道緣於此緣中理須知足所謂還腹度身勿增勿滅滅則損形增便致惱故曰取足而已次爾法來威儀進不故曰衣鉢自隨等次異耶徒如餘沙門者謂是外道沙門此等不能䇿勵進修唯知飽食虛損信施總舉十七事彰過令棄次明起行於中文五第一守掎根門行第二彼有如是聖戒下內資節還行第三比丘有如是聖戒下精進覺悟行第四比丘有如是聖戒下一心無錯行第五比丘有如是聖戒下斷除諸蓋行所以知有此五文吉以皆牒前起後故爾古舊諸師制此五文唯是聖行故是聖人大持戒法今釋不然豈可世尊說此行時唯為聖人不備凡眾又後聖人證理恒自䇿勵豈繁對事爾許丁寧又若是聖如何教修念住又就聖中位次是何為唯無學為亦通學諸位爾者若非唯聖如何文言修集聖戒得聖根等若此是勸修聖戒非即是聖如上轉法云此四聖諦豈可所為即是聖人先解初文勸護諸根即根戒文中有二初總泛舉聖戒第二明雖視色下對根別明初文彼於此事中者謂根境事中修集聖戒者䇿進離非名為修集舉所修體名為聖戒此戒非聖聖人所行勸同聖行名為聖戒起行無染不貪勝位故曰內無所著離過行成悟然取適故曰其心安樂次對根明文有其二第一約根別說第二於如是下約待總明前文對眼四句第一舉根對境故言眼雖是色此釋總中彼於此事中第二椅根不亂雖視色境而不取相謂不取其順違美惡不為色却生貪染心守護根門而不紛授故曰眼根堅固寂然而住此釋總中修集聖戒第三對除離惡起行離緣心無異起於順不貪於違不苦故曰無所貪欲而無憂患既護根本永絕有因故言不漏諸惡不善法此釋總中內無所著第四結成行體以能離緣行得成就故曰堅持戒品以行成立名為善護眼根此釋總中其心安樂對眼廣釋既爾餘根類釋亦然故曰耳等亦如是次約待明文有三位謂法喻合法中六待入者謂根境識三和合生待於待生護故曰六待入中准喻合文此中𨷂二善學應言善學護持善學調伏善學止息亦可以一善學通下二句又有古師以此三句配三學行云護持是戒調伏是慧止息是定此釋不然自與科文為妨今解護持者起對除護如念智等調伏者彰其行體身語調柔止息者行成離過次喻之中平地交道是境駕象馬等是根善學等三句是識與法句別相對合亦可知次內資行文中先牒前行成就故曰彼有如是等次明第二行體文有其二第一法說第二舉兩喻兩合前法文三第一總舉食法第二亦不貪味下起觀防非第三取自支身下教食所為初食法者凡食皆須知其止足故上文言還腹而食對此應食須修二行第一計功還德謂一粒米當直百功若其身無淨戒設有不持期則施者果微為施所墮故下文言寧吞熱䥫丸等不以破戒之身受信心飲食等又雖戒具若不思惟進等亦為施墮故母經第二云若比丘不坐禪不誦經不營佛法僧事受人施者為施所墮若有三業受施無過若前大無三業知無轉施與者受施能施二皆為施所墮若受施已繫念思惟施者受者得大利益故寶梁經云若有比丘受衣鉢湯藥等施已若入無還定令彼施主得無還福德無還福報迦葉譬如三千大千世界所有大海尚可窮盡而此施主所得福報不可得盡第二興心椅生寶梁經云臨欲食時如是思惟今此身中有八萬戶虫虫得此食皆悉安樂我今以食椅此諸虫我得菩提時以法椅取又起屎尿等想及偈誦等應知次防非者非有其四故了論云餘一切文句從廣道應知真諦解云如律中明出家人受食先觀後食謂離四事觀一離戲樂謂著看味縱情取適二離食醉身心康健不計他人三離顏色謂食令身光澤鮮潔四離嚴身食已令身轉增色力離此四事故言應知今文亦不貪味是離戲樂過以養其身是離食醉過亦不之言通及以養而不貢高是離顏色過憍慢是離嚴身過而不兩眾流至憍慢亦可總為二對前則不許貪味養身次令不起貢高憍慢又咋母經正食之時不應起嗔其嗔既爾餘戒類然次食所為所為有二一令修行二令身安前文食者為修戒定慧故言得修淨行次令身安者此欲界身依摶食住若其不食即便散滅雖為此食勿捨二喻二喻居心能除二苦一除故苦二除新苦故云無有增減故舍利弗阿毗曇第十二云云何斷故受不生新受若飢緣飢能生身心苦受是名故受何謂新受若食過度緣過度故生身心苦受是名新受食既增減皆成過失理應平等節還而食有力者以能支身無事者無其苦患由此身不壞散壽命相續名曰安樂次釋喻文初喻令身安樂文有四句一男子女人喻僧尼行者二身患瘡喻僧尼飢渴三以藥塗喻食資養四令瘡差喻除飢渴合文可知次喻得修淨行其文亦四一譬如人還喻僧尼二以膏油膏車喻受食資三為財物故喻所祈為四欲令等者喻至道果從凡入聖得此解脫合喻可知次明覺悟行文亦先牒前二行成次初夜下彰第三行體於中分二初則總示䇿修時分中略無盡日中夜次若在盡日下示其墮時䇿修執則如文可知次心無錯亂行文亦先牒前三行成常爾下舉第四行體此中文二初開二章第一若動若靜常爾攝念故是一心門第二修念處觀與法相應故是念無錯亂門第二依章解釋先解後門念無錯亂有徵釋結釋中先總解義二門分別第一釋名第二出體言釋名者先釋通名念住有四謂身受心法此四何緣名為念住若念緣四住名四念住又解此四念住慧為自性由念力故慧於境轉故云念住又解於所緣境先念攝持後慧觀察而斷煩惱譬如田夫先以手攬取草等後以右手執鎌刈之此亦如是故名念住解別名者以念住緣身名念身住乃至緣法名法念住次出體此四念住體各有三謂自性相離所緣別故律文直言念處不辨差別據其實理各須有三其自性念住以慧為體相雜念住以慧所餘俱有為體所緣念住以慧所緣諸法為體次下釋文先解身念住觀身有三諸自與他及自他合觀內身三十六物九孔常流甚可患厭而於此中求淨不得以不淨有五廣如智度論明修此觀成由心筞勵故曰精進不懈正觀現前永無淨想故曰念無錯亂作此觀成非直除貪亦遣餘惑故曰調伏等雖後觀內不淨如此恐染他身故次觀他與自無別一等不淨又恐於境不除貪心故次內外合觀不淨一行既爾餘三亦然故曰受心法亦如是次釋一心門有法喻合文相可解次明斷蓋先牒前修四行成就次樂在下舉第五行體文中有二第一先示筞修之處第二彼乞食還下託處斷蓋於中復二初斷蓋方便結加坐等如前釋第二斷除已下正明斷蓋此中有三謂法喻合法中五蓋二門分別第一釋名第二出體初門釋名先立五數一貪欲二嗔恚三惛眠四掉悔五疑蓋先釋貪等別名躭求追逐是貪欲義憎忿有情是嗔恚義身心𧄼滯是惛現義令心昧略是睡眠義身心躁動是掉舉義令心處悔是惡作義即此惡作名之為悔以惡作是心追悔性令心利豫是其疑義次釋通名蓋者治是障義覆義謂障聖道及障聖道加行善根故名為蓋覆者謂覆有為諸善令不得生故名為覆次出體者謂此五蓋總用欲界三十煩惱為其自性謂欲貪嗔恚惛次睡眠掉舉各通欲界五部五五二十五惡作唯修斷疑唯見道斷此五足前合有三十次下釋文以對色境修不淨觀行成離染不為貪縛故曰斷除慳貪能治之行不與所治同體故曰心不與俱餘相可解但惛眠蓋中唯舉睡眠惛現應有文無者略調媿蓋中調者是掉媿者是悔次喻亦五初喻貪蓋行者為貪䇿不得自在義同於奴貪使行人有自在義義同大家習觀斷貪不為彼義同與姓安隱既奴彼自念下出觀之後慶喜之言次第二喻嗔心却人善財如伽債主又如有人是修觀人為背嗔故故曰舉他財物䇿勵修道故曰而行治生觀成憎長故曰能得息利正斷嗔善名為還本既畢非直斷嗔亦得自適故曰後有等彼自念等慶喜如前次第三喻惛現睡令人𧄼滯眛略故曰如人久病厭彼修道能斷惛䁕故曰從病得差定味資神內心欣悅如食消化食既消化必受資答故曰身有色力次度可知次第四喻以有掉悔覆障修觀不成故曰如人久閑牢獄䇿勵精勤能斷掉悔故曰從獄得脫自慶可知次第五喻行者勤修三學故曰多持財寶生死無崖故稱曠野斷疑斯盡故曰不遭賊劫於法決了不為疑侵故曰安隱得過自慶如文次合可解次修定行初定文四一除定障二辨得定有法喻合勑三結數顯得第四釋得所以餘之三禪分文亦爾但二三兩文少釋得所以第四禪中二喻及合各別次下修證五勝三昧先五勝者身通分三第一從實四大色身化作化身四大第二所化色中無有化心第三廣辨身通第四天耳第五他心諸文並皆先結前行初勝法文三謂法喻合法中化作化身與實身無異觀此能所了了分明喻中三喻鞘筐簾喻實身力虵衣喻化身次結釋可知次明化色無心化色依實而起而無有心此心在此身依此身繫此身者謂依實身喻中化身如珠依實心練定心觀此了了分明第三勝法喻有四重同對自在此下三勝法略無釋得所由次下三明廣釋如上上來雜法竟即是正宗文耳次明流通分如來在日化利無邊今為緣盡應遷將歸寂滅故以正法付大迦葉欲使結集流通利益末代元意為此故是流通於中文二初五百七百後代結集以辨流通次修部下現在付屬以辨流通問所以後代之事及在前明佛現時事迴之後說解蓋是集法者情見不同耳古舊解云蓋是集法者意情見不同如五分說此五百者律未而明為表末代方有此故十誦名之為序為表由結集故三分之文於茲流演有發起義稱之為序此律置在正宗之下佛流通上為表結法上收正宗下攝流通義勢之便故在此說斯釋不然十誦此序自是第九誦中序品卷當第五十五不得見有序言將為彰初總序前文有二先明五百次辨七百此二何殊分之為二釋有多義一集意不同五百止外道謗七百彌比丘淨二所集寬狹五百通集三藏七百局結毗尼三時節不等五百佛創涅槃後七百滅後百年餘四處所復異五百在王舍城賓鉢羅窟七百在毗舍離國五能集人殊五百是大迦葉優波離等七百是一切吉離波多等六人數不等謂五百七百數有多少又五百據重合有千人七重不重異五百重集七百不重既知如此先解五百言集法毗尼者佛本散說結法隨緣今標次序載於竹具故名為集所集之文有軌則故名之為法後有滅惡之能稱曰毗尼就中文二第一佛般涅槃結集緣起第二時大迦葉下恐法墜沒集今久住前文有三第一安置佛身焚燒之法第二爾時摩訶下迦葉眾從憂喜差別第三於是大迦葉下法見現足供養焚燒欲釋其文先解其義明佛涅槃總為七例第一明般所以第二壽年分限第三般涅槃處第四北首臥由第五右脇臥餘般臥意第六辨般節第七顯所入法初門所以者佛般涅槃有其三義一為緣畢化修須歸寂滅故遺教云自利利人法皆具足若我久住更無所益應可度者若天上人間皆悉已度其未度者皆亦已作得度因緣二順魔請故摩耶經云時魔波旬即來佛所稽首禮足而白佛言我於法昔勸請世尊入於涅槃于時世尊而若我言我諸弟子比丘比丘尼優婆塞優婆夷未具足故所以未應入於涅槃世尊今者諸四部眾皆悉具足所度已畢唯願善逝速入涅槃爾時世尊即答魔言善哉波旬當知如來却後三月入涅槃時魔波旬見佛許已歡喜踊躍不能自勝頂禮佛足還歸天宮三順諸佛常法謂次明壽曾現當諸佛皆爾限者問世尊入滅壽年幾耶義佛般涅槃壽年八十然佛般泥洹經下卷七十有九問計佛壽壽有留捨婆沙解云命應合百年所以今者捨第五分壽為伏落魔若從此魔應壽百歲為欲伏故捨故第五分留三月者為伏死魔若從此魔八十應死為伏此故後留三月天或二魔道樹伏論釋相可知問所以唯留三月不增減耶答起此之外無所化事減此利生不究竟故又解以佛自言我善修行四神足故欲住一却或一却餘如心所期則便能住為成此言故今留捨次涅槃處者謂是拘尸那城熈連河側娑羅林間入於寂滅梵曰娑羅此云堅固然則四時有改八樹無彫故云堅固又以林處解佛隱密稱云堅固又解其樹體實名為堅固又在娑羅林下演堅固法是故此林名為堅固如成佛樹名為道樹亦云雙樹樹總有八四方各二故曰雙樹故佛世尊於娑羅林右脅而臥首杭北方西方一雙在如來前東方一雙在如來腹北方一雙在佛之首南方一雙在佛之足爾時如來移但槃已其林東西二雙合為一樹南北二雙合為一樹爾時二樹乘覆如來慘然處白猶如白鶴枝葉皮幹悉皆𪹼烈墮落摧折漸漸無餘次北首臥由者問世尊何故令敷北首牀而臥婆沙一百九十一解云欲顯彼國論師法應爾故謂彼國論師皆敷北首牀而臥世尊亦爾以佛能伏諸論師故即是無上第一論師令隨彼敷設而臥有流欲顯遠離世所妄執吉祥事故謂彼國死者乃令牀上北首而臥佛為破彼妄吉祥執是故未般涅槃即令敷設北首牀而臥有說欲止拘尸城中諸力士等不淨心故謂彼國俗皆於北方建立天祠若佛北足而臥者則諸力士生不淨心云何輕蔑我等所事北足而臥有說為欲顯佛恭敬正法故謂佛預知般涅槃後無上法炬北方熾然久久不滅故故於牀上北首而臥云云次脇臥意婆沙云爾時世尊趣所敷牀右脇在下累足西面北首而臥住光明相具足正知乃至廣說問世尊何故右脇而臥答欲顯佛如師子王而臥故如契經說臥有四種佛是無上人中師子故右𦚰而臥問世尊何故臥般非坐答欲令大眾於佛一切身分易了知故有說欲顯如來離矯誑故若佛坐涅槃者則不信者當作是言此是矯狂何有死人而能端坐有說為止當來於諸聖者生誹謗故若坐般者則於今時羅漢臥般涅槃者世便謗言非阿羅漢若其是何乙者不同佛坐涅槃耶次般時者問世尊何故般於中夜答初霄群聲未息後夜眾語漸喧准中夜分離二過失又解初霄眾齊感慟以是故喧半夜咸息悲號由斯故寂婆沙云以此時分家寂靜故謂彼土暑熱晝時不堪作務多於初夜後夜分中作諸事業唯中夜分一切寂然如來恒時受樂寂靜讚美寂靜故於中夜而般涅槃有說佛欲令大眾於生死黑闇超大厭怖謂佛於迦栗氏迦月白半八日中夜而般涅槃爾時月輪沒於山頂如是佛正遍知月亦隱靜慮大涅槃山即時二種黑闇但起謂色性闇及無明暗時大大諸眾觀斯事已便於生死起大厭怖故於中夜而般涅槃次顯所入之法依宗涅槃有其二種一者有餘二者無餘世尊入今無餘依界故此涅槃是所入注次釋文可解梵云涅疊般那唐言焚燒舊云闍維訛略不正梵云䭾都此云身界或曰設利羅此是體義舊云舍利者訛也梵呼稻殻為舍利佛之䭾都十誦五十五云爾時佛𧂐然盡迦葉思惟言當云何滅火即念應以牛乳滅之迦葉適生此念四邊自然有牛乳池淨淨潔香好是時迦葉即取此乳以滅是火而說偈言千疊纏佛身以火耶旬之佛之神力故常一內衣在家外亦不燒中者皆然盡爾時迦葉以成治㲲取佛舍利與諸力士諸力士從迦葉取佛舍利盛以金瓶舉著車上燒種種香持諸幡蓋作諸伎樂入拘尸城城中有新論義堂掃除清淨種種供養置象牙牀上乃至八國王興兵競取爾時眾中有一婆羅門姓烟在八軍中高聲大唱拘城尸諸力士主聽佛無還却積善修忍諸尹亦常聞讚忍法今為舍利起兵相奪諸君當知此非敬事舍利現在但當分作八分諸力士言敬如來議爾時婆羅門即分作八分各還本國超塔供養爾時婆羅門乞得盛舍利瓶起塔供養第九瓶塔後有必波羅近那婆羅門乞燒佛處炭起塔供養第十炭塔初般後起此十塔自是已後起無還塔次正明結集故出曜論第一云佛臨欲般泥洹時告大迦葉及阿那律汝等比丘當承受我教敬事佛語汝等二人莫取滅度先集契經戒律阿毗曇及實雜藏然後當取滅度廣說乃至供養舍利文有其三第一恐法墜沒簡集法人第二難時阿下撩理資緣第三時大迦葉下正明集法初文此真科差無別名集釋餘名集如上已明五分三十迦葉便於僧中唱言此中五百羅漢應法王舍城安居餘人一不得去作是制已五百羅漢至王舍城於夏初月補治房舍臥具二月遊戲諸禪解脫三月然後共集一處集法毗尼次文可知次集法文復為三第一單白和僧第二時阿難下刊定是非第三時大迦葉下集正辨法初文可知第二文二初明彌淨雜碎戒者謂是心𠎝不動身語佛捨不制若制此罪無由得離不稱根宜無奉行益非謂已制身語𠎝違令不持諸名之為捨諸餘羅漢不達此理執已制者言各不定迦葉親是秉宗之人達先制者今不應捨故立制云若佛先所不制今不應制等母經第三迦葉說言汝等所說皆未與微細戒合隨佛所說當奉行之佛不說者此莫說也又云若捨微細戒者諸外道輩當生謗言如來滅後微細戒諸比丘皆已捨竟瞿曇沙門法如火烟焰忽生已滅若捨微細戒者但持四重餘者皆捨若持四重何名沙門然佛不制不應制者如唱輙入見佛波逸提制次明除罪者罸其七事如文迦葉恒據教相有違結令懺悔阿難常據內心自省無過信大德語今當懺悔餘文罸中皆有少異部既不同不勞會釋問迦葉立制云佛所不制者不應制今者七事豈非先所不制答迦葉見此事非息謗故罸以非佛制不集入藏又為不捨離碎戒故次正結集文中有二第一大迦葉等五百人結集第二後為富羅等五百人重集前文復二初對波離集毗奈耶藏次第阿難集餘二藏初文先作自問答次問制事僧祇三十二云阿難波離昇座結集皆自言諸長左若使我集者如法者隨喜不如法者應遮若不相應應遮勿見尊重而不遮是義非義願見告示眾皆言長老阿難汝但集法藏如法者隨喜非法者臨時當知文言展轉如初分說者非於當時有是初分之類或是律主或類譯人不能具文自指如此總二律等五集為毗奈耶藏次對阿難集餘二藏長阿含等五為素呾纜藏有難等五為阿毗達磨藏然假立賓主往復擊揚名為有難直辨真理顯法正邪稱為無難義味屬著名理互從名擊顯宗由致教理會符稱曰相應共相諸問各有旨歸名為作處付法傳第一云集三藏訖迦葉說偈云以此尊法輪濟諸群生類十力尊何說皆當勤修行此法是明燈能破諸黑闇諸賢宜受持慎勿生放逸爾時迦葉入願智三昧觀所集法無𨷂少耶思惟已訖知皆具足育王經同此加餘五百羅漢並皆思惟次重結可知上來五百集法竟
