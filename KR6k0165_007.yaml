body:
  text: 次明三十捨墮總作四門分別第一釋捨墮名第二先後次第第三九十對決第四正辨三十初釋名者梵云尼薩耆此譯為捨古舊諸師依多釋云捨有三義一捨財物二捨相續貪心心事俱捨故次第三便能捨罪今解論無三義正文據理但捨財故名之為捨若以捨罪捨心名為捨者是則單提亦應名捨以單提中亦捨心罪故提名墮者如下當明故曰三十捨墮次先後者三十九十罪性均等合為一犯斯義可然所次先明三十後辨九十答此三十戒本由財生若欲懺除要先伐本故須對境先捨過財過財既捨罪方可悔由此捨故作法是難九十不捨作法是易欲使僧尼先識於難後知其易次第故爾次對決者古舊釋云凡入捨者咸具三義一是屬己財物二財體現在生罪受用有過三捨已歸主受用無𠎝今解不然但由不捨用財有罪作法捨竟用則無𠎝由此一義入捨不須餘二下九十中雖有因財生者縱使捨竟用還有罪是以但在九十不入三十次辨三十先總解十門分別第一定能犯人第二配屬身語第三自作教人第四遮性差別第五持犯方軌第六二問之意第七重犯不重第八捨懺儀則第九二部同異第十下衆任運初門所以定能犯人者以下文有三人犯尼薩耆故今須定然此三位一人遍犯衆多與僧有犯不犯且僧位中有四方現前其四方僧全是不犯以物屬衆別人無分故下文云衆僧衣過十日佛言不犯現前若其據四已上同共領作名為僧者是則諸戒一切同犯以同領作各有分故如和僧作媒嫁事又如一切僧同犯不得懺悔及僧為根僧舉僧等其同活人雖四已上但是同活非僧所收其衆多犯者謂是多人同心作者若據此為衆多一切同犯若望由我作故令彼成犯約此為衆多者唯同活人是於中不共犯者有十五戒謂二雖浣帖過雜黑白二毛六年乞雨奪藥其藥據長殊理應同犯但為有法成擁已異餘長故不同犯次身語門此三十戒離有三十二或對二浣各有三戒雖有三十六且依前説於中擔用局身餘通身語通中位三一有五戒語家止業共身犯謂五長是二有兩戒身語止作業共身犯謂二雖衣三餘二十三戒語作共身犯位復為三一有三戒自語假他身謂二浣乞縷二有八戒自作局身若望教他自語假他身謂五敷二寶奪衣三餘十二領受戒自身語假他身犯次自作教人者此三十中二浣乞縷一向教人中犯以自乞縷但犯吉羅二自浣無罪前言一人盡犯者通自作教人故爾若泛教人作此三十不為己者盡不犯提但以教人作惡故有吉羅若其教人為己但十一有犯謂二浣乞縷唯教人犯以假使尼及非親織并五敷二寶奪衣自餘諸戒非不為己但以利損不專唯犯吉羅亦可教人販易過前受急施雨衣回僧既以為己有遂情義亦應同犯文無者略次遮性者唯回僧是性餘悉是遮次持犯者此中八戒具二持犯謂五過過十作犯二雖六年釋相可知其畜寶戒通有二持然以不得自畜故闕不論自餘諸戒唯是止持作犯次二問意者三十有財可捨作法不得別衆九十為無捨法悔時許得別衆以此義故分為二問爾者前聚諫不諫別亦應分二答此為捨罪緣殊故分二問前則無別衆故合為一又可此有別衆不別衆殊故分二問前雖諫不諫別唯不聽別故一次重犯不者有四戒重犯謂擔用二浣然浣染打三尼薩者是異類重不如擔用同類重犯謂擔毛數過雨衣數用然吉師云語使浣染打三尼薩耆浣上既犯染打類知浣浣亦然今解不爾再浣義同新衣不犯尼薩然準多論一時作三事得一捨墮若浣捨墮衣告吉染打相別尚不再違況復浣浣得有重犯自餘諸戒咸不得重謂一奪二雖五十月鉢藥急過六作十雜黑白二毛六具織作四領受領受者謂取尼衣乞衣過知足受一二居士王臣二寶販賣乞鉢勸織雨衣急施過前求受及回僧物所以須明重不重者為識業纍多少故爾次捨懺者準文有四謂財懺罪還衣不還先明捨財捨財有四一所捨財謂衣藥鉢寶尼加十六牧器此捨有二全壞不同綿褥壞捨餘皆是全二所對境境有對不對綿褥獨捨餘咸有對對中道俗俗唯二寶道通餘戒道中僧別乞鉢局僧餘通僧別又綿褥二寶聽別衆捨以不對道餘咸盡集三捨財處謂自然作法乞鉢一局餘通二位二作法中復有大小鉢唯大界餘通大小三住處非住處者乞鉢局此住處以留勝者入僧庫故自餘諸戒通一切處四捨財法法中位二謂語羯磨羯磨一法捨財中無以捨己財不須羯磨若論語法綿褥即無以不對人豈繁須法餘者通有有中道俗復有僧別辨異可知次捨罪亦四一所捨罪須知所犯財事多少設財已無業纍須殄罪須緣知品類多少此諸品類至文當辨二捨罪境若論捨財有對不對對中復有道俗差別論其捨罪一切對道以除往𠎝境須同類道中乞鉢屬唯對僧寶等三戒專對其別餘二十八通該三境此望所對假不假説論其除罪唯是別人又寶等三捨得別衆論其懺時亦不同集三捨罪處寶等三戒處該一切餘二十九若論僧秉鉢唯局大餘通二作若其除鉢餘二十八對下二境同前寶等又與捨財之處差互亦得謂此處捨財餘處懺罪對處差別位約為二第一乞鉢局大第二除寶等三餘二十八對僧捨邊專在二作第三寶等三戒及二十八對下二境處通一切四捨罪法寶等三戒唯是語法除寶等三餘二十九對僧捨邊有受懺白則具二法若除乞鉢餘二十八對下二境亦但語法次還衣亦四一所還財還財之中須除綿褥既不對境不須論還餘戒還中除去二寶總為四位謂長等五經宿方還離等二十四即座聽付所以爾者良由長等貯畜經日貪心續生不得即付要須經宿事隔還者斷彼畜心方成清淨若當有緣許令轉付問捨若各別還法可知或若合捨還復如何解或若一二三等與長合者長等自經宿還餘者不妨即付故多論第四云衣已捨罪已悔次續心斷即曰若先所求衣來若意外衣來不墮次續以心斷故不同古舊釋云長等與餘合捨唯除二離二毛乞鉢餘諸戒等若捨即還容為長染相從經宿次還財境除去綿褥不對無境自餘諸戒還通道俗及以僧別一唯捨財不得差互然對別中容可差互別衆得不義可準知次還財處準捨中説次還則法若論語法理是義通論其羯磨三人下無若是僧還須有白二然鉢不同具如文載但為捨財有離有合若合捨者還或二一若各別捨但一白二次不還者綿褥無還以不對境餘有境故不還有罪二俗不還如文追索不欲虛損信施故爾餘若不還計直犯重次同異者十八戒同不繁解釋十二有異事須別明此十二中束成三位一有九戒輕重不同謂五敷具取浣二毛但以僧作數故提尼為稀故吉次有兩戒僧有尼無雨浴衣者僧有局限用定分齊喜過求用又聽蘭若恐成失奪因開六夜故有過六尼是浴衣聖開常用既無分限何有過𠎝尼又劣弱不行蘭若既不開六亦無過六三有一戒犯同緣異謂長鉢是僧尼俱提名為犯同十日一宿殊名為緣異次任運者任運得犯一十三戒謂五過除藥約日任運數滿便犯二浣乞縷五敷奪衣但使事成一切成犯餘闕此義皆無任運次隨別釋先解長衣其開制意者實以行者根性不同報有強弱資須有異大聖開遮治終將補各稱根宜有四差別俱有資身長道之益第一人者報力資強唯畜三衣便能長道故下文云未來世善男子畜此三衣不得過第二人者報力次劣若同初人便廢修道是以聽畜助身百一記識受持不須説淨第三人者報力更劣雖畜百一猶闕進修復聽受施説淨而畜欲使彼獲施福此資道緣第四人者報力最劣雖畜輕資猶不進道更開重物被褥牀等方能濟身進業有益次明制者多論第四云以為俗利則道利不成又失檀越信敬淨心比丘無厭與俗無別有違佛教四聖種法此既因聖開聽廣畜盈長即非節量知足之行故使不加淨法制與捨墮此謂制下二人二釋名者貯用屬己名之為畜限分之餘稱之為長越於期限故曰過十日三具緣者別緣有六一是己之長物甄去三衣以是三際諸佛應法之服體無長過故須除去三衣若受明不犯長設若不受亦無長過故多論云若比丘不受三衣過十日無長衣罪無離衣宿罪有壞成儀罪有缺衣罪雖是己衣忘則無罪是故第二知屬己物物雖屬己財須應量若不應量畜過無犯是故第三應量之物物雖應量説淨無過故須第四不作淨法雖不作淨若有一月五月四想被舉留難緣等亦是不犯故須第五無緣雖無因緣畜須過限若未過限亦不得罪故須第六十一日明相出犯見論梵曰阿留那此云明相多論云明相者有種種異名有三種色若日照閻浮提樹則有黑色若照樹葉則有青色若過樹照閻浮提界則有白色於三色中白色為正四闕緣可解緣中三時衣者蓋是隨時厚薄不同五分諸比丘見問言世尊不聽畜長衣汝不聞耶答言我亦聞之但我此衣或僧中得或居士問得或是糞掃衣彼以著故與我本不使我為五家畜戒本文三隨開文五一舉制生疑問未知阿難與迦葉衣為是決定心不答文中既言欲與明知不是決定若決定與即非己物以不定與故須陳疑請決二正明請三問還期四答時限五開十日多論佛知法相不緩不急不增不損正制十日滿足戒本三位分別第一定戒文句第二定緣有無第三定利同異初位戒本六句一犯人二衣已竟者簡非長體以衣不竟不名為長三迦絺那衣已出者顯出犯時以迦絺那衣未出不名犯時四畜長衣者所畜財體五聖開十日六若過下違教結犯次定緣者直就此戒十日有緣未知迦絺那與長等五戒何先何後若迦絺那前開便不得言為長等五開受迦絺那衣若長等先制後開迦絺那者所以無緣即言已出答長等先制迦絺後開故下律言為長等五開受迦絺那衣然此無緣者即是略無故五分初戒本云畜長衣過一宿犯又那律衣壞恐一日不成犯尼薩耆不敢取僧衣又有諸比丘安居訖十六日進詣佛所道徑泥水三衣粗重甚大疲極并以那律事白佛佛言聽受迦絺那衣不犯五事第二戒本云若比丘三衣竟捨迦絺那衣已長衣過一宿尼薩耆又因阿難得二張劫貝為與身子恐犯白佛佛開十日第三戒本云若比丘三衣竟捨迦絺那衣已長衣乃至十日若過尼薩耆次定餘戒餘利同異者問時利開一月五月所以通於三戒答本為五事開受迦絺那衣今以初三是長第二是離以此時利得通三戒問所以此開不通餘戒答餘戒若與五利開法者即須有除如急施衣及背別等戒若與五利不相關者即無有開問所以急施等開語不同此答隨事不同開語亦異語雖有異時利不殊更有多解皆悉有妨且作斯釋以遣文違次下廣解文二初釋戒本第二捨懺儀軌釋中初句可知次句衣竟者五分云浣染縫竟次句迦絺那衣已出出者捨也依下八捨延促故名為出釋下二戒竟出同此衣者已下釋第四句於中文二一辨十種衣體釋上衣義絶衣者憍奢耶作劫貝衣者華作欽婆羅者毛作芻摩者紵麻作懺摩者野麻作麻者家麻扇那者白羊毛作翅夷羅者鳥毛作鳩夷羅者絳色羊毛懺羅鉢尼衣者尨色羊毛二定衣量分齊釋成長義釋此長義三門分別第一定量分齊第二應量犯未第三互應結未初門量者此文尺六八寸五分除長三衣若長餘衣乃至手巾過十日皆突吉羅僧祇長衣者除所受持衣餘衣是又須廣一肘長二肘第二門問為始應量犯為待過耶答應即須淨不淨即犯故言長衣者若長如來八指等第三門問衣量互有應減須作淨不答若量互減不須作淨爾者房互亦然何以處分答房恐妨難設互亦須處分衣無此難互減不須次下合解五六二句於中文二一畜過結犯二染貿明犯初文八章始從得不得終盡忘不忘初章得不得有十箇日一日為一章即是十章初得衣日有多有少互相間錯總成四十六句初章十日都得衣至十一日犯者初日體過故犯下之九日為初日衣染相與俱犯故言盡尼薩耆見論十四若多衣縛束一處過十日得一罪若散衣不縛束計衣多少隨得罪伽論第七云何得長衣謂若入手若在膝上肩上作想此是我物次第二章九句立法有一轉降有八謂轉空日向下得日向上第三章二日不得衣作八句立法有一轉降有七如是乃至第九章二句立法轉降各有一句觀此章中文勢義趣不合更有子注轉降然文有者理是誤耳若非是誤如何重誦前句有人約此即作倒句七句如是展轉向上至第三章有一即成二十八句今以文錯不繁須作第十章一句是則第十章一日得第二章九日得相對為十三九相對為第二十四八為第三十五七為第四十第六章五日得為五句初章十日得為一句即成六句合為四十六句次淨施門略無初章十日俱不淨故但有九乃至下門例亦應然若遣與人替前淨施及不得衣日此單舉一邊亦應言道不遣與人故壞者壞使不應量非衣者作革屣囊等忘者忘此財體意謂元無雖經多日開使不犯次染犯者謂使人貿得或自於五衆邊貿得不犯販賣者為前長染故曰一尼薩耆然此捨墮衣理應捨已貿易以不應不捨而貿易復得吉羅不同舊釋云是著用不淨衣罪計此未合論者用𠎝若此明者義次不然次明捨懺文分為四一捨財法二彼捨衣竟下捨羅法三若衆僧多下還財法四是比丘下不還結罪所以四文次第爾者此之罪咎本因財生若欲懺除要先伐本是故先捨有過之財過財雖捨業纍未除𠎝若現存不成應法故次懺罪財物捨訖罪復悔除行既無違堪消物利故次還衣聖教一宣理宜從順若當有違必有𠎝失故次結不還者罪此之四文行事大軌既通諸戒舉者應知然此懺境雖三且約僧説初文有四一財集制捨第二與僧下所對境界第三捨與下捨之威儀第四當作是下正捨詞句初言此捨墮衣應捨者財集制捨此須除去負債未入手者及以共物未分之類除財但使制加淨法不作淨者豈須入捨及寄他者亦須索取若不盡集皈主還染問捨財不盡迷謂為無捨已方見餘財不知先捨成不答若所捨物在僧未還先捨得成續捨所忘若物還主已説淨竟成亦如前續捨所忘若物還主未淨見者即成相染俱須更捨次所捨境衆覩詳悉故須盡集欲使犯者對衆殷愧內生耻心息過於後次捨威儀對衆謝𠎝理須謙下若不卑恭業難除遣但使對僧齊具五法若對別人事分大小小但四法闕無禮足大者同僧亦具五法次捨詞句既自捨物理合宣情若不陳言捨難成遂文言爾所者出法之言善見十四云若一衣言一若二三衆多還道二三衆多名其差互作法不成律但一説不須至三次明懺罪文中開六一從僧乞懺二別請懺主三懺主和僧四正陳懺法五呵責治之六領受立要文言彼捨衣竟當懺悔當知義含乞請準下自言毗尼對衆懺中有乞此亦合有文無者略乞懺詞句準捨應知乞已復應請懺悔主其懺悔主緣生已善必須清淨具在下明懺主受請未得即許作白和已然後許之次正除罪將欲懺時先辨罪之多少始終位別合有一十二位三罪謂犯長提及根本展轉二種覆藏合是一三乃至第十二著用捨墮衣三此十二位中除本長提餘三十五有無不定然欲立心懺除往業一一並須緣知具闕準文正解懺開三位第一先懺二十四覆罪以此覆類是同齊作一減第二懺不應説等七位吉罪以此非覆類同亦齊一減第三懺長等五位提罪捨罪詞等至下文解若捨墮物用盡直懺罪者品數多少準上應知次明還衣上來具前十法即是悔犯清淨道藉資成託緣以立若不愍接闕修出離故須還衣還衣之法先列緣後作法若當無緣要須經宿直付今為大衆難集及彼遠行即許羯磨轉付親友親友得已經宿還之僧祗律師問此衆中誰是汝知識答某甲即作法付此是即座轉付物法而無經宿直還羯磨次不還者此文且結不應吉羅究竟不還計直犯罪故多論第五云以罪言之是根本捨以法言之是則暫捨此對僧捨始終十二法若衆多人十一法謂須除乞一人但十除問邊人此義通三十二説者位別五階除綿褥二寶餘二十九對僧十二法又除乞鉢餘對衆多十一法一人十法二寶九法綿褥但六上下收攝不過此五謂約具法多少以辨相別若據物類捨還不同位亦為五雜野一戒壞捨而無還二寶對俗全捨轉體而盡還乞鉢一戒入僧還主捨七日藥入僧入俗還主捨餘二十七戒唯還主捨上來四文對僧説竟餘衆多一人準應可解多論第四沙彌應當上下衣一常著衣當安陀會二當多羅僧令清淨入衆僧及行來時著得畜泥洹僧一竭支一富羅隨身所著物各聽畜一自外一切盡是長財次不犯者謂十日內作淨施等不犯若十日外已是犯竟不可更有餘緣來開次離衣宿戒別意者衣是應法之服成就威儀餘道所無不可有闕故下文言比丘所去之處衣鉢隨身如鳥二翼羽翮身俱今乃置衣在此身居異界寒暑卒起急須難得又闕守護容成失奪廢資身用事惱不輕是以聖制次釋名者人衣異處名離經夜曰宿久則事慢促便致惱限期一宿過則便犯故曰離衣宿戒次別緣有六一是三衣二加受持法三人衣異界四不捨會五無因緣六明相出次釋文戒本三句隨開文五一人病衣重為清之緣第二自思念下舉制生疑第三即語下陳疑仗託第四時諸下為申疑意第五世尊下開結不失衣法文言結不失衣法者謂得此法賞受不失而無離𠎝故曰不失衣法若作四句定者唯人病衣重一句成就餘之三句並不成就不同多論滿戒類長衣亦作三門此中但定文句餘二比知後戒亦爾戒本七句一定犯人二簡衣體三定犯時此不犯時但約時開謂一月五月舊釋亦攝非時開者不然四三衣者列所離衣名五離一一下人衣異界六除僧羯磨者是非時開羯磨有二一得法離宿二作不失衣界七尼薩下結罪次下廣解前四第六別釋可知不失衣下合解五七二句於中文二初約十界明離二不失衣下就蘭若明離前文有五第一列十界名二僧伽藍下解十界體三僧伽藍下十界差別四僧伽藍下十界勢分五僧伽藍下離宿結罪先解初文義分為二第一依此文釋第二明諸部同異初依此解藍一界者謂一藍中俱是僧住遍藍無別名為一界若有俗人男女來至界中雜住有村界起名若干界故多論第四云如王來入界內施帳幕住近王左右作飲食處大小行來處盡非衣界非王來住亦如王法又解藍有四周院相諸房雖別皆為藍攝名為一界若其藍相不周彼此房別各不相收名若干界又解雖同一界但有隔礙不得自在往返者皆名若干界故五分第四云異者僧不羯磨作不失衣界雖作而於其中不得自在往返雖有斯理且依前明下諸界釋皆同此其相同者不能繁述然十誦第五云樹有一界有別界是中不相接樹界者若日中時影所蔭處若比丘在一樹下衣在餘樹下應取衣來若至衣所若受餘衣若不取衣來不至衣所不受餘衣至地了時捨墮相接樹界者若是諸樹枝葉相接乃至一拘盧舍是中隨所著衣至地了時無犯又村界者比丘至村隨住一處於住分齊中間無別名為一界若此分齊之內有異界生名若干界問所以不同僧祗兄弟情通任往來者不失衣答彼常情礙此不同彼但以村多譏染不合置衣下文除村明非衣界縱令自己緣家情無隔礙比丘身在別房衣在女男住處夜或須衣取恐逼觸此不得往即名為難難者表不與衣豈得留衣此室輒宿餘房古舊諸德有立染礙者成立可解然無正文故今不立次諸部同異僧祇第八有道行界師與諸伴共行論議而去弟子持衣鉢從後來不及師師至日沒時畏離衣宿故出道外待弟子弟子持衣直過不見師至天曉相待若是師待衣處離道二十五肘內與衣合者不犯過外者犯若弟子持衣在前問答亦爾十誦多論四十九尋十誦復有空界謂衣在地比丘在空或衣在空比丘在地過明相犯以空是有界外故見論有林界若衣在內林中十四肘內不失衣海洲亦爾此林若有人往來無十四肘界衣應隨身若不隨失衣復有水界比丘在蘭若處竟夜坐禪天欲曉患眼睡脫衣置岸上入池洗浴洗浴未竟明相出此衣犯捨了論通明作法自然有六種不離衣論偈云善解三衣六憐愍釋曰律中佛許六種不離三衣利益一僧和合同許羯磨所作此有二種一約迦絺那衣僧和合所作二為行路人及有病人僧和合所作二依地所作如布薩相應學處中説三不離所作如於皮闍延多樓及剡浮樹等所四垣墻所作謂僧伽藍摩及寺舍中如轉車方便所顯五約露地所作如比丘行路四十九弓所度處相對覆地直身申臂斜衣各捉一角若相及許不離衣六住處月時節所作於安居學處中廣説應知復次小便等所逼事中由他加行難所作是名於三衣六憐愍僧祇若夜中大小行離衣二十五肘內與衣合無罪次十界體如文次十界差別謂此非彼合有百句廣有三十餘者類易次明勢分中人者見論第八云不健不羸擲者盡力擲也取石下處不取勢分轉處次結罪者計合具有百句略故但有二十又此二十約位而有據文但有十八謂留衣在此藍身往彼藍宿闕此一句故即二位各九初句文五一人衣異界二明相未出下教不犯法望開次第應須先言手投衣次至擲石及處次始須言捨今文據説次第故先言捨言手投者為對若干界要須手投擲石所及處者謂是一界入勢分內即成會衣捨者會而不逮寧可闕衣犯吉不可離衣獲提故僧祇第八云比丘著上下衣入聚落主人為供養形像作福德殷勤留宿若彼住處諸比丘有長衣者應暫借受持若無者隨近有諸比丘住處者應從彼借若無者有尼住處者亦從彼借若無者是處俗人若有衣被者應從借作淨施紉然後受持若無是事後夜分城門開者當疾還寺莫踰城出到精舍門猶未開者當索開門若不得者乃至無孔內手腳者踰垣墻入應作相令內人識莫令疑是賊相驚動若不得入者當疾捨衣寧無衣犯越毗尼罪以輕易重故三若不捨衣下不行捨會四明相出下雖三衣犯提五除三衣下離餘衣獲吉此謂助身百一加受法者餘文可知次蘭若文五一明界體八樹七間一間七弓弓長四肘肘各尺八此尺八者是舊小尺望今大尺但有尺五一弓四肘合有六尺計七弓有四十二尺餘六間各爾合有二百九十四尺五尺為步計有五十八步四尺五分露地同界者結加趺坐去身面七尺異界者七尺之外此是蘭若界二人衣異界三不行捨會四離三衣重五離餘衣輕次捨懺應不並如上明次一月衣戒三衣故爛不堪資身財少未成開滿無長六群因為同衣不足為求足故寄人起過故佛立法極限一月縱財不足過亦成犯別緣具六一三衣弊壞二得新不足三擬作三衣以替故者若作餘衣初戒所攝四不行開法謂作淨等五除不犯緣六隨過結罪犯相文二初開滿足第二時六群下因開起過彼有糞掃衣者謂無主納餘種衣者檀越施衣同衣不者足者是二衣當類不足取中者取向二中糞掃衣撩理作淨戒本七句一能犯人二除非長三顯犯時四若比丘下明非時及衣五受已疾疾下同衣足故不開六若不足下同衣不足開限一月七若過下隨違結犯廣中具釋前四句別解若十日下合釋餘句合中分二初至二十九日來有犯不犯第二若同衣下三十日已去一切成犯初文先約十日為法以十日內修常不犯於十日中復分為二初明同衣若足不開教作不犯五相釋第五句第二若不裁割下違而制犯釋第七句如是十一對十二十二對十三開犯義同故曰乃至二十九日亦如是於諸位中若同衣不足即是第六句義第二三十日已去同衣足不皆犯然同衣者謂十種衣中當分自同不同者各異不同亦可同衣者謂三衣財具不同者是餘長衣次取非親里尼衣戒所以制者有三義故一者凡是為下敬上仰奉情殷所有財物皆不顧吝大僧非親不善籌議得便受之令彼乏少二男女形殊理無參涉財物既交恩情偏密因茲起染容壞梵行臨危事險可懼之甚三狀涉譏嫌難分清濁脫被誹謗無以自明以此諸𠎝制之不許別緣有五一是大尼除下二衆二非親里三應量五衣除餘物多論應量鉢亦犯四本擬送施除貿易五領受便犯多論第五若多比丘取一尼衣多人犯一比丘多尼邊取一衣計尼犯十誦第六若先請若別房中住故與若為説法故與不犯呵中尼著弊衣往佛所者作發覺之由佛語尼言汝不應如是等者五衣本為資身長道今輒施人衣便不具破戒行檀事不應法故曰不應也佛聽餘衣謂五衣外隨意與人滿戒五句一犯人二非親里尼三取衣四除貿易五結犯廣中具釋然親里者謂是父母乃至七世骨血之親了論解親相應有四一從母母親相應二從母父相應三從父母親從親相應此之四親攝親斯盡餘文釋親皆同於此問何以尼取僧衣但得吉罪答大僧上尊與尼不數尼受義稀故但犯吉爾者僧與既稀何以提罪答僧與尼衣譏過中制生患義深故得提罪作此釋者二與解義譏無譏別論其二取稀數不同故使大僧取數與譏俱獲提罪尼則稀而無譏取與並吉次使非親里尼浣故衣戒所以制者僧是上尊使下義順尼居下位裁上事難故不籌量輒便驅使因生染違廢業招譏別緣有五一是大尼除下二衆二非親里三是故衣四除因緣下文開病及借不犯五浣染打竟滿戒五句一人二非親里尼三故衣四使浣染打五結罪問所以浣染打三戒合制答三義故合一使尼處同二故衣不異三犯相由致垢故須浣失色即染舒張故打釋中上三別解下二合解準其八業應有八句此但有五初句三提次有三句二提一吉次復有三句一提二吉文中略無次一句三吉無提僧祇使染便浣使染便打教打便浣教作而不作不教作便作越毗尼罪次從非親里居士乞衣戒所以制者多論有四種益一以佛法增上故二為止諍訟故三為滅前人不善心故四為衆生於正法中生信樂故別緣有六一三衣具足二無四因緣三非親居士四為己五應量六得入手滿戒五句一人二非親居士及婦三乞衣四除因緣五領便犯餘時者下列不犯緣但解四句不釋開緣次過知足受衣戒忽遇四患失奪三衣淨信聞之竭貧以施今不節量過限而受長貪惱物殊所不應別緣有六一失奪三衣二非親居士三為失故施若不為失隨施聽受四知為失施五過所應量六領受入手緣中取居士衣與六群比丘及與餘人者此據為他亦犯若準此文但使過受不問自他一切皆犯是則舊古三義屬他財犯己財者壞也戒本六句一犯人二遇四因緣三非親居士四自恣請下為夫故施五是比丘下教知足受六若過下過受結犯次釋唯除第二餘者具明若失一衣下釋第五句教應受相於中文四一明應取不謂若失一失二皆不應受若失三者當知足受第二知足有二種下釋知足差別白衣為比丘失衣故施但順本施心受者是名知足然此知足順在家人法故曰在家人知足出家人知足者即是三衣謂本失三是名不足今還受三即是知足然此知足順出家人法故曰出家人知足若居士自恣請下開自恣請及衣細薄過受不犯若有餘殘下元不為失隨施聽受釋第四句若比丘下釋第六句過受結犯謂失一受二乃至失三受四此等並是過知足受次勸一居士增價戒所以制者淨信雖施標心有限今乃嫌少索多違情惱物別緣具六一非親居士辦衣價二情期有限三知施有限四嫌少勸增五彼增縷價六領受便犯滿戒六句一犯人二施主非親三衣價定四是比丘下不受自恣請五到居士家下嫌少勸增六若得衣下領受結罪廣中具解求者已下釋第五句戒本雖無求字而有求義是故廣中牒而解釋此中增者要本體上增若其異體落前乞戒問何故增縷一線犯乞中要一領耶答乞非本心任彼籌量惱義是微一領方犯勸為先心期限已定今違施心一線即犯是比丘下合釋四六二句次勸二居士餘義如前唯勸二為別問勸令合作有增不增為犯何戒答雖復增者犯不增不犯猶是二人同作故屬此戒五分正勸夫婦合作犯次過限索衣戒所以制者但為衣價是寶長貪處深比丘進修應須捨棄既不自畜令付俗人後若須衣索須容豫今乃催促逼惱前人故作限約過則制犯此戒在畜寶戒後故作如此方便別緣具四一送衣價二轉付淨人令貿衣物三過限從索四得衣便犯此戒但為王臣心動生直忩切急索損淨主結戒本十句一犯人二若王下施主遣使送寶為衣價三彼使人下奉命送付四是比丘下懼犯畜寶不敢自受五彼使語下使問淨主六須衣比丘下示淨主處七時彼使下使付還報八須衣比丘下開索方法九若不得下過索結犯十若不得不不得進不次十釋中唯解初二及八九餘總不釋釋第八句文三一三語二六默三語默相破初語者如文次默然者不知默得時僧祇第九云如人入庫取物著店上頃又如裹襆物須臾即應去見論十五云何默然者口不言立不坐若喚坐不得坐若與飲食亦不得受若請説法呪願悉不得為説若檀越問言何緣至此答言居士自當知次語默相破如文餘相可解次雜野蝅綿作臥具戒多論第五四義故制一止誹謗故二長信敬故三行道安樂故四不害衆生故別緣具五一往蝅家二是憍奢邪三為己乞求四作臥具五作成犯戒本三句可知此言雜野蝅者顯其通名餘文憍奢邪者即是綿稱五分云憍奢邪者蟲所作綿臥具者臥蓐多論五云憍奢邪者是綿名也此國養蝅如秦地法蝅熟得綿名憍奢邪此國以綿作衣凡有二種一劈綿布𮖺如作氈法二以綿作縷織以成衣作此二衣名作敷具敷具者衣名也此以害生捨令斬壞餘不害生故聽全捨但有捨財略無懺罪為不對境無其還不次黑毛臥具戒然諸臥具言惑其人或言是三衣或言是敷具今詳制意略知其趣然前一戒以損生故隨作衣服敷具等皆成其犯餘戒不爾以不損生如法得故作衣服著招譏故制若作敷臥之具是則無𠎝若其敷臥犯者今諸比丘皆用黑白氈臥並應是犯然既不犯何惑其情談授雖言臥具用時不憚黑白此豈不是傳傳者迷文致令行人虧其教意又多論云黑羊毛作衣法亦二種一以黑毛劈治布𮖺作細氈二作縷織成衣此二種衣盡名敷具敷具者衣名也又云此羊毛衣得作三衣盡中受持爾者如何此文為名臥具答臥具者通是衣名或可覆臥不以敷故僧祇第九云比丘作氈三衣及尼師檀唯除漉水囊及絡囊餘一切氈作佛未制前諸比丘著氈衣露地如菴帳安隱住制戒已不復著氈衣故多病不安隱住以事白佛佛聽雜作謂黑白下三以此故知非敷臥物又開文有臥氈足為明驗又五分云應捨與僧僧以敷地若敷繩牀木牀上所以不聽純黑者以此毛貴著增貪求又濫世人行欲法故別緣具四一純黑羊毛二作臥具三為己四作成結罪見論純者不雜餘毛十誦第十黑羺羊毛者有四種謂生黑藍染黑泥染黑木皮染黑開文作蓐枕方小座具臥氈等非著不犯次白毛臥具戒白非法服黑復招𠎝唯有參為乃便應耳此已純白起過制使參作若據純白別緣具四如前戒本四句一犯人二作臥具三教參作四若比丘下不參結罪此文不顯五分云二分黑第三分白第四分下鉢羅者四兩次減六年臥具戒此體雖故堪得資身今乃棄故造新每常營搆長己貪結虗損信施招譏不輕故須聖制別緣具五一臥具先有故者未滿六年二不得僧法三棄故造新四為己五作成結犯文中與法成不如上離衣宿明滿戒六句一犯人二作新臥具三制限六年四不滿更造五除開緣六制罪次不帖坐具戒坐具資身不論新舊棄故造新長貪損物佛為息貪不損信施制以故帖不帖故犯別緣有五一有故坐具二更造新者三為己四不以故帖五作成結犯文中初制以故帖新二六群下不帖起過前文有三一覩坐具狼藉二起制帖之意三告衆令知戒本三句餘文可知多論若比丘作尼師檀應用故敷具周匝修伽陀一磔手壞色故次擔毛過三由旬戒出家擔毛迹同瓦碎既乖法式不合道儀又以有待之形假資方立故復開三過擔結犯別緣具四一是貴毛二為己三自持四過三結罪戒本三句一犯人二開持至三三過三結罪廣解中初二可知若有人持下釋第三句於中文三一不應助持二不得使餘衆三擔餘賤物次使非親里尼浣染劈羊毛戒多論三義故制為增上法故若諸尼衆執作浣染廢自正業則無威德破增上法又為止惡法次第因緣又為二部衆各有清淨故餘義同前此中新故俱犯直以損功故制問所以使尼劈毛提擔毛吉答擔稀劈數故有輕重次畜寶戒寶體利重長貪妨道多論制戒有三益為止誹謗故為滅鬪諍故為成聖乞食等種故別緣具四一是錢寶謂金銀國土所用錢二知是錢寶三為己四受取文中時王下彰其應不於中文四一大臣説非白佛第二佛告下彰過不應決定非沙門釋子者彰過言也既以佛為師不應畜寶第三我有下開為作屋以資道要故第四大臣下舉患喻非日月四患者應離為五婆沙正文開為五翳今言四者為對沙門四患故也既舉其四義合煙雲所以爾者以相同故或可煙者即是修羅煙也沙門患者有酒為放逸本淫是生死源金銀生患重邪命壞善根次明戒本應作七門一定戒文句二所捉寶體三明能捉業四開捉不犯五許助淨人六作淨方法七沙彌應不初門戒本五句一能犯人二自捉業三所捉寶四教人業五結罪次體者此文據體有三離分為七餘是為寶畜犯小罪然錢直言上有文像蓋是國土所用祇中四句或有國土所用相不成就者越比丘尼或國土不用相成就捉者越國土所用相成就捉者捨墮國土所不用相不成就作銅鐵捉者無罪多論第五寶者重寶金銀摩尼真珠珊瑚車璩馬瑙若受畜如是寶捨墮若種種錢似寶頗梨虎魄水精種種為珠鍮古銅鐵白蠟鉛錫如是等名似寶錢及似寶若畜得吉羅若以似寶作器入百一物數不須作淨若不入百一物數一切器與非器皆應説淨次捉業者僧祇第十云自手者若身若身分若身相續身者一切身身分者若手若腳若肘若膝身相續者若繫三衣等諸衣帶或置鉢小鉢鍵𨩲等是名身相續比丘凡得錢及安居衣直不得自手取當使淨人知若無淨人指示邊地語言是中知著地已自得用草葉磚瓦等物遙擲覆上待淨人來令知若淨人來知已持去不可信者教使在前行使知置一處若可信淨人者從意使知置一處次開捉者五分十九云阿耨龍王請比丘安居彼用金銀比丘不敢以是白佛佛言彼金銀猶此土石隨意用之十誦亦爾又有非人天處請比丘亦如是又就人間物中如九十戒開捉藍中遺落及寄宿處寶次佐助者僧祇云若襆裹中有金銀錢在杙上者不得自捉使淨入知若淨人小不及者得抱舉使知抱時應作是言我舉淨人我舉淨人得下物已當使解若不知解者得捉手教使解解已教知數若不知數者得捉淨人手數數已餘者還教著囊中若不知著者得捉手教著囊中著囊中已教淨人繫若不知繫者使淨人捉囊底比丘得自繫繫已還置𭏪上若淨人短不及者得抱舉若遺箱簾等在架上捨上取時舉時覆時亦復如是若行道時淨人擔金銀淨人若小得手牽去若渡水時得抱渡應作是言我渡淨人我渡淨人若淨人小不能上船得抱上應言我舉淨人我舉淨人下船時亦如是又若四月八日大會供養時金銀塔菩薩像及幢幡供養具一切有金銀塗者比丘不得自手捉使淨人捉若倒地者當捉無金銀處若遍塗者當以衣物華等裹手捉若無物裹手像上隨有未塗處捉及浴金銀菩薩形像使淨人洗若大會時有金銀像使淨人持出比丘得佐不得捉有金銀處比丘不得先捉後放次作淨法者多論第四云淨施法者如錢一切寶物應先求一知法白衣淨人語意令解我比丘之法不畜錢寶今以檀越為淨主後得錢寶盡施檀越若淨主死遠出異國應更求淨主然説淨有二種若白衣持錢寶來與比丘比丘但言此不淨物我不應畜若淨當受即是淨法若白衣言與比丘寶比丘言我不應畜淨人言易淨物畜即是作淨若白衣不言易淨物畜比丘自不説淨直置地去若有比丘應從説淨隨久近畜十誦五十四亦言此是不淨物若淨當受次沙彌應不可知次下廣解捨法既不對道闕無懺罪此寶佛不聽畜故捨言我所不應還中文二初不解事淨主以寶還者當為彼人故受使淨人賞之貿淨物受次解法淨主即轉淨物與次不還追索進不如文次貿寶戒以其寶體利重長貪處深貿易招譏亦制不許又以畜不假貿貿復不假畜是以立此畜貿兩戒復與下賣買戒體異不同故立二貿別緣具五一者是寶二互相貿三決價四為己五領受戒本三句廣釋金銀各三及錢為七一一互易成七七句然金等者見論云成器未成器等成器者謂鐶釧鉗鎖等餘可準知次賣買戒多論第五有四益故制為佛法增上故為止鬪諍故為成聖種故為長信敬故此販賣於一切波逸提中最是重者寧作屠兒不為販賣何以故屠兒正害畜生販賣一切欺害不問道俗賢愚持戒毀戒無往不欺又常懷惡心設有居穀心恆希望使天下荒餓霜雹災疫若居鹽貯積餘物意常企望四遠反亂王路隔塞夫販賣者有如是惡此販賣物設與衆僧作食衆僧不應食若作四方僧房不得住中若作塔像不應向禮又云但作佛意禮凡作持戒比丘不應受用此物若此比丘死此物衆僧應羯磨分釋名者販易有五稱為種種決價下高名為買賣此文但使買賣買賣即犯設不為利直取亦犯亦不開淨語不同餘文餘文淨語者十誦第七云若實須是物審思量言我以爾所物買若彼不與更應再語若復不與又應三語若三索不與比丘急須是物者應覓淨人使買是物若淨人不知市買當先教以爾所物買是物應教此物索幾許汝好思量者僧祇第十肆上衣先已有定價比丘持直來買置地時應語物主言此直知是衣若不語默然持去者越買餘物亦爾別緣具五一在家二衆亦攝外道二共相貿易三為己四自決價五領受文中開五衆者以同道故實言論直故曰應自等不得與二俗外道貿易故曰不得與餘人貿既不得自貿應令淨人貿易出家法體須順物情故有悔者咸遣還之十律限七日內若衆僧物者多云衆僧衣未三唱得益價三唱已不應益衆僧亦不應與衣已屬他故比丘三唱得衣不應悔設悔衆僧莫還僧祇云若衆僧中賣物得上價取無罪若和上阿闍梨欲取不得抄若比丘還共比丘市買博易作不淨語買者無罪一切九十六種出家人邊作不淨語買者無罪戒本三句釋種種中對於五物各互為頭成五五句賣買者先釋其賣文有其三一總言上下次增賣次重增賣此是上價買中亦三一言直五錢數數上下次與三錢名減買次與一錢名重減買準於賣故言買亦如是次長鉢戒鉢為應供之器一則資身今乃貯畜無厭招譏損道又以物變無恆因施聽受限期十日過則結𠎝別緣具五一先有受持鉢二更得如法鉢謂體量色三如三不説淨四無因緣五過十日犯滿戒四句一犯人二長鉢三開十日四結犯釋中鉢者已下解第二句文中有四一總舉六鉢通明體處色二大要下辨體唯二三出量分齊四以具三如制令受持及以説淨十誦二十一受鉢云我某甲此鉢多羅應量受長用故三説祇律二十三云此是我鉢多羅應量受用乞食器今受持三説若比丘下合解三四兩句犯相八門捨還等法一準長衣唯鉢為異次乞鉢戒一鉢五綴足堪資身況減不漏而復更乞此則長己貪心損壞僧衆汙辱不少故須聖制別緣具六一先有受持鉢二減五不漏三更從非親居士乞四為己五得如法鉢六領受便犯戒本兩句初文有三一犯人二舊鉢未滿三更求結罪二彼比丘下異餘戒故誦出捨還方軌於中復二初誦捨鉢二展轉下總誦還文文言此是時者謂是用舊持新時然下還中四文並應此誦懺及不還無異不誦釋戒本相可解次捨懺法文四如常然捨文言此住處者謂除戒場小界及自然此三皆非住處故又甄無住處為無僧庫故言僧中者簡三人等次懺如文次還鉢文四一貴者奪留直還下鉢二彼比丘下猶以為勝轉取下鉢三若持此比丘鉢下罰令持新用舊下鉢四比丘守護此鉢下恐畏壞故用新制令護舊下鉢此之四文並是取下鉢令持初文分二一處分留還二作法還下僧祇第十云若是鉢大貴者應賣取十鉢直九鉢直入僧淨厨一鉢還主如是隨得多少皆限一還主餘悉入僧次轉取下鉢文中亦二初作白次行鉢五分羯磨差知法比丘於僧中行之是比丘應唱使諸比丘各持鉢出然後持所捨鉢至上坐前問須是鉢不若言須應取上坐鉢看若無鉢若太大太小穿缺喎耶不應與若無五事應與與竟取上座鉢行從第二上座乃至新受戒人前亦如是行鉢之法隨僧量宜或可取新故言取上座鉢與次座或上座處分即還彼比丘鉢亦得故言若與彼比丘彼比丘應隨上座教取此鉢不應護餘僧意不取又不應以奪好與惡嗔恨因緣故受持下鉢乃至下座展轉亦爾次罰持新用下文二初牒前二下以不定故二作羯磨令持文言與此比丘受持者非謂加法受故名為受持直是罰令受行持此兩鉢故曰受持乃至破者謂舊鉢破來恆持故曰乃至破多云若食時當持二鉢終身如是以示多欲罪過斷後惡法因緣次護鉢如文餘文可餘次自乞縷使非親里居士織衣戒三衣備具資道不虧今更乞縷以馮勢力強逼織師織作三衣長貪招譏故須聖制別緣具四一自乞縷線二非親織師三恃勢不與價直四織成便犯戒本四句可知廣釋如文釋第三句非親者此中織師有親里非親里及親非親合與線者亦爾互歷應成九句但為俱親不犯故有八句此戒正損織師犯提縷主但吉為以一言通結兩位是故但言非親里者犯次屏勸織師增縷織衣戒居士本為比丘織衣理荷其恩稱施而受今乃屏勸織師自與價直自壞損他故所以制別緣具六一居士辦縷遣織師二情期有限三知有限四與價勸增五彼為增織六領受結犯問此與前戒織師何別答有四不同一前損織師不損縷主此損縷主不損織師二前戒由損織師不與價犯此損縷主與價結犯三前損織師開親不犯此損縷主親非親俱犯四前是己縷織成即犯此是他縷領受方犯滿戒四句一犯人二縷主遣織師為織三彼比丘下勸讚織師自與價直四若得下結罪釋相可知次先與他衣強奪戒先與他衣規為行伴彼既不去索須和豫忽以嗔心強奪特非所宜逼惱情深故所以制別緣具五是比丘除沙彌二規行與衣三不定與前人決定取是中應為四句一決定與決定取二決定與不定取此二奪重不犯此戒若不定與不定取奪犯小罪若不定與決定取奪悉生諍是以犯捨四嗔心強奪五得物入己文言不知誦戒等者前定二句防未起非初句不識自行次句不知衆法後之二句除已起罪初句自行懺法次句衆法悔儀戒本四句一犯人二先與他衣三嗔心強奪四結犯釋中奪而藏舉者謂是現前次著樹上等是不現前奪但為奪有現不結罪不同非謂重犯有茲二別次七日藥四大乖違諸病競起六腑差互衆藥咸須聖為蠲痾故聽畜服因斯貯積立制防之別緣具四一是七日藥二加口受問所以得知要加口法多論第六云若病比丘須七日藥自無淨人求倩難得應自從淨人手受從比丘口受已隨著一處七日內自取而食設受已淨人若觸更受若受藥已經二三日有藥入中應還更受更從一日作始次第七日此藥至七日應作淨若與人若服若不作淨不與人不服至八日地了時捨墮又十誦舉口手二受為問答五分戒本云一受乃至七日下藥法中皆云受七日服若無口法手寧經七三不説淨四畜過限問所以畜七日藥重餘三藥輕答七日資強用通內外貯畜情殷過限罪重餘三不爾是以過輕次下釋文犯相文二初開服藥二爾時世尊下因開起過前文復二初正開藥第二時諸下釋疑前文復二初對病開二時世尊下無病亦聽前文有三初開五藥二時諸比丘下明殘食法三舍利弗下聽服五脂前文復三初明如來託靜生念二從靜處下陳已屏念告衆聽服三時諸比丘下了前謬執時服言故前文有四一念所為人身有二病謂風病及瘡二我今下念藥功能為有充軀之能故云當食復有除疾之效名為當藥而無非時之譏故曰不令粗現三復作是下出藥名體四聽諸比丘下結成聽服次陳念如文以病為畜藥之緣故曰病因緣時次了教文四一謬解聖教病不疾除迷前時言謂非午後二世尊撿問三阿難答四了教説前言時者謂是病時此藥體通非時故曰時非時服次餘法文二一者病殘不須作法恐損信施開瞻病人食次非病殘作法文二一是僧食二子注下是檀越食作法應不至下文明次聽五脂此脂即是油類故是七日藥攝但以對病別舉佛思藥體中無時受等者謂淨人難得無人作者使淨人暫煮變生作熟從彼受取自於淨地中煮以變生故無自煮𠎝在淨地故無內宿過即時中故受法不失煮已澄清水滴作使汁滓相分得如法受用若非時煮漉者經時失受即有惡觸過生服之得罪故曰如法治若其淨人有客作者不簡時與非時故五分二十二云若時煮時前時漉時受得七日服若非時受不得經宿服次無病比丘亦聽隨時服藥文中遣令悲敬二田行施者欲使施主福田滿足此殘石蜜作變現者是佛神力非餘能裁故曰不見諸天等能消唯除如來次釋疑如文餘者可解以釋戒本二門分別一定文句二問答釋妨初門戒本五句一犯人二有病者畜藥之緣三殘藥下所畜藥體四開七日五過結罪次問答者問所以此言殘十日衣云長答三衣非長故對非長以得長名藥無非長可對以是食餘故云殘也又解殘之與長其義相似趣互舉之不勞為妨問所以定開七日僧祇云隨其藥勢七日乃知又云七日者數極齊七日多論正從作法生兼隨藥勢隨藥勢者如初日是若二三日觸聽更受七日者即是從作法問戒本應言畜而言過服耶答為服畜者可有長𠎝即甄外用無其長罪由此義故文中言服理實結罪都不約服亦可言中是倒應言服若過也次釋上三離明四五合解合解之中八門分齊悉同長衣句少為異先解初門二位分別一犯長不犯二服犯長藥得罪多少初位一日得藥至七日得八日明相出相染俱犯故曰盡尼薩耆問下六日藥被染犯長未知受法為失以不答七日得藥總不淨施長位是同相與俱犯受防宿觸不防於長所防既殊不可染令失受即是初日限滿受法自已下六未過受法不謝是以文言至第七日藥與諸比丘食若當失受即有宿觸等生何故乃聽諸比丘食爾者受既不失還至應食所以乃令塗然等用答以受不失由成擁已是故遣令塗足然燈為有貯畜情過罰不聽服第二位生飲過七日藥一咽得六罪非時不受殘宿三提內宿惡觸食捨墮藥三吉業一緣異各不相假若就飲八罪更加二煮因明藥餘罪多少者非時過服五罪熟飲即七亦加二煮時藥一咽理即具七隨有闕者準應知之盡形無限受法不謝若無病緣但獲吉罪若其不加口法服者唯無非時餘悉同有餘句類知總二十二捨懺位同還藥文四初對捨言還二彼比丘下處分應不所有過七日等三種處分並據捨日反望以説或不具三義準可解三應作白下作法付彼四此比丘下示用法式次雨浴衣戒謂過前求過前用二戒合制所以制者雨衣資身非全急要是以聖開時中乞用今時未至預乞先用長貪違教故所以制過前求別緣有五一是雨浴衣二過前求三為己四彼與五領受犯過前用別緣有四一是己雨浴衣二於時前得三時前受持準多論要須加法受持四過前用犯犯相文二初開雨浴衣二時六群下起過前文有三一發八願施浴衣緣二爾時佛語下讚願聽受三略舍聞下行其八願前文有五一因供乞願二佛抑不許三自言清淨四佛遂聽許五正列八願前六內資後兩外資斯之八願主及僧田利益既寬遂為佛讚次讚述文三一至覺意來如來反問願意答己願祈二世尊下佛讚精妙三爾時下告僧聽受遂前八願前文有二先問後答答中反明問答文中有三一問八人所趣向果二問八人至此國不三若我聞曾來等者逆知必受八願供養以此資給僧田心則歡喜我見此利故興願也次讚述文二一述可非虗故言此事如實等第二頌説讚美令心喜悅頌中分三初一行頌讚因深勝其因既勝感果精妙故次一頌來果殊勝果雖殊絶恐不恆有故第三頌顯果無窮初頌上半舉六內資下半舉二外資歡喜者心離慳垢三時俱淨慶己所作故曰歡喜此歎心淨施飲食者應法之物施僧受用簡餘非法物施獲福微少即是財淨若施外道及破戒弟子福田淺薄植福不多故言持戒佛弟子便是境界田淨三事既勝寧不精妙以衣外資奉獻衆僧故曰布施於衆人亦可通衣及食以奉大衆故曰布施等施雖不能究竟斷結亦能暫伏現行貪心故曰降伏等次頌感果者上半感果精妙下半屬當處所剋於樂果由於樂因故曰依樂此明因藥受樂報者近得人天樂報永得等者遠得無漏道果屬當可知次頌顯果無窮者上半顯無漏果下半明有漏果前中初句舉前因勝次句顯果無窮謂得勝進無漏以自適神故曰快樂此之快樂唯證乃知非是世事能況故曰無可喻次有漏果可知戒本三句一犯人二求用時節三過前求用結罪廣解可知僧祇十一此雨浴衣得四月半受用至八月十五日應當捨捨法者一比丘應衆中作是唱大德僧聽今日僧捨雨浴衣三説若至十六日捨者越毗尼罪尼無過前今吉羅者結多求罪少利故輕次急施衣戒憂勞未滿不合受施對有急緣開聽為受因開急故非急亦受既有過生故須聖制此兩戒合者同由一衣生故過前受具五緣一是急施二知是三過十日前四無因緣五領受便犯過後畜具六緣一是急施二知是三十日內得四不作淨五無因緣六畜過限犯相文三一開受夏衣二六群下因開起過佛即呵制三爾時下開受急施既開十日內受應有過前受過文無者略戒本五句一犯人二受衣時限三諸比丘下是急聽受非急不聽四受衣下開時畜無罪五若過下結罪又前緣中二罪俱無戒本但結過後畜罪廣解及開方始具二廣中一五別釋中三合解合解三中第一先解第三句急施衣二衣時下解第四句衣時三自恣十日在下總舉三句合而廣釋既言自恣十日在明知即是戒本第二句問從爾長衣過十日犯何故此急施衣七月六日受至十六日明相出更言一月五月應畜等長衣不與時分相接者但有前開是以即犯此急施衣兩開相接是以不犯爾者七月十五日出界不成破離以入十六日是即應去之限答夏衣但有後開無其前開以十五日夜猶須守夏獲衣是故不類去則成犯次第二句開一月攝十日五月攝一月何故此中迦提德衣月不攝十日而言過一月五月後更增一日答一月攝十日者一同非時二俱防長功能既齊以長攝短德衣攝迦提月者一月時位二俱五利功能亦齊以長收短今德衣迦提不攝十日者一時非時別二十日唯一長德衣等五利功能有寬狹是故不相攝以不攝故更增一日餘句類同不能繁釋但還衣言過前過後者此是出法之言理實過前受即座還主過後是長應經宿還不犯中初總次別別中先開過前次明過後次蘭若離衣六宿戒此戒同異如前但前戒聚落一宿即犯此蘭若怖處過六夜犯又前戒常流人犯有德衣開此勝行人不受德衣但對難故開聽六夜爾者既是勝行無德衣開如何得有除迦提月答迦提非作法是以故開別緣有七一受持三衣二冬分非時三有疑怖處四置衣聚落五不捨會六無因緣七第七日明相出文中有二初為賊難開置舍內二爾時六群下因開起過既因六群乘教起非設住蘭若亦限六夜戒本五句一人二反顯犯時三在阿蘭若下出難開緣四比丘下開六夜一會五若過下結犯釋中不解第二句餘者具釋蘭若下解第三句舍內下釋第四句若比丘下解第五句見論若蘭若處衆僧多房舍堅密不須寄衣聚落亦有除僧羯磨此雖無文義通無失次回僧物戒制意者僧利不輕輒回入己惱衆長貪故須聖制別緣具四一許僧物二作許想三回入己四領受犯滿戒四句可知釋中二四合解初三別釋僧物下解第三句三句之物回有重輕初物犯捨第二物回之無罪下文未許許想吉羅故知未許未許想無犯第三定屬僧物回入犯重此之三物相對故舉越次差會定屬之物既損別屬計直成重又解第二句物正當緣起回之犯捨餘二並定屬僧回則獲重又解此之三物俱犯捨墮以於本主邊回無盜心故不犯重若比丘下解二四兩句文三初正解回物入己二若物下四對八句物不入己但犯輕𠎝一塔僧相對二四方現前三僧尼兩衆四料簡上三同類同類回此與彼故言許異處與異處三境想四句上來三十捨墮竟
