body:
  text: 次下釋文大分十五第一宗明盡形壽藥第二爾時舍利下餘法應不第三爾時世尊下禁五種肉第四爾時世尊在波羅奈下檀越請法第五爾時世尊在舍衛下明七日藥第六若時藥下相和服義第七爾時比丘患瘡下明其雜法第八爾時世尊患風下禁其二內略明淨處第九爾時世尊在毗舍下開食三淨第十爾時世尊從毗舍下許淨人賞食第十爾時世尊從阿牟下開八種漿第十二爾時世尊從此住下雜明應不第十三爾時有吐下比丘下置藥淨地第十四爾時不淨地下護淨方法第十五時六群畜升下還明雜法前十二文可解今解第十三置藥淨地文中有二初舉緣白佛二佛言下開結淨法開文有三初對緣開結第二有四種下列淨差別第三諸比丘下釋疑對初解義三門分別第一開意釋名第二定二內處第三結之方軌初開意者良由行者報力不同故使大聖開遮有異且如上品之徒堪行乞食不假貯畜自得修道中下力劣事藉餘資若不開聽無由進業初以病緣開結淨地一開已後三品通益即是大聖誘恤隨機各稱根宜故有斯法准其類定局食障僧加以羯磨名之為結人食有殊宿煮無過食不生罪稱之為淨從處立名故言結淨地次定二內處者舊解云界是久居藍有鄣故單界單藍並有二內互有尚爾何況俱有者引證可知除自體露地一者非僧久居之處無貯聚義二來又無譏醜故無二內言自體者簡別於界言露地者異於伽藍今解異此藍有界無所以爾者伽藍無為僧住文言同一住處大界本為法同結云同一說戒藍既僧居即非作食之處於中作食有譏嫌故前文言比丘持食飲著露地不牢藏牧牛羊人若賊持去比丘白佛佛言應在邊房靜處結作淨厨屋以藍不得送在露地過若界中應送界外又此文言聽在僧伽藍內結作淨地又前三淨亦藍非界又云不得結上好房作淨處又鬼神廟屋何必定有大界准此皆藍不開界事但以藍有障蔽覩院相以招譏界或狹寬矚何分齊生謗又僧祇三十一云時僧院內作食厨潘汁蕩器惡水流出巷中為世人所嫌云何沙門釋子住處食厨不別比丘白佛佛言不應乃至潘汁流外者越毗尼又十誦初聽房中白二作淨後因譏嫌制斷又入楞伽第九云寺舍煙不斷常作種種食故為人所作行者不應食爾者既云藍有二內如何上下文中皆言不得界內宿煮解但是僧伽藍界非界攝僧界故上文言此僧伽藍界非彼僧伽藍界又以藍中有界界與藍等言界即藍獨界無犯又上下言是者皆是結罪文正開結處並曰伽藍問所以淨地不得宿看煮不犯煮答宿以人食同處招譏故犯煮為事不經久無譏故開又解煮為隨處宿為隨人以煮隨處故看煮不犯煮為宿隨人故與食同處犯又以煮隨處故於不淨地煮縱無比丘亦犯內煮以宿隨人故於不淨地宿若無比丘不犯內宿次結法者理應遙作不得在中為表人食有殊故言僧今某處結作淨地此之某處未必專依界起或界自體二處俱得如結衣界定依僧界故結法言同一住處同一說戒今以淨地不定依界為此結法不言同一住說但云某處又母經第二云衆僧住處初立寺時衆僧齊集廣先羯磨作淨厨處後羯磨衆僧房舍處若當時忘誤不羯磨作淨厨處者後若憶還解大界後解小界先羯磨淨厨處既先有界尚須解劫說今始結用界何為又下文有淨不淨間若唯依界何得有間又此結法一法結一處以處別故不得結多處又解一法結多處亦不違理猶如三舉懺殘得成之類次下解文文中有二初總指處法處是伽藍法是白二次別明處法別處即是藍內房等別法即是結淨白二次淨差別釋文可知解義有四第一正簡差別第二自他周不第三定處不定第四明其寬狹初差別者第一第四作法中淨第二第三自體中淨初四雖同作法體有三異一能淨人異謂道俗衆多及僧別故二宿不宿別其處分淨要僧未宿若已宿竟處分不成良為別人口約故故僧祇三十一云支尼耶梵志聞世尊來作僧房淨厨遣人請佛佛告波離汝於先去為僧處分受食厨勿令初夜過若過者即名僧住處其羯磨淨隨結皆得三二淨結解各須依本次二三兩種雖同自體第二以他處故淨可為四句一食己處他即第二淨是二食他處已如寄食是三俱他此三是淨四俱已有淨不淨如送食等第三院相不周無譏故淨如同室宿室相不成者聽次自他周不者第二周而非自第三自而非周初四俱是亦自亦周次定處者中二自體遍皆是淨初四作法則有分局如祇云應南方西方作又波離問得一覆別隔不佛言得如是復問通隔別覆通覆通隔別覆別隔一邊二邊三邊隔道閣上閣下佛皆答得此文比丘房等故知亦有分局體准僧祇謂是西南二方此方僧厨多在東者以敬西方亦不違理次寬狹者先明諸部祇律唯有處分十誦但有他處故四十七言瓶沙王死闍王伐處不名內宿五分有三淨初四分明體許職師屋中置食即是他處淨引文四淨最寬體就此四亦有寬狹狹者初四寬者中二次釋疑者並對羯磨淨說比丘房既許作淨除去比丘房餘人房不知得不佛言皆得乃至亦如是此是領解之語非欲遣人次疑有應解者不言故藍次故伽藍以曾云草捨無界是以佛言得五分若十二年空聽隨意更作淨屋祇律停廢二年得受作處分淨次第十四護淨方法先解其義三門分別第一列罪釋名第二辨其體狀第三通塞之義初門若據淨地但防二內今以類同總舉其四謂內宿內煮惡觸自煮內宿者比丘與食同處經夜名宿伽論第五云云何內宿食若界內不結淨地食在界內是名內宿內煮者藍本僧住不合煮食在中煮故名為內煮故伽論云云何內熟若比丘界內不結淨地界內熟食是名內熟惡觸者凡應食物皆有受法不受而捉名為惡觸此謂由觸得惡故名惡觸故十云惡捉者若持淨戒比丘故自取食大比丘不得食是名惡捉又有惡捉受彼文云若大比丘先自取體後從淨人受大比丘不應食是名惡捉受自煮者具戒之人不合營造躬自變生名為自煮故十誦五十八云大比丘自作飲食不應食若食犯吉羅是故名自熟次出體者直約人處四藥生熟成過分齊名之為體內宿體者要取長足長未足者不成宿𠎝自餘生熟食等皆有宿過果菜穀等須知合結時節是中四句一人在淨藥在不淨二俱在淨三俱不淨此三成宿不應食四藥在淨人在不淨此一清淨非宿應食內煮者無問生熟長足未足在不淨地煮並名內煮故文言重煮粥不得界內煮縱淨果菜亦須在淨地中是應為四句一果在不淨地二淨者在不淨地三俱不淨處四俱淨處是中初三兩句成淨是內煮不得食二四兩句非煮應食次惡觸者先定其體體有其二謂不受而捉及以失受體不受唯一失受有二口受時中失手局非時分次料簡成不者義為二門先對故投成不觸有其三一惡心觸為遮惱亂善比丘故故惡心觸望他不成故文言觸者是不淨不觸者淨二持戒比丘誤觸為無情過是以不犯故文云忘不受食便持在道行後憶佛言若見淨人應置地更受三懈怠心觸成觸非惡心不同初人非謹護又異第二故十誦五十二有二種觸食食無罪一清淨持戒比丘誤觸二破戒比丘無慚愧觸是二俱淨既此二是淨明知第三是觸因此四句一惡而非觸謂惡心故觸望他不成者是二觸而非惡謂持戒人誤觸有是三俱是謂惡止自望及懈怠者是四俱非清淨好食是次對具戒染不染義謂二具戒濕膩等物不得入淨厨中與淨物交涉及以戶鑰器非器等皆成觸染廣說可知故五分二十二云諸比丘無淨人不知誰應行僧食佛言比丘應受已行之有諸木器行食肥膩不淨以瓦石揩洗破壞僧器佛言不應以瓦石揩洗應沸湯灰洗次自煮者但具戒人變生作熟皆名自煮次通塞有四謂藥時人處第一對藥藥有其四時藥始終具於四過以資用強一切須故餘三但今為病開者隨三分齊並無四過故文言非時過非時七日過七日既云過犯限內無𠎝若論生熟自煮局生生有二種謂生相生生熟生俱成自煮餘三通熟其內宿煮不簡生熟但非宿煮之處俱成二罪計觸造作中制應內自煮但以聖不開觸故道生熟是中內煮義通一切其宿觸二不通生長未足次約時者若望食而生罪通時非時食據成過之時其義即異位可為三第一二煮通時非時以非淨地身業自為即便成彼兩種過緣第二內宿局是時中以明相出方成其犯第三惡觸不定若其不受而捉通時非時任運失受其義即異口是時中手非時分次約人者人有具不且內宿自煮局具具中說通故殘宿食戒云明相出時一切沙門釋子悉不清淨他比丘煮亦名自煮以是同釋並不合煮內煮約處以成誰簡具不惡觸不定不受捉者局具非小相染觸者義通大小次約處者處中有兩一淨不淨相望二內局不淨以非宿煮處故自煮惡觸通淨不淨以造作成故第二以人對藥就處論者觸自既通不須更辨直將二內約人處明若人藥俱在不淨地及人在淨藥在不淨俱成二內若其俱在二作淨中有宿無煮若在二自體淨亦無有宿若人在不淨地藥在淨地宿煮俱無次下釋文文中有六第一內宿有無第二時六群下制作淨法第三爾時衆僧下惡觸有無第四諸比丘下宿煮應不第五爾時世尊下儉開八事第六爾時衆僧下明無內宿先解初文文有二對六句初二更互相蔭次二更互相墮次二更互相入初相蔭者從根以判次相墮者不淨地果生長未足運運變改得入淨厨若長足者即名不淨問若其長足即犯宿者何故文言無人觸自墮者淨答為不知熟無取食心情既不緣自墮者淨若其心緣熟果作意欲食雖復自墮鳥觸不淨不應食故言若不作意欲使墮者淨後句從根判淨生熟俱體次相入者亦名隨根初句據熟不淨次句約生故淨若反前說前生後熟是則前生是淨後熟不淨故此二句各含淨不淨義文舉一邊義須通貪次作淨法外道但有刀火二淨佛因事故說淨有小淨法如上體二五淨法准義前是子種次是根種莖種體亦五分二十六云若食果應作沙門法五種淨謂火刀鳥傷未成種若食根亦應作五種淨剝截破洗火若食莖葉應作三淨刀火洗次惡觸有無文中有七一以淨人修理及有轉變非觸二爾時下三句扶助無觸三時諸下雖有所觸護僧故開五分二十二云應用新物覆勿令手近瓶頎翻卒無淨人可正佛佛言應自正但勿使器離地四時六群不重明淨法以菜非果事別故爾水洗連根菜佛判是淨觀文無有水減火相古舊諸師不善淨法故作此釋令解為食其根及以莖葉是故水洗得成其淨故諸部中有水洗淨五時有比丘下惡心故觸為護善比丘故觸不成觸五分二十二有一婆羅門以僧不淨米一把投車中佛言可別除去若不可別趣去一把淨入強多與食為受非觸六時諸居土下他物非觸七時病比丘下為淨人難得開聽自煮受故非觸次明宿煮重煮粥聽自煮者熟開不犯生則有違雖聽自煮須在淨地盡形壽藥理開二內許自煮者還據其熟猶如重煮不犯之類准此七日非時例應如是故五分藥法云諸比丘服蘇苦臭佛言聽熟煎若自煎若無使人煎若無淨地聽非淨地煎及未過限亦無二內因此有四句明受成不次儉開八事事雖有八種但有五謂二內自煮不受餘法有四僧食村中食故桃等果及水中可食物罪名唯二謂提與吉咸以對他損食是以須開既開不受明亦義兼惡觸既聽自煮亦有壞生除外局內為煮者開又准五分直食亦開文云諸比丘欲食果無淨人使淨白佛佛言聽先去核體後食之但為儉開豐則須斷不斷行者並如法治次無內宿文中四句初有一句木在不淨地次有夜移三句無心故淨淨不淨間者為不依界起者故有壃畔次有嫌彼二句防惡護善是以觸解者犯非觸解者淨次有客去二人心恆求淨以無情過是以並開次第十五雜法如文然五分食法未云復吉諸比丘雖是我所制而於餘方不以為清淨者皆不應用雖非我所制而於餘方必應行者皆不得不行上來藥法竟次迦絺那衣法迦絺那者梵音此曰賞善罰惡衣賞謂前安居人得五利罰謂後安破安人不得又曰功德衣若受此衣能生五利功德從功能彰名故曰功德衣又云堅實衣此衣作時為多衣所成故曰堅實廣明受捨儀軌集在一處名為犍度文中分二初明受衣儀軌第二彼六群下捨衣方法前文復三明受衣之緣第二衆僧應如是下受之方軌前文分三初以二國比丘為緣第二爾時世尊下彰安居竟四事應作以因受衣乘列餘三初一通十四十五十六三日餘之二事局十六日第三有五事下明其五利此中文二初為五事受衣次受衣已得作五事次受方軌先解其義五門分別第一受時第二受處第三明人第四約衣第五辨法初時有二一受衣時二得利時言受衣時者依此律文唯局十六日以十五日安居未竟勞不滿故若十七日受時已過向後冬分無五月故是以文言聽冬四月竟僧應出功德衣又云自今已去聽自恣竟不受功德衣一月受功德衣五月又伽見二論後安居人不得受衣故知受時定局十六次得利時者定局五月中間八捨長短不定次約處者謂是作法界作中是大非小大中要此界人異界人不得見論十八若作處不滿五人得喚餘寺衆僧足數受衣客比丘不得受次人有三一受衣人二持衣人二初僧別言受人者五衆之中上二非下三見論四比丘一沙彌安居欲竟為沙彌受大戒得足成五人受衣新受戒人亦成受一比丘四沙彌受戒亦如是以此故知沙彌無受衣義就具中有安不安不安者不得以非安居竟故就安中局前非後就前中取成非破就成中有僧伽梨者得就有伽梨須在界內雖在界內須在僧前如說欲人不合受衣二持衣人者謂取同界安居有德行者十律具五德者差遣謂不受等知受未受此雖無文義亦應爾三僧別者是僧非別僧是四人僧收作法要須具五故見論問幾人得受迦絺那衣下至五人次衣者體是三衣還具四如方得𨷂如及餘衣等並不成受引律五條不許縵作論功德衣必須割截故言五條裁作十隔伽論減量衣亦不成受論多少者下一極三又求亦須應法耶命等不成如文所說若得未成者即須使作文中但言羯磨差比丘令作無羯磨文五分二十二即出白二差一二三乃至衆多助之祇律亦言一二三人次約法如文次下釋文文中分二第一示作應法體色如非第二爾時有異住處下明受衣法前文復二初體如非次時六群下明色如非前文有三第一舉如成受第二云何僧不成下舉非不成第三云何成受下舉前體如應法合受前文有三初總舉應受第二別明應法三結成應受第二別中文三初明衣體次不以下明求如法第三即日下示應受相初體三句初句以初得故總名新衣體新兩種次別二衣一從人得故曰若檀越施衣此以佛聽受施二自拾所遺擬充法服故曰若糞掃衣此是制衣次第三爾作淨法於前衣中道新及故此新故衣戒以新物怗為淨或可浣已納為淨次求五句求非占卜故不耶命准次兩文應加一不諂曲句得如常儀故不以相無言判動云不激發得非十五故不經宿體元無過不曾捨墮作淨次應受四句一來應法二爾條數故云五條十隔等三教作儀故浣染等四教受相故在僧前次結可解次不成中有難者謂是八難無僧伽梨者無所為故次應法合受如文次色可知次受衣文五初舉緣啓佛二佛言下示以受法三爾時優波下問答疑滯四若得下料簡成不五彼六群比丘下示受利時初文得衣不解持法希示軌摸故須啓聖次示法文四初明白僧知受不受第二如是下差守衣人問所以自恣先差次白此受德衣先白後差答自恣制作故先差後白衣為是開不知受不是故要須先白後差三大德僧聽下為重此衣羯磨付彼於此住處持者謂不得衣利四彼比丘下正明受法法文三初持衣人以衣摸置兩辟隨得手及言相了處三說受法次彼諸下衆僧領受為彰持受合儀故曰已善受此中所有功德者謂是五利既無過損美響外彰故云名稱由我獲此名為屬我次答爾者謂持衣人發言許順有欲受者應如是作其不受者默體任過次波離見說九句生疑發問佛答為現故受不為去來次衣成不及受利時如文可知次捨衣文二初時滿制捨次有八因緣下廣明捨法前文有五一不捨白佛二佛言下彰其不應三自今下辨捨時分四應如是下制其捨法五若不下過限結罪第四捨法文二初捨方便次正作法體前方便遍通諸法若有𨷂者作法不成此方便為六句一者僧集如文云當敷座打犍椎盡共集一處又云應來者來對此須知集數多少依用分齊少者不成二者和合如文在現前應呵者不呵此之僧集和合所望有二不得為一謂有僧集不和合或有和合而僧不集故知僧集據數如文僧者若四若五和約情同如文和合者一羯磨一說戒三未受大戒者出為非類故不合同法四不來者說欲如文云應與欲者與欲來然前集中計亦攝欲然以說欲事別故更離明五者問其所作故言僧今何所作為六者答所作事故言出功德衣然此問答有通別可知次白如文五分白二法捨次廣明捨文中分三第一直明八捨第二復有六事下錯互差別第三有二種下明究竟失此中前八後二隨事彰十論其捨體位束為三八中前六要心捨次二同是作法捨後二之中但取持衣比丘出界捨一衆僧和合共出者同前前文有四一舉二列三釋四結釋中一去有要心永去作不還意此要或受時作戒欲去時作後遂要心故言去捨二竟者本要作衣竟而即捨今作衣竟遂要故捨三不竟者本受衣利為欲作衣今至界外息心不作又不還至留衣界內衣雖不竟遂本要心名不竟捨四失者本要出界為欲作衣衣竟若失不須衣利今失遂要故言失捨五望斷者本要受衣有希望處此望不得有續不捨若其前家望斷後無望續既無望續我捨德衣後至望處遂要故捨六聞者本要作衣擬聞即捨今聞僧出遂要故捨舊解此聞通虗實問若聞僧捨名聞要者僧若捨竟何待要心又若無要聞應不失解謂聞僧中別人不受衣利故名聞僧出衣今解此聞是虗非實僧實不捨自有聞要有人謬傳稱要故失若實即當第七冥伏豈冥伏已更假要心又文正言衆僧出衣不得言是僧中別人上來六捨由有惡心若無要心有六不失第七出界者受已出界僧作法捨彼在界外冥伏失衣若不知捨受利無罪第八共出者受已作衣若竟不竟還本住處共作法捨故名共出次第二文五初有二六第二有四十五第三有二十四第四有三九第五有二五此之五位合有一百一十八句先解初文此中初六對未得衣次六對已得衣亦應更有得不得合文無者略問初六既未得衣何有竟等捨答以初受無故稱言未得後得後作衣故有竟等此中且隨位別作其二六依文解釋不違大理不須更以竟等來配二二除之成其多六次第二位謂得衣未得及得未得各為十五文云錯互上八者八中第七唯局界外此冥伏失不通界內以來在內和合共出即是第八若不和合別衆不成餘之七種通界內外內外各七故成十四冥伏唯外合十五句次第三位初十二句約一家起望作三位四句初四句得所望衣次四句不得所望衣及得非所望衣後四句同是望處得一不得一故言得所望衣不得所望衣此之三位各有竟不竟失望斷故成十二去聞出界共出同不對衣故所以無次十二句作法同前相傳但對衆多家起望為異次第四位還約得衣未得等各作九句初九者界內聞道路聞至彼聞各三如文以對作衣但有竟不竟失以不求衣故無望斷餘二類體次第五位初五為往餘方故無去要元不求衣故無望斷身在界外故無共出但五如文次五唯以樂靜為異次第三位如文本為此人守衣利及餘者今既根本出宿餘人並失上來迦絺那法竟次八犍度明其衆法此拘睒彌據辨能秉德行在護衆儀應名護衆犍度又就所料理事即是鬪諍犍度今就鬪諍起處及說護衆行處為名故曰拘睒彌明廣護衆德行儀軌集在一處名為犍度就中大文分之為三第一舉諍為釋理事第二爾時世尊下默擯捨去滅諍方法第三爾時佛告優波離下示其護衆軌則令使受持前文有四一舉諍事二時舉罪下具以白佛三佛言下彰其應不四爾時世尊往被舉下對諍勸和前文復四一與犯罪比丘作不見舉此犯罪者文無定說且寄翦剃論其應不二犯罪比丘下自言不犯不肯伏舉三彼即往下求伴起諍四彼彼舉下別部成破次白佛佛呵可知次影應不文中分四初彰應不二彼被舉下鬪諍增熾三時衆多下不知瞻法四佛言下示安處所前文有二初對能舉一往彰破謂一界中彼此秉法相望不成故言破僧次若彼下明其應不此中文三初舉應成父言若彼者以不對其所舉故言若彼若彼所舉如我所說不妄求伴同一和合成就不犯汝等者以對能舉故云汝等汝等能舉如我所說求得良伴相助和合亦成就不犯次何以故微成所以次有二下釋釋中先舉不同舉非合棄文有五句一者舉數二者微問三列二名四云何下釋二差別此中自作不同住謂前外求伴黨是僧與非不同住謂前僧與作舉者是五是為下結次舉其同顯是令修文准其前亦合有五為𨷂微問但四同上次下三文可知次勸和文二初屏處別勸二七爾時下對面總勸前中先勸所舉文有其五一勸犯罪比丘見過懺悔若言不見等衆僧咸是三藏國之所重實是可懼當應見罪二彼犯罪比丘下勸思衆僧有大威力若不見罪必當舉我三若彼比丘下既作舉治必奪三十五事四若彼比丘下既不同事起諍成破五若比丘重此下勸自見罪和合利益次勸能舉亦五如前次對能所總勸文二初序次頌序文有三謂三勸三根初一廣文謂引俗事白衣有此重怨尚捨和合汝等云何執輕不捨世尊如是勸時比丘不受二三重勸廣文同前次頌分二初十二偈通勸能所息諍餘怨又今實行外彰與服相稱次四偈半偏教能舉匡衆之儀去住諧和進不之狀前文有九初有一偈影過至極舉重說輕二有一偈誦前捨怨以俗況道三有一偈顯怨由諍四有一偈彰忍除怨五有一偈無怨自適六有一偈忍益自他七有兩偈勸知堅法八有兩偈勸修勝行九有兩偈勸行同服初偈初句正以諍故穢響流次句忍是上法不能修行次二破於衆僧匪由大事以其小忿遂至如此次五偈釋相可解次第七堅法文二前偈舉非令棄謂是鬪諍增怨生死不絶故曰無堅愚夫不了及謂此勝故曰說堅牢忍能除怨永絶苦報故是堅牢亦謂愚夫不了將此為劣故曰見不堅由此心迷是非之理不稱聖教故曰彼不解等次偈顯是令修由心了達是非之理解持有益知破獲損稱教修行故曰堅窂知堅窂等次第八勝行亦前非後如各上半喻下半法合鬪諍比丘三毒如箭內無勇決對治之心義同執緩意欲害彼毒從心生先自滅善故曰自傷手沙門合上猶如人不善良合上等執緩增益地獄合上自傷手次偈諸善比丘恆以三善為心不縱三毒故曰若能善執箭內善調伏勤修對除義同執急善因既成不為毒損故曰不傷手沙門合上若能善善自良合上箭執急便得生善道合上不傷手次第九行同外服亦先非後如雖彼忍服不除煩惑故曰雖有等不除怨害行與衣乖故曰不能等次是若能除結守戒無違怨諍自己泰體安樂是則內行應於外衣乃名出家入道人也次明迬衆之儀於中文二前二偈半求伴不得去住儀則初偈雖無善伴於己無損理須謹意不與愚同次一偈半寧既無善伴恐為愚侵應捨獨行如山頂象次之二偈明伴有無進不之狀前偈既得善伴衆可料理宜應善御令無憂惱次偈無伴不可料理亦速捨去如前野象次明滅諍文中有二先明滅諍方便次作如是念下正明滅諍前中文二先佛默捨作斷利方便次時拘睒彌下諸人共損作伏罪方便次正滅文四初明被舉思𠎝伏罪第二世尊告諸下以心歸伏佛為刊定第三若彼比丘比丘下教僧為解第四佛言下非時和合前文有三初由斷利詣佛求滅第二時舍利弗下四衆請瞻諍比丘法此中四衆請故文則為四初比丘請復有其四謂知法非法處所利養坐起尼請文二謂法非及教據處三四二俗請中文各為二知法非法及以利物第三爾時被舉比丘下自驗知非相將白佛次刊定解舉如文次非時和合文三如上次示儀軌文中分二初舉所料理事有應治不治第二長老下明能料理人德有應作不作前文有三一舉二徵三列此五人中前三雖有實犯或衆不滿或僧不和不應即治治成破僧但慰喻言汝若見罪當應懺悔後之二人衆滿和合要須治罰令使調伏若其置而不治不成匡衆之德第一犯罪人正當緣起此不合治治成鬪諍由此一故因列餘四體此初人罪是提等二是殘罪故言僧中悔三犯乞鉢故言此僧中懺四是惡馬治法此人犯罪罪體不虗衆並見聞即須治罰又以無輕僧解拒既不伏罪弃同惡馬非直此衆餘衆亦然故言所住之處亦當舉汝此即義同自言及等求聽故言不應求聽此即是聽文中有三謂法喻合五是不見舉屏有實犯為他所舉不肯引伏故舉治又惡馬治者事罪俱不引二舉治者引事不引罪次明應作不文中分二初明應作不次爾時下問答勝美前文有五初波離問既見所斷理事有合治不合治未審能秉之人成就幾法堪為護法匡衆次佛答有五三微四欲作事下別列其五一實不實實謂有犯應作無犯不應作第二彼比丘下事雖有實應觀有利無利利謂因此觀過故惡從善應作無利者謂不觀過及生忿三若比丘下事雖利益復應觀時非時時謂數滿和合事順應法應作非時謂數緘不和事不應法不應作四彼比丘下雖知是時復須觀僧和破五若比丘作事下驗伴有無此對前緣但有實犯𨷂下四法故合僧破五優波下結次問勝美上半領言佛為僧說所斷理事及說衆主匡救之行故言為僧說此語此領前語益潤無窮可令比丘永為心軌故言義利決定故下半發問初句不知更復有何勝美堪持上法處衆料理故言云何得知勝次句不知如何識所斷理以法決斷堪為護法故言比丘得堅持次答文二前七言偈答初問次五言偈答後問前文分六初有兩偈彰其行勝將匡衆紹隆行須超物若其觸事有違何人遵奉故須先明持戒行勝行雖是勝若無其解即無決斷之能肅物之德為此第二一偈明其解勝解行既備堪能決斷秉衆斷理情無疑慮為此第三三偈明決斷勝在衆決斷理應謙恭如其慢高反招譏青故第四一偈明卑下勝既也謙恭能匡衆法理須識事由起怨言是非故第五兩偈明調物勝既具前五堪任秉衆能令正法久住不滅故第六一偈明持法勝次釋其文初句內心清淨次句外相可觀由此怨家不能呵語次偈初句能離怨言次句以行簡人名之為彼彼匡衆主行淨無無違故能得是以得是故他無謗也次明解者初句牒前行成次句解無疑滯次明決斷文中有二初之一偈立決斷宗屏雖無畏未堪秉法要須在衆心安方能匡護故曰在衆不怖處衆斷理色心如常故曰無變異隨有決斷皆稱正理故曰不失等次兩偈正明決斷此中初一句問餘三句答內有捷疾之辨故曰卒答等復有廣見之能故云隨時等情無變懼故曰應答等次卑下可知次調物者辨事起因本細解怨言以是怨家不得其勝行此法時實為摸軌一切衆人莫不瞻仰故云調伏多人次持法者德行既然堪為師訓秉衆斷理先道答時故曰常為等次答所料理事文亦有六初有二句知犯不犯二有四句知悔不悔三有二句勸知悔人四有三句能受僧命五有三句能離其慢六有二句結成護法初文若犯如是事謂止作二犯是前五種犯罪人不犯得罪除謂專精人以不犯非罪得除滅次文此垢牒前犯人犯有止作稱二此二皆了故曰俱知知垢懺除即是悔犯之人次二句示衆驅相或可知垢悔者是五種人中前三不悔等是後二次勸知如文次受僧命是有信人為有信故能用衆言次下二文可解上來護衆法竟次明瞻波所秉之法若其就法為名應云羯磨犍度今約說處標目故曰瞻波廣明羯磨如非之相集在一處稱云犍度就此之中大文分三第一無事被治情疑成不第二爾時此舊比丘下舉以白佛發覺呵責第三告諸比丘下廣明羯磨如非之相前文復三第一止不供養第二彼客比丘下無事被治第三彼比丘下情疑成不次白佛文二第一舊住比丘啓請發覺第二時彼客比丘下對問自言以辨呵責前文有五第一進詣致處第二爾時世尊下問其安不第三汝比丘從何所來下問其來方答陳上事第四佛告彼比丘下佛判不成第五汝比丘可還去下佛與為伴次文亦五一明進詣二問安不三問來方四問言彼頗有下問得自言五爾時下辨其呵責次下廣明如非將欲釋文四門分別第一科判經文第二定其宗意第三寄緣有無第四隨文解釋初門此中隨緣事別總為十一第一對緣略舉罪結示應不第二有四滿數下約就滿呵以明應不第三時六群比丘下約體未成僧及所為是僧非第四爾時六群比丘下不得重秉增加疊法第五爾時佛告下明四種僧用之分齊第六爾時六群比丘下對起七非以明應不第七爾時優波離下問其藥不當病傍秉應不第八爾時有異住處下秉法對衆臨事難成第九爾時有住處衆僧下為彰非體識難衆諍不同第十爾時波離下問得法人應解不解第十一波離下復問此人應驅不驅第二門宗意者初文對緣略舉四非次則東為兩箇二法二非不應作二如應作第二文中滿數故如不滿者非不應呵者不成呵非應呵者成呵不止非第三文中六群比丘一二三人然非僧故舉他一二三四或雖是僧而復舉即所為是僧非此但舉非異不明如如者僧活一二三應秉故如第四文中寄其治人滅罪彌諍不得重秉增加壘法此亦舉非不辨其如如者稱病直作不重故如第五約其用僧以明分齊隨其分齊滿如少非餘次文中是非相顯體第八文中亦但舉非論其如者盡集和合不落非故名之為如即諸文中如非具有相對辨者便成二十二法今以略故但有十九然諸文中據其宗意並須相對以顯故唯十一第三門此諸文中第二第五無別緣起佛直為辨第七第十一寄波離問答以顯如非餘之六文咸有緣起並以比丘對事興故以緣啓佛佛為具辨斯亦表其衆法難成之狀第四釋文先解初文文中有三第一總舉其數故言告諸等第二列其四名此中初句直言非法羯磨正是緣起事非或可既不別列更含餘非下之三句以人秉法故使人法相參以明文言非法別衆者人法俱非非法和合者法非人如法別衆者法如人非上來四句若其人法離明使有其七第三是中下結示應不於中折取五非以為人法二非文言非法者是上三句中非法言別衆者是二四句中別衆此等皆無軌要故言不應作言法羯磨和合羯磨應作者法謂第四句中法和合是第三句中和此有軌要故言應作此中非體即是四非下但結示應不不是非如體狀所以知者文言是中二羯磨不應作非法羯磨別衆羯磨豈可非法離人所秉若其和人所秉即是第三別人所秉當其第二寧得直言非法羯磨不應作等別成二非之體二非既無別體二如亦爾釋文雖爾須以四門分別第一能秉僧第二所秉法第三秉法處第四所為事初約僧者緣據治人故是四人僧攝理實四僧道有以四種僧通秉白等三法此白等三法咸具四非望僧秉法雖有寬狹論其四非四僧通有次約法者緣據治人是白四法理實四非遍通白等三法且如單白當體文句增減及有事非即是初攝如一白處作二白別人秉故即第二非若一白處作二白和人秉故是第三非若其如白法作白別人秉故是第四非白二白四四非者若其法體增減及事非者是第一非第二非者若為此事作白為彼事作羯磨名為非法別衆秉故是非法別第三非者非法同前和人秉故是非法利第四非者如白法作白如羯磨法作羯磨名之為法別衆秉故是法別衆以此故知白等三法具有四非次約處者通明其處位二事四於此四處並有四非乃可以法望處自有通局論其四非實遍諸處次約事者所為通明有其三種一者情道事如受戒受日呵責覆等二為非情事如結界淨地等三情非情合如處分離衣等此之三種是所為事對事興非咸悉具四次解第二文文中分三第一舉數文言四滿數有謂以四句釋滿數義若文具足應云有四滿不滿數今隱不滿直明其滿故言有四滿數古舊解云非四皆滿從初受名故曰四滿此釋不體初句正本但列三人文略不舉遮不至法體或有者人准義加正本既列三人如何乃云從初作名第二列其四名第三牒名解釋初句四羯磨人情過輕微治不重故得滿數體以身有行法不須呵限次句身無具戒不得滿數以事重故是以聽呵此呵准文臨義即是恐法不成故呵若依十誦即是心不用受故五十七云或有沙彌受具戒時心悔不用受作是言我不用受具戒是言成遮沙彌尼受六法時或又受具戒時亦爾比丘懺僧殘作別住等時及差知事人時作是言我不用成遮次句俱不得廣列二十八人次句俱得以善比丘等六翻二十八人一善比丘反上二十二此約通說若別說者善及十八比丘及尼等四亦可善及三舉二滅比丘及餘十七次同一界住翻前二人同一住者謂舒手內翻前別住同一界者翻前戒場次有三人直相及對六乃至語傍人翻前所為作羯磨人所為人者不成可非此既成呵明相及對五分第二十四云若同界比丘呵乃至使比丘坐聞成呵准此呵時雖不對羯磨人語直共比丘坐評論是非亦成呵限次義應以六門分別第一滿呵相對第二定人多少第三約僧第四約法第五約處第六約事初門若其一往以滿不滿相對者若滿數者即是即其如以應呵故有呵不止非若不滿數者即是其非以不應呵故不成呵不止非體此四句之中初與第四並是滿數若望其呵有應不應二三兩句俱不滿數體望其呵亦有應不應又以呵應不應對滿不滿者謂應呵之中有滿不滿即二四兩句是不應呵中復有滿不滿即初三兩句是問此言應呵者未知是何等呵答道明呵者有其二種一情乖故呵呵成別衆呵二情同故呵呵成呵不止呵今此呵者但據情同呵不止非說不約情乖別衆呵明所以知者如第二句不滿得呵但成呵不止非不成別衆此句既爾餘句類體亦可雙望二呵辨應不應者初句被治人故不成呵不止非得滿數故呵成別衆文對初呵故曰不應第二句不滿數故呵不成別以聽呵故呵成不止第三句以不滿數呵不成別不合呵故不成呵非第四句俱成二呵以滿數故呵成別衆以應呵故成呵不止次定人多少者初句文列三人或有四人者具足合有九人謂加別住等四及罪處所第二句中但有其一以義而言通男女二報第三句中文列二十八此須除去呵責等四別住等四及罪處所若對作此九事合有三十七人不得滿數復不合呵故下文言別住等四不得更互秉法足數別住等既爾呵責等五類體以此九人並奪三十五事若除此九復除為衆秉作要無別所為者通望餘法始有二十八人以為俱句第四句謂除呵責等九通望餘法以善比丘等六翻前二十八即是滿而合呵若對呵責等九總翻三十七人者則有七人應加第七非被治罰以此一句反其九人次約僧者初句如文列及義加者但通五十兩僧二十人僧不得有四人僧中除八箇白四法已餘法通有第二句唯在十人僧全五人僧半餘二位僧及五人中半全不得有第三句若望二十八人以為俱句即道四僧不滿不合呵若以義加九人為三十七者唯在二十人僧及四人僧少分餘五十兩僧全不得有第四句若望六人翻二十八即通四僧若其以七翻三十七者唯在二十人僧及四人僧少分餘五十兩僧亦不得有次約法者初句須除九箇白四若望作此九法即是第三句攝除此九法已通餘白等三法第二句唯是戒師一單白及一白四此通二衆受戒合有四法諸餘法中全不得有第三句若望二十八人以為俱句即通一切白等三法若以義加九人為三十七者唯對呵責等九法餘法中無第四句若其以六翻二十八即通一切白等三法若以七翻三十七者唯對呵責等九餘法中無次約處者初句遍該諸處謂位二等二句局作法界於作法中遍諸大界小界通二餘二小界及自體中無第三句若以二十八人為俱句遍諸自體作法若以義加九人為三十七者即於大界及戒場中除去少分第四句翻第三義及可知次約事者約句於情道事中除呵責等九法若作此九即第三俱句攝除此九外遍通餘事第二句唯局情道餘二全無三四兩句義可准知次第三體未成僧文中分四一六群起非文有十三句謂一二三中各有四句僧中但一故有十三第二白佛亦應具言為離繁文故略標舉第三佛言下彰其不得具十三句第四若一人下判成非法亦十三句於十三句中前十二句以體非僧第十三句雖體是僧體以所為是僧故成非法文應舉如無者略也次釋其義還為四門先約僧者此中文意正約四人僧辨以三人下非僧不應秉作若滿四人雖體是僧以所為是僧復成非法若以義准通五人等餘三僧者並成非法以應五人秉法四人非僧不成十人二十類准並爾今文直以四人成僧應秉諸法故偏說也次約法者文寄治治人故專白四望並道白等三法不得專望白四說以為非但知體未成僧秉者皆成非法次約處者文據治人似專作法於作法中是大非小義准亦通自體小界以三人下對處皆非次約事者文據治人即是情事若以義准餘二並通次第四重加疊法文中有三第一六群造非謂呵責等七別住等四及七毗尼合十八法約治人滅罪殄諍論之次舉白佛次彰不應略無第四判不成文又無如者亦是略也次義還以四門分別初約僧者據文治人等十八法是四人僧及二十人僧攝義准亦道五十二僧以重秉者皆成非故然四人僧中所秉事多重非亦多餘五人等三僧所秉事少重非亦少次約法者文中約緣且彰十八理實義通自等三法體白等三法約位總舉若其搜求上下諸文對事設法合有一百五十七謂白四十白二七十一白四四十六若約僧尼二部通局總明便成二百七十八法單白四十形法二同白差教授師喚人衆戒師問難二部受問難合六說戒白非時和合非時說戒增說戒二白僧懺及發露二白合七白恣白略恣白一却恣三白合五受懺行鉢異語觸惱受功德衣及捨合六現前滅諍蘭衆白遣出三人三白草覆白合五五百結集中六白差衆一正集一對波離阿難問答各有二白七百中有五白欲結集一差衆一正集一問答各一舊出單白有四十三今以略恣三白體同合一及七百中對衆刊法三白體同屏處論法三白是以不離既除此五更加增說戒二白為四十此四十中尼受問難白局為尼秉結集中十一白局比丘秉餘二十八通二部即五十六法及十二局者合六十八單白白二七十一二房兩法還衣有二轉付反直離衣六年持鉢七學家癲狂覆鉢不禮捨教捨及解十結大小界八及說戒堂攝衣界三淨地庫藏并解合二十六分僧德施二轉付及直攝分亡人物亦然賞勞法二六四月共住受日杖絡囊請畜衆持故房與居士修一營付德衣六切差人為一亦得或可隨類別者離明亦得差身子說過差自恣人差教誡尼人尼差請教授人差往僧中恣人差人作德衣差人守德衣差人守庫藏差分房臥具差人懺白衣差人告覆鉢家差行等人差人取欲差受戒使差撩理房人差分衣雨衣粥等如沓婆類為一合十六此中解覆鉢捨教捨及解解戒場二攝衣說戒堂淨地庫藏餘三大界取得作德衣賞知事人衣分僧施亡人二直攝此十七法准文合有略無法體舊出白二有六十一合加還衣轉付無村衣界及解分僧得施及立人物各直攝法差分房人差懺白衣人差守庫藏人及捨庫藏賞知事人衣為七十一此中不禮及解差請教授人差往僧中恣人差受戒使合五是尼法差教授尼人捨教及解合三是比丘法除此八法餘六十三通二部秉即一百二十法及局有八合一百三十四白二白四四十六僧尼及沙彌違諫合有十二七法解作為十四僧尼受戒及六法三別住等五憶念等三及解罪處四犯重及逆人等合為一擯學悔重犯擯法擯沙彌及解五尼有半月本日出罪三法此半月等三及解擯沙彌并邊等擯法准文合有略無法體舊出白四有四十一今除本法白四既本法中三白不離白四何目別出更加尼半月等三以能秉異故及解擯沙彌又擯及本日各加其一為四十六此中不同諫有六及六法為七局是尼法為尼受戒半月本四出罪四法局為尼秉別住等五是比丘法除此十六餘三十法通二部秉即六十法及十六局者合七十六白四今此重非隨以一法為頭乘作餘法並悉成非亦可以法對僧明應秉者五人應秉有八謂自恣中和衆改衆二白受戒中有四單白二白四十人應秉但有受戒六體此六法與邊受體同約僧用中有別據法體邊即同二十人僧有二白四餘一百三十七法是四人所秉隨以一法為頭重秉餘法便成一百四十六非此一既爾餘類亦然總成一百四十七箇一百四十六非餘五人等三僧所秉各各當分明重可知問未知重秉餘法根本成不一解根本呵責法成以藥病相當故重作擯等十七不成以其藥病不相當故故文言不應作呵責羯磨已復作擯羯磨乃至如草覆地此中計法有三百二十四唯根本十八法成餘三百六非又解前法雖竟事猶未終如說恣德衣受懺白等若便重作即成其非若其法竟事亦得終如捨德衣解界等類縱使重作前法得成又解望心以說若其本心憎惡前人擬重治者此則不成如惡心解淨不成之類若其本心直作呵責作此法竟恐畏不成如是重增擯等十七此則前法成就重秉者非依文十八解釋既然廣對一百五十七重義亦爾次約處事准類應知次第五明四種僧先解其義三門分別第一列數釋名第二定其體狀第三諸門分別言列數釋名者法雖辨事成本由僧僧隨事用略列四種謂四人五人十二十釋相翻名如上辨次明體者正論僧體是善五薀僧以秉法成和和合體者依一切有宗不相應行中別有和合性此和合性即是僧體以僧破時捨此性故或此和合性即衆同分收僧破不和合是非得所攝次諸門有四一立四所以二收僧盡不三人法相對四用位通局初門所以須四者古舊解云要須四人已上作法方成有除罪滅諍始名為僧且如說戒一人秉說一人上座一人唱白三人秉衆下至一人聽戒四人和合始可名僧若三人已下即𨷂此義今解但以四人和難若能和者始名為僧如有一人隨心作事二人同處即有違拒雖有違拒調和不難若也三人遂成二部一同二見亦非是難若其四人彼此各二共相黨授情和即難於此能和方成僧用又若一人起事二人平量一須斷決始成僧用又解法爾須四不須論其所以如林軍等豈辨所以次五人者舊云義道受隨隨自恣舉罪治罰若但四人不成差治故要五人方成僧用若爾受日處分離衣六年等亦須五人應五人收答受是別為不得五皆受日故所以非若爾功德衣為衆應是五人僧耶答有得利不得利故亦非類今自恣者一則為僧異受日等二五皆自恣不同德衣故是五人僧問為差治故須五人者正差正治是五以不答差治四人僧問何時五人僧用耶答正自恣是所以爾者本為舉罪若但四人不成差不成治舉義則𨷂故始終須五方成恣舉正取白竟受自恣時是五人用以其但明三非及遮時以說故知專取自恣時為五人僧用今解理實為恣制須五人正取作白說時為五人用所以爾者以作恣時假白攝衆復一一對五德宣情如舊解云若但四人不成差治者義則不爾以正差治四人僧攝邊地五人對中開半又解五人僧亦是法爾以說戒自恣制常行故言十人者佛知彼等因善義微自非十衆強緣無由發戒為斯益故下局十人即以十人辦事故曰十人僧二十人者為犯僧殘可悔中重將欲除殄救拔事難自非強緣無由滅業故制二十人除罪名二十人僧又此四僧位分為二前二法爾後兩逐情法爾二者四為成說防其未非五為成恣除已起罪逐情二者十人為受發生衆善二十為懺殄滅往𠎝位事通論離成四別第二門問此既位事通論立僧四種未知此四收僧盡不答立僧既約位事通論明知此四攝亦周盡爾者未知懺重偷蘭何僧所攝答雖餘部言夷邊重蘭一切僧中懺今依此律但四人僧收故文言大衆者四人若過又此文中四人約用但除三事不甄悔蘭明知悔蘭是四人攝爾者所以五分第二十四有無量比丘僧解彼真列名不別顯用故知四種攝僧斯盡此雖不言無量義亦通有故文言二十人僧者一切羯磨應作況復過二十此即當彼無量之義問如四人僧為唯局四為過亦得餘三亦爾答通論四位少非僧用故文言四人二十一人非法非毗尼餘三亦爾多則成就故文言二十人僧一切羯磨應作況復過二十問其事云何如雖五十人乃至百千但除恣等秉餘法者皆四人收故文言四人僧者除自恣受戒出罪餘一切如法羯磨應作五人等准類應知問何故不言二十人僧者除受恣等答在上通下得為多用下不辨上相望說除即是四人用寬體成僧故餘三約事轉次漸狹第三門問所以能秉之僧有其四別所秉之法唯有其三今解能所相對雖可如是論其立意義則不體通論能秉位總有三謂一人衆多僧一人秉心念衆多秉對首衆僧秉羯磨羯磨三位並是僧秉體僧四種本為法爾逐情中立不望所秉所秉三法自對事立事有三品上中下異對此三事立三羯磨如說戒自恣二同行鉢等或是制所常行或是事不繁重和既不難單白即能辦事以能辦故立名單白羯磨如受日離衣六年四月事稍為重情和次難先須白表申一羯磨量其可不方得成濟立名白二羯磨如受戒懺殘治人設諫事當上品情和最難故須一白表宣三羯磨量可方能成辦立名白四羯磨爾者如憶念等事有三品何故俱用白四羯磨答約事細分應可為九此憶念等俱當上品以是齊用白四羯磨第四門且論能秉大位有三次即為六以約僧中位分有四或可為八以分衆多作其三位廣為十一謂四有兩衆多五有三衆多一人隨前二僧位有四故成十一體一與衆多局在四五兩僧下所以爾者為通常行制令作故十人二十逐情中立必專僧秉無下二用次論法者以初能秉大位有三法亦有三謂心念對首翔磨於中相望位有通局且論局者如懺吉羅就戒座中發露此局一人秉法第二局對衆多人秉如受衣鉢屬授淨施懺提可呵小衆蘭等第三句是僧秉如結界處分離衣六年憶念不疑罪處所等次論通者該三位秉如說戒自恣二種分衣有則對多無便對少一人作心念捨墮者以三為境無一人秉心念捨又有安居法爾須一衆多雖可四五所為通僧及別今局明僧非衆多等問如說恣等通三位作有何異相專明其僧答異相衆多且標其五一秉人多少二用法不同三處有通局四欲無欲異五別衆多少謂應來等三二一別有斯異故專局明僧若論尼所秉者准比丘說次釋其文文中有四一告四數二列四名三是中下示用分齊四若應下明不足義於中文二初約四明次易五等初文復二一直明少作法不成第二乃以尼等二十三人足滿四數尼雖具戒異類不足下三未具不合同法十三難人非是具戒被舉三人治法重故滅擯應滅體不清淨所為之人為他裁斷以此等人足滿四數同前少限法事不成此中文略不明足義若以足翻應有其二一善比丘反二十二二乃至語傍人翻前所為亦可此中直簡不足不欲明足故𨷂此文問前四滿中有二十八別住等五所以此無舊解云此取在座不足者既別住等五來即足數故所以不說若爾身若在座即成呵滿何故彼有答欲明遙呵不成呵故若爾為顯不成遙足解言此舉四種僧等故對少一人中攝上不舉四僧等對何辨少所以爾者此處專解不足數義何故不足少故不足何處去少謂別住神足故少但言少一隱餘名字故唯列二十三人前文通解呵滿若言少人者對滿可爾呵義不順正是少人豈可由少呵不成呵如四人三人二人亦應呵別故彼不得舉少一人攝別住等以無可攝廣列二十八今解不體計應合有無者是略又解彼以滿呵相對故須具足而列如第三句不滿不合呵第四句滿而合呵以此相反具足而列此明不足無足以反既無足反豈類滿呵故知滿呵與不足數義既不同無勞比決次第六七非應不先解其義五門分別第一列數釋名第二辨其非相第三名體具不第四明其總別第五收非盡不初門者非出妄情事乃無量今隨緣起略辨七非一非法非毗尼二非法別三非法和合四法別衆五法相似別衆六法相似和合七呵不止作無軌要名為非法不能滅惡生善是非毗尼餘名解釋隨文可知皆名羯磨者以實不能濟辦前事是故皆名非法等羯磨次辨相者謂約事法等辨此七非中以為三位初一事法俱非次五人法相參後一呵不止非第二人法五中非似二別人法俱非非似二和法非人如法別衆一法如人非體以義求位應有五謂非法非毗尼一非法二似法三法四呵不止五若以此五對人和別應各為二便成十非所以文中但有其七解法和是如故須除去呵不止者若未呵時不名為非因呵不止始名為非是則但名呵不止非不可對人和別以分二呵初非且約事法以明若對人分與餘無異由此義故非但有七問如三非中非法別等三與此非法別等三有何異相答如三非中非法者或一白處作二白或此事上作彼事白此中非法者如為此事作白乃為彼事作羯磨別衆及餘可解問略四初非與此初非並言非法有何異相答四初唯事無有法非此初通有事法二非是則此初非體寬於四初又解此中初非除去下六除六非外始是初收四中初非但除下三除三之外則初非攝准此四初非體寬於此初又此七非准文但從白二白四兩法中來問所以不明單白非者答以單白中無七非故又以說恣法中已明竟故體以義道久說單白雖說單白無有二以次名體具不者此之七非具有名體不同昔云呵不止非有名無體以呵前六更無別體又舊解云此呵不止有名有體謂前六非未呵是六呵即呵不止收如似非法別非法和用人和別以分二非等類而可知及六非外呵而不止此釋雖有少異亦未盡理以不應言未呵是前六呵即不止收若其未呵是前六非如何因呵轉為不止故今正解但便是前六非即前六攝不以呵故名呵不止論呵不止者羯磨實如謂非故呵因呵不止名呵不止羯磨故此體狀離其六外別有由此七非具有名體次總別者此之七非體各不同不得有總相攝之義雖非總別而有通局初非是通以下六非並無軌要及以生善滅惡之義准此即是初通下局次收非盡不者此之七非收非不盡所以知者若以四種現前來驗但有僧法事如非而無處如非相即如處中有隔河道遠二界錯涉曾經棄捨戒場在外或有秉法對處差互如於戒場恣說處分分衣並悉不成如及前說又僧法事中隨緣更有如非之相不能具述以此推之明知七非且從起說收非不盡又此據文唯是白二白四不論單白中非不盡何惑次下釋文文中有四一六群起非二比丘白佛三佛判不應四云何下牒章解釋既釋七非文即為七先解初文於中有二初則舉非令弃二云何下顯是勸修此二各三謂舉釋結次下諸句各三類體就前釋中文分為二初約法體以明非二是中下無事治人以明非前法體中有二初約白二次約白四就白二中有三初有十九句先白後羯磨此中有五位初純白無羯磨作四句次一白為頭增二三衆多羯磨為三若增一羯磨即是如故不來次二白三白衆多白為頭各有四句故成十九次十九句先羯磨後白此中位亦有五初四句純羯磨無白次有三句一羯磨為頭增二三衆多白若增一白即落似法以除此一故但三句次二羯磨三羯磨衆多羯磨為頭各有四句復成十九次有一句約體增減三位合成三十九句下白四中亦三十九類此應知次事非有三七句初七實無有罪他問見不答云不見等尋聲行罰有三單三雙一合故成其七次七亦實無罪答言見等為異次七實有其罪答言見等此雖實犯為答言見即無耶過治成非法三舉既爾類餘亦然文不載者是其略也次明其如初就法體明如白二白各有一句翻前兩位三十九句次就事明如但有七句各以一句如翻三句非謂有罪翻前二不見等翻後兩問所以非多如少者答撿尋上下諸文非如多少趣舉一義亦無揩據如此文及滅諍中自言等即非多如少或有如多非少如默體及與欲或有非如等如作呵責等如非各有九三及遮說捉籌等第二非法別衆非法可知別衆者此之三句皆成別衆於三句中第一局申手外和通內外以後來入告淨成和第二與欲和別並申手外在內即是初人成和中攝第三呵者和之與別俱申手內又十誦三十有四句三別一和第一是羯磨中所須比丘不和合一處二可與欲者不與欲三現前比丘遮成遮是名別衆第二句𨷂初一句是名別衆第三句云所須比丘和合一處二可與欲者與欲現前比丘遮成遮是名別衆第四句並𨷂上三是名和合問此呵與第七何別答各別不同此情乖故呵呵成別衆下情同故呵呵成呵不止次下四非釋相可解第七文四一舉章徵問二列成不成三何者下解釋四是為下總結但解釋成不文中分二二中各三謂舉釋結文中列二十八人不成呵非明知更有餘非法人亦本不合呵縱有呵者亦不成非又前滿呵中第三俱句不得滿數復不合呵即與此文相同無別次第七文傍秉餘法於中文二初明藥不當病三百六非二佛語下對非辨如有一十八非中有二先約呵責為法次如是展轉下舉餘類易前文須二先明作不相當謂應與作呵責羯磨於上乃作擯等十七次不應與作下復有十七佛判不應次類易以餘十七為頭同前故曰如是展轉乃至草覆羯磨此傍非合三百六次辨其如但一十八次義准上亦作四門初約僧者准文十八頭傍非是四人僧若約及二十僧人所為之事體以義准亦通五十二僧若約應秉論之即是四人僧家所為事多傍非亦多餘五人等三僧所為事少傍非亦少或可既是傍非並悉具起不須約僧分齊別說言約法者文中且寄十八法論之謂有十八箇十七傍非合有三百六准義亦須通餘一百五十七為頭辨之始可盡理即是具有一百五十七箇一百五十六傍非計數合有二萬四千四百九十二非若其對非辨如依文但有十八義通總說合一百五十七如次約處事准義應知次第八臨事難成文中有三初五處僧秉法不成二諸比丘白佛三佛言下判不成就昔來所說還寄十八法論先約呵責作五非請佛佛判不成故言諸如是不如法羯磨不成就呵責既爾餘十七類體故言如是一切羯磨亦不成就義還為四初約僧者准十八法即是四人僧少分二十人僧全五十二僧准義通有但是四人僧中所為事多臨事難成落非亦多餘三僧中所為事少臨事難成難落非亦少次約法者若約文中五非寄十八法論之合成八十四非謂現前自言草覆三法各帶三非即有其九餘十五法各帶五非合七十五此及前九總八十四若約七非說者十五箇七即一百五餘現前等各五合十五非如是總成一百二十非若欲廣約一百五十七法辨非多少者是中單白四十計有二百非白四一百一十七計有八百一十九非如是總成一千一十九非或約二百七十八法明者准類應知又約文中五非說者亦准類知處事准知不能繁具次第九文衆共諍非文中有四一明衆僧作非法別衆羯磨此雖不顯羯磨名字下佛定中言是呵責二爾時下七人共諍三諸比丘下比丘白佛四佛言下佛定如非此中唯言非法別衆者是法語乃至法相似和合亦爾以此等人咸稱非說故是法語准五分二十四應言二人語如法謂言非法者及言不成者次義還四先約僧者亦是四人僧中所為事多諍非亦多餘三僧中所為事少諍非亦少言約法者若此還寄十八論者諍非多少義准應知又若准義須通一切羯磨據文五非四十單白各興五諍除其二似若一百一十七白二白四並起七諍計諍多少准數應知處之與事亦可准知次第十文應解不者文中有二問答先總次別初文若作永擯法者解不成解除永擯法解餘則成解故文言或成不成次文若為十三種人作羯磨後解不成解除此十三種人已為餘人作後解成解問未知何者是十三人昔解僧四重尼八重為十二加下衆滅擯為十三爾者既以僧尼四八離為十二何不亦離下衆為其十六又若唯此為十三者如十三難人何位中攝為比今解十三人者即是十三難攝如向所列十三人者並邊罪收以文如此等人咸應滅擯餘非滅擯解者俱成次義還四無約僧者如十三人不須解者並是四人僧中所為之事餘須解者是四人僧中所為之事亦通五十二僧二十人僧不得說有次約法者准文不須解者是永𢷤白四即是白四中少分除此已外並似須解體更尋思文據一相以餘諸法五亦有不解且如白四羯磨合有十二法須解謂呵責等七及罪處所本為調人調已聽解又擯沙彌亦合有解僧尼受戒及六法聽捨此之捨法即是其解諸餘白四即無有解白二之中有十八法謂結界等十三及學家癲狂覆鉢不禮捨教捨有解餘悉無解單白之中唯有功德衣捨又望捨戒豈局白四是中通尼說者更有四箇單白及形法二同兩白並有捨法諸餘單白並無有解昔解無心乞領並是須解有心乞領便不須解今尋此釋不盡旨歸究其實義各通解不且如呵責等及罪處所為無心領須解可體如永擯法誰欲領之闡陀二白諸諫亦爾有心領中行鉢受三離衣六年受日杖囊別住等法不須解者此義可爾如何德衣受戒並有捨法次約處事准應知之次第十一應驅不者若永擯者驅出成驅非永𢷤者驅不成驅故文答言或成不成體還舉前十三種人是合驅故驅即成驅除此十三諸餘人等不合驅故驅不成驅釋義四門准而可解上來瞻波法竟
