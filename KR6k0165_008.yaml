body:
  text: 西太原寺沙門懷素撰次明九十波逸提先總解七門分別第一配屬身語第二自作教人第三遮性差別第四持犯方軌第五違制不同第二六部有異第七下衆任運初門身語位分為三初有三十一戒身業成犯次有二十戒語業招𠎝後有三十九戒身語合犯初身三十一者二宿強腕覆作屏施別三非宿不外請三坐及三軍酒水擊半白二隨打搏宮次語二十者妄毀兩同說得女嫌輒譏日悕疑發欲勸毀悔同謗次身語合復分為三一有兩戒身語止作業共身犯謂屏露二敷若自敷者是身作業若教人敷是語作業去時不自舉身止業不教人舉語止業出門界犯豈非結身二有七戒語家止業共身犯謂覆粗背足二入聚落輒著不與欲如覆粗罪止不露發名止語業經明相結罪豈非共身犯餘皆類然不能繁具三有三十戒語作共身犯此中位四一有十九戒自語作業假他身犯若論自作唯局身犯今者且就教人義說謂掘壞牽用勸然藏煞驅飲使與尼衣投高牀下有七如教人掘地雖復言子所教不掘能未犯罪要假所教掘地方結教罪故名自語假他身犯餘皆類然不能具述第二有四戒自身假他語犯謂讚食減年不攝屏聽以尼不讚食本無𠎝以假讚故食方成罪此一既爾餘類亦然第三有五戒自身語假他身犯如四期索美食第四有兩戒自身語假他語謂異語惱他及不受諫異語假僧作白及須喚問諫中所諫之事通於七犯即自身語假他語犯第二門位分為四一有一戒唯教人犯謂勸足食二有十一戒自他俱犯謂掘壞牽二蟲恐火藏煞謗捉寶第十一第三有十戒教人有同不同謂屏露二敷持衣與尼高牀下七教人潤己是則不同犯直教無益但得輕𠎝此等二十一戒勸足唯教他餘通自他作第四餘六十八戒中六十七自重教輕足食一戒唯自作業第三門三十是性謂妄毀兩粗異嫌強牽用譏驅諫恐煞飲疑覆起說隨擯拒毀同欲悔聽打搏謗餘六十戒並悉是遮第四門位分為四一有十戒具二持犯謂說粗輒教背別二入聚落作餘食法不犯足食勸足淨施問主無其輒罪知粗發露僧事與欲此等二犯名異體同論其二持階之兩位准上應知不能繁具次有二戒殘宿不受謂七日盡形加口法竟不犯二罪非時無不受時藥唯是身作以此義殊故須別說三有一戒唯是作持止犯謂不攝耳聽戒四餘七十六戒止持作犯亦可不攝耳聽戒唯作持止犯及前十三小分亦有作持止犯義又餘七十六戒止持作犯及十三少分據別體邊亦有止持作犯義第五門通而言之並違佛制若望成罪位分為二但諸羯磨要須僧秉僧不秉法違而無罪謂異語說欲及以二隨故此四戒違僧制犯自餘諸戒並違佛制第六門有二十一戒不同此中位三一有三戒僧有尼無謂輒教日暮譏教所以可知二有十三戒輒重不同謂食三衣五坐一行三互角針筒大僧數故重尼為稀故輕言食三者謂讚勸索美衣五者謂與尼衣作衣及三過量餘者可知三有五戒犯同緣異且背請足食開緣不同或可離合不同與外道食戒與緣不同減年受戒受緣不同過量浴衣用緣不同或可名字不同此等俱得提罪若為犯同以緣異故尼律別制制緣別義至下更門餘六十九同戒尼律直列戒本此據位言細論亦有異者如覆藏僧寬尼挾或有境界翻倒如毀兩二宿過五六語等此隨義別可以思之第七門前教人犯四位之中取第二第三兩位教人二十一戒除屏露二敷餘十九戒有任運義餘無可知故妄語戒所以制者懷道之人言須稱實今反違想背心欺誑前境令他虗解自失聖利過中之甚是以故制言釋名者了心不實名之為知求犯不虗稱之為故言不稱實名妄陳彰在口名語是名故妄語別緣有六一人二作人想三違想說四知違想說五言彰了了六前人知解闕緣比知具七方便犯相可解戒本三句廣文具解初句可知二知而妄語下合解二三兩句於中文二初解妄語方法二於大衆中下明輕重相前文復二初至逸提對外事明違二所見異下約內心辨妄前文有四一列八種不淨語境二解八種差別離合三若不見下誑人犯義四本作是念下前後方便前文先列不見等四次列見等四次釋先解後四見聞觸知見者具五緣故名之為見一眼根不壞二有色境三假空四須明五作發識意耳聞四緣一耳根清淨二有聲境三假空四作發識意觸具三緣一三根不壞二有觸境至根三作發識意意知一切不假具緣問所以六根三合三離答多論第六云三根性利力用偏多各分為名三根性鈍力用處少總名為覺復次三根能遠取境界各分為名三根近取境界故合為名次却解前不見等四言不見除眼識者除猶無也謂無眼識名為不見既言餘五識是明知以五識所得誑他亦是不見下三釋相准此應知如是解時不見等四以無為境所違境寬如似直爾不見是名不見餘五識所得亦是不見論其所稱即狹謂對不見言見見唯眼識是故言狹此一既爾下三亦然下四見等以有為境所違境狹謂唯眼識所稱體寬謂不見等次明妄語先解不見等六心約義具明應作二十四句今據位說故總為六釋此六心二門分別第一定心名字第二問答分別初定心者位有其四一無想心二有想心三有疑心四無疑心今言六者無想唯俱違有想單違心有疑無疑中各出單違心是則初三五俱違句二四六單違心第二門問所以無想心中但有俱違句有想心中唯單違句不同有疑及無疑中各有單違及俱違句答想是徹不得同疑所以爾者以想一向知無不得言有言有即是初句心境俱違想若實有說實不犯違此想說方名犯者此是違心望境是順即是第二境順心違以斯義故無想唯俱違不得有單違句以單違心即是第二有想唯單違不得有俱違句以若俱違即是初句疑是兩緣得有隱沒是故疑中單俱並具問所以此無妄心不同謗者答謗取虗心要必須妄若不妄者心實豈成此取違心必不得妄若當妄者心實豈成次隨文釋初句實不見等答言見等此是無想心中心境俱違句第二實不見等謂有見等誑言不見等即是有想心中境順違心句第三實不見等內生疑心不知為見為不見等誑言無疑我有見等即是有疑中俱違句第四實不見等生疑同前誑他無疑我不見等即是有疑中單違心句第五實不見等復無疑心便言有疑我有見等即是無疑中俱違句第六實不見等亦無疑心便言有疑我不見等即是無疑中單違心句此應廣說者謂舉後四見聞觸知作法同前不能重述次前後方便者具應有八為取成提但有四句初一句三時有心次有二句二時有心一時無心後有一句根本有心前後無心餘有四句皆不成提謂根本無心前後有心前一有心後二無心後一有心前二無心此三吉羅三時俱無心不犯次約內心者行心見虎狼口言見佛像答他異本所見故曰所見異行心忍苦誑他得樂行心之中希於財色名欲答他欲得聞法心得冷觸言得熱觸實作怨想言有親想行心緣此答言緣彼次輕重文二一當宗結提二默妄結吉多論若先無心妄語誤亂失口盡吉羅若說法議論若傳人語若凡說一切是非莫自稱為是常令推寄有本則無過也次下明開不見等四開前六中初三五見等四開後六中初三五意有見想便說開前六第二句理應更有意有不見想便說開後六中第二句復應更有疑疑便說開前二六各第四句復應更言意有無疑便說開前二六各第六句又解不見等四翻前六見等四翻後六意有見想者翻所見異等次毀呰戒出家理應遞相讚美令彼歡喜不廢正修今以鄙語傷人過於劒割惱處不輕故所以制別緣具六一大比丘二作毀呰語三知是毀四作折辱心五言彰了了六前人知聞戒本三句釋中初一別解下二合明合明文二第一惡法毀呰第二若以說下善法毀呰前文有三初列七種惡法先列章次解釋二若比丘下行罵方法亦先列章次解釋三若比丘下結犯次善法行罵有三一列二釋三結餘文可知次兩舌戒出家理應同心和合今傳屏言破壞彼此故諍未有令生已有不滅惱壞不輕是以聖制別緣有六一大比丘除破僧伴助二說鄙惡事三傳於彼此四作離別意五言章了了六前境知聞多論四句或有兩舌非妄語非惡口傳語實說故非妄語以耎語說故非惡口以離分心故名兩舌或有兩舌是妄語非惡口以作別離心故是兩舌以妄說故是妄語以耎語說故非惡口或有兩舌是惡口非妄語以作別離心故是兩舌以粗語說故是惡口當實說故非妄語或有兩舌是妄語是惡口以作別離心故是兩舌以妄說故是妄語以惡聲說故是惡口妄語惡口四句亦爾戒本三句廣中具釋兩舌者下釋第二句此中有二初列所鬪亂境境有十衆道俗各五互歷為頭總成百句次鬪亂下出所傳言若比丘下釋第三結罪句此鬪亂境雖列十衆論成提者局大比丘問所以毀呰有善法此無者何答此以屏傳善法無惱前為對面故有輕𠎝次與女人同室宿戒男女形殊理須別處至於宿止須避嫌疑今輕同宿容生穢染為患不輕是以聖制下諸染戒制意同此別緣具五一人是女但是人女不簡道俗親疏人別餘趣女簡異男二室相成就三共同室宿四知共同宿五隨臥轉側緣中似犯寄緣制戒以愛盡人無心故違文中有三初則寄緣似犯第二彼淫女下顯實無違第三淫女見下悔過獲益舊解以羅漢具二解脫呵無癡言此解不然羅漢亦得言癡如上明訖又同行戒中有多種漏語又足食戒非時戒中呵無癡漏之言犯此二戒之人豈是羅漢又諸尼戒呵處亦無癡言戒本四句廣釋可知多論第八若房中有一女一提有十女十提此戒亦身教成罪亦人上成罪一臥一提十臥十提是名身教成罪若一臥一女一提若一臥十女十提是名人上得罪五分云若同覆異隔若大會說法若母姊妹近親疾患有有知男子自伴不臥皆不犯開文除自病不犯下戒亦爾次與未受具人同宿過三夜戒多論第八與諸比丘結戒者為佛法尊重故為息誹謗故所以聽二宿者以都不聽或有失命因緣又有種種惱事因緣以憐愍故得共二宿以護佛法故不聽三宿別緣具五一未受具男子簡去女人女不開二何有過三二室相成就三共同室宿四知共同室五過三夜犯問諸比丘違羅云出正順佛教如何呵言癡人無慈答夫為弟子之法每事須咨今輒驅遣豈非失儀佛因事故制因事故開是故呵言癡無慈耳滿戒四句一犯人二未受具人三共宿四過三結罪然前開中若墮三宿明相未出時應起避去至第四宿若自去若使未受具人去是則三四具明應不戒本直結過三夜罪廣釋但論第四夜𠎝以言隨脅犯明知即是第三夜避明相人釋相可知次與未受具人同誦戒多論四義故制一為異外道故二為師與弟子差別故三為分別言語令分了故四為依實義不貴音聲故別緣具五一是佛所說法二是字句味二未受具人四齊聲同誦五言說了了戒本四句可知解中上二別釋句義下釋第三句此中文二一解同誦二出法體前中復二一列二釋釋中句義者二人齊聲同誦句義表行理周名為句義非句義者前說未終後人抄誦表行不周名非句義此亦獲提為令教義表行不周何以非犯下二釋相准例應知但阿羅波遮那者是名欲顯名表體周是字義也法者見論云若佛涅槃後迦葉為上座五百羅漢所集三藏同誦此法得波逸提准此末代菩薩聲聞造諸論者誦皆不犯此中聲聞等說者謂得佛印可以成經也次若比丘下釋第四結罪句一說者舉前句義二說者句味三說者字義亦可隨誦句味字中有一二三了了皆犯且舉三為法餘亦類然若口授者誦被抄言若書授者寫被截句餘相可解次說粗罪戒多論第六與比丘結戒者為大護佛法故若向白衣說比丘罪惡則前人於佛法中無信敬心寧破塔壞像不向未受具人說比丘過惡若說過罪則破法身別緣具七一是比丘二犯粗罪三知粗罪四向未受具人說五無因緣除被差者六言彰了了七前人聞知滿戒五句一犯人二知粗罪三向未受具人說四除差不犯五結罪釋中先解第三却解第二為異此定粗罪但初二犯文中除僧羯磨者藉說調達為緣理實結罪唯初二犯故多論云若說出佛身血壞僧輪對首偷蘭若說四事邊十三事邊一切偷蘭得突吉羅解第五句文開為四一說他他中有二二自說問所以自說粗罪輕者答他數自稀故又解說他過多一自壞二惱他三壞俗自說𨷂無惱他是以但吉三餘衆四境想次實得道向未受具人說戒所以制者多論二義一為大人法故若稱德行覆藏過罪是小人法二為平等法故若自稱聖德則賢愚各異前人於衆僧無平等心別緣具五一內有實德蠲上慢二自言已證三向未受具人說四言彰了了五前境知聞此無別緣取大妄中實者制舊解云此聖人制竟不復更犯謂制聖遮凡此義不然如學人猶有故犯此非性戒何廢有違以此義惟還是制聖凡得不淨觀等亦成其犯戒本五句一人二所向說境三說過人法四自說己證五結罪釋中具解若彼下解第五句文四可知次與女人說法過五六語戒說法開生理無強授事不應時反增奢慢然雖染境亦須接引若全不開永絶出路故復開聽齊五六語過則招譏是以制犯別緣具六一是女人二知是三不請四無俗男五言了六過五六語犯若請隨說設過不犯滿戒五句可知釋中相顯有知男子者多論云謂解人情語言意趣可作證明若方類不同一切不聽男子必是白衣一切出家人不得以相同故縱使衆僧集會亦不得為說為尼說者聽以得教誡故五分比丘為女人說五六語竟語言姊妹法正齊此從坐起去更有因緣還復來坐為說不犯若說五六語竟更有女人來為後女人說如是相因為無量女人說皆不犯若自誦經女人來聽若女人問義要使得解過五六語不犯次掘地戒多論此戒及壞生戒制有三益一為不惱衆生故二止誹謗故三為大護佛法故若不制者一切國王當使比丘種種作伇有此戒故帝王國主一切息心別緣具五一是生地二作生地想三自掘四使人掘時不作知淨語五隨傷結犯立戒有三一對自掘略立二以教掘不作淨語制相未圓更明隨結三制滿足滿足五句一犯人二自作業三所傷地四教人業五結提罪釋中初三別解若用鋤下合解二四五三句然釋地中初總分二但未掘地為一即定已掘地中更分為二是則地體開合為三不問覆露壞者皆墮僧祇十九地有二種謂生及作生者大地作有二種一者基二者上基作者露地墻壁上作者重閣屋上覆土此等地體壞者皆提見論地有二種一者真地無有沙石瓦礫純土二者非真地應取少土以水洮看若四分石一分土可得掘若掘真地掘掘提罪次下合解文中有五第一損地結罪僧祇云自手者若身身分身方便身者舉身跳擲走來走去身分者若手若腳若膝若肘若指示身方便者若鍬钁斧釿竹木自手掘地若遙擲欲令壞者波夜提又云若比丘欲使平作方便掃地越毗尼罪若傷如蚊腳波夜提不作方便無罪若方便曳木若驅牛馬等亦如是若河邊坎上以腳踏隨踏夜提若池坎岸邊行土崩無罪若土塊一人不勝破者提破減一人重者無罪若死土被雨己不得自取使淨人取盡雨所霑際然後自取無罪若新雨後比丘不得自抒井應使淨人抒若淨人小不能者當先令淨人擾濁然後自抒若池水潦水新雨後比丘不得自抒若牛馬先涉得自抒若瓨瓶水等諸物於露地雨後比丘不得自取使淨人知第二打杙入地僧祇云若地打橛越毗尼傷如蚊腳提拔橛亦爾第三地上然火損地故提見論若把火燒手擲地不犯第四境想可知第五失法罪見論十五若比丘語淨人言汝為衆僧掘地及斫木不犯若指示教掘是斫是提今准此文但不作淨語不問現不皆提下衆無事自掘者吉若為三寶利益開掘無罪故下藥法中云僧得果園不知誰撩理佛言僧伽藍人若沙彌壞生義亦同此開文直許除土不得損地見論十一云若人放燒火來近寺為護住處故比丘得鏟草掘土以斷火不犯下文祇洹外火燒蔓筵來至諸比丘不知云何佛言聽逆除中間草若作坑塹斷若以土滅若逆燒文中不言遣淨人作計有此事亦開無罪次壞生戒制意具緣同上無別犯相是房舍戒緣戒本四句一犯人二壞業三所傷境四結罪釋中初句可知次略釋第三句一切草木為非人所依故十誦第十村者謂生草木衆生依住衆生者樹神等乃至都道神蚊䗈蛣𧏙蛺蝶等乃至蟻子是衆生以草水為舍亦以為村聚落城邑若斫截下釋第二句若一葉壞多生隨壞獲多罪故十云若比丘一時燒五種子一時犯五提一一燒一一提村者村有五種下廣解第三此文有三一舉二列三釋列中有五義合為三謂根枝子文分五者根中不假節生者作根種之名假節生者作覆羅之稱枝種分二義亦如之子子種中當體為一始末差分離成五種僧祇十四對此五種明其淨法根莖二種若刀中㭊淨節種刀中㭊淨㭊若甲摘却互目淨心種羅勒蓼藍若平揉𫝽淨子種者十七種穀脫皮淨火淨通五種又云若僧中行豆胡麻苷蔗等上座應問作淨未若言未作應使作淨若言已作應食若在一器中有衆多果若一果處作淨餘者亦通得為淨若在異器者別須一一器作法若苷蔗著葉者當莖莖別作淨若無葉者得合束如果總淨又摩摩帝有倉穀未淨畏年少比丘不知法使淨人火淨至倉穀盡比丘恆得語言舂去不犯僧祇三十一云果欲食核者火淨已聽食若皮淨不火淨食核者提若火淨不皮淨皮核俱得食若不火淨不皮淨食者一提一越若俱作無罪夫作淨者不欲令永不生但為息外道謗故言沙門淨法次下翻釋並見論第十五呵梨陀者黃薑文中唐梵並彰憂尸羅是香菜貿他致咤是頭香盧犍者黃連陀樓者外國草名柳者可知舍摩羅是菩提樹婆羅醘陀者貝多樹此二種樹唯見交廣有餘方不見蘇蔓那華者其華香氣與末利相似廣洲有其華藤生蘇羅婆者不得此草名菩醯那外國草名餘相可解若生下釋第四句亦是結業輕重文文中七句第一境想據壞生種一提四吉僧祇云以五生種擲池水中若井中若大小便中糞掃中得越毗尼若種爛壞者波夜提若比丘欲使草不生故在中經行行時越毗尼傷草如蚊腳許得波夜提如是立坐臥亦如是若斷生青耎葉波夜提若斷長足堅強葉波夜提若葉已衰黃者越毗尼若風吹三種葉落取用無罪若摘生華提半熟者越毗尼熟者無罪第二草木下約生相明壞餘文可解淨語者五分第六比丘一一所須語淨人言汝知是若不解復語言汝看是若不解復語言我須是若不解復語言與我是僧祇云若為僧作知事人一切不得作不淨語截是破是碎是燒是剝是皆應言知是淨是無罪多論三衆是淨人故不犯開中皆無損心僧祇若山中住泥雨滑行欲倒地捉草挽斷挽斷復捉如是無罪若為水漂捉草隨斷斷亦無罪次異語惱僧戒出家理應清心守道有所言說須合軌儀今乃棄實懷虗矯言綺說業雖是微惱僧至極是以衆僧立法呵制違法重作故獲提𠎝別緣具五一身語互綺二數作不止三僧立制法四如法喚問五重作結犯若僧未作法前違者吉罪若作法已即獲提𠎝但語業綺者作異語之名身業綺者作觸惱之稱此則二結同為一戒以不隨問答惱僧不殊下戒亦以知事一故二結合制故九十中唯此二戒合制前語綺文四一起過二呵責三作法四立戒次結身綺亦四如前戒本三句釋中初一別解下二合明五分不隨問答問問皆提此言一切盡提同彼問問若上座喚者泛明應不五分開云若誤取他語而答及先相恨不共語故不答不犯次嫌罵戒凡僧務事廣處之實難故簡德人如法撩理理應知勞讚德翻乃俠情嫌罵事既不輕故須聖制釋名者見而不聞處說有愛等名嫌聞而不見處說名罵前後二結合為一戒別緣有六一是知僧事人羯磨差者二知是三如法經勞無有愛等四說嫌罵語五言章了了六在前人見而不聞聞而不見內結犯嫌制文三一起過二呵責三立戒罵亦同爾戒本三句釋相可解次露處敷僧臥具戒多論三義故制一為行道安樂二為長養信敬三為令檀越善根成就故母經第四所以教諸比丘護敷具者見五種過一不令風吹二不令日暴三不令得天雨四不令塵土分土土分土之五不令蟲鳥敷具上放不淨別緣具七一是衆僧臥具二知是三露處四為己受用五自敷教人敷六去時不自舉不教人舉七出門便犯戒本四句一犯人二是僧物三露處下為己敷用四捨去下結罪辨相具解初句可知釋處第二句中列三種僧物與前回僧物戒同文雖是同回收義別故此三中詳其文意初三獲提第二小罪亦可此三同是僧物齊皆犯提五分有諸比丘見僧臥具敷在露地以不自敷不使人敷己不坐臥而不收舉佛言若見僧臥具敷在露地而不舉者波逸提有諸白衣來入僧坊索僧臥具在露地敷佛言伺候去時舉不波逸提復有白衣請僧借僧臥具於家敷之諸比丘坐去不舉波逸提比丘到尼僧坊露地敷尼僧臥具謂非僧臥具而不舉者亦波逸提若比丘下解第三句去後下解第四句此中文二先解舉法示不犯相次若比丘下違法結犯文四可知次屏處敷僧臥具戒制意具緣等如前戒本四句一犯人二於屏處敷臥具三若自等者為己受用四去時下結犯釋中前三可知若去時下解第四句此中文二初明永去文二可知次辨暫行亦二如上開中亦二初開永去次若時還下開暫次強敷臥具戒先自施功求得住處後來理應籌量進不今乃強逼事爽物情過狀不輕故須聖制別緣具五一先住已定二知住已定三強敷故惱四無因緣謂無親友人許及病二難五隨臥犯滿戒四句一犯人二知先住處三後來下強敷逼惱四作如是下結犯文言作如是因緣者謂作逼惱因緣非餘者非餘不犯病等諸緣非威儀者彰過結犯釋中初三別解若比丘下合解二四句次牽他出房戒僧房屬衆非局別人輒以嗔心驅逐前住然先住者居止已定反被後驅傷情太甚多論結戒者為不苦惱衆生故為滅鬪諍故別緣具六一春冬僧房二先止已定三住惱彼意四嗔心牽出五無因緣謂被舉等隨六出門犯問前房開親不論淨穢此何局淨而不除親答前是私處不簡淨穢屬先借者親則無𠎝此是僧房淨者得住不得開親穢驅不犯戒本四句辨釋可知五分若於後屋牽至前屋若於前屋牽出戶外若於戶外牽至𨓍中若於𨓍中牽出𨓍外皆波逸提若牽無慚愧人若欲降伏弟子牽出不犯次重屋上坐脫腳床戒比丘作事理宜審諦危險之處特須安庠今於重屋薄覆之上恣心受用脫腳之床墜墮傷人惱他故制餘相可解次用蟲水戒出家理應慈心愍物傷生造作豈是悲人別緣有四一是蟲水二知三不作漉法四隨用結犯滿戒五句一人二知有蟲三自洗泥草四使人五結罪釋中初一別解下四合明合中物三一蟲水二蟲漿三境想多論第六云此煞生戒凡有四戒此戒最是先結既不得用有蟲水澆草和泥便取有蟲水飲既不得用一切有蟲水便故奪畜生命既制不得奪畜生命便奪人命凡奪物命有四結戒以事異故盡名先作若比丘取有蟲水澆草和泥隨用多少用了波逸捉若欲作住處先應看水用上細疊一肘作漉水囊令持戒審悉者漉竟著器中向日諦看若故有蟲應三重作囊若故有蟲者此處不應住餘如雜法中明見論自澆隨息一一得提教他澆隨語語得提次看覆屋過三節戒縱貪重覆令屋崩摧損業喪功招譏故制別緣具四一為己作屋二使人覆三三節未竟不離見聞處四第三節竟便犯餘相可解此戒事稀不能繁釋然三節相難識如緣中說以草三重覆故名為三節五分若至第四重若草若瓦若板覆一一草瓦板皆波逸提次不被僧差輒教授尼戒此有三意一尼請教授意女人出家本以遵崇敬法今既入道理應䖍奉修行若不半月請示行儀觸途未明豈能修進第二須教授意女人在道不可安然理須進修階其出益祇欲修進𨷂於遊方故藉大僧示修軌則第三須差意者教授事難須備德行由此委衆量遣德人既不蒙遣輒往宣揚於教有遣安能利物別緣具五一不被僧差二往尼處三集尼衆四說八敬及法五隨說言了犯相文二一開聽教授二因聽起過前文有三一明尼請教授二爾時下依請差遣三爾時尊者不依差進詣前文有五一列尼所依衆文列十二人等者等取五百為須咨決疑滯故依大僧二列能衣尼衆十五人等亦等取五百三明愛道請僧教授問何不請佛而請僧耶答以順敬教故不請佛爾者敬教已有半月請言何不直來求僧而更白佛答敬教雖有此言比丘未蒙佛遣愛道懸知不得故更白佛教誡說法者謂理行法也四佛告下依請聽許多論第七云所以令諸弟子教誡尼者答有四義一以現無吝法故二師與弟子知見同故三欲現槃特比丘功德智慧故四為諸比丘於尼衆各有因緣應受化故五既蒙遂請致敬還退次差遣文三一告令差遣二奉命差遣三預生譏毀為明教授師難要須具位又為生下二種教化為有信人說法教化為譏毀者神足教化次進詣教授文中有二一說法方便二爾時愛道下正明說法前文有四一將伴進詣二尼衆迎逆三尊者就坐四尼衆起集若不來者應須與欲故尼律云三寶瞻病事聽屬授教授師於尼應如女想尼於教授師應如佛想次正說法先為信人次為無信前文有三謂三請三說三中各四一愛道請二正為說三說已入禪四尼衆譏敬唯第二文闕無第四前正說中所說偈者即是般陀得道之偈偈中分三初二句證法次四句舉喻後兩句顯勝前文證得無漏鑒理分明故曰入寂等安樂次喻為兩對舉事樂來況皆以後句釋前世中為最次顯勝者非直慢除餘惑亦盡此惑盡證滅稱云第一亦可次前四句是有漏樂此下兩句是無漏樂無漏勝有漏更無過此故曰第一次入禪譏敬如文但以渴法情殷樂聞無厭故復二三重重請說次為無信人神足教化十誦十一種種現神力已還坐本處諸比丘尼見已輕心滅盡生信敬心尊重淨心折伏憍慢即隨比丘尼所喜樂法所應解法而為演說衆中有得須陀洹果乃至阿羅漢果有種聲聞道因緣者有種辟支佛道因緣者有發無上道因緣者爾時衆中得如是種種大利益故次起過文二初口差起過二界外自差此二文中各三謂起過呵制前過文二初告尼衆令知當他問可不時次進詣教授文中復二前進詣集尼即是說法方便第二正明說法說法文四一明六羣所不說法且舉三科類餘亦爾二但說下出所說法反前正法三或㗛下非法威儀反前神足四明尼衆歎默反前譏敬次呵責立制如文次過三中初文有四一界外自差二遣尼白衆三比丘間呵四尼為白衆次二衆白佛呵責次立制法要具十德方堪教授此中文三先標次列後結戒律具足者奉持戒行毫釐不虧防護律儀心無退屈多聞者博考經論問無不和採摘群言庶事能決誦戒者兩衆木叉善持不忘決斷無疑者非直誦文亦能裁義善能者開導應法與理無差族姓者生處高門人標望美顏貌等者色相端嚴覩者發欹堪任等者說法開生稱機愜欲問此與前善能說法何別答前說稱法無顛倒過未必即能應機愜欲此為稱機與前有異不為佛等者謂壞異見出家者故言不為佛出家而被法服犯重法准此即應云為佛出家而被法服不犯重法者堪教授尼問何為重法答准善見論即是汙尼三衆摩觸二粗者以為重法以作此事縱悔清淨尼見猶慢不聽教授又解犯一切殘名為重法縱使悔已亦不聽教授類知提等懺竟即得教授問此與初德何別答犯殘悔竟具初𨷂九犯餘未悔具九𨷂初餘若悔竟九初俱具殘若不悔九初俱𨷂滿二十歲者見云持法堅固少有退敗年少輕躁易可退敗問未知差無德人羯磨成不答今古諸師咸言下至具五差得成就為簡全無德人永無教授之義云云成立不能具張此等釋者不了緣法如非今解得成所以成者以不牒德入羯磨中如餘恣等差人亦須其德彼然𨷂德謂成不疑此與彼同何繁致惑無德度人其類亦爾爾者何以人衣互非無緣受日妨難處房除村衣界邊等受人總不成就答比以牒緣入羯磨法以事非故法並不成此則類餘一切羯磨羯磨文中牒事者事非不成文中不牒事者縱非法得成就爾者如何下文云下至具五德應教授尼答文中但言具五應教授不言要五差得成差又問如結大界不牒道遠隔河若也道遠隔河作法應就答道遠隔河文雖不牒標相入羯磨中以若道遠隔河不成安唱安唱既非羯磨焉得又以文稱同一住說若有此礙者不成住說也戒本三句一人二不差三教誡下結罪釋中初句可知次合解二三兩句於中文二先解被差人教授儀軌次若僧下解不差結罪前文復二一解僧差可知二解教授儀軌此中復二一解教授所說法體二於說戒下釋教授儀軌前說法體是八不可過法文中有三謂標徵列義如下辨次儀軌文四一對僧請時二衆為差時三尅定期往時四迎供教授時定文雖爾釋義四門一約時二約處三約人四約法一約時者時總有六一尼衆差請人時二屬授比丘時此上二時在尼法中三為尼對僧請時四衆為差遣時五尅定期往時六迎供教授時此之四時並隨文解然教授時母黑白月除去前三及以後二故僧祇云白月一日至三日是名時未至十四十五日是名時已過中間十日任取一日往要與此時相應方免日非之罪第二處者處唯作法作法之中大界非小此大非小通於六時第三人者僧尼二衆咸須滿五數雖滿五但是四人僧攝然尼使人明須解法愚訥不了者不堪為使人比丘受屬者理亦須然僧祇二十七云從今已後比丘尼與欲應受除五人一上座二教授尼人三誦木叉人此三應各自說不應受四守房人五病人此二應言我不至僧中更與餘人若言我是乞食阿練若糞掃衣大德不取者越衆既滿和非病理合差遣然所差者具德如前第四法者白二非餘彼此二衆差法並然復應更有屬授法及對衆請法此文但有廣法而無略法五分二十九有略法彼云有諸比丘尼與比丘共布薩見比丘犯罪便欲舉之以是白佛佛言比丘尼不得共比丘布薩應半月請一比丘令從比丘僧乞教誡人諸比丘不肯為乞佛言聽尼為作供養鉢囊漉水囊腰繩香油前食後食或未布薩為白或已布薩乃白佛言不應爾應唱不來諸比丘說欲清淨時從坐起在僧前立白言大德僧聽其精舍和合比丘尼僧頂禮和合比丘僧足乞教誡人不言三說若無教誡人者上座應答云此無教誡人又無能說法者汝等莫放逸此比丘明日尼來時應如是傳上座語語釋文可知次解不差結罪文分為二一結不差日非二明不問計先解初文古舊釋云若僧不差說八敬吉以八敬文定生患義微故犯輕罪說法寬慢耶正難分容說耶法壞尼心行生患義多故犯提罪若日非說二同犯吉羅以俱日非不聽教授更無餘過故同小罪通對被差人可為四句不差有二若不差非日即得四罪三吉一提是日二罪一提一吉若被差人日非犯二吉羅是日往者輕重無犯若僧不差或非教授日說八敬吉者一得不差說敬吉羅二犯日非吉羅並得二吉是以雙結容是日往所以言或次明不差說法提問所以說法但舉不差不牒日非耶答前說八敬不差日非同犯吉羅以一罪名括二罪種故須並牒此中不差說法罪重日非便輕非但種別罪名亦異濫故不牒非謂說法無日非吉今解不然說八敬亦得提罪言僧不差或非教授日往說八敬吉者舉敬結日非罪非是說八敬𠎝說敬得提戒本已結如戒本云教誡者提釋中教誡者八不可違法又五分云教誡者說八敬法若不差教誡比丘尼語語波逸提伽論第二云何教誡尼答說八重是名教誡故此二戒合制還同異語嫌罵說敬得提戒本中結說法獲墮廣釋中明又解脫敬及法同得一提若說敬不說法或說法不說敬各獲一提若俱說二共得一罪以同一業如俱過房文中結罪綺年不同舉八敬結日非陳說法論輒罪日非亦然同結一罪心業不異豈獲兩𠎝十誦教誡一尼一提乃至四尼四提次不問訊結業如文尼及沙彌等吉者皆由不得僧命輒互往來為使者是次說法至日暮戒書一日詳聚尚避嫌疑況暮交參不招譏謗別緣具六一是僧差二集尼衆三教誡說法四日暮五日暮想六隨說不絶戒本三句一人二為僧所差三教授結罪釋中上二可知教授者下釋第三句文四應知以緣起是比丘住處故開文開比丘尼寺伽論第二問云頗有比丘日沒時教誡比丘尼不犯耶答有若比丘尼寺中聚落中近聚落寺中白衣家不犯聚落外犯次譏呵教授師戒僧差德人教授尼衆本情為法不希飲食見他得利嫉妬譏呵惱亂德人故須聖制別緣具六一是僧差二情為法三得供養四生嫉妬五譏言了六前聞知戒本兩句解釋如文尼等三衆稀故吉羅次與非親里尼衣戒意如前明別緣具五一是大尼除下二衆二非親里三非親想四與應量衣五除貿易五領受犯滿戒五句一人二非親尼三所與衣體四除貿易五結罪多論應量衣鉢俱提不應者吉解釋可知次與非親里尼作衣戒不能自尊輒為尼作非直招譏不輕亦乃於道為耻別緣具六一是大尼除下二衆二非親里三非親想四故心為作五除因緣開文為借六隨作結犯滿戒四句及釋可解問所以作衣針針結罪答以過失多復妨修道故隨作結不待全成如尼在僧寺中造塔亦為過多博博結罪次與尼屏坐戒意如前明別緣有四一是大尼簡異下衆諸師皆准五分多論尼下二衆亦俱犯提此不同彼雖復譏染不殊然以下衆各有師屬縱與俱坐稀故犯輕然諸師浣故取衣即除下衆此等餘戒便即通取豈非尋文不審令義乖張今不同彼俱除下衆二是屏處諸師云緣是露處戒本明屏故知俱犯此亦不然俱是屏處緣中云門外坐者謂是院內門外猶是屏處故廣解中具彰見聞二屏乃至不聞常語聲者亦是屏處五分始終皆言屏處三無第三人四共坐便犯戒本四句解釋可知多論與尼屏坐隨起還坐隨得爾所波逸提十誦亦爾所以尼罪輕者答僧是上尊尼每遵奉制不由己故獲輕𠎝不盲不聾開前盲而不聾句不聾不盲開前聾而不盲句所對異故有期兩句餘戒文咸同茲釋次與尼期同道行戒別意如上別緣具六一是大尼亦除下衆二與尼期除遇相逢三同一道除去異路四在見聞內五無因緣除與估容大伴若疑怖處力勢所持六隨越界犯多論水陸期行悉屬此戒謂僧與尼各別乘船同水路行越界得罪若同一船落在後戒滿戒五句一人二與尼共期三同一道行四除異時五結罪異時者下誦第四句釋中上二句可知有疑者下釋第四句道者下劫釋第三句若比丘下解第五句文二可知尼假伴授過微故輕次與尼期同乘船戒別意如上別緣具六一是大尼二與尼期三同一船四作順流上下之意除去真海及船失濟五無因緣除命命梵行力勢所持六雙腳入般犯共俗女同船亦是犯限此略不明下房舍文共女人上船疑佛言聽直渡若准此義第一緣應言人女滿戒五句如前釋中上三別解下二合明十誦隨共一二三等同船亦得示許提罪次食尼教化食戒尼以偏心曲歎無德現有別情招譏損道又讚無德定毀賢良情過不輕故須聖制別緣具四一是尼讚歎二知讚歎三受得四食之咽咽結罪問所以不開病者答但使不讚一切得食何須對病開使讚歎若其開讚病人高德猶毀賢善是以不許又別衆食七緣對此無益亦不得以此七緣來開滿戒六句一犯人二知三讚歎四得食五除開緣六結罪此六之中第五除開緣不解餘句具明一二四別解僧祇十五云尼語檀越言某甲徒衆多聞精進當須通讚一切名讚歎食若言某甲衆主多聞精進為是比丘通請女人一人是讚餘人非讚若有如是讚食當展轉相貿食不得捨食而去若比座垢穢不淨不喜貿者當作是念此鉢中食是某甲許我當食無罪若尼語優婆夷言尊者某甲可長請供養此即名讚歎若言尊者某甲可常乞食不名讚歎彼比丘下合解二六兩句此中文三一正結提二以外用讚稀故吉三境想四句大僧讚尼亦以稀故吉羅次與婦女共期同道行戒制具釋相同前與尼期行戒但此中俗女為別又此但使共期不問第三人多小皆犯以非同法不類於尼開多伴不犯次施一食處過受戒施主標心限期一食理應節量隨施而受今乃久延過受他食過損不輕是以聖制別緣具五一施限一食二知限一食三無病及無請住等緣四過限而受五食則成𠎝滿戒五句一出施標期二無病者反定開緣三比丘者犯人四應一食者食之分齊五若過下結犯辨相具解文中不次初先解第三句人次解初句次食者下解第四句次病者下順釋開緣次若無病下解第五句文二可解但以食資要急喜過故重餘過不數所以故輕次展轉食戒設供延僧情祈福利希存赴納畢以施功今先受已輒便後違非直六味徒施亦令二益蠲備受前請已復受後請互背彼此稱為展轉別緣具五一先受前家五正食請二體淨堪足三更受後家五正食請四無因緣謂除有病等緣五隨食結罪今將前請對後請可為三對四句初四句者一前後俱正背得提罪次二差互及俱不正但吉次足不足為四者初前後俱足背犯提罪次三差互等並吉次淨不淨為四者前後俱淨及以前淨此二背提餘二背吉次下釋文文中分二初食稠粥背請第二爾時下食五正背請前文復二一明犯相二爾時少信下可責犯相文四一是施粥緣二爾時下正聽食粥三種藥粥者一是時藥謂胡麻乳二七日藥謂蘇及油三盡形藥謂薑椒畢鉢佛讚食粥有五事善五事可知僧祇二十九有十利即持戒清淨等偈三時阿那下慶得修福四犯如文次呵責文三一發覺得實二時少信下譏已白佛佛為說法令得道果果三爾時下呵責立制以畫不合即是正食若先受請而食此者即犯背請故曰如法治亦可先食稠粥後成足緣一結通收背足故言如法治次食五正背請犯呵如前立戒文三滿足五句一人二展轉三食四除開緣第五結罪餘時者下誦前第四句問所以不言衣已竟等應解云除餘時者是以此文中先舉其犯後除不犯前長衣等者先除不犯以取犯時以其專不專故所以語異亦可此等三戒時與施衣合故對下解便所以語異今解不然但為長等三戒衣若不竟不可結其長離之𠎝為結長離𠎝須言衣已竟迦絺那出者相由舉也此等三戒體與衣殊豈得同彼言衣已竟為無衣竟迦絺亦無然驗開緣理應有三謂更加一衣時不犯以受迦絺那衣不犯五事緣在下文不在此戒以無緣故本中不除准下合有廣文便解故言自恣一五月等以此故知定得時利縱於時利分中有病及施衣緣者但為時開不以病等即是病及施衣局非時分不同舊釋云病人施主體知不生譏惱非情所欣十二月常開不局時限施衣開者衣利既重或長貪結故以時開之非一切時故文言一月五月若復有餘施食及衣者前言一月五月是時捉時望衣食衣食是時家之餘單時無開要假施食及衣故言若復有餘施食及衣此釋不然違害正理但以餘屬非時分即是時家之餘次下廣釋釋中前三可知病者下釋第四開緣句但以病人苦惱開無譏過施衣等者即案此文二緣具顯以一月五月是時分利若復有餘即非時分若今日下解第五句文中有二初教捨請次若比丘下結背請罪然案此文必須捨與同類一人令彼代去方得免罪不同餘文心念捨得諸師對此解僧祇六念計與此文不果快會其六念義至下文解次結背罪者且如一日受十家請若赴最後請者犯一提八吉以初一是前餘八是後若背後九獲九吉羅中間多少義准應知又解前後並據赴者論云且如十請赴第五者即前四為前犯四提罪後五為後得五吉羅如是類知餘請前後若赴初者下九為後若受後者上九為前尼以緣異且結吉羅開文非食者不正食也或食不足者食雖是正少故不足或無請處者元無有請隨食不犯或食已更得食者受前家食已然後受後家食容或有足不犯背罪若先食後家食即犯背罪或一處有前後食者謂一施主再設五正亦或犯足而無背𠎝次別衆食戒別意者出家理應共遵和合今結私衆別食惱僧又令施主供此別人失於僧田反報之福故上文言有二事故制又十誦十三云語諸比丘從今以二利因緣故遮別衆食一利者隨護檀越以憐愍故二利者破諸惡欲比丘力勢故莫令惡欲人別作衆別作法與僧共諍次釋別名古舊諸師皆將別衆對於破僧以辨同異故今尋思理恐不爾但知別衆者能別之處四已上以衆別他名為別衆所別之處不簡多少下至一人亦成所別故此同別唯約情說其別衆羯磨者以人不集彼此情乖事不共同名為別衆所以知者如秉對首心念法亦非是衆但望應須集者不集名別其破僧者望失和合彼此無益名之為破別緣具十一有施主二在時中三別請別乞四食要五正五必須體淨六食請須足七食處成衆八界內不集九無因緣十食便犯初緣所以須施主者以四方僧食及自己食不犯別故故多論第七云若僧祈食時應作四相一打楗槌二吹貝三打鼓四喝令令界內聞知此四種相必使有常限不得或時打楗槌或復打鼓或復次具令事相亂無有定則不成僧法若不作四相而食僧祈食者不清淨名為盜食僧祈若使有雖打楗槌不清淨名盜僧祈又論云若四人已上雖在界內各自有物共作食不犯別衆以此故須別有施主其施主者通道及俗故論云若四人中一人出食三人無食共一處食波夜提此文復言沙門食者在此沙門釋子外諸出家者及從外道出家者是故知內道沙門亦成犯限前言慈愍白衣家者且就緣說次第二緣須在時中若在非時分中即無同味義故假別無𠎝故要時分次第三緣雖有施主若僧次請者亦無別過故須別請別乞故見論云別衆食有二種一者請二者乞云何請成別衆有一優婆塞往至四比丘所以正食請比丘願大德受之是名請成別衆云何從乞得罪有四乞食比丘或坐或立見優婆塞語言與我等四人飯或一一人乞言與我飯亦如是或俱去或各去一時受食得是名從乞得罪此文乞者提婆達多別將四人通已為五家家乞食佛因故制其別請有二一題名別標理是別請二以法取人亦則成別請如言禪師若干即簡律師法師餘亦類然明非僧次故五分云若於衆中別請四人已上是名別請衆食設雖別請有僧次者亦是不犯以僧次人破其合計興謀義故其僧次有二一直言僧次是名僧次二從上座次第若干人亦成僧次然檀越請在於界外者隨何僧次即是不犯若在界內者必須請本界內布薩處僧方免別衆故多論云若有檀越請四人已上在僧布薩界內食應布處請僧次一人若送一分食若不請一人不送一分食者波逸提若二處三處亦如是若各至布薩處僧中取一人若送一分食則清淨自處不須展轉取人送食設請一人送一分食外有異處比丘來若遮乃至不與一人食者波逸提若僧食竟有客比丘來檀越與四人已上無罪次第四緣正食者若非正食資身義微故須正食充軀成犯是以文言食者飯等次第五緣雖是正食必須體淨以不淨食無同味義舊問答云若爾非法羯磨不合同遵應不犯別衆答非法詳聚容可翻非為如故制有別衆食已不淨設往不能回令作淨往而無益是以不犯故下文言非法別衆此難及解俱不應理然非法詳遵名為如法食猶不淨可為問答設使同遵不成如法何須對食問答釋妨又此非法羯磨本謂為如及至秉作落非不成故言非法別衆次第六緣要須足者以食不足𨷂無資身故多論云若別房波演此云大檀越別與小食四人已上非足食故無罪次第七緣能別食處必須成衆故文言四人若過分作二部更互食又多論云若各別食食不成衆不犯又云三比丘一比丘尼三比丘尼一比丘乃至三比丘一沙彌尼不犯若三比丘在界外一比丘在界內若三比丘在界內一在界外若三比丘在地一在空若三在空一一在地不犯若狂心亂心病壞心滅擯人為四亦爾次第八緣界內不盡下至一人不集成犯故多論云若同伴四人已上在聚落界內受一檀越食先雖無僧但知有一比丘在中不請共食者波逸提若生疑心不問有無食者吉羅若欲如法者應好隱悉聚落有比丘無比丘不生疑心食者無過若不爾者應打楗槌則清淨如法九十二緣至文當釋次下釋文犯相等可知次滿戒五句同前展轉食戒對此釋開緣句五門分別第一定緣多少第二定時非時第三定緣共別第四相攝強弱第五通塞同異初定緣者准此開緣但有其七取下功德衣利便有其八此為無緣不除義如前辨其作衣時者本以迦提月中作衣故開問此迦提月自得別衆如何乃云以作衣開答望本迦提月中未有功德衣緣要作方開不作不得後有功德衣緣設不作衣於迦提月中開別衆食據斯道理應立衣時然言作衣時者猶是標初別開望後總緣即是衣時是以廣釋之中兩緣並顯故言作衣時者自恣竟無迦絺那衣一月有五月乃至衣上作馬齒一縫爾者衣時既自得別不假作衣者所以乃言衣上作馬齒一縫答此文為舉受利者不以此文證要作衣得別又解若後安不安人不合受利此於迦提月中亦須作衣此假作衣方開不作不許由此二人亦合作衣故於時外有作衣開又准五分亦有八緣彼戒先開病時次開衣時施衣時緣云如數數食戒說其數數食戒云世尊聽諸比丘受迦絺那衣不犯五事諸比丘作念為衣時不犯數食衣竟亦不犯佛言衣時不犯過衣時犯次施衣緣云有諸白衣知比丘不得數食作念我當作方便為諸比丘作衣比丘來受并得供養即便作衣請諸比丘諸比丘言我等不得食但與我衣諸白衣言大德若受我食乃當與衣諸比丘作念世尊若聽我以施衣故數食者可不之衣以是白佛佛聽數食次始別開作衣不犯文言有諸比丘欲作衣為乞食故衣不即成妨廢行道作念若作衣時佛聽我受別請衆食者衣乃速成不廢行道以是白佛佛便聽許次明道行等都合八緣以彼證此俱有八緣次定時非時者唯衣時是時利餘七是非時開雖於功德衣月有餘七緣然以時利故開不以餘緣故許故不受德衣人設於時分位中有餘緣者亦非時攝此謂約人受利為定不得局於時限定時非時雖復當他時分月利望已不合受即是非時次共別者施衣時大衆集時沙門施食時此三共有以施衣沙門緣非別屬開在前境故咸共有大衆集者相假為也獨望不成亦共緣攝故此三開但有必共自餘諸緣咸皆是別或有各帶別緣名為共者此之共別不同前位次相攝強弱者若望受利人時利月中不得更有餘緣來開設有餘緣但時利攝名之為強若以餘緣互相望者但有前三共緣即共緣攝本以共緣故開不以餘緣故許以無餘緣自得別故餘緣縱雜各自緣收次同異者船行大衆沙門唯局此戒道行通於浴戒少有同異義可准知衣時等開通在展轉及食前食後戒病緣少寬然有差別不同之義隨相應知次下釋相但前三可知病者已下解開緣句但以病人共惱開聽別衆又無異計破僧之義見論病者腳破沙土入中不能行故得受別衆食作衣時者謂一月五月為作衣故求食作衣恐事難成開別衆食若開此文為二緣者相亦可顯如上義明但以衣時一開受利時定作衣即是時利之外故後安等人於迦提月為作衣開者亦非時攝施衣時者衣利雖重二義故開一益施主二利比丘然准此文施通二時時中自得別衆不由施衣但以施衣開者即是非時以餘即是時家之外次道行者要是即日下至半由旬有來去者聽十云昨日行來今日食或明日欲行今日食皆提以時過及未至故船行亦爾次大衆集者五分云諸佛常法歲二大會春夏末月諸方比丘皆來問訊以衆多故次請甚疏乞食難得諸比丘作念若世尊聽我等大會時受別請衆食者不致此苦以是白佛佛便開受別請衆食此開緣云爾時衆多比丘從拘薩羅國遊行詣一小村諸居士念言衆僧多而村落小我等寧可與衆僧作食耶勿令衆僧疲苦即來請僧佛便聽許詳此皆已衆大難供佛愍比丘開別衆食此言食足四人長一人為患者昔解云謂四人中長一人非謂四外別有一人乃至百人長一人者應云長九十七人為患但以同名長處義齊故云一人吉釋云大衆集者唯此處有食餘處無食故開言四人長一人為患者以食易得是患制犯若食難得開患不犯下至長一人為患多不待言乃至百人長一人亦爾今解多論云或以法事或以餘緣衆僧集會極少舊比丘四人容比丘四人名為大衆雖大衆集食不難得者不聽別衆以難開許准此即是食難得時所別雖一不名為患若食易得所別下一能即犯別名之為患此則舉患以開不患乃至百人長一亦爾患者犯別衆也次沙門施食者多云是外道沙門除佛五衆一切外道出家皆名沙門但為外道異見暫生信心屈請比丘益彼故許文言在此沙門釋子外諸出家者謂是舊沙門及從外道出家者是始欲出家者次解結罪句文中分二初教比丘食之方軌二若比丘下違而結罪初文四句初旬無緣須白出者此釋衆外疑故以餘食人皆悉有緣咸非僧次不能益我此謂有緣無緣共雜一處故我無緣白出餘無緣者勿入次句衆以聽隨意食次句衆多分二衆食後句有緣須白入者此除衆內疑故為顯我非僧次不能益他餘無緣者理須白出次結罪可知次取歸婦食賈客道糧過三鉢戒歸婦賈客內懷信心故持食糧奉施僧衆受須籌量過則罄竭故作限約越則成𠎝別緣具五一是歸客二糧二知是三無因緣除病不犯四取過三鉢五出門便犯文中二緣具顯伽若那此云瞎眼故五分云不復用汝瞎女僧祇云此女端正恐王強取我當為作不吉之名王於後時果然欲取以名不吉遂適餘人滿戒三句第一若比丘等請施二食第二若比丘等開受及食第三若比丘等除病結罪提𠎝過受故結不以不分文中乘便故言不分與餘比丘食者此之三文各有其二一者牒人二明儀軌次下廣釋釋比丘義通三位中人次釋白衣家次除病緣次若比丘下廣釋第二開受及食次若比丘下無病結罪文有五句一提四吉此第四鉢犯准論義當下鉢過受出門獲提不分獨食但吉故知戒本文中乘信言也
