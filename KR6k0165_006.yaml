body:
  text: 西太原寺沙門懷素撰次解僧殘開之為二第一總解第二別明總解七門分別第一配屬身語第二自作教他第三遮性差別第四持犯方軌第五違制不同第六二部有異第七下衆任運初門身語位分為四一有二戒局身謂漏失摩觸二有八戒二粗二謗及四違諫語正身助三二房戒身犯語助四媒嫁戒身語正犯第二門位分為三一有五戒自作成重謂二粗媒嫁兩房若論教人有同不同謂蓋有無能所犯異是以下文使比丘言我若報僧恩不在我為此自報使殘僧蘭益若俱者粗媒同犯二房義殊故如前辨次二謗戒惱境處齊彼我同犯三有六戒自重教輕謂漏失摩觸四違諫戒漏摩教人無潤己義但由勸惡故結蘭罪教他違諫僧未秉法教言莫捨但得吉羅以無僧命衆法可違情過輕微所以不重若僧秉法設諫已去教言莫捨即結蘭罪以有僧命衆法可違情過重故所以不輕門且如教人漏失事成始蘭何故教人違諫前人用言違諫未成即得蘭罪舊釋云彼處教人但有自壞損他無僧命衆法可違過義是少故事成蘭不成但吉此中教人違諫一有自壞二復損他三有僧命衆法可惱過義是多故不待事成教即結蘭今解教人漏失約事辨違事成結重不成獲輕教人違諫唯約惱僧不對事明直結蘭罪所以知者如調達違白未竟但得吉羅教他莫捨便獲蘭罪以此故知不對事明又亦不就能所差別若約能所明者豈有所教吉羅能即蘭罪爾者惱僧過重應結僧殘解為惱過重故結偷蘭無別可損不犯僧殘第三門三戒是遮媒及二房餘之十戒並是性攝第四門是中初房除去過量有王房全一箇年半戒具二持犯謂不從僧乞處分法名為止犯身造房成即名作犯此之二犯體一名別而不得有名體各別其二持者具含兩義或從僧乞法即是作持得法造房即無作犯翻却作犯豈非止持此亦同犯體一名別法雖不乞亦不造房名為止持造即乞法名為作持此之二持名體各別餘十一箇年半戒唯是止持作犯亦可此一箇半戒據別體邊是則作犯止持通十三戒第五門理而言之並是違佛制然前九戒直作即犯以無僧命可違名違佛制後四諫戒名違僧制僧若不秉諫法即無違諫之罪以此義殊違制不等第六門一媒二謗及四違諫此等七戒僧尼同犯違諫得罪雖齊境界翻例餘之三戒境罪俱等自餘六戒僧尼不同漏失僧重尼提者染患內外不同故有輕重多云為令二衆有差別故又云女人煩惱深重難拘羅制若與制重則罪惱衆生又云女人要在和屏多緣多力苦乃出精男子不爾隨事能出故不同也比丘觸女力能自固限分中制但待得僧殘尼受摩觸恐成陵逼深防中制故結夷罪二粗稀數僧重尼輕又可尼是趣重方便故結偷蘭僧無八事相資故得殘罪二房就過量者僧得獨行獨宿喜觸造房故結僧殘尼須伴援二人共造為二共造自無過量是以文云多人住屋不犯見論二人造房不犯設令獨造稀故蘭罪若爾覆屋過三何以同犯答此據稀數不同故使犯有輕重下就看覆招譏所以同犯為此下文但離見聞即開不犯既禁見聞不殊所以齊犯若論不處分者舊解云尼無蘭若制居聚落僧儻無房故宜須造設不處分情過輕微但結蘭罪比丘丈夫得在蘭若樹下露坐安身進業今在聚落營構私房故須重遮徵其後犯今解前以過量喜獨故殘今不處分類准亦爾又可本為惱僧制令處分比丘喜惱故殘尼即不喜蘭罪第七門七戒各容有任運犯義謂二粗二謗兩房媒嫁得有遣人為己作義所教事成任運得犯餘六教人雖欲為己以不同犯故無任運次下別釋先解初戒別制意者多論云為令法久住故又欲止誹謗故又欲生天龍善神信敬心故又佛平等不問親疏有事則制無事則止又諸佛法爾淫是惡行法應制之次釋名方便動轉標心究竟名之為故體分流稱云漏失次別緣有五一有六種非道境界若是正道不犯此戒二作非道想以非道道想但得偷蘭是以下文云若非道想不疑僧殘三作究竟心四動轉五失即犯闕緣者若闕初緣正道來替獲重不犯僧殘闕第二緣兩蘭謂非道道想非道疑闕三四緣無罪闕五輕重二蘭次下釋文犯相可解次諸根下發覺呵責先比丘呵文分為四初諸根悅豫發覺所由二諸親友下有二問答明取自言三諸比丘下正明呵責文中復二一彰所作不安妄為安樂二此正法下舉應以顯不應四應舉事白佛次佛呵文二一撿自言二明呵責呵責文三一行違失二汙略教三損信施戒本文三一略二開三滿開中文五一夢中作事二覩事生疑三陳疑扶託四為申疑狀五彰過開通若取作事即應是犯以本無心除夢不犯見論十二云佛制身業不制意業是以夢中無罪滿戒四句一人二犯三開四結次明廣解不釋第三句初一別解二四合明其結罪名乃至吉羅皆無釋者別解可知合明文云第一釋弄列精七種對人屬當第二爾時下辨情所為十一種事第三若憶念下舉前七精錯互作五十句初一漫句情無簡別次對七色名為七句但對責中初之一句尅心相應犯下云不相應犯次黃亦同餘五各爾故曰亦如是合成五十句第四欲為樂故下垂上五十句配十一事作五百五十句初舉為樂對漫一句次約責七句次黃等亦爾次舉樂等類易第五若於內色下出其六種非道境界列釋可知第六若於內色下舉七種精及十一事對於六種非道境界作五百二十八句初約內色取前漫句及青等七但作八句計理應有五十句餘四十二略無次舉此八對十一事明是中先舉為樂八句次舉藥等類易是則合成八十八句次外色下舉餘五乘即成五百二十八或可兼略總乘合有三千三百句次輕重文二一自作二教他餘文可解次摩觸戒別制意者多論六義一以出家之人飄然無所依止今結此戒與之作伴有所依怙二止鬪諍故此是諍競根本若投女人則生諍亂三息嫌疑故不謂直投而已謂作大惡四斷大惡之源欲是衆禍之先禁微防著五為護正念故若親近女人則失正念六為增上法故比丘出家迹絶欲穢栖心事外為世軌揩若投女人與惡人無別則喪世人宗親敬之心釋名者身相捫摸為摩二境界交對曰觸故曰摩觸別緣具七一是人女簡去人男及非天畜等然人女中不簡死活小大親疏道俗齊犯不下文具明二人女想三二俱無衣四作無衣想五有染心六興方便七覺觸便犯次闕別緣此中異境謂有人男二形黃門及天非人畜生此六作闕境雙闕故闕初緣有十二蘭罪若闕第二亦有十二謂想疑各六闕三二蘭謂有衣作闕境及雙闕闕四亦二謂作有衣想疑闕五無罪闕六亦然或獲小𠎝闕七輕重二蘭次下釋文俗女呵中文二先舉欣厭兩人為能呵者次辨厭人呵責其文復二一顯呵辭所依違理名為不善非順出離儀軌故云非法此非比丘所作故曰非宜祈善得惡不稱來心名為不得時第二我常謂下自申來意有法喻合法中文二我常謂等彰己求善之心第二今更不下愜來意喻中本謂者喻初句今更者喻第二句我謂三善根水能滅毒火何期毒火翻從水生可𪫦之甚殊非所宜合中先合下句即出前火次我等夫主下舉俗況道反合初句餘呵可解戒本五句一人二染心三所觸人女境界四身相觸下正彰摩業五若觸一一下結罪次下釋相女人如上者非如上緣女人謂如淫戒通收覺不覺等四種女人是故不以有智未命終簡之僧祇第六女人者母姊妹親里非親里若大若小在家出家身者已下釋第四句欲明相觸先標身義觸中初開九章次依重解若女作女相下釋結罪句於中文三初二俱無衣僧殘二女作女想下衣互有無偷蘭三女作女想下二俱有衣情最微故吉前文有二初心境相應犯二是女疑者心不當境輕前文九業約初投中准下吉中合有六句初二立位以其不過樂不樂故三四交絡以云動身不受樂受樂不動身五六雙頭以云動身受樂不動身不受樂今此文中女觸比丘第一立位直云受樂次句是雙動身受樂應有交句謂不動身受樂比丘觸女亦三俱設亦三合有九句若睡眠女親新死少分壞但有比丘往觸三三合九而無彼來及俱設投業既有十八下八亦然即成一百六十二殘具足應爾文中但有女來餘者普略等就女來闕無交句但有立位雙頭投業既二餘八亦然但十八句又復文據女觸比丘故須受樂若其比丘往即觸及以俱設觸著即犯不須受樂又准下文比丘無淫心觸女及女觸比丘皆問覺觸受樂若比丘有淫心觸女但著即犯故文云比丘欲心觸女手腳疑佛言僧殘不論樂不次女觸比丘手腳及戲笑互相觸方云受樂殘不樂不犯又如衣互有無樂不樂俱蘭故知俱無衣中樂不樂俱殘若待受樂始殘即與諸文相害次起疑心依前廣說合有一百六十二蘭若但依文蘭有十八次明衣互有無若具論者於投業中比丘觸女有六二立二交二雙女來俱設復各有六三六十八若睡眠新死少分復有十八二位合成三十六句投業既爾餘八亦然合有三百二十四蘭文中且就活女有其十句彼此往觸各立位四各二交四即八略無二雙四於俱設中略無立位雙頭四但有二交故總十句初比丘觸女衣二立位句一受樂二不受樂次三四句女衣觸比丘二立位次五六二交比丘觸女衣次七八二交女衣觸比丘次九十二交俱設方便投業既爾下八同然故曰亦如是合九十句蘭若女疑者還爾許吉次俱有衣文中但有六句此之六句據比丘觸女二立二交二雙並悉具足對其九業成五十四准立多少如蘭中說又此俱無衣等三位差別各據本心作此分齊若其本作無衣觸心但使著衣亦蘭以是殘家方便故下媒亦爾次輕重文五一約當趣二明異趣三男子下形報以辨下文與黃門二根相觸並蘭四女人下境心有無五境想五句餘文可解次粗惡語戒制意同前釋名者由此表彰欲穢顯了名粗惡語又可但作非梵行語亦名粗惡如說善事意表淫欲得成僧殘故下文消蘇女人形露比丘見已語言汝消蘇彼言大德爾比丘默然疑佛言說不了了蘭准此解不疑即僧殘著赤衣亦爾別緣有七一人女二人女想三有染心四粗惡語五粗語想六言章了了七前境知解闕緣可解戒本五句一人二染心三所對女境四對說粗語五隨說下結罪次下廣釋前二可知女人如上者如上緣中識好惡者異於前戒粗惡語下釋第四句文中有三一總解准此粗語淫欲語別釋戒本中亦二則成六句二列八門三一一別釋次若比丘下釋第五句亦即是輕重相文五應知次歎身索供養戒情希淫欲矯自歎身望順愛心言此為最故曰歎身索供養制意具闕等並同於前戒本六句一犯人二染心三所對女人四自歎身五索供養六如是供養下結罪次下廣釋前三可知釋第四句文分為四一釋歎身歎身有二一歎色身二歎種姓二以精進解梵行故曰勤修離穢濁三解持戒對治除犯戒方便之業名為不缺對除犯戒根本之罪名不穿漏離後眷屬名不染汙又解對本全故稱之為缺謂不犯僧殘名為不缺如上偈云垣墻缺壞不犯提及呵名不穿漏故上偈言壞器穿漏不犯第五名無染汙故智論二十五云云何名不缺戒五衆戒中除四重戒犯諸餘重者是名缺犯餘罪是名破復次身罪名缺口罪名破復次大罪名缺小罪名破四善法者謂十二頭陀及諸善業作如作是下解第五索供養句若在人女前下釋第六句亦是輕重相文四可知次媒嫁戒結媾媒嫁和合婚姻正是生死之源障道之本又以紛務妨修相招譏醜比丘所為特乖法式往返和合以成婚娶故云媒嫁別緣具六一人男女簡去非畜而於人中無問貴賤親疏二人男女想三作媒事四媒嫁想五顯事了了六受語往彼還報闕緣類說戒本五句一犯人二往來三彼此者所媒境界四作媒嫁事謂持男意等是五結罪次釋戒本上二可知第三句男女互為彼此解女文四一舉二列三解四結男亦類然次母護男下釋第四句且舉女男各一為法次解第五句於中文二一明使義具不二若言已嫁下明境界有無前文有三初使義具三犯殘二自受語往彼不報下具二闕一犯蘭三受語不往彼下具一闕二犯吉前文有二初以一法二法相參作六十四句次以三法相參作四十八句初文分四謂語書指印現相各作十六句初語十六者單語四句次以書配語作四句次指印配語作四句次現前相配語作四句餘三各爾廣說六十四次三法相參亦四謂語書指印現相各作十四二先語十二者語書指印一四廣文次語書現相一四次語指印現相一四此之二四略易即止次書為顯十二中俱有一四餘二略無及餘二頭並略不出并前總有一百一十二句此據一男為頭餘並類然數過二萬次若比丘下一句文乘或可欲明不具先舉具殘次蘭吉二位各三可知此之蘭吉並自究竟非是方便闕緣中收亦可將吉成蘭以蘭成殘猶如違諫於理無失上觸亦然次有無可解輕重文五如前但境想文下使明持書作使者以類同故次無主僧不處分過量造房戒制開意有三一制意者上士報強能忍寒苦不假房舍而得進修是以大聖制依冢間樹下露坐隨緣栖泊二開意者中下報劣不耐風霜要藉屋宇方能進修是以如來適情聽許小房石室兩房一戶三又制者出家之人理祛封滯縱有離搆但取容身然諸比丘乘教廣作非理求乞惱亂人非斯則長己貪結壞自知足不生俗信以滅正法又以自專不乞處分礙僧惱衆自壞妨慈故制殘吉四罪多論四義一為法久住故二為止誹謗故三不惱害衆生令信敬增長故四為少欲知足行善法故問四依之中有開有制四制不行並不制罪四開有違而罪輕重答四制不行便當開限是故於制不行並不結犯論其四開乃隨分限於分不行理須有罪但以房舍過重故得僧殘餘者過輕唯犯提罪次辨釋名及離合初二先釋名者本心為己名為無主輒自造房稱不處分大不依限故言過量次制離合先制離意問二房何以離者答雖同一房三義異故一有主無主殊二量制不制異三秉法處分牒事差別以此三義故分二戒又問於前房中何以二戒合者答生罪緣同故須合制謂過量不處分並由一房而生如急施雨衣四獨二浣異語嫌罵等次初二者前房無主不處分初後房有主不處分初然不處分名雖是同以房分法並有最初其猶不定所撿並舉殘提對於二處各有最初故知二房其義亦爾不處分既爾妨難類然別緣具六一自乞求二無主三為己四過量不處分五過量不處分想六房成結犯次闕緣者若闕初緣不自乞求即無過量容有餘三此三非定或有三若作如法全是無罪若闕第二便犯後戒或三二等如前所明若闕第三不自為己為他造房二蘭二吉或三二等亦如前明若闕第四容有四蘭謂實不過量作過量想疑實得處分作不處分想疑若闕第五亦獲四蘭謂實過量作不過量想疑不得處分作處分想疑若闕第六輕重二蘭多云從平地印封作相二團泥未竟已還盡輕蘭一團未竟重蘭次下釋文犯中非理乞求及斫伐神樹即是惱亂二趣次時彼下發覺呵責初樹神白佛次迦葉白佛所以不呵者以佛聽造乘教起非迦葉若呵反被嫌責又可造房者多呵而無益善識人心將護故爾次呵文二先問自言次方呵責呵中文三一呵恃勢乞求然佛雖聽比丘造房而不以房廣令乞索今造大房廣求功車杖等以乞繁多居士遙避故曰非法而乞此物難受次告諸比丘下舉外況內呵文三可知次爾時下毀讚以呵過求越分故曰非時苦言逼切名為不耎耶乞增貪稱云不正應機利物名曰知時不爽物情稱云柔耎濟物息貪名為正乞次明戒本九句初舉犯人二自乞求以惱施主有過量罪若其自物則無過量三作屋顯作餘物無過量不處分罪四無主者以別有主不犯過量五為己者除去為他六應量作辨量分齊七教從僧乞八彼比丘下教僧與法九若比丘下違而結罪廣解文二初釋戒本次若比丘下輕重相前文餘句可解應量者下釋第六句然佛磔手文說不定五分二尺僧祇二尺四寸然祇二尺四者是舊小尺准今大尺但有二尺今且依祇為定長十二磔者謂二丈四尺廣七磔者一丈四尺此據內量不取其外故祇第六云長者縱量也廣者橫量也作屋法有內外量今縱廣量壁內也屋高下量者壁邊一丈二尺今解過量三門分別第一應量犯未犯第二互過結未結第三俱互罪多少初門應量不犯過即結𠎝故言過量作者僧殘爾者長衣亦應過量有罪答房是過中制衣是滿中制房以過中制故舉開不犯位衣以滿中制故舉制出犯位所以爾者舊解云長衣內開外亦開作法外開位故須舉犯以開不犯此出外開極小量房內開外不開無有作法外開者故舉未犯位即是內開極大量今解長衣本聽畜但出作法量應量應如法不作即有𠎝房制不聽大出量開分齊應即開無𠎝過即制有罪其處分量者見論十三云若房長六磔手廣四磔手作如是房者無主亦不犯何以故以非房故又此兩房戒開文並言小容身屋不犯若越四磔六磔手已上即須處分是則過量不過量者咸有不處分罪處分不處分並有過量𠎝第二門問房有廣長如何結罪為待俱過為互亦犯答互過即犯不待俱過故見論云若滅長益廣或減廣益長並不得何況長廣俱過又如下文坐具雨浴衣等亦同互犯以此義故今以長中過如減對廣中過如減次第互歷合成九句數之可知是中五句有罪一俱四互四句無罪故知互犯第三門問若房互過始終二罪如其俱過亦結二不答互據二房復兩業造是故二房各結一罪俱過房一復一業造是故一房但結一罪爾者如食殘等不淨食時咽業一故亦應一罪答食雖業一以緣異故房則緣業俱同是以一罪次難處下解第七句於中文二一出妨難體二教從僧乞見論房主先當治地平正猶如鼓面然後往乞此乞威儀闕無禮足表己殷重一言至三次爾時下釋第八句於中文三一撿人二驗事三與法前文僧觀此人為可作不立二章門次若可信下釋成二門次第四句前三不應第四應與對此解義二門分別第一僧別二地須處分不第二現有妨難處分成不初門本製處分為防妨難縱非僧地義容妨難故但造房咸須處分如後戒云何處有好他堪起房舍爾時近拘睒彌城有尼拘律神樹多人往返象馬車乘止息其下時尊者闡陀往伐此樹即制處分此豈僧地第二門問現有妨難處分成不舊解成就處分本防不處分僧殘不正防妨難既所防不同難有妨難從僧乞處分者免彼不乞專任之過故得成就為此文言不過量僧處分得妨難二吉此文良證言不應者得小罪故此釋不然違於正理凡所為事必須稱法事既現有妨難處分如何得成又制處分令撿妨難文言妨難互有及俱並不應與妨難俱無應與處分今有違文如何成就又若與法成者如何瞻波云不如白法作白不如羯磨法作羯磨非法等不成若爾何故文言僧處分有難有妨處二突吉罪辭此先得法妨難後生以法先成無有殘罪為有妨難但結不應次與處分法於中文二一明與法二明作弗就與法中先差秉法人母經第四束為四位不差耆年者以耄不堪故亦非下坐者以卑小故上座次座但能秉法不問誦律不誦故云應差堪能者作次明與法法是白二四人僧收於中文二初正與法次僧已忍下結前中先白後羯磨白中事繁重者即有四句一告衆勑聽二牒所因事令衆同知三作法時到勸衆詳忍四舉其所作結成白詞白中事不繁重者但有三句如受日差人之類次羯磨文二初舉所作咨僧可不次僧與下決判是非前中初句總告攝心次舉所作約別勸忍次決判中亦二初僧後別結文可知因明處分法與何相應者謂與人處相應唯此人此處得或此人餘處餘人此處並悉不得多論云若印封作相已不得餘處作房若異比丘不得此處作房正應此比丘作又云若此房上更異比丘欲作房不須白僧但房主聽得不聽不得以此故知唯是人處相應爾者結界亦然答界本為衆即是衆同之本此無為別故不相類次明作事乃至一團泥在偷蘭竟即僧殘又後一團擬作者蘭若其心絶亦殘次解第九句文有五三第一三二殘作頭妨難俱互作第二三以不處分為頭作第三三以過量為頭作第四三無殘直吉俱互作第五三無吉直殘俱互作據理合然有文同此或有經文殘中唯有過量一句略無餘二故有十三句次輕重文五一自作二使他作三為他作四房主巧師此彼犯義文有四句初句現前拼地應量作者過量作者犯此謂房主結殘巧師蘭罪為欲一言通結彼此是故直言作者犯次句亦然三不報四不問此之問報但苦吉無殘第五境想文有四重此是犯不犯門轉想故五次有有主不處分造房戒以有主故不辨尺量唯此為異餘悉同前問既有主辨何須斫樹答為欲取地不須樹用如文何處有好地堪起房舍即便伐樹次無根謗戒別制意者法衆所居理須和合不相惱觸是曰衆僧今乃懷瞋橫誣重事塵盆良善甄出衆外此則增長生死毀滅正法欺𧦘事深故須聖制多論云為法久住故為止謗毀令梵行安樂住不妨讀經行道故次釋名有三一釋名者內無三實稱曰無根重事加誣名之為謗次離合者問謗義是一如何分為二戒答望無根處齊理應合制但以無根假根殊是故別禁若其一向無根或見言聞疑等或淫言盜殺等並前戒中收故十誦五十一云若比丘語比丘言我犯淫是比丘以無根謗言汝犯殺盜妄語得僧殘餘盜殺妄綺互類此應知若或異事上見假言見此聞疑亦爾咸假根攝問三根謗人名別得罪何以合一不分三戒答若望三根名別得罪不必相假亦應立三但以無根處齊得罪義等又客共證一犯是以合制次多少者問謗他犯重實無三根僧虗解邊犯妄提不答若准見論得謗無妄故論十三云以無根夷謗比丘得僧殘無夜提以謗一向假虗成故又解若望所謗之人理實得謗無妄以謗一向假虗成故若對僧前妄心說實令僧虗解亦成妄𠎝故五分第三僧語慈地云於僧前妄語其罪重於百阿羅漢猶如妄語惡𠎝兩舌對心有無定罪者是次緣有八一大僧尼二僧尼想三起瞋心四無三根五知無根六說重事七言詞了八前境知解初緣大僧尼者甄下三衆下三罪名既輕謗豈得重猶如打奪下三罪亦不重爾者隨順解義何以同提解同違僧命衆法齊故又大比丘不問淨穢若以無根事誣皆成謗罪故文云彼人云不清淨不見彼犯便言見犯無根法謗僧殘下戒云不清淨人不清淨人相似以此謗彼復以清淨者根謗不淨者皆成謗罪以此故知穢亦成謗次下諸緣隨義可解無根謗法至文中解次闕緣者若闕初緣以大僧與尼互為闕境及下三衆闕境雙闕各四成八餘闕准知次下釋文犯相文三一明如來住處第二尊者下謗緣第三時慈地下謗犯第二緣中分二初請營僧為謗遠緣二時有慈地下為謗近緣前文分五初默念營僧第二時沓婆下舉念申請第三從世尊下遂請差遣第四時尊者下受差處分第五時世尊下稱愜嘉讚問阿羅漢者所作已辦云何念身不穿營僧以求窂固答此身危脆不久無常望清營僧希求勝利故見論云大德何以作如是言此最後身所作已極當取涅槃譬如然燈置於風處不久當滅此身亦復如是我當為僧分布房舍及諸飲食又解羅漢雖復諸惑皆除然餘福智垣須修習如下離波伽耶那入慈空等定次應四方僧法白二差之見論請佛聽已世見未來慈地比丘必生誹謗為止誹謗語諸比丘汝當請沓婆為僧差會分房請竟應作羯磨差次明撩理僧事於中文二先舊次客舊中復次二初總次別所以總舉者欲使同行相欽資緣易具住止和合不廢正修故曰同意者共同次別復二先舉行同人次唄匿下舉業同人先行同者謂十二頭陀義如下釋次明業同此有五人多論但四謂除唄匿僧祇乃至四果三明六通及無威儀者名別次營客比丘五分陀婆即入火光三昧左手出光右手爾處僧祇亦云左手小指出燈明見論云從定起放右手第二指以為光明須臾名聞滿閻浮提諸比丘從遠方來欲看神力至已語沓婆言長老為我等安止住處敷施牀座如是衆多沓婆自隨一比丘為安止處為餘比丘安止住處悉是化身如真身無異問光明神力要入定心云何不定心中而有光者解定心所留不違道理多論第三有三解一云有四不可思議謂諸佛禪定龍業報第二此人利根禪定亦利當正分時或入或出其間駃速謂是散心如人手擊口唱二心恆別但以駃疾謂是一心第三先入定心手出光明出光明已然後出定以定勢力光明不滅如陶師輪餘勢未盡次撩理合儀大聖嘉讚次近緣文二初得惡房惡食生嗔之由次羅閲下興謗方計文有七句一尼法兄所鼓虔問訊二乘前恚意默無所說三無𠎝怪默徵問所由四舉事相擊以申默意五問其所欲請設方儀六示以謗儀令僧擯彼七印述所言彰己能作五分兄弟二人逼尼令謗尼彌多羅言陀婆清淨我若謗之僧必當作自言擯我我既出衆當何所依慈地等言我當證汝擯於陀婆何緣使汝得自言擯彌多羅言若僧擯陀婆我豈得異慈地等言但令世尊斥逐陀婆為吾受擯亦復何苦我等自當好相安處妹敬重兄不敢違命次下正謗此希僧擯故對僧說實理成謗不假對僧故僧祇第六云對面罵謗語語僧殘次發覺文二初沓婆自言以彰發覺次撿挍慈地以明發覺前文五句初明佛問二彰知請證三世尊不可四白言清淨夢中行者以難況易餘之三律沓婆自言清淨與憶念毗尼尼以身證謗故與滅擯白四五世尊嘉讚問佛一切智善知淨穢所以不證沓婆清淨慈地是犯答佛若自證一是一非生人誹謗謂佛愛憎故佛不證止誹謗故次撿挍文三初令撿問比丘奉教二比丘奉教撿問本末本者比丘末者慈尼又解准次自言文本者因得惡房惡食末者是己謗情三雪彼清淨自申謗意次明呵責佛呵文二初行有違失呵次得報決定呵文言一向入地獄者彰過言也戒本七句一犯人二嗔心三所謗境界此中雖言清淨廣解言不淨四無根五波羅夷下重事誣謗顯己謗情故言欲壞等六若於異時下非前行謗時是後雪沓婆時見論若問若不問者以無根波羅夷法謗己若衆僧問若二三人乃至一人若於師前自說成罪得僧殘七若比丘下結犯廣中不解六句餘者具明嗔恚者下解第二句十惡法者僧祇云嗔者凡惱及非情處起謂愛我怨家憎我善友及我己身配之三世及通非情處起具名為十次根者下先解第四句將解無根先反釋有根解此根義五門分別第一列數釋名第二定根多少第三明根虗實第四舉謗成不第五問答釋妨初門根者能有生舉之義故名為根根義不同有其三種謂見聞疑觀視青等稱之為見納響餐聲目之為聞見聞之後猶豫不決心無定執名之曰疑唯此得舉齊號為根多論第三云眼根者必使清淨見事審諦可依可信唯聽肉眼不聽天眼若聽說過者妨亂事多耳根亦爾第二門三根約位總有其四謂自他想疑自根文明他者文云若他見從彼聞亦名見若彼說從彼聞亦名聞然文不出疑者略也理實應有想三根者文言見聞疑想疑三根者文言彼有疑然想疑二位不得名根但今就通故言有四第三門以境而言此四並虗以清淨者不妨有根犯者無根是以文言清淨清淨相似以此謗彼不淨不淨相似以此謗彼然就四中前二是實後兩橫起說之為虗前中各見聞是實疑又是虗雖有虗實但有聽舉第四門自他兩種有則成舉無則成謗想心三者有不成舉以想橫起證義弱故亦不成謗以心實故若無成謗文言後妄此想便言我見聞疑犯疑心三者有不成舉謗則成謗若稱疑說亦不成謗為隱橫疑以實根往謗故文言彼有疑後便言我無疑我見聞疑以無根謗僧殘第五門問見聞境界別從別立二根疑從見聞生應當亦分二如小妄中疑見疑聞說戒中復云見疑亦如是聞疑亦如是解小妄與說戒不欲別立根隨句以相反疑從見聞別此中為立根不得別分二就通收彼此總立一疑根如惡心蘭隨事雖多一名命盡此疑亦然又解文中綺明詳理無別所以知者以此文云疑有二種謂從見生疑從聞生疑故知並已別竟則與小妄說戒無殊但以隨事故離立根即合問想通見等三以三別三想疑亦該於三如何合為一直言彼有疑解根中無想名以立別三想根中有疑名故不以三別若以三別應云疑疑作文不便總言彼有疑又解想義當見聞穴徹分三想疑當於豫根不了故合一又尋文意疑別亦得或是集法聖賢或是翻譯大德為離繁文故合為一故多論云見疑聞疑疑疑見妄聞妄疑妄又可一種是橫起而文想離疑合者為顯作文顯略學者應知自古諸德思不洽文雖復推尋終令人惑次下釋文先解有根見根但約前三戒說聲非見境故無妄語聞義則通總舉四戒從見生疑略舉淫煞從聞生疑還通四戒除此已下順解無根次下合解戒本三五七三句謗之方法文有七章第一無三舉三謗作六句二無一見根以聞疑二根謗三無一聞根以見疑二根謗四無一疑根以聞見二根謗下文繁中更有三章五無見聞二根以一疑根謗六無見疑二根以一聞根謗七無聞疑二根以一見根謗此之七章位約為三初一以三根往謗次三以二根往謗次三以一根往謗位雖如是且從七說七位各有六心即成四十二心此亦理盡不須更作多句解此六心三門分別第一定心名字第二釋除妨難第三對小妄辨異初門六心者一無想不妄心二有想妄想心三有疑言無疑心四有疑妄五無疑言有疑心六無疑妄第二門問初心既是無想不妄何以文中不言無想不忘答不見是無想知無是不妄為此雖無律文得稱無想不忘門初句既是無想不忘對此應有無想忘想所以但立不忘而無忘想答如想先是有對有得稱忘無想先是無先無不得忘爾者無想先是無先無不得忘無疑亦先無不立無疑忘答疑心猶豫得有隱沒雖復先無而得立忘想是穴徹不可隱沒先知是無不得立妄又解初心是根本直是無而言有不須更以忘等別之下五是枝修為別前故故舉忘不差別相對問第二心是有想忘想所以不立有想不忘作文應云不見聞疑彼犯是中有見聞疑想便言我見聞疑犯答夫言謗者必假虗成若有三想而復不忘即是心實豈得成謗如小忘第二心不成俱違句如彼見想還言道見乃是實語不成妄𠎝妄既不成寧得成謗又下開云意有見想便說不犯古德不能熟詳文義立有想心成滂者違前理教也爾者有疑言無疑亦不成滂答此為隱却橫疑以實根成謗是以文言是中有疑便言我無疑我實見聞疑若爾即應許隱橫想別舉實根以成其謗答想是穴徹一向是有不知是非故不得隱疑是猶豫自知是非恐他不信隱而成謗餘有疑等想對理盡不繁更作問答分別第三門此處六心並是境心俱虗以有想疑心要忘方成謗下小妄中直辨違心不要俱虗故無有忘又下妄中前六初三五此狹於彼以無不觸知故後六初三五全是翻倒二處二四六境順心違與此懸殊辨異可解次下釋文初章可解第二章中初句不見彼犯以聞疑不見然以聞疑有故不應成謗既以聞疑無故得成謗者亦應通舉不聞疑何以獨言一不見答論其理實並無三根今文所以獨言不見者此據謗情不以見謗為用聞疑往謗故作是言又為顯此聞疑是實望僧生信擯斥前人第二句不見彼犯是中有見想後忘見想以聞疑謗者亦可前章第二心為舉三謗不應舉有三想還忘三想答前章是總據三為法俱有並忘方盡其理此等皆為謗情防巧平舉多少不同前位爾者此以聞疑往謗准前應云有聞疑想忘聞忘相如何乃舉有見想忘見想答理實准前應作此說然為初句立不見對前有見想為𨷂不聞疑故無聞疑想餘下類同不能繁述次輕重文三一謗比丘二謗尼三謗下衆就比丘中復三初以四重往謗但使內無三根莫問實不實自作使等皆成謗罪第二以非比丘法十三難事謗實比丘亦成殘罪若實十三難人雖無三根冥伏說著不成殘罪但以比丘想故得偷蘭遮不同四重往謗體是汙戒比丘第三除此下謂以餘篇謗人殘得提罪下三犯吉以有重輕故云隨前所犯次謗尼等可解五分比丘謗尼四衆吉尼謗比丘提餘衆吉理有境想無者文略不犯中說實者謂實三根次假根謗戒此假異事上根以謗於此見雖想當事不想當即是人畜類殊名之為異取彼詮此稱之為分故曰異分餘異准此制意等同前唯以假根為異戒本八句一犯人二嗔心三假異分上根四所謗境界五無根六重事七彼於下自言八是比丘下結罪廣解中不釋五七二句餘悉具解解中上二可知異分下合解三四六八句於中文五第一異趣明異分第二若比丘不犯下異罪明異分第三不清淨人下異人明異分第四若見本在家時下異時明異分第五若比丘自語下假響明異分初異趣者如緣起說但假見根略無聞疑次明異罪有二六句初六不犯夷見謂犯餘六假餘異分謗言犯夷此中分二初之一句謂犯僧殘後之五句見夜提等此之見謂文錯故爾理應齊見並謂始順文意次之六句實犯僧殘見謂餘六謗言犯夷此中亦二初之一句犯殘謗言犯夷後之五句犯殘謂犯提等亦可此之四句文中不次初句是第四句頭第二句是第三句尾此中且約見謂作法不論聞疑次明異人文有四句初二以不淨上根謗不淨淨次二以清淨上根謗不淨淨文中直言以此人事謗彼理實並通異分三根次異時中但舉見聞略無疑也次假響中局是聞根以餘二根非所對故餘文可知次破僧違諫戒諫戒之初五門分別第一別戒多少第二諫不諫別第三定罪各種第四明違重輕第五舉不異初門比丘有六尼有十二二衆合有十八諫戒然比丘六戒該及尼衆尼別有六故成十八此中二是屏諫餘是僧諫第二門屏諫就通總立一戒無問止作咸須諫故故文言展轉相教展轉相諫乃至此中違僧亦設屏諫言僧諫者悉是作犯但於事中有倚傍者須僧設諫言倚傍者二破倚傍四依言說相似汙家謗僧執六人同作西性違諫自恃釋種說欲見有在家聖人餘尼諫戒倚傍准知自餘諸戒無倚傍義直作即犯故不須諫第三門違諫之罪據究竟說但有其四謂夷殘提吉若通方便更加一蘭若以因果往分即有十二夷殘二果各自帶因二提亦然故有其八又違屏諫事實及餘六衆復各有因合十二罪於中六是僧諫謂夷殘提各及因罪餘六是屏一提五吉第四門舊釋云就心虗實故罪輕重此之四戒所諫之人了了知已所作事非僧諫者是故違僧命不護衆法情過是重違諫僧殘利吒說欲迷情執實謂己見為是僧諫者非不作故違僧諫之意情過輕微違諫提罪又以所諫事證如調達破僧非法想等前三罪重第四句輕豈況違諫寧不約就心虗便重心實則輕又一人諫中心虗提罪心實吉羅豈況僧諫不就心之虗實以明輕重問所以得知此虗彼實答此戒既言我身滅後可得名稱故知此虗下戒文言唯此真實餘皆虗妄故知不同爾者若由虗實罪有重輕者且如破僧四句之中初句心虗可獲殘罪第四心實應得逸提中間兩句合結蘭罪以通虗實何以俱殘又比丘尼習近居士子既獲提罪心應是實瞋心捨三寶發起四淨何得成虗結以殘罪說欲心實可結提𠎝如也心虗應獲殘罪然真實言不顯心實望其本計亦是矯詞隨舉違諫虗得成夷實意拒僧同吒犯墮以此推究舊釋不然義既不通別中正解但是世尊善知諸法通達罪相結位不同違諫雖齊犯非一蓋故隨輕重定業差殊不須於中強明所以且五犯戒違教二齊何不對篇以明輕重非諫既不爾諫者豈如何第五門利吒說欲有順情義恐多信受舉絶化道今此二破倒說成邪准不律文亦是合舉所以不舉者若望應不應如增二說若論作法如呵責明今此辨諫何須出舉爾者利吒亦然何以有舉答事相由者故即出舉若不出彼所隨之舉何以結此能隨之𠎝又以隨及違諫俱得𠎝假令此明隨非殘故隱此謂理合治舉不須此明又解倒說成耶理須舉者謂此耶人不作破事若作破事即不須舉以分衆徒列行法事非同一和何待有舉若與舉者非是對治下二非耶何須有舉故四違諫並不須舉次隨別釋制意有三一不聽破僧者僧衆和同安樂有法理應詳遵猶如水乳今反倚傍聖教說相似語惑亂群情壞僧斷法墜陷無事為惡滋甚由斯損故制不聽為其破僧義至文當解二須諫意者然以調達立計像真翳法𧦘時事是可愍須僧設諫開示是非冀彼改耶從正棄惡崇善三結罪者然彼僧衆詳心設諫明宣是非開示令捨而復固執己心不肯從勸惱衆情重故結僧殘次釋名者耶法改真分衆異軌稱為破僧固情為惡不祗衆命名為違諫別緣有五一立耶三寶謂是諫所為事二行化於時若不行化即不須諫二如法設諫簡非法等四固執不捨五三羯磨竟次𨷂緣若𨷂初緣並無餘罪若𨷂第二亦𨷂下三單有立耶三寶方便吉羅若𨷂第三無有違僧殘蘭吉罪容直有彼屏諫吉羅若僧秉法不成知不成者亦無違諫因果等罪若其羯磨落在七非作如法心拒得七蘭罪若𨷂第四作白未竟捨者吉羅白竟一蘭乃至第三未竟捨得四蘭𨷂第五緣准前可解餘違諫戒釋皆同此但諸諫戒犯緣少異此中文二初至不食魚肉起破曾因諫所為事第二衆多比丘下呵責設諫前文有五第一先出能破僧人第二爾時世尊下化得太子起破僧心第三時提婆達下篡奪勝位煞佛害王第四爾時提婆達下惡名斷利同情別食第五提婆達下立耶三寶破壞僧輪初人文二初明出家之緣第二爾時世尊下出家受戒前文有六第一覩事為緣第二時有下相率求度第三時跋提下厭俗事畢第四時阿那律下諸釋雲集第五各淨洗浴下進詣致虔第六白佛言下正請出家初文所有諸釋出家者智論第四云佛初還國迦葉兄弟千比丘本修婆羅門法苦行山間形容惟悴父王見之以此諸比丘不足光飾世尊即選諸釋貴人子弟兼人少壯戶遣一人強令出家次相率辭親文二先明那律辭親中文有四初明俗法娛樂二相率推讓三辭母再三但以戀子情重初不欲離望盡餘生終不聽去又死非我欲尚不捨之生由我裁豈當聽別四母施抑計次跋提文五初對跋提三勸三拒二以己要修三責要所以四申己勸情五勸受辭母法式如前次賞俗可知次雲集者問那律跋提具彰緣起諸餘六釋何以忽來五分釋子有七甚相愛重若有所作誓不相違於是那律白跋提王言今有微願願必見從王言吾等本要擔不相違若相違者頭破七分但令卿願必可從耳那律初論跋提不許舉要更勸遂不相違次告五人欣然莫逆次進詣文四一出城進詣二厭捨車服三捨寶尋從四俱往致敬次請如文第二出家受戒文中有三一出家受戒二修道剋獲三除疑通化佛度五人餘三無緣不度又為止謗不調達等度問佛所度者皆是初果如何度已始獲增上答增上名通豈局初果乃至以四望三皆是增上五分六人漏盡得阿羅漢阿難侍佛不盡諸漏調達一人空無所獲既無所得愧恥益深便往佛所請說通法佛即為說調達學通安居之中便獲神通次化太子文中有四一化令信念畜徒衆二爾時下目連以迦休語白佛佛彰彼語無實三爾時下重現神通增信獲利文中有五一改形說法二益增信敬三加利供養四比丘白佛五佛令攝念有法喻合四時摩竭下妬利失通求索徒衆文中有四一妬佛重利退失神通釜者器名六升四升曰釜二從佛索衆三佛呵不付四生不忍心前得外護加利供養即是順情之極今失神通更被呵責便是違情之甚為此創起逆心故曰最初不生忍心次規勝位文中有二初立二章次依章解解中先釋煞佛於中文三初正起害二時衆多下弟子欲護三時世尊告下差人說過前害文三初明教人次提婆達下正明自害三時世尊下酬因念忍前文有六一立計煞佛二佛念本緣謂彌法摩納事如下文明三念害不前捨害往見四聖慈說法獲利悟道五分展轉三十二人皆得初果若准彼文此六十四亦到佛所五教復本道破前立計六重見本人白知驅擯次明自害但傷足指諸餘佛王皆無此事唯我獨有宿緣出血此乖佛儀故白未曾有也次念忍者順世法也次弟子護文四一比丘護佛二佛從窟下問答所以三佛告下彰勝諸怨四告諸比丘下舉五須護頭不須護以現作惡後受苦報故曰後自當知戒據受體命謂耶求見慧是解言說是教行不依教故法律外下五反說可解次說過文四一差令說過二陳疑為决三奉命彰過不于佛僧亦彰惡名即是治罰遠與下作得脫之緣四明大衆忍不忍異次解煞文文有六句一受教害文二發覺得實三詳評治罰四舉以啓王撿實呵責調達雖教太子害我佛法治人唱惡如死罪不重加故曰不應五勑令赦過六不平王意次別食文四謂過舉呵制次作破事文分為二第一興心立計第二時提婆達下依計施行前文有五第一不忍前制起念破僧第二時提婆下以事勸誘希同所作第三時提婆伴下恐事不果拒而未從第四提婆達下立計謀真必望諧遂第五時三聞達下顯耶有能發言順可餘文可解但第四文中開之為四一立計謀真二當語下陳謀宣示三年少下所破違順四由此下結耶功力初文破計像真而立我者是耶佛五法是耶法出離是耶僧然佛僧已識耶法未知故盡形壽下出耶五法此五耶中前三相似後二妄語故下文云以二事破僧謂妄語及相似語相似語者言同意異妄語者自制施行亦可前三若文中若出不受施房等出不受亦是妄語以出所聽受故言相似後二若文中若出所受亦是相似以出不受故言妄語蘇鹽著味合為一斷魚肉害生復同為一上座者謂是耆舊了知耶正故雜心第三云凡夫壞非聖人以正定聚不壞淨故又說得忍凡夫亦不壞已入决定聖僧是世尊不壞眷屬故次明呵諫先辨其呵呵文分三第一比丘白佛第二佛告下說正顯耶第三時世尊下顯己呵責問衆多比丘何以不呵答言濫惑彼不了故無但見異法舉以白佛亦可情懼不敢輒呵第二文三第一總舉欲斷第二舉所斷體第三總結欲斷初文說五耶法誘誑新學令使行耶滅正名為欲斷問所以五法為耶四依為正答佛說具四義故名之為正一本為益生慈心所說非為希求眷屬名利二善識根性稱機授藥依教修行必能會聖三為識根性善達開遮令三品人稱根修進四以識根藥稱法而談如多論云四聖種能得八聖道成沙門四果調達所說翻前四義不如實說名之為耶一惡心所秉本求名利故云我等死後可得名稱二不識根性無長道益三唯制無開益不具足四不識根藥顛倒妄說故多論云八聖道趣向泥洹反更遲難修行五法以求解脫其道甚速次所斷體先徵次釋釋中初依別說下三合明我當以等者歎上行人著糞掃衣為著此衣更無異望故曰趣得知足次開中下著檀越施衣著此衣時亦袪封滯故曰我亦說等下三合說可解次結如文第三呵責先問自言次正呵責呵中文三謂舉列結列中文三一呵行斷二是故下彰報决定三時世尊下經家牒呵有少利益初文四句一呵所行故云汝云何以五法教諸比丘等如上二呵所斷故云汝莫斷四聖種如上三舉前所行將成破事即是斷前所行故曰汝今莫方便破等四舉前所斷勸令不斷即是行前所斷故曰汝當與僧和等即是初三句呵行令斷二四句呵斷令行餘文可知次明諫法文分為四一佛教比丘設諫儀軌二僧為下奉命設諫此應廣彰諫之軌則並回在下辨相中明以下結罪義便故爾三比丘白佛四因辨諫法通被一切然調達拒僧應有呵責為辨諫法該通便立戒本由此佛僧並無呵責非直此戒餘諫亦然乃至違略亦無直有制廣以此足得違文不繁多解次明戒本戒本六句一諫所為人二欲壞下諫所為事三彼比丘下屏諫方法四是比丘下拒屏諫五彼比丘下僧諫六不捨者下結罪此六通該一切諫戒次下廣解文中分二初釋戒本六句次作白二羯磨竟下明輕重相釋中初句可知二所為事中先解和合僧謂以二法釋成和合四人等衆以解僧義衆正翻僧和合乃是僧家義用不得總以和合衆以翻於僧次明壞義破是壞之異名文中有四一舉破數二列破名三結破數四屬破事然十八法並依多論第三解然論中無粗惡非粗惡制餘七對具明法非法律非律並約五法八正互說犯說不犯者若不剪剃髮抓佛言犯戒而言髮抓有命不犯不犯言犯者律防身語不制心戒而說心起三毒即是犯戒輕言重者如鉢羅龍以摘樹葉罪不可懺因此便言煞草木者一切是重重言輕者見須提達尼等先作不得重便言淫盜等一切是輕有殘者下四篇戒犯則有殘而言無殘無殘者四重犯則無殘而說有殘粗惡者如初二犯及二逆偷蘭此是粗惡說非粗惡非粗惡者提等餘蘭是非粗惡說作粗惡常所行非常所行者八正五法互說制者五犯金口所宣名之為制說為非制非制者五法非出金口名為非制說以為制說不說者四禁是重餘篇是輕此是正教名之為說以為非說重輕倒說此非佛教名為非說而以為說但下諸文十八法者皆同此釋不能更明次第三屏諫文舉四衆理應通七第四若不用語者拒屏諫問此得何罪答此違七衆因並吉羅然約事成果罪兩別第五僧諫如文第六若不捨下結罪總覽四蘭以成僧殘此中上下四重因果一破僧二違比丘屏諫三違尼等大衆諫四違僧諫此之四因其位還四及論得果階級唯兩僧殘在此餘三伽耶是則殘因雖後果乃先成餘三因雖在前果便後剋次輕重文二初約自作次辨教人前文復二初約羯磨分齊明業多少次若一切未白下辨法前方便罪隨時長短乃至未羯磨前故曰一切次教人有三可知應有法想文無者略次助破違諫戒調達破僧衆徒不忍既乖和合齊心設諫僧正諫時四伴影助復尋設諫拒而不從故曰助破違諫戒別緣具六第一調達執耶行化第二諸比丘設諫第三遮僧設諫助成破僧第四僧尋諫彼第五拒而不從第六三羯磨竟𨷂緣比知文二如前前文有三一牒調達執耶行破二諸比丘如法諫勸三正影助為所諫事次呵諫類知戒本六句一舉伴數為諫所為者二明伴助相用諫所為事於中文二初則一往遮僧莫諫二此比丘下釋其勸意所以勸者為人如法是故此中四句初二句明人如此調達發言有軌故曰法語復能滅惡生善名為律語次兩句法是能合我等慶遇所聞故曰喜樂稱合道理安心順從名為忍可次屏諫文四一總舉人法俱非遮其影助二然此比丘下且顯人非不出法非者略三大德下申其諫意四大德下彰和利益餘句可解廣解具釋初句文三一比丘義如上者正是所諫之人二以順從釋伴黨義二種順從俱須設諫三明伴黨無數共興謀立計名為伴黨要四人已上始成耶僧若餘群黨名為助伴謂從一人乃至衆多無二伴黨俱須設諫餘文准前次謗僧違諫戒別意有六一解聽依聚落意謂比丘進道要藉資成復合白衣得修福業二不聽汙家惡行意聽依聚落本欲益及自他今壞俗信翻成兩損三擯出意違教壞行具有見聞若不擯治無由改往四解謗僧意同過六人不治其四言僧受憎故擯我二五明設諫意同過者六但治二人似有愛憎須僧設諫六結罪意如前次釋名者依勢及財損壞俗信故曰汙家所為垢濁能感穢果名為惡行別緣有七一作汙家惡行二心不改悔三作擯法四非理謗僧五如法設諫六拒而不從七三羯磨竟𨷂中𨷂初全是無罪𨷂二直有汙家等𠎝𨷂三四緣同於𨷂二𨷂五謂落七非客七蘭罪若𨷂六七義可准知次下釋文諫所為事中四一作惡行其汙家者在辨相中二明呵責三告舍利下擯罰四時阿濕下非理謗僧𢷤中文二初立擯法以付身子二舍利弗下奉命行罰於中文六一將徒衆之造連二時阿濕下求其外護三時舍利下因乞略化四時諸下承教誹謗五時舍利下調伏生信六時尊者下正行擯罰謗僧如文身子親為他謗不得有呵但以謗事具白世尊次呵諫如文戒本六句如前第二諫所為中者三一依處起過自他俱壞近者目屬名為亦見遠者耳餐名為亦聞二諸比丘下牒過驅擯三是比丘下非理謗僧以聞陀迦留陀夷逆路懺悔黨不治故名為有愛三聞達多磨醯沙達多走至王道聚落懼不治故稱云有怖唯瞋我二名為有恚我觀衆僧秉此擯法非是解心所為故曰有癡如是同罪比丘下顯其謗意次屏諫亦三一勸不聽謗僧故曰莫作是語等二而諸比丘下明僧自雪逆路懺者無罪可治名為不愛走人不現復不合治名為不怖汝等二人進則不懺退則不逃人過俱現正合治罰故曰不恚然僧善解擯治方法名為不癡三大德汙他家等者推過屬彼餘文可解釋中初人可知次所為文三一解比丘所依住處戒本之中雖無村字然以城聚通得名村二明汙家惡行此中先明其家次釋其汙然汙家文四一總舉四二列四名三云何下一一解釋四以此下總結次惡行可知三若比丘下明穢響流次屏諫等同前次惡性違諫戒別意者惡性愚人縱情造罪既無師敬觸事有違有德之人以法開晤反被輕陵不受訓導言佛是我家佛法是我家法我應教諸大德諸大德不應反教我說此語時近情謂是須僧設諫開示是非是非既分理宜從順固執不捨結以僧殘別緣具六一身語不淨數數犯戒二諸善比丘如法諫勸三望人自師敬不受訓導四衆僧設諫五拒而不從六三法滿足次釋文諫所為事文三一明不受語二舉兩喻及合三是故下結拒諫意初文持戒順理名好犯戒違理名惡此好與惡止勿語我我應教諸大德此是倚傍勝人恃己凌物何以故下釋不受諫意次二喻者水喻於教風喻於行教有津潤之益猶如於水行有遠化之能譬若於風次結可知呵諫如文戒本六句如前於所為事中文三一明惡性不受人語二於戒法下諸善比丘如法諫勸三自身下拒諫不從屏諫文二一諫前人令互受語二如是下顯諫利益餘文可知廣文具解屏諫互相受語道根時進故曰增益訓以善法名曰相教遮防未非稱云相諫滅除已起故言懺悔各彼此互為咸稱展轉多論第四問云經中說但自觀身行諦視善不善今云展轉相教不相違耶答佛因時制教言乖趣合不相違背佛以前人心有愛憎數言有損是以云但自觀身行若為慈心有利益者應共相教又解若鈍根無智言說無利是故說言但自觀身若聽智利根發言有益故言展轉相教餘文可解上來僧殘竟次解不定先總料簡六門分別第一釋不定名第二辨所防體第三置之處所第四定罪初二第五人處通局第六僧尼有無言釋名者可信雖舉不識罪名僧有未得定結何等是以文言是中無定法故名不定又以立戒通防諸罪不的其一名為不定十誦第四云云何名不定可信優婆夷不知犯不知何屏露處起不知犯名字但言我見女人是處來去坐立亦見比丘來去坐立不見若作淫欲若作偷奪若奪人命若觸女人身若煞草木若過中食若飲酒如是事中不決定故名為不定此不定言義含有四一犯不定望實犯事雖是其定然以不的夷等名為不定文中雖舉二三理通六七二舉不定聖女不識名種但如舉事白佛三自言不定謂言夷等及不犯四治罪不定謂作擯覆等若全不言與罪處所又言二者謂屏露也此中雖通七罪然數不足但攝愛染招譏等戒如違諫長等不定中無故了論云此二不定似律本義以數少故不得如律篇聚本義即是此略彼廣若人能引略入廣謂以不定中罪與篇聚相應或攝廣入略以篇聚中罪與不定相應如是引略入廣攝廣從略是人於律則明了次所防體舊解云謂於二處四威儀中為可信女舉來告僧僧衆既聞應須窮檢於屏二十八四儀中各七露二十四中未獲實者是所防過無別罪名離染清淨不於二處行住坐立是能治行若爾三罪二罪豈非罪名答此是所檢之事若未獲實者攝在不定定即篇聚非此所收今此所明制令檢審既言不定何有罪名今古諸師貴重戒者衆雖各睿思釋此所防但以無其實事意趣難見今述舊章一解稍將近理餘釋繁多不能廣引又可更解但以可信舉事不識名種僧又未知定結何等於此中間未得定者名為不定而此比丘將拒諱心不引實事是所防過作實語心順教引罪是能治行又解此中但欲勘檢比丘知犯不犯本無有過猶如減年受戒受後生疑開數胎等識知犯不不是開時始結其罪此亦如是不繁多解然比丘犯實已定訖為事難知制令窮檢檢未實時在不定攝勘檢實已即定聚收何須於此明所防體次明處者問此二不定是諸罪因能生諸罪不過屏露既有此義應在初明或應置在定罪之下答不定若其置在初者即使輕提之𠎝在於重夷之上或若置在定罪下者復使重夷之罪在於輕吉之下義勢隔絶輕重難均是故不得置於初後故今通論五犯能治皆有防非齊稱為戒故諸戒言最初犯戒若據五犯身語進止咸有法式總曰威儀故諸戒言非威儀等今且約位分之為二前兩過粗能防稱戒下三罪細行曰威儀今置戒下威儀上者為彰可信通舉七五上收於戒下攝威儀義勢得中故置於此是以十誦憂波問可信舉下四品罪得在不定中治不佛言得次明初二昔解不定是第二人以戒本云如優婆私治復不定無無最初開五除不定不入犯戒本一無治罪法下有寂初開爾者云何緣起有最初犯答名同義異諸篇違略此中犯廣以處別故各得最初五篇制廣補略云初此不定制總廣以補五別廣初五篇隨事別制隨事難故就處略廣處總制各別得初今解不然若就所檢三罪二罪以明初者豈是第二以彼犯中並制初訖明此獲實即當第二若取此中要須窮檢窮撿未得名不定者即此窮撿是其初人以對此前未有犯故故使文云最初犯戒故此初二望於犯中體既不同條然有異問此是初人何以無開答此就窮檢必須獲實既未得實是以無開又解應有如善見最初不犯及顛狂等此文無者略也次人處通局者人位有四謂僧尼二俗未知不定唯是俗女為亦得通僧等三位解僧尼二位體識名種又同道分故無不定又僧尼舉罪通於凡聖但驗三根有無不顯勘當之事與此俗女全是不同以此義故僧尼不成然俗男者義亦通許可得執文唯聽聖女俗男舉來不為窮檢俗義既同女男皆許猶如謗人雖寄沓婆為緣餘不知僧事者謗亦成犯處中有三謂僧尼俗處若執文者唯是俗處若以義通亦該僧尼二處若對此處聖俗舉來豈以僧尼住處不合窮檢若既須檢義何不通然舊更立有非上三離見聞屏處此之屏處不離前三不得見文別說即亦離明如文略更說障處障處亦合離明障處既也不離屏處豈繁別說次僧尼有無者舊解云佛制舉罪男女二衆遞相監察見過須舉無造罪之地如大僧有犯同從舉過若女衆見亦須舉白然尼弟子恐違敬教不得舉師是以可信俗女替尼舉罪由俗聖女多喜得實又不識名種致有差殊故使比丘有二不定尼若造出家男女二衆得舉既舉義備何須俗男替僧舉尼有不定義故無不定此或容爾又有一義尼無不定者以制伴故謂若被舉僧開有伴以不若言無伴先治獨罪恐治獨故便應引伴伴即定故亦或無犯進退有妨故無不定又解此是僧尼有無不同戒比丘有緣故有尼為無緣故無立制應不出在聖情不得以事浪相比决且如尼後四諫所以僧殘比丘作時何以不犯但知有無輕重等戒制法故然不繁相决次下釋文多論四義故制一為止誹謗故二為除鬪諍故三為增上法故比丘出家迹俗穢為人天所宗以道化物而與女人屏處私曲鄙碎上違聖意下失人天宗向信敬四為斷惡業次第法故初既屏處漸冉纏綿無所不至是以防之於始釋名如上別緣有六一屏處二人女三無第三人四說非法不見實事五可信告僧六撿未獲實具此六緣攝入不定下戒亦然唯以露處為異𨷂緣比說緣起可解戒本五句一人二犯不定三有住信下舉不定四是坐下自言不定五如住信下治罪不定廣解具釋第二犯中文有六句可解信樂下釋第三句五分可信者見四真諦不為身不為人不為利而作妄語若比丘下解第四句自言不定此自言五句古師以五犯來配謂初是吉乃至第五是夷又舊解云自言所趣向處是行威儀到是住坐是坐臥是臥作通作七屏約四威儀二十八罪露除夷故但二十四今解七罪雖是義通不合配文局限又此不欲具彰威儀理亦不勞指文屬當但此五句唯約戒本三罪釋之所以知者以後戒無夷即除其作為此自言所趣向處及到是所住處坐者是提或可兼前往處亦得提罪臥是殘作是夷次若比丘下解第五句治罪不定此中五句雖有引不引成罪處所即應是定然以治中或是夷等隨夷等治故言不定下戒並同不勞別釋上來不定竟
