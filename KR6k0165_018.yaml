body:
  text: 西太原寺沙門懷素撰次明呵責犍度衆內七人性無慚愧唯知惱僧不護衆法既已過犯相仍行不自立須僧折伏令使調順然此犍度總治七人縱置餘名皆來一難但以呵責數犯人之喜為從初立名故曰呵責七法非一集在一處名為犍度將歎釋文先開十例第一明應治不第二攝治盡不第三立七之意勑四輕重次第第五已離合不同第六足數不足第七隨順有無第八解懺先後第九諫不諫異第十隨文別解初門者凡行七法必須過犯現前無過加治並成非法若輕衆僧耶心例説鬪亂彼此令衆不和與作可責治之若因倒説破壞俗信令於僧田數不平等須作擯治若因倒説多犯衆戒又與白衣雜住行不立乙自與作依止治之若因倒説惱謗白衣俗信已而便捨去作遮不至治若因倒説有罪不見者與不見舉若因倒説不懺法𠎝者與不懺降若因倒説言欲不障者與不捨降治故增二文言有二法比丘應與作呵責羯磨非法説法法説非法乃至説不説如是擯依止遮不至降羯磨亦如是二處二事二見亦如是又增三文云有三法僧應與作呵責羯磨破戒破見破威儀如是乃至降羯磨亦如是雖可實犯要須有根故增四文云有四法作羯磨非法非毗尼不成不得處所謂無根破戒破見破威儀破正命有根破戒等翻上應知又須應其九三如文具明五分二十四云若有三法應與作呵責羯磨既自鬪諍後鬪亂他前後非一後有三法親近惡知識與惡人為伴自樂為惡後有三法破增上戒破增上見親近隨順白衣次攝治盡不雖可惡人隨緣有七佛為伏彼制七治法然以七義來證攝治亦盡一為治人違情行罰不欲除罪責懺殘等二用衆法治令調伏責不作法惡馬治等三為治取不同滅擯四不彌諍責罪處所五唯當衆行罰責不禮等互治六滿治具除損沙彌七唯治道除去覆鉢次立七意者古舊解云七中位二前四壞行不壞於信後之三降信行俱壞四壞行中行雖無量略明二種一內護行謂出家人順教修行衆法成立攝法在己千載不墜名為內護佛法行二外護行謂在家俗人數信三寶援護佛法使不墜沒名為外護佛法行內護有二謂衆法內護自行內護若壞衆法內護者作呵責治若壞自行內護者作依止治外護亦二謂有違順若順情生過不問多家一家並須擯治即是護令生於正信若違情惱物不問多一皆不至治以罵生惱便是護令無惱是以隨事若分立四治法就後三俱壞中行雖無量不出二種一者信善惡二因感苦樂兩報是入道之初門二依信起行行要而言亦唯有兩一是止持行謂信罪懺滅者是二作時行謂見欲是障修離染清淨行是此是三修反此三修即成三耶對此三耶故立三降又更一義言此三法並是不信邪見之人不孤起託境而生境略藥病不懺一種對藥起耶自障二見皆從病起謂不善業有於二能一能感苦不信此者即初舉治二能障道言不障者第三舉治決此合論故有三降今解但此七人隨緣故有佛為伏決立七治法必若人有增減治法亦爾是以但七強釋所由前釋不然辨非可解次輕重者治法雖七輕重分二前四壞行不壞其信治法不重得住僧用制之為輕後三降人信行俱壞治法重故不住僧用名之為重問此既輕重分之為二何以行法俱同七五答莫不皆是治人之法俱奪勝次故畜七五如罪處學悔覆藏等類亦有輕重並奪同此次離合者七中分二前四唯離合為非法後之三降離合俱得所以爾者前四名別唯離方成理無並牒四過合加治法後三名同合離無在故得並牒三過合加治法是以瞻決中有三單三雙一合得名如法次足數不者前四壞行不壞其信治法輕故得足僧數故瞻使文言呵責等四人得滿數不得呵後三舉人信行俱壞治法重故不足僧數故瞻決文言被舉人不得滿數不得呵次隨順者前四無後三有所以爾者後三耶人信行俱壞不足僧數隨即結罪前四非耶不壞其信並得足數無隨順罪二就有中須除師徒尼伴所以爾者師徒為有共行八法互相勸近故無隨罪尼伴僧差非己心故故五分第二十九云憂蹉比丘尼數數犯罪僧與作不見罪羯磨便啼泣言我愚癡僧與我作不見罪羯磨我或於中更犯粗罪願僧為我解此羯磨諸比丘尼白佛佛言不應為解羯磨應白二羯磨若一比丘尼伴之共語共同行止三就餘人中後輕重不同前二犯吉勑三獲提四就重輕之中明多少者隨共同事一一皆結若論自違行法一有罪無罪七皆有罪以並自違行法故爾二就有中輕重一等畜犯吉羅不同順他三明多少隨事獲罪次解懺先後者且一義解前四無隨故得先懺後解三降過重恐犯其隨是以先解後懺如受戒中文極明矣爾者如何增三中先懺後解云下為始終在道先懺後解上為中富還俗先解後懺亦可俱得義並無妨本為懺悔障耶何有隨罪故此七種並為治人雖復懺竟治法不謝次諫不諫異者前六羯磨條結有異無有倚傍不須設諫後一倚傍聖教言説相問是非難分須僧設諫次下釋文先解呵責言呵責者此人例説不耳正耶慢法輕僧情存鬪亂又後專接屏言傳於決此令僧破壞住止不安今欲折伏苦言切勒故曰呵責作羯磨法呵責前人故曰呵責羯磨祇云折伏就呵責中文分為四第一先明過狀第二諸比丘六發竟呵責第三告諸比丘六作法治罰第四若衆僧在小食六隨順為解此一既爾餘六同結前二文可知就第三文中分之為四第一示應作法第二衆僧為智慧下奉教作竟第三諸比丘白佛第四佛言下廣辨如非前文有二第一示作法體第二為作呵責竟下奪七五行前文言增罪治者謂是惡馬治法又解若不調伏增其日月令行七色未得為解故十誦三十一云幾肘作不清淨行惡口不止隨爾所肘僧與作苦切羯磨除下意餘六法並爾次奪七五者初五奪其眷屬二五奪其智能三五制令隨順四五令息後犯一不應更犯此罪餘亦不應犯者不應更犯本罪故曰不應更犯此罪餘者本為殘作呵責法謂犯提罪為餘若為提作可呵為餘二若相似若説此生者相是本罪種類名若相似因此更犯名説此生三若後重於此者本為提罪今乃犯殘餘類亦爾四不應慊羯磨者呵法五及羯磨人者呵人色色不偈受他借給六五不得受他恭敬七五不得降罪輒共他淨次二文可知次是非文二初三法如非次五法如非三中後二謂先非後如此二有各三降釋結先非有二十七初有兩箇三降列章門次有六三舉前六為本若加非法別衆末有一三舉不現前非法別衆通收諸位合有九三次如九三反前而説次色非唯前可解次解文四一例僧集改過求懺二佛言下僧以七色撿驅應不三應如是下自表殷勤求僧三乞四衆中下為作解法次擯者此對俗人例説佛法汙家惡行損壞俗信作法加罰遣出本處令使折伏改惡説善是生俗信故曰擯羯磨釋文唯前次依止者而此比丘在道雖久癡無却慧不耳是非又與白衣雜住共相親附多犯衆戒行不自並須僧折伏令依有德咨稟法訓以成己益故曰依止羯磨文相同前以方國土等五皆不定故不得稱之但應語言應受依止住為表心憑法故次遮不至白衣家者治於有信在家人前毀謗三寶罵辱白衣作此壞信而便捨去以捨去故名為不至僧治令就白衣懺悔遮其不至要令自法故名遮不至白衣家羯磨文中量四前二可知次作法文三謂三種量先以五法稱量白衣次以十法稱量比丘次應如是化下稱量羯磨次懺解文二初明懺謝白衣二時善法下隨順為解前文有四一稱量使德二佛言聽僧下正明差法三僧差使竟下懺謝緣執四如是阿難下正受彼懺十誦三十一若居士不受懺者是居士多知多識有大勢力有官力賊力能自作惡事惱亂僧衆若令人作僧應語是比丘言是居士多却多識乃至生人作汝當離是住處告若是比丘強住者衆僧無罪次解如文次不見降者不信善惡二因感得苦樂兩報邪心在懷障於學語宜加折伏降棄衆外不住僧用名之為舉作斯降法治不見人故曰不見降文相同前解中略無有乞次不懺舉者罪無定性説緣而生理可悔除説緣而滅今以耶見在心不信緣能滅須僧折伏令信懺除故曰不懺降釋文同前次惡見不捨降者欲是道怨説言不障耶心究徵名之為見見心違理目之為惡作法治罰惡見之人故曰惡見不捨降文亦如前上來呵責法竟次人犍度若據法𠎝消除應名懺悔犍度今約能懺行者以標其目故名為人廣明懺儀集在一處稱云犍度特欲釋文先解其義解義依耳論偈曰及上起罪五種方釋曰五方者如人犯殘求得出離若人欲為彼作提舍那羯磨此人必定應先憶持色種上起方法後作羯磨一親僧殘罪相二為曾擇人知藏罪不藏罪相三親業聚學處為曾擇四部等衆四親業相應學處為行白四等羯磨五親於十三僧殘中一日夜等藏不藏為顯有藏無藏等地立宿住摩㮈多等問所以名上起者為前墮在犯罪處故令戒不淨名之為下今若懺悔還令戒淨翻前下處名為上起是以懺悔總名上起法也又提舍那者此名發覆謂此懺悔是發覆法此之五方僧須親察始可為人作上起罪第一方治須捨定是殘非殘是殘即是具緣得成非殘即是罪緣不成故論言此中僧殘罪相者於故意出不淨罪中根本相若人已受大比丘戒若如來已制此戒若人不至癡法若人有無心求出不淨若方便已離於男根邊若不淨已出若惑執己息若觸樂已生此人則犯僧殘於解略説相亦如此此出具護通別兩相謂不癡法已前是通解若人有欲心下是別緣以具緣故得成僧殘明知罪者不成僧殘乃盡十三撿驗亦爾所以爾者恐不成殘治成非故第二方知藏罪不藏罪相者論云若人於僧殘罪中起僧殘罪見不欲從彼上起由無發覆心藏一夜於此人此罪已被藏若人不知不憶或疑或起非罪見故藏此罪不被藏論中總定藏不藏相唯論解律總有十三種人覆不成覆於十三人中分之為二前八約位後色約心前八位者即八護差位非比丘於中有三初二罷道沙彌體非比丘次三狂等病解差故次三三降治法差故次約心中離為色對一覆不覆二憶不憶三疑不疑四識不識五乞不乞所以須此五者如發覆者不成其覆不發覆者即成其覆是以先須覆不覆來障其發覆却體覆中有憶不憶憶者成覆不憶者非覆除其不憶却體憶中有憶生疑有憶不疑疑者非覆不疑覆障其疑者體不疑中有識不識識者成覆不識非覆又障不識却體識中有乞不乞不乞成覆乞不成覆故須展轉曾取覆憶不疑識不乞者成覆須治若其不覆不憶疑不識乞者不成覆故治即是非故容呵云境者與覆藏者善不境者與覆藏者不善應與摩那埵僧作突吉羅懺此中初色為作發覆法故覆不成覆中三心迷故覆不成覆又此五對唯隻覆中具解文四或三者皆以當處文意不同不同之義至文解釋然依餘部更有不成覆相僧祇二十五云持律比丘與他出罪時有罪亦知無罪亦知覆亦知不覆亦知覆亦知者比丘犯殘却是罪作覆藏心不覆亦却者不作覆心未得發覆若忘若羅道者若入定若命終是名不覆五分二十三云佛言一切覆藏名為覆藏若於和上阿闍梨所敬畏人間覆藏不名覆藏於餘人間覆藏名為覆藏若於此土以多人識重不欲令却覆藏不名覆藏於彼土覆藏名為覆藏十律五十四獨住比丘無人可間發覆雖覆不成覆又雖竟日共比丘住不發覆出界至地耳時亦不名覆又共賊住人擯人別住人狂人散亂心人病壞心人啞人聾人啞聾人邊地人比丘尼等下衆二俗共住不名覆藏伽論第三云頗有犯僧殘終身不發覆不犯耶若有治若晝日有比丘處夜在無比丘處不成覆藏若於聾人所癡人所邊地人所人在地空中不成覆藏諸部曾不覆中與此文乖者皆成覆藏如色分敬畏人等餘可準却不能繁述第三方業聚學處為曾四部等衆者四部治四種僧僧雖位四今此懺境前二四人僧收後一二十人僧攝若異此者化法不成若望行時假境説者別住下至一人在界六夜須在僧中出罪一席法事第四方業相應學處為行白四羯磨者以其法位解有其三治殘事是上品畜用白四用法多少極有其四謂波利婆沙摩那埵本日治阿浮呵那分別此四至文當解第五方親於十三僧殘中一日夜等藏不藏為顯有藏無藏等地立宿住摩捺多等地者即是處所之名謂波利婆沙等四位之中若有藏者即行宿住地以別住法隨宿而治要結宿行故曰宿住地若無藏者真行摩捺多故曰有藏無藏等即是有覆行三法無覆行二法以所治罪藏不藏別對病設藥位亦有兩一者治覆二治不覆於此二中復各有兩謂不壞及壞故成四別先時覆中不壞及境不壞法三壞法位色以別住六夜若帶本日此唯責種合行重治本日中新罪與本日合若據約時重犯文中新舊罪別故文言若行覆藏比丘中間犯罪知日數覆藏僧應隨中間犯罪與覆藏羯磨與覆藏羯磨意與本日治行覆藏本日治竟與摩那埵與摩那埵竟應為出罪此謂本犯覆法一新犯覆法二舊犯本日治三次六夜亦三次無出罪總成七法準此二文離無俱得但秉法者須知分畜然本覆法差別位四第一一罪一得法即建初文是第二多罪一得法如廣中第一文爾時有一比丘犯衆多僧殘罪或有犯覆藏一夜二夜乃至十夜合乞行者是第三多罪多得法如廣中第二文時有一比丘犯二僧殘罪二僧覆藏等七句文前四句是第四一罪多得法如廣中第三文時有比丘犯僧殘罪覆藏兩月等七句文前四句是於此四位位別通三謂所治罪有知日數不知日數或知數不知數以三對四合十二頭今約得法位收具説四説若謂重犯壞法於上四位及十二頭下具有壞等五法及七法今者且緣行覆時説於行覆中約一罪一得法下三頭為法此之三頭頭下有九九中三三以為三位初三一知日數覆二不知日數覆三知數不知數覆次三一知數不覆二不知數不覆三知數不知數不覆後三一知數覆不覆二不知數覆不覆三知數不知數覆不覆此是根本智數下重犯九人一頭既爾餘二頭下若九亦然合成三九二十七人於一位下三九既然餘三位下亦若同爾即是四位二十七人此四二十七據行覆中重犯行覆中既爾餘三時亦然即成十六箇二十七人合有四百三十二人頭別法異起犯不同若或第二重犯當位倍説若加舊新並覆出罪諸位既殊須知分局若互秉者法並不成或若三四重犯準義應知上來但約識不識明若約憶不憶門疑不疑門義同前説是故治法長短中通約憶疑識等三門説也豈可識不識門得有本日憶之與疑即無重犯門如一罪中知不知二門可爾如何得有亦知不知合解如犯一罪覆已經年但百日已來分明記憶百日已前不知定數若欲乞法雖憶少時以有不知定數理亦從長以治次治不覆不覆之中亦有壞不壞然本得法差別位三一一罪一得法即略中三番羯磨是二多罪一得法三多罪多得法此之二位準覆以説問所以無一罪再得法者答以六夜位定不隨長短故無一罪再得法義於三位中若有知不知等三頭總成三位二十七人委細分別同前覆明若壞法者但有二時謂行六夜時行六夜竟於二時中若有三位二十七人合一百六十二人頭別不同治救方法或若重犯亦同前明問上來可以約五方解者若下文一一治處咸須此五謂知具羅成覆不成能秉僧所秉法及用藥分畜是故此中總解已説對文咸須舉斯五方一一作心加被即知成不之狀次隨文解黃唯滅諍文三科此亦為三別初有十番羯磨明能治藥既有能治妙藥須明所治之病是以第二時有比丘犯二僧殘下正明其病既有藥病若不相對藥無能治之功病無可滅之義是以第三時有比丘犯僧殘下明藥病相對懺滅方法藥中有病降病成藥病中有藥降藥明病如是藥病兩分降宗若異如此科制良謂不然斯等上下諸文一文即是一事當分設治治無不周何有初文獨舉其藥第二文中唯是其病至第三文始取初文中藥第二文中病名為相對故知不爾此與滅諍非類不得妄引彼文以定斯旨但諸文中所列法藥對事既殊牒法亦異不得以此文中藥乃治餘文中病若如所辨並皆不成今解此文大分為二初則略治僧殘覆及不覆第二爾時有一比丘犯衆多僧殘罪下廣治僧殘覆及不覆此二文中既有覆及不覆是則為四問所以得知初略後廣解降上五方中第色方義驗此前後足知初略後廣就前略中先明其覆覆中四法文亦為四謂覆法一本日治二六夜三出罪四對此四法解義有五第一翻名解釋第二所治分別第三先後次第第四諸部同異第五僧尼差別初門梵曰波利婆沙此云覆藏約就所治情過受稱故文言聽僧隨覆藏日與覆藏羯磨亦名別住故僧祇五分十誦伽論並云別住以其同聚妨修廢業制令別住思𠎝改過梵曰摩那埵見論十四譯云折伏貢高亦言下意下意者謂下意承事衆僧伽論第五云何摩那埵若比丘已別住竟與摩那埵作白四羯磨不動肘於一切比丘所下意故名摩那埵了論摩捺多譯云悅衆意或云發喜由化此法度罪明滅內心踊躍故曰發喜問覆藏摩那埵行法作同所以前名別住後稱下意解覆非僧中宿又不日日白彰其下意不故與別住之名六夜要僧中宿復日日白鄣下義顯故名下意本日治者但後本日行罰故曰本日治不知梵名何等梵曰阿浮呵那見論十四謂云喚入亦言拔罪云何喚入拔罪與同説恣法事共同故名喚入拔罪亦可以六夜前行未清淨今既淨已故名喚入此律攝云出罪以化此法人從罪出故曰出罪或由作法罪得除滅故云出罪然此四種畜名羯磨者由作羯磨令行別住乃至出罪故曰別住等羯磨第二所治者但治有二一治方便二治根本方便又二一者別住治覆情過二者六夜治殘情過初治覆過有其兩種一以覆故犯覆藏突吉羅此覆吉羅通解六聚二為覆故治覆情過此唯局殘不通餘六故文言先懺覆藏吉羅然後與覆藏羯磨又以不憶等耳不治覆憶等方治故是情過以此情過假日而成故治覆藏必須謂日問所以治覆情過唯殘非餘答夷罪滅擯豈勞治覆提等為輕復無治法唯殘可悔中重假僧而除若不折伏苦治罪無由滅以是義故獨治僧殘次六夜治殘情過者以故造殘須治情過以情過同畜行六夜又以行別住竟僧與六夜摩那埵故伽論第五云摩那埵是別住功德利本日治者治其自違行法以犯壞法罰令後本而行其新犯者隨覆不覆治得法已後行同前二伽論第五云何以故本日治調伏調伏者使諸比丘知是長老如是熾盛煩惱犯罪慚愧更不作故是名本日治調伏次出罪治根本者由作此法罪得除滅故伽論云云何阿浮呵那於不善處舉差善處是名阿浮呵那又云阿浮呵那是摩那埵功德利已調伏求清淨自求出罪諸比丘言是比丘求清淨求出罪是賢善比丘我等當與作阿浮呵那是故阿浮呵那是摩那埵功德利對此所治有定不定故使設法或有二三四五第三先後者先別住次六夜本日隨前二位後出罪所以如是十誦五十八問何故善法中別住答為摩那埵故問何故本日治答為折伏心故問何故摩那埵答為出罪故問何故出罪答為戒清淨故問何以故別住為摩那埵答是比丘行別住法能令諸比丘心悅諸比丘友心思惟無與摩那埵問何以故本日治為折伏心答若還從本日行是事令心折伏諸比丘作是念是人結使厚重以本日令慚愧更不後作爾時諸比丘友心欲與摩那埵是故名本日治為折伏心故問何以故行摩那埵為出罪答是比丘行摩那埵法時能令諸比丘心悅諸比丘是作念長老一心好作善法無出是罪不欲違逆我等當今是人得從罪出是故名摩那埵為出罪故問何以故出罪為戒清淨答是比丘若得出罪離諸罪故得持清淨戒如毗尼中説二人清淨一人先不作罪一人作罪已如法除滅二俱清淨是比丘以出罪羯磨故是得清淨戒是故名以出罪為戒清淨故第四諸部同異者此及五十三律若當重犯並治本日僧祇不壞本法但隨日補足故彼文二十六先約本罪作法説次明中間罪言中間罪者比丘覆藏行別住語比丘言長老我更有僧殘應問本罪中間罪答言是中間罪問言何時犯答言別住中犯問言覆不覆答言覆應語言長老先別住者已如法行但少一夜今覆者應更乞別住合行共行摩那埵共阿浮呵那是名別乞共行別住共行摩那埵共阿浮呵那次六夜中犯問答同前應語言長老先別住摩那埵已如法行但摩那埵中少一夜今覆者應更乞別住行已更乞摩那埵合行共阿浮呵那是名別乞別行別住別乞六夜共行六夜共行出罪次問乃至出罪竟言更有罪別住中犯問答同前應語言長老先別住已如法行但少一夜六夜出罪不成今覆罪應更乞別住合行已更合乞六夜出罪是名別乞共行別住合乞摩那埵共阿浮呵那次句乃至出罪竟言六夜中犯問答同前應語言先別住摩那埵者已如法行但摩那埵中少一夜阿浮呵那不成就今所覆者應更乞別住行已更乞摩那埵合行共阿浮呵那是名別乞別行別住別乞合住摩那埵共阿浮呵那準此行覆要須日滿方成又體四五十三伴中四分五分必須具行覆等乃至出罪一一如法方得罪滅反此不成故如法文言覆藏如法彼比丘行覆竟與六夜如法行六夜竟與出罪如法彼比丘清淨罪得出既言行覆六夜竟故知具行十律設使行覆六夜不具滿者出罪亦成衆僧有罪第五門僧尼差別於中有三先明有無者問所以比丘尼不行別住答古舊解云由名相翻故尼本為別生過今異遣別正是相違是相無覆摩那埵中非名相翻得開二人同宿又解尼若犯殘佛造二衆中障尼於大僧無冒涉過故不行之今解復更有義為治覆藏無有期限既無分畜不可二部中行摩那埵行定期半月既有分限可得行之又可尼衆法爾不行別住既是法爾豈論所以次體有中明長短者問所以比丘六夜尼經半月答為不治覆加至半月亦可女人志弱因行難成自非半月里𠎝無由清淨次辨行之執則如常應知若依五分行時二部不同處得故二十九云時有一尼媒嫁犯殘佛聽二却僧白四與半月摩那埵乃至廣説僧與法已應晨起掃灑比丘尼住處乃至客尼來其亦皆應白又應白又應物一比丘為伴至比丘住處若有可作皆應如上作之若客比丘來及有去者亦皆應自日是暮異比丘尼住處如是半月已於二部僧若二十人中求出罪羯磨如比丘法次下釋文先解覆法覆中文四第一比丘犯殘降以應佛以見初夷及六提等並不治覆今犯僧殘未間法戒故曰不知云何第二佛言下隨病設藥文言隨覆藏日者出法之言若憶數者須攝日數若不憶日數者須乞清淨已來覆藏故伽論第八云若比丘犯僧殘罪已不知時日何處與別住答從初受戒日十律亦爾雖言初受日必須言乞清淨已來十日百日一年十年等覆藏若不言日數者則不知竟之分齊第三應如是六教從僧乞第四衆中下正明與法乞與長短亦同前説下諸羯磨分畜皆爾此中應有七五行法為離繁文並回在下覆法中明六夜中行亦爾次本日中直言重犯不言覆不文略不載次六夜法明化法時僧祇二十六應問行別住滿不不空僧伽藍行別住不無本罪中間罪不不共比丘同一房一障住不客比丘來時集非時集白不如是撿挍如法已復教立心作障罪意如是已為作羯磨次是出罪撿問六夜如非同前作出罪法竟應語言善男子聽汝已如法出罪一白三羯磨衆僧和合滿二十衆集僧作羯磨難汝當謹慎莫後更犯次不覆文準説應知上來略文已竟次下廣辨治殘文中分二第一治覆方執廣前初文覆藏第二時有比丘犯僧殘罪不覆藏下説未治不覆人廣前後文不覆前治覆中大文為十第一多罪一得法人短長合行法第二時有比丘犯二僧殘罪下七句文多罪多得法人離合是非法第三時有比丘犯僧殘罪覆藏兩月下七句文一罪多得法人離合是非法第四時有比丘犯二僧殘罪下約時緣差治舊新法第五時有行覆藏比丘中間重犯下約時重犯治舊新法第六爾時有比丘犯僧殘罪知日數下異種合行重犯治法第七若衆僧為彼出罪不如法下僧治覆等設藥如非第八爾時有異住處下以人對人簡覆非處法第九時有比丘犯殘謂是夷下通約六秉釋識不識相第十時異住處下局簡覆人治有長短法若作如此科釋文者謂此犍度略廣分二若據何治覆不便即為四約文長分乃為十三於中初一及第三十文此十一文略廣治有覆人第二第十三此之二文略廣治不覆人今對廣中十文須作五位料簡第一簡覆不覆第二明壞不壞第三辨成不成第四通局第五釋文初門位二謂二三四及以八九簡覆不覆治救方法自餘五文不論覆不第一五六直是設藥總別第七專辨如非第十論治長短次明壞不位亦為兩四五六七四文寄壞以辨上三下三明不壞法次明成不位亦為兩二三四七八九六文明成不成自餘四文直辨設法文中不舉成不成相次通局者第七九十此三雖在七九與十義通餘七如第七文廣辨如非此則通攝一切如非以餘諸文直明設法竟不辨其如非之狀或雖簡覆局是事非今此如非具攝四現第九文明覆不覆相即釋一切覆不覆義以前諸文出法言隨覆日治覆不定長短今第十文明覆長短以其治覆不過長短故知此簡亦通餘文餘咸自了並不相須次下釋文先解初文文有三法覆中文四同前所明但此犯者不同前文為犯衆多覆日不等以斯異故降事白佛佛今以短從長合與十夜覆法五分二十三若犯一殘乃至衆多覆藏一夜乃至衆多夜僧若與別住者但斗覆藏最久者隨日數與別住次六夜出罪如文可知對此須化四門分別第一定罪及種第二明覆等不第三等不離合第四設法儀則初門者文中但言衆多殘罪竟不定此種之同異理實此之十罪或可種二三四乃至其十隨事稱之以文不定種同異故罪中亦約十罪為法雖可以此十罪為法遇緣有遇咸者亦隨事稱不得執文限心作法第二門者文據覆日不等從長十日治之又後先降短日却降長日故言或有犯覆藏一夜乃至十夜理而言之覆十夜者以最先犯故經十夜第二九夜乃至第十犯者覆藏一夜是則先長後短説先長治或約犯日隔絶亦得如犯一殘一夜覆發露經多日已後犯一殘二夜覆後發露經多日已更犯一殘三夜覆乃至經多日已更犯一殘十夜覆此便先短後長説後長十夜治事既不定隨事稱之或可十罪等覆十夜第三門者此等不等若有離合其不等者此文合作十夜別住便是治短或若積日纍舒亦得離成五十五夜別住便是治長故僧祇二十五云別覆者月一日犯一殘知是罪他覆藏心不問他説二日後犯知是罪犯覆藏心不向化説乃至十日後犯知是罪化覆藏心不向他説是十罪若別覆最後罪一夜覆如是二夜三夜乃至初罪有十夜覆應與化十別住等三法亦得化一別住等三法若言十別住等三法即是一罪一得法纍日長治若言一別住等三法即是多罪一得法合日短治斯之後義正當此文次等覆中亦有離合彼文有四句或有罪合非夜合或有夜合非罪合或有罪合夜亦合或有非罪合亦非夜合言罪合非夜合者比丘犯十殘一切十夜覆僧合與百夜別住比丘言長老我羸病不堪得與我略行波利婆沙不應語言得百夜羯磨合化十夜別住或夜合非罪合者比丘犯十殘罪一切十夜覆僧合與十夜別住比丘言長老我慙愧我欲廣行波利婆沙應語言得或俱合者比丘犯十僧殘十夜覆藏僧合與作十夜別住或倫非合者各各別作波利婆沙羯磨唯此等不俱有離合此文且據不等行者準知第四門者文中出法真言犯衆多殘或覆一應二夜乃至十夜若秉法者必須具牒種名同異若隨覆日短長攝之若其守文誦者法定不成又若白時還須具牒隨意停者理則不然次第二文多罪多得法文中七句七中分二初有四句與法成體所謂彰是第二佛言汝曹下三句與法不成舉非顯是前文復二初有三句法雖成就言濫不耳生下三飛九句次有一句非真法成後耳教説不生下非句前三之中先解初句初句文五一彰犯二殘罪二二俱覆藏所謂犯已俱不發露三憶一不憶一者復欲行法説僧乞覆對衆惶懼遂不憶一亦可臨乞意謂一罪四彼比丘隨所憶下隨所憶者乞得覆法五彼比丘行覆藏時下行時方憶第二佛言隨憶與覆此言不耳下生下初飛所以然者若言乞時憶一不憶一即是耳教而説不生不飛以文不言乞時直言憶一不憶一後隨憶第二佛言隨憶與覆由此濫故客有犯意憶一不憶一亦俱乞覆故得生不初飛文雖如是釋義五門第一定種同異第二憶不長短第三憶不多少第四得法重數第五約時明憶初門者文中直言犯二殘罪竟不定二種之同異以理而言或一種二罪或二種二罪或可罪有衆多種亦同爾並隨前事種名稱之不得執文局限二罪第二門者文中但言憶一不憶一隨所憶者説僧乞覆彼行覆時續憶第二佛聽隨覆藏日與覆藏羯磨都不定覆時節長短理而言之斯之兩罪或可等覆俱長並短或不等覆前短後長前長後短但須隨憶與覆不可一準第三門者文中且降二罪為法若其廣説三四五等無妨謂或憶二三四等不憶一或憶一不憶二三四等或憶二三四等不憶二三四等參差友絡相當並得但化法時牒須周盡不得執文局二為法第四門者如憶不憶雖通多罪文中但據兩得為法或隨多罪三四五等重重與法實如以答文舉兩得為法多理非妨但作法時亦須牒盡以其第二續得既不礙前三四等得何殊不許第五門者文約行覆藏時憶第二犯佛聽隨憶與覆藏羯磨即是別得覆藏共行覆藏共行六夜共行出罪次夜後有行覆竟憶亦聽隨憶與覆羯磨即是別得別行覆藏叔得共行六夜共行出罪次後應有六夜中憶語言六夜且置隨憶與覆便是別得別行覆藏別得六夜共行六夜共行出罪次六夜竟憶準上應知次出罪竟憶即是覆藏乃至出罪一切皆別文中行覆藏時者略舉一時以示法僧祇二十六本罪者比丘覆藏乞別住已後言長老我更有僧殘罪問言是本罪中間罪答言是本罪後問覆不覆答言覆語言長老先別住者已如法行今所説覆者當更乞別住已是兩罪合行波利婆沙共行摩那埵共阿浮呵那是名別乞共行波利婆沙共行摩那埵共阿浮呵那次句行至半後言更有半本罪覆藏作法共別如上次句行別住竟後言有本罪問答同前應語先別住者已如法行今何覆者應更乞行是名別乞別行波利婆沙叔行摩那埵共阿浮呵那次句乞六夜已後言有罪問答同前是名別得別行別住別乞合行摩那埵共阿浮呵那次句行六夜至半已故言有犯問答與法共別如前次句行六夜竟問答與法亦如前明次句乃至出罪竟後言有犯應語言先波利婆沙摩那埵阿浮呵那已如法行今何覆者應更乞行是名別乞別行波利婆沙摩那埵阿浮呵那次乞別住已言有二罪一覆一不覆應語言不覆者倚覆者更乞別住行或共別等乃至出罪同前次乞別住已言有三罪一覆一不覆一疑應語言不覆者倚疑者當決了覆者更乞別住行或共別等乃至出罪同別彼約七時以彰離合共別今文總有五時用彼七時無失上來隨憶一門既爾疑識類同不叔繁具次明了教文中既言乞覆藏時説一罪覆藏一罪明知唯有一人不得事有第二既説一罪從僧乞覆明知根本二俱覆藏此文為有乞覆藏言即是耳説不生下非又以故心隱罪文言慙愧心生上憶等心迷不言慙愧對此亦須五門分別釋不異前不能繁述此中五對䚵悉具足並為約覆説故明中有四次解不成三句先明憶不憶文有其五第一彰犯二殘迷心乞法第二僧與彼犯下僧同謬見俱與覆藏第三彼行覆藏時下客三藏來因白撿問第四舊比丘答言下答行覆藏儀軌之狀第五彼客比丘言下制非結犯示僧正法初文二罪俱覆約情以説以即犯日作隱過心故曰二俱覆藏言憶一不憶一者約理以説謂亦犯竟即有忘不忘雖不發露同皆經宿然憶者成覆不憶者非覆故言憶一罪不憶一罪彼比丘執相似文憶與不憶俱從僧乞問執相云何答以見前文佛聽與彼隨憶第二犯覆藏羯磨前文憶一不憶一後憶第二佛聽隨與覆藏羯磨我今亦是憶一不憶一後憶與前不殊何為不得俱乞以是謬執俱説僧乞次僧同謬見俱與覆法次問有二先問其犯故言此比丘何所犯此問含二謂犯何罪成覆不成次問其行故言何故行覆藏此問含三謂問乞與及行亦可據文二問亦得次答先酬初問次二俱説僧乞下答第二問次制不成文有其三初制不成次何以故徵次彼比丘下釋釋中復三第一制定是非以憶成覆不憶非覆以非覆故與法不成次結僧犯次示正法釋文雖爾義還為五第一定種同異第二憶不長短第三憶不多少第四得法重數第五約時明憶初門者聖言二罪假出法言而不定二種之同異然據實理或種一兩罪或種二兩罪可隨十三事別稱之不得執文局限二罪第二門文中但言憶者與覆藏善不憶者與覆藏不善竟不定此憶不長短然據實理各通長短隨與覆者並成非法第三門初約兩罪對前成就以理言之通三四五等如似憶一不憶二三四等或憶二三四等不憶一或憶二三四等不憶二三四等並悉成非不得執文局二為法第四門文中隨憶不憶俱説僧乞此約一重得法以辨其非若得法已方憶第二後與法者亦成其非豈可一時得法佛制是非前後與者即不成非但使二三四等隨與皆非此謂反前如中重重生非第五門者文中乞時隨憶是共得法或可乞已別得法者亦成其非乞時生非既爾下六時亦然但使依文共乞共得者兩俱不成以法增減覆者亦非若後隨憶別乞別得者後不憶者自不成前憶者自成次疑不疑門識不識門準前應知不能繁述次第三文一罪多得法文中七句七中文二初有四句根本成覆經於兩月所謂彰是第二佛告已下本覆一月不覆一月所謂顯非前文有二初三言監生下三非第四耳教不生下非對初文相準前應知文中且約兩月為法若其三等及年類安無別此中釋義還須五門法戒翻前不能繁述但是一罪多得離合為別次疑識二門亦同前位又此等三皆須先不憶疑不識一月後憶不疑識一月隨行憶等方始憶前不憶等次耳疑準知次舉三非亦準前位不成以説亦應五門通釋義不異前次第四文約時解差文中有三初雙覆雙發覆第二隻覆隻發覆第三明其二續初雙覆中但有四句前後道分體是比丘隱不發覆成覆須治中富罷送既非比丘無發覆法非覆不治釋文可知問此中為唯四句為後更得成多答依文但四餘者不明又可準下隻中合有五對五對各四成二十句然此五對四句各初句同各下三異謂五箇初句前後道分俱同五箇第二前同後異五箇第三前異後同五箇第四前後俱異以有異故得成多句是則成覆一向同非覆一向異所以爾者如憶不憶説覆中來今忘非覆寧同發露疑不疑者憶中以辨以猶豫故不成其覆便非是忘寧同不憶識不識者不疑中辨以不識故不成其覆非是猶豫何得同疑乞不乞者識中以明由從僧乞不成其覆既非迷謬寧同不識此二十句是行覆前對下四時例皆如是於中前二十句二罪化得下八十句義須三罪一緣作法既有百句下七緣差各百亦爾問所以唯言二罪不言三四覆等答且以二罪為法多亦非妨但以約治不殊更不別舉次明隻覆隻發露約八解差各為百句第一羅道形差自有五位一覆藏前二行覆時三行覆竟四行六夜時五六夜竟各有二十成其一百先齊行前二十明者於二十中分為五對初約覆不覆作其四句隨治前後釋相可知問先既發覆後所成覆答以緣差故更須發露為隱不發故成覆藏無問對首對僧後覆成覆如前説戒罪雖發覆至後説時更須發覆隱不發覆還得默𠎝文中且約覆一不覆一為法或若覆一不覆二三等化法無殊更不別降次下憶不憶門疑不疑門識不識門乞不乞門若四同前文不具舉對此釋義須作二門第一定對離合第二五初不同初門問何故發覆露藏作兩對四句謂是根本及以乞時憶疑識三但一四句唯有根本憶不憶等而無乞時憶不憶等答覆等四對並就根本以説乞覆時者自約行法以明若其時此四對總入行法是則四對各八成三十二句今以發露覆藏對於作法為對作法作法不同故約根本乞時以分二對憶等餘三不對作法既不對法無有異相真有根本無有乞時所以爾者如亦犯竟即有覆藏發覆者此是根本覆不覆從僧乞時後有覆藏發露者即是乞時覆不覆為有此義得分兩對憶等餘三無斯義故但有根本無有乞時又解從先犯來未曾經覆今從僧乞有隱不隱是故此名乞時覆不若先覆藏今乞還隱此隱仍是乞時覆者由心耳知得分兩對憶等卜三心迷故不分二第二門初五不同者問第五乞覆藏時覆藏發覆與初四句發露霜藏有何異相分為兩對釋有二義一以時異故分二對如初四句本覆不覆第五四句乞時覆不覆爾者若以時異分兩對者乞時可爾行時云何如至行中不得有乞既無有乞唯是覆一發一是則但應十六何以亦二十有答至行等時明乞不乞者更約新犯以説不齊舊罪而論若唯取舊不約新明其義即局攝法不周為寄五時以彰事別故行等時亦有乞不二以非覆法體不同初發露者謂對三境發露第五乞時局是從僧乞法以斯異故分為兩對又解初之四句曾先經覆假使乞時有覆不覆然與初同不得分二合第五四不曾經覆犯已即乞乞時有覆不覆此與初異故第五收既知初五相異不同不假僧文浪相比決自下諸位咸須二門通釋釋義既同不繁再述上來行前二十句竟次下四時有八十句對此後作二門分別第一二三分別第二舊新分別初門前二十句人未被謂罪未得法兩罪作足今以十句人已被治罪有得法來得法要須三罪作之若兩罪作四句皆妨如覆不覆四句中初句覆一不覆一罷道後來二俱覆藏一罪前後俱治明非行覆藏者一罪治後不治前亦非行覆者明知一罪已得法行名為行覆藏者後須更有兩罪一覆一發露故須三罪兩罪即妨此句既爾餘句同然然古師云若二罪作初三句妨二四句得第二句覆一發一罷道後來一罪先覆後亦覆前後俱治明非行覆者一罪先發後亦發先後俱不治即是所行之罪以無覆義同即以行者為發覆一配前先後俱覆一故言兩罪作得第四句得同此説此釋不然如望覆乞二門客以不覆及乞即是所行之罪如不憶疑不識皆不成覆豈得時不憶疑不識即是所行之罪故知此義權而未通諸六八十畜須三罪若其二行既妨二竟之言對何辨竟故皆是妨第二門舊新者此下四時重更犯者並約新罪不據舊論為明新罪成覆不成覆須治不須治故行法中犯新成覆所以然者雖行法中奪三十五事為有隱心不殊覆還成覆此第一緣差竟下七類爾次明二續文約四時作其五句應合有六以本日含故五中初與第四續行餘三續作謂罷道已覆來更假作法者名為續作不假作法續前行次行者名為續行八緣各五合四十句次第五文約時重犯文約行法四時以明先對一罪一得法人行覆中辨然行覆比丘準六治不覆中位有三人一智數覆藏二不知日數覆藏三知日數不知日數覆藏此三根本得法行覆文言時有行覆藏比丘明知義通三人此三頭下一一各九於初九中有三三位初三位者一重犯知日數覆藏作四番羯磨一新罪與覆法二舊罪與本日三合與六夜四合與出罪二重犯不知日數覆三重犯知日數不知日數覆各四如上此初三人十二番法文中具列餘者略無次三位重犯不覆有九番羯磨一知數不覆作三番羯磨謂新犯不覆直與本日治次六夜及出罪二不知數不覆三知數不知數不覆各三如上次三位重犯覆不覆有十二番法如初三説此三十三番羯磨據初九為法餘二九下準類應知此二十七人合九十九番羯磨若舊新罪合與法者但八十一謂除新犯十八箇覆法上來且據一罪一得法若以餘三得法位乘便成四位二十七人此行覆中起犯既爾下三時中犯新亦然文中覆竟同前次第三時直取行摩那埵時應言亦如是為其摩那埵行中重犯故舉犯罪不覆藏言次第四時出起犯處非直位局罪各不通以一一位重犯二十七具有覆等治法不開餘時然此四時計舊新法別與於二行中各具九十九番羯磨總計八位合有七百九十二番法於二竟中既不壞法俱除二十七箇本日治法各有七十二番羯磨總計八位合有五百七十六番法都計四百三十二人合有一千三百六十八番羯磨然此且據一重重犯若其第二三等類應倍明故下文云行覆藏時中間第二重犯亦如是上來重犯約覆以明若對議等餘三辨亦同上此約根本以明故無有乞次第六文異種合行文中四法謂覆藏本日治那埵出罪前三廣明後一略舉初覆藏法文四如前言覆藏者作隱過心不覆藏者作發露法等不等覆者約其覆日長短論之一名者同名僧殘多種者十三差別自性非自性舊云性十遮三者不然正是懺殘豈論遮性今解若以初方義驗相即是性若其作過緣具成殘罪性解若罪者不成殘性住別異者舊云種類有四氣分不同故言住別異此亦不然豈有時懺僧殘始定初犯種類今解若以第五方驗若有覆者行宿住地無覆者行摩捺多故言住別異問若以性非自性曾具及罪住別異是行不同者如何時罪及行説僧乞法答此之二句是曾差別不合將此從僧乞法如言覆不覆不覆亦不合從僧乞覆如何文舉不覆以此故知文中假出法言故須備列若其作法必須隨事而牒然此為彰厭惡心猛總列十三咸得消殄若以理言未必要具隨有多少皆得懺除次佛總示其法故言隨覆藏日次從僧乞不得依文而誦並須具名之與種覆日短長從僧乞法次與亦然次兩重本日同故合一次六夜出罪可解對此重壞三門料簡第一重壞多少第二約時以明第三對人以辨初門此明重犯本日治法以前諸文未明此事今若重壞本日治救如何佛言若更重壞復與本日不同學悔重犯滅擯問所以不言第三重壞答初一重犯聽與本日第二更壞恐不合與是以今明第二重壞第二既與三等例然以其重壞不殊文不備舉第二約時明者且約覆中重壞覆中既爾下三時亦然已前壞法並約四時以明今第二重壞義應亦爾又若準文若於二行中第二壞者有二本日治法若於二竟中第二壞者但有新犯治救方法即無舊罪本日治法以不壞於二竟法故第三門約人辨者文中出法但據犯新知日數覆藏一人為法若準如非易中復應更有知數不覆知數覆不覆為三及有不知數為三及有不知數為頭三知數不知數為頭三合成九人舊釋復以根本三頭乘此九人成二十七復以得法四位乘成四位二十七此皆不然既是異種合行豈得更以三頭四位次第相乘但應時此九人約四時辨是則四九成三十六問何以此中準如非文乘人成九不得更多答以六如非牒此文起六既有九此豈成多又以此九本是異種合行橫數一九即書無餘次第七文設藥如非其文還舉異種合行於中有二初舉非令棄第二是中下顯是令修前文重犯不過有知日不知日等及有覆藏不覆藏等故今以知數等互歷覆等有其九人初三以知日數為頭歷其覆等初人有三句非一三法俱非覆中有三番謂根本覆及第一重犯第二重犯雖有其三合是覆非二覆如下二非三覆及六夜如出罪非問但言非法不知是何等非答非還不離四種現前以此四種攝法寬故問非中所以無覆非下二互如答後非不廢前如後如必無前非以皆牒前起後故爾問所以出罪須牒前者答為此三法共成一治前二是方便出罪是根本第二第三人各三非亦爾此是初位三人九句非竟次不知數為頭三人九非次知數不知數為頭三人九非並悉如上次如之中翻非以説若其以句望句一句反一句乃至二十七句反二十七句若其以如翻非一如翻三非以其覆藏六夜出罪合成一如法故即是九如翻二十七非次第八文對人簡覆以上諸文未對人辨是中四句初舉二人俱成覆過見異比丘便覆藏者謂見清淨比丘羞恥故隱此之初句二俱成覆下之三句一成一不成然憶不憶就覆中明一人記憶經宿成覆一人當日即忘雖不發露以無隱心故不成覆次就憶中辨疑不疑次就不疑中明知不知此知不知即是識不識為簡根本覆不故無乞時次第九文通曾識不理亦應對憶疑以明為文略故偏曾識不前言不知不成覆者不知如何是不知相故出不知迷想即是不識異名此中犯殘迷謂餘六正望僧殘但應有六為犯下五象類是同是以通舉成六六句夷壞根本不得犯夷除去初夷且三十六問犯此謂彼心不當境既不治覆何以獲者答以不當境無情過不治為有隱心皆獲吉羅前言知者覆則成覆不知如何是其知相故次明其知成覆相亦通下説故成六句設藥次第先除方便乃至惡説類亦同然次第十文明覆長短以覆隨日須明長短文中分二初約同名同種罪明覆長短次約同名異種罪以明長短前文三句初二並皆不憶日數故與清淨已來覆藏羯磨後之一句經可不憶犯數為憶日數故須數日與覆次疑識門亦同此説次同名異種三門類前祇律二十五有無量覆作其四句一憶罪不憶夜二憶夜不憶罪三罪夜俱憶四俱不憶初四兩句治長二三兩句治短此文略故但有其三此為約心迷耳辨其長短覆乞曾體故此不明次下第二廣治不覆是中許摩那埵比丘根本有三人一知數不覆二不知數不覆三知數不知數不覆此之三人各作九句初人重犯有三一知數覆二不知數覆三知數不知數覆此重犯三人各作三種羯磨是則為九初人三者一摩那埵法若於其日犯者舊新合乞更行若於六夜中犯者別與新罪摩那埵問新罪覆者何不治覆答此已隱故名之為覆皆不經宿是以不治二與摩那埵本日治此文即是新舊不合三與出罪此是初人三法第二第三人若三類然此九合是根本知數不覆下次不知數不覆及知數不知數不覆若九同前故言亦如是又後此中文略但有重犯三人九法若以義準更應有六謂知數不覆不知數不覆知數不知數不覆為第二三後以知數覆不覆不知數覆不覆知數不知數覆不覆為第三三此之九人是根本知數不覆下若以不知數不覆及知數不知數不覆乘之便成三九二十七人以得法三位行中二時乘之更多廣如上辨上來懺殘法竟次明覆藏行法以先犯罪隱不發覆今欲懺除須治情過從其所治情過立稱故曰覆藏廣明覆藏行法儀軌集在一處稱云揵度又若從後彰名應云摩那埵犍度今為從初受稱故曰覆藏於中文三初明四種人不得更互作法足數第二彼行覆藏者下行覆行法第三佛言聽行摩那埵下六夜行法初文有兩箇十六句初十六句明四種人不得更互秉法次有十六句明四種人不得更互足數前中四人一自行覆藏二自行本日三自行六夜四自行出罪此四互歷成十六句次足數亦然十誦更加別住竟人六夜竟人亦不得秉法足數次行覆行法文中有三初明三十五事制不聽作第二彼行覆藏者下俶給淨衆制令使作第三彼行覆藏者下白等行法初奪七五令使調柔其七五行如前已明第二供給文中復三第一制使敬上已在末坐次行覆藏比丘下衆僧衣物聽隨次取五分二十八云別住比丘有三最下最在大比丘下行與最下臥具最下房舍有三事隨本次僧得施物時自恣時行鉢時十誦三十三云若僧次第差會滿鉢水雨浴衣自恣應隨上座次第受應與最下房舍最下臥具卑下座處所謂行三最下及四次第次彼行覆藏比丘下開受同類及餘衆恭敬執事次第三白等行法文中復三第一第作白法第二若大衆難集下白倚事法第三彼行覆藏者至餘覆下失宿差別初文但是布薩日白依僧祇律更有二白謂欲行及行竟次白倚事法若欲釋義六門分別第一定其捨緣第二明捨調句第三捨境多少第四倚時短長第五重捨得不第六捨及行覆初門捨緣此文云若大衆難集若不欲行若彼人軟弱多有羞愧聽白倚之五分二十八云別住比丘欲遠行白佛佛言應捨竟去見論十八云若有人請戒與人受戒得停行法事羅還續行十誦真云若有因解不及行是事應停次捨調句此文云應至清淨比丘所白言大德上座我今日捨教敕不作若欲作時應至清淨比丘所白言我今日隨所教敕當作又五分云問一如汝比丘言大德聽我今捨別住法後更行之如是三説見論但言我今捨波利婆沙三説次明捨境文言大德上座明知對一人五分云向一如法比丘以此故知一人成捨若對衆多僧捨義亦不妨次捨長短者文無限期但隨其解不可定局然十誦三十三波離問佛行別住人摩那埵人若有因解不及行是事應聽幾夜佛言應聽二十五夜餘文不論準此亦得次重捨得不者文中不定重與不重計其道理有解皆得如別住等法尚聽續行況數捨行抑而不許故見論十八云若寺中多有比丘來去難白晝日得捨行法明相未出應將四五比丘出界白行若欲還者應留一人待明相出為捨行法共還入寺如前法滿六夜已得出罪次捨行處者若此處捨還此處行或餘處行或餘處捨還餘處行或此處行並皆不妨但須續計日滿故五分云彼比丘捨別住到餘處應求彼僧更行別住彼僧應聽若不聽突吉羅次失宿差別文中有三第一降緣第二有八事下正明失夜三佛聽下半月白法解文可解失夜有三謂舉釋結一法餘寺不白者謂不白餘寺僧失此一夜不得入數若其未白行前無宿可失要白行後有宿方失不可為先有違後都折宿此但一白不須再為釋下失等例此應知二有客比丘來不白者謂客比丘來至此界或當界人或界外客數來法者不須更白彼以知故不同布薩須白舊僧三有解出界不白者謂不白二界中間道諾上僧四寺內徐行者不白寺內曾寺外徐行簡度行謂外比丘經過此界十云有客比丘去便走遂佛言如常行法不應走遂時出界佛言不應出界前人出界白畜界住五病不建信白僧説戒時須自法白若病不得法應建使白故十云行別住人布薩時應入僧中三自説罪若病應建使到僧中白言某別住人病不得來僧當知六二三人同一屋宿者以違別住名故又制別住今使恩𠎝改過今若同宿過情相續七在無比丘處住者本今俶給伊衆折伏貢高今若無人何所敬給又後對誰行三最下及四次第然既論十八云若別住摩那埵當行法時比丘去都無人但作意言若比丘來家當白六日中都無比丘可白亦得出罪準此不成八不半月半月説戒時白白衆發露正翻覆藏解白亦翻非正衆法白法如下然此八事一日併犯但失一夜不併失八以初一事即失此夜後更違者無夜可失不可以事多故併奪八夜雖無夜失亦得吉羅若其八日犯八一一失夜又此八中六七二事悔法須然餘之六事是發露法故有人云白等八事發露悔法又發露白亦有廣略三五二略病略如前道路略者五分云諸別住比丘於諾上廣説別住白衣見言此比丘有何罪而悔過諸比丘以是白佛佛言諾上不應廣説但言大德我某甲比丘行別住法已若干日餘若干日大德憶持餘之四白即是廣法又此八事輕故不壞本法為乖懺儀得罪失夜七五行中若重於此若犯此罪若相似生此三不犯即已犯即壞法餘者雖犯不壞本法次白法如文白餘寺僧等亦準此作次六夜法文中有二第一降行同前第二行摩那埵下於異於後異者有二一假境不同謂常僧中宿界內六至四人二者日日白此白據本不覆人六夜白調然非八事之限以非説戒衆故若有覆人行覆竟者六夜白中須牒前覆見餘寺僧等白亦準此然依僧祇更有欲行及行竟二白上來覆藏法竟次明遮揵度以行乖違不肯行懺勿令應淨舉建悔除故名為遮廣集遮法聚其一處稱云揵度於中文二第一舉遮罪緣還同恣中第二佛言汝曹下正制遮法前文有五一舉世尊相受語教便降淨人佛制求聽二六群下使惡求聽佛制五德三時六群下明具德人降者應受四時六群下許他聽已制立言要五佛言下聽遮説戒以佛聽遮説戒六群還舉清淨比丘以之為緣次辨遮法就中文十第一正辨遮法如非第二若比丘欲降他者下明具五德呵慰是非第三遮説戒比丘至上座前下佛教撿問求聽退不第四爾時有異住處下明所遮罪第五爾時有異住處下所遮之淨第六佛言下約人成不第七遮無根下對根成不第八若五種説戒下辨遮時節第九若遮説戒下治能何遮覆實之罪第十爾時異住處下却遮方法十中下之七文大同自恣初文有二第一對列如非各有十門第二依門解釋釋中前之八文可解九中若作者謂實犯若不作者謂實不犯若作不作者謂有二事一作一不作對破戒等若三合九無根故非有根即如十中十非可解十如先列章本後次牒解十者一犯夷二入犯夷説中三捨戒四入捨戒説中五如法僧要違犯六如法僧要呵説七入如法僧要呵説中八破戒九破見十破威儀各須有根此十體非合遮故如又此十中第五及後三少入説中餘六三是正事三入説中所言入説中者謂舉至僧八難事起未及處斷者名入説中釋相可知次呵慰是非文中有三第一制具五德第二何以故者徵第三我見下釋初文五德者衆滿和合伴助無違故名為時所作犯事有根不虗稱云真實令彼行淨善若流布名為利登和言曉喻不令彼惱故云柔耎愍彼行違令無𠎝犯名曰慈心反説即名不具五德次徵可解次釋文二初有四文釋不具損成前十非第二被真實舉下二文釋具利益成前十如前中文二初一彰舉無德次三慰呵能所於此慰呵復有兩位初之二文舉其無以慰所降前文對剛強人勸勿嗔恨後文對善耎人勸勿愁憂次有一文舉其無德以呵能舉此中文三初舉無德以呵次何以故下徵釋呵意治謗次以真實舉他亦有其二初彰具德以呵所舉以具德故治其實罪次以具德讚美能舉後釋讚美之意次撿問求聽撿問者撿其五德有無求聽者前解求聽唯是所舉此中求聽通求僧聽以若不得上中下座和合聽許遂成破鬪無伴援如拘睒彌次三文可知次約根文二初有一六約法總明謂初三五不成以無根故二四六成遮以有根故次有二六對事別明謂餘無餘可知次時節可解次治能遮所遮覆實之罪於中文二先治能遮謗罪其文有四初撿能遮三業淨穢第二遮説戒比丘下撿事覆實第三應問下撿根有無第四遮説戒比丘六正治謗罪次若遮説戒六治所遮實罪次却遮方法文有其二第一為病故却文有三句第二時有異處下咸却説戒此中文二初為避惡比丘恐有破事故作咸日説戒如文次若不能下作其二却為同自恣無有三却上來遮法竟
