body:
  text: 西太原寺沙門懷素撰自下作持二十犍度先總料簡後隨別釋總中三門分別第一先後第二釋名第三次第先解初門然佛立制本無先後今明戒本居前犍度次者但以前是止持今辨作持先止後作義次第故問准何義知先止後作答止持自行法須前明作持化他故次後說所以爾者自行不立無以利他自行既成義須兼濟故佛修行滿已方始化物度人問戒本匪唯明止亦有作相犍度不純是作亦有止義如何判云前止後作答據起行義止作互有論成行邊止作恒別亦可前略辨二持後廣明二持前略後廣義之次第又解戒本宗明作犯作犯過犍度宗明止犯止犯四細欲使犯相昞然觀過興厭先識於麤後知其細護行始終持法堅固亦可前略明二犯後廣明二犯又解戒本明隨不說其受顯理未周稱之為略犍度已下受隨雙明攝二持義盡名之為廣先略後廣義次第故問如尼戒中已明受法即是前亦明受非局是隨如何釋言但明隨相顯理未周稱之為略答尼律明受顯罪有無舉罪立戒還是隨相又問若言犍度受隨雙明攝二持義盡稱為廣者且如戒本隨相極多犍度辨隨望前由少應言隨相前廣後略論其受法前略後廣如何立義反覆乖文釋准行多少義雖可然今廣略言不依此說謂前未盡後始周圓望說盡處稱之為廣問行法次第先受後隨何故今文先隨後受答若據次第先受後隨今就化宜先隨後受所以爾者以其隨相廣彰損益欣厭易成人道中要以顯要義是故先明受中不顯損益深趣識相護持欣厭未要以未要故迴之後說亦可前略明受隨後廣辨受隨先略後廣義之次第次釋名者梵云犍度此譯為聚所謂受等當分諸法集在一處稱之為聚即舉受等以標其聚乃至於雜故曰受戒等犍度又可梵云塞建陀此譯為薀次辨次第者雖據本制事亂無准今明結集次第意者犍度二十位以為三初一犍度明其受法次十五聚辨其隨行次有四聚明二之餘所以先明受者受是根本開生萬行以是本故建首而明問受據次第應在律初何故今者置之於此答夫欲化物度人必先自行成立為此須在自行之下爾者據行成立止作俱然是則應在律末而說答據行成立理實應然作義是通本故初說欲使上収自行下攝化他義勢得中故置於此由如不定又解受是根本開生下諸作行作行處同本故前說計受開生一法即足若不對受明修行則難立故於受後以辨其隨隨中位二初七犍度明別行法以皆資成別人行法次具睒彌下八犍度彰其眾法以皆資成眾行之執所以爾者別行不成誰秉眾法是故光明別人行法別行既成綱網事立是故次明眾法之行此二之中前有眾法為成別行後有別法為成眾行舉宗往攝眾別恒殊就前位中開之為二初三揵度明隨行體次四揵度彰行資緣為成其行須有資緣前行體中復分為二所以先明說戒法者夫欲起修必資解行說戒生解故在前明安恣起行故次居後然起行中莫過有二一專精行即安居是二悔犯行如自恣是亦可行為除過過有已未未即安居已乃自恣次下資緣資緣四中前三正資後一辨開正資之中有其內外外則無時不須內則制有期限外中革屣下用是故先明衣是上資故次後說雖得外資𨷂內不可故次明樂應不應義然此正資事須經理經理或虧恐違其教是故大聖開受德衣令無過𠎝行得成立又解自恣既竟遊行化物履屣資要是故次明雖得行具衣須蔽形又是受畜時節故次明衣衣雖外禦復藉內資𨷂即癈修故次明藥或於衣食取濟乖方便生道𠎝事須通許是故次明功德衣法開上衣食資道兩緣次明眾法眾法分三初一能料理德次一所秉之法後六料理事人若無德不能護法是故先明護法德行既有能秉之人必須所秉之法法之要也其唯羯磨是故次明瞻波犍度廣彰羯磨如非之相人法既興事須施化故次六法正行僧事眾中若有七種惡人心志難調不遵僧命若不料理豈成迬護是以先明呵責犍度呵等七法折伏情過形心雖調罪由未滅故次人法悔除往𠎝人既得法事須順行若不順行業累難遣是故次明行䨱之法行若依法足遣往𠎝仍覆不發事須遮舉是以次明舉罪儀式或無具德舉不知時乖競相明事成破壞是故次明破僧犍度眾既乖違不成和合若不除滅何名為僧是以次明滅諍儀軌次二餘者僧尼同行已如前說尼之異法事須別舉是故次明尼別行法二部正法已具顯宣客等食請復須備舉為是次明法之儀軌式雖周資緣須有資之中由少房舍是以次明房舍犍度但此房舍資緣強勝事最麤者故獨標名餘資非一不可別件是故統收以之為雜是以末後明雜犍度自下別釋初受戒犍度言受戒者創發要期斷惡修善建志成就納法在心目之為受受有懸防稱之為戒戒有多緣集在一處名為犍度就此文中大開為兩第一為明度人受戒由佛故有事歸教主是以先明後身菩薩厭俗出家修行成佛既成佛已化物為心欲使眾生同霑己益是以第二爾時已下正明如來度人受戒初文復二第一寄託俗榮色身具足將成佛器必須殊勝第二爾時菩薩漸漸已下頓絕愛網捨榮出家筞勵進修成無上道前文有三第一先明託相勝苗第二適生已下記相所表第三時摩竭王下間相欽奉前文復三一明菩薩胄族高遠二懿師摩下別舉日種三北方國界下舉能仁種前文復三一列粟散三十三王經列波離曾間古往諸仙所說劫初等王故曰我曾間等既云有作如是說明知不從佛聞大人眾所舉者如上文云古昔之常法俱舍十二云往者劫初眾人隨取香稻為食無有貯積後時有人稟性嬾惰長取香稻貯擬後食餘人隨學漸多停貯由此於稻生我所心各縱貪情多收無厭故隨收處無復再生遂共分田慮防遠盡於己田分生𠫤護心於他田分有懷侵奪劫盜過起始於此時為欲防共聚詳議銓量眾內一有德人各以所收六分之一雇令防護封為田主因斯故立剎帝利名大眾欽承恩流率土故復名大三末多王此云眾許自後諸王此王為首佛本行大同不能具錄二從真闍下列十輪三從伽㝹支下輪散次第王數總計合有八萬四千二百五十三次舉日種文中除菩薩羅云次第七王者舊人皆云同俗七葉此善生王即是懿師摩後第九十四孫故今正解義未必然但欲取其日種或苷蔗種舉得彼種自從是後始曰喬答摩舊云瞿曇者訛略也西方傳說曾聞往時剎帝利種被賊篡位父死子逃有仙仁慈收其子養意欲令其後嗣不絕後漸長大有瞻星者白怨王云剎帝利種還有星王怨王出賞令人捕捉其仙行後遂被捉獲將送怨王怨王遂令在於尖標鏘身令眾仙還所止不見小兒觀知所在來至其邊勸喻小兒令起情欲寄留遺體後嗣相承小兒苦楚有志不從仙化密雲為其掩障細雨霑潤蹔息苦飢現一女人以動其想小兒緣此汝精於地仙以牛糞承裹而歸置甘蔗園因日光觸糞團開發生一男子形容殊妙後長為王因此相傳為牛糞種或曰地種或名日種又本行集第五云彼一百八最在後王名大茅草其王無子捨位出家乃至血墮地處生二甘蔗一出童子相師立字以日炙熟甘蔗生名曰善生又以從甘蔗生名為甘蔗生又以日炙生故亦名日種後長為王一出童女因緣如上名為善賢復名水波後為妃以此證知善生王者即苷蔗種也謂是懿師摩次第百王後第一百一孫既云懿師摩後有王名大善生明知善生等七王即是一百數外若此七王是百數外是則足前合有八萬四千二百六十悅頭檀者此云淨飯王菩薩者如前解次能仁種文有其三一立釋迦所由故曰豪族等五分十五云王舍城王名曰摩王有四子一名照目二名聰目三名調伏象四名尼患聰明神武有大威德別妃有子名曰長生頑薄醜陋眾人所賤妃言我子雖長才不及物而彼四子並有威德國祚所歸必鍾此等當設何計固子基業即作方便令王擯斥四子被擯從者如雲謂己親眷及諸士庶到雪山北東西遐逈南北廣大地平如砥四望清淨多諸名菓異類眾鳥四子見之即便頓止數年之中歸者如市遂大熾盛為奇國父王思問傍臣答言在雪山北近舍夷林築城營邑眾人熾盛地沃豐野衣食無乏王聞三歎我子有能從此遂號為釋迦種以此證立能仁所由二父母真正者簡餘外種謂以自族為妻恐種雜亂又以餘姓卑劣不堪為婚之是以故云父母真正三眾相具足者內報殊勝三十二備故云具足問所以佛相但三十二答婆沙一百七十七云三十二者世間共許是吉祥數故三十二不減不增又解若三十二莊嚴佛身則於世間最勝無比若當減者便有𨷂少若更增者則亦雜亂皆非殊勝但唯示所如佛說法不可增減佛相亦然無增無減次明記相所表文中有二一總二別總中適者始也謂始生已問未知此生何生所攝答胎生所收問於四生內何生最勝釋化生最勝爾者後身菩薩得生自在應當受化何以胎生俱舍第八解云見受胎生有大利益謂為引導諸大釋種親屬相因令入正法又引餘類令知菩薩是輪王種生敬慕心因發正勤專修正法又若不爾族姓難知恐疑幻化為天為鬼如外道論矯設謗言過百劫後當有大幻出現於世食噉世間故受胎生息諸疑謗相師所謂阿私陀仙問佛身之中相有有好如何相師言相非好解相為麤顯占者易知好為微隱覩而不委二道者謂輪王與佛次下別歎先表輪王後顯佛道輪王文四一位極輪王內報殊勝二七寶下依報具足三有千子眷屬威雄四從海內下正化遐被此輪王者謂是金輪以文中云主四天下此王由輪旋轉應導威伏一切名轉輪王俱舍十二云若金輪者諸小國王各自來迎作如是請我等國土寬廣豐饒安隱富樂多諸人眾唯願天尊親垂教勑我等皆是天尊翼從若銀輪王自往彼土威嚴近至彼方臣伏若銅輪王至彼國已宣威競德彼方推勝若䥫輪王亦至彼國現威列陣刻勝便止一切輪王皆無傷害令伏得勝各安所居勸化令修十善業道故輪王死定得生天次七寶者皆為王重稱之為寶華嚴第五十七云輪名勝自在象名青山馬名勇疾風珠名光藏雲玉女名淨妙德主藏臣名大財典兵名離垢眼餘文可解次顯佛道十號三輪文如上解次聞相欽奉於中文四一邊境衛邏二邏人間說所謂間上二表之事言中是到故言王聞三請王除去恐後侵吞故曰將由此起四不從請意初間名高伏一往即拒次若彼下申其拒意我當臣屬應上輪王當為弟子應前佛道此在宮中聞名息慢上來依器殊勝竟次下捨榮出家就中文二第一不顧尊位捨榮出家第二時有人下筞勵進修成無上道前文復二一捨榮出家二時摩竭下對面息慢前出家文四一明菩薩厭苦難盡思盡苦源第二時菩薩下父母愁念恐捨俗榮第三時菩薩下強違父母棄而出家第四爾時下既出家已修乞知足初文漸長大者五分年十四因果年十九故云長大既大長已觀見生死循環不絕故云以此身故不盡苦際菩薩唯求斷苦方便覩其苦因不除苦果相續故曰如是苦身何可得盡此文自觀生厭略無現相五分十五覩相生厭現厭有三彰欣唯一菩薩少小有出家志父王常以五欲娛樂至年十四城東遊觀出東門已見一老人頭白背僂柱杖羸步問御者言此是何人御者答云年耆根熟形變色衰坐起苦極餘命無幾故謂之老問御者言吾身免不答言不免迴駕宮自念未離老法愁憂不樂父王聞已更增欲具又於異日城南遊觀遂見病人形體羸瘦倚門喘息御者答云四大增損飲食不能氣息羸微命在刻漏又於異日城西見死轝尸在前室家男女哀號隨後御者答云氣絕神遊無所復知棄之空野長離親戚迴車還次逢見一人剃除鬚髮法服擎鉢視地而行問是何人答曰出家又問何謂出家答曰善自調伏具諸威儀常行忍辱憐愍眾生故謂出家菩薩間見三稱善哉唯是為快至便下車恭敬而問何故形服與世絕異答與三歎並悉如前有一女人見菩薩便生愛心即說偈言母有此子樂其父亦甚歡女人有此聟樂過於泥洹菩薩說泥洹聞聲歡喜踴躍自念我何當得此無上泥洹還宮思惟未離生老病死之法王問御者今出樂不答言始出不悅還時甚樂具陳所見王復念曰相師言實出家必矣復增五欲晝夜娛樂次觀樂具宮殿等作惡相已三稱禍哉捨而出家因果經中大同不能繁具第二年雖盛壯厭惡情深故曰心不樂欲父王貪國重位心希紹繼故曰愁憂等第三絕愛出家聽許故曰強違恐損他人故自剃髮著袈裟者智度論第一云持上妙寶衣貿麤布僧伽梨又本行集第十云時淨居天應時化作獦師之形身著袈裟染色之衣太子與身上迦尸迦衣價直百千億金易之而著既嚴整訖口發如是大弘誓言我今始名真出家也此文雖有袈裟不顯所以在家迫迮猶如牢獄羈繫行人名之為家於此厭背稱之為捨出家寬廓事等虗空不溺行人名曰非家發意歸趣名之為入第四乞食此則棄國出家遊於羅閱千途之行不可具陳但為報藉資須且行乞食須令施者得福現未獲安文雖持鉢不顯得由既無得由不可斟的雖行乞食具諸威儀庠序可觀王見息慢其文有四第一經家牒王所見第二見已已下一行半偈發言讚歎第三王即遣下五偈半勑使尋逐第四王間彼使言下親謁驗實初文可知第二歎中五句初句一往勸觀異賓第二別歎內行殊勝第三顯其色相豐美第四讚述種族高貴第五兩句威儀可則勝相殊妙此士無王勸同觀異國之士故云觀彼客亦可儀則庠序嚴整可觀勸諸群臣同瞻異相故曰觀彼客聖行雖多此最超物由行此行道立人尊故曰為最勝相謂三十二相好謂八十種好相好昞著故曰甚嚴好相好既備明非庶品必是剎利勝族苗𧜟故非下賤湛然若大海安住如須彌徐行喻師子𮨇視等牛王故曰諦視等次知處文三初有半偈王勑使人尋知處所次有三偈使奉王勑尋知處所後有兩偈既知處已還來啟王初文可知次文復三初偈奉命尋問次偈見其所作平等利人攝根無染福人感物譽毀不移後偈尋逐知處第三文二初偈白王之法次偈啟奏王知第四禮謁文三初一偈半致敬問訊第二共相問訊下共申問答第三來意既周致敬辭退初文須問暄凉起居輕等第二欲申問答先結前生後前雖遙歎未決心疑今既親承須申問答故名為復亦可問訊既竟更決心疑故名為復就問答中文分為二初盡偈末問得族姓心中所祈次長行下雖知族祈未識真為故須捨位驗其虗實就前之中初問後答對面申前遙相讚意問中有二初偈問心中所祈我觀仁者壯年勝行理應紹位稱王恩流率土而今剃染修乞祈意如何此問出家修乞之意次偈問種族生處今觀仁者顏貌端正必是剎利勝族苗𧜟我既共汝相對問答願說本之族姓生處次答三偈文中不次初偈先答後問初之兩句答前生處故曰有國等次有二句答前種姓名父姓名為日是前大善生等日種生處名釋迦舉前北方下能仁姓次有兩偈却答初問初偈捨緣入道次偈祈斷苦源初捨緣者生死循環皆由緣伴欲絕苦因必須棄捨故云捨彼行等次偈斷苦者觀欲多過是前輪王苦集相仍不得解脫此釋初句出離安隱是前佛果既顯滅道勵意進求釋第二句息苦會真本心所趣故曰要求等釋三四句此中觀欲是集諦多眾惱是苦諦出離道諦安穩滅諦次驗虗實其文有二一驗知實應上輪王二求先度顯前佛道驗知實中半令為二捨全之中有法喻合既驗知實方求先度五分王欲誠菩薩語言比丘族姓尊位世為王胄聖德自然應居四海顒四海顒莫不企仰若能降志亦當稱番比面相事菩薩答言世間貴位莫尊輪王吾已棄之況四海乎所以出家求道欲度一切生死大苦何不請我道成先度乃反區區以此相要王言善哉斯言甚快道成之日願先度我及此國人菩薩許之王大歡喜禮拜辭退第三還退可知次明修成等覺其文有二一同耶修不悟真果第二爾時菩薩下念昔正因依修作佛前文復二一者同耶習定二者同耶苦行習定復二謂不用及非想然餘文中具習諸定此且舉二餘亦應修就不用中文分為二初明同耶習定第二時菩薩下非奪而去前文有十一舉耶師習定教授二時菩薩下往問學法第三報言下答所學法第四時菩薩下校量有無第五我今已下修令得證第六時菩薩下更問學法第七報言已下答無有餘第八菩薩報言下略以非之第九阿藍下勸共同事第十時阿藍下敬之為正次非奪文二一校量非奪二知非棄捨前中復二初有四句不能除過次有四句不能成德過即生死過患德謂涅槃有德前文有業不絕名非息滅有因不除故非去欲有果相仍名非滅盡以此循環故非休息後文非成等覺舉其覺果非沙門沙門果此二有餘涅槃下之二句無餘涅槃初句談體次句歎德亦可連聲云非得涅槃永寂之處同為一句舊人配文解釋極成違理既不順宗豈繁述破次捨可知第二同習非想但少非成等正覺一句餘文同上更求勝法者舊解云謂執自餓是道以見事中儉節將為畢竟離欲曰無上休息法也今解不爾但以欲求勝法中路遇緣遂經六年不獲聖法故曰雖爾猶不證增上聖智勝法其休息法即後成佛文是共行是耶非休息法又捨耶定之時未見苦行之事南遊象山覩處起念如何懸即指此為休息法次同苦行者為欲化耶令歸正法依大乘方便經中卷云昔迦葉佛時菩薩作如是言我不欲見此禿頭道人何有禿人能得菩提菩提之道甚深難得乃至廣說復次菩薩為教化五人及自示業報以業障故六年苦行其五人者父王簡得五豪族子令使侍衛四女者當時緣有亦可為彰菩薩無染行亦可遠表當來僧尼二眾是故今舉四女五男雖復六年苦行良由所習非真但增疲弊故曰雖爾等次下依修作佛就中文二初默念思惟挍量得失第二爾時菩薩下食食修禪斷惑成佛然挍量中文有九句初有四句挍量舊道次有三句思惟欲依後有二句悟正因法前四句中一舉父王田上所得之智第二審察此道能盡苦不第三知有堪能第四依之得盡次三句中第一舉欲為依欲者惑因不善法者是業以此惑業相資輪迴諸趣既云頗因欲不善法得樂法不明知不由不善之因以感樂果第二知其無力第三習無欲捨不善得樂法耶計理更有一句言捨即得無者略也後之二句悟正獲資如上所思耶依無力欲盡苦源豈由自餓故曰然我不由等然則行藉資成緣虧喪道若不受食何以超昇故曰我今等次下修禪成佛文中有二初食食修禪二斷惑成佛前中復二初食食次修禪食食文三一明食食反前自餓言異時者非思量時此食飯餘文乳糜問所以不同者菩薩先食飯氣力漸增後食乳糜方成正覺所以知者斷食六年一頓無益自非長時無由受潤故婆沙一百八十二云菩薩捨苦行已而食美飯蘇乳以油塗身習處中行五人謂犯失志遂便捨去於時遂有難陀難陀䟦羅二女俱時給侍菩薩爾時便作是念若彼五人不捨我者豈令女人來相親近菩薩受十六德乳糜食已身力轉增從吉祥人邊受草等乃至成佛問菩薩氣力豈由食耶答菩薩雖有那羅延力若不食者謂自餓得道為破耶見故食乳糜因果第三云今我若復以此羸身而取道者彼諸外道當言自餓是涅槃因我雖節節有那羅力亦不以此而取道果我當受食然後成道第二五人不了正耶固情捨去第三食已得充氣力次下修禪先明方便方便文三一洗身垢將欲淨心先去身垢次欲往其道樹以未成佛不可即在道樹下故坐乞草已往吉祥樹下修禪所以草座者一為表己少欲之行二令弟子放以成規其草作青綠色如孔王項柔血細滑因果經觀知過去以草為座帝釋化人執淨耎草問名何等答曰吉祥菩薩聞之心大歡喜我破不吉以成吉祥此人亦請先度次明坐法身端故直繫心不耶故曰正意專注一境名曰繫念在前不顯加趺坐者略也菩薩理應結加趺坐婆沙三十九問諸威儀中皆得修善何故涅說結趺坐答此是賢聖常威儀故謂過去未來過殑伽沙數量諸佛及佛弟子皆住此威儀而入定故復次如是威儀順善善品故謂若行住身速疲勞若倚臥時便增惛睡唯結加坐無斯過失故能修習殊勝善品問結加趺坐義何謂耶答是相周圓而安坐義聲論者曰以兩足趺加致兩䏶如龍盤結端坐思惟又解重疊兩足左右交盤正觀境界名結加坐唯此威儀順修定故又僧祇三十五云六群比丘在禪房中作駱𮪀坐諸比丘白佛佛言從今日後不得作駱𮪀坐應加趺坐次正修禪新名靜慮靜慮不同有其四種釋四靜慮三門分別第一釋名第二出體第三諸門分別言釋名者梵曰䭾南此云靜慮俱舍二十八云依何義故立靜慮名答由此寂靜能審慮故寂靜是定審慮是慧爾者諸無色定應名靜慮以皆寂靜能審慮故答就勝立名非餘定等如世間說發光名日非螢燭等亦得日名問靜慮如何獨名為日答諸等持內唯此攝支止觀均行極能審慮是故唯此獨得勝名次出體此四靜慮一一有二謂生及定生者非定是居止處定靜慮體唯是善性以三摩地能令心王專一專一所緣故名為定以大地中善等持為體若兼助伴五薀為性以隨轉色為色薀故問若一一境性是靜慮者依何義立四靜慮耶答此由具支有其多少故一境性分為四種次諸門有四第一何定攝支第二定支多少第三立支所以第四諸地通局初門靜慮有三一者味定謂愛相應受著淨定二者淨定與無貪等諸白淨法相應起故三無漏定愛不緣故三中後二攝支非初味定第二門定支總有十八初定五支一尋二伺三喜四樂五等持等持是定別名二定四支一內淨二喜三樂四等持三定五支一行捨二正念三正慧四受樂五等持四定四支一行捨清淨二念清淨三非苦樂四等持然支數雖十八實事但有十一謂初定五支第二定中唯有內淨餘三如前足前為六第三定中等持如前餘四體別足前為十第四定內增非苦樂餘三如前故成十一然此十一喜樂捨三別說故爾若據種類但唯有九以喜樂捨同是受故又此九中念定慧受是大地法信輕安行捨大善地法尋伺大地外數問何名靜慮支婆沙八十解云隨順此靜慮故名靜慮支第三門問靜雖四支應數同何以初三等五二上齊四解前說隨順是支義故謂四靜慮各有爾所能隨順法不增不減復次欲界諸惡難斷難破難可越度故初靜慮建立五支為牢強對治第二靜慮重地極喜難斷難破難可越度故第三定建立五支為牢強對治初及第三俱無如是難斷等法故二四定各立四支復次為欲對除欲界增上五欲境貪故初立五為治二地五部重地喜受故第三定亦立五支初及第三俱無是事故二四定各立四支問若初定支亦第二定耶答應作四句有是初支非第二謂尋伺有是第二非初謂內等淨有通初二謂喜樂定有非初二謂除前相又問若是初支亦第三耶答應作四句有是初支非第三謂尋伺喜樂有是第三非初謂捨念慧樂有是初支亦是第三謂心一境性有非初三謂除前相又問若是初支亦第四定耶答應作四句有是初支非第四謂尋伺喜樂有是第四非初謂中受捨念有是初支亦是第四謂心一境性有非初四謂除前相第二定等相望四句准釋應知第四門四靜慮支總有十八此中四等持體與諸地為依故通諸地不勞問答次有六種謂初定尋伺喜二定喜三定樂四定中受此之六種地法應有故在諸地無勞問答次有八種謂初定樂二定內淨樂三定捨念慧四定捨念別緣建立須釋所以問輕安行捨一切地有何故初二立輕安非行捨三四立行捨非輕安解前說隨順是支義故謂輕安順初二行捨順三四復次為除欲界五識身及所引身麤重為除初定三識身及所引身麤重故初二定立輕安支二三定中無麤識身及所引身麤重可對治故故三四定不立輕安既無輕安故立行捨又三定捨極喜四定捨極樂為棄喜樂故立行捨初二不棄喜樂不立行捨既無行捨故立輕安問信通諸地理應遍有何故唯於二定中立答前說隨順是支義故義信唯順二故立為支復次初定尋伺如火身識加泥令心相續熱惱濁亂信不明淨不立信支如熱泥中面像不現二定之中無火泥故信相明淨立信為支如清冷水面像得現第三靜慮有極悅受第四靜慮有勝捨受覆心相續信相不現故彼不立內等淨支問慧通諸地亦應遍有何故唯於第三定立答前說隨順是支義故慧唯順三故立為支復次初定有麤尋伺覆障正慧二定極喜覆障正慧四定勝捨覆障正慧以勝捨受是無明分正慧是明明無明分互相違害故皆不立正慧為支第三無彼覆法故立為支問念通諸地亦應遍有何故唯於三四定立答既云隨順是支義故念順三四故立為支復次初定有麤尋伺猶如暴風二定喜躍如水濤波覆障正念故俱立後二由無斯過立念為支次下釋文四定文四先解初定初定復四一除定障二辨得定三結顯得四釋得由一定既爾餘定亦然初文除欲愛等者解釋如前又婆沙八十解云欲者五欲惡不善法者五蓋復次欲謂欲愛惡不善法謂欲界諸餘煩惱既除惑本所以得定覺觀者對除支麤心名覺細心名觀即是尋伺別名喜樂者利益支心悅名喜身悅名樂樂是輕安一心者是等是等持彼二所依餘文可知次明二禪文四如前先明除障覺觀嬈亂二禪故須除去譬如淨水波動則無所見次得定者內信是對除支信者淨相謂名內等淨離外鼓動定內等流故名內等淨喜樂是利益支釋同前位一心者彼二所依餘文可知次三禪四者喜者是障觀喜多過故須除去譬如貧人得寶雖喜一旦失之其憂更甚由絕喜憂即便快樂次得定者聖智所見是正慧護者行捨念者正念念知喜過慧正分別捨者離過此三是對除支由離喜故念慧為正樂是樂受是利益支略無一心餘文可解次四禪四者三定得樂雖是利益若望四禪極為妨害重病人觀妙音樂為障四禪故須除去若爾但應捨樂云何復言捨苦答理實苦根初禪已斷今獲第四始云斷者此已斷故說名為斷謂於遠事而說近聲又解依雙法盡俱說斷聲言雙法者謂苦與樂得初禪時雖已離苦而樂未盡今離第三靜慮染已苦樂俱盡俱說斷聲問所以復言先已去憂喜答樂未斷時憂喜已離故言先已亦可初禪滅憂根三禪滅喜根二禪滅苦根四禪滅樂根欲明四禪絕去四受并前總舉故言捨苦樂等次明得定無苦無樂是利益支護者是捨謂行捨清淨念者是念清淨此二是對除支略無一心由離八灾謂苦樂憂喜入息出息等伺是故捨念名為清淨餘文可解問菩薩前修非想定時下八地染已得離貪如何將趣菩提却念田中初定重更思惟斷除下染答前習非想實斷下染以稟耶師不悟真理今將成佛尋本正因但欲依蹤遊履不是為斷下惑文中說言離惡等者於已離處說今離聲如王已來說名今來次往菩提樹下三十四心成等正覺以佛身有殊妙功德隨依地山皆悉傾動唯此樹下有金剛座上窮地際下據金輪一切菩薩將登正覺皆坐此座上起金剛喻定以無餘依及餘處所有堅固力能持此故婆沙一百三云曾聞菩薩知修苦行非真道已遂受難陀難陀䟦羅姉妹所奉具十六德香蜜乳糜食已身心安穩有力從吉祥人邊受吉祥草詣菩提樹下手自敷設如婆蘇吉龍王盤身結加趺坐坐已便發堅固誓言我若於此不盡諸漏證得無上正等菩提誓當不起爾時大地諸山六種震動如海輕船逐浪高下乃至他化自在天宮皆悉震動猶如猛風吹芭蕉葉魔王驚懾觀動所因遂見菩薩坐菩提樹端身不動誓取菩提遠自出宮往菩薩所勸受輪王位等如彼廣說然佛坐於菩提樹下諸功德門雖復無量且應化故略辨三明釋此三明三門分別第一釋名第二出體第三諸門分別言釋名者一宿住智證明由知往昔前際中事稱為宿住此知由智故云智證二死生智證明逆知未起後際果因故曰死生釋智同前三漏盡智證明謂稽留有情久住生死稱之為漏漏亡之處名之為盡盡由智故故名智證通名明者通達了故婆沙一百二云如是三明皆能隨順厭捨生死皆能引發殊勝功德皆能趣向畢竟涅槃故名為明次出體者如是三明慧為自性然約智者前二俗智以作事觀觀知過未前後際事其死生智明若望根本即用天眼通為體但緣現在若據通家所引眷屬即用意識相應慧為體以能通緣未來事故非天眼通能知此事以諸有情有三業行隨業所感善惡趣生天眼只可知色不知語意有別勝智是通眷屬依聖身起能具足知此眷屬智亦名死生智此死生智由天眼通力所引故與通合立死生智名所以由彼引者謂天眼通能知死此生彼彼死生智亦知死此生彼流類相似故能引生其天眼通但緣現在色死生智證通緣現在未來五薀為境其漏盡明若緣漏盡為境但六智性以漏盡是無為六智緣著除去他心苦集道四以苦集智唯緣有漏道智緣有為他通緣漏無漏法此並不能緣無為故須除去若謂漏盡身中所起即十智性次諸門有三一三性不同二照境有異三對通問答言三性者此三皆善其死生智若以流類相似是天眼通攝者即是無記眼識相應慧若取有別勝智是彼眷屬據眷屬論即唯是善次照境者婆沙云復次宿住隨念智證明通達解了前際法故死生智證明通達解了後際法故漏盡智證明通達解了涅槃性故皆說為明復次初明知諸有情前際之中由如是業死此生彼因果相續次明知諸有情後際之中由如是業死此生彼因果相續後明知諸有情由如是道能盡諸漏隔斷因果唯此一種是勝義明前之二種是世俗明問此既世俗如何是明答由此能引勝義明故假立為明非真勝義次問答者問何故六通中立此三通為明答由此三種有勝用故謂宿住智證見前際事深生厭離死生智證見後際事深生厭離漏盡智證既厭離已欣樂涅槃復次初明見前際中自衰損事深生厭離次明見後際中他衰損事深生厭離後既厭離已欣涅槃餘三無此勝用是故不立俱舍云由此對際三際愚惑故此三種獨立為明次下釋文三明文三先釋初明初明復三一舉智明二得時節三釋所以初中復三第一結行彰智第二舉所照境第三識無數下總結初文禪獲第四故云得此定意離過行成故云諸結除等絕去三灾四受故云住堅固處正舉明體故曰證宿命智第二照境文四一約生數彰智二劫成下約時彰智第三我曾生等約報彰智第四從彼終下約處彰智餘文可解然無明盡明生者無間道闇盡光生者解脫道亦可前斷染汙無知次斷不染無知次第二明定文如上第二照境文二初總次別總中先果後因別中先因後果次第三明文三如上初文但二闕無結文第二照境文四第一如實緣諦第二已得下緣諦斷漏由前知諦今得斷漏故云已得等如實如漏是其漏體知漏集謂知漏因漏盡向道謂斷漏道亦可如實知漏是苦諦知漏集是集諦漏盡是滅諦向道是道諦即是緣諦斷漏第三彼作如是下斷漏故解脫彼作如是知牒前斷漏如是觀下得解脫言三漏者謂欲界中根本煩惱除癡三十一物并十纏為欲漏有者色無色界根本煩惱除癡合有五十二物為有漏問何故上二不取纏耶答彼界纏少不自在故又問何故上二界惑合為有漏答同無記故於內門轉依定地故具斯三義故合為一三界合有十五無明為無明漏問何緣唯此別立為漏答無明能為諸有本故以無明有故行等得有為此無明別立為漏問漏是何義答稽留有情久住生死或令流轉於生死中從有頂天至無間獄由彼相續於六瘡門泄過無窮故名為漏如泉出水乳房出乳又禁持義是漏義如人為他所禁持故不得隨意遊持義是漏義如人為他所禁持故不得隨意遊適四方如是有情諸煩惱所禁持故循環諸界諸趣諸生不得自在趣涅槃故第四已解脫不四智究竟已解脫牒前解脫得解脫智謂無漏智在解脫人身中所起故曰解脫智言我生等者謂由無漏觀內盡無生力於出觀後後得在俗智中作如是語故云我生等問此我生等其相云何婆沙一百二解云應作是說盡三世生所以者何此中生名既顯非想非非想處四薀諸觀行者總觀非想非非想處三世四薀離彼染故令生因果皆不得成故云我生已盡又解唯盡未來世生謂修行者受持禁戒勤修梵行皆為遮止未來世生以過現生不可遮止諸未來生是可遮止故修行者而遮止之令永不生故說為盡梵行已立者謂無漏行此是學梵行非無學梵行以無學梵行今始立故所作已辦者一切煩惱皆已斷故一切所作已究竟故不受後有者諸阿羅漢皆無後有故通說為不受後有又解若諸煩惱未斷未遍知者皆不說為我生已盡等若諸煩惱已斷已遍知者皆總說為我生已盡等又此為智別者此中我生已盡是集智梵行已立是道智所作已辦是滅智不受後有是苦智有說此中我生已盡是遍知集梵行已立是遍知道所作已辦是遍知滅不受後有是遍知苦餘文可知至此漏盡惑亡知窮道滿故曰如來等上來化主成道訖自下化物度人將欲釋文先以四位料簡一明不說時節二明不說之意三明所遊法門第四隨文解釋初時節者因果法華三七日此律六七興起出曜七七日五分八七日智論五十七日為對見聞不同故有斯別次不說意者多論第二問云佛三僧祇劫習菩薩行為成佛道度諸眾生何故四十九日遊諸法門而不庶耶答佛先安身然後度彼是故遊諸法門以自娛樂令身心調適後度眾生又為憍陳如五人根未熟故又為佛法尊重詳而後說又滿梵王本願故梵王願佛成道要先請佛轉於法輪是故待梵王請而後說法次明所遊法門多論云佛初得道於七七日中遊諸法門及觀眾生初七日入喜法門第二七日入樂法門第三七日入諸解脫第四七日遊入大捨第五七日入逆順觀十二因緣第六七日重復遊歷前諸法門第七七日觀諸眾生應受化者此律直言受解脫樂不分喜捨等別以理言之佛所證法無不出障離相故言解脫次釋文相於中分二初明遊諸法門受解脫樂以二歸法度外眷屬第二爾時世尊遊文驎下以善來等度內眷屬前文約化不同分之為六一賈人二樹神三婆羅門四婆羅門婦五婆羅門男女六文驎龍王然此六文初三七日菩提樹下次二七日離波多樹下後一七日文驎龍王處化境雖六趣唯有四初會人天第二非人次三局人第六畜生即人天龍鬼四輩檀越初文有二第一受解脫樂第二爾時世尊下二歸化度此中文五一樹神生信勸興供養第二爾時兄弟下受勸獻奉第三時世尊復作是念下悲心納受第四受彼蜜下說法化度第五爾時賈人下事訖請還第三受施文言當以何器受食者以前凡夫時鉢即成佛時度尼連禪河沒在水中海龍王將供養自成佛來無人施器故言當以何器受之然亦念知一切諸佛法畜石鉢故言不以手受然四天王知佛心念遂各持鉢以奉世尊佛若總受鉢無多用若但受一利益不普為明等利眾生及表鉢無多用故總受四合成一器五分云佛復惟念若取一王鉢不可餘王意便悉受四鉢左手中右手按之合成一器佛創成道即受天鉢食人中食為表二趣受道最勝佛益亦多故曰天人師第四說法化度文中有八一者呪願即是說法第二汝等已下勸受二歸以無僧故不言歸僧因果云一歸依佛二歸依法三歸依將來僧第三時二賈人下請祈作福第四時世尊知彼下授與髮爪令修供養第五時賈人下雖得髮爪不能至心以是人間所棄不生慇重第六時世尊知賈人下勸勿生輕若能至誠供養獲大功德第七賈人白佛下雖聞福多未能懸信言必不虗何驗知實第八佛告賈人下廣引證驗然我往昔為摩納時雖得記言未斷諸漏以記歡喜踊身虗空髮猶布施眾人供養我今成佛以道眼觀悉入無餘其驗如此況我今日惑盡果圓諸妙功德所重髮爪若能供養豐無報應是故我今勸汝慇重下之五會文二如前次下度內眷屬其文有三初明如來思惟不說第二時梵天下知念請說第三時世尊下逐緣赴說初文復三第一思惟不說慮之在心第二爾時世尊下顯不說意陳彰在口第三爾時世尊下說既唐勞不如息化前文復三第一思己所證深妙難知第二眾生異見已下以難知故不能趣會第三我今欲說下以不會故說則唐勞前文復三第一總舉所證第二甚深已下難證精妙第三智者已下顯修是智寔以舊釋詞繁不能契會今進別途用將允愜初文涅槃無為惑盡故顯諸妙功德積行方圓此之顯圓皆由功力故云我今已獲此法次歎此法七句眾名真性窮極故曰甚深理非慮知名為難解體非心測稱曰難知紛蕩不侵名為永寂生死長隔故曰休息精勝獨絕目為微妙妙中之微稱云最上次智能知理既難會會者是智故曰智者能知不會非智故非愚習即下餘人不知是也次不能趣會其文復三第一生死因長窟宅恒安第二眾生已下以宅恒安不了緣起第三愛盡已下以不了緣涅槃難見初文見忍非真心希異道耶求起證故因異見等猶依此因苦果不息常輪三界不得解脫故曰依於等巢窟如上解次不了緣者眾生樂居三界常造有因於緣起法不能解悟緣起法者謂十二緣故智論第六云佛告阿難是十二因緣法甚深難解難知五分復云眾生樂著三界窟宅集此諸業何緣能悟十二因緣甚深微妙難見之法然因緣有二初則不解順流緣起故五分十五云緣是故有是謂無明有故行等得有次復有下不了逆流緣起故五分云緣滅則是滅謂無明滅故行等得滅次涅槃難見既不了緣涅槃不顯故云愛盡涅槃是處亦難見故五分云無餘泥洹益復甚深若我說者徒自疲勞次結唐勞我今欲說甚深緣起唯智能知非愚所習故曰餘人不知於我疲苦次明陳彰將欲說偈先拂疑情非先所聞者謂不從益等受亦未曾說謂證來未說舊來諸師取慈二偈一一配合長行文句今者尋思理謂不爾何必屬文相配始成祇夜既不依舊別科解釋初偈由我說法在於巢窟愚癡者不入次偈以我所說法體精微著欲者不見次結者眾生患重聞即增迷故我默然不為說法故曰作是思惟等又此默然便是說法嘉瑞所以爾者以默故請請故便說其猶鳥伏方飛獸躑便縮如來亦然欲說故默問如來智周三界道洽四生理應遇感便宣何以見默要請答洪鍾不擊無以流音諸佛雖悲法須待請不請而說人增慢法之殃待請方酬生敬道之益次明請說其文有三第一如念請說第二爾時下受請觀根第三爾時下逐請還退前文有四第一遙知佛心以入俗心故得知也多論佛即告念令梵王知第二念相敗壞以不聞法永劫沉淪既不超昇稱大敗壞第三乘念進詣梵王覩眾生失法之利覿度品沈沒之憂遂即如念屈身躬臨請說問上界色細下界色麤梵王請佛轉法身依何住不沒答下色麤疎理難依住別化色地為依是以身不陷沒第四正明請說其文有三第一真請第二不受第三催請初文唯願表意慇慇十號之中且標其二以有堪聞佛機是故啟請堪聞者何謂垢薄等結使輕微稱云垢薄照理分明名為智慧一聞解悟故曰聰明會證不難稱云易度能滅不善法生死因亡成就善法出離行滿亦可能滅成就通上諸位謂垢薄智慧聰明易度者並皆能滅不善法成就善法也次拒不受初印如文請既有理何不宣唱故我向者下申不說意次明催請先序後頌序中復舉根器有受道之益聞法獲利無邊不聞成大敗壞如前又大敗壞者謂喪菩提涅槃佛本為生修道獲果今既證已應須濟度既不為說永絕超昇長沒愛河是大敗壞唯願世尊不違先志扶濟群生時演正法庶使無上佛種藉此敷榮稠林之因由茲殄滅亦可眾生聞法便能離惡修善佛若不說大有所失故言大敗壞如言大異事是也次釋頌本序文既云亦有垢薄等機明知更有垢不薄等此不薄等在於薄中故稱雜垢穢然此眾生雖非純淨是佛依願成道之處故云從中生既在此生請依昔願不弃先悲濟度群品願者專注之辭開者因言悟理理益照怡稱云甘露由通神解況之為門故曰願開等次觀根文二初默受觀根次發言許說前文有三謂法喻合法中先結默許後觀所化然所化中品類非一不可並言且標二類謂生及長生小長大亦可剛強為生調柔為長又長生中惑有輕重故曰少垢多垢亦就惑中受法有難易故曰利根鈍根又利鈍中悟道有遲速故曰易度難度已前諸位上下相對畏後世等直舉一邊文中略無不畏等者理少不足學者應知又可世間生長是物於生長中有少垢多垢等畏後世等文偏舉少垢等一邊人非是多垢等以多垢等不能畏罪滅惡然此為顯所化有情生長不同品類差別不是為明三乘九姓若以世間生鈍根畏後世罪為聲聞上中下少垢多垢難度為緣覺上中下長利根易度為菩薩上中下者不知依何理教作此判文若無理教可憑定是傳者𮌎臆又佛總觀所不簡乘與非乘如何配文局約乘說故知舊釋不合旨歸冀諸智人思文取悟次明喻文池河生華品類差別有目男子見此不同非即將此池中三華等三乘根有上中下問所以得知顯類非一不定三乘上中下姓答如五分中華有四品明知不定三乘九姓文云萌芽在泥出水未出水不染汙者又法說觀根中但云根有利鈍有畏後世三惡道者又能受法如大海者以此故知不定乘根姓別次合既有如來喻中略無觀者次發言文二初一偈發言許說次半偈釋去疑情言對請主許陳微妙稟受亦多皆為利益故曰梵天等又可如下云以法將去者汝等何憂懼故知但為法說明則不為嬈生次釋疑者佛前思惟甚深不說今請方陳恐非前得故曰梵天微妙法即是牟尼所得法次辭退可知次下赴說多論云譬如大龍從大海出令密雲彌布欲注大雨觀閻浮提何處國士應可雨者佛亦如是從四無量大法海出布慈悲雲無所不遍欲雨法雨觀諸眾生誰可度者其文有六第一念所為人第二時世尊下觀知處所第三見已即往下逐緣赴說第四爾時世尊下聞法悟道第五時地神下告徹請主第六爾時尊者下出家受戒前文有二初念二耶師不聞勝法多論問曰若彼諸人必應入道不應命終而得聞法若不應聞不入道者佛何故生念欲度彼人答欲令眾生不忘恩德此人先有小恩佛尚憶度況大恩者而可忘乎又此異道諸師時人所宗咸謂得道欲滅一切耶憶想故明九十六種無出要法痛彼長衰生死不息次念五人有機感五分云甘露當開誰應次聞父王昔遣五人隨侍勞苦此功應報第二知處如文所以在此處者以順古昔諸佛法故故因果云又自思惟古昔諸佛轉法輪處皆悉在於波羅奈國鹿野苑中仙人住處又此五人所止住處亦在於彼我今應往至其住處第三赴說其文有二第一勸所為人令生信樂二比丘夫出家者下既有信樂堪授法藥前文復二初則立志拒勸二佛告下生信不拒前文四對八句一往而立制二時世尊下到已破制三我今坐已下汝佛四時佛告下勸勿汝佛拒而不從初對往中路逢梵志者顯此外道機根未熟法性幽玄不能測度具見世尊神和色悅心有異疑發其三問一問出家師二問受學師三問所學法文明問雖有一二五別皆是當處文意不同今依本文直釋三問次下佛說四偈以答初偈答第二問次二偈却答初問後一偈答第三問諸無漏智起在佛身皆勝餘乘名之為上智起惑亡是欲皆盡不為羈縛稱云愛解斯咸自悟不假師資故曰自然等次答初問我今道立清昇不由師訓前無受學師今虧出家近故曰亦無有師非直無師亦無等侶等侶尚無況有師者將無等侶釋成無師所以無等侶者以一界中唯有一佛證法清涼或熱永盡故曰世間唯一等次偈釋一佛所由或業不除常輪三界生死繫縛名為有着今袪有本永絕漏源因果患亡稱云無着既無有着世間中尊一切人天皆無邊等故曰我為等次答後問准答及五分文不應問所學法應問行何道法我今道滿行圓更不學法但為轉法開生故往波羅奈國此初一句示化處所以法授彼彼便悟解稱之為轉所轉法輪甚深微妙名為無上輪者但是摧輾之義猶轉法時輾諸惑業四諦法輪唯在見道以憍陳那等見道生時說名已轉正法輪故故婆沙一百八十二妙音說云學八支道展轉和合一時至他相續中轉故名法輪然雖聞法入見道者多彼非一切皆是法輪但取最初最後得正解者說為法輪初謂憍陳那等後謂蘇䟦達羅世間眾生惑業尤重不見真理名為盲冥將欲為彼敷說至真故名為當擊者扣也因言扣理法灑群心永無惑熱等於甘露教旨相擊理顯於外義同於皷梵志不聞無着之義故更請說眾結皆離稱云我脫顯因患盡得盡於諸漏顯果患亡二患既除人天獨拔不為惡嬈故曰我勝等但以法輪精勝不被無緣外道雖聞不能領悟故曰默然等五分梵志不受拍䏶而去然彼梵志宿有善根即於空中為說偈曰佛始出世間天上天下尊如何汝遇之而返棄捨去梵志雖聞不𮨇而去初往可知第二不堪佛威到已破制第三汝佛不信問五人既不信佛得真實道何故乃言汝如來耶答若望內心全不信佛以隨他語故噵如來亦可望後拒中全不信佛但可有汝不曰如來後集法人故加此稱其汝是誰謂如來也第四拒者執昔疑今往修苦行猶不得道況今行耶有所尅獲故曰如本所造乃至迷荒失志次明生信文中有三第一舉昔不虗驗今是實第二佛言下言既不虗汝等信受第三所以下汝若生信知我果圓必能受行定同我得五人至此始是根欲具足次授以法其文有三第一勸捨二邊第二令立中道第三授以諦法前文有四一舉二邊數二別列二邊名昔解樂習愛欲即不用非想謂是法邊或自苦行謂苦行邊此釋不然故今正解眾生有二一者斷見樂習愛欲二者常見或自苦行亦可樂習愛欲在家多貪或自苦行外道少欲此着苦樂乖中故邊故五分云世有二邊不應親近一者貪着愛欲說欲無過二者耶見苦形無有道迹問五人現修苦行應勸捨苦既不習樂如何勸捨答獨勸捨苦恐成着樂故舉二邊並令修捨三彰二邊過樂故奢誕非賢聖法苦無道迹勞疲形神四結二邊損凡欲修進須捨二邊此着苦樂皆不成辦次中道文三一舉二釋三結初文除此已者簡非謂除苦樂二邊更有等者舉是謂即眼明等是中道果證果由因勸修八正修此道諦翻前自餓其眼明者天眼謂是死生智證明智明者宿住智證明永寂休息者漏盡智證明此是三明成神通者謂成天耳他心神境三通以餘三通入明數內得等覺者是盡智無生智此是有為解脫般涅槃無為為沙門證得故曰成沙門涅槃行此是無為解脫次釋先問後答答中八正顯中道體以自餓成邊不可修習八正道中三學別者語業命三是戒學正念正定二是定學正見正行正方便三是慧學戒學三者問離身語業無別正命如何此中建立三種答婆沙三十三云七不善業道中嗔癡所起身業名耶身業嗔癡所起語業名耶語貪所起身語業名耶命耶活命故遠離此三名正業等次定學二者念者令心不散定者守境不移次慧學三者謂無漏慧鑒法非耶名為正見正行者是正思惟謂是緣心籌慮正方便者䇿心善知巧謂是正勤勤修不墮八皆無漏見道中起次結可
