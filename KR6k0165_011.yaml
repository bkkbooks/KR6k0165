body:
  text: 次摩觸戒女姓愛多不能自制身受摩觸必為重事又以人輕易陵義難自固恐壞梵行故須重遮次其緣有十一人男二人男想三二俱無衣四作無衣想五前境有染六知前有染七自有染心八興方便九掖已上膝已上腕已後身分甄去輕境染微不重或尼以輕觸男重境或男以輕觸尼重境皆成夷罪不必二俱重境十覺觸便犯次下釋文犯相等可知戒本八句一人二明尼有染心三所觸境亦有染心四從掖下出身分齊五若提下明其摩業六是比丘尼下違教結罪七不共住擯治八是身相觸者制名對僧摩觸有四不同一比丘觸女不懼陵逼不問前女死活俱犯尼取陵逼簡死取治二比丘觸女不懼陵逼無問大小觸著便犯尼觸不然要大非小三比丘觸女俱須自染尼懼陵逼亦假前染四比丘觸女不問境之重輕是以文言若捉手若捉髮尼懼陵逼要須重境若是輕境落八事中次明辨相略不釋七八二句餘者具解下三戒類然問定身分齊捉掖已下夷明知已上即蘭何故八事中捉手乃至腕蘭解前就身中明分齊故須掖下膝上捉手據枝分齊是以腕前蘭腕後夷五分十一云髮際已下膝已上肘已後其文顯矣釋摩業中先列章次解釋男子下解結罪句於中文三初二俱無衣夷二若男作男想下互則情微得偷蘭罪三男作男想下俱則轉微但獲吉羅其間是非廢五多少一同比丘準前可解次輕重文五一約當起二明異趣三若與女人下形報以辨四若男子下境心有無五境想五句次八事成重戒前戒得其重境生染不輕深防中制一觸成重此戒雖亦染心所為但以境輕生患不重要假八事資過尤甚染情轉深故得夷罪別緣具十一人男子二男子想三前境有染四知前有染五自有染心六犯前七事未懺七作至第八便犯或一男犯八或八男犯八或一時犯八或八年犯八但使滿八皆覽成夷若八度捉手雖犯八蘭以事一故不犯夷罪戒本七句一人二內有染心三犯境亦染四正作八事五結六擯七制名釋中可解然解結罪中有三一當趣觀此文時夷罪並覽蘭成以來成果假七未懺及得夷訖不言更悔二異趣三形報不犯中八事別開問下文入屏處犯提何以此開不犯若下無所為譏嫌故提此為福緣故開不犯次覆比丘尼重罪戒制意同比丘但為知他犯重故相容隱合犯滋劇自壞汙僧深防中制故與夷罪別緣具六一是大尼除下二衆二犯重罪除去殘等三知犯重除去不知四作覆藏心除入護心不犯故開文云若説有命難梵行難不犯五不發露甄去作結若發露者要對未知者作若彼已知俱有情過如有犯者不合對懺凡發露者須得犯人名字及罪名種若不爾者不成發露既發露不成亦不成覆若受發露者不須更發露便有無窮之過如尼違諫大衆咸知若作隱心並成覆藏若無隱心覆不成覆若彼犯人已發露竟餘覆不成以無本故六明相出犯滿戒七句一人二知他犯重三不發露不自發露者不對一人不語衆人者謂二三人不自大衆者謂不向僧發露四若於異時下自言引䨱五結六擯七制名釋中初句可知知者下解第二句僧者下解第三句然僧名是不滿戒本中文大衆者是解滿足戒本中文休道者下解第四句此中五句平牒前二戒本解釋尋之可知彼比丘尼下解結罪句文中有三一覆他罪他罪有重輕故文階二二自覆僧尼自覆罪有重輕者為深防限分不同故所以爾三餘衆略無境想次隨須被舉比丘違尼僧三諫戒制意有二一不聽隨順者比丘見壞不堪在道大僧作法舉棄衆外僧既舉已尼須絶敬而輒隨順惱衆不輕又若許隨長彼邪見永不改𠎝懺悔從善此則自壞損他制之不許二須諫意者此比丘尼倚傍親教是以文言此是我兄今不供養更待何時又以佛遣恭敬大僧有斯濫相須僧設諫諫言佛開親及許敬者謂是正見清淨比丘有法益尼故須虔奉而此比丘耶心成就雖復是親不堪恭敬今僧令彼識是知非故須設諫開曉如此問僧尼平隨何以乃有諫不諫別答為約倚傍有無故有諫不別又問何以尼隨二衆罪有提吉答尼是問類結罪同僧第三得捉前二犯吉比丘與尼非是同類故隨三舉並得吉羅三結罪意如前別緣具六一是被舉比丘二知是被舉僧未為解三隨順四尼僧設諫五拒而不從六三羯磨竟文相如前戒本八句一諫所為人二諫所為事此中準廣釋文有五句一僧舉如法二不順從三不懺悔四僧未為解五而順從者正是隨順諫所為事三屏諫四拒諫五僧諫六違僧結罪七不共住八制名釋相可解次明十七僧殘先總料簡七門分別一身語二自作教人三遮性四持犯五諫不諫別六二部同異七下衆任運初門身語位三一獨受二戒唯身業犯二者九戒一向語業於中勸受一戒語作結違八諫要藉語止成犯三有六戒通該二業於中位四度賊一戒自身假他語犯謂秉法竟和上始殘次解舉一戒若秉法者其唯語犯自餘衆僧同度賊女次二謗戒語正身兼次言媒二戒身語正犯次自作教人位約為四勸受一戒唯教人業次二謗戒彼此同犯次言媒二戒自作正犯教人有同不同次餘十二日重教輕次遮性者唯媒是遮餘並是性次持犯者度賊女解舉具二持犯謂不皇臣是止犯度與受戒是作犯體一名別度若白王大臣是作持與受戒時無其作犯翻却作犯豈非止持此亦體一名別論其別體二持者一向不度是止持度即白王大臣是作持解舉類知餘十五戒唯止持作犯亦可此之二戒據別體邊是則作犯止持通十七戒次諫不者前九無濫下八有濫為此故有諫不諫別此之設諫即是違僧制罪餘不諫者是違佛制次同異者於中同犯有七謂媒嫁二謗前四違諫然前三戒一切皆等四違諫戒能秉人異謂各自違當衆諫故自餘十戒並是有無不同或可輕重不同如自習近住戒云比丘隨所犯謂犯覆罪自餘九戒比丘並吉良以為之義稀又復譏過不重故爾次任運者即上教人五中除勸受一餘之四戒得有教人為己作義故有任運勸受一戒唯約自作言了成罪故無任運次隨文解九初犯中前三同戒略出戒本後六不同一一別釋言人戒所以制者一以出家之人恆須濟物今輒告他深違道法二以女性暗訥不間進不外涉言人醜纍佛法別緣具四一詣斷事官所二言白衣居士三指陳曲直四處斷決了戒本文三隨開中五一為他言佛開對事二時彼尼下妄陳其事三諸斷事官下斷人錯判四爾時諸比丘下聖決是非前施與尼事已決定後取前施定屬之物轉更與人即是非施五爾時下王奉佛制治斷事官以女暗訥敗損如此滿戒五句一人二詣官言三居士下所言境界四若盡下出言時節五是比丘尼下結罪以女少智須別條示故言犯初法應捨釋中前三別解後二合明五分十一云若比丘尼為人輕陵應語其父母若無父母應語其親族若無親族應語比丘比丘尼優婆塞優婆夷若比丘比丘尼有勢力不受護者吉羅語時應云彼輕陵我為我呵諫不應言之若詣官言人一往返一僧殘次度賊女戒凡勝福田理宜清顯生他信心表敬之甚而此女人行盜至死輒度出家汙辱尼衆別緣具六一是賊女罪應死者二知是三不問王及大臣四度與受具五作和上六羯磨竟滿戒五句一人二知是賊女三多人所知四不問王臣五結罪釋中具明和上主故殘餘非主故蘭文言三羯磨竟謂是比丘羯磨非是本法諸度人戒咸準此釋比丘度稀故吉或可即此度女故吉次界外解舉戒彼尼壞見不堪居衆若不治舉無以息耶今既舉已未肯從順不蒙僧命私心輒解此則黨援惡人輕蔑僧衆過狀不輕故制殘罪故五分云彼比丘尼既得解擯倍更憍慢不敬衆僧別緣具六一前尼為僧作三舉治二不順從未懺悔三不白僧四無因緣緣如開説五輒為解六三羯磨竟戒本五句一人二知是為僧所舉尼此中有四一僧舉如法二不順從三未懺悔四未為解三為受故下不白僧四出界解五結罪釋中具明此中但預羯磨者皆殘以不牒名無有簡別不同度賊女有牒名別罪便階降次四獨戒女人志弱恐成陵逼要假伴援方能離過是故宿處村內水中及以道路皆不得獨獨度河水別緣具四一是河水二獨度若前尼疾疾入水不待後伴偷蘭出彼雙腳上岸僧殘後尼獨入偷蘭上彼岸時前尼為伴不犯僧殘若俱入俱出乘車畜等無度水威儀者不犯三無因緣若為命梵二難及伴命終為賊將去等不犯四出彼岸獨入村別緣亦四一是俗人村不問界內及伽藍中獨入皆犯二獨入三無因緣除二難等如前四越界便犯若至村入村門不待後伴雙腳入村犯若村中先有尼者不犯以前尼為伴故若入城門亦爾若直遇者越界結犯無村十里獨宿三緣一須申手外若村內寺中無門同林別牀要申手內不犯出即犯若本相近因眠遠者不犯二無因緣謂二難事及伴大小便樂靜作業等不犯三隨脅轉側一一僧殘獨行三緣一在道行二無因緣二難等如前三離伴見聞處犯戒本三一犯二列四獨三結罪釋中初句可知次下兩句合解既釋四獨文還為四獨度水中先教不犯法文中水者河水獨不能度不論闊狹深淺界內村中但使脫腳褰衣異陸行儀則皆是其犯不同五分水要廣十肘深半體僧殘次明犯法先明犯殘文中入水令伴不及殘者謂不待伴乘便直過若論入者是蘭非殘次明偷蘭蘭有此岸彼岸犯不犯法如文可知以非全度故結偷蘭次獨入村先教不犯次明其犯犯中文三謂殘蘭吉文各二句可知然一鼓聲者如上同行無村道處十里多論第五云凡言鼓聲所及處是一拘屢舍律師云此是定義次獨宿先藍中不犯犯次村中不犯犯次獨行不犯犯亦可知不犯中具開四獨然文有五上二可知三若二尼共宿下開藍內宿四與二尼下開獨行五若一尼下開村中宿次受漏心男子食戒女性多染恆須離緣今不離緣縱情故受因受被陵事難自固損敗不輕故須聖制別緣具六一是人男子二男子想三染心與衣食四知染心與五自亦生染六領受入手犯滿戒五句一人二尼有染三前境有染四從彼下所受食等五結罪釋中具解若比丘尼下解第五句於中文四一當趣重輕二天子下異趣三染心女下形報四明境想四句次勸受染心男子衣食戒制意有三初不聽勸者前已患深世尊制斷今故相擊勸受染食此則令他得罪自亦招𠎝人我俱損故所以制二同犯意者知他染惡心故勸又以言中謗佛不遵聖教情過不輕故使同犯三離二戒意前是身犯此是語業又前得衣食此令不得又謗佛不謗殊故分兩戒別緣具五一人男子二染心與衣食三知彼染與四發言勸受五言彰了犯戒本三句一人二勸他三結罪釋中初一別解下二合明次八諫戒前四同前直列戒本餘不同者一一別解先明習近住違僧三諫戒制意有三一不聽習近住者佛為女人志難自固制有伴援令得防𠎝今乃曲搆私情染心共住互相覆藏心不改悔是則醜纍佛法生患不輕故須禁防使行成立二須諫意者倚傍聖教制二為伴何得衆僧遣我別住即是違於教不了制意須僧設諫開示是非三結罪意如前別緣具六一是染心習近住二尼衆勸使別住三倚傍不肯四僧如法諫五拒而不從六三羯磨竟文相如前戒本六句亦爾然所為事中文有四句釋中具明次謗僧勸習近住違僧三諫戒制意有四一不聽勸者彼以染心共住互相覆罪僧見無益諫令別住令此穢尼謗僧勸彼情過不輕故須聖制次須諫意者凡事交雜相則難分迹涉愛憎致招言謗故須衆僧如法設諫彰己內無恚心意欲令彼離罪次結罪意有三種過一勸他為惡二非理謗僧三固執拒勸以此過深故制同犯次離二戒意者前戒諫自習近住此戒諫謗僧勸習近住又以諫辭不同故為二戒別緣具六一前尼習近住二尼僧諫使別住三謗僧勸習近住四尼僧如法設諫五拒而不從六三羯磨竟餘相可解不能具言次嗔心捨三寶違諫戒制意有三初不聽捨者本歸三寶所以出家今以嗔心輒便棄捨此捨真宗投於耶法自墜義深所以弗許次須諫意者但以女人見近不能及遠聞出家名同謂梵行亦等迷心歸趣可愍之甚須僧設諫令識正耶次結罪竟如上別緣具六一因事生嗔二發言棄捨三背此向彼四尼僧如法設諫五拒而不從六三羯磨竟文相可解次發起四諍謗僧違諫戒制意亦三一不聽發起諫謗僧者凡諍乖理令衆不和僧已決斷如法除滅而此女人見不及遠妄引比類發起謗僧此則過損不輕故所以制次須諫意者彼自不能條持諍事還謂衆僧違法決斷相則交雜似有愛憎故須衆僧自理諫彼次結罪意如前別緣有六一已起諍事二僧如法滅三謗僧發起四尼僧如法設諫五拒而不從六三羯磨竟餘相可解次明卅捨墮準上僧中亦須先總四門分別但以前之二門明義不異故今直對單提門答今者且約顯相言之有三十八戒濫故須定此中內外分二內資有十一同戒有十謂一背過別非殘不受藥須蟲水不同有一食蒜此等假食成犯食已則無可捨故在單提不入捨內次外財有二十七同戒有七謂脫腳看覆真實淨施白色三衣高牀兜羅浴衣不同有二十水扇生穀同牀同被作衣過五日過五日不著僧伽梨著他衣紡績取衣不為受貯跨衣十畜女嚴具持不著祇支及七塗身二十此等造作招譏故並有罪然無用𠎝不入捨墮次正辨三十總作十門第一定能犯人第二配屬身語第三自作教他第四遮性差別第五持犯方軌第六二問之意第七重犯不重第八捨懺儀則第九二部同異第十下衆任運初門人位有三謂一人衆多及僧若論一人遍違不惑其衆多者謂是多人同心共作若據此為衆多一切同犯若望由我作故令彼成犯為衆多者唯取同活於中七戒不共犯謂離衣過受乞鉢二奪七日藥病衣餘悉同犯僧位之中四方僧令是不犯其現前僧若據四人已上同共作者是則諸戒一切同犯所以如上明或可但除病衣以是別物次身語位二謂四互用及病衣此五身犯餘通身語於中分三初有一戒謂離衣宿身語止作業共身犯第二七戒謂六通時攝非時物語止共身犯第三餘十八戒語作共身犯謂急施衣離為二戒故有十八於中復三初乞縷一戒一向假他身犯第二受寶二奪若論自作是身業犯若也使人自語假他身犯第三十四領受戒不同有三互乞蘇油重衣輕衣同有十一謂非親乞衣過知足受衣居士一二居士王臣送寶貨寶販賣乞鉢勸織過前受急施衣回僧物並悉自身語作業假他身業犯次自作教人者若泛教人不為己者於己無潤並得吉羅若也教他為己作者有四戒得同犯謂同戒有三謂受寶奪衣乞縷使織師織衣不同有一謂貿衣已還奪餘者即無然約位判乞縷一戒專使人犯受寶二奪事通兩位餘悉自作犯捨次遮性者四互回僧五戒性惡餘悉是遮次持犯者此中有七戒具二持犯謂六過及離衣其六過戒若不説淨名為止犯而畜過限即是作犯此之二犯體一名別而不得有名體各別其二持者具含兩義若其畜則説淨名為作持以作此法過限不犯反却作犯豈非止持此亦同犯體一名別若其一向不畜得名止持畜則説淨是名作持此之二持名體各別離衣義同不能繁述自餘諸戒並止持作犯亦可此之七戒據別體邊是則作犯止持通三十一戒次二問之意如上已明次重犯者此諸戒中全無重犯一有四箇一謂一離一作乞縷一違開時攝非時物一違要病衣是二奪無重奪四互無重互六過無重過十五領受無重領受前十四中更如受寶此中三戒異餘者並同次捨懺者既無綿蓐捨咸對境及令無壞餘義大同不能具述次同異者有十八戒二衆同犯餘十二戒束成三位病衣一戒有無不同長鉢犯同緣異自餘十戒尼重僧輕次任運者六過中除藥餘五及四教人合有九戒容有任運犯義餘戒皆無次下別解十八同戒直別戒本餘不同者一一別明先辨互乞蘇油戒凡物資身索須限定得已棄更求異物令人志性無恆長貪惱境招譏不輕故結其罪別緣具六一是非親里居士二為己故索三已索得蘇四不用還主五更求異物六得物入手犯戒本三句解釋可知次互用説戒堂直戒自下有四互戒釋義皆同施主捨物情期已定理隨施心不得差互今依餘用乖本施心招譏長貪故須聖制別緣具四一施現前僧説戒堂直除四方僧堂直二知是堂直三受得屬己四轉作餘用犯戒本三句一人二知檀越施異三回用結罪釋中初句可知二三合解合中文三一明互相元作堂直回作衣用入捨若其本施作衣回作堂者不合入捨文舉互義故須並列次釋僧物僧物三句此是第三定屬現前僧物不同前回僧物入己取不定屬僧者亦可三物回並入捨次結罪可知次食元乞雖標安隱然得還擬供衆或檀越本心施回皆入捨次別人房次衆僧房舊云堂者不然觀文無有堂字但言乞欲造屋亦可堂之與屋名別義同次長鉢戒制意同前別緣具五一先有受持鉢二更得鉢如法三不説淨四無因緣五過一宿犯問所以尼畜長鉢不同比丘開十日者答古舊釋云一尼是少利既得一鉢宜即受持及以説淨何須開十布施人須二既是有伴即作淨法何須開日覓人作法大僧多利開於十日欲使籌量布施人須二復不制有伴喜獨修道不故開十日覓人説淨是以不同若爾尼有二義不開十日者尼畜長衣亦有二義何故與僧同開十日答是鉢一用理無多畜未成無過成雖制犯然為有伴得即説淨故不開十比丘無伴故開十日論其長衣資具用處實未成已來亦有長過撩理簪縫不可即成以斯義故同開十日問即説淨竟然始作衣義亦無妨何以要須同開十日答初緣開時對一不説淨尼故開十日得待成須一開已後蓋通三品故齊十日又更一義尼多共活長衣同生不得説淨以共用故為須覓人齊開十日鉢雖同生亦得説淨即是有伴故唯當日以無共受用故今解不然未必以同生得向説淨即令當日成犯但以女人於器多貪喜為貯畜為欲伏彼貪心故不開十又解開不重開以開十六枚器不許更畜多鉢若其畜之經宿即犯僧既不開十六枚器若限一宿教急難恆又解長鉢尼衆先犯不得因尼制僧比丘後寄緣興開亦不至尼戒爾者長衣何以同開十日答長衣緣同開禁齊一鉢為緣異許制不同戒本三句及釋可知五分聽畜七種粗鉢一以盛餘飲二以盛香三以盛藥四以盛殘食五以除唾六以除糞掃七以除小便次過畜十六枚器女人志劣修道事難若不緣充無由起行故於應供器外更復開聽法餘雜事一十六枚計緣已充應須進業而更多畜妨道故制別緣具四一先有十六枚器二更得器三不説淨四經宿犯戒本三句釋相可知十六枚者二釜謂大及小二瓶謂水瓶洗瓶四蓋謂二釜二瓶各有其蓋四瓫二大二小四杓亦二大二小此等開聽餘者淨施五分云器物者資生器物唯聽畜盛蘇油蜜香藥醬酢各一瓶又聽畜釜鎗拘各一及一小瓫盛米食過是者尼薩耆次先許病衣後違戒凡身多穢女更倍增每月流身衣被汙若不遮障無已進修先許與他理應相濟今乃爽言令他致惱既乖法或式立制防之別緣具五一是病衣簡餘用物二先許他三前來取四無因緣謂破戒等被舉二難緣五不與他犯戒本三句釋中並餘衣輕重合明可知次時攝非時施戒凡施雖多且約為二物既局限分須合儀苟有可貪不遵聖教將非時物作時法受此則長惡不輕故須聖制此施元本是時時分已過至非時分合作非時法攝而於非時分中作時法攝故得此物合入捨墮若不爾者損非時僧計合成重豈得逸提五分十二云諸比丘尼非時衣作時衣受諸客比丘尼便不能得衣十誦分為兩戒非時衣受作時衣主尼過時衣受作非時衣客尼犯別緣具四一是安居施物二入非時分三作時法分四作法分竟犯戒本三句及釋可知次貿衣已後強奪戒凡物貿易事已決判懷嗔強奪不應道儀此則公相觸惱增長鬪諍情過不輕故須聖制別緣具六一共相貿易二決價已定三嗔心強奪四自作教人五無因緣謂無借著及舉等緣六得入手犯戒本三句一人二共易説三後嗔恚下奪之結罪解釋開貿易者為同法人無譏得離馳求之惱奪有現不現故文中結罪兩句差別餘相可解次乞重衣戒出家理應標心纍外至於取受須合軌儀何期不能守道廣縱貪情輒索重衣親非並損由斯過故立制防之問此與前非親里乞衣戒何別答三義不同一前戒直乞犯自恣請不犯此就自恣請中過分索犯二前戒乞得一條犯此十六條已上犯三前戒除親此戒親非親犯有斯三異故分兩戒別緣具五一居士自恣請二乞重衣三過分索十六條已上四為己五得入手犯起犯文二一非親二親里各自恣請過分索犯戒本三句釋中云十六條者謂四疊張別四條成故云十六也餘相可知次乞輕衣戒制意具緣並同前戒唯以輕衣為異不能繁述次明一百七十八單波逸提先總料簡五門分別第一自作教他第二遮性差別第三持犯方軌第四二部同異第五下衆任運初門自作教人位分為四第一有二戒唯教人業謂教謂呪術及以世俗伎術捉白衣第二有十一戒自作教人彼此同犯謂掘壞牽二蟲恐大藏煞謗捉寶第十一第三有十一戒自作正犯謂同戒有五屏露二敷臥具高腳牀兜羅綿過量浴衣不同有六謂五塗身戒及安居中牽他出房戒若教人於己有潤是則同犯與自作無殊若泛教人於己無潤但獲吉羅則不同犯是則兩位合有二十二戒有同犯義第四位餘一百五十四自作犯提教人但吉次遮性者有三十六戒性惡如僧有三十戒是性妄毀兩粗異嫌強牽用譏驅諫恐煞領疑露起説隨擯拒毀同欲悔聽打博謗此中除吉譏教授師戒餘二十九不同有七謂洗淨過分胡膠相拍夏中牽他出房習延居士子違僧三諫罵比丘罵尼衆諸餘等戒並是遮收次持犯者位可為三第一有二十三戒具二持犯於中同戒有十謂説粗別背殘宿不受食前食後輒取淨衣露藏粗罪僧事與欲非時入村不同有十二取輒有十一束為五對一隻如俗家輒坐及吉一對二輒宿及去一對三日暮日沒開藍門一對四著他衣及破癰一對五突入僧寺及問義一對一隻者夜入聚落又三時遊行少分取夏中及畜衆此二十三戒並悉止法不作名為止犯作事有違名為作犯此體一名別論其二持具含兩義所以可解第二有十九戒唯作持止犯一是同戒謂不攝耳餘十八是不同戒約受有五謂取衣不與受具一不與二歲學戒二不説六法名字三式叉學戒已不與受四作本法已經宿往大僧中五違八不可過法有五謂不請不聽不恣不依安居不禮又對餘事有八不二歲隨和上不與他滅淨不結安居被擯不去不以二法攝受弟子不看同活尼病安居竟不去不送淫女過五六由旬外此等作則是持止便犯故第三餘一百三十六戒止則是持作則是犯次同異者亦分三位一有三戒有無不同謂洗淨過分胡膠經宿往大僧中受戒二有四戒犯同緣異謂外道食戒俗衣背請減年童女受戒自餘諸戒尼重僧輕此且位言如剃毛事雖是同而罪名異又如覆藏寬狹毀呰兩舌及與男子同宿獨露處坐境界翻倒如斯等類思而可知次任運者謂於前二十四戒教人犯中局取掘壞等一十一戒一向同犯者及高牀兜羅綿過量浴衣安居中牽他出房合十五戒有任運義除二呪術屏露二敷及五塗身合九雖復教人得有犯義然無任運以即對故次下解有六十九同戒直列戒本餘不同者次第解釋先明第七十食蒜戒蒜非香潔食穢道門進修之人理宜永斷今貪美味食此熏辛損道招譏故須聖制別緣具三一者蒜甄去餘辛二無病緣三食結罪犯緣可知戒本三句釋中生熟雜等並提僧祇三十八云蒜者種蒜山蒜如是比一切蒜不聽食熟生重者燒作灰並不聽若身有瘡聽塗塗已當在屏處瘡差淨洗已聽入衆五分十二諸比丘尼中前中後噉生熟蒜若空噉若合食噉房舍臰處諸居士譏嫌即立制之生蒜提熟蒜吉次剃三處毛次下四戒過損並同咸長欲原齊違聖道但以背俗之人情希出離理應斷於欲想永絶愛心且三處毛別緣具三一是三處毛二除病及勢力執三隨力結罪文相可解比丘直據妨道以結偷蘭次洗淨過分戒具緣有四一以水淨二有染心謂因作此以暢欲事三無因緣謂有病去蟲不犯四過限犯僧祇第四十云洗法者得齊一指節不得令過若過洗以歇欲心者偷蘭遮是名洗法伽論第六云若比丘不説大小便不得禮拜不得坐臥僧臥具上除無水處若為非人呵嗔水神所嗔或服藥次用胡膠作男形戒別緣具四一是胡膠臘及餘飯等二作男形三除病四內便犯僧祇第四十云胡膠形者各胡膠作各銅鉛錫白臘各互各臘蜜如是比作身生以歇欲心者偷蘭遮是名胡膠形五分比丘尼作男根內女根中波逸提若內內波逸提出不淨偷羅遮次相拍戒五分若以手拍手拍波逸提出不淨偷羅遮次供給無病比丘水扇戒墨服雖同僧尼形別來往容儀須離譏過今忽供給大僧水扇醜纍不輕故須聖制僧祇三十八若比丘尼持水瓶不持扇者越持扇不持瓶亦越二俱持者提二不持者無罪是罪一比丘一比丘尼若衆多比丘無罪若衆中有父母者扇扇無罪次乞生穀等戒出家但應善修乞食今乃乞生穀等相招譏醜紛動妨修故須聖制或從親里乞或從出家人乞或為他他為己或不乞而得不犯別緣具四一非親里家二生穀麥等三為己四隨乞結犯次好生草上大小便一切草木人及非人俱以為依共同受用今乃於上大小便利招譏處深故須聖制別緣具四一是好生草二衆人聚處三無病等緣四在上活之便犯問衆學戒中已有此制未知此制與彼何殊昔解云衆學戒中應須除此一戒今解不然此中謂是生茄蔞草須是多人聚處故獲提罪衆學類翻前但結吉也次不看墻外棄不淨戒凡所為作皆須審諦説棄便利而不看人由輒云穢損污他人情過不輕故須聖制三緣成犯一是便利二不外看三棄即犯次觀看伎樂戒出家之人應須靜念救繫心守道方合軌儀今觀伎樂妨廢正修招譏不輕故須聖制別緣具四一種種戲笑二方便往觀三無諸難緣四往見便犯見論十六下至獼猴孔共戲往看得波夜提若寺中作伎往看不犯餘相可知次共男子入屏處共語戒第八十男女既殊理無參涉輒入屏處容生染穢餘義如上別緣具五一人男子義通道俗五分入屏處戒入露處戒遣伴耳語戒對比丘立三復對白衣外道立三部成六戒以此故知通道及俗餘屏等戒皆同此釋二離見聞屏處三無第三人四無因緣病及力勢二難等不犯五立語便犯此無染心立語故提若有染心落前八事若直立不語者吉比丘吉者直為招譏下有比丘犯者釋皆同此次共男子入屏障處戒問此與前戒有差別答前戒離見聞屏假語方犯此覆障屏不假語犯有此不同故分二戒五緣成犯一人男子二覆障處三無第三人四無重病二難緣等五入便犯立位吉者以不行故若坐即犯共坐逸提次遣伴遠者與男子屏處立耳語戒此亦離見聞屏唯以遣伴遠吉耳語為異五緣成犯一人男子二離見聞屏三遣伴遠去謂離伴見聞處四無難等緣及伴舉擯等五立耳語便犯次入白衣家坐已不辭主人去戒出家乃是方外之賓來往經過事須應法今坐他家去不辭別迹同賊儀豈成客禮由此損失主人牀座事惱弗輕故須聖制五緣成犯一白衣舍二語主人在好牀上坐三去不辭別四無因緣五出門便犯次輒坐他牀戒牀既有主坐須咨問不問輒坐殊所不應具緣有五一是白衣舍二是好牀三語主四無因緣五坐便犯次白衣家輒宿戒不問主人輒宿他舍迹同賊相所以不許五緣成犯一白衣舍二不語主三敷臥具四無因緣五隨轉犯次共男子入暗室戒前屏是覆障處有光明故無第三人犯有則不犯此是暗室絶無光明雖是晝日生患處深縱有多人亦是其犯餘相是同以此為別四緣成犯一人男子二暗室無窗牖光明三無因緣四入即犯次不審諦受師語戒凡受師言必須審諦明憶記持依言奉命如何謬承師語輕心錯傳過是難容故須聖制別緣具四一師如法教二受不審諦三傳言遣偷四言詞了了次嗔心呪咀戒出家之人宜發善願自度度人彼我俱益今乃呪墮三惡令捨佛法垢障處深故所以制三緣成犯一有嗔心二呪咀三言耳犯釋中教稱南無佛者引佛為證佛大慈悲知他心智我若欺汝便同誑佛事若不虗願知我意次因事嗔心椎𮌎啼哭出家理應虗心進道縱逢惱境須以法裁今不忍事啼哭椎𮌎此乖道儀故須聖制別緣具四一因有諍事不善修持二嗔心三無因緣四隨椎淚墮多論第四五衆盡不得啼哭乃至父母喪正亡一切不聽四衆吉羅尼得提罪次無衣同牀臥戒第九十二人同牀容生染習自壞心行妨廢修道四緣成犯一同牀二露身三無因緣除病及難四隨臥犯次同被蓐戒共同被蓐染習更增損道招譏故復須制次語業惱他戒出家理應猶如水乳和合相得不爽物情今不和穆公相觸惱彼此廢修故須聖制別緣具四一知比丘尼先住後至二作故惱意三在前誦經問義四言詞了了次不看同活尼病戒病人共惱事須瞻視若不供承令病增劇又同活義重尚寡悲心呪復餘人能生慈愍三緣成犯一是同活尼二無因緣謂自病二難等三不看便犯次安居中牽他出房戒先許在房安居已定又是夏中不合移動此比丘尼輕人慢法縱嗔驅惱重故制別緣具五一是僧房分得屬己二先許彼住三嗔心牽出四無因緣謂破戒及舉擯等五出戶便犯問大僧前戒驅獲提𠎝所以此中但得吉羅答前春冬房有共用義驅出惱重僧尼並提此房屬己彼便無分惱微故吉與尼不同爾者亦尼義同何以偏重舊解云僧有二義一無房分二不犯獨惱徵故輕尼則有獨可犯致惱還俗故得提罪今解不然不以居有獨故驅出即重呵中但云惱彼還俗不言驅出為犯獨罪但以夏中比丘知法驅出義稀但獲吉罪尼多迷法喜生嫉妬驅出義數故得提𠎝次三時無事遊行戒進道之人理息緣務無事遊散妨廢正修又斷生命自喪資緣招譏不輕故須聖制別緣具三一春夏冬三時遊行二無因緣除為三寶病尼受日難等不犯三隨越界次受請安居意竟不去戒本請供養期在夏中今以限過久近不去非直增長貪求亦乃無慚太甚惱物不輕故須聖制別緣具四一受請安居二隨前後安居日滿三無因緣謂病無伴二難等四不去經宿理聖明相為分齊文中略無次邊境怖處遊行戒邊方回嶮盜賊所依尼輒遊行恐成汙損是故斯處制絶遊行今者故違結以提罪別緣具三一邊界恐畏難處二無請等緣三行越界犯境內恐怖受遊行戒制具同前次習近居士子違僧三諫戒制意有三初不聽習近者男女形殊理無參涉共相習近恐成大損次須諫意者以佛開畜淨施檀越若見俗人善言慰喻由執此故不肯別住慮恐因斯便生愛染須僧設諫開示是非欲使識是遵修知非棄捨次結罪意可知問前與女人習近違諫罪重此與男子習近何以翻輕答前為有染同類為如此為無染異類故稀作有稀如不同罪亦輕重不等別緣具六一與居士子習近住二如法比丘尼諫令別住三倚傍不捨四如法僧諫五拒而不從六三羯磨意竟釋文如上可知次觀王宮園林浴池戒第一百王宮綺麗事等諸天今輒往觀廢修正業又恐染著俗事自壞心行損道招譏制之不許別緣具四一王宮浴池二作觀意往三無因緣四見即犯次渠河水中露身浴戒女人形鄙事須遮障今故露身招譏損道四緣成犯一渠河水二露身洗浴三無因緣四洗身遍犯次過量浴衣戒釋同其前唯名浴衣為異又用無限次時中縫僧伽梨過五日戒為他作衣理應早了情貪利養久近不成又損衣財令彼致惱情過不輕故須聖制別緣具五一與他作衣二是時中三僧伽梨四無因緣五過五日理取明相為結分齊文中求僧伽梨者是衣主尼六難事起者是作衣尼六難者母云一父母二兄弟姊妹三六親四國王大臣五盜賊六惡獸次過五日不看僧伽梨戒三衣雖可俱為道服然大衣價高營求頗辦久不看撿事容損壞闕資身用故須聖制三緣成犯一是大衣除去餘者二舉處不堅窂三過五日不看理結分齊亦取明相十律五夜不看五衣提與僧衣作留難戒修道立行理須益損物見他施時宜應助讚今反慳惜他物令不施僧彼此俱損故須聖制別緣具四一施主許施二知他許施三勸不聽施四依言受勸息心便犯次輒著他衣戒輒著他衣迹同賊相被他誹謗清白不分又令前人謂失生惱情過是重故須聖制別緣具三一是他衣二不問主三著便犯次與白衣外道衣戒制意同前僧祇三十八云自手與俗人外道沙門衣波夜提別緣具四一是非親白衣外道二是沙門衣三持授與彼四彼領即犯問所以不開置地與者以沙門衣異縱開置地遣人亦招譏損是以不開不同其食以相無異是以開聽使人置地次衆僧如法分衣遮令不分戒衆僧和合欲分施衣理應詳遵許無乖別今為弟子遮僧分衣惱衆不輕故須聖制別緣具五一僧得施物二返欲分攝三衆集和合四恐弟子不得遮不聽分五不分便犯開文中非時分者謂尼衆未集時有沙彌尼時次遮僧不得出功德衣戒衆僧和合出功德衣理應詳遵共同作法今貪五利遮令不出惱衆情深故須聖制別緣具四一先受德衣二時中作法三為利故遮四不出便犯開言非時者謂過五月計出衣單白但有三非今言五者文中乘列亦可非出妄情縱五非妨次遮僧欲出功德衣戒第一百一十釋義同前但前戒現遮故起犯文言衆僧如法出衣又結罪中望法不成結或僧不出犯此戒是當遮故起犯文言時諸比丘尼僧欲出迦絺那衣及結罪中取言了為分齊然有釋言此語業遮故了了犯若是當遮者何有五非前戒身遮謂身在申手外故不言了了此解不然若以當遮無五非故即言是語業者前戒是身業遮身在申手外如何有五非進退既然前解為正次不與他滅諍戒自有解慧堪能殄諍彼復來求意竟不為滅令諍增熾般惱還俗敗損不輕故須聖制別緣具五一是四諍事二諍人求請除滅三有德堪殄四無因緣謂前人有舉擯及二難等不犯五不為滅開文若言不行者不行我言教次與白衣外道食戒釋同大僧此是犯同緣異戒為與白衣上亦犯提罪次與白衣作使戒出家理應栖心物外今與白衣作使特乖修道之義又令白衣輕慢僧衆過損不輕是以聖制別緣具四一是白衣二非法作使三無因緣謂父母及信樂人病勢力持等非作犯次自紡績戒紡績勞務下人所為出家作之特虧道望別緣具四一是十種衣縷等二自紡績三無因緣謂須索綖強力所執四隨引手犯次著俗人衣輒坐臥他牀戒進修之人每應清潔愛染之所恆須絶心輒著婦人嚴具臥在常居之所生過不輕是以聖制五緣成犯一是白衣舍二著婦人嚴具三是夫妻常居止牀四無因緣除病二難五隨坐臥次經宿不辭主人輒去戒前晝日不辭此經宿去不辭釋義同前次自誦呪術戒進道之人宜守正法今輒捨棄謂雜呪術此則增長生死患纍道門過損不輕故須聖制別緣具三一世間呪術二無因緣三言章了次教人誦戒釋義同前但為自他業殊故分兩戒又復前自誦中四事不犯一治病二學書三折伏外道四護身教人誦中全無是開次度任身婦女戒出家尼衆理應清顯永絶譏嫌生長信敬今知任身度令受具後産醜纍故須聖制別緣具五一是任身二知三為受具四作和上五三羯磨竟餘非根本但獲輕𠎝次度乳兒婦女戒第一百二十餘義同前唯以乳兒為異五分二十九有一比丘尼産一男兒不知云何白佛佛言聽白二差一尼伴之時二尼捉兒生疑佛言無犯二尼共兒眠亦無犯若離懷抱應與比丘令出家若不欲令出家應與親養令成長次度減年童女戒釋義同大僧唯以童女有二歲學戒為異緣文有三一起過二呵責三告諸比丘下明受戒法於中復三初度沙彌尼法二自今已去下與式叉學戒法三彼二歲下年滿受具戒本及釋文相可解僧祇應問汝何時生若不知者應看生板若無者當問父母親里若復不知當問何王時大豐時大儉時若復不知者不可相形若樂人家女年小而形大當相其手足骨節次不與二歲學戒羯磨戒不與學戒既迷戒相廣興諸過行無由立既虧匠訓之功不成相利之道違教不輕故須聖制別緣具六一是十八已上童女二不與學戒羯磨三年滿二十四為受具五作和上六三羯磨竟文言彼非十八者謂不滿十八及已上者不與學戒便即受具為淨身故制二歲學戒故智論十六問比丘尼法中何以有二歲學戒答佛在世時有一長者婦不學懷任出家受戒至後身大轉現諸長者譏嫌因此制有二歲學戒次不説六法名字戒現不示名猶不識相壞行違教如前無異別緣具七一是十八童女二與學戒羯磨三不説六法四年滿二十五為受具六作和上七三羯磨竟戒本三句一人二不與六法三年滿下結犯釋第二句中此六法者謂前四方便後二根本是所學法前四根本犯須滅擯非所學法又此六法學須盡形臨逼受具下須二歲二歲未滿犯此六事缺其學法更與二歲若其六外犯者但是缺行不闕學法不須更與縱滿二歲未得受戒有缺學者亦須更與二年以犯缺學不合受戒若爾行覆藏竟犯應壞法答覆隨日治不是盡形故曰滿不壞前法論其學法是其盡形犯即壞法故須更與次度諸遮童女戒僧衆要須勝人崇集先顯佛法利益世間今此女人諸根不具輒度出家汙辱尼衆醜纍不輕故所以制別緣具五一諸根不具二知不具三為受具四作和上五羯磨竟起文三一起過二呵責三告諸下廣明受法於中復三初受戒方法二族姓女下説相法三汝已受具足下總結勸持初文有三明尼中本法儀軌二時諸比丘尼下諸大僧中受具方法廣釋其相具在下文次度少年曾嫁婦女戒十二曾嫁已經事人斯堪能持戒故佛聽許年不滿者志未成立既不離過制不聽度別緣具五一年減十二婦女二知減十二三為受具四作和上五羯磨竟餘相同前然母經第八云若女人十歲已有夫主者度令出家受沙彌尼戒滿二年後得與受式叉摩尼戒須滿二歲後得受具足戒是名二歲相應法次度曾嫁百遮婦女戒釋制意等同前此中亦應具明四戒且略出初後中二義同亦可前制二十減年不得今為曾嫁開減年受竟謂餘遮亦同曾嫁為此故有初後兩戒中間兩戒起過由能授人非關所為故不得有乘因起過豈得言道已曾嫁故不須學戒不示六法名字次度淫女戒耽欲女人雖非正障度受具已為人嗤哭此還醜纍不輕要須深藏遠送故違招譏聖制提罪別緣具五一是淫女二知是三為受具戒竟四是和上五不深藏遠送次不以二法攝受弟子戒凡具二法相攝養者始成師訓相利之道其二法者濟給衣食免其形苦誨以教法開曉心神今虧二法形心不安致令弟子不能進行此則患纍事深故須聖制別緣具五一是清淨尼甄去破戒舉擯等不犯二恆隨和上除離去不犯三和上有法及衣食四無因緣或以此故致有二難五不以二法攝受即便是犯次不二歲隨和上戒新受戒人未有間曉每應咨稟以成己益輒離師去不蒙訓導闕於進修故須聖制別緣具六一是和上二清淨有德堪能攝受三師不聽去四未滿六夏依五分理須如是今言二歲者文誤故爾五無因緣謂由此住有二難生六離去便犯次不乞畜衆度人戒第一百三十人不自知非分自處須僧籌量有德無德今僧不聽輒度起過事多輕損故制提罪別緣具四一增不聽二為受具三作和上四羯磨竟自下三戒不約羯磨竟結罪者略也緣中文三一無德度人不知教授起過二時諸下呵三告諸比丘尼下制乞畜衆遣僧籌量有德者聽無德者制問無德乞者謂羯磨成不古舊釋云無德度人別可有罪作法成就若爾無德教授亦應成就解云教師無德全無教授尼義故不成差無德和上令前得戒故所以成此解不然定法成不如上明説次未滿十二夏度人戒年夏小者行德未圓志既不立豈成師訓要須年夏滿足解行具備堪能攝受故所以聽別緣具四一夏未滿二為受具三作和上四羯磨竟男女受戒學無學異兩衆和上亦有差別故十誦諸尼欲共諸比丘等便言汝等五歲不依止他十歲畜弟子我等亦爾有何差別諸比丘白佛佛言從今已去尼滿六歲不依止他滿十二歲得畜衆次無德度人戒自行不立何能濟人彼我俱損故所以制別緣具四一無德二為受具三作和上四羯磨竟此戒即是簡愚取智次前戒簡小取大不以二事攝受簡無行取有行尼為過損多故並獲提𠎝僧即損徵但犯小罪次不聽度人謗僧戒不量無德非理謗僧惱衆自傷故所以制別緣具四一實無德二僧不聽三非理謗四言了犯問所以不諫者答自知無德非分謗僧無有傍倚故不須諫次父母夫主不聽輒度人戒既有所屬不合出家輒與受具為他牽捉此則醜纍僧徒不得清顯情過不輕故須聖制別緣具四一有所屬二為受具三作和上四羯磨竟次度與童相敬愛喜嗔戒直爾耽欲尚穢道門況與男子相愛而能進業又以喜瞋自惱惱彼過損不輕故須合制別緣具五一是耽欲喜嗔者二知是三為受具四作和上五羯磨竟次不與學戒尼受具足戒學戒滿足專心希具及貪供養不為時受此則不成師訓攝受之方過狀不輕故須聖制別緣具五一學戒清淨滿二歲二僧衣緣具三是和上四無因緣五不為受次取他衣不為受具戒前制和上此是依止師先取他衣許為受具今不為受違要故提別緣具五一學戒清淨滿二年二取衣許為和上三僧衣緣備四無因緣須不為受次多度弟子戒凡度弟子須知教授之方既不教授隨緣壞行故作限約年度一人縱貪故違聖制提罪別緣具五一曾前度人二未滿十二月三更度人四作和上五三羯磨竟文中不約羯磨竟結罪者略無也次作本法竟經宿往大僧中受具足戒即日往者善心相續經宿方詣事多留難故制不聽經宿詣僧違即惱彼聖制提罪別緣具四一曾作本法竟二不即日往三無因緣四不往經宿獲提理約明相文無者略五分明相出和上提餘師吉母經第七云若比丘尼比丘尼僧中受具足竟即晝日大僧中受具足不應夜來次教授日不往聽戒第一百三十備德之人慈心誨導理應聽受咨稟未聞今乃慢法輕人不聽教誡自失法益故制提罪別緣具四一僧所差二正教授三無因緣四不往聽次不半月請教授戒尼須教授意如前今以慢法輕人不遵敬教既違元受之心故制提罪別緣具四一二部僧滿下至五人二請教授時謂十四十五十六僧説戒時三無因緣四不差往犯戒本三句一人二立法三若不下違教結罪其釋相中此及自恣不解結罪句但解前二釋初可知解第二立法句中文分為二第一滿和無病廣教授法第二若比丘僧病已下減別多病問訊法前文有四第一尼衆差往第二彼當法大僧中下請教授法第三彼既屬授下問取不尅期往法第四若比丘尼聞下迎送供養法初文有三一舉聖制故言世尊有如是教等第二而彼下制差之緣第三佛言下正制作法差往此中復二初爾差法次明正差正差復二一羯磨差使二口為差伴次第二請教授法文中亦三一別請詞次聞屬授三簡所屬之人餘文可知母經第七云若十五日比丘尼就大僧中受戒僧集時即乞教誡更不須後時來乞次不詣大僧自恣戒制意如前又以受戒既由比丘懺悔除𠎝亦須仰藉故仗大僧垂慈誨示令行無違業纍消滅別緣具四一安居竟二兩衆俱滿和合無病三無因緣四不差往犯戒本三句一人二立法三結罪釋中初句可知第二法文二初廣自恣法二滅減別多病問訊法前中文三初明差法文中復三如前戒説第二往至下對僧自恣法大僧總須盡集不容乖別初列威儀二正自恣止恣五句一舉尼衆安居竟正是自恣時第二又舉大僧安竟所以須舉二部僧者以尼要對二部恣故三比丘尼僧下正明縱宣己過請舉見聞疑罪四大德下仰求尊衆垂慈誨示第五我若見下彰己識過誨除以成晈潔之行第三彼即下辨尼當部自恣時節若不疲倦同日無過自恣之法一同大僧法式儀軌具在下文其恣五德還須差向往大僧中者以此或承僧命舉尼罪故問教授何以開屬一人自恣要須對衆自説解教誡真欲請説法師不假對衆開聽屬授自恣同此舉罪不備自非對衆陳修見聞無由得具次問訊可知若僧不滿及多病者尼僧須作一部恣法次不依大僧安居戒制意如前又以安居正時須依明德隨有疑滯咨決造修今乃不依大僧失於法利抱暗自俱故制提罪別緣具四一在無比丘處二作不依意三無因緣四結安竟犯五分十二雖依比丘衆而無教誡者吉羅若安居中比丘衆移去死亡罷道若為強力所制為若病皆不犯次突入大僧寺戒僧寺尊居不可輕爾往來入出須有咨量不白入者容生染患喜相觸惱故所以制別緣具四一有比丘伽藍二不白三無因緣四入門犯次罵比丘戒大僧上尊是其師位理應祇奉不失敬儀如何反以惡言呵罵慢法輕人違敬故制別緣具四一大比丘二以惡言呵罵三在間內四言詞了上尊罵下惱徵故輕次罵尼衆戒夫衆僧者尊貴可重先顯佛法利益無邊今乃因諍起嗔輕罵大衆自壞惱僧故制提罪別緣具五一是尼衆除別人不犯此戒二因諍嗔忿三惡言敬罵四在聞內五言了犯然尼罵別尼及衆俱犯提罪若其罵僧別人失敬師儀提罪若罵僧衆異衆義稀獲輕若爾大僧同衆應結重𠎝何以罵衆亦得告罵罪答大僧敬衆稀故吉羅女人少智罵數故重次不白衆僧使男子破癕戒男女形殊恆須遠離輒破身癰恐生染習此則敗損不輕故須聖制別緣具五一身有瘡癰二使男子三無染心若有染心不犯此戒四不白大衆及餘人五隨下手刀一一提罪次背請戒制意具緣同大僧説然古舊釋云尼背請足食合制一戒大僧離制此謂離合不同大僧異多同少者少者咸有病開異多有三一背請有施衣開之食即無二背請無餘法開足食即有三背請要背正請受正請犯非正不犯足食足竟正非正俱犯有斯別狀故分二戒尼同多異少異少者背請有施衣開足食便無據是應離同多有三一並有病緣開二俱無餘法開三俱食正方犯同多故合問罪以尼無餘法解女人不食九日命終堪耐飢苦故無餘開丈夫不食七日命盡不堪飢苦故開餘法今解不然尼以開不重開故無法餘如比丘足已更食正非正俱犯若不開作餘法教急難恆論尼足竟更食五正始犯不正不犯已開食不正説何須更開餘法作此解者非關七日不死不開又解尼有餘法如見大僧不起云大德我不作餘食法食既不作法開使不起不犯故知作者須起不起即犯又五分足食勸足並是同戒王至尼法中直列戒本以此故知其義即通文對大僧設法儀軌論其義旨亦須該尼不得見戒不同即言餘法亦隔又尼二戒合者直為俱貪正犯不勞更以餘義解釋戒本三句一人二舉緣先受請者背請緣次若足食已犯足緣三後食下雙結兩罪又戒本廣釋並論兩罪緣起之中直論背請亦可緣中受節食者背請方詣居士家食即是足食不犯中有五句初三五句開背二四兩句開足次家慳生嫉妬戒師得供養彌應助喜友以如心輕言於汝此則堅惜他心次家慳生嫉妬戒物輕慢於師垢障處深故制提罪別緣具四一施主好心供養於師二內生嫉妬三發言汝四言彰了了次以香塗身戒第一百五十出家理應棄捨飾好觀身不淨是其所應反以香塗令身光潔耽著放逸患深故制別緣具三一是香澤二無病三隨塗結犯次胡麻澤塗身如前次使比丘尼塗身戒次下教人總有五戒一戒落後次第有四若就教人業同應云一戒戒云若比丘尼使女人塗身波逸提或就自作戒中合制亦得戒云若比丘尼以香塗身自塗教女人塗提或就所用物殊應立二戒一香塗身二澤塗並通自作教人如掘地壞生義亦同足今隨境別乃立多戒次使式叉塗身次使沙彌尼塗身次使白衣女塗身次著貯跨衣出家威儀衆生物善以衣貯跨反增惡習既非道儀故制提罪次畜著婦女嚴身具畜俗嚴具多生染習障道之源故須聖制次著草屣擎蓋戒出家入道謙己為懷捨俗趣求須除慠逸今著革屣持蓋而行長慢招譏制之不許別緣具四一著革屣持蓋二在道行除寺內三無因緣除病強力二難不犯四隨越界犯次乘乘戒出家理應修慈濟物今輒乘乘苦惱前境動越威儀招譏損道由斯過故制與提𠎝僧祇第三十九云若者老羸病若樂人不能行得載牸牛車及雌馬雌馳若病不覺雌雄無罪比丘反説得越毗尼罪次不著僧祇支戒一百六十女身不覆醜相外彰又生他染招致譏過四緣成犯一有僧祇支二不著三無因緣四入村犯次夜入出白衣家不白主人戒夜暮入出多有姧非迹同賊師清濁難了此二戒合制緣中彰入而還出戒本制入廣解及開雙明入出入出具五緣一夜分二白衣舍三無三寶請喚等緣四不語主人五入門犯問此與非時戒有何差別答以縱屬來不犯非時為不語主人即犯夜入若不屬來犯非時罪語舍主故不犯夜入若屬授來及語舍主二過俱無若不屬來復不語舍主並犯兩罪以此故知二罪緣別出具五緣一夜分二先在白衣家三無三寶二難等緣四不語主人五出門便犯次向暮開僧伽藍門戒暮輒開門喜增姧盜入出無節豈護衆儀別緣具五一向暮二藍門已開三不屬授四無因緣五開出便犯次日沒開僧伽藍門戒前戒日猶未沒故稱向暮此戒要日沒後開有此差別釋義同前唯以日沒為異次不安居戒聖制安居為防囂動今還遊散豈得無事又是正時妨修道業招致譏醜故制提𠎝別緣具三一是後安居日二不結三過後安日問居結安居有其前後所以違前獲吉過後犯提答雖不結前猶可結後以有後結但犯吉羅若不結後更無結法情過是重故得逸提爾者破前猶得結後可獲吉羅破後更無結法應得提罪如何兩破並獲吉羅前後不安罪有輕重解結有時限違有重輕破無分齊一種吉罪次度大小便常漏人戒法衆理應清潔先顯帶病入道不應僧儀別緣具五一病二知三為受具四作和上五三羯磨竟自下度人戒緣皆同此次度二形人戒身有兩形不堪進道既不得戒制以提𠎝次度二道合人戒次度負債病人比此亦招譏不輕二戒合制次誦呪為活命戒前戒為棄捨正典不為活命此為活命以此為異別緣具四一世俗呪術二誦習為活命三無因緣四言詞了次以世俗伎術教授自衣戒一百七十前戒誦習呪術為自活命此以陰陽吉凶教授白衣又前自誦戒亦為活病等四種事開此教授白衣全無此開別緣具三一陰陽吉凶等事二教授白衣三言詞了了緣中先教不應謂向日月等次又言已下教其所應戒本三句一人二教授白衣三結罪釋中初句可知第二句中文分為四初舉緣中教不應作文故日伎術者如上説二若欲説下列如來塔等不應向之舉是顯反非前第一三又言今日下舉前教授中應作之文四應語言下舉是顯非反前所應次彼比丘尼下解結罪句次被擯不去戒行不自立損及自他既被擯治理祗僧命而故不去違法惱僧情過不輕制以提罪餘六羯磨治人在寺不遣離處故無不去之罪唯此擯法遣出本處故違不去制與提罪別緣具四一被擯活二不下意求解三無因緣四作意不去或可須經明相文無者略次輒問大僧義戒僧是上尊理難輕觸凡有問決要先咨白不啓輒問慢法輕人又失敬儀制以提罪別緣具五一是大僧二先不求聽三非常聽問之次或親友或彼從此受等四問義除戲笑等五言彰了了不犯中若彼從此受者謂此常從比丘受法若二人俱從受法以是同習故若彼問此答者謂同習人彼此問答若六誦者謂同誦部卷此等並輒罪次身業惱戒釋義同前口惱唯以身為別次在僧寺造塔戒僧尼位別居止亦殊交雜往來手相觸惱又令容僧不知致敬乖禮以此情過故制提𠎝別緣具四一有比丘伽藍二知有三造尼塔四隨用博等一一提𠎝遮義永故不待竟犯次百歲尼不禮新受戒比丘戒僧是上尊由敬得戒今不設禮特𮓪受心別緣具四一是比丘二知是三無病四不起迎禮祇云尼入僧寺應頭面著地一一禮一切比丘足若老病不堪者應隨力多少禮不遍者得總禮應言我尼某甲頭面禮一切僧足僧至尼寺尼敬亦然五分尼見比丘不起不禮不請坐者皆提次搖身趍行戒威儀容止事須合法內自肅清外生物善今乃搖身趍行相同鄙染損壞不輕故須聖制次作婦女莊嚴香塗身戒出家進行須絶耶心忽作婦女莊嚴香塗身者此失宗敬之心招譏損道汙辱不經故制提罪次使外道女塗摩身戒釋義如前次八提舍尼初戒乞蘇者離俗進修須異凡品蘇是上味乞增貪求內闕貞廉外𮓪信意為過不輕故須聖制別緣具五一從他乞蘇二自為己三者無病四受得五咽咽成犯下七義同事別為異戒本四句一人二除病三乞蘇而食四結罪釋相可解上四比丘吉者蘇等資微稀故吉罪下四提者丈夫喜乞故獲提𠎝若望尼説前數後諱並得可呵次衆學戒法與僧同為離繁文不能重舉尼七滅諍攝在提中不合重明故亦不舉上來尼衆止持竟
