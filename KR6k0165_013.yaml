body:
  text: 次明授以諦法先解其義三門分別第一釋名第二出體第三諸門言釋名者逼迫為苦聚積為集凝寂為滅赴證稱道故婆沙七十七問云苦集滅道各有何相脅尊者云逼迫是苦相生長是集相寂靜是滅相出離是道相名謂五取蘊如從爐出極熱鐵團三海雜苦而住猶如䥫團與火合故火勢隨逐極復如是與苦合故是苦諦相如是苦蘊從煩惱生由業故能生轉是集諦相此煩惱業究竟雜苦於諸趣生不流轉是滅諦相修淨戒定正觀生滅能斷有因能證有問諦是何義答實義真義如義不顛倒義無虗誑義是諦義第二出體者依一切有宗苦集是一物因果故說二謂一切有漏法為果義邊是苦諦為因義邊是集諦擇滅是滅諦八支聖道是道諦故婆沙云阿毗達磨諸論師五取蘊是苦諦有漏因是集諦彼擇滅滅諦學法是道諦次辨諸門總有其四第一建立四諦第二四諦次第第三四諦行相第四說諦利益初門問此之四諦如何建立為依實事為依因果為依現觀答設爾何失若爾三皆有過若依實事諦應有三謂苦集諦實體一故若依因果諦便有五謂苦集諦是有漏因果道諦是無漏因果及以滅諦即成五諦若依現觀諦便有八諦上下諦各別觀故答應作是說此四聖諦依因果立若爾應成五諦答聖道因果總合立一故立諦門唯四非五若爾有漏亦合總成三諦答以其行相有總有別故建立諦有離有合謂有漏果有四行相於其因性亦四行相然無漏因果總四行相以此立諦唯四非三第二門問何緣行者入現觀時要先觀苦後觀其道答苦集滓穢廣彰其過欲使生厭是故先明滅道清升淨妙無纍欲使生欣故次後辨以有厭欣便生取捨又以苦集無始來俱是以先說滅道會聖方尅故次後辨又欣厭中何以果先因後答若據因果次第理合因先果後今據觀行次第是故先果後因所以觀人次第爾者以因果性粗細不同是故觀人先粗後細故婆沙七十八云依粗細故觀有前後謂苦諦最粗故先現觀乃至道諦最細故後現觀如學射人先射粗物漸次乃至能射毛端俱舍二十二云今說四諦隨瑜伽師現觀位中先後次第問可緣現觀次第必然答由加行中作是觀故謂若有法是愛著處能作逼惱為求脫因此法理應最初觀察故修行者加行位中最初觀苦苦即苦諦次復觀苦以誰為因便觀苦因因即集諦次復觀苦以誰為滅便觀苦滅滅即滅諦復觀苦滅以誰為道便觀滅道道即道諦如是病已次尋病因續思病愈後求良藥契經亦說諦次第喻夫醫王者謂具四德能拔毒箭一善知病狀二善知病因三善知病愈四善知病良藥如來亦爾為大醫王如實了知苦集滅道故加行位如是次觀現觀位中次第亦爾由加行力所引發故如已觀地縱馬奔馳第三門緣諦行相四諦各四四十六苦諦四者一苦二非常三空四非我集諦四者一因二集三生四緣滅諦四者一滅二靜三妙四離道諦四者一道二如三行四出此之十六實體亦爾應知行相慧為自性問何等名為苦等行相答婆沙七十九云傷痛逼迫如荷重擔違害聖心故名為苦由二緣故說名非常一由所作二由屬緣由所作者諸有為法一剎那頃能有所作第二剎那不復能作由屬緣有諸有為法繫屬衆緣方有所作違我所見故名為空為違於我見故名非我如種子法故名為因能等出現故名為集合有續起故名為生能有成辦故名為緣所蘊永盡故名為滅有為相息故名為靜是善是常故名為妙最極安穩故名為離是離自體非有離故違害耶道故名為道違害非理故名為如趣涅槃害故名為行能永超度故名為出是能出性非沒性故第四門問何故世尊為諸有情宣說如是四聖諦法答為拔有情令出生死是故世尊宣說四諦問未知拔濟是何義耶答諸有情類沒在泥中世尊哀憐授正法手拔彼令出煩惱淤泥安在聖道及道果中故婆沙云從嶮難所引諸有情置平坦處故名拔濟嶮難處者謂異生性如山巖等諸可畏處平坦處者謂諸聖性如大王路無怖畏處由佛宣說四聖諦法從異生性極嶮難處引諸有情置諸聖性極平坦處令得道果故名拔濟復次從大苦處引諸有情置大樂處故名拔濟大苦處者謂是生死大樂處者謂是涅槃由佛宣說四聖諦法引諸有情令出生死得大涅槃故名拔濟以下釋文於中有二第一約諦別轉第二若我不修下更為總轉前別轉文四第一舉數第二何謂下徵列第三何等下辨釋第四是謂下結問苦等四諦何故並以聖名來答說聖者成就故名聖諦故婆沙七十八云得聖法印印相續者得聖者名彼所有諦名為聖諦復次已得聖財名為聖者彼所有諦名為聖諦第三辨釋文二初明三轉十二行輪第二此苦聖諦下舉上轉中皆生六德前中四諦即為四文初諦文二一明三轉第二當修下勸修八正諸諦咸然唯道諦中闕無勸修以諦即是八正體故言三轉者第一示相第二勸修第三引證此諦既爾餘諦亦然諦別有三成十二轉先解初轉初轉文三謂舉釋結餘諦亦爾今言苦諦者謂是八苦以生等時有苦故名生老病死苦愛別離者緣交染境稱之為愛本合今分名曰別離惱由愛別離生故名愛別離苦結恨不捨名怨違緣侵惱為憎緣交事合稱會惱由死憎會生故曰怨憎會苦求不得者情希名之為求差本所求稱云不得苦由求不得生故曰求不得苦謂是善法未得苦情背惡法亦名為求求不免離云不得苦由求不得生故曰求不得苦謂是惡法未離七苦並集諸苦熾盛故曰五盛陰苦說八苦相令生厭離故曰示相轉餘二可解既識苦相欲除其苦要修道諦翻前二邊次明集諦示苦煩惱相名示相轉諸惑起時愛能為導發業之本煩惱為根以此舍云如草根未拔苗剪剪還生未拔煩惱根趣滅滅還業起惑起皆由愛生故曰緣愛本所生染著前境稱本業思故曰與欲相應與思相應妄以為適故曰受樂餘文可知次明滅諦三諦盡處稱之為滅示此滅相名示相轉彼愛永盡者還是惑業起皆由愛對其惑業稱愛為彼無欲滅者餘惑亦亡此是集諦盡捨出要解脫道諦盡永等者苦諦盡餘文可解次明道諦示八正體名示相轉餘文如上次明一一轉中皆生六益既有斯益如何不修先明苦諦示相六益舊來以六通配釋云智生者宿命眼生者天眼明生者漏盡覺生者他心通生者身通慧生者天耳皆云舉益勸修未實得益今釋不然此是見道位中何以舉通來勸斯利實生非是末得如婆沙云一一轉時各別發生眼智明覺眼是觀見義智是决斷義明覺眼是觀見義智是決斷義明是照了義覺是警察義此中更加通生慧生通是除障義慧是簡擇義以此解文不違正理冀諸學者詳而鏡之次復次下觀修六復次下引證六此於苦諦有十八益餘諦類然合七十二文中苦集有結滅道闕無次明總轉以別不悟更勸知文有其四第一明已修諦成道無疑第二如來下彰此衆中有機應悟第三沙門下顯法深勝轉唯是佛第四是故下舉前三益勸令修學第一是故是我下修四真諦理如實知者不得成道由我修諦如實知故是故得成無上等覺既成等覺而無疑滯汝應思推同我所得第二是故是此衆中無覺悟者如來終不虗轉法輪由此衆中有覺悟者是故我今為汝轉法第三是故是此法輪餘人能轉如來亦不轉於法輪由此法輪唯佛轉故是故我今勸汝修學次聞法悟道見垢斯盡稱曰諸塵照理分明名法眼淨佛轉法輪憍陳悟道五中先證故佛讚言阿若憍陳如已知阿之言無若之言如五中獨拔故曰無如然依婆沙一百八十二釋即異此彼云阿若多憍陳那阿若此云解多此云已憍陳那是姓佛問彼云汝解諦未答言解已如是教化經於四月令彼五人善根熟已於迦栗底迦月白半八日如來為彼轉正法輪時憍陳那最初見法佛便三問汝已解耶此意問言汝今觀我是懈慢多求亦亂失志不證菩提涅槃而誑汝耶故三問解不彼還三反答言已解此意答言我今觀佛實非懈慢多求亦非狂亂失志又實證得菩提涅槃而非誑我我今為佛證人故三答已解是故為止誹謗佛三問之有說世尊令餘四人聞法勇勵速入見道故三問之次告徹請主世尊轉法通益神祇獲度非常發發聲相告本轉法輪功由大梵令聲上問唯至請主故曰須臾聞徹梵天等然依此文佛讚陳如地神聞聲展轉相告婆沙四十一問地神藥叉舉聲遍告世等今在波羅痆斯國仙人鹿苑三轉法輪具十二相等時為彼地神有正智知佛輪轉法苾芻見法耶答無此事甚深非彼境故爾者彼云何知答或佛告他我轉法輪苾芻見法故彼得聞問世尊何故告他令知答世尊欲顯善說法中所言誠諦一見一樂衆生告同許故告他知復次三無數劫修多苦行為益有情今初得果深生歡喜故告他知復次世尊自顯於九十六諸外道法中最尊最勝無能及者故告他知復次佛欲顯示憍陳那等真實功德亦示世間良福田故告他令知問會中亦有餘天神等相告何緣但說地神唱耶婆沙一百八十三云由彼地神先發聲故問地神何以先發聲耶答彼恆隨佛而作衛故謂從菩薩處胎初生踰城出家及修苦行乃至成佛轉法輪時恆隨衛護令無留難今見如來轉法輪已歡喜踊躍自慶先來所施功勞今得果滿故先唱告復次為彼地神性輕躁故是以先唱如今衆中性輕躁者多喜高聲彼亦如是復次此是近遠次第法故地神先唱次虗空神次四大王衆天如是展轉經須臾頃聲至梵世聲雖念念滅依展轉義說上來諸文請說雖對陳如即是世尊轉法一代緣起次出家受戒文有其三第一善來度受第二爾時世尊下三歸受戒第三爾時尊者下羯磨受法所以三文次第爾者解有二義一以能秉人驗上來世尊自行成道既成道已理須化度是以先明善來受戒善來受者咸契無著既證果已亦須化人是故次明三歸受戒上二受者自行既成須行衆儀攝利群品故次羯磨二約所化以彰次第善來機感最強淳熟先度三歸稍劣故次第二羯磨最微是以居後譬如日出先照高山次及平地後霑幽谷次第之儀亦復如是先解初文善來文六第一憍陳等五第二爾時四尊下度耶輸伽第三爾時下耶輸伽同友四人第四爾時下耶輸伽同友五十人第五爾時下度長者五十人第六時世尊遊波羅奈下度那羅陀梵志初文有二第一五人出家受戒第二世尊與三人下說法增解修成無著前文有三初度陳如次阿濕畢摩訶男次婆提婆敷陳如文三一請出家二佛言下正為受戒三時尊者下請修知足凡預善來須證初果所以先牒已證後求出家文言見法者見於諦法得法者得無漏法謂得無漏了諦分明故曰見法得法成辦諸法者諦理衆多備皆修獲故曰成辦諸法亦可已害薩迦耶見斷惡趣因無邊生死今得有邊無際輪回今得有際已見聖諦入正定聚故曰成辦諸法得果不虗故曰已獲果實亦可果體堅牢非緣壞沒故曰已獲果實往修苦行不了正耶今遊諦門始知得法得法了真方求出離故須白佛請度進修次正受戒一往稱彼來情示其行體軌則故曰來比丘等盡苦源者彰戒功德也五分唱善來竟時鬚髮自墮袈裟著身鉢盂在手是為憍陳如已得出家受具足戒得戒最初結名為首對此須明能發戒緣所發戒體先解其緣總作一十二門分別第一列數釋名第二定緣廢立第三諸受具緣第四緣境立心第五諸緣次第第六說結多少第七挍量優劣第八明受漸頓第九諸受通局第十所被聖凡第十一能秉差殊第十二諸部同異初門列數者案此宗文但有四受謂善來三歸八不可過法及以羯磨言善來者善是衆生心來是如來教衆生𫎇以諦理開心布欲厭俗求真出家修寂此稱如來本導之意引令入法能所雙彰故曰善來良以夙樹妙因早崇勝業聞法解悟知生有邊遂厭無始之轉回乃求有終之寂滅故曰來比丘於我法中快自娛樂等母經第一云如來言已身上所著婆羅門服乃至鬚髮即皆隨落沙門法服自體在身威儀庠序手執應器如二十年學法者也三歸者歸是求向之心三即所歸之境夫欲絶妄尋真栖心纍外者必須憑杖三寶以作津梁越度四流超升彼岸是知欲本難除愛源叵息自非尅誠竭志無以空喪或銷樊此人行不夙成未蒙早悟緣在羅漢不遇如來亦深厭生死希求出家三說歸依即發戒品母經第一云佛告憍陳如此諸人等三語受戒具足成就善得其戒何以故過去諸佛亦曾與此三語受戒未來諸佛亦當與此三語受戒我今現在亦同彼也是故得有三語受戒八不可過者八是所行之法不可過是勸敬禁勒之言尼衆厭俗牢獄希求出家佛覩過𠎝抑而弗許生主梵云鉢羅闍鉢底舊云波闍波提者訛也倍增悽泣抱厭還宮遂自落髮被衣倚於門外更欲申請耻改形儀但知倚望俳徊悲誠哽咽阿難身居學地魔或其情不忍服異心悲為彼求請因請雖許而以敬法往要若能導行即是出家受戒阿難奉教傳授生主生主聞即奉持遂發戒品故曰此法應尊重等羯磨受者隱其所為從法為名謂名所作辦事等此人雖植妙因行非淳厚但承教法不遇如來又以信意難生善心頗著假僧勝境快彼弱因方稱所祈發於具足緣僧秉此羯磨教得故曰羯磨此是聰名對人分二約處中邊便有其四隨事別彰乃開為六六通開制制唯有二謂十人二十開便有四謂僧尼邊地遣信曾嫁又此六中僧二尼四言僧二者一是十衆以其中國僧多求之易得要假十人方能發戒二是五衆以其邊地僧少求之稍難若不曲開無由濟拔因此除半故云五衆十誦五十四波離問如佛說邊地人持律第五得受具戒頗有十人但取五人得名為受戒不答得名受具與受者得罪伽論言犯可呵准此即是約處定開計理亦應更問白木調內假使便少不開成受以是中國約處定制文無者略問邊地僧少反云持律此則增制如何是開答古人解云中國十者四人解法六人足數由僧多故不言持律邊地僧少秉法難成為遣此疑須標持律今解不爾愚癡義通邊有持律中亦須然又解五中下至一人持律故俱舍云持律為第五人於邊地得十誦亦爾又母經第八云邊方通律師得五人受戒次尼四者一是二十衆女人惑重垢深信心難發若不覩其勝境無由納法是以要假僧尼二十清衆方生信心發於具足問所以尼受須二部僧益有四義故一因心難發二令行堅固三不違敬文四表成師義爾者即應本衆非師答本衆正攝受作法故成師尼行狀大僧故須經二部二者遣信此女姿顏挺異形貌殊常出寺詣僧恐成陵壞聖遣尼中作本法竟開使往僧為彼受戒僧為秉法一如常則因此得戒故曰遣信受戒問對此難緣應開使懺答已起之惡難除未生之善易就所以知者十人二十足為良驗又解受須往僧故開使受懺得請來故不開也爾者所以受戒不許請來答為尼慢法制往僧中若許請來便違敬教又解僧尼二衆尊卑不同寧可將卑就尊不可屈上從下懺異於受故許請來三者十二曾嫁曾嫁女人年始十歲學法滿足即聽受具以經事人志得成立堪耐惱緣亦能持戒以此開減八年受戒四者邊尼義立十衆邊方既有尼衆亦得唯僧同開若以文對僧開尼不立者如結界等法起不對尼是則僧行尼應不秉然既二衆通備邊尼何以不聽若云以尼佛制不許邊方恐怖處行故不開者此無義言不能繁破上來從緣離為六受合則唯一謂名羯磨然此離六并餘三受開即為九合唯有四第二廢立者問受緣唯文更有四種所謂上法破結自誓自然言上法者道證無學自然獲戒故文云若人修道成羅漢即名出家受具足言破結者修道進德惑盡解滿契證無學自然感戒即八比丘中破結使者是或准此文立作上法言自誓者謂八比丘中自稱比丘是言自然者謂佛答憂陀耶難云自然得解悟云何從人學此並依文何以不立解夫論立義須依本宗正文不可取不正文依他部立何者且如上法非本受緣無替減年開令得戒故下文云年不滿者受已生疑聽數胎等若復不滿始言修道成羅漢即名出家受具足若以開文有成道等言即宜為緣者如胎等開亦應別立胎等既非成道焉得又以義推此即名等言通前諸位非𢩁成道應言胎年滿閏年滿說戒日滿即名出家受具足戒問若羅漢是開非上法者何以減年戒未開通文無答無者略也亦可緣在下文減年非有爾者十誦沓婆十六成道何不開受而要年滿答此就開緣羯磨後事彼據常行不可逆用其猶胎等開緣亦不逆教諸餘羅漢沙彌准例並爾若立立上法不應有羅漢沙彌若言為無求心不得戒者准何教文知有此事然諸教中不見說有百祈戒心果戒俱得無祈戒心得果不得戒如斯之義應熟思尋又准母經第一亦是羯磨一緣故文云如有一人盡一切漏未滿二十受已生疑開數胎閏不滿問得羅漢佛言此是上受具也次文即除羅漢開緣故文云後受戒者聽數胎中年准此即是為無後得者以所開通文無以是羯磨開緣下文中有又第二云上受具中除尊者摩訶迦葉蘇陀婆其餘一切不得建立善法上受其立者不能熟詳文義既無的據難可依憑又破結者通於初果又亦該隨不專是受文中亦有乞求割截應成受緣乞割既非破結焉是又自稱比丘非開自誓及自然受破可准知咸是刀刀無勞廣述第三具緣者善來具四一得初果文言見法得法二有求心文言欲於如來法中出家修梵行三須對佛文言前白佛言四假佛教謂命來等三語亦四一出家相具文言剃髮被著袈裟二對諸羅漢三授教應法四領歸具足八不可過亦四一假佛聽許二親對阿難三具宣敬教四頂受遵行羯磨受戒昔來所辨具於四緣如釋八比丘中羯磨比丘文文云若受大戒者僧數滿足緣白四羯磨如法成就者教法成就緣得處所者結界成就界內不別衆緣住比丘法中者年歲滿足身無遮難緣若具此四是大比丘得成戒本犯戒之人四中若闕非大比丘故須此四方成受法即是滅諍五現前中除滅所為具餘四現一能秉僧二所秉法三秉法處即界現前四所為事謂人現前今此受戒即別所為故具此四即能發戒若成所戒便由具緣故取此文解比丘義今解不然詳其文意此但料簡成犯戒人不是為解具緣之義文言若受大戒者簡非具戒謂沙門等外道俗人白四羯磨者簡白二等此為一句如法成就得處所者總是法成處所非是地界之處如下多文皆言非法別衆羯磨不得處所法和合羯磨得處所皆悉不約地界處說住比丘法中者簡顛狂等人不住自性亦可若受大戒等四句總簡善來等餘受非犯廣人住比丘法中一句簡顛狂等以此今解具十三緣一身無遮難二結界成就三盡集和合四體如數滿五教請和上六問答緣具七差教授師八教授撿問九問已白僧十教從僧乞十一戒師作白十二對衆撿問十三白四滿足此之具緣不違道理冀諸學人思而取悟第四境心者如前釋戒起由二緣一者因緣二增上緣言因緣者於中且論立心緣境然心及境總開為七第一愍重第二斷惡第三修善第四度生第五趣求第六護法第七承受初心所以須愍重者故多論第一云凡欲受戒先與說法引導開解今於一切衆生起慈愍心既得增上心便得增上戒此增上心者是其總言若別分者便有九品沙必須起上上品心者謂於此戒想難遭遇如病得醫如飢思食等本猶無戒永劫沉淪今欲進受超升心須增上多論又云若淳重心有身口無數若輕浮心但有作業無無作業次斷惡者以未受前不斷諸惡遍一切境皆是罪緣今既受戒立心猒惡翻前罪處律儀備生然境雖多總為二類謂情非情言情境者多論第一云下至阿鼻地獄上至非想處及三千界乃至如來有命之類盡得此戒以初受時一切不煞等無有限齊以是義故一切衆生上無不得戒又俱舍十五云無有不遍於諸有情得律儀者以於一切諸有情所住善意樂方得律儀異則不然以惡意樂不全息故又云若人不作五種定限方可受得別解律儀言五定者論謂有情支處時緣定言非情者上極妙高下窮水際草木生種大地萌牙隨損一塵一花一葉分分壞處皆結其罪故多論云三千世界下至金剛地際一一微塵上得一戒色是以故言衆生無邊戒亦無邊大地等無邊戒亦無邊出家僧尼佛聖弟子位尊人天實由於此次修善者謂策三業勤修一切菩提資糧令使圓滿菩薩纓絡本業經云攝善法戒者所謂八萬四千法門次度生者以四無量心誓救群品無問怨親平等並濟故本業經云所謂慈悲喜捨化及一切衆生皆得安穩次趣求者戒是趣向三乘正因我今誓二乘菩提趣求無上等覺故華嚴經云戒是無上菩提等次護法者以我受已復授餘人如是展轉佛法不絶即是然無盡燈義故遺教經云自今以後等次承受者衆緣既備作並受心當須專想專思不得餘想餘思如是心心相次念念相續一心承受諸妙功德若其無心戒則不得由此諸道之中唯人得受又於人中諸根須具就根具中須無遮難遮難既無身器清淨衆緣備具方始發生以此授人持須明了開道應法律儀始生若有𮓪違從勞設法空施軌則過在戒師所以然者以此戒是諸行之元凡修萬行以此為始故遺教經云依因此戒等次增上緣有二如上既知如此我今為汝對衆秉法此之羯磨有大神驗能令恆沙善法汝身中現成比丘當得道果第五起次第者善來最初陳如為首三歸第二以一百一十阿羅漢遊行化度化得人已將至佛所道路疲極失本信心因聽羅漢先與剃髮著袈裟已三語受戒羯磨第三以息三歸與白四故八不可過最後以多論云八年與羯磨至十四年八敬虔女以此故知居在第四第六說結者諸師釋云善來緣強八敬情重故一遍得不須結勸三歸心慢故須三說別人所為復加三結羯磨和難故須四遍衆心齊忍一結即成今解餘受無結唯羯磨有所以爾者羯磨對衆表和須結餘不對衆悉無有結文三歸前三能發戒可使後三說名結假後戒始生如何說名結若此戒生名為結者羯磨第三亦應名結又復羯磨結文不誦前法體三歸後是結應不誦法體以此故知定非是結言有結者太成滯理然諸受中善來八敬各一可解三歸心劣兼別人為口口別授丁寧至三前後六遍方能發戒羯磨對衆先白表宣白已衆知方陳所作故所作體但三非四是則衆秉者三別秉者六以此足知說結差別第七挍量者諸受緣中善來最勝以得初果佛為增上八不可過居次遠承佛教親對學人次復三歸以對無學羯磨最劣秉通凡故又准多論羯磨受戒福德淺薄感得此戒到使不能窂固有諸灾患一戒羸二捨戒三根變四斷善對損翻益一勝三劣謂善來極至蘇跋陀羅三歸八年即止八敬一得無重白四羯磨若佛在世若佛滅後一切時得佛法始終以白四羯磨戒為宗本能紹繼三寶作無邊利益莫上於白四是故最勝最妙最為尊重第八漸頓者尋諸受戒並依教生教有減增體咸不發故約體明皆無漸頓不得以五十二戒望具為漸頓又若具體要假五等方名具者可得名漸具無不假餘如何得稱漸又受具時再三秉法前則再納二百後得更加五十如是增成方名為漸既無斯義漸相如何豈得虗立漸頓之名而實無漸頓之義然約位明不就體說次第別受為漸頓者即是羯磨一受亦漸亦頓餘之三受頓而非漸問如何羯磨亦漸亦頓答先受十戒次受具戒是名為漸不受十戒直受具戒說名為頓問受既頓得何用漸為多論第一云雖一時受得三種戒染習佛法必須次第先受五戒以自調伏信樂漸增次受十戒既受十戒善心轉深次受具戒如是次第得佛法味好樂堅固難可退敗如遊大海漸漸深入入佛法海亦復如是若其一時受具戒者既失次第又破威儀又以衆生得道時異故須次第三時漸受又解若論犯不犯羯磨制漸頓犯漸不犯故下文云不與沙彌戒佛言得戒衆僧有罪餘三不制頓而非漸問善來等三並許頓受如何羯磨制令漸為答善來等三不限年歲緣具即行不須漸受羯磨受戒制滿二十年既未滿不令受具且與十戒令使進修若全無戒何所冀心第九通局者謂約時處及報以辨言約時者善來三歸八不可過局佛在時不通末代羯磨一法通被二時問善來既唯佛秉不通末代所以付法傳中阿難亦秉善來度諸仙衆答彼中具據別緣異說既非本文不繫會釋第二教迹差殊難為一准但是見聞不同有斯別狀第三欲顯阿難是法藏主替佛處故得秉善來第四一時化宜不同常例第五仙人根熟寄此為緣第六阿難雖度但不比佛言約處者亦前三受局此洲中故多論第二云白四羯磨通三天下餘受但在閻浮或以義准三歸得通以文不遮餘聖往故義文應知言約報者善來羯磨此二說通故八比丘尼中有善來羯磨母經明了各有顯文羯磨法雖是通不同善來善來能秉是一羯磨使異故一部不得互行十人二十亦不齊用又所為別思而可知歸敬二局諸文大同問所以女人無三歸受答三歸先止尼衆後來是以女人闕無此受所以知者女人出家阿難啓請阿難身是羯磨受戒明知所為女人不及歸教又准多論足彰不及引文可知此約具戒故唯局僧若五十八恆通女衆然僧無有不可過者尊位不可敬尼下衆又以女性過多不聽入道因請聽許須以敬要丈夫不然故無此受上來直據羯磨總相故四受法二局二通若約羯磨離為六有總則為九一通八局第十所被者善來受戒局是聖位以得初果方應善來降斯已還不證真理未能感佛命唱善來三歸所為不同舊釋且如多論八年已後止三歸興白四未止已前局內凡者於此八年中間豈無外凡入道故知此義擁而未通又於六年制煞人戒煞戒緣中習不淨觀若三歸受是內凡者如何此中劫修不淨故以此知通是凡位又律文中不定位次既無別定明義是通又云失本信心明知志道非遠通是凡位於理無違又多論通言六種受戒衆生福德深厚致得此戒始終堅固無灾患也而不別言三歸是聖八不可過者受通一人定是初果故下文云乃至七生人天便盡苦際未知五百位在何許答厭俗心猛同請出家總是聖人義理無爽是以王宮諸釋並是聖人故琉璃王受害學報又解雖同一席豈得齊聖何妨釋種通有凡夫羯磨受者通及聖凡利益寬多無過此法第十一秉人者若以義言戒由佛有佛若不出即無此法今以親發為論便即師弟不同善來佛秉餘三弟子問所以教通弟子秉者答為彰所化藉緣不同又解為通末代若唯佛秉滅後云何問所以善來獨唯佛秉答具二義故唯佛秉一或盡知圓威德力大能令衆生愛俗成道故母經云乃至如二十年學法者二善識根性應機授藥謂於此身必證無學故十誦五十八云佛法王自與受戒無有在學地命終故諸弟子等闕此二義一為威德力劣如僧祗中比丘亦秉善來鬚髮不盡威儀不淨佛言汝不可得如佛無畏口也二為不善識根性如涅槃云舍利弗令弟子教不淨觀浣衣教數息等以斯義故弟子不秉爾者如來所以不秉餘受答緣在佛者善來教度既與無緣餘亦不秉又以三歸所為機劣不能感佛具如文明又准母經第一衆生有二類一有障道業故不得善來復有現身無無學因緣故不得善來八不可過者佛抑女人不聽入道阿難為請因宣敬法阿難言下即發具足是故如來不秉此教羯磨受戒多論十義故佛不秉一為平等與此作師不與彼作違平等故二止鬪諍故為有親疏便生鬪諍三止誹謗故外道當言沙門瞿曇自言慈等一作和上一不與作凡人無異四為成三歸故若秉羯磨即隨僧數無有佛寶五成四不壞信六成六念七若秉羯磨弟子有病應當著視供給所須豈是自在法王所應為耶八不滅前人功德謂弟子有病難事供給所乏則滅前人所有功德如一愸富羅輪王業謝九不惱衆生不問近遠成就佛故十者為通末代佛若自秉滅後為誰又實論第三云佛不入僧羯磨中亦不同諸餘僧事又以三寶差別故佛不在僧中第十二同異者先明律十誦五十八受戒有十一自然謂佛世尊自然無師得具足戒二五比丘得道即得三摩訶迦葉自誓得四蘇陀隨順苓佛論故聽受具足戒五邊地持律第五得六波闍八重法得七半迦尸尼遣使得八佛命善來得九歸依三寶得十白四羯磨得言自然者悟理道圓本無師訓律儀具足不假衆緣故曰自然多論問佛與辟支云何得戒答無師得戒又問從教得不答不從教得有言從教得佛在樹下結加趺坐言我要不解此坐而得漏盡即身口教成就後得漏盡戒亦俱得言見諦者聞法思惟四真諦理既見諦理戒品得生故曰見諦言自誓者謂大迦葉宿種善根蒙佛略言要心立誓發誓既竟精勤苦修得盡智時律儀具足故曰自誓體此從緣名有多種善見從初名為教授故論文云佛告迦葉汝當發慙愧心微於骨髓應如是學因此教授立誓要期名為自誓或名受師以心信受佛為大師故多論云迦葉來詣佛所言佛是我師我是弟子修伽陀是我師我是弟子母經據後名為建立善法上受具問准此衆名自誓等師皆未得戒如何付法傳云作誓言已所有諸戒悉皆具足答彼約緣說故言自誓時得諸論中名受師亦爾此約理明故盡智時得此言摩訶迦葉約姓說大悲是兄弟三人中大者以彼善來非自誓得又以性少煩惱名為無欲故智論五十四云摩訶迦葉娶金色女為妻不生愛樂弃捨出家或以身作金色名金色迦葉言論義者此沙彌識性照明善通物理年始七歲能答佛問詞理無滯稱愜聖心因此聽與羯磨受戒從初立名故云論義若從餘部名多不同母云勑聽伽論問答見言答問雜心問樂此等名殊與論義無別餘六大同四分義可准知又羯磨緣中僧得一衆名尼受戒故第四十波離問佛波闍受八重法即是出家受具成比丘尼餘尼云何以言現前白四羯磨次辨諸論母經第一二衆各五即為十受比丘五者善來建立善法上受具勑聽三語羯磨彼文問曰何故名為上受具足答佛在世時不受戒直在佛邊聽法得阿羅漢名上受具尼五受者善來建立善法上受具師法遣信羯磨此之十受義攝唯七謂善來上受羯磨此三通被二衆餘四便局局中三歸勑聽唯比丘衆師法遣信專比丘尼三歸師法局已上明勑聽遣信今須解釋勑聽局比丘者有其二義一以丈夫智慧增強答難稱愜勑聽受戒二以沙彌與佛形同進止俱遊得有問答女人翻前故闕斯受遣信局尼者許其二衆梵行難齊理亦俱聽遣信受戒但以沙彌受戒當衆進求下遠之造故無此開尼經兩衆進詣僧徒路有難緣故開使受次明了論三乘人得戒合有九種圓德言圓德者謂有四萬二千功德一時並起無不具滿故稱圓德偈曰於七依他得圓德擇二圓德了別相聲聞人有七圓德比丘有四善來三歸略羯磨謂初緣時聞白即得廣羯磨尼三受者善來遣信謂瞿婁達磨此曰八尊法廣羯磨上七聲聞得戒第八獨覺有量功德至得第九佛無量功德至得上來緣竟次明受體夫戒體者性相幽玄義理微隱自非學窮三藏識洞五明無以測其旨源知其詮際是以往古俊傑當今彥英於此一門不通悟者實以律無正録論有明文既不自照宗由每憑他决雖復假資成立理昧調疏余遂發憤於壞纍年尋考搜經括論探二凡之宏摸核舊研新捃三四之洪範是以摘扶宗之妙旨擲違理之繁文述此義章用傳同業冀諸學侶不再沈研庶望一覽洞開無勞三復者矣然章准其立破旨歸亦得稱云詮戒體論然論剖析總作三門第一釋名第二出體第三諸門分別言釋名者大論戒數位總有三三位之中辨律儀相律儀三中又除定道別解防過唯禁語身至於心𠎝聖開不犯語身戒者對患稱名患境無壃戒烏有限情非情數遍周法界戒隨境發還乃無窮數雖無窮位束為兩一曰表戒二無表戒先釋別名表與無表次釋通名所目之戒所言表者身語造作有所表示令他了知故名為表言無表者因表發生無見無對不可表示名為無表體得在身相續隨轉縱入餘心不名失戒次釋通名所目戒者此表無表俱有懸防咸稱為戒依俱舍十四通有六名論云別解脫律儀名差別者一曰尸羅訓釋尸羅詞者謂清涼也故伽他言受持戒樂身無熱惱故名尸羅二者妙行三乘聖人稱為智者彼衆稱歎名為妙行三者名業身語皆是所作自體名之為業四者律儀能使身語調柔合法故曰律儀此之四名通初及後五者別解脫以初剎那別別弃捨一切惡故故名別解六者業道於初剎那作事究竟暢思義成故名業道此之二名唯局初位又可初位名別解脫亦名別解脫律儀後位但名別解脫律儀不名別解脫論云從第二念乃至未捨不名別解脫名別解律儀唯此衆名則有其七又可第二念已去唯名後起不名業道論云從第二念乃至未捨不名業道名為後起若加後起名便有八或可後起是前第三業攝此對根本等言不得為衆名數限既除後起名七如前次出體者然今案佛滅後二十部宗此文即當二戒並以法密部攝古來傳律諸人不尋分部所以言依成實宗者理不然也但以法密宗義弘在西方此出先來盛傳說一切有部故今解釋並依說一切有部明今此色法為體所以知者以俱舍第十三云由思力故別起如是如是身形名身表語表業體謂即言聲聞表與無表既但是色未知色是何義為二性耶答俱舍第一云色是礙變性爾者即應極微非色極微即體非變礙故答無一極微各處而住衆微聚集變礙義成五識必須依積集緣積集若爾即應過未非色以無積集不同現在解此約曾當變礙義說爾者主法可然有曾當義未來不生如何當礙解是當礙如所燒薪雖現不燒亦名薪也爾者表色可然無表不爾由無曾當及彼類故今有二解第一雜心論主云由表變礙故隨表得名色如樹動時影必隨動次俱舍論主法喻俱破先破法云若由表色是變礙故無表隨彼亦名色者此無表體體非是色由表是色隨表受名無表非是色從表名為色無表非是礙隨表亦名礙礙既不同色寧齊等次破喻云譬如樹動影必隨動由表是色無表亦名色者表色滅時無表應滅如樹滅時影隨滅故影生依於樹樹滅影亦滅無表依表生表謝無表滅滅既不同色亦不等正理第二破云此不應理隨心轉色不從表生應非色故第二一切有師解云由所依大種是變礙故無表依彼亦名為色論主難云由所依變礙故無表得名色者五識依五根應當亦名色五識依五根不隨根以名色無表依四大如何隨大以名色此師解云無表起時定依大種如影依樹光依珠寶五識依五根即不如是唯能為作助生緣故論主破云影光理應別依大種如何影光造色而依樹寶四大破已解云以五識依不定或有變礙謂眼等根或無變礙謂無間意無表所依即不如是定依變礙故名為色次下兼明成實論宗然依成實先明無作其無作體定用非色非心故論第七問曰已知有無作法非心今為是色為是心不相應行答曰是行陰所攝又問若無作是色相有何過答色聲香味觸五法非罪福性故不以色性為無作又佛說色是惱壞相是無作中惱壞相不可得故非色性次明作戒可為四門第一敘異說一師以色心為體故論云口業者非直音聲要以心力助成故知身業亦以心力助成明知二業色心為體第二師以心為體心是慮知得為戒體色頑無知故非戒體故論云離心無思無身口業故知二業用心為體第二辨過非初師以色心為體者不善論意論第七問曰是身作或善或不善而身不然是故非身所作答曰隨心力故身餘處生時能集業是故集名善不善非真是身業口業亦爾非直音聲語言以心力隨音聲語言所集善惡是名口業然論說心能引導業不即以心為作業體又復色是色法色頑無知心是心法心是慮知二合為體不應正理第二師以心為體者是則亦應防心既許以心為體何不防心若防心者何故論第十云毗尼中無意犯罪又云但發惡心不得無罪但不結戒以難持故粗罪持戒能遮細罪定等能除又若以心為體戒應慮知既不慮知豈應正理第三立正義者色為業體故論第二云無色法者心及無作法也既云此二非色明知作戒是色又論第七云身業者身所作名身業問曰不應有身業所以者何身所動作名為身業有為法念念滅故不應有動答所謂法於餘處生時損答他是名身業其口業者四大相擊於中出聲聲成音曲有所表彰以為名字句用此名字句即於聲上建立為口作業業無別體用聲為體第四釋妨難者問若以色為體者何故論云口業者要以心力助成此之業體定是聲性心是發業之因非是業體問論言離心無思無身口業是則心為思體明知二業亦不離心以心為體解此破外宗故作是說以一切有宗心王之外別有思數而思與心同時別體故論云離心無思然心未必思思必是心又以外道立義身口之業不由心助故論破云離心無身口業次諸門分別總作一十六門第一為無為分別第二就有為中漏無漏分別第三就有漏中三聚分別第四就色聚中三色別第五就三色中依類分別第六就等流中三性分別第七就善性中生得加行分別第八就通二中約處分別第九就其處中依大分別第十就依大中始終分別第十一就於終中得時分別第十二就得時中先後分別第十三就俱生中證成分別第十四就證成中重不重分別第十五就不重中顯數分別第十六就頭數中同異分別初門二戒俱是有為法聚非三無為無為是常戒從緣發故此二戒並有為收第二門此有為戒是有漏攝諸漏於中等隨增故謂愛緣時攝為有已如衣潤濕埃塵隨住無漏上法非愛能攝如於炎石足不隨住第三門此有漏戒俱是色法心及心所不相應行是其戒因非正戒體所以然者以其聲聞力劣但防身語故今發戒還從身語獲無表色以護七支第四門身語色中總有三種一者有色有見有對謂是色界二者有色無見有對謂五根四境三者有色無見無對謂法界中無表色若表戒者前二色收其無表者第三色攝故雜心第三云彼身作可見有對口作不可見有對無作俱不可見無對俱舍三十云除無表色何法名為無見無對非三有對故名無對第五門別解律儀體既是色有漏色中自有三類一異熟二長養三等流然此二戒等流色攝以從同類因所生故等謂齊等流謂流類所以唯等流者以餘二類唯無記故第六門身語色聲是善非餘二故俱舍云謂在即前居卑劣座或蹲或跪曲躬合掌復云起殷淨心發誠諦語然色差別總有二十於中形八長短方圓高下正不正此通三性局取善邊為身表業餘十二顯色青黃赤白雲煙塵霧影光明暗一向無記故非戒體語表是聲聲有八種一有執受大種為因有情名聲可意二有執受大種為因有情名聲不不意三有執受大種為因非有情名可意四有執受大種為因非有情名不可意無執受大種為因亦有四句准此應知此八聲中初二通三性局取善邊為語表業餘六唯無記故非戒體泛論身語無表通於二性今明善戒局是善性故俱舍十三云無表唯通善不善性無有無記所以爾者以無記心勢力微劣不能引發強業令生可因滅時果仍續起第七善有二種一生得二加行此二善心皆能發戒所以爾者若其趣入聞慧已去者即是加行心得亦通生得善心中得若其未得聞慧者一向生得善心中得故正理論四十二云諸律儀果有從加行有從生得善心所生若從加行善心生者律儀先者捨從斷善根然斷善根加行根本皆名斷善依此故說斷善根位捨諸律儀若從生得善心生者隨何品心能生善根所生律儀爾時便捨捨能等起彼隨捨故以此證知通二心得第八門別解律儀得唯現處加行根本後起情與非情性罪罪故俱舍十五云從一切二現得欲界律儀言一切者謂加行根本後起二者情與非情及性罪遮罪現謂現在薀處界得不從去來薀處界得靜慮無漏二種律儀從根本恆時得根本者除加行後起及遮罪非情恆時者謂遍於三際蘊處界得問別解律儀得唯現在何故定道通於過未答定道律儀是心俱有心緣三際戒亦隨轉別解脫者為是有情依止去來不然故不得也又解定道律儀非直防非亦能斷惑故俱舍云靜慮無漏二種律儀亦名斷律儀以惑通三戒亦隨轉別解不然故不同法久解定道律儀心成隨心轉戒既與心俱故防三世別解不然故不同法若爾如何不從加行後起遮罪非情處得解定道不起即已起即根本故得不從加行後起又解身語業道皆有加行後起意業道三起即根本定道既與心俱故無加行後起不息嫌疑不於遮罪非情處得正理論云若得靜慮無漏律儀應知但從根本業道以於定中唯有根本業道在不定位無此律儀故從有情數所發遮罪尚不得此二種律儀況從非情所發遮罪由此差別論作四句有薀處界從彼唯得別解律儀非餘二等第一句者謂從現在加行後起及諸遮罪第二句者謂從去來根本業道第三句者謂從現在根本業道第四句者謂從去來加行後起第九門問未知表與無表所依大種為有差別為無差別答所依各異若從一具和合有細粗兩果不應正理所生既細粗不同能生亦差別不等問細粗雖異七支如何答七支既殊能造亦異爾者七支能所既各不同然一期身所生無表為當與作俱時一時懸造為待後後起時念念別造答作俱四大一時懸造故俱舍十三云唯欲界繫初剎那後所有無表依過大生此為所依無表得起現身大種但能為依為轉隨轉因隨其次第如輪行於地手地為依爾者此之未來多念無表既依過去大種而生為當一具四大能造多念無表為復多念無表各別大造西方自有三解第一云但有一具四大能造初念不煞無表復能懸造一期身中衆多無表第二解云一具四大唯造初念不煞無表復更別起一具四大懸造未來一期身中衆多無表所以然者以彼未來未起無表種類同故一具能造第三解云起一具大種造初念不煞無表復更別起衆多大種懸造未來無窮無表此多無表念念別造第十門昔解此善作等通於始終故知表業始終通取若局第三為表業者前二落非亦應發戒又身語業皆色為體第三羯磨剎那竟時身止之色為眼所得可使說有身表業體語止之業非耳所得當時無聲可無語表既許語表通生不局第三為正故今正解局取第三若其未至第三秉未究竟要期不滿善而非戒要至第三要期心滿秉法圓具善而是戒故俱舍第十六云且如勤策受具戒時來入戒壇禮苾芻衆至成發語請親教師乃至一白二羯磨等皆名為善業道加行第三羯磨一剎那中表與無表名根本業道從此已後至說四依及餘依前相續隨轉表無表業皆名後起問發局第三不兼前者是則應無語表業體答許無語表有何過耶爾者語表既無應無無表答雖可當時無語表業無表得從加行發故又由互發由身表業發語無表或可加行語表亦發身表如乞戒云受具足戒因此須述古舊諸師報方便義然色通二報及方便身作是方便非報故心論云作者身動身方便口作唯方便以聲非報法故身口無作非報非方便故涅槃云非異色因不作異色因果一師解云非異色因謂非報色報色是方便也因報非方便故言為異非異色果謂非方便方便是報色果方便非報故稱為異故知無作非報非方便復有釋云作既方便非報無作異前明知非是報色及方便色又舊釋云然彼經文未必證成非報非方便義菩提王子意疑比丘餘二性中所以不名失戒佛即答言非異色因非異色因異其心雖在惡無記中本所受戒不名漏失言非異色因謂非受中之作以彼作者但一念故不作異色因果者謂非隨行之中及以處中作無作以彼作無作短故既非此二仍是比丘明知有彼受中無作形俱長故縱入餘心不名失戒今詳諸解未順經文雖復各逞異端終乖聖旨失方便業須對根本論之報色自共長養等流辨其同異如何乃將方便對報分別又舊引經深成謬亂夫取文者須依倫次如何不識旨歸雜亂抄引然涅槃經三十四菩提王子問若有比丘護持禁戒若發惡心當知是時失比丘戒佛言戒有七種從於身口有無作色以是無作色因緣故其心雖在惡無記中不名失戒猶名持戒以何因緣名無作色非異色因不作異色因果經文理實次第如是舊人不尋問意兩答倒寫連抄共作一通深違理教故今依文聊申正解夫身語業由心故起言非異色因者謂無受戒善心色因非彼惡無記因故言非異色因不作異色因果者謂但感得自類善果必不能招惡無記果既於自類因果性成一得在身相續隨隨轉轉不絶是無作色故言不作異色因果以此解經異無違失依前重寫恐誤後人又解此是身語業色因果心異業色故非異等問舊解既非何繁序引答若不剖折熟知是非指事再明息諸野論第十一門善來受戒唱善來竟至盡苦源時得三歸受戒後三法滿得故俱舍十四云起殷淨心發誠諦語自稱我是塢波索迦願尊憶持慈悲護念爾時即得五戒律儀為令了知所應學處故復為說離煞生等由如苾芻受已說相此釋五戒具戒類同若爾如何尼律與三歸竟始云次與汝受戒解次授隨戒故云受戒非是受體體已先發八不可過法說訖即得以其受者作頂受之意授者復云若能行者即是出家受戒羯磨受戒緣雖衆多莫不咸以第三竟得問羯磨受戒得既竟時未知遣信為同此不答今古諸師皆存報得以下文云己與汝受戒竟今解羯磨竟得以報文云已與汝受戒竟報有已言明知得在大僧言下故見論第七遣使八語得具足戒從比丘尼得白四羯磨比丘僧復白四羯磨是名八語得具足戒又復發戒緣在羯磨何因緣加不得使報方生若待報生便有三過一戒非羯磨緣生過二別人言下發戒過三違下正文已言過爾者既不待報何因餘文重令尼衆秉羯磨法答具三義故更須秉法一佛去疑情二為在生善三傳使須具若以尼衆秉大僧法令使戒生法便雜亂故此戒生便有三過一有秉法雜亂過二尼有一部發戒過三違見論八語過第十二門今此二戒並同時發故俱舍十六云第三羯磨一剎那中表與無表名根本業道以此故知無前後得然表有三一是因時非是戒體二是果時三是果後第二念等此後二種正是戒體第十三門俱舍十四云唯初剎那表反無表得別解脫及業道名又十六云七善業道若從受生必皆具二謂表無表以斯文證明有二戒所以要須此二戒者若無其表無表無所從生以有表故無表得生若無無表不可一形防非以有無表故得盡形防護第十四門諸受相望當位不重咸各自能辨戒體故若約五等異類相望體各不同故得重發所以知者俱舍十四問云若從近事受勤策戒復從勤策受苾芻戒此三律儀為由增足遠離方便立別別名為體各別具足頓生答三種律儀體不相雜其相各別具足頓生三律儀中具三離煞乃至具足三離飲酒餘數多少隨其所應爾者同類何別答以諸遠離依因緣發故因緣別遠離有異若無此事捨苾芻戒爾時即應三戒皆捨前二攝在後一中故既不許然故三各別爾者若諸戒中當分不重者如何式叉學戒缺已更與又末利私呵二三重受答式叉學中元無戒體體既非有何論缺與又末利私呵得法歡喜善心增著二三歸依據實而論戒不重發若立重者皆無證文第十五門論其戒數理實無邊以緣一切普境生故門律儀要緣普境生者且如異趣方域煞等不成於彼如何律儀能發答由性類同境有轉易是故從彼亦得律儀故俱舍十五問云於非所能境如何得律儀解由普於有情發起增上不損命意樂故得律儀若爾前佛及所度生已涅槃者後佛於彼既不發得別解律儀如何尸羅無滅前過答以一切佛別解律儀皆從一切有情處得設彼有情今猶在者後佛從彼亦得律儀故後尸羅無滅前過問律儀若從非情境發境有滅生戒應增減且如春受應多冬便漸減冬受戒少春則續生如是便有別解律儀離得捨緣有得捨過婆沙一百二十解云無有增減以總得故謂此律儀總於一切生草等上得一無表而實無有無生等時總於一切蒲桃等酒則不壞時得一無表而實無有無諸酒時是故律儀無有增減餘亦如是又准明了論戒有數量謂四萬二千福河由此福河恆能洗浣垢汙言四萬二千者根本戒有四百二十所以爾者如婆藪斗律戒有二百多明輕戒憂婆提舍戒有一百二十一多明重戒比丘尼別戒有九十九合成四百二十是一一戒有攝所於僧等十利功德一一功德能生十種正行謂信等五根無貪等三善根及身口二護一戒即百戒有四百二十豈非四萬二千然言無願毗尼者由得此也問僧尼二衆戒數各別所以無願毗尼齊皆不異解此據二衆總說理實各隨本戒又解二衆俱有四萬二千以轉根時即成所戒第十六門昔解受隨義一譬如一楯能捭衆敵為破斯義故立此門受隨二法具表無表且論無表有其八種謂形作俱俱心俱願俱事在從用助緣異緣此八位三形俱定受心俱事在從用局隨餘四義通受隨助緣異緣通受者如遣使受形及身語互造者是次明同異受隨無表同義有三謂名體義異便有六第一總別第二根條第三懸對第四長短第五三性第六一品多品前四可解後二須釋言三性者受中無表體善隨行亦不通餘此就列性受隨俱狹今約通不通說者受是形俱通餘二性說之為寬隨是作俱唯局善性說之為狹此就一心自作為語若取先後心及教人說餘二性中隨亦通有准此便是受隨俱寬作此解者約為三位局體俱狹受隨同善若約隨中教人義說便即俱寬通餘二性若以自作隨行對受分別方有寬狹即是受寬隨狹言一品多品者受中無表義均一品以本上上心受所發無表心增上故戒亦上上或容犯戒終至羅漢酬本一品心因故無優劣上中等心受亦同此隨中無表乃有多品以所防非五犯非一故能防行亦五義殊又對諸犯一一戒中心有增微事亦不等故隨無表有此不同次解二表同義有五謂名體義寬狹長短不同有四總別根條懸對一品多品皆准前說既有如此差別不同豈同昔解受隨義一上來體竟次修乞食翻前自餓次度餘人文三如上然為餘人轉名說法所以爾者依前轉者切力尤多又於深法離趣入故初以近報接使修行言布施者舉善令修言持戒者舉惡令斷既能修善離惡必有勝報來酬故曰生天之法次授諦法令使修證呵欲不淨是集諦有漏繫縛是苦諦讚歎出離是道諦為樂是滅諦至此度五人已始是三寶具足次說法增解文有其二初食前說合心歡喜次食後說令進道門然食前中為三人說法二人乞食為二人說三人乞者欲明聽法不空乞食得辨故使三二去住不同次食後說法文有其五第一釋薀無我第二云何下審比丘解第三是故下重為廣破第四如是下觀成獲果第五爾時下結數顯德初文有二第一釋色無我第二舉餘類易初文破色有三一舉宗立無我然五比丘雖斷我執恐於境中計有我性故告比丘云色無我第二若色是我下開成兩章一受苦章若色是我者不應增益以不增益我不受苦文無不言是其錯耳亦可以色增益而我受苦如何是我二不自在章若色是我者應隨情欲欲得者得不欲者不得第三以色無我下依章解釋初釋受苦以色增益我受諸苦故知非我次釋不自在欲得者便得謂少年盛色不申者不得謂老年衰色既不隨情明知非我餘陰類然故亦如是次審比丘解先約色審一問常無常二問苦非苦三問色既無常苦者是變易法汝等意解云何為常是我是彼是我所不言是我者是自身我是彼者他是身我是我所不者是諸境中所計我不五人以已解心對佛故曰非也餘陰問解類准於前次明廣說於中文二初總舉一切色然一切中有五對十一問過去者已滅未來者未至現在者已生未謝內者自身為內外者他身及非情為外有對名粗無對名細好者不染汙色醜者染汙色遠者去來近者現在次明正破還舉一切色非我非彼等者前二非我見後二非所見作此觀智是實非耶故云如實正觀餘陰廣釋皆類於前次辨列獲先觀色陰觀見色過便生厭離以嚴不著故得解脫智在解脫人身中所起故曰解脫智我生等者如前釋色陰既爾餘陰亦然若論觀法先觀後證然此文中據說次第觀色證已方明餘四次然數者舉五比丘咸具二解皆成羅漢總合六人次度耶輸伽文五一度耶輸伽二耶輸伽文三耶輸伽道契無著五分至此始命善來四明二請之法五度耶輸伽母及本二次三文可解次第六文龍王曾於過去佛邊受法將驗來尊虗實遂自出宮兼持實粟誦先偈句慕佛求解梵志初聞欲為解釋但以教義幽深作難准擬展轉尋訪得見如來因此發心出家受戒於中文六第一龍誦八問來人解釋第二梵志領問訪得佛解第三將解重為龍王宣說第四見解生疑問知佛出第五尋更詣佛出家受戒第六佛問悲喜龍王具答為龍解中文有三偈初一偈半次第答前六問次有一偈答第七問下有半偈釋第八問六識開導同名為王第六最強稱之為上此答初句染者與染等牒文即解染是能染煩惱者是所染行人行人為戒羈纏名為染者者既被染與染無殊故曰與染等五分問云染與非染等佛答染者與染等此答第二句心離煩惱名為不染既無煩惱即是無垢此答第三句既為或羈名為染者不能除染故謂之愚此答第四句此愚垣徼諸界趣生此答第五句喪此瀑流功由慧解此答第六句四流非一稱云一切能斷此流名為捨也此明因盡天及於世間果流永泯逆流證滅不與相應生死長隔不為死或此答第七句念者是定因定發慧慧起流亡不為漂溺故曰能以等此答第八句餘文可知次明三歸受戒大分為二初明三歸第二爾時世尊下還明善來名從初立故曰三歸前文有四第一歎田滿足第二佛告下遣衆分化第三諸比丘下三歸受緣第四佛言下三歸正受前文六偈分三初一歎田滿足次四告魔問答後一舉宗重告初偈上半彰己德滿初句因患盡次句果患已下之半偈釋同其前唯難弟子堪化為異次明魔王心壞嫉妬難佛及僧福田不滿上半難佛初句因患未盡三縛非一稱之為諸不得自在名為縛也諸縛是能縛次縛是所縛次句果患未亡第三句難弟子未脫二縛第四句總結次佛答難初句三縛不羈因患盡次句果患亡次句彰弟子二患盡後句總以結勝魔王不分復更難云汝內有結縛明有三縛九結心在於中行謂在結總網中以是隨逐因患未盡沙門不脫果患不亡次佛答意凡夫具縛不斷貪等而彼五欲尚不染意況我惑習俱盡緣塵起染二患既除超魔境界是故我今得勝於汝佛辨過於劫火耶難狀若纖毫不可擬議隱形而去次重告可知餘三如文釋三歸法五門分別第一歸意第二歸體第三歸境第四歸則第五歸趣初門諸佛積劫大悲久弘誓願今既道登正覺廣濟群黎衆生若以殷重淨心至誠歸依必難衆苦多論第一云譬如有人有罪畏故投向異國以來救護彼王語言汝求無畏莫出我境莫違我教必相救護衆生亦爾繫屬於魔有生死過患歸向三寶以求救護若能誠心更無異向於魔耶惡無如之何如昔一鴿為鷹所追入舍利弗影戰懼不安移入佛影泰然不怖大海可移此鴿不動所以爾者佛大慈悲舍利弗無得習氣盡舍利未盡佛三阿僧祇劫修菩薩行舍利六十劫中修習苦行以是因緣鴿有怖不怖別問佛與二乘俱能斷或云何習氣有行不行答聲聞獨覺慧不獨利雖斷煩惱而有餘習如世常大雖有所燒而餘炎燼佛慧猛利斷諸煩惱而無餘習如劫盡火隨有燒物不餘炎燼第二門歸依佛體謂無學等如前以色等身前後等故爾者如何經說何名佛謂有釋子剃除髮鬚披服袈裟正信出家具一切智是名為佛答以所依身顯能依法故作是說於理無違然經部說亦攝依身若其歸佛不攝依身佛住俗心即應非佛言歸法者唯是擇滅問一種是無為如何非餘二答三無為中唯擇滅法是善是常餘二無為常而非善諸餘善法善而非常故諸法中此法最勝由最勝故偏以標名言歸僧者謂歸能成覺無覺法由得彼故聖衆成八然經部說若唯歸依學無學法僧住俗心即應非僧以此故知亦攝依身問佛依法生法勝於佛何故先說歸依佛耶婆沙解云佛為教主若佛不說法不顯現故先歸依復次如有病者先訪良醫次求妙藥復覓看者佛如良醫如法妙藥僧如善巧看服藥人故三歸依次第如是第三門言歸佛者理通一切非局釋迦故俱舍十四云為歸一佛一切佛耶答理實應言歸一切佛以諸佛道相無異故爾者如何但言歸佛不言一切過殑伽沙數量諸佛答理實應說過數量言但以佛言總收一切以種類同一言攝故爾者所以復言我是勝觀弟子或是頂鬚或能寂耶答隨依彼佛出家見諦即說我為彼佛弟子此論依止不說歸依言歸法者理通一切擇滅涅槃謂自他身煩惱盡處及於非情所證擇滅故婆沙三十四云應作是說歸依自他相續及非情數一切薀滅問答如前次歸僧者理實歸依一切佛僧以諸僧道相無異故問答如前爾者如迦葉波有聖弟子在山林間入滅心定及餘過現聖弟子無邊如何賈人但歸佛法又答婆沙三十四云過現雖亦有餘弟子而非現見當來解憍陳那等現可見故是故偏說又復僧有二種謂真與俗第一義僧雖復常在以此依俗俗僧未有為重俗僧故且歸二又解為欲除謗生信若也唯歸聖衆時人當言我歸聖衆非汝僧以不歸依心生輕賤以輕賤故不修供養以此不供養便喪善利以喪善利更獲重𠎝第四門二歸總有六種一授不與律儀俱五與律儀俱此等者須知詞司若語雜亂不得律儀俱成律儀相似妙行又須開導令起祈心及緣境等如受緣說問若不受三歸得成受不答不得俱舍十四云是故歸依普於一切受律儀處為方便門異此則無除不知者婆沙三十四有二說初云不得以受律儀者必依三寶以三寶為門得律儀故又解亦得謂若不知三歸律儀受之先後或復忘誤不受三歸者受得律儀而授者得罪若有憍慢不受三歸但受律儀彼必不得受者師前居卑劣座或蹲或跪曲躬合掌恭敬而受若不恭敬不發律儀必須從師無容自受以後若遇諸犯戒緣由愧戒師不造衆惡受此戒人應隨師教受者後說勿前勿俱如是方成從師教受異此授受二俱不成或稱佛而越法或後佛而先僧有所闕少不成三歸依此律文賈人歸依亦由歸少未有律儀若故倒說獲罪不成若無曉知三數不闕說不次者無罪成就若師言佛弟子言弗或師言弗弟子言佛此開成就俱弗不成或師言歸依弟子言爾或語不出言不具足或華夷未融滄吳音隔如斯等例總不成歸說義表兆翻邪得成第五門翻耶三歸理通五道除重地獄苦適故無已外山問海邊空林曠野輕繫之類皆成歸依餘之五種唯局人中故婆沙三十四云歸依有二一與律儀俱二不與律儀俱與律儀俱者唯在人趣三洲非餘不與律儀俱者通餘趣處又人中八衆戒體俱四一苾芻二勤策三近事四近住故俱舍十四云離苾芻律儀無別苾芻尼律儀離勤策律儀無別正覺勤策女律儀離近事律儀無別近事女律儀所以知然由形改轉體無捨得而名有異但由形轉令諸律儀名為苾芻苾芻尼等次善來文二初善來化度第二爾時下拂去譏嫌前文有三第一先度同友五十第二羅兄弟千人第三舍利等二百五十初文可知第二文二初度千人受具足戒第二時世尊下三事教化前文復二初度大兄師弟五百次度二弟師徒五百前文復二初廣現通併非二計次迦葉念下生信出家前文廣現神變有十八事迦葉自謂羅漢無能及者沙門雖得羅漢國人不識既無名聞不如我得又解在於事中雖復速疾理中不及故不如我創矚神光即合歸伏事存我執不肯受行今不獲已放果執因佛知將伏併非二計非阿羅漢者果非非向阿羅漢道者因非此觀作事越我心期今蒙示非故須弃捨弃捨出家如文可解二弟因此生信亦具如文次教化文三第一就處總舉三事第二別列三事化儀第三所化道契無著初文千人漏盡要須待時處伴此云三事論言三示導一神變二記心三教誡釋三示導二門分別第一釋名第二出體言釋名者示謂示現現希有事導謂導引引入正法故名示導此之示導若為示現神境智通變一為多變多為一乃至梵世神力自在令多有情深心信伏引入正法故名示導若為示現他心智通記說彼心思念差別如所記說皆實非虗令多等如前若為示現漏盡智通隨其所宜教誡教授速令見諦遠塵離垢於諸法中生淨法眼展轉乃至諸漏永盡令多等如前次出體者即亦通中一四六性以慧為體約智說者初是俗智次是五智謂法類道世俗他心後者或六或十如明中說次列化儀前二可解第三說法者令詳文意可分為三謂三徵釋釋中文二初對眼根廣釋二約餘根類易初文復二一出熾然體二釋熾然名出體復三約根境識三生觸出體三從觸生三受出體次釋名亦二一約三火二約八苦我說此苦生處者謂從熾然以生於苦又解文分為四一約生觸解以觸必從三因生故三因既爾果亦同然第二從觸以生三受第三從受生三煩惱第四從三煩惱生於八苦我說此苦生處者謂此八苦從三大生餘根同前故亦如是次漏盡可解次度舍利弗等文二初受請施園為度之處第二爾時世尊下正明化度前文有三第一除國人疑第二爾時下聞法悟道第三瓶沙王下願果施園前文佛赴王請與衆同行國人情疑不識師弟故須說偈問答顯有尊卑初偈問云汝見事火何變忽捨吾今問汝捨火所由次得答云愛等起時名之為垢此增苦集故復捨耳次偈又問汝見諸垢心不耽求今情所欣欲樂何處次答情樂生死循環名之為迹此迹滅故稱云休息集因無故苦果亦亡故曰三界無所礙苦集既無即是滅諦滅無殊狀故云不異心見亦然名不可異亦可見無別趣名為不異證與見同故不可異我見滅然不樂事火說偈問答鈍根猶疑故就事中以顯師弟餘文可知然受請入城天主化為人像引導讚歎以顯三寶威神國人見此異相說偈以問上三句問能敬者下一句問所敬者次天主說五偈次答各上三句答前下問所敬者是如來各第四句答前初問能敬者是我次度舍利等文三一舍利於阿濕卑所悟道二舍利轉授目連目連復於舍利所證果第三二人俱詣佛所出家受戒前文復二初二問答問知宗承所說之法次聞法悟道初問有三答亦含三次問所說法答是四諦文言如來說因緣生法是苦諦亦說因緣滅法是滅諦若法所因生如來說是因謂說諸法生因即是集諦若法所因滅謂說諸法滅因即是道諦大沙門亦說等指法同師不異佛說又解前之二句是逆順緣起故五分十六云法從緣生亦緣滅次之三句即是三諦四中除道即同智度論中聞三諦悟道故論十三云諸法因緣主是法說因緣是法因緣盡此是我師所說之義餘文可解
